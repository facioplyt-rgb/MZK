<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW (FIXED)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; }
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; background: #1c252e; border: 1px solid #333; color: white; font-family: inherit; }
        .stop-row { background: #1c252e; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 70px 45px 40px; gap: 8px; align-items: center; }
        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 85px; border-top: 1px solid #333; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
    </style>
</head>
<body>

<header><b>MZK GORZÓW (ADMIN FIX)</b></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="lines-content" style="text-align:center; padding-top:50px;">Ładowanie chmury...</div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-auth" class="app-card" style="display:block;">
            <input type="password" id="adm-pass" placeholder="Hasło (123)">
            <button onclick="checkAuth()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <button onclick="openLineForm(-1)" class="main-btn">DODAJ NOWĄ LINIĘ</button>
            <button onclick="document.getElementById('file-in').click()" class="main-btn" style="background:#800">WCZYTAJ BACKUP (TXT)</button>
            <input type="file" id="file-in" style="display:none" onchange="handleImport(event)">
            <div id="adm-lines-list" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="showSec('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="showSec('adm')" id="n-adm"><i class="fa-solid fa-gears"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay">
    <h2>Edycja Linii</h2>
    <input type="text" id="l-num" placeholder="Numer linii">
    <input type="text" id="l-dir" placeholder="Kierunek">
    <select id="l-cat"><option>Autobusy</option><option>Tramwaje</option></select>
    <textarea id="l-hours" placeholder="Godziny: 05:00, 05:20..."></textarea>
    
    <div id="l-stops-container"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj Przystanek</button>
    <button onclick="saveLine()" class="main-btn">ZAPISZ DO CHMURY</button>
    <button onclick="closeForm()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mzk-by-facio",
        storageBucket: "mzk-by-facio.firebasestorage.app",
        messagingSenderId: "676970411647",
        appId: "1:676970411647:web:26137e7242c0db7c83714a"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_data');
    let db = { lines: [] };
    let editingIdx = -1;

    function init() {
        dbRef.on('value', (snap) => {
            const val = snap.val();
            if(val) { db = val; render(); }
        });
    }

    function render() {
        // Render na stronie głównej
        document.getElementById('lines-content').innerHTML = db.lines.map(l => `<div class="app-card"><b>${l.num}</b> ${l.dir}</div>`).join('');
        // Render w panelu admina
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `
            <div class="app-card">
                <span><b>${l.num}</b> ${l.dir}</span>
                <button onclick="openLineForm(${i})" style="background:var(--accent); color:white; border:none; padding:8px; border-radius:10px;">EDYTUJ</button>
            </div>
        `).join('');
    }

    function checkAuth() {
        if(document.getElementById('adm-pass').value === '123') {
            document.getElementById('adm-auth').style.display='none';
            document.getElementById('adm-panel').style.display='block';
        } else { alert('Błędne hasło'); }
    }

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id).classList.add('active');
    }

    function openLineForm(idx) {
        editingIdx = idx;
        const l = idx === -1 ? {num:'', dir:'', hours:'', stops:[]} : db.lines[idx];
        document.getElementById('l-num').value = l.num;
        document.getElementById('l-dir').value = l.dir;
        document.getElementById('l-hours').value = l.hours;
        document.getElementById('l-stops-container').innerHTML = '';
        (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(name='', time=2, nz=false) {
        const div = document.createElement('div');
        div.className = 'stop-row';
        div.innerHTML = `
            <input type="text" value="${name}" class="st-n">
            <input type="number" value="${time}" class="st-t">
            <input type="checkbox" ${nz?'checked':''} class="st-nz">
            <button onclick="this.parentElement.remove()">X</button>
        `;
        document.getElementById('l-stops-container').appendChild(div);
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.stop-row')).map(r => ({
            name: r.querySelector('.st-n').value,
            time: parseInt(r.querySelector('.st-t').value),
            nz: r.querySelector('.st-nz').checked
        }));
        const data = {
            num: document.getElementById('l-num').value,
            dir: document.getElementById('l-dir').value,
            category: document.getElementById('l-cat').value,
            hours: document.getElementById('l-hours').value,
            stops: stops,
            type: document.getElementById('l-cat').value === 'Tramwaje' ? 'tram' : 'bus'
        };
        if(editingIdx === -1) db.lines.push(data); else db.lines[editingIdx] = data;
        dbRef.set(db).then(() => { closeForm(); alert('Zapisano w Firebase!'); });
    }

    function closeForm() { document.getElementById('form-line').style.display = 'none'; }

    function handleImport(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            dbRef.set(db);
            alert("Zaimportowano dane!");
        };
        reader.readAsText(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
