<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - Rozkład</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid transparent; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        
        /* STYLIZACJA TABLICZKI PRZYSTANKOWEJ */
        .timetable-container { background: white; color: #1a1a1a; border-radius: 12px; overflow: hidden; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .tt-header-box { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #ddd; }
        .tt-stop-name { font-size: 1.3rem; font-weight: 800; color: #000; display: block; }
        .tt-direction { font-size: 0.85rem; color: #555; text-transform: uppercase; font-weight: 600; }

        .tt-row { display: flex; border-bottom: 1px solid #eee; }
        .tt-hour-col { background: #f0f0f0; width: 60px; padding: 12px 0; text-align: center; font-size: 1.2rem; font-weight: 800; border-right: 1px solid #ddd; color: #000; }
        .tt-min-col { flex: 1; padding: 12px 15px; display: flex; flex-wrap: wrap; gap: 12px; align-content: center; background: #fff; }
        .tt-min-val { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; font-weight: 500; color: #333; position: relative; }
        .tt-row:last-child { border-bottom: none; }

        .news-badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: inline-block; background: var(--info); color: white; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; background: #1c252e; border: 1px solid var(--border); color: white; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .stop-line-badge { display: inline-block; margin: 2px; padding: 5px 12px; background: rgba(255,255,255,0.08); border-radius: 6px; font-size: 0.85rem; font-weight: 700; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    
    <div id="s-stop-details" class="section">
        <div class="app-card" style="display:block; cursor:default;">
            <h2 id="std-name" style="color:var(--accent);"></h2>
            <div id="std-nearby" style="color:var(--warn); font-size:0.9rem; margin: 5px 0 15px 0;"></div>
            <div class="group-label" style="margin-left:0;">Linie przejeżdżające:</div>
            <div id="std-lines"></div>
        </div>
        <button onclick="show('stops')" class="main-btn" style="background:#333; margin-top:10px;">Wróć do wyszukiwarki</button>
    </div>

    <div id="s-news" class="section">
        <div class="group-label">Komunikaty</div>
        <div id="public-news-list"></div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    
    <div id="s-tt" class="section">
        <div id="tt-head"></div>
        <div id="tt-day-sel" style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="day-btn active" id="btn-working" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--surface); color:white; font-weight:600;" onclick="setDay('working')">Robocze</button>
            <button class="day-btn" id="btn-saturday" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--surface); color:white; font-weight:600;" onclick="setDay('saturday')">Soboty</button>
            <button class="day-btn" id="btn-sunday" style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--surface); color:white; font-weight:600;" onclick="setDay('sunday')">Niedziele</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn" style="background:#333; margin-top:20px;">Wróć</button>
    </div>

    <div id="s-contact" class="section">
        <div class="group-label">Kontakt i Informacje</div>
        <div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-bottom:15px;">
                <button onclick="setTab('l')" id="mt-l" class="main-btn" style="font-size:0.7rem; padding:10px 0;">LINIE</button>
                <button onclick="setTab('p')" id="mt-p" class="main-btn" style="font-size:0.7rem; padding:10px 0; background:#444;">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n" class="main-btn" style="font-size:0.7rem; padding:10px 0; background:#444;">NEWS</button>
                <button onclick="setTab('i')" id="mt-i" class="main-btn" style="font-size:0.7rem; padding:10px 0; background:#444;">PLIK</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-i" class="adm-tab" style="display:none;"><input type="file" id="import-file" onchange="handleImport(this)"></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <div class="group-label">Edycja Linii</div>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-h-work" placeholder="Robocze (np. 05:10, 05:40)"></textarea>
    <textarea id="fl-h-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-h-sun" placeholder="Niedziele"></textarea>
    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px;">
        <label style="font-size:0.7rem; color:var(--accent); font-weight:800;">WKLEJ LISTĘ PRZYSTANKÓW</label>
        <textarea id="fl-quick-import" style="height:80px; margin-top:10px;"></textarea>
        <button onclick="convertQuickStops()" class="main-btn" style="background:var(--info); padding:10px;">Konwertuj tekst</button>
    </div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj pojedynczo</button>
    <button onclick="saveLine()" class="main-btn">ZAPISZ WSZYSTKO</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mzk-by-facio",
        storageBucket: "mzk-by-facio.firebasestorage.app",
        messagingSenderId: "676970411647",
        appId: "1:676970411647:web:5703d5fb5fb499ff83714a",
        measurementId: "G-EZ1WKZXX6K"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], stopDetails: {}, news: [], lineCategories: ["Tramwaje", "Autobusy", "Nocne"], contact: "" };
    let currentLineIndex = -1, currentDay = 'working', focusedStopIdx = -1, allAutoStops = [];

    function cleanKey(n) { return n ? n.trim().replace(/[.#$[\]]/g, "") : "unknown"; }

    function init() {
        dbRef.on('value', (s) => {
            const data = s.val();
            if(data) {
                db = data;
                if(!db.lines) db.lines = [];
                extractStops();
                render();
            }
        });
    }

    function extractStops() { 
        let sSet = new Set(); 
        db.lines.forEach(l => { if(l.stops) l.stops.forEach(s => sSet.add(s.name)); });
        allAutoStops = [...sSet].sort();
    }

    function render() {
        const home = document.getElementById('s-home'); home.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length) {
                home.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    grid.innerHTML += `<div class="line-square ${lines.find(x=>x.num===num).type}" onclick="openVariants('${num}')">${num}</div>`;
                });
                home.appendChild(grid);
            }
        });
        filterStops();
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> -> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
    }

    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list');
        if(!list) return;
        list.innerHTML = allAutoStops.filter(s => s.toLowerCase().includes(q)).map(s => `
            <div class="app-card" onclick="openStopDetails('${s.replace(/'/g, "\\'")}')">
                <b>${s}</b><i class="fa-solid fa-chevron-right" style="color:var(--accent)"></i>
            </div>`).join('');
    }

    function openStopDetails(stopName) {
        const det = db.stopDetails[cleanKey(stopName)] || {nearby:""};
        document.getElementById('std-name').innerText = stopName;
        document.getElementById('std-nearby').innerText = det.nearby || "";
        document.getElementById('std-lines').innerHTML = getOtherLines(stopName, "");
        show('stop-details');
    }

    function getOtherLines(stopName, currentNum) {
        let lines = [];
        db.lines.forEach(l => { if(String(l.num) !== String(currentNum) && l.stops?.some(st => st.name === stopName)) { if(!lines.some(x => x.num === l.num)) lines.push({num: l.num, type: l.type}); } });
        return lines.map(ln => `<span class="stop-line-badge" onclick="event.stopPropagation(); openVariants('${ln.num}')"><i class="fa-solid fa-${ln.type==='tram'?'tram':'bus'}"></i> ${ln.num}</span>`).join('');
    }

    // NAPRAWIONY ROZKŁAD - WYGLĄD JAK PRAWDZIWA TABLICZKA MZK
    function renderTimetable(lineIdx, stopIdx = -1) {
        currentLineIndex = lineIdx; focusedStopIdx = stopIdx; show('tt'); 
        const line = db.lines[lineIdx];
        const ttBody = document.getElementById('tt-body');
        
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num} | Warianty</div>`;
        document.getElementById('tt-day-sel').style.display = stopIdx === -1 ? 'none' : 'flex';
        
        if (stopIdx === -1) {
            ttBody.innerHTML = line.stops.map((s, i) => `
                <div class="app-card" onclick="renderTimetable(${lineIdx}, ${i})">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="width:24px; height:24px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:800;">${i+1}</span>
                        <b>${s.name}</b>${s.nz?' (NŻ)':''}
                    </div>
                    <i class="fa-solid fa-chevron-right" style="color:var(--text-sec)"></i>
                </div>`).join('');
        } else {
            let offset = 0;
            for(let i=0; i<=stopIdx; i++) offset += parseInt(line.stops[i].time);
            
            const hoursMap = {};
            let raw = (currentDay==='working' ? (line.hoursWorking || line.hours) : currentDay==='saturday'?line.hoursSat:line.hoursSun) || "";
            
            let html = `
                <div class="timetable-container">
                    <div class="tt-header-box">
                        <span class="tt-stop-name">${line.stops[stopIdx].name}</span>
                        <span class="tt-direction">Kierunek: ${line.dir}</span>
                    </div>`;

            if(!raw) {
                html += '<div style="padding:40px; text-align:center; color:#888;">Brak kursów w tym dniu</div>';
            } else {
                raw.split(',').forEach(h => {
                    let p = h.trim().split(':'); if(p.length < 2) return;
                    let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
                    let hr = d.getHours().toString().padStart(2, '0');
                    let mn = d.getMinutes().toString().padStart(2, '0');
                    if(!hoursMap[hr]) hoursMap[hr] = [];
                    hoursMap[hr].push(mn);
                });

                Object.keys(hoursMap).sort().forEach(hr => {
                    html += `
                    <div class="tt-row">
                        <div class="tt-hour-col">${hr}</div>
                        <div class="tt-min-col">
                            ${hoursMap[hr].sort().map(m => `<span class="tt-min-val">${m}</span>`).join('')}
                        </div>
                    </div>`;
                });
            }
            html += `</div>`;
            ttBody.innerHTML = html;
        }
        document.getElementById('tt-back-btn').onclick = () => stopIdx === -1 ? show('vars') : renderTimetable(lineIdx, -1);
    }

    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); 
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        let navId = (id === 'vars' || id === 'tt' || id === 'stop-details') ? 'home' : (id === 'news-details' ? 'news' : id);
        if(document.getElementById('n-'+navId)) document.getElementById('n-'+navId).classList.add('active');
        window.scrollTo(0,0);
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num} - Kierunki</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, i) => { if(String(l.num) === String(num)) list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>${l.dir}</b><i class="fa-solid fa-chevron-right"></i></div>`; });
    }

    function setDay(d) { currentDay = d; document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+d).classList.add('active'); renderTimetable(currentLineIndex, focusedStopIdx); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.getElementById('form-line').style.display = 'none'; }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }

    function openLineForm(idx) {
        currentLineIndex = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", category: "Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir; document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-h-work').value = l.hoursWorking || l.hours || "";
        document.getElementById('fl-h-sat').value = l.hoursSat || ""; document.getElementById('fl-h-sun').value = l.hoursSun || "";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(name = "", time = 2, nz = false) {
        const div = document.createElement('div'); div.className = 'stop-edit-row'; div.style = "display: flex; gap: 5px; margin-bottom: 5px; align-items: center;";
        div.innerHTML = `<input type="text" value="${name}" class="edit-stop-name" style="flex:1; margin-bottom:0;"><input type="number" value="${time}" class="edit-stop-time" style="width:60px; margin-bottom:0;"><label><input type="checkbox" ${nz?'checked':''}> NŻ</label><button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger);"><i class="fa-solid fa-trash"></i></button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function convertQuickStops() {
        const text = document.getElementById('fl-quick-import').value;
        if(!text.trim()) return;
        text.split('\n').forEach(r => { if(r.trim()) { let p = r.split(','); addStopRow(p[0].trim(), p[1] ? parseInt(p[1]) : 2, p[2] ? p[2].includes('nż') : false); }});
        document.getElementById('fl-quick-import').value = '';
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.stop-edit-row')).map(row => ({ name: row.querySelector('.edit-stop-name').value.trim(), time: parseInt(row.querySelector('.edit-stop-time').value) || 0, nz: row.querySelector('input[type="checkbox"]').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops };
        if(currentLineIndex === -1) db.lines.push(data); else db.lines[currentLineIndex] = data;
        dbRef.update({ lines: db.lines }).then(() => { alert("Zapisano!"); closeForms(); });
    }

    init();
</script>
</body>
</html>
