<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); padding-bottom: 90px; color: var(--dark); }
        header { background: var(--mzk); color: white; padding: 18px; text-align: center; border-bottom: 4px solid var(--yellow); position: sticky; top: 0; z-index: 1000; font-weight: 900; text-transform: uppercase; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* KAFELKI I ROZKŁADY */
        .cat-title { border-left: 5px solid var(--mzk); padding: 5px 12px; margin: 20px 0 10px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .cat-tram { border-color: var(--red); }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .line-card { background: white; border-radius: 15px; padding: 25px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border-bottom: 4px solid #eee; }
        .line-card .num { font-size: 2.2rem; font-weight: 900; color: var(--mzk); }
        .line-card.tram .num { color: var(--red); }

        .tt-header { background: var(--mzk); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .tt-header.tram { background: var(--red); }
        .hour-pill { background: #f0f0f0; padding: 6px 10px; border-radius: 6px; font-weight: 800; display: inline-block; margin: 3px; border: 1px solid #ddd; }
        .stop-row { background: white; padding: 12px; margin-bottom: 5px; border-radius: 8px; border-left: 4px solid #ddd; }
        .stop-desc { display: block; font-size: 0.7rem; color: var(--mzk); font-weight: 600; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; cursor: pointer; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        nav div.active { color: var(--mzk); }
        nav i { font-size: 1.3rem; margin-bottom: 3px; }

        /* ADMIN - NOWY PODZIAŁ */
        .adm-btn { background: var(--dark); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; font-size: 0.9rem; }
        
        details { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        summary { padding: 15px; font-weight: 800; cursor: pointer; background: #eee; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: '▼'; font-size: 0.7rem; }
        details[open] summary::after { content: '▲'; }

        .admin-list-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .admin-list-item:last-child { border-bottom: none; }
        .btn-edit-sm { background: var(--yellow); border: none; padding: 5px 10px; border-radius: 5px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }
        .btn-del-sm { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-weight: 800; font-size: 0.7rem; cursor: pointer; margin-left: 5px; }

        .form-box { padding: 15px; background: #fff; border-radius: 10px; border: 2px solid var(--mzk); margin-bottom: 20px; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"><div id="lines-render"></div></div>
    <div id="s-vars" class="section">
        <button onclick="show('home')" style="border:none;background:none;font-weight:900;color:var(--red);padding:10px 0;">← POWRÓT</button>
        <h2 id="vars-title" style="margin-bottom:15px; font-weight:900;">KIERUNKI</h2>
        <div id="vars-render"></div>
    </div>
    <div id="s-tt" class="section">
        <button id="btn-back-vars" style="border:none;background:none;font-weight:900;color:var(--red);padding:10px 0;">← POWRÓT</button>
        <div id="tt-render"></div>
    </div>
    <div id="s-info" class="section"><h2 style="font-weight:900;margin-bottom:15px;">KOMUNIKATY</h2><div id="info-render"></div></div>
    <div id="s-map" class="section"><iframe id="map-frame" style="width:100%;height:450px;border-radius:15px;border:none;background:#eee;"></iframe></div>

    <div id="s-adm" class="section">
        <div id="adm-auth">
            <input type="password" id="adm-pass" placeholder="Hasło (123)" style="text-align:center;">
            <button onclick="login()" class="adm-btn">ZALOGUJ</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <div style="display:flex; gap:3px; margin-bottom:15px;">
                <button onclick="tab('l')" class="adm-btn" style="flex:1; font-size:0.6rem;">LINIE</button>
                <button onclick="tab('p')" class="adm-btn" style="flex:1; font-size:0.6rem;">PRZYSTANKI</button>
                <button onclick="tab('i')" class="adm-btn" style="flex:1; font-size:0.6rem;">INFO</button>
                <button onclick="tab('d')" class="adm-btn" style="flex:1; font-size:0.6rem; background:var(--mzk);">DANE</button>
            </div>
            
            <div id="t-l">
                <div class="form-box">
                    <h3 style="margin-bottom:10px;">+ DODAJ NOWĄ LINIĘ</h3>
                    <input type="text" id="l-num" placeholder="Numer">
                    <input type="text" id="l-dir" placeholder="Kierunek">
                    <select id="l-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                    <textarea id="l-hours" placeholder="Godziny (po przecinku)"></textarea>
                    <textarea id="l-stops" placeholder="Przystanki (każdy w nowej linii)"></textarea>
                    <button onclick="saveL(-1)" class="adm-btn" style="margin-top:10px;">ZAPISZ NOWĄ LINIĘ</button>
                </div>
                <details>
                    <summary>EDYTUJ ISTNIEJĄCE LINIE</summary>
                    <div id="adm-l-list"></div>
                </details>
            </div>

            <div id="t-p" style="display:none;">
                <div class="form-box">
                    <h3 style="margin-bottom:10px;">+ DODAJ OPIS PRZYSTANKU</h3>
                    <input type="text" id="p-name" placeholder="Nazwa przystanku">
                    <textarea id="p-desc" placeholder="Opis (np. przesiadki)"></textarea>
                    <button onclick="saveP(-1)" class="adm-btn" style="margin-top:10px;">DODAJ OPIS</button>
                </div>
                <details>
                    <summary>EDYTUJ OPISY PRZYSTANKÓW</summary>
                    <div id="adm-p-list"></div>
                </details>
            </div>

            <div id="t-i" style="display:none;">
                <input type="text" id="i-title" placeholder="Tytuł">
                <textarea id="i-body" placeholder="Treść"></textarea>
                <button onclick="saveI()" class="adm-btn">DODAJ KOMUNIKAT</button>
                <div id="adm-i-list"></div>
            </div>

            <div id="t-d" style="display:none;">
                <button onclick="exportDB()" class="adm-btn">EKSPORTUJ BAZĘ (.TXT)</button>
                <input type="file" id="importFile" style="display:none" onchange="importDB(event)">
                <button onclick="document.getElementById('importFile').click()" class="adm-btn" style="background:var(--red)">IMPORTUJ BAZĘ</button>
                <hr style="margin:15px 0;">
                <input type="text" id="map-url-inp" placeholder="Link iframe src mapy">
                <button onclick="saveMap()" class="adm-btn">ZAPISZ MAPĘ</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-bullhorn"></i><span>Info</span></div>
    <div onclick="show('map')" id="n-map"><i class="fa-solid fa-map"></i><span>Mapa</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<div id="m-edit" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h2 id="m-edit-title" style="margin-bottom:15px;">EDYTUJ</h2>
    <div id="m-edit-fields"></div>
    <div id="m-edit-actions"></div>
    <button onclick="closeM()" style="color:red;border:none;background:none;width:100%;font-weight:900;margin-top:20px;">ANULUJ</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('MZK_GORZOW_DATA')) || { lines: [], stops: [], news: [], map: "" };

    function sync() { localStorage.setItem('MZK_GORZOW_DATA', JSON.stringify(db)); render(); }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(id==='map') document.getElementById('map-frame').src = db.map;
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
    }

    function render() {
        // HOME
        const lr = document.getElementById('lines-render'); lr.innerHTML = '';
        ['tram', 'bus'].forEach(t => {
            const filt = db.lines.filter(l => l.type === t);
            if(filt.length > 0) {
                const unique = [...new Set(filt.map(l => l.num))].sort((a,b)=>a-b);
                lr.innerHTML += `<div class="cat-title ${t==='tram'?'cat-tram':''}"><i class="fa-solid fa-${t==='tram'?'train-tram':'bus'}"></i> ${t==='tram'?'Tramwaje':'Autobusy'}</div>`;
                let grid = `<div class="line-grid">`;
                unique.forEach(n => { grid += `<div class="line-card ${t}" onclick="openV('${n}')"><span class="num">${n}</span></div>`; });
                lr.innerHTML += grid + `</div>`;
            }
        });

        // ADMIN LISTY (W ROZWIJANYCH SEKCJACH)
        const al = document.getElementById('adm-l-list'); al.innerHTML = '';
        db.lines.forEach((l,i) => {
            al.innerHTML += `<div class="admin-list-item"><span><b>${l.num}</b> ${l.dir}</span><div><button class="btn-edit-sm" onclick="editLineModal(${i})">EDYTUJ</button><button class="btn-del-sm" onclick="del('lines',${i})">X</button></div></div>`;
        });

        const ap = document.getElementById('adm-p-list'); ap.innerHTML = '';
        db.stops.forEach((p,i) => {
            ap.innerHTML += `<div class="admin-list-item"><span><b>${p.name}</b></span><div><button class="btn-edit-sm" onclick="editStopModal(${i})">EDYTUJ</button><button class="btn-del-sm" onclick="del('stops',${i})">X</button></div></div>`;
        });

        const ail = document.getElementById('adm-i-list'); ail.innerHTML = '';
        db.news.forEach((n,i) => { ail.innerHTML += `<div class="admin-list-item"><span>${n.title}</span><button class="btn-del-sm" onclick="del('news',${i})">USUŃ</button></div>`; });

        // INFO USER
        const ir = document.getElementById('info-render'); ir.innerHTML = '';
        db.news.forEach(n => { ir.innerHTML += `<div style="background:white;padding:15px;border-radius:10px;margin-bottom:10px;border-left:5px solid var(--yellow);"><h3>${n.title}</h3><p>${n.body}</p></div>`; });
    }

    // MODALE EDYCJI
    function editLineModal(idx) {
        const l = db.lines[idx];
        document.getElementById('m-edit-title').innerText = "EDYTUJ LINIĘ " + l.num;
        document.getElementById('m-edit-fields').innerHTML = `
            <input type="text" id="me-num" value="${l.num}">
            <input type="text" id="me-dir" value="${l.dir}">
            <select id="me-type"><option value="bus" ${l.type==='bus'?'selected':''}>Autobus</option><option value="tram" ${l.type==='tram'?'selected':''}>Tramwaj</option></select>
            <textarea id="me-hours" style="height:80px">${l.hours}</textarea>
            <textarea id="me-stops" style="height:150px">${l.stops}</textarea>
        `;
        document.getElementById('m-edit-actions').innerHTML = `<button onclick="saveEditL(${idx})" class="adm-btn">ZAPISZ ZMIANY</button>`;
        document.getElementById('m-edit').style.display = 'block';
    }

    function editStopModal(idx) {
        const p = db.stops[idx];
        document.getElementById('m-edit-title').innerText = "EDYTUJ PRZYSTANEK";
        document.getElementById('m-edit-fields').innerHTML = `
            <input type="text" id="me-pname" value="${p.name}">
            <textarea id="me-pdesc" style="height:100px">${p.desc}</textarea>
        `;
        document.getElementById('m-edit-actions').innerHTML = `<button onclick="saveEditP(${idx})" class="adm-btn">ZAPISZ ZMIANY</button>`;
        document.getElementById('m-edit').style.display = 'block';
    }

    function closeM() { document.getElementById('m-edit').style.display = 'none'; }

    // SAVERS
    function saveL(idx) {
        const data = { num: document.getElementById('l-num').value, dir: document.getElementById('l-dir').value, type: document.getElementById('l-type').value, hours: document.getElementById('l-hours').value, stops: document.getElementById('l-stops').value };
        db.lines.push(data); sync(); 
        document.querySelectorAll('#t-l input, #t-l textarea').forEach(i => i.value='');
    }
    function saveEditL(idx) {
        db.lines[idx] = { num: document.getElementById('me-num').value, dir: document.getElementById('me-dir').value, type: document.getElementById('me-type').value, hours: document.getElementById('me-hours').value, stops: document.getElementById('me-stops').value };
        sync(); closeM();
    }
    function saveP(idx) {
        db.stops.push({ name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value }); sync();
        document.querySelectorAll('#t-p input, #t-p textarea').forEach(i => i.value='');
    }
    function saveEditP(idx) {
        db.stops[idx] = { name: document.getElementById('me-pname').value, desc: document.getElementById('me-pdesc').value };
        sync(); closeM();
    }
    function saveI() { db.news.unshift({ title: document.getElementById('i-title').value, body: document.getElementById('i-body').value }); sync(); document.getElementById('i-title').value=''; document.getElementById('i-body').value=''; }
    function saveMap() { db.map = document.getElementById('map-url-inp').value; sync(); alert("Zapisano!"); }
    function del(cat, i) { if(confirm("Usunąć?")) { db[cat].splice(i, 1); sync(); } }

    // USER FLOW
    function openV(num) {
        show('vars'); document.getElementById('vars-title').innerText = "LINIA " + num;
        const vr = document.getElementById('vars-render'); vr.innerHTML = '';
        db.lines.filter(l => l.num === num).forEach(v => {
            vr.innerHTML += `<div class="variant-item ${v.type==='tram'?'tram':''}" onclick="openT(${db.lines.indexOf(v)})"><div><p style="font-size:0.6rem;font-weight:800;">KIERUNEK</p><b>${v.dir}</b></div><i class="fa-solid fa-chevron-right"></i></div>`;
        });
    }
    function openT(idx) {
        show('tt'); const l = db.lines[idx];
        document.getElementById('btn-back-vars').onclick = () => openV(l.num);
        let h = `<div class="tt-header ${l.type==='tram'?'tram':''}"><h1>${l.num}</h1><p>${l.dir}</p></div><div style="background:white;padding:15px;border-radius:10px;margin-bottom:15px;text-align:center;">`;
        l.hours.split(',').forEach(hr => { h += `<span class="hour-pill">${hr.trim()}</span>`; });
        h += `</div><h3 style="margin-bottom:10px;font-weight:900;">PRZYSTANKI:</h3>`;
        l.stops.split('\n').filter(s=>s.trim()).forEach(s => { 
            const sData = db.stops.find(p => p.name.trim().toLowerCase() === s.trim().toLowerCase());
            h += `<div class="stop-row"><b>${s.trim()}</b>${sData ? `<span class="stop-desc">${sData.desc}</span>` : ''}</div>`; 
        });
        document.getElementById('tt-render').innerHTML = h;
    }

    function exportDB() {
        const blob = new Blob([JSON.stringify(db)], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mzk_gorzow.txt'; a.click();
    }
    function importDB(e) {
        const reader = new FileReader();
        reader.onload = function() { try { db = JSON.parse(reader.result); sync(); alert("Gotowe!"); } catch(err) { alert("Błąd!"); } };
        reader.readAsText(e.target.files[0]);
    }
    function login() { if(document.getElementById('adm-pass').value==='123') { document.getElementById('adm-auth').style.display='none'; document.getElementById('adm-panel').style.display='block'; } }
    function tab(id) { ['l','p','i','d'].forEach(t => document.getElementById('t-'+t).style.display = (t===id?'block':'none')); }

    render();
</script>
</body>
</html>
