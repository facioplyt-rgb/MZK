<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW by Facio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 90px; }
        
        header { background: var(--mzk); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--yellow); position: sticky; top: 0; z-index: 1000; }
        header h1 { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; }
        header span { display: block; font-size: 0.6rem; opacity: 0.8; font-weight: 400; margin-top: 4px; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        .section { display: none; animation: fadeIn 0.2s ease; }
        .active-sec { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* SKALOWANIE KAFELKÓW */
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .line-card { 
            background: white; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; 
            border-bottom: 4px solid #ddd; height: 115px; display: flex; flex-direction: column; justify-content: center;
            overflow: hidden; /* Żeby nic nie wystawało */
        }
        .line-card b { font-size: 1.7rem; color: var(--mzk); display: block; }
        .line-card small { 
            font-size: 0.65rem; color: #444; font-weight: 700; margin-top: 5px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; line-height: 1.2; text-overflow: ellipsis;
        }
        .tram-card b { color: var(--red); }

        /* RESZTA STYLÓW */
        .type-title { border-left: 5px solid var(--mzk); padding-left: 10px; margin: 20px 0 10px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .stop-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--mzk); }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; cursor: pointer; }
        nav div.active { color: var(--mzk); }
        nav span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        
        .btn-adm { background: #121212; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: 900; margin-bottom: 15px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 10px; border: 1px solid #ccc; font-family: inherit; }
    </style>
</head>
<body>

<header><h1>MZK GORZÓW</h1><span>by Facio</span></header>

<div class="container">
    <div id="s-lines" class="section active-sec">
        <div class="type-title"><i class="fa-solid fa-bus"></i> AUTOBUSY</div>
        <div id="list-buses" class="line-grid"></div>
        <div class="type-title" style="border-color:var(--red)"><i class="fa-solid fa-train-tram"></i> TRAMWAJE</div>
        <div id="list-trams" class="line-grid"></div>
    </div>

    <div id="s-info" class="section">
        <h2 style="font-weight:900; margin-bottom:15px;">KOMUNIKATY</h2>
        <div id="info-display"></div>
    </div>

    <div id="s-route" class="section">
        <button onclick="show('lines')" style="border:none; background:none; color:var(--red); font-weight:900; cursor:pointer; padding:10px 0;">← POWRÓT</button>
        <div id="route-display"></div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login">
            <input type="password" id="adm-pass" placeholder="Hasło panelu">
            <button onclick="login()" class="btn-adm" style="background:var(--mzk)">ZALOGUJ</button>
        </div>
        <div id="adm-dash" style="display:none;">
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button onclick="setAdm('l')" id="b-l" style="flex:1; padding:10px; font-weight:800;">LINIE</button>
                <button onclick="setAdm('p')" id="b-p" style="flex:1; padding:10px; font-weight:800;">PRZYSTANKI</button>
                <button onclick="setAdm('i')" id="b-i" style="flex:1; padding:10px; font-weight:800;">INFO</button>
            </div>
            <div id="ad-l">
                <button onclick="openCreator()" class="btn-adm">+ DODAJ LINIĘ / WARIANT</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="ad-p" style="display:none;">
                <button onclick="addStopManual()" class="btn-adm" style="background:#444">+ DODAJ PRZYSTANEK</button>
                <div id="adm-stops-list"></div>
            </div>
            <div id="ad-i" style="display:none;">
                <button onclick="addInfo()" class="btn-adm" style="background:#444">+ NOWY KOMUNIKAT</button>
                <div id="adm-info-list"></div>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('lines')" id="n-lines" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-circle-info"></i><span>Info</span></div>
    <div onclick="goMap()"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-user-gear"></i><span>Panel</span></div>
</nav>

<div id="m-creator" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; display:none; padding:20px; overflow-y:auto;">
    <h2 style="font-weight:900">Nowy Wariant</h2>
    <input type="text" id="c-num" placeholder="Nr (np. 124)">
    <input type="text" id="c-dir" placeholder="Kierunek (np. Panorama)">
    <select id="c-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="c-stops" style="height:150px;" placeholder="Wpisz przystanki (jeden pod drugim)"></textarea>
    <button onclick="saveLine()" class="btn-adm" style="background:var(--mzk)">ZAPISZ</button>
    <button onclick="document.getElementById('m-creator').style.display='none'" style="width:100%; border:none; background:none;">ANULUJ</button>
</div>

<script>
    // KLUCZ, KTÓREGO NIE ZMIENIAJ PRZY AKTUALIZACJI KODU:
    const KEY = 'STALA_BAZA_MZK_GORZOW';
    
    let db = JSON.parse(localStorage.getItem(KEY)) || { lines: [], stops: {}, info: [], map: "" };

    function save() { 
        localStorage.setItem(KEY, JSON.stringify(db)); 
        render(); 
    }

    function render() {
        const b = document.getElementById('list-buses'), t = document.getElementById('list-trams');
        b.innerHTML = ''; t.innerHTML = '';
        db.lines.forEach((l, i) => {
            const h = `<div class="line-card ${l.type==='tram'?'tram-card':''}" onclick="viewRoute(${i})"><b>${l.num}</b><small>${l.dir}</small></div>`;
            if(l.type === 'tram') t.innerHTML += h; else b.innerHTML += h;
        });
        
        const idisp = document.getElementById('info-display'); idisp.innerHTML = '';
        db.info.forEach(m => { idisp.innerHTML += `<div style="background:white; padding:15px; border-radius:10px; margin-bottom:10px; border-left:5px solid var(--yellow); font-weight:700;">${m}</div>`; });
    }

    function viewRoute(idx) {
        show('route');
        const l = db.lines[idx];
        const d = document.getElementById('route-display');
        d.innerHTML = `<h2 style="font-weight:900;">${l.num} ➔ ${l.dir}</h2><br>`;
        l.stops.forEach(s => {
            const g = db.stops[s] || { nz: false, poi: "" };
            d.innerHTML += `<div class="stop-item"><b>${s}</b> ${g.nz ? '<span style="color:red; font-size:0.7rem;">[NŻ]</span>':''}</div>`;
        });
    }

    function saveLine() {
        const num = document.getElementById('c-num').value, dir = document.getElementById('c-dir').value, type = document.getElementById('c-type').value;
        const sRaw = document.getElementById('c-stops').value.split('\n').filter(x => x.trim() !== "");
        sRaw.forEach(s => { if(!db.stops[s.trim()]) db.stops[s.trim()] = { nz: false, poi: "" }; });
        db.lines.push({ num, dir, type, stops: sRaw.map(x => x.trim()) });
        save(); document.getElementById('m-creator').style.display='none';
    }

    function login() { if(document.getElementById('adm-pass').value === '123') { document.getElementById('adm-login').style.display='none'; document.getElementById('adm-dash').style.display='block'; renderAdm(); } }
    
    function setAdm(s) { 
        ['l','p','i'].forEach(x => document.getElementById('ad-'+x).style.display = x===s?'block':'none');
        renderAdm();
    }

    function renderAdm() {
        const ll = document.getElementById('adm-lines-list'); ll.innerHTML = '';
        db.lines.forEach((l, i) => { ll.innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between;"><span>${l.num} - ${l.dir}</span><button onclick="db.lines.splice(${i},1);save();renderAdm();" style="color:red; border:none; background:none;">USUŃ</button></div>`; });
        
        const sl = document.getElementById('adm-stops-list'); sl.innerHTML = '';
        Object.keys(db.stops).sort().forEach(name => {
            sl.innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between;"><span>${name}</span><button onclick="toggleNz('${name}')">${db.stops[name].nz?'NŻ TAK':'STAŁY'}</button></div>`;
        });
    }

    function toggleNz(n) { db.stops[n].nz = !db.stops[n].nz; save(); renderAdm(); }
    function addInfo() { const t = prompt("Treść:"); if(t) { db.info.push(t); save(); renderAdm(); } }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); }
    function openCreator() { document.getElementById('m-creator').style.display='block'; }
    function goMap() { alert("Skonfiguruj link w Panelu Admina"); }

    render();
</script>
</body>
</html>
