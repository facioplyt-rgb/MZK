<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM V15</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); padding-bottom: 90px; color: var(--dark); }
        header { background: var(--mzk); color: white; padding: 18px; text-align: center; border-bottom: 4px solid var(--yellow); position: sticky; top: 0; z-index: 1000; font-weight: 900; text-transform: uppercase; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; }

        /* WIDOK LINII */
        .line-item { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 6px solid var(--mzk); box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 800; }
        .line-item.tram { border-left-color: var(--red); }

        /* ROZKŁAD */
        .tt-header { background: var(--mzk); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .stop-row { background: white; padding: 15px; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid #ddd; cursor: pointer; }
        .stop-info-box { background: #fffde7; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 4px solid var(--yellow); font-size: 0.85rem; color: #444; font-weight: 600; }
        .hours-box { background: var(--dark); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; }
        .hour-pill { background: rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 5px; display: inline-block; margin: 3px; font-weight: 800; font-size: 1.1rem; }

        /* DOLNE MENU */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; cursor: pointer; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        nav div.active { color: var(--mzk); }
        nav i { font-size: 1.3rem; margin-bottom: 3px; }

        /* ADMIN */
        .adm-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px; }
        .t-btn { flex: 1; min-width: 70px; background: #444; color: white; border: none; padding: 10px 2px; border-radius: 5px; font-size: 0.6rem; font-weight: 800; cursor: pointer; }
        .t-btn.active { background: var(--mzk); }
        .adm-btn { background: var(--dark); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        .admin-item { background: white; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .stop-edit-item { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"><div id="lines-render"></div></div>
    <div id="s-vars" class="section"><div id="vars-render"></div></div>
    <div id="s-tt" class="section"><div id="tt-header-render"></div><div id="tt-stops-render"></div></div>
    <div id="s-map" class="section"><iframe id="map-frame" style="width:100%;height:70vh;border:none;border-radius:15px;background:#eee;"></iframe></div>
    <div id="s-info" class="section"><h2 style="text-align:center;margin-bottom:20px;">KOMUNIKATY</h2><div id="user-info-render"></div></div>

    <div id="s-adm" class="section">
        <div id="adm-auth">
            <input type="password" id="adm-pass" placeholder="Hasło (123)" style="text-align:center;">
            <button onclick="login()" class="adm-btn">ZALOGUJ</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <div class="adm-tabs">
                <button onclick="tab('l')" id="tb-l" class="t-btn active">LINIE</button>
                <button onclick="tab('p')" id="tb-p" class="t-btn">PRZYSTANKI</button>
                <button onclick="tab('i')" id="tb-i" class="t-btn">INFORMACJE</button>
                <button onclick="tab('m')" id="tb-m" class="t-btn">MAPA</button>
                <button onclick="tab('b')" id="tb-b" class="t-btn">BAZA</button>
            </div>
            <div id="t-l" class="tab-cont">
                <button onclick="openLineEditor(-1)" class="adm-btn" style="background:#444">+ NOWA LINIA</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="t-p" class="tab-cont" style="display:none;">
                <input type="text" id="new-stop-name" placeholder="Nazwa przystanku">
                <button onclick="addNewStopName()" class="adm-btn">DODAJ PRZYSTANEK</button>
                <div id="adm-stops-names-list"></div>
            </div>
            <div id="t-i" class="tab-cont" style="display:none;">
                <button onclick="openInfoEditor(-1)" class="adm-btn" style="background:#444">+ DODAJ INFO</button>
                <div id="adm-info-list"></div>
            </div>
            <div id="t-m" class="tab-cont" style="display:none;">
                <input type="text" id="map-url-inp" placeholder="Link iframe Google Maps">
                <button onclick="saveMap()" class="adm-btn">ZAPISZ MAPĘ</button>
            </div>
            <div id="t-b" class="tab-cont" style="display:none;">
                <button onclick="exportDB()" class="adm-btn">EKSPORT (.TXT)</button>
                <input type="file" id="importFile" style="display:none" onchange="importDB(event)">
                <button onclick="document.getElementById('importFile').click()" class="adm-btn" style="background:var(--red)">IMPORT (.TXT)</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('map')" id="n-map"><i class="fa-solid fa-map"></i><span>Mapa</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-circle-info"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<div id="m-line-editor" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h3>EDYCJA LINII</h3>
    <input type="text" id="le-num" placeholder="Numer">
    <input type="text" id="le-dir" placeholder="Kierunek">
    <select id="le-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="le-hours" placeholder="Odjazdy (08:00, 08:30)"></textarea>
    <div id="le-stops-container"></div>
    <button onclick="addStopRow()" class="adm-btn" style="background:#666">+ DODAJ PRZYSTANEK</button>
    <button onclick="saveLine()" class="adm-btn" style="background:var(--mzk)">ZAPISZ</button>
    <button onclick="closeModal()" class="adm-btn" style="background:red">ANULUJ</button>
</div>

<div id="m-info-editor" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;">
    <h3>EDYCJA INFORMACJI</h3>
    <input type="text" id="ie-name" placeholder="Nazwa przystanku (lub 'OGÓLNE')">
    <textarea id="ie-desc" placeholder="Treść komunikatu" style="height:150px;"></textarea>
    <button onclick="saveInfo()" class="adm-btn">ZAPISZ</button>
    <button onclick="closeModal()" class="adm-btn" style="background:red">ANULUJ</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('MZK_V15')) || { lines: [], stops: [], infos: [], map: "" };
    let tempRoute = [];
    let curEditIdx = -1;

    function sync() { localStorage.setItem('MZK_V15', JSON.stringify(db)); render(); }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id).classList.add('active');
        if(id==='map') document.getElementById('map-frame').src = db.map;
        if(id==='info') renderUserInfo();
    }

    function tab(id) {
        document.querySelectorAll('.tab-cont').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-'+id).style.display = 'block';
        document.getElementById('tb-'+id).classList.add('active');
    }

    function render() {
        const lr = document.getElementById('lines-render'); lr.innerHTML = '';
        const unique = [...new Set(db.lines.map(l => l.num))].sort((a,b)=>a-b);
        unique.forEach(n => {
            const l = db.lines.find(lx => lx.num === n);
            lr.innerHTML += `<div class="line-item ${l.type==='tram'?'tram':''}" onclick="openVars('${n}')">LINIA ${n} <i class="fa-solid fa-chevron-right"></i></div>`;
        });

        const al = document.getElementById('adm-lines-list'); al.innerHTML = '';
        db.lines.forEach((l, i) => {
            al.innerHTML += `<div class="admin-item" onclick="openLineEditor(${i})">${l.num} -> ${l.dir} <button onclick="event.stopPropagation(); deleteLine(${i})" style="color:red;border:none;background:none;">X</button></div>`;
        });

        const ap = document.getElementById('adm-stops-names-list'); ap.innerHTML = '';
        db.stops.forEach((s, i) => {
            ap.innerHTML += `<div class="admin-item">${s} <button onclick="deleteStopName(${i})" style="color:red;border:none;background:none;">X</button></div>`;
        });

        const ai = document.getElementById('adm-info-list'); ai.innerHTML = '';
        db.infos.forEach((inf, i) => {
            ai.innerHTML += `<div class="admin-item" onclick="openInfoEditor(${i})">${inf.name} <button onclick="event.stopPropagation(); deleteInfo(${i})" style="color:red;border:none;background:none;">X</button></div>`;
        });
    }

    function renderUserInfo() {
        const ur = document.getElementById('user-info-render'); ur.innerHTML = '';
        db.infos.filter(i => i.name.toUpperCase() === 'OGÓLNE').forEach(i => {
            ur.innerHTML += `<div class="stop-info-box" style="margin-bottom:10px; font-size:1rem;">${i.desc}</div>`;
        });
    }

    function openVars(num) {
        show('vars');
        const vr = document.getElementById('vars-render');
        vr.innerHTML = `<button onclick="show('home')" style="border:none;background:none;font-weight:900;color:var(--red);padding:10px 0;">← POWRÓT</button><h3>LINIA ${num}</h3>`;
        db.lines.filter(l => l.num === num).forEach(l => {
            vr.innerHTML += `<div class="line-item" onclick="renderTT(${db.lines.indexOf(l)})">${l.dir}</div>`;
        });
    }

    function renderTT(idx) {
        show('tt');
        const l = db.lines[idx];
        document.getElementById('tt-header-render').innerHTML = `<button onclick="openVars('${l.num}')" style="border:none;background:none;font-weight:900;color:var(--red);padding:10px 0;">← POWRÓT</button><div class="tt-header ${l.type==='tram'?'tram':''}" style="${l.type==='tram'?'background:var(--red)':''}"><h1>${l.num}</h1><p>${l.dir}</p></div>`;
        const container = document.getElementById('tt-stops-render'); container.innerHTML = '';
        let cumm = 0;
        l.route.forEach((s, si) => {
            cumm += s.time;
            const info = db.infos.find(i => i.name.toLowerCase().trim() === s.name.toLowerCase().trim());
            const row = document.createElement('div');
            row.className = 'stop-row';
            row.innerHTML = `<span style="float:right;font-weight:900;color:var(--mzk)">+${cumm}m</span><span class="stop-name">${s.name} ${s.req?'(NŻ)':''}</span>${info ? `<div class="stop-info-box">${info.desc}</div>` : ''}<div class="hours-box" id="hb-${si}"></div>`;
            row.onclick = () => toggleH(si, l.hours, cumm);
            container.appendChild(row);
        });
    }

    function toggleH(si, base, offset) {
        const box = document.getElementById('hb-'+si);
        if(box.style.display === 'block') { box.style.display = 'none'; return; }
        document.querySelectorAll('.hours-box').forEach(b => b.style.display = 'none');
        let htm = '';
        base.split(',').forEach(h => {
            let [hh, mm] = h.trim().split(':').map(Number);
            let d = new Date(); d.setHours(hh, mm + offset);
            htm += `<span class="hour-pill">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        });
        box.innerHTML = htm; box.style.display = 'block';
    }

    function login() { if(document.getElementById('adm-pass').value==='123') { document.getElementById('adm-auth').style.display='none'; document.getElementById('adm-panel').style.display='block'; } }
    function addNewStopName() { const n = document.getElementById('new-stop-name').value; if(n){ db.stops.push(n); document.getElementById('new-stop-name').value=''; sync(); } }
    function openLineEditor(idx) { curEditIdx = idx; if(idx === -1) { document.getElementById('le-num').value=''; document.getElementById('le-dir').value=''; document.getElementById('le-hours').value=''; tempRoute = []; } else { const l = db.lines[idx]; document.getElementById('le-num').value=l.num; document.getElementById('le-dir').value=l.dir; document.getElementById('le-type').value=l.type; document.getElementById('le-hours').value=l.hours; tempRoute = JSON.parse(JSON.stringify(l.route)); } renderEditStops(); document.getElementById('m-line-editor').style.display='block'; }
    function addStopRow() { tempRoute.push({name: db.stops[0]||'', time: 0, req: false}); renderEditStops(); }
    function renderEditStops() { const c = document.getElementById('le-stops-container'); c.innerHTML = ''; tempRoute.forEach((s, i) => { let options = db.stops.map(sn => `<option value="${sn}" ${sn===s.name?'selected':''}>${sn}</option>`).join(''); c.innerHTML += `<div class="stop-edit-item"><select onchange="tempRoute[${i}].name=this.value">${options}</select><div style="display:flex;gap:5px;margin-top:5px;">+ <input type="number" value="${s.time}" style="width:50px" onchange="tempRoute[${i}].time=parseInt(this.value)"> m <label><input type="checkbox" ${s.req?'checked':''} onchange="tempRoute[${i}].req=this.checked"> NŻ</label><button onclick="tempRoute.splice(${i},1);renderEditStops()">X</button></div></div>`; }); }
    function saveLine() { const l = { num: document.getElementById('le-num').value, dir: document.getElementById('le-dir').value, type: document.getElementById('le-type').value, hours: document.getElementById('le-hours').value, route: tempRoute }; if(curEditIdx===-1) db.lines.push(l); else db.lines[curEditIdx] = l; sync(); closeModal(); }
    function openInfoEditor(idx) { curEditIdx = idx; if(idx===-1) { document.getElementById('ie-name').value=''; document.getElementById('ie-desc').value=''; } else { document.getElementById('ie-name').value=db.infos[idx].name; document.getElementById('ie-desc').value=db.infos[idx].desc; } document.getElementById('m-info-editor').style.display='block'; }
    function saveInfo() { const info = { name: document.getElementById('ie-name').value, desc: document.getElementById('ie-desc').value }; if(curEditIdx===-1) db.infos.push(info); else db.infos[curEditIdx] = info; sync(); closeModal(); }
    function deleteLine(i) { db.lines.splice(i,1); sync(); }
    function deleteStopName(i) { db.stops.splice(i,1); sync(); }
    function deleteInfo(i) { db.infos.splice(i,1); sync(); }
    function closeModal() { document.querySelectorAll('[id^="m-"]').forEach(m => m.style.display='none'); }
    function saveMap() { db.map = document.getElementById('map-url-inp').value; sync(); alert("OK"); }
    function exportDB() { const b=new Blob([JSON.stringify(db)],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='mzk_db.txt'; a.click(); }
    function importDB(e) { const r=new FileReader(); r.onload=function(){ db=JSON.parse(r.result); sync(); }; r.readAsText(e.target.files[0]); }
    render();
</script>
</body>
</html>
