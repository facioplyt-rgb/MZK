<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK OMEGA ULTIMATE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* --- SYSTEM STYLÓW (Moduł 9 & UX) --- */
        :root { 
            --accent: #00d166; --bg: #05080f; --surf: #101622; --surf-l: #1a2332; 
            --text: #ffffff; --text-m: #94a3b8; --tram: #ff4757; --border: rgba(255,255,255,0.08); 
            --glass: rgba(16, 22, 34, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; line-height: 1.5; }
        
        /* Layout i Komponenty */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { background: var(--glass); backdrop-filter: blur(20px); padding: 20px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surf); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); transition: transform 0.2s, background 0.2s; }
        .card:active { transform: scale(0.98); background: var(--surf-l); }
        .btn { background: var(--accent); color: #000; padding: 18px; border: none; border-radius: 18px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        
        /* Nawigacja Dolna */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--surf); display: flex; height: 80px; border-top: 1px solid var(--border); z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-m); font-size: 0.7rem; font-weight: 600; transition: 0.3s; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab i { font-size: 1.4rem; margin-bottom: 5px; }
        
        /* Formularze */
        input, select, textarea { width: 100%; padding: 15px; border-radius: 15px; background: var(--surf-l); border: 1px solid var(--border); color: #fff; margin-bottom: 12px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--accent); }

        /* Animacje */
        .module { display: none; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .module.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* Specyficzne dla Tablicy */
        .live-tag { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; margin-left: 10px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="font-size: 1.2rem; font-weight: 900; letter-spacing: -0.5px;">MZK <span style="color:var(--accent)">OMEGA</span></h1>
            <div id="live-clock" style="font-size: 0.75rem; color: var(--text-m); font-weight: 800; letter-spacing: 1px;">00:00:00</div>
        </div>
        <div id="status-badge" style="font-size: 0.6rem; font-weight: 900; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px; color: var(--accent);">V20.0 CLOUD</div>
    </header>

    <div class="container" id="app-viewport">
        <div id="loader" style="text-align:center; padding-top:100px;">
            <i class="fa-solid fa-atom fa-spin" style="font-size: 3.5rem; color: var(--accent);"></i>
            <h2 style="margin-top:25px; font-weight:900; letter-spacing: 2px; font-size: 0.8rem;">AUTORYZACJA SYSTEMU...</h2>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-tab active" id="nt-home" onclick="App.gate('home')"><i class="fa-solid fa-house-chimney"></i><span>START</span></div>
        <div class="nav-tab" id="nt-lines" onclick="App.gate('lines')"><i class="fa-solid fa-bus-simple"></i><span>LINIE</span></div>
        <div class="nav-tab" id="nt-planer" onclick="App.gate('planer')"><i class="fa-solid fa-route"></i><span>PLANER</span></div>
        <div class="nav-tab" id="nt-favs" onclick="App.gate('favs')"><i class="fa-solid fa-heart"></i><span>ULUBIONE</span></div>
        <div class="nav-tab" id="nt-admin" onclick="App.gate('admin')"><i class="fa-solid fa-shield-halved"></i><span>ADMIN</span></div>
    </nav>

    <script>
        /* ==========================================================
           CORE ENGINE (Baza, Synchronizacja, Stan)
           ========================================================== */
        const App = {
            dbKey: 'mzk_v12_pro',
            state: { 
                favs: JSON.parse(localStorage.getItem('mzk_favs')) || { stops: [] },
                alerts: [],
                currentView: 'home',
                data: { lines: [], news: [] }
            },

            init() {
                // Konfiguracja Firebase
                const config = {
                    apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
                    authDomain: "mzk-by-facio.firebaseapp.com",
                    databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
                    projectId: "mzk-by-facio"
                };
                firebase.initializeApp(config);
                this.db = firebase.database();
                
                this.sync();
                this.startClock();
                this.applyTheme();
            },

            sync() {
                this.db.ref(this.dbKey).on('value', snap => {
                    const raw = snap.val() || {};
                    this.state.data.lines = Array.isArray(raw.lines) ? raw.lines : Object.values(raw.lines || {});
                    this.state.data.news = raw.news || {};
                    
                    if(document.getElementById('loader')) this.buildLayout();
                    this.render();
                });
            },

            buildLayout() {
                document.getElementById('app-viewport').innerHTML = `
                    <div id="v-home" class="module"></div>
                    <div id="v-lines" class="module"></div>
                    <div id="v-planer" class="module"></div>
                    <div id="v-favs" class="module"></div>
                    <div id="v-admin" class="module"></div>
                    <div id="v-details" class="module"></div>
                `;
                this.gate('home');
            },

            gate(viewId) {
                this.state.currentView = viewId;
                document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
                document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
                
                const target = document.getElementById('v-' + viewId);
                if(target) target.classList.add('active');
                
                const nav = document.getElementById('nt-' + viewId);
                if(nav) nav.classList.add('active');

                this.render();
                window.scrollTo(0,0);
            },

            render() {
                const v = this.state.currentView;
                if(v === 'home') Modules.Home.draw();
                if(v === 'lines') Modules.Lines.draw();
                if(v === 'planer') Modules.Planer.draw();
                if(v === 'favs') Modules.Favs.draw();
                if(v === 'admin') Modules.Admin.draw();
            },

            startClock() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('live-clock').innerText = now.toLocaleTimeString('pl-PL');
                    if(now.getSeconds() === 0) this.render(); // Odświeżanie minutowe
                }, 1000);
            },

            applyTheme() {
                const color = localStorage.getItem('mzk_theme') || '#00d166';
                document.documentElement.style.setProperty('--accent', color);
            }
        };

        /* ==========================================================
           LOGIKA CZASU (Moduł 1 & 10)
           ========================================================== */
        const Time = {
            toMin(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; },
            calc(base, offset) {
                let t = this.toMin(base) + parseInt(offset);
                return `${Math.floor(t/60)%24}:${(t%60).toString().padStart(2,'0')}`;
            },
            diff(target) {
                const now = new Date();
                return this.toMin(target) - (now.getHours()*60 + now.getMinutes());
            }
        };

        /* ==========================================================
           MODUŁY FUNKCJONALNE
           ========================================================== */
        const Modules = {

            // Moduł 1 & 10 (Dashboard i Lista)
            Home: {
                draw() {
                    let html = `<h2 style="font-weight:900; margin-bottom:20px; font-size:1.5rem;">Cześć! 👋</h2>`;
                    
                    // Inteligentny Dashboard (Ulubione Przystanki)
                    const favStops = App.state.favs.stops;
                    if(favStops.length > 0) {
                        html += `<div style="font-size:0.7rem; font-weight:900; color:var(--accent); margin-bottom:10px; letter-spacing:1px;">TWOJE PRZYSTANKI</div>
                                 <div style="display:flex; gap:12px; overflow-x:auto; padding-bottom:15px; margin-bottom:10px;">`;
                        
                        let departures = [];
                        App.state.data.lines.forEach(l => {
                            l.stops.forEach(s => {
                                if(favStops.includes(s.name)) {
                                    l.baseTimes.forEach(bt => {
                                        const rt = Time.calc(bt, s.time);
                                        const df = Time.diff(rt);
                                        if(df >= 0 && df <= 45) departures.push({ n: l.num, d: l.dir, rt, df, s: s.name });
                                    });
                                }
                            });
                        });
                        
                        departures.sort((a,b) => a.df - b.df).slice(0, 5).forEach(x => {
                            html += `<div class="card" onclick="Modules.Lines.showBoard('${x.s}')" style="min-width:160px; flex:1; margin-bottom:0; padding:15px; border-bottom:4px solid var(--accent)">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <b style="font-size:1.2rem; color:var(--accent)">${x.n}</b>
                                    <span class="pulse" style="font-size:0.7rem; font-weight:900;">${x.df}m</span>
                                </div>
                                <div style="font-size:0.7rem; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin:4px 0;">${x.d}</div>
                                <div style="font-size:0.55rem; color:var(--text-m); font-weight:700;">${x.s}</div>
                            </div>`;
                        });
                        html += `</div>`;
                    }

                    // Sekcja Nowości (Moduł 4)
                    const news = Object.values(App.state.data.news || {}).reverse().slice(0, 1);
                    news.forEach(n => {
                        html += `<div class="card" style="background: linear-gradient(45deg, var(--surf), var(--surf-l)); border-left: 4px solid var(--accent);">
                            <small style="color:var(--accent); font-weight:900;">KOMUNIKAT</small>
                            <h3 style="font-size:1rem; margin:5px 0;">${n.title}</h3>
                            <p style="font-size:0.8rem; opacity:0.7;">${n.content}</p>
                        </div>`;
                    });

                    html += `<div class="btn" style="margin-top:10px; text-align:center;" onclick="App.gate('lines')">ZOBACZ WSZYSTKIE LINIE</div>`;
                    document.getElementById('v-home').innerHTML = html;
                }
            },

            // Moduł 2 & 3 (Linie i Przystanki)
            Lines: {
                search: '',
                draw() {
                    let html = `<input type="text" placeholder="Szukaj linii lub przystanku..." onkeyup="Modules.Lines.doSearch(this.value)" value="${this.search}">`;
                    
                    const filtered = App.state.data.lines.filter(l => 
                        l.num.toLowerCase().includes(this.search.toLowerCase()) || 
                        l.dir.toLowerCase().includes(this.search.toLowerCase())
                    );

                    filtered.forEach((l, idx) => {
                        html += `<div class="card" onclick="Modules.Lines.showDetails(${idx})" style="display:flex; align-items:center; gap:20px;">
                            <div style="background:var(--accent); color:#000; width:50px; height:50px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.3rem;">${l.num}</div>
                            <div style="flex:1">
                                <div style="font-weight:900; font-size:1.1rem;">${l.dir}</div>
                                <div style="font-size:0.75rem; color:var(--text-m);">${l.stops.length} przystanków na trasie</div>
                            </div>
                            <i class="fa-solid fa-chevron-right" style="opacity:0.2"></i>
                        </div>`;
                    });
                    document.getElementById('v-lines').innerHTML = html;
                },
                doSearch(v) { this.search = v; this.draw(); },
                showDetails(idx) {
                    const l = App.state.data.lines[idx];
                    let html = `<div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                        <button class="btn" style="width:55px;" onclick="App.gate('lines')"><i class="fa-solid fa-arrow-left"></i></button>
                        <h2 style="font-weight:900;">Linia ${l.num}</h2>
                    </div>`;
                    l.stops.forEach((s, sIdx) => {
                        html += `<div class="card" onclick="Modules.Lines.showTimetable(${idx}, ${sIdx})" style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="font-weight:700;"><i class="fa-solid fa-location-dot" style="margin-right:12px; color:var(--accent)"></i> ${s.name}</div>
                            <div style="font-size:0.8rem; font-weight:900; opacity:0.4;">+${s.time} min</div>
                        </div>`;
                    });
                    document.getElementById('v-details').innerHTML = html;
                    App.gate('details');
                },
                showTimetable(lIdx, sIdx) {
                    const l = App.state.data.lines[lIdx];
                    const s = l.stops[sIdx];
                    let html = `<div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                        <button class="btn" style="width:55px;" onclick="Modules.Lines.showDetails(${lIdx})"><i class="fa-solid fa-arrow-left"></i></button>
                        <div><h2 style="font-weight:900; font-size:1.1rem;">${s.name}</h2><small>Kierunek: ${l.dir}</small></div>
                    </div>`;
                    
                    l.baseTimes.forEach(bt => {
                        const rt = Time.calc(bt, s.time);
                        const df = Time.diff(rt);
                        if(df >= -5) {
                            html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-weight:900; font-size:1.5rem;">${rt}</span>
                                <div style="text-align:right">
                                    <b style="color:var(--accent); display:block;">${df >= 0 && df <= 30 ? 'za ' + df + ' min' : ''}</b>
                                    <small style="opacity:0.5">Rozkładowo</small>
                                </div>
                            </div>`;
                        }
                    });
                    document.getElementById('v-details').innerHTML = html;
                },
                showBoard(name) {
                    let html = `<div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                        <button class="btn" style="width:55px;" onclick="App.gate('home')"><i class="fa-solid fa-arrow-left"></i></button>
                        <h2 style="font-weight:900;">${name}</h2>
                    </div><div class="card" style="background:#000; border:2px solid var(--accent); padding:10px;">`;
                    
                    let deps = [];
                    App.state.data.lines.forEach(l => {
                        const s = l.stops.find(st => st.name === name);
                        if(s) l.baseTimes.forEach(bt => {
                            const rt = Time.calc(bt, s.time);
                            const df = Time.diff(rt);
                            if(df >= -1 && df <= 90) deps.push({ num: l.num, dir: l.dir, rt, df });
                        });
                    });

                    deps.sort((a,b) => a.df - b.df).forEach(d => {
                        html += `<div style="display:flex; justify-content:space-between; padding:15px 10px; border-bottom:1px solid #111;">
                            <span style="font-weight:800;"><b style="color:var(--accent); margin-right:12px; font-size:1.2rem;">${d.num}</b> ${d.dir}</span>
                            <b style="color:${d.df<=20?'var(--accent)':'#fff'}; font-size:1.1rem;">${d.df <= 20 && d.df >= 0 ? d.df + ' min' : d.rt}</b>
                        </div>`;
                    });
                    document.getElementById('v-details').innerHTML = html + `</div>`;
                    App.gate('details');
                }
            },

            // Moduł 6 (Planer A-B)
            Planer: {
                draw() {
                    let stops = new Set();
                    App.state.data.lines.forEach(l => l.stops.forEach(s => stops.add(s.name)));
                    let options = Array.from(stops).sort().map(s => `<option value="${s}">${s}</option>`).join('');
                    
                    document.getElementById('v-planer').innerHTML = `
                        <h2 style="font-weight:900; margin-bottom:20px;">Planer <span style="color:var(--accent)">Podróży</span></h2>
                        <div class="card">
                            <label style="font-size:0.7rem; font-weight:900; color:var(--accent); margin-bottom:5px; display:block;">PRZYSTANEK POCZĄTKOWY</label>
                            <select id="p-start"><option value="">Wybierz...</option>${options}</select>
                            <label style="font-size:0.7rem; font-weight:900; color:var(--text-m); margin-bottom:5px; display:block;">PRZYSTANEK DOCELOWY</label>
                            <select id="p-end"><option value="">Wybierz...</option>${options}</select>
                            <button class="btn" style="margin-top:10px;" onclick="Modules.Planer.find()">ZNAJDŹ POŁĄCZENIE</button>
                        </div>
                        <div id="planner-results"></div>
                    `;
                },
                find() {
                    const start = document.getElementById('p-start').value;
                    const end = document.getElementById('p-end').value;
                    if(!start || !end || start === end) return alert("Wybierz dwa różne przystanki!");
                    
                    let results = [];
                    App.state.data.lines.forEach(l => {
                        const sIdx = l.stops.findIndex(st => st.name === start);
                        const eIdx = l.stops.findIndex(st => st.name === end);
                        if(sIdx > -1 && eIdx > sIdx) {
                            l.baseTimes.forEach(bt => {
                                const dep = Time.calc(bt, l.stops[sIdx].time);
                                const arr = Time.calc(bt, l.stops[eIdx].time);
                                if(Time.diff(dep) >= 0) {
                                    results.push({ num: l.num, dir: l.dir, dep, arr, dur: l.stops[eIdx].time - l.stops[sIdx].time });
                                }
                            });
                        }
                    });

                    let h = `<div style="font-size:0.7rem; font-weight:900; margin:20px 0 10px;">NAJBLIŻSZE KURSY</div>`;
                    results.sort((a,b) => Time.toMin(a.dep) - Time.toMin(b.dep)).slice(0, 4).forEach(r => {
                        h += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="color:var(--accent); font-size:1.3rem;">${r.num}</b>
                                <div style="font-size:0.8rem; font-weight:600; margin-top:3px;">${r.dep} → ${r.arr}</div>
                            </div>
                            <div style="text-align:right;">
                                <b style="display:block;">${r.dur} min</b>
                                <small style="opacity:0.5;">Czas jazdy</small>
                            </div>
                        </div>`;
                    });
                    document.getElementById('planner-results').innerHTML = h || '<p style="text-align:center; padding:40px; opacity:0.4;">Brak bezpośrednich połączeń.</p>';
                }
            },

            // Moduł 7 (Ulubione)
            Favs: {
                draw() {
                    let html = `<h2 style="font-weight:900; margin-bottom:20px;">Ulubione</h2>`;
                    let allStops = new Set();
                    App.state.data.lines.forEach(l => l.stops.forEach(s => allStops.add(s.name)));
                    
                    html += `<div class="card">
                        <label style="font-size:0.7rem; font-weight:900; color:var(--accent); display:block; margin-bottom:10px;">DODAJ DO SZYBKIEGO PODGLĄDU</label>
                        <select onchange="Modules.Favs.toggle(this.value); this.value='' ">
                            <option value="">Wybierz przystanek...</option>
                            ${Array.from(allStops).sort().map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                    </div>`;

                    App.state.favs.stops.forEach(s => {
                        html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div onclick="Modules.Lines.showBoard('${s}')" style="flex:1; font-weight:900;">${s}</div>
                            <i class="fa-solid fa-trash" onclick="Modules.Favs.toggle('${s}')" style="color:var(--tram); padding:10px;"></i>
                        </div>`;
                    });
                    document.getElementById('v-favs').innerHTML = html;
                },
                toggle(name) {
                    const idx = App.state.favs.stops.indexOf(name);
                    if(idx > -1) App.state.favs.stops.splice(idx, 1);
                    else App.state.favs.stops.push(name);
                    localStorage.setItem('mzk_favs', JSON.stringify(App.state.favs));
                    App.render();
                }
            },

            // Moduł 5 & 11 (Admin Cloud CRUD)
            Admin: {
                isLogged: false,
                draw() {
                    const v = document.getElementById('v-admin');
                    if(!this.isLogged) {
                        v.innerHTML = `
                            <div class="card" style="text-align:center; padding:50px 20px;">
                                <i class="fa-solid fa-fingerprint" style="font-size:4rem; color:var(--accent); margin-bottom:20px;"></i>
                                <h2 style="font-weight:900;">Panel Zarządzania</h2>
                                <input type="password" id="adm-pass" placeholder="HASŁO" style="text-align:center; letter-spacing:8px; margin:25px 0;">
                                <button class="btn" onclick="Modules.Admin.login()">AUTORYZUJ</button>
                            </div>`;
                        return;
                    }
                    
                    let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2 style="font-weight:900;">Cloud <span style="color:var(--accent)">Control</span></h2>
                        <button onclick="Modules.Admin.isLogged=false; App.gate('home')" style="background:none; border:none; color:var(--tram); font-weight:900;">LOGOUT</button>
                    </div>`;

                    html += `<button class="btn" style="margin-bottom:20px;" onclick="Modules.Admin.openEditor()">+ DODAJ NOWĄ LINIĘ</button>`;

                    App.state.data.lines.forEach((l, i) => {
                        html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                            <div><b>${l.num}</b> <small style="margin-left:10px; opacity:0.6;">${l.dir}</small></div>
                            <div style="display:flex; gap:15px;">
                                <i class="fa-solid fa-pen-to-square" onclick="Modules.Admin.openEditor(${i})" style="color:var(--accent)"></i>
                                <i class="fa-solid fa-trash" onclick="Modules.Admin.deleteLine(${i})" style="color:var(--tram)"></i>
                            </div>
                        </div>`;
                    });

                    // News Manager
                    html += `<h3 style="margin:30px 0 15px; font-weight:900;">Opublikuj Komunikat</h3>
                    <div class="card">
                        <input id="n-title" placeholder="Tytuł alertu">
                        <textarea id="n-content" placeholder="Treść komunikatu..." rows="3"></textarea>
                        <button class="btn" onclick="Modules.Admin.saveNews()">WYŚLIJ W ŚWIAT</button>
                    </div>`;

                    v.innerHTML = html;
                },
                login() { if(document.getElementById('adm-pass').value === '123') { this.isLogged=true; this.draw(); } else alert("Błędne hasło!"); },
                openEditor(idx = null) {
                    const l = idx !== null ? App.state.data.lines[idx] : { num: '', dir: '', baseTimes: [], stops: [] };
                    const stopsStr = l.stops.map(s => `${s.name}|${s.time}`).join(', ');
                    const timesStr = l.baseTimes.join(', ');

                    document.getElementById('v-admin').innerHTML = `
                        <button class="btn" style="width:55px; margin-bottom:20px;" onclick="Modules.Admin.draw()">←</button>
                        <div class="card">
                            <h3 style="margin-bottom:20px;">${idx!==null?'Edycja':'Nowa'} Linia</h3>
                            <input id="e-num" placeholder="Numer linii (np. 101)" value="${l.num}">
                            <input id="e-dir" placeholder="Kierunek (np. Osiedle - Centrum)" value="${l.dir}">
                            <label style="font-size:0.6rem; font-weight:900; color:var(--text-m);">CZASY Z PĘTLI (po przecinku)</label>
                            <textarea id="e-times" placeholder="05:20, 06:15...">${timesStr}</textarea>
                            <label style="font-size:0.6rem; font-weight:900; color:var(--text-m);">PRZYSTANKI (Nazwa|minuta_od_pętli)</label>
                            <textarea id="e-stops" placeholder="Dworzec|0, Rynek|5...">${stopsStr}</textarea>
                            <button class="btn" style="margin-top:20px;" onclick="Modules.Admin.saveLine(${idx})">ZAPISZ ZMIANY</button>
                        </div>
                    `;
                },
                saveLine(idx) {
                    const line = {
                        num: document.getElementById('e-num').value,
                        dir: document.getElementById('e-dir').value,
                        baseTimes: document.getElementById('e-times').value.split(',').map(s => s.trim()),
                        stops: document.getElementById('e-stops').value.split(',').map(s => {
                            const [name, time] = s.split('|');
                            return { name: name?.trim(), time: parseInt(time) || 0 };
                        })
                    };
                    let lines = [...App.state.data.lines];
                    if(idx !== null) lines[idx] = line; else lines.push(line);
                    App.db.ref(App.dbKey + '/lines').set(lines).then(() => { alert("Zapisano pomyślnie!"); this.draw(); });
                },
                deleteLine(idx) { if(confirm("Na pewno usunąć tę linię?")) { let l = [...App.state.data.lines]; l.splice(idx,1); App.db.ref(App.dbKey + '/lines').set(l).then(() => this.draw()); }},
                saveNews() {
                    const news = { title: document.getElementById('n-title').value, content: document.getElementById('n-content').value, date: new Date().toISOString() };
                    App.db.ref(App.dbKey + '/news').push(news).then(() => { alert("Komunikat wysłany!"); this.draw(); });
                }
            }
        };

        
        App.init();
    </script>
</body>
</html>
