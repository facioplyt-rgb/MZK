<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; min-height: 80vh; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Karty i Przyciski */
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.1s; }
        .app-card:active { transform: scale(0.98); }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 700; letter-spacing: 1.5px; }
        
        /* Newsy */
        .news-badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: inline-block; }
        .cat-rozkład { background: var(--info); color: white; }
        .cat-utrudnienia { background: var(--danger); color: white; }
        .cat-zatrudnimy { background: var(--accent); color: white; }
        .cat-inne { background: #637381; color: white; }
        
        /* Widok szczegółów newsa */
        #news-details-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 4000; display: none; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .news-full-content { font-size: 1.05rem; line-height: 1.7; color: #ced4da; margin-top: 20px; white-space: pre-wrap; }

        /* Linie i Siatka */
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 20px 0; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 5px solid transparent; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        
        /* Rozkład */
        .tt-time-tag { background: var(--accent); color: white; padding: 10px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .stop-line-badge { display: inline-block; margin: 3px; padding: 5px 10px; background: rgba(255,255,255,0.07); border-radius: 10px; font-size: 0.85rem; font-weight: 600; color: #fff; border: 1px solid rgba(255,255,255,0.05); }

        /* Nawigacja */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.96); backdrop-filter: blur(20px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.08); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.7rem; font-weight: 600; transition: 0.2s; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.4rem; margin-bottom: 5px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
        .back-btn { background: #262e38; color: white; margin-top: 30px; }
        
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 15px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; font-size: 1rem; }
        .adm-nav-main { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 20px; }
        .adm-nav-main button { padding: 12px 2px; font-size: 0.65rem; border-radius: 12px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3500; display:none; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Gdzie chcesz jechać? (przystanek)" oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section">
        <div class="group-label">Aktualności i komunikaty</div>
        <div id="public-news-list"></div>
    </div>
    <div id="s-contact" class="section">
        <div class="group-label">Informacje o MZK</div>
        <div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap; line-height:1.6;"></div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn back-btn">Wróć do listy linii</button></div>
    <div id="s-tt" class="section">
        <div id="tt-head"></div>
        <div id="tt-day-sel" style="display:none; gap:8px; margin-bottom:15px;">
            <button class="day-btn" id="btn-working" style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--surface); color:white; font-weight:700;" onclick="setDay('working')">Robocze</button>
            <button class="day-btn" id="btn-saturday" style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--surface); color:white; font-weight:700;" onclick="setDay('saturday')">Soboty</button>
            <button class="day-btn" id="btn-sunday" style="flex:1; padding:15px; border-radius:12px; border:none; background:var(--surface); color:white; font-weight:700;" onclick="setDay('sunday')">Niedziele</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn back-btn">Wróć</button>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Kod dostępu">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('i')" id="mt-i">PLIK</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Nowa Linia</button><div id="adm-lines-list"></div></div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Nowy News</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:250px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-i" class="adm-tab" style="display:none;"><div style="text-align:center; padding:20px; border: 2px dashed rgba(255,255,255,0.1); border-radius:20px;"><p>DODAWANIE DANYCH (Merge)</p><input type="file" id="import-file" style="display:none;" onchange="handleImport(this)"><button onclick="document.getElementById('import-file').click()" class="main-btn" style="margin-top:15px">Wgraj plik backupu</button></div></div>
        </div>
    </div>
</div>

<div id="news-details-view">
    <div id="nd-badge-area"></div>
    <h2 id="nd-title" style="font-size:1.8rem; margin:10px 0; color:white;"></h2>
    <div id="nd-date" style="color:var(--text-sec); font-size:0.9rem; margin-bottom:20px;"></div>
    <div id="nd-content" class="news-full-content"></div>
    <button onclick="closeNewsDetails()" class="main-btn back-btn">Wróć do komunikatów</button>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek docelowy">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-h-work" placeholder="Godziny Robocze (np. 08:00, 08:30)"></textarea>
    <textarea id="fl-h-sat" placeholder="Godziny Soboty"></textarea>
    <textarea id="fl-h-sun" placeholder="Godziny Niedziele"></textarea>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn">+ Dodaj przystanek</button>
    <button onclick="saveLine()" class="main-btn" style="background:var(--accent)">ZAPISZ LINIĘ</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <input type="text" id="fn-title" placeholder="Tytuł newsa">
    <input type="date" id="fn-date">
    <select id="fn-cat">
        <option value="Zmiana Rozkładu Jazdy">Zmiana Rozkładu Jazdy</option>
        <option value="Utrudnienia">Utrudnienia</option>
        <option value="Zatrudnimy">Zatrudnimy</option>
        <option value="Inne">Inne</option>
    </select>
    <textarea id="fn-content" style="height:300px" placeholder="Treść newsa..."></textarea>
    <button onclick="saveNews()" class="main-btn">ZAPISZ NEWS</button>
    <button id="del-news-btn" class="main-btn" style="background:var(--danger); display:none;">USUŃ</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mzk-by-facio",
        storageBucket: "mzk-by-facio.firebasestorage.app",
        messagingSenderId: "676970411647",
        appId: "1:676970411647:web:5703d5fb5fb499ff83714a",
        measurementId: "G-EZ1WKZXX6K"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], stopDetails: {}, news: [], lineCategories: ["Tramwaje", "Autobusy", "Nocne"], contact: "" };
    let currentLineIndex = -1, currentNewsIdx = -1, allAutoStops = [], currentDay = 'working', focusedStopIdx = -1;

    function cleanKey(name) { return name ? name.trim().replace(/[.#$[\]]/g, "") : "unknown"; }

    function init() {
        dbRef.on('value', (s) => {
            const data = s.val();
            if(data) {
                db = data;
                if(!db.lines) db.lines = [];
                if(!db.news) db.news = [];
                if(!db.stopDetails) db.stopDetails = {};
                extractStops();
                render();
            }
        });
    }

    // NOWA FUNKCJA - NEWS NA CAŁĄ STRONĘ
    function openNewsDetails(idx) {
        const n = db.news[idx];
        document.getElementById('nd-badge-area').innerHTML = `<span class="news-badge cat-${(n.category || 'inne').toLowerCase().split(' ')[0]}">${n.category || 'Inne'}</span>`;
        document.getElementById('nd-title').innerText = n.title;
        document.getElementById('nd-date').innerText = n.date || '';
        document.getElementById('nd-content').innerText = n.content || '';
        document.getElementById('news-details-view').style.display = 'block';
    }

    function closeNewsDetails() {
        document.getElementById('news-details-view').style.display = 'none';
    }

    function handleImport(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                let newLines = (imported.lines || []).map(l => {
                    if (l.hours && !l.hoursWorking) l.hoursWorking = l.hours;
                    return l;
                });
                if (confirm(`Pobrać ${newLines.length} nowych linii i dodać je do bazy?`)) {
                    newLines.forEach(nl => {
                        if (!db.lines.some(ol => ol.num === nl.num && ol.dir === nl.dir)) db.lines.push(nl);
                    });
                    if (imported.news) imported.news.forEach(nn => db.news.push(nn));
                    if (imported.stopDetails) Object.assign(db.stopDetails, imported.stopDetails);
                    dbRef.update({ lines: db.lines, news: db.news, stopDetails: db.stopDetails }).then(() => { alert("Dane dodane!"); input.value = ''; });
                }
            } catch (err) { alert("Błąd formatu pliku JSON!"); }
        };
        reader.readAsText(file);
    }

    function extractStops() { 
        let sSet = new Set(); 
        db.lines.forEach(l => { if(l.stops) l.stops.forEach(s => sSet.add(s.name)); });
        allAutoStops = [...sSet].sort();
    }

    function render() {
        const home = document.getElementById('s-home'); home.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length) {
                home.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    grid.innerHTML += `<div class="line-square ${lines.find(x=>x.num===num).type}" onclick="openVariants('${num}')">${num}</div>`;
                });
                home.appendChild(grid);
            }
        });

        const newsList = document.getElementById('public-news-list');
        newsList.innerHTML = db.news.length ? db.news.map((n, i) => `
            <div class="app-card" onclick="openNewsDetails(${i})">
                <div style="flex:1">
                    <span class="news-badge cat-${(n.category || 'inne').toLowerCase().split(' ')[0]}">${n.category || 'Inne'}</span>
                    <h3 style="font-size:1.05rem; margin-top:5px; color:white;">${n.title}</h3>
                    <div style="font-size:0.75rem; color:var(--text-sec); margin-top:5px;">${n.date || ''}</div>
                </div>
                <i class="fa-solid fa-chevron-right" style="color:var(--text-sec)"></i>
            </div>`).join('') : '<div class="app-card">Brak aktywnych komunikatów.</div>';
        
        filterStops();
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> -> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-news-list').innerHTML = db.news.map((n, i) => `<div class="app-card"><span>[${n.date || '--'}] ${n.title}</span><button onclick="openNewsForm(${i})">EDYTUJ</button></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact || "Brak informacji.";
        renderAdminStops();
    }

    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list');
        if(!list) return;
        list.innerHTML = allAutoStops.filter(s => s.toLowerCase().includes(q)).map(s => {
            const det = db.stopDetails[cleanKey(s)] || {nearby:""};
            return `<div class="app-card" style="display:block"><b>${s}</b>${det.nearby?`<div style="color:var(--warn); font-size:0.85rem; margin:6px 0;">${det.nearby}</div>`:''}<div style="margin-top:10px">${getOtherLines(s, "")}</div></div>`;
        }).join('');
    }

    function getOtherLines(stopName, currentNum) {
        let lines = [];
        db.lines.forEach(l => { if(String(l.num) !== String(currentNum) && l.stops?.some(st => st.name === stopName)) { if(!lines.some(x => x.num === l.num)) lines.push({num: l.num, type: l.type}); } });
        return lines.map(ln => `<span class="stop-line-badge" onclick="event.stopPropagation(); goToLineFromStop('${ln.num}', '${stopName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-${ln.type==='tram'?'tram':'bus'}"></i> ${ln.num}</span>`).join('');
    }

    function goToLineFromStop(lineNum, stopName) {
        const lineIdx = db.lines.findIndex(l => String(l.num) === String(lineNum) && l.stops.some(st => st.name === stopName));
        if (lineIdx !== -1) { 
            renderTimetable(lineIdx, db.lines[lineIdx].stops.findIndex(st => st.name === stopName)); 
            window.scrollTo(0, 0); 
        }
    }

    function renderTimetable(lineIdx, stopIdx = -1) {
        currentLineIndex = lineIdx; focusedStopIdx = stopIdx; show('tt'); const line = db.lines[lineIdx];
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num} | ${line.dir}</div>`;
        document.getElementById('tt-day-sel').style.display = stopIdx === -1 ? 'none' : 'flex';
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let offset = 0;
        line.stops.forEach((s, i) => {
            offset += parseInt(s.time);
            if(stopIdx !== -1 && i !== stopIdx) return;
            const det = db.stopDetails[cleanKey(s.name)] || {nearby:""};
            body.innerHTML += `<div class="app-card" style="display:block" onclick="renderTimetable(${lineIdx}, ${stopIdx===-1?i:-1})"><div style="display:flex; justify-content:space-between;"><b>${s.name}</b>${s.nz?' <span style="color:var(--danger)">[NŻ]</span>':''}</div>${det.nearby?`<div style="color:var(--warn); font-size:0.85rem; margin-top:4px;">${det.nearby}</div>`:''}<div style="margin-top:10px">${getOtherLines(s.name, line.num)}</div>${stopIdx!==-1?`<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(65px, 1fr)); gap:10px; margin-top:20px;">${calculateHours(line, currentDay, offset)}</div>`:''}</div>`;
        });
        document.getElementById('tt-back-btn').onclick = () => stopIdx === -1 ? show('vars') : renderTimetable(lineIdx, -1);
    }

    function calculateHours(line, day, offset) {
        let raw = (day==='working' ? (line.hoursWorking || line.hours) : day==='saturday'?line.hoursSat:line.hoursSun) || "";
        if(!raw) return '<div style="grid-column:1/-1; font-size:0.9rem; color:var(--text-sec); text-align:center;">Brak kursów w tym dniu.</div>';
        return raw.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length<2) return "";
            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
            return `<span class="tt-time-tag">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        }).join('');
    }

    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); 
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        let navId = (id === 'vars' || id === 'tt') ? 'home' : id;
        if(document.getElementById('n-'+navId)) document.getElementById('n-'+navId).classList.add('active');
        closeNewsDetails();
    }

    function openLineForm(idx) {
        currentLineIndex = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", category: "Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir; document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-h-work').value = l.hoursWorking || l.hours || "";
        document.getElementById('fl-h-sat').value = l.hoursSat || ""; document.getElementById('fl-h-sun').value = l.hoursSun || "";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(name = "", time = 2, nz = false) {
        const div = document.createElement('div'); div.style = "display: flex; gap: 8px; margin-bottom: 8px; align-items:center;";
        div.innerHTML = `<input type="text" value="${name}" class="edit-stop-name" style="flex:2; margin-bottom:0;"><input type="number" value="${time}" class="edit-stop-time" style="width:60px; margin-bottom:0;"><label style="font-size:0.7rem; white-space:nowrap;"><input type="checkbox" ${nz?'checked':''}> NŻ</label><button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger); padding:10px;"><i class="fa-solid fa-trash"></i></button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num} - Wybierz kierunek</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, i) => { if(String(l.num) === String(num)) list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>${l.dir}</b><i class="fa-solid fa-chevron-right" style="color:var(--text-sec)"></i></div>`; });
    }

    function openNewsForm(idx) {
        currentNewsIdx = idx; const n = idx === -1 ? {title:"", date: new Date().toISOString().split('T')[0], category:"Inne", content:""} : db.news[idx];
        document.getElementById('fn-title').value = n.title; document.getElementById('fn-date').value = n.date;
        document.getElementById('fn-cat').value = n.category; document.getElementById('fn-content').value = n.content;
        document.getElementById('del-news-btn').style.display = idx === -1 ? 'none' : 'block';
        document.getElementById('del-news-btn').onclick = () => { if(confirm("Na pewno usunąć ten komunikat?")) { db.news.splice(idx, 1); dbRef.update({news: db.news}); closeForms(); } };
        document.getElementById('form-news').style.display = 'block';
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('#fl-stops-list > div')).map(el => ({ name: el.querySelector('.edit-stop-name').value.trim(), time: parseInt(el.querySelector('.edit-stop-time').value) || 0, nz: el.querySelector('input[type="checkbox"]').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops };
        if(currentLineIndex === -1) db.lines.push(data); else db.lines[currentLineIndex] = data;
        dbRef.update({ lines: db.lines }).then(() => { alert("Linia zapisana!"); closeForms(); });
    }

    function saveNews() {
        const nData = { title: document.getElementById('fn-title').value, date: document.getElementById('fn-date').value, category: document.getElementById('fn-cat').value, content: document.getElementById('fn-content').value };
        if(currentNewsIdx === -1) db.news.push(nData); else db.news[currentNewsIdx] = nData;
        dbRef.update({ news: db.news }).then(() => { alert("Komunikat zapisany!"); closeForms(); });
    }

    function setDay(d) { currentDay = d; document.querySelectorAll('.day-btn').forEach(b => b.style.background='var(--surface)'); document.getElementById('btn-'+d).style.background='var(--accent)'; renderTimetable(currentLineIndex, focusedStopIdx); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; document.querySelectorAll('.adm-nav-main button').forEach(b=>b.classList.remove('active')); document.getElementById('mt-'+t).classList.add('active'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.getElementById('form-line').style.display = 'none'; document.getElementById('form-news').style.display = 'none'; }
    function saveContact() { dbRef.update({ contact: document.getElementById('edit-contact-text').value }).then(() => alert("Informacje zapisane!")); }
    function renderAdminStops() { const list = document.getElementById('adm-stops-list'); if(list) list.innerHTML = allAutoStops.map(s => `<div class="app-card" style="display:block"><b>${s}</b><input type="text" placeholder="Opis okolicy / przesiadki" value="${db.stopDetails[cleanKey(s)]?.nearby || ''}" onblur="dbRef.child('stopDetails').child(cleanKey('${s}')).update({nearby: this.value})"></div>`).join(''); }

    init();
</script>
</body>
</html>
