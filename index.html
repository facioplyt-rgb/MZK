<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZK GORZÓW - by facio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #1e1e1e; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: #f4f7f6; color: var(--dark); padding-bottom: 80px; }
        
        /* HEADER */
        header { background: var(--mzk); color: white; padding: 25px; text-align: center; border-bottom: 6px solid var(--yellow); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-weight: 900; font-size: 1.6rem; text-transform: uppercase; }

        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .active-sec { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LISTA LINII */
        .category-title { border-left: 5px solid var(--mzk); padding-left: 10px; margin: 25px 0 15px; font-weight: 900; color: #555; display: flex; align-items: center; gap: 10px; }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .line-card { background: white; border-radius: 18px; padding: 25px; text-align: center; cursor: pointer; border-bottom: 5px solid #ddd; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .line-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .line-card i { font-size: 1.2rem; margin-bottom: 10px; display: block; }
        .line-card b { font-size: 2.2rem; color: var(--mzk); display: block; }
        .tram-card b { color: var(--red); }

        /* WYBÓR WARIANTU */
        .variant-box { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .variant-btn { background: #f8f9fa; border: 2px solid #eee; padding: 18px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; transition: 0.2s; }
        .variant-btn:hover { border-color: var(--mzk); background: #f0fff4; }
        .variant-btn i { color: var(--mzk); }

        /* TRASA I ROZKŁAD */
        .stop-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 5px solid var(--mzk); font-weight: 700; }
        .tt-table { width: 100%; background: white; border-radius: 15px; overflow: hidden; border-collapse: collapse; margin-top: 15px; border: 3px solid var(--dark); }
        .tt-header { background: var(--dark); color: white; padding: 15px; text-align: center; }
        .tt-row { border-bottom: 1px solid #eee; }
        .tt-hour { background: #f0f0f0; font-weight: 900; width: 60px; text-align: center; padding: 12px; border-right: 2px solid var(--dark); font-size: 1.3rem; }
        .tt-min { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 1.1rem; font-weight: 700; }

        /* NAV DOLNY */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; z-index: 100; }
        nav div { text-align: center; font-size: 0.7rem; font-weight: 800; color: #777; cursor: pointer; }
        nav div.active { color: var(--mzk); }
        nav div i { font-size: 1.4rem; display: block; margin-bottom: 3px; }

        /* ADMIN */
        .admin-form input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-act { background: var(--mzk); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>MZK GORZÓW • SYSTEM</h1></header>

<div class="container">
    
    <div id="s-pax" class="section active-sec">
        <div class="category-title"><i class="fa-solid fa-bus"></i> Linie Autobusowe</div>
        <div id="list-buses" class="line-grid"></div>
        <div class="category-title"><i class="fa-solid fa-train-tram"></i> Linie Tramwajowe</div>
        <div id="list-trams" class="line-grid"></div>
    </div>

    <div id="s-variants" class="section">
        <button onclick="show('pax')" style="margin-bottom:15px; border:none; background:none; color:var(--red); font-weight:900;"><i class="fa-solid fa-arrow-left"></i> WRÓĆ</button>
        <h2 id="v-title">Linia 100</h2>
        <div class="variant-box" id="variant-list"></div>
    </div>

    <div id="s-route" class="section">
        <button onclick="show('variants')" style="margin-bottom:15px; border:none; background:none; color:var(--red); font-weight:900;"><i class="fa-solid fa-arrow-left"></i> WYBÓR KIERUNKU</button>
        <h3 id="r-title" style="color:var(--mzk)"></h3>
        <div id="route-container"></div>
    </div>

    <div id="s-tt" class="section">
        <button onclick="show('route')" style="margin-bottom:15px; border:none; background:none; color:var(--red); font-weight:900;"><i class="fa-solid fa-arrow-left"></i> WRÓĆ DO TRASY</button>
        <div class="tt-table">
            <div class="tt-header">
                <h2 id="tt-stop-name" style="margin:0">Przystanek</h2>
                <small id="tt-dir-info"></small>
            </div>
            <div id="tt-rows"></div>
        </div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="admin-form" style="text-align:center">
            <h3>Panel Administracyjny</h3>
            <input type="password" id="adm-pass" placeholder="Hasło">
            <button class="btn-act" onclick="login()">ZALOGUJ</button>
        </div>
        <div id="adm-dash" style="display:none;">
            <button class="btn-act" onclick="openEd('new')">+ DODAJ WARIANT LINII</button>
            <div id="adm-list" style="margin-top:20px;"></div>
        </div>
    </div>

</div>

<nav>
    <div onclick="show('pax')" id="n-pax" class="active"><i class="fa-solid fa-list"></i>LINIE</div>
    <div onclick="window.open('https://earth.google.com/web/@52.73,15.23,100a,25000d')"><i class="fa-solid fa-map-location-dot"></i>MAPA</div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-gears"></i>PANEL</div>
</nav>

<div id="editor" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; display:none; overflow-y:auto; padding:20px; box-sizing:border-box;">
    <h2>Edytor Wariantu</h2>
    <input type="text" id="e-num" placeholder="Numer (np. 100)">
    <input type="text" id="e-dir" placeholder="Kierunek (np. Oś. Staszica)">
    <select id="e-type" style="width:100%; padding:10px; margin-bottom:10px;"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="e-rob" style="width:100%; height:80px;" placeholder="Godziny Robocze (05:10, 05:40...)"></textarea>
    <p>Przystanki (Nazwa,Czas):</p>
    <textarea id="e-stops" style="width:100%; height:100px;" placeholder="Start,0&#10;Meta,5"></textarea>
    <button class="btn-act" onclick="save()">ZAPISZ</button>
    <button onclick="document.getElementById('editor').style.display='none'" style="width:100%; margin-top:10px;">ANULUJ</button>
</div>

<script>
    const STORAGE = 'MZK_V25_DATA';
    let db = JSON.parse(localStorage.getItem(STORAGE)) || [];

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
        if(id === 'pax') renderPax();
    }

    function renderPax() {
        const bG = document.getElementById('list-buses'), tG = document.getElementById('list-trams');
        bG.innerHTML = ''; tG.innerHTML = '';
        
        // Grupowanie unikalnych numerów linii
        const uniqueLines = [...new Set(db.map(l => l.num))];
        
        uniqueLines.forEach(num => {
            const lineData = db.find(l => l.num === num);
            const card = `<div class="line-card ${lineData.type === 'tram' ? 'tram-card' : ''}" onclick="openVariants('${num}')">
                <i class="fa-solid fa-${lineData.type === 'tram' ? 'train-tram' : 'bus'}"></i>
                <b>${num}</b>
            </div>`;
            if(lineData.type === 'tram') tG.innerHTML += card; else bG.innerHTML += card;
        });
    }

    function openVariants(num) {
        show('variants');
        document.getElementById('v-title').innerText = `Linia ${num} - wybierz kierunek`;
        const list = document.getElementById('variant-list');
        list.innerHTML = '';
        
        db.filter(l => l.num === num).forEach((l, idxInDb) => {
            // Szukamy globalnego indeksu w db
            const globalIdx = db.indexOf(l);
            list.innerHTML += `<div class="variant-btn" onclick="openRoute(${globalIdx})">
                <span>${l.dir}</span> <i class="fa-solid fa-chevron-right"></i>
            </div>`;
        });
    }

    function openRoute(idx) {
        show('route');
        const l = db[idx];
        document.getElementById('r-title').innerText = `Linia ${l.num} ➔ ${l.dir}`;
        const cont = document.getElementById('route-container');
        cont.innerHTML = '';
        let total = 0;
        l.stops.forEach((s, sIdx) => {
            total += parseInt(s.a || 0);
            cont.innerHTML += `<div class="stop-item" onclick="viewTT(${idx}, ${sIdx})">
                <span>${s.n}</span> <span style="color:var(--mzk)">+${total} min</span>
            </div>`;
        });
    }

    function viewTT(lIdx, sIdx) {
        show('tt');
        const l = db[lIdx]; const s = l.stops[sIdx];
        document.getElementById('tt-stop-name').innerText = s.n;
        document.getElementById('tt-dir-info').innerText = `Linia ${l.num} | Kierunek: ${l.dir}`;
        
        let delay = 0;
        for(let i=0; i<=sIdx; i++) delay += parseInt(l.stops[i].a || 0);

        const rows = document.getElementById('tt-rows');
        rows.innerHTML = '';
        let hours = {};

        (l.rob || "").split(',').forEach(t => {
            let m = t.trim().match(/(\d{1,2}):(\d{2})/);
            if(!m) return;
            let d = new Date(2026, 0, 1, m[1], parseInt(m[2]) + delay);
            let h = d.getHours();
            let min = d.getMinutes().toString().padStart(2, '0');
            if(!hours[h]) hours[h] = [];
            hours[h].push(min);
        });

        Object.keys(hours).sort((a,b)=>a-b).forEach(h => {
            rows.innerHTML += `<div class="tt-row" style="display:flex;">
                <div class="tt-hour">${h.toString().padStart(2, '0')}</div>
                <div class="tt-min">${hours[h].join(' ')}</div>
            </div>`;
        });
    }

    // ADMIN
    function login() { if(document.getElementById('adm-pass').value === '123') { 
        document.getElementById('adm-login').style.display='none'; 
        document.getElementById('adm-dash').style.display='block'; renderAdm();
    }}

    function renderAdm() {
        const list = document.getElementById('adm-list'); list.innerHTML = '';
        db.forEach((l, i) => {
            list.innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; border-radius:5px;">
                <b>${l.num}</b> -> ${l.dir} <button onclick="del(${i})">X</button>
            </div>`;
        });
    }

    function openEd() { document.getElementById('editor').style.display='block'; }
    function save() {
        const line = {
            num: document.getElementById('e-num').value,
            dir: document.getElementById('e-dir').value,
            type: document.getElementById('e-type').value,
            rob: document.getElementById('e-rob').value,
            stops: document.getElementById('e-stops').value.split('\n').map(x => {
                let parts = x.split(',');
                return { n: parts[0], a: parts[1] || 0 };
            })
        };
        db.push(line);
        localStorage.setItem(STORAGE, JSON.stringify(db));
        document.getElementById('editor').style.display='none';
        renderPax(); renderAdm();
    }
    function del(i) { if(confirm("Usunąć?")) { db.splice(i, 1); localStorage.setItem(STORAGE, JSON.stringify(db)); renderAdm(); }}

    renderPax();
</script>
</body>
</html>
