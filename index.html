<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); padding-bottom: 90px; color: var(--dark); }
        header { background: var(--mzk); color: white; padding: 18px; text-align: center; border-bottom: 4px solid var(--yellow); position: sticky; top: 0; z-index: 1000; font-weight: 900; text-transform: uppercase; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; }

        /* LINIE */
        .line-item { background: white; padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 6px solid var(--mzk); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .line-item.tram { border-left-color: var(--red); }

        /* PRZYSTANKI */
        .tt-header { background: var(--mzk); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; }
        .tt-header.tram { background: var(--red); }
        
        .stop-row { background: white; padding: 15px; margin-bottom: 5px; border-radius: 10px; border-left: 4px solid #ddd; cursor: pointer; }
        .on-request { color: var(--red); font-size: 0.65rem; font-weight: 900; margin-left: 5px; }
        
        .stop-info-text { font-size: 0.75rem; color: #666; display: block; margin-top: 5px; border-top: 1px dashed #eee; padding-top: 5px; font-weight: 500; }
        
        .hours-box { background: var(--dark); color: white; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity:0; transform: translateY(-5px); } to { opacity:1; transform: translateY(0); } }
        .hour-pill { background: rgba(255,255,255,0.15); padding: 8px 12px; border-radius: 5px; display: inline-block; margin: 3px; font-weight: 700; font-size: 1.1rem; }

        /* NOWE SEKCJĘ TREŚCI */
        .content-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); line-height: 1.6; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; cursor: pointer; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        nav div.active { color: var(--mzk); }
        nav i { font-size: 1.2rem; margin-bottom: 3px; }

        /* ADMIN */
        .adm-btn { background: var(--dark); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        .stop-edit-item { background: #f1f1f1; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .admin-item { background: white; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header id="main-header">MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"><div id="lines-render"></div></div>
    
    <div id="s-vars" class="section">
        <button onclick="show('home')" style="border:none;background:none;font-weight:900;color:var(--red);padding:10px 0;">← POWRÓT</button>
        <div id="vars-render"></div>
    </div>

    <div id="s-tt" class="section">
        <button id="btn-back-vars" style="border:none;background:none;font-weight:900;color:var(--red);padding:10px 0;">← POWRÓT</button>
        <div id="tt-header-render"></div>
        <div id="tt-stops-render"></div>
    </div>

    <div id="s-map" class="section"><iframe id="map-frame" style="width:100%;height:500px;border:none;border-radius:15px;background:#eee;"></iframe></div>

    <div id="s-info" class="section">
        <h2 style="margin-bottom:15px;">Informacje</h2>
        <div id="info-content-user" class="content-box">Brak informacji.</div>
    </div>

    <div id="s-contact" class="section">
        <h2 style="margin-bottom:15px;">Kontakt</h2>
        <div id="contact-content-user" class="content-box">Brak danych kontaktowych.</div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-auth">
            <input type="password" id="adm-pass" placeholder="Hasło" style="text-align:center;">
            <button onclick="login()" class="adm-btn">ZALOGUJ</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <div style="display:flex; gap:3px; margin-bottom:15px; flex-wrap: wrap;">
                <button onclick="tab('l')" class="adm-btn" style="flex:1; min-width:80px">LINIE</button>
                <button onclick="tab('p')" class="adm-btn" style="flex:1; min-width:80px">PRZYSTANKI</button>
                <button onclick="tab('d')" class="adm-btn" style="flex:1; min-width:80px; background:var(--mzk)">DANE</button>
            </div>
            
            <div id="t-l">
                <button onclick="openLineEditor(-1)" class="adm-btn" style="background:#444">+ NOWA LINIA</button>
                <div id="adm-lines-list"></div>
            </div>

            <div id="t-p" style="display:none;">
                <button onclick="openStopEditor(-1)" class="adm-btn" style="background:#444">+ NOWY OPIS</button>
                <div id="adm-stops-list"></div>
            </div>

            <div id="t-d" style="display:none;">
                <label>Link do mapy (Google Maps Iframe):</label>
                <input type="text" id="map-url" placeholder="URL">
                
                <label>Treść strony Informacje:</label>
                <textarea id="adm-info-text" style="height:100px;" placeholder="Wpisz ogólne komunikaty..."></textarea>
                
                <label>Treść strony Kontakt:</label>
                <textarea id="adm-contact-text" style="height:100px;" placeholder="Dane kontaktowe, telefony..."></textarea>
                
                <button onclick="saveSettings()" class="adm-btn" style="background:var(--mzk)">ZAPISZ USTAWIENIA</button>
                <hr style="margin:15px 0; opacity:0.2">
                <button onclick="exportDB()" class="adm-btn">EKSPORT BAZY</button>
                <input type="file" id="importFile" style="display:none" onchange="importDB(event)">
                <button onclick="document.getElementById('importFile').click()" class="adm-btn">IMPORT BAZY</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('map')" id="n-map"><i class="fa-solid fa-map"></i><span>Mapa</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-circle-info"></i><span>Info</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-phone"></i><span>Kontakt</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<div id="m-line-editor" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h3>EDYCJA LINII</h3>
    <input type="text" id="le-num" placeholder="Numer">
    <input type="text" id="le-dir" placeholder="Kierunek">
    <select id="le-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="le-hours" placeholder="Godziny z pętli (np. 08:00, 08:30)"></textarea>
    <div id="le-stops-container"></div>
    <button onclick="addStopRow()" class="adm-btn" style="background:#666">+ DODAJ PRZYSTANEK</button>
    <button onclick="saveLine()" class="adm-btn" style="background:var(--mzk)">ZAPISZ LINIĘ</button>
    <button onclick="closeModal()" style="color:red;border:none;background:none;width:100%;font-weight:800; margin-top:10px;">ANULUJ</button>
</div>

<div id="m-stop-editor" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;">
    <h3>OPIS PRZYSTANKU</h3>
    <input type="text" id="se-name" placeholder="Nazwa przystanku">
    <textarea id="se-desc" placeholder="Opis / Informacje" style="height:150px;"></textarea>
    <button onclick="saveStopDesc()" class="adm-btn">ZAPISZ OPIS</button>
    <button onclick="closeModal()" style="color:red;border:none;background:none;width:100%;font-weight:800; margin-top:10px;">ANULUJ</button>
</div>

<script>
    // Inicjalizacja bazy z obsługą nowych pól
    let db = JSON.parse(localStorage.getItem('MZK_V9')) || { 
        lines: [], 
        stops: [], 
        map: "", 
        contact: "Dane kontaktowe MZK...", 
        infoText: "Aktualne komunikaty..." 
    };
    let tempRoute = [];
    let curIdx = -1;

    function sync() { 
        localStorage.setItem('MZK_V9', JSON.stringify(db)); 
        render(); 
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        
        if(id==='map') document.getElementById('map-frame').src = db.map;
        if(id==='info') document.getElementById('info-content-user').innerHTML = db.infoText.replace(/\n/g, '<br>');
        if(id==='contact') document.getElementById('contact-content-user').innerHTML = db.contact.replace(/\n/g, '<br>');
        
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
        window.scrollTo(0,0);
    }

    function render() {
        // Renderowanie listy linii
        const lr = document.getElementById('lines-render'); lr.innerHTML = '';
        const unique = [...new Set(db.lines.map(l => l.num))].sort((a,b)=>a-b);
        unique.forEach(num => {
            const first = db.lines.find(lx => lx.num === num);
            lr.innerHTML += `<div class="line-item ${first.type==='tram'?'tram':''}" onclick="openVars('${num}')"><b>LINIA ${num}</b> <i class="fa-solid fa-chevron-right"></i></div>`;
        });

        // Panel Admina - Linie
        const al = document.getElementById('adm-lines-list'); al.innerHTML = '';
        db.lines.forEach((l, i) => {
            al.innerHTML += `<div class="admin-item" onclick="openLineEditor(${i})"><span>${l.num} -> ${l.dir}</span> <button onclick="event.stopPropagation(); deleteLine(${i})" style="background:red;color:white;border:none;padding:5px;border-radius:5px">USUŃ</button></div>`;
        });

        // Panel Admina - Przystanki
        const as = document.getElementById('adm-stops-list'); as.innerHTML = '';
        db.stops.forEach((s, i) => {
            as.innerHTML += `<div class="admin-item" onclick="openStopEditor(${i})"><span>${s.name}</span> <button onclick="event.stopPropagation(); deleteStop(${i})" style="background:red;color:white;border:none;padding:5px;border-radius:5px">USUŃ</button></div>`;
        });

        // Wypełnienie pól edycji ustawień w Adminie
        document.getElementById('map-url').value = db.map || "";
        document.getElementById('adm-info-text').value = db.infoText || "";
        document.getElementById('adm-contact-text').value = db.contact || "";
    }

    // Funkcja zapisu Mapy, Info i Kontaktu naraz
    function saveSettings() {
        db.map = document.getElementById('map-url').value;
        db.infoText = document.getElementById('adm-info-text').value;
        db.contact = document.getElementById('adm-contact-text').value;
        sync();
        alert("Ustawienia zostały zapisane!");
    }

    // --- ROZKŁAD ---
    function openVars(num) {
        show('vars');
        const vr = document.getElementById('vars-render');
        vr.innerHTML = `<h3>KIERUNKI LINII ${num}</h3>`;
        db.lines.filter(l => l.num === num).forEach(l => {
            vr.innerHTML += `<div class="line-item" onclick="renderStops(${db.lines.indexOf(l)})">${l.dir}</div>`;
        });
    }

    function renderStops(idx) {
        show('tt');
        const l = db.lines[idx];
        document.getElementById('btn-back-vars').onclick = () => openVars(l.num);
        document.getElementById('tt-header-render').innerHTML = `<div class="tt-header ${l.type==='tram'?'tram':''}"><h1>${l.num}</h1><p>${l.dir}</p></div>`;
        
        const container = document.getElementById('tt-stops-render');
        container.innerHTML = '';
        
        let cumulative = 0;
        l.route.forEach((s, si) => {
            cumulative += s.time;
            const sInfo = db.stops.find(gs => gs.name.toLowerCase() === s.name.toLowerCase());
            
            const div = document.createElement('div');
            div.className = 'stop-row';
            div.innerHTML = `
                <span style="float:right; font-weight:900; color:var(--mzk)">+${cumulative} min</span>
                <b>${s.name}</b> ${s.req ? '<span class="on-request">(NŻ)</span>' : ''}
                ${sInfo ? `<span class="stop-info-text">${sInfo.desc}</span>` : ''}
                <div class="hours-box" id="hb-${si}"></div>
            `;
            div.onclick = () => toggleH(si, l.hours, cumulative);
            container.appendChild(div);
        });
    }

    function toggleH(si, hours, off) {
        const box = document.getElementById('hb-'+si);
        if(box.style.display === 'block') { box.style.display = 'none'; return; }
        document.querySelectorAll('.hours-box').forEach(b => b.style.display = 'none');
        let htm = '';
        hours.split(',').forEach(h => {
            let [hh, mm] = h.trim().split(':').map(Number);
            let d = new Date(); d.setHours(hh, mm + off);
            htm += `<span class="hour-pill">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        });
        box.innerHTML = htm; box.style.display = 'block';
    }

    // --- ADMIN FUNKCJE ---
    function openLineEditor(idx) {
        curIdx = idx;
        if(idx === -1) {
            document.getElementById('le-num').value=''; document.getElementById('le-dir').value='';
            document.getElementById('le-hours').value=''; tempRoute = [];
        } else {
            const l = db.lines[idx];
            document.getElementById('le-num').value=l.num; document.getElementById('le-dir').value=l.dir;
            document.getElementById('le-type').value=l.type; document.getElementById('le-hours').value=l.hours;
            tempRoute = JSON.parse(JSON.stringify(l.route));
        }
        renderEditStops();
        document.getElementById('m-line-editor').style.display='block';
    }

    function addStopRow() { tempRoute.push({ name: "", time: 1, req: false }); renderEditStops(); }

    function renderEditStops() {
        const c = document.getElementById('le-stops-container'); c.innerHTML = '';
        tempRoute.forEach((s, i) => {
            c.innerHTML += `
                <div class="stop-edit-item">
                    <input type="text" placeholder="Nazwa" value="${s.name}" onchange="tempRoute[${i}].name=this.value">
                    <div style="display:flex; gap:5px; align-items:center; margin-top:5px;">
                        + <input type="number" value="${s.time}" style="width:50px" onchange="tempRoute[${i}].time=parseInt(this.value)"> min
                        <label><input type="checkbox" ${s.req?'checked':''} onchange="tempRoute[${i}].req=this.checked"> NŻ</label>
                        <button onclick="move(${i},-1)">↑</button><button onclick="move(${i},1)">↓</button>
                        <button onclick="tempRoute.splice(${i},1);renderEditStops()" style="background:red;color:white;border:none; padding:5px; border-radius:5px">X</button>
                    </div>
                </div>`;
        });
    }

    function move(idx, d) {
        let t = idx+d; if(t<0 || t>=tempRoute.length) return;
        let x = tempRoute[idx]; tempRoute[idx] = tempRoute[t]; tempRoute[t] = x;
        renderEditStops();
    }

    function saveLine() {
        const l = { num: document.getElementById('le-num').value, dir: document.getElementById('le-dir').value, type: document.getElementById('le-type').value, hours: document.getElementById('le-hours').value, route: tempRoute };
        if(curIdx===-1) db.lines.push(l); else db.lines[curIdx]=l;
        sync(); closeModal();
    }

    function openStopEditor(idx) {
        curIdx = idx;
        if(idx===-1) { document.getElementById('se-name').value=''; document.getElementById('se-desc').value=''; }
        else { document.getElementById('se-name').value=db.stops[idx].name; document.getElementById('se-desc').value=db.stops[idx].desc; }
        document.getElementById('m-stop-editor').style.display='block';
    }

    function saveStopDesc() {
        const s = { name: document.getElementById('se-name').value, desc: document.getElementById('se-desc').value };
        if(curIdx===-1) db.stops.push(s); else db.stops[curIdx]=s;
        sync(); closeModal();
    }

    function deleteLine(i) { if(confirm("Usunąć linię?")) { db.lines.splice(i,1); sync(); } }
    function deleteStop(i) { if(confirm("Usunąć opis?")) { db.stops.splice(i,1); sync(); } }
    function login() { if(document.getElementById('adm-pass').value==='123') { document.getElementById('adm-auth').style.display='none'; document.getElementById('adm-panel').style.display='block'; } }
    function tab(id) { ['l','p','d'].forEach(t => document.getElementById('t-'+t).style.display = (t===id?'block':'none')); }
    function closeModal() { document.getElementById('m-line-editor').style.display='none'; document.getElementById('m-stop-editor').style.display='none'; }
    function exportDB() { const b=new Blob([JSON.stringify(db)],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='mzk_baza.txt'; a.click(); }
    function importDB(e) { const r=new FileReader(); r.onload=function(){ db=JSON.parse(r.result); sync(); }; r.readAsText(e.target.files[0]); }

    sync();
</script>
</body>
</html>
