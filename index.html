<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: env(safe-area-inset-bottom, 100px);
            overflow-x: hidden;
        }

        /* Mobile Optimization */
        .line-square:active, .app-card:active, .main-btn:active { transform: scale(0.97); opacity: 0.9; }

        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; transition: 0.2s; }
        .line-square.bus { border-bottom: 4px solid var(--accent); }
        .line-square.tram { border-bottom: 4px solid var(--danger); }
        
        /* Locked Category Style */
        .line-square.is-locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); border-bottom-color: #333 !important; }
        .line-square.is-locked::after { content: '\f023'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; top: 5px; right: 8px; font-size: 0.7rem; color: var(--warn); }

        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .news-date { font-size: 0.7rem; color: var(--accent); font-weight: 700; }
        .news-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; }
        .tag-utrudnienia { background: rgba(255, 72, 66, 0.2); color: var(--danger); }
        .tag-rozklad { background: rgba(0, 171, 85, 0.2); color: var(--accent); }
        .tag-info { background: rgba(24, 144, 255, 0.2); color: var(--info); }

        .search-box { width: 100%; padding: 16px; border-radius: 15px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 15px; font-family: inherit; font-size: 16px; }
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 12px; }
        .tt-time { background: var(--accent); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 0.95rem; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: 800; }
        .nearby-info { color: var(--warn); font-size: 0.75rem; margin-top: 3px; font-weight: 400; opacity: 0.9; }
        .stop-lines-row { display: flex; flex-wrap: wrap; align-items: center; margin-top: 8px; color: var(--text-sec); font-size: 0.85rem; }
        .stop-line-item { display: inline-flex; align-items: center; gap: 4px; }
        .stop-line-item i { font-size: 0.75rem; color: var(--accent); }
        .stop-line-item.is-tram i { color: var(--danger); }
        .spacer { white-space: pre; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; font-size: 16px; }
        
        .adm-nav-main { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.55rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        
        .adm-stop-card { background: #1c252e; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #333; position: relative; }
        .adm-stop-card.is-nz { border-left-color: var(--danger); }
        .adm-stop-card .del-stop { position: absolute; top: 15px; right: 15px; color: var(--danger); cursor: pointer; }
        
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; -webkit-overflow-scrolling: touch; }
        .bulk-area { background: #000; border: 1px dashed var(--accent); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>

    <div id="s-stops" class="section">
        <div class="group-label">Szukaj Przystanku</div>
        <input type="text" id="stop-search" class="search-box" placeholder="Nazwa przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-news" class="section">
        <div class="group-label">Komunikaty</div>
        <div id="public-news-list"></div>
    </div>

    <div id="s-contact" class="section">
        <div class="group-label">Informacje o MZK</div>
        <div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div>
    </div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333; margin-top:20px;">Wróć do linii</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333; margin-top:20px;">Wróć do kierunków</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło panelu" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
                <button onclick="setTab('z')" id="mt-z">ZAAW</button>
            </div>
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineForm(-1)" class="main-btn">Dodaj nową linię</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:200px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz tekst</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportFullBackup()" class="main-btn">Eksportuj wszystko</button><input type="file" id="importFile" style="display:none" onchange="importFullBackup(event)"><button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj z pliku</button></div>
            
            <div id="tab-z" class="adm-tab" style="display:none;">
                <div class="group-label">Kategorie Strony Głównej</div>
                <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:15px;">
                    <div id="adm-cats-list"></div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <input type="text" id="new-cat-name" placeholder="Nowa kategoria..." style="margin:0;">
                        <button onclick="addCategory()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:12px; font-weight:700;">Dodaj</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-cat" class="overlay-form">
    <h2>Edycja Kategorii</h2>
    <div class="group-label">Nazwa kategorii:</div>
    <input type="text" id="fc-name">
    <div style="display:flex; align-items:center; background:rgba(255, 72, 66, 0.1); padding:15px; border-radius:14px; margin-bottom:20px; border:1px solid rgba(255, 72, 66, 0.2);">
        <input type="checkbox" id="fc-locked" style="width:25px; height:25px; margin-right:12px;">
        <label for="fc-locked" style="font-weight:700; color:var(--danger);">ZABLOKUJ (SEZONOWA)</label>
    </div>
    <div class="group-label">Wybierz linie:</div>
    <div id="fc-lines-list" style="max-height: 300px; overflow-y: auto; background: #1c252e; padding: 15px; border-radius: 14px; margin-bottom:20px;"></div>
    <button onclick="saveCategoryEdit()" class="main-btn">Zapisz zmiany</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-line" class="overlay-form">
    <h2>Linia</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek docelowy">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-hours" placeholder="Godziny (np. 08:10, 08:40)"></textarea>
    <div class="bulk-area">
        <textarea id="fl-bulk" placeholder="Szybkie wklejanie przystanków..." style="height:60px"></textarea>
        <button onclick="convertBulk()" class="main-btn" style="padding:8px; font-size:0.8rem; background:#333;">Konwertuj</button>
    </div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <h2>Komunikat</h2>
    <input type="text" id="fn-title" placeholder="Tytuł">
    <select id="fn-cat"><option value="info">Informacja</option><option value="utrudnienia">Utrudnienia</option><option value="rozklad">Zmiana rozkładu</option></select>
    <textarea id="fn-content" style="height:200px" placeholder="Treść..."></textarea>
    <button onclick="saveNews()" class="main-btn">Dodaj news</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {}, lineCategories: ["Tramwaje", "Autobusy"], lockedCategories: [] };
    let curLineIdx = -1, curNewsIdx = -1, curCatIdx = -1, allAutoStops = [];

    function init() {
        const local = localStorage.getItem('mzk_v14_final');
        if(local) {
            db = JSON.parse(local);
            if(!db.lockedCategories) db.lockedCategories = [];
            if(!db.stopDetails) db.stopDetails = {};
            repairAllLines();
        }
        extractStops();
        render();
    }

    function cleanStopName(n) {
        let nz = false; const patterns = [/ nż\./gi, / nż/gi, / \(nż\)/gi, /nż\./gi];
        patterns.forEach(p => { if(p.test(n)) { nz = true; n = n.replace(p, ""); } });
        return { name: n.trim(), isNz: nz };
    }

    function repairAllLines() { 
        db.lines.forEach(l => { 
            if (typeof l.stops === 'string') { 
                l.stops = l.stops.split('\n').filter(s => s.trim() !== "").map((s, i) => { 
                    const info = cleanStopName(s); 
                    return { name: info.name, time: (i === 0 ? 0 : 2), nz: info.isNz }; 
                }); 
            } 
        }); 
    }

    function save() { localStorage.setItem('mzk_v14_final', JSON.stringify(db)); extractStops(); render(); }

    function extractStops() { 
        let sSet = new Set(); 
        db.lines.forEach(l => l.stops?.forEach(s => {
            sSet.add(s.name);
            if(!db.stopDetails[s.name]) db.stopDetails[s.name] = {nearby:"", isNz: s.nz};
        })); 
        allAutoStops = [...sSet].sort(); 
    }

    function render() {
        const sHome = document.getElementById('s-home');
        sHome.innerHTML = '';
        
        db.lineCategories.forEach(cat => {
            const linesInCat = db.lines.filter(l => l.category === cat);
            const isLocked = db.lockedCategories.includes(cat);
            if (linesInCat.length > 0) {
                sHome.innerHTML += `<div class="group-label">${isLocked ? '🔒 ' : ''}${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(linesInCat.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = linesInCat.find(x => x.num === num);
                    const div = document.createElement('div'); 
                    div.className = `line-square ${l.type} ${isLocked ? 'is-locked' : ''}`; 
                    div.innerText = num;
                    if(!isLocked) div.onclick = () => openVariants(num); 
                    grid.appendChild(div);
                });
                sHome.appendChild(grid);
            }
        });

        // Newsy
        document.getElementById('public-news-list').innerHTML = db.news.length ? db.news.map(n => `
            <div class="app-card news-card" style="display:block">
                <div class="news-header"><span class="news-date">${n.date}</span><span class="news-tag tag-${n.cat}">${n.cat}</span></div>
                <b>${n.title}</b><div style="font-size:0.85rem; color:var(--text-sec); margin-top:5px">${n.content}</div>
            </div>`).reverse().join('') : '<p style="text-align:center">Brak komunikatów.</p>';

        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})" style="color:var(--accent); background:none; border:none; font-weight:800;">EDYTUJ</button></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact;
        renderCategoriesAdmin();
        filterStops();
        renderAdminStops();
    }

    function renderCategoriesAdmin() {
        document.getElementById('adm-cats-list').innerHTML = db.lineCategories.map((c, i) => `
            <div class="app-card" style="padding:10px; margin-bottom:5px;">
                <span>${db.lockedCategories.includes(c) ? '🔒 ' : ''}${c}</span>
                <div>
                    <button onclick="openCatForm(${i})" style="color:var(--accent); background:none; border:none; font-weight:800; margin-right:10px;">EDYTUJ</button>
                    <button onclick="deleteCategory(${i})" style="color:var(--danger); background:none; border:none; font-weight:800;">USUŃ</button>
                </div>
            </div>`).join('');
    }

    function openCatForm(idx) {
        curCatIdx = idx;
        const name = db.lineCategories[idx];
        document.getElementById('fc-name').value = name;
        document.getElementById('fc-locked').checked = db.lockedCategories.includes(name);
        document.getElementById('fc-lines-list').innerHTML = db.lines.map((l, i) => `
            <div style="margin-bottom:10px; display:flex; align-items:center;">
                <input type="checkbox" id="lchk-${i}" ${l.category === name ? 'checked' : ''} style="width:22px; height:22px; margin-right:10px;">
                <label for="lchk-${i}">${l.num} - ${l.dir}</label>
            </div>`).join('');
        document.getElementById('form-cat').style.display = 'block';
    }

    function saveCategoryEdit() {
        const newName = document.getElementById('fc-name').value.trim();
        const isLocked = document.getElementById('fc-locked').checked;
        const oldName = db.lineCategories[curCatIdx];
        db.lineCategories[curCatIdx] = newName;
        db.lockedCategories = db.lockedCategories.filter(n => n !== oldName);
        if(isLocked) db.lockedCategories.push(newName);
        db.lines.forEach((l, i) => {
            const chk = document.getElementById(`lchk-${i}`);
            if(chk?.checked) l.category = newName;
            else if(l.category === oldName) l.category = "";
        });
        save(); closeForms();
    }

    function openVariants(num) { 
        show('vars'); 
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.in
