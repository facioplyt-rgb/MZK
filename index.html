<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .line-badge { background: var(--accent); color: white; padding: 6px 14px; border-radius: 12px; font-weight: 800; min-width: 60px; text-align: center; font-size: 1.1rem; }
        .tram-badge { background: var(--danger); }
        .search-box { width: 100%; padding: 15px; border-radius: 15px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 15px; font-family: inherit; }
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 12px; }
        .tt-time { background: var(--accent); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 0.95rem; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: 800; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        .adm-nav-main { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        .stop-edit-item { background: #1c252e; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 60px 50px 40px; gap: 10px; align-items: center; }
        .stop-edit-item input { margin: 0; padding: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div class="group-label">Tramwaje</div><div id="lines-tram"></div>
        <div class="group-label">Autobusy</div><div id="lines-bus"></div>
    </div>
    <div id="s-stops" class="section">
        <div class="group-label">Znajdź przystanek</div>
        <input type="text" id="stop-search" class="search-box" placeholder="Szukaj nazwy..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section">
        <div class="group-label">Komunikaty</div>
        <div id="public-news-list"></div>
    </div>
    <div id="s-contact" class="section">
        <div class="group-label">Kontakt</div>
        <div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div>
    </div>
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Nowy news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportData()" class="main-btn">Eksportuj Baza.txt</button><input type="file" id="importFile" style="display:none" onchange="importData(event)"><button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj Baza.txt</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h2>Zarządzaj Linią</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="fl-hours" placeholder="Godziny: 05:00, 05:30..."></textarea>
    
    <div class="group-label">Przystanki tej linii:</div>
    <div id="fl-stops-list"></div>
    <button onclick="addLineStop()" class="main-btn" style="background:#444">+ Dodaj Przystanek</button>
    
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Wróć</button>
</div>

<div id="form-stop-status" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:4000;display:none;padding:20px;">
    <h2 id="edit-stop-name">Status Przystanku</h2>
    <div class="app-card" style="margin-top:20px; display:block;">
        <label style="display:flex; align-items:center; gap:10px; cursor:pointer;"><input type="checkbox" id="fs-nz" style="width:25px; height:25px; margin:0;"> <b>Na żądanie (NŻ)</b></label>
    </div>
    <textarea id="fs-near" placeholder="np. Sklep Spożywczy..."></textarea>
    <button onclick="saveStopStatus()" class="main-btn">Zapisz</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-news" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h2>Komunikat</h2>
    <input type="text" id="fn-title" placeholder="Tytuł"><textarea id="fn-content" style="height:200px;"></textarea>
    <select id="fn-lvl"><option value="info">Info</option><option value="warn">Ważne</option><option value="alert">Pilne</option></select>
    <button onclick="saveNews()" class="main-btn">Zapisz</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Wróć</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {} };
    let curIdx = -1;
    let editingStopName = "";
    let allAutoStops = [];

    function init() {
        const local = localStorage.getItem('mzk_v20_db');
        if(local) db = JSON.parse(local);
        if(!db.stopDetails) db.stopDetails = {};
        extractStops();
        render();
    }

    function save() { localStorage.setItem('mzk_v20_db', JSON.stringify(db)); extractStops(); render(); }

    function extractStops() {
        let stopsSet = new Set();
        db.lines.forEach(l => {
            if(Array.isArray(l.stops)) {
                l.stops.forEach(s => stopsSet.add(s.name));
            }
        });
        allAutoStops = [...stopsSet].sort();
    }

    function render() {
        const busC = document.getElementById('lines-bus'); const tramC = document.getElementById('lines-tram');
        busC.innerHTML = ''; tramC.innerHTML = '';
        const uniqueNums = [...new Set(db.lines.map(l => l.num))].sort((a,b)=>a-b);
        uniqueNums.forEach(num => {
            const l = db.lines.find(x => x.num === num);
            const div = document.createElement('div'); div.className = 'app-card';
            div.innerHTML = `<span><span class="line-badge ${l.type==='tram'?'tram-badge':''}">${num}</span><b> Wybierz kierunek...</b></span><i class="fa-solid fa-chevron-right"></i>`;
            div.onclick = () => openVariants(num);
            if(l.type === 'tram') tramC.appendChild(div); else busC.appendChild(div);
        });
        filterStops();
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})" style="color:var(--accent); background:none; border:none; font-weight:800;">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-news-list').innerHTML = db.news.map((n, i) => `<div class="app-card"><span>${n.title}</span><button onclick="openNewsForm(${i})" style="color:var(--accent); background:none; border:none; font-weight:800;">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-stops-list').innerHTML = allAutoStops.map(s => `<div class="app-card"><span>${s} ${db.stopDetails[s]?.nz?'<span class="nz-badge">NŻ</span>':''}</span><button onclick="openStopStatusForm('${s}')" style="color:var(--accent); background:none; border:none; font-weight:800;">STATUS</button></div>`).join('');
        document.getElementById('public-news-list').innerHTML = db.news.map(n => `<div class="app-card" style="display:block; border-left: 5px solid ${n.lvl==='alert'?'#ff4842':n.lvl==='warn'?'#feca05':'#00ab55'}"><b>${n.title}</b><p style="font-size:0.9rem; margin-top:5px;">${n.content}</p></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact;
    }

    function openLineForm(idx) {
        curIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num;
        document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-hours').value = l.hours;
        
        // Konwersja starych przystanków (tekstowych) na tablicę jeśli trzeba
        let stopArray = Array.isArray(l.stops) ? l.stops : [];
        if(!Array.isArray(l.stops) && typeof l.stops === 'string') {
            stopArray = l.stops.split('\n').filter(s=>s.trim()).map((s, i) => {
                let [name, time] = s.split('|');
                return { name: name.trim(), time: parseInt(time) || (i===0?0:2), nz: name.includes('nż.') };
            });
        }
        
        renderLineStopsEdit(stopArray);
        document.getElementById('form-line').style.display = 'block';
    }

    function renderLineStopsEdit(stops) {
        const container = document.getElementById('fl-stops-list');
        container.innerHTML = stops.map((s, i) => `
            <div class="stop-edit-item">
                <input type="text" value="${s.name}" placeholder="Nazwa" class="edit-stop-name">
                <input type="number" value="${s.time}" placeholder="+min" class="edit-stop-time">
                <label style="font-size:0.6rem; text-align:center;">NŻ<br><input type="checkbox" ${s.nz?'checked':''} class="edit-stop-nz"></label>
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger); font-weight:800;">X</button>
            </div>
        `).join('');
    }

    function addLineStop() {
        const container = document.getElementById('fl-stops-list');
        const div = document.createElement('div');
        div.className = 'stop-edit-item';
        div.innerHTML = `
            <input type="text" placeholder="Nowy przystanek" class="edit-stop-name">
            <input type="number" value="1" placeholder="+min" class="edit-stop-time">
            <label style="font-size:0.6rem; text-align:center;">NŻ<br><input type="checkbox" class="edit-stop-nz"></label>
            <button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger); font-weight:800;">X</button>
        `;
        container.appendChild(div);
    }

    function saveLine() {
        const stopElems = document.querySelectorAll('.stop-edit-item');
        const stopsData = Array.from(stopElems).map(el => ({
            name: el.querySelector('.edit-stop-name').value,
            time: parseInt(el.querySelector('.edit-stop-time').value) || 0,
            nz: el.querySelector('.edit-stop-nz').checked
        }));

        const data = {
            num: document.getElementById('fl-num').value,
            dir: document.getElementById('fl-dir').value,
            type: document.getElementById('fl-type').value,
            hours: document.getElementById('fl-hours').value,
            stops: stopsData
        };

        if(curIdx === -1) db.lines.push(data); else db.lines[curIdx] = data;
        save(); closeForms();
    }

    function renderTimetable(idx) {
        const line = db.lines[idx]; show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        
        let totalMinutes = 0;
        line.stops.forEach((stop, sIdx) => {
            totalMinutes += stop.time;
            const currentOffset = totalMinutes;
            
            // Globalne NŻ lub specyficzne dla linii
            const isNz = stop.nz || db.stopDetails[stop.name]?.nz;

            const card = document.createElement('div'); card.className = 'app-card'; card.style.display = 'block';
            card.innerHTML = `<div><b>${stop.name} ${isNz ? '(NŻ)' : ''}</b></div><div id="g-${sIdx}" class="tt-grid" style="display:none;"></div>`;
            
            card.onclick = () => {
                const g = document.getElementById(`g-${sIdx}`);
                const isV = g.style.display === 'grid'; g.style.display = isV ? 'none' : 'grid';
                if(!isV) {
                    g.innerHTML = line.hours.split(',').map(h => {
                        let [hh, mm] = h.trim().split(':').map(Number);
                        if(isNaN(hh)) return "";
                        let d = new Date(); 
                        d.setHours(hh, mm + currentOffset);
                        return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                    }).join('');
                }
            };
            body.appendChild(card);
        });
    }

    // Funkcje pomocnicze
    function openVariants(num) {
        const variants = db.lines.filter(l => String(l.num) === String(num));
        show('vars');
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        variants.forEach(v => {
            const d = document.createElement('div'); d.className = "app-card";
            d.innerHTML = `<b>${v.dir}</b> <i class="fa-solid fa-arrow-right"></i>`;
            d.onclick = () => renderTimetable(db.lines.indexOf(v));
            list.appendChild(d);
        });
    }
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
    }
    function setTab(t) {
        document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none');
        document.querySelectorAll('.adm-nav-main button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).style.display='block';
        document.getElementById('mt-'+t).classList.add('active');
    }
    function filterStops() {
        const query = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list');
        const filtered = allAutoStops.filter(s => s.toLowerCase().includes(query));
        list.innerHTML = filtered.map(s => `<div class="app-card" style="display:block;"><b>${s} ${db.stopDetails[s]?.nz?'<span class="nz-badge">NŻ</span>':''}</b></div>`).join('');
    }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('[id^="form-"]').forEach(f => f.style.display='none'); }
    function openStopStatusForm(name) { editingStopName = name; const det = db.stopDetails[name] || {nz:false}; document.getElementById('fs-nz').checked = det.nz; document.getElementById('form-stop-status').style.display='block'; }
    function saveStopStatus() { db.stopDetails[editingStopName] = { nz: document.getElementById('fs-nz').checked }; save(); closeForms(); }
    function exportData() { const blob = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mzk_baza.txt'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); alert("Wczytano!"); }; r.readAsText(e.target.files[0]); }
    function openNewsForm(idx) { curIdx = idx; const n = idx === -1 ? {title:"", content:"", lvl:"info"} : db.news[idx]; document.getElementById('fn-title').value = n.title; document.getElementById('fn-content').value = n.content; document.getElementById('form-news').style.display='block'; }
    function saveNews() { db.news[curIdx === -1 ? db.news.length : curIdx] = { title: document.getElementById('fn-title').value, content: document.getElementById('fn-content').value, lvl: document.getElementById('fn-lvl').value }; save(); closeForms(); }

    init();
</script>
</body>
</html>
