<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW V13 OMEGA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #00d166; /* Domyślny, nadpisywany w JS */
            --bg: #05080f; --surf: #101622; --surf-l: #1a2332; 
            --text: #ffffff; --text-m: #94a3b8; --tram: #ff4757; 
            --border: rgba(255,255,255,0.06); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; line-height: 1.5; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* === SCROLL PROGRESS === */
        #scroll-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 9999; width: 0%; transition: width 0.1s; box-shadow: 0 0 10px var(--accent); }

        /* === SPLASH SCREEN === */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--surf-l); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }

        /* === HEADER === */
        header { 
            background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .weather-badge { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 800; color: var(--accent); background: var(--surf-l); padding: 4px 10px; border-radius: 20px; }

        /* === DRAWER === */
        #drawer { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--surf); z-index: 3000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 25px; box-shadow: 30px 0 60px rgba(0,0,0,0.8); overflow-y: auto; }
        #drawer.open { left: 0; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2900; display:none; backdrop-filter: blur(5px); }

        .theme-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; }

        /* === UI ELEMENTS === */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .module { display: none; animation: fadeIn 0.4s ease; }
        .module.active { display: block; }

        .card { background: var(--surf); border-radius: 18px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.2s, border-color 0.2s; }
        .card.interactive { cursor: pointer; }
        .card.interactive:active { transform: scale(0.97); }

        .cat-label { font-size: 0.75rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin: 25px 5px 10px; display: flex; align-items: center; gap: 10px; }
        .cat-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .line-badge { width: 48px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; font-size: 1.1rem; flex-shrink: 0; background: linear-gradient(135deg, var(--accent) 0%, rgba(255,255,255,0.2) 100%); color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .bg-tram { background: linear-gradient(135deg, var(--tram) 0%, #c42936 100%); color: #fff; }

        .fav-btn { position: absolute; top: 15px; right: 15px; color: var(--text-m); font-size: 1.2rem; transition: 0.3s; z-index: 10; padding: 10px; margin: -10px; }
        .fav-btn.active { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); transform: scale(1.1); }

        .hour-row { display: flex; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .hour-label { width: 45px; font-weight: 900; color: var(--accent); font-size: 1.5rem; line-height: 1; }
        .minute-list { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; margin-left: 15px; }
        .time-pill { background: var(--surf-l); padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; border: 1px solid var(--border); color: #fff; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(16, 22, 34, 0.9); backdrop-filter: blur(20px); display: flex; height: 80px; border-top: 1px solid var(--border); z-index: 2000; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-m); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-tab.active { color: var(--accent); transform: translateY(-2px); }
        .nav-tab i { font-size: 1.4rem; margin-bottom: 6px; }

        input, select, textarea { width: 100%; padding: 16px; border-radius: 14px; background: rgba(0,0,0,0.2); color: #fff; border: 1px solid var(--border); margin-bottom: 12px; font-size: 1rem; transition: 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .btn { background: var(--accent); color: #000; padding: 16px; border: none; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; position: relative; overflow: hidden; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        #toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: var(--surf-l); border-left: 4px solid var(--accent); color: #fff; padding: 16px 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 600; font-size: 0.9rem; animation: slideDown 0.3s forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* RIPPLE EFFECT */
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple 0.6s linear; background-color: rgba(255, 255, 255, 0.3); pointer-events: none; }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>

    <div id="splash">
        <h1 style="font-size: 2.5rem; font-weight: 900; letter-spacing: 3px;">MZK <span style="color:var(--accent)">GORZÓW</span></h1>
        <div class="spinner"></div>
    </div>

    <div id="toast-container"></div>

    <header>
        <i class="fa-solid fa-bars-staggered" onclick="App.drawer(true)" style="font-size: 1.5rem; padding: 5px;"></i>
        <div style="text-align:center;">
            <h1 style="font-size: 1.1rem; font-weight: 900; letter-spacing: 2px;">MZK <span style="color:var(--accent)">GORZÓW</span></h1>
            <div style="font-size: 0.65rem; color: var(--text-m); font-weight: 800;" id="live-clock">--:--:--</div>
        </div>
        <div class="weather-badge" id="weather"><i class="fa-solid fa-cloud"></i> --°C</div>
    </header>

    <div id="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
            <h2 style="color: var(--accent); font-weight: 900;"><i class="fa-solid fa-compass"></i> MENU</h2>
            <i class="fa-solid fa-xmark" onclick="App.drawer(false)" style="font-size: 1.5rem;"></i>
        </div>
        
        <div class="cat-label" style="margin-top:0">Wybierz Motyw</div>
        <div style="display:flex; gap:15px; margin-bottom: 25px;">
            <div class="theme-btn" style="background:#00d166" onclick="App.setTheme('#00d166')"></div>
            <div class="theme-btn" style="background:#00a8ff" onclick="App.setTheme('#00a8ff')"></div>
            <div class="theme-btn" style="background:#9c88ff" onclick="App.setTheme('#9c88ff')"></div>
            <div class="theme-btn" style="background:#ffa502" onclick="App.setTheme('#ffa502')"></div>
        </div>

        <div onclick="App.switch('favs'); App.drawer(false)" style="padding: 15px 0; font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid var(--border);"><i class="fa-solid fa-heart" style="width: 30px; color: #ffd700"></i> Ulubione</div>
        <div onclick="App.switch('lines'); App.drawer(false)" style="padding: 15px 0; font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid var(--border);"><i class="fa-solid fa-route" style="width: 30px; color: var(--accent)"></i> Rozkłady Jazdy</div>
        <div onclick="App.switch('stops'); App.drawer(false)" style="padding: 15px 0; font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid var(--border);"><i class="fa-solid fa-map-pin" style="width: 30px; color: var(--accent)"></i> Przystanki</div>
        <div onclick="App.switch('news'); App.drawer(false)" style="padding: 15px 0; font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid var(--border);"><i class="fa-solid fa-bullhorn" style="width: 30px; color: var(--accent)"></i> Komunikaty</div>
        
        <div onclick="App.switch('admin'); App.drawer(false)" style="padding: 15px 0; font-weight: 600; font-size: 1.1rem; color:var(--text-m); margin-top:20px;"><i class="fa-solid fa-shield-halved" style="width: 30px;"></i> Panel Admina</div>
    </div>
    <div class="overlay" onclick="App.drawer(false)"></div>

    <div class="container">
        <div id="view-lines" class="module active"></div>
        <div id="view-stops" class="module">
            <div style="position:relative; margin-bottom: 20px;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:16px; top:18px; color:var(--text-m)"></i>
                <input type="text" placeholder="Szukaj Przystanku..." onkeyup="ModStops.filter(this.value)" style="padding-left: 45px;">
            </div>
            <div id="stops-container"></div>
        </div>
        <div id="view-news" class="module"></div>
        <div id="view-favs" class="module"></div>
        <div id="view-admin" class="module"></div>
        <div id="view-details" class="module"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-tab active" id="nav-lines" onclick="App.switch('lines')"><i class="fa-solid fa-bus-simple"></i><span>Linie</span></div>
        <div class="nav-tab" id="nav-stops" onclick="App.switch('stops')"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
        <div class="nav-tab" id="nav-favs" onclick="App.switch('favs')"><i class="fa-solid fa-heart"></i><span>Ulubione</span></div>
        <div class="nav-tab" id="nav-news" onclick="App.switch('news')"><i class="fa-solid fa-newspaper"></i><span>Info</span></div>
    </div>

    <script>
        // === RIPPLE EFFECT LOGIC ===
        document.addEventListener('click', function(e) {
            const target = e.target.closest('.interactive, .btn, .nav-tab');
            if (!target) return;
            const circle = document.createElement('span');
            const diameter = Math.max(target.clientWidth, target.clientHeight);
            const radius = diameter / 2;
            const rect = target.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            const ripple = target.querySelector('.ripple');
            if (ripple) ripple.remove();
            target.appendChild(circle);
        });

        // === SCROLL BAR ===
        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("scroll-progress").style.width = (winScroll / height) * 100 + "%";
        };

        // === OMEGA ENGINE ===
        window.App = {
            dbKey: 'Mzk_v12_pro',
            favs: JSON.parse(localStorage.getItem('mzk_favs')) || { lines: [], stops: [] },
            
            init() {
                const config = {
                    apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
                    authDomain: "mzk-by-facio.firebaseapp.com",
                    databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
                    projectId: "mzk-by-facio"
                };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();
                
                this.setTheme(localStorage.getItem('mzk_theme') || '#00d166');
                this.startClock();
                this.fetchWeather();
                this.sync();

                setTimeout(() => {
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash').remove(), 600);
                }, 1500);
            },
            setTheme(color) {
                document.documentElement.style.setProperty('--accent', color);
                localStorage.setItem('mzk_theme', color);
            },
            startClock() {
                setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pl-PL'); }, 1000);
            },
            fetchWeather() {
                fetch('https://api.open-meteo.com/v1/forecast?latitude=52.7368&longitude=15.2288&current_weather=true')
                .then(r => r.json()).then(d => {
                    document.getElementById('weather').innerHTML = `<i class="fa-solid fa-temperature-half"></i> ${Math.round(d.current_weather.temperature)}°C`;
                }).catch(()=>console.log("Błąd pogody"));
            },
            toast(msg, type = 'success') {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check':'fa-triangle-exclamation'}"></i> ${msg}`;
                c.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-20px)'; setTimeout(()=>t.remove(),300); }, 3000);
            },
            toggleFav(type, val, e) {
                if(e) e.stopPropagation();
                let arr = this.favs[type];
                if(arr.includes(val)) {
                    arr.splice(arr.indexOf(val), 1);
                    this.toast("Usunięto z ulubionych");
                } else {
                    arr.push(val);
                    this.toast("Dodano do ulubionych!");
                }
                localStorage.setItem('mzk_favs', JSON.stringify(this.favs));
                this.refresh();
            },
            sync() {
                this.db.ref(this.dbKey).on('value', snap => {
                    const data = snap.val() || {};
                    const rawLines = data.lines || [];
                    window.dbCache = { 
                        lines: (Array.isArray(rawLines) ? rawLines : Object.values(rawLines)).filter(l => l && l.num),
                        news: data.news || {} 
                    };
                    this.refresh();
                });
            },
            switch(id) {
                document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
                document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
                document.getElementById('view-'+id)?.classList.add('active');
                document.getElementById('nav-'+id)?.classList.add('active');
                this.refresh();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            refresh() {
                const active = document.querySelector('.module.active').id.replace('view-', '');
                if(active === 'lines') ModLines.render();
                if(active === 'stops') ModStops.render();
                if(active === 'news') ModNews.render();
                if(active === 'favs') ModFavs.render();
                if(active === 'admin') ModAdmin.render();
                
                // Aktualizacja ikonek serduszek w detalach
                document.querySelectorAll('.fav-btn').forEach(el => {
                    const val = el.dataset.val; const type = el.dataset.type;
                    if(val && type) {
                        el.className = `fav-btn fa-solid fa-heart ${this.favs[type].includes(val) ? 'active' : ''}`;
                    }
                });
            },
            drawer(show) {
                document.getElementById('drawer').classList.toggle('open', show);
                document.querySelector('.overlay').style.display = show ? 'block' : 'none';
            },
            calcTime(base, shift) {
                if(!base) return "00:00"; let [h, m] = base.split(':').map(Number);
                let d = new Date(); d.setHours(h, m + parseInt(shift || 0), 0);
                return d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
            }
        };

        // === MODUŁ LINII ===
        window.ModLines = {
            q: '',
            render() {
                let lines = window.dbCache.lines;
                if(this.q) lines = lines.filter(l => l.num.includes(this.q) || l.dir.toLowerCase().includes(this.q.toLowerCase()));
                
                let html = `<div style="position:relative; margin-bottom: 20px;"><i class="fa-solid fa-magnifying-glass" style="position:absolute; left:16px; top:18px; color:var(--text-m)"></i><input type="text" placeholder="Szukaj numeru / kierunku..." onkeyup="ModLines.search(this.value)" value="${this.q}" style="padding-left: 45px;"></div>`;
                
                const cats = [...new Set(lines.map(l => l.cat || 'Autobusy'))].sort();
                cats.forEach(cat => {
                    html += `<div class="cat-label">${cat}</div>`;
                    lines.filter(l => (l.cat || 'Autobusy') === cat).forEach(l => {
                        const idx = window.dbCache.lines.indexOf(l);
                        const isFav = App.favs.lines.includes(l.num);
                        html += `
                        <div class="card interactive" onclick="ModLines.showStops(${idx})" style="display:flex; align-items:center; gap:15px; padding-right:50px;">
                            <div class="line-badge ${l.type==='tram'?'bg-tram':''}">${l.num}</div>
                            <div style="flex:1; font-weight:800; font-size:1.1rem">${l.dir}</div>
                            <i class="fa-solid fa-heart fav-btn ${isFav?'active':''}" data-type="lines" data-val="${l.num}" onclick="App.toggleFav('lines', '${l.num}', event)"></i>
                        </div>`;
                    });
                });
                document.getElementById('view-lines').innerHTML = html;
            },
            search(v) { this.q = v; this.render(); },
            showStops(idx) {
                const l = window.dbCache.lines[idx];
                let html = `<button class="btn btn-outline" onclick="App.switch('lines')" style="margin-bottom:15px"><i class="fa-solid fa-arrow-left"></i> POWRÓT</button>
                    <div class="card" style="border-bottom: 4px solid var(--accent);">
                        <i class="fa-solid fa-heart fav-btn ${App.favs.lines.includes(l.num)?'active':''}" onclick="App.toggleFav('lines', '${l.num}', event)"></i>
                        <div style="display:flex; align-items:center; gap:15px">
                            <div class="line-badge ${l.type==='tram'?'bg-tram':''}">${l.num}</div>
                            <div><small style="font-weight:900; color:var(--accent)">KIERUNEK</small><h2 style="font-weight:900">${l.dir}</h2></div>
                        </div>
                    </div>`;
                (l.stops || []).forEach((s, sIdx) => {
                    html += `<div class="card interactive" onclick="ModLines.showTimetable(${idx}, ${sIdx})" style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:600;"><i class="fa-solid fa-location-dot" style="color:var(--accent); margin-right:10px"></i> ${s.name}</span>
                        <div style="text-align:right;"><span style="font-weight:800">${s.time}</span> <small style="opacity:0.5">min</small></div>
                    </div>`;
                });
                document.getElementById('view-details').innerHTML = html;
                App.switch('details');
            },
            showTimetable(lIdx, sIdx) {
                const l = window.dbCache.lines[lIdx];
                const s = l.stops[sIdx];
                const deps = (l.baseTimes || []).map(bt => App.calcTime(bt, s.time));
                let hourMap = {}; deps.forEach(t => { let [h, m] = t.split(':'); if(!hourMap[h]) hourMap[h] = []; hourMap[h].push(m); });

                let html = `<button class="btn btn-outline" onclick="ModLines.showStops(${lIdx})" style="margin-bottom:15px"><i class="fa-solid fa-arrow-left"></i> TRASA LINII</button>
                    <div class="card" style="background:var(--surf-l)">
                        <h2 style="font-weight:900;">${s.name}</h2>
                        <div style="font-weight:800; opacity:0.8; margin-top:5px;"><span style="color:var(--accent)">LINIA ${l.num}</span> • ${l.dir}</div>
                    </div><div class="card">`;
                
                Object.keys(hourMap).sort().forEach(h => {
                    html += `<div class="hour-row"><div class="hour-label">${h}</div><div class="minute-list">${hourMap[h].map(m => `<div class="time-pill">${m}</div>`).join('')}</div></div>`;
                });
                document.getElementById('view-details').innerHTML = html + `</div>`;
            }
        };

        // === MODUŁ PRZYSTANKÓW ===
        window.ModStops = {
            render() {
                let stopsMap = {};
                window.dbCache.lines.forEach(l => (l.stops || []).forEach(s => {
                    if(!stopsMap[s.name]) stopsMap[s.name] = new Set();
                    stopsMap[s.name].add(l.num);
                }));

                let html = '';
                Object.keys(stopsMap).sort().forEach(name => {
                    const isFav = App.favs.stops.includes(name);
                    html += `<div class="card interactive stop-item" onclick="ModStops.showBoard('${name}')" style="padding-right:50px;">
                        <div style="font-weight:800; font-size:1.1rem; color:var(--accent); margin-bottom:10px;">${name}</div>
                        <div style="display:flex; flex-wrap:wrap; gap:6px;">${Array.from(stopsMap[name]).map(n => `<span style="font-size:0.75rem; background: rgba(255,255,255,0.05); padding:4px 10px; border-radius:8px; border:1px solid var(--border); font-weight:600;">${n}</span>`).join('')}</div>
                        <i class="fa-solid fa-heart fav-btn ${isFav?'active':''}" data-type="stops" data-val="${name}" onclick="App.toggleFav('stops', '${name}', event)"></i>
                    </div>`;
                });
                document.getElementById('stops-container').innerHTML = html;
            },
            filter(v) {
                const q = v.toLowerCase();
                document.querySelectorAll('.stop-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none');
            },
            showBoard(name) {
                let deps = [];
                window.dbCache.lines.forEach(l => {
                    const sInfo = (l.stops || []).find(s => s.name === name);
                    if(sInfo) (l.baseTimes || []).forEach(bt => deps.push({ num: l.num, dir: l.dir, time: App.calcTime(bt, sInfo.time), type: l.type }));
                });
                deps.sort((a,b) => a.time.localeCompare(b.time));

                let html = `
                    <button class="btn btn-outline" onclick="App.switch('stops')" style="margin-bottom:15px"><i class="fa-solid fa-arrow-left"></i> WRÓĆ</button>
                    <div class="card" style="border-top: 5px solid var(--accent);">
                        <i class="fa-solid fa-heart fav-btn ${App.favs.stops.includes(name)?'active':''}" onclick="App.toggleFav('stops', '${name}', event)"></i>
                        <small style="font-weight:900; letter-spacing: 1px;"><i class="fa-solid fa-satellite-dish"></i> TABLICA ODJAZDÓW</small>
                        <h2 style="font-weight:900; font-size: 1.6rem; margin: 10px 0;">${name}</h2>
                        <a href="https://maps.google.com/?q=${name} przystanek Gorzów Wielkopolski" target="_blank" style="text-decoration:none;">
                            <button class="btn" style="padding: 10px; font-size:0.8rem; width:auto; background:var(--surf-l); color:#fff; border:1px solid var(--border)"><i class="fa-solid fa-map"></i> POKAŻ NA MAPIE</button>
                        </a>
                    </div><div class="card">`;
                
                deps.forEach((d, i) => {
                    html += `<div class="hour-row" style="align-items: center; ${i===0?'background: rgba(0,209,102,0.05); margin: -10px -18px 10px; padding: 16px 18px; border-bottom: 2px solid var(--accent);':''}">
                        <div style="font-weight:900; color:var(--accent); font-size:1.3rem; width: 70px; text-align: center;">${d.time}</div>
                        <div class="line-badge ${d.type==='tram'?'bg-tram':''}" style="width:38px; height:28px; font-size:0.85rem; margin: 0 15px;">${d.num}</div>
                        <div style="flex:1; font-weight:800;">${d.dir}</div>
                    </div>`;
                });
                document.getElementById('view-details').innerHTML = html + `</div>`;
                App.switch('details');
            }
        };

        // === MODUŁ ULUBIONE ===
        window.ModFavs = {
            render() {
                let html = `<h2 style="font-weight:900; margin-bottom:15px;"><i class="fa-solid fa-heart" style="color:#ffd700"></i> Twoje Ulubione</h2>`;
                
                if(App.favs.lines.length) {
                    html += `<div class="cat-label">ZAPISANE LINIE</div>`;
                    window.dbCache.lines.filter(l => App.favs.lines.includes(l.num)).forEach(l => {
                        const idx = window.dbCache.lines.indexOf(l);
                        html += `<div class="card interactive" onclick="ModLines.showStops(${idx})" style="display:flex; align-items:center; gap:15px;">
                            <div class="line-badge ${l.type==='tram'?'bg-tram':''}">${l.num}</div>
                            <div style="flex:1; font-weight:800;">${l.dir}</div>
                        </div>`;
                    });
                }
                
                if(App.favs.stops.length) {
                    html += `<div class="cat-label">ZAPISANE PRZYSTANKI</div>`;
                    App.favs.stops.forEach(name => {
                        html += `<div class="card interactive stop-item" onclick="ModStops.showBoard('${name}')">
                            <div style="font-weight:800; font-size:1.1rem; color:var(--accent);"><i class="fa-solid fa-map-pin"></i> ${name}</div>
                        </div>`;
                    });
                }

                if(!App.favs.lines.length && !App.favs.stops.length) {
                    html += `<div class="card" style="text-align:center; padding:40px; opacity:0.5;"><i class="fa-regular fa-heart" style="font-size:3rem; margin-bottom:15px;"></i><br>Kliknij serduszko przy linii lub przystanku, aby zapisać.</div>`;
                }
                document.getElementById('view-favs').innerHTML = html;
            }
        };

        // === MODUŁ NEWSÓW ===
        window.ModNews = {
            render() {
                const news = window.dbCache.news || {};
                const keys = Object.keys(news).reverse();
                let html = `<h2 style="font-weight:900; margin-bottom:15px;"><i class="fa-solid fa-bullhorn" style="color:var(--accent)"></i> Komunikaty</h2>`;
                keys.forEach(k => {
                    const n = news[k];
                    html += `<div class="card interactive" onclick="ModNews.show('${k}')" style="border-left: 5px solid ${n.type==='alert' ? 'var(--tram)' : 'var(--accent)'}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                            <small style="color:var(--text-m); font-weight:800">${n.date}</small>
                            ${n.type==='alert' ? '<small style="color:var(--tram); font-weight:900;"><i class="fa-solid fa-triangle-exclamation"></i> WAŻNE</small>' : ''}
                        </div>
                        <h3 style="font-weight:800; margin-bottom:8px;">${n.title}</h3>
                        <p style="font-size:0.85rem; color:var(--text-m); display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${n.content}</p>
                    </div>`;
                });
                document.getElementById('view-news').innerHTML = html || `<div class="card" style="text-align:center; opacity:0.5;">Brak komunikatów</div>`;
            },
            show(k) {
                const n = window.dbCache.news[k];
                document.getElementById('view-details').innerHTML = `
                    <button class="btn btn-outline" onclick="App.switch('news')" style="margin-bottom:15px"><i class="fa-solid fa-arrow-left"></i> WRÓĆ</button>
                    <div class="card" style="border-top: 5px solid ${n.type==='alert' ? 'var(--tram)' : 'var(--accent)'};">
                        <small style="color:var(--text-m); font-weight:600;">${n.date}</small>
                        <h2 style="margin:15px 0; font-weight:900;">${n.title}</h2>
                        <div style="line-height:1.8; font-size:1.05rem; white-space:pre-wrap;">${n.content}</div>
                    </div>`;
                App.switch('details');
            }
        };

        // === MODUŁ ADMINA ===
        window.ModAdmin = {
            isLogged: false,
            render() {
                if(!this.isLogged) {
                    document.getElementById('view-admin').innerHTML = `
                    <div class="card" style="text-align:center; padding: 40px 20px;">
                        <i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: var(--accent); margin-bottom: 20px;"></i>
                        <h2 style="font-weight:900; margin-bottom: 20px;">STREFA ADMINISTRATORA</h2>
                        <input type="password" id="pass" placeholder="HASŁO (123)" style="text-align:center; letter-spacing:3px; font-size:1.2rem;">
                        <button class="btn" onclick="ModAdmin.login()">ZALOGUJ</button>
                    </div>`;
                    return;
                }
                let h = `
                <div class="card" style="border-left: 5px solid var(--accent)">
                    <h3 style="font-weight:900; margin-bottom:15px;">NOWA LINIA</h3>
                    <input id="an" placeholder="Nr">
                    <input id="ad" placeholder="Kierunek">
                    <input id="ac" placeholder="Kategoria (np. Autobusy)">
                    <textarea id="at" rows="2" placeholder="Godziny startowe (np. 08:00, 08:30)"></textarea>
                    <textarea id="as" rows="3" placeholder="Przystanki (Nazwa|minuty) np. Pętla|0, Centrum|5"></textarea>
                    <button class="btn" onclick="ModAdmin.saveLine()">ZAPISZ LINIE</button>
                </div>
                <div class="card" style="border-left: 5px solid var(--tram)">
                    <h3 style="font-weight:900; margin-bottom:15px;">NOWY NEWS</h3>
                    <select id="ntype"><option value="info">Zwykłe Info</option><option value="alert">WAŻNY ALERT</option></select>
                    <input id="nt" placeholder="Tytuł">
                    <textarea id="nc" rows="3" placeholder="Treść"></textarea>
                    <button class="btn" onclick="ModAdmin.saveNews()">OPUBLIKUJ</button>
                </div>`;
                document.getElementById('view-admin').innerHTML = h;
            },
            login() { if(document.getElementById('pass').value === '123') { this.isLogged = true; App.toast("Zalogowano"); this.render(); } else App.toast("Błąd", "error"); },
            saveLine() {
                const n=document.getElementById('an').value, d=document.getElementById('ad').value, c=document.getElementById('ac').value, t=document.getElementById('at').value, s=document.getElementById('as').value;
                if(!n||!d||!t||!s) return App.toast("Uzupełnij pola!", "error");
                const bTimes = t.split(',').map(x=>x.trim());
                const stps = s.split(',').map(x=>{ const p=x.split('|'); return {name:p[0].trim(), time:parseInt(p[1])||0}; });
                let lines = window.dbCache.lines; lines.push({ num:n, dir:d, cat:c, baseTimes:bTimes, stops:stps, type:c.toLowerCase().includes('tram')?'tram':'bus' });
                App.db.ref(App.dbKey+'/lines').set(lines.filter(x=>x)).then(() => { App.toast("Linia dodana!"); this.render(); });
            },
            saveNews() {
                const t=document.getElementById('nt').value, c=document.getElementById('nc').value, type=document.getElementById('ntype').value;
                if(!t||!c) return App.toast("Uzupełnij pola!", "error");
                App.db.ref(App.dbKey+'/news').push({ title:t, content:c, type:type, date:new Date().toLocaleString('pl-PL') }).then(() => { App.toast("News dodany!"); this.render(); });
            }
        };

        App.init();
    </script>
</body>
</html>
