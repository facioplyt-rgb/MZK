<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #1a1a1a; --bg: #f0f2f5; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 100px; }
        
        header { background: var(--mzk); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--yellow); position: sticky; top: 0; z-index: 1000; font-weight: 900; text-transform: uppercase; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* KARTY */
        .type-title { font-size: 0.85rem; color: var(--mzk); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 800; border-left: 3px solid var(--yellow); padding-left: 8px; }
        .card { background: var(--white); padding: 18px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 6px solid var(--mzk); font-weight: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.tram { border-left-color: var(--red); }
        
        /* STOP BOX */
        .stop-box { background: var(--white); padding: 16px; margin-bottom: 8px; border-radius: 12px; border-left: 5px solid #cbd5e0; cursor: pointer; }
        .stop-box.is-nz { border-left-color: var(--red); }
        .grid { background: #2d3748; padding: 15px; display: none; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; border-radius: 0 0 12px 12px; margin: 12px -16px -16px -16px; }
        .h { background: rgba(255,255,255,0.1); color: white; padding: 8px; text-align: center; border-radius: 6px; font-size: 0.9rem; font-weight: 700; }

        /* ADMIN UI */
        .adm-btn { background: var(--dark); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .adm-card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        textarea, input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 2px solid #edf2f7; font-family: inherit; }

        /* NOWY SYSTEM EDYCJI CZASU */
        .stop-edit-row { display: flex; align-items: center; gap: 10px; background: #f9fafb; padding: 10px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #eee; }
        .stop-edit-row span { flex: 1; font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stop-edit-row input { width: 70px; margin-bottom: 0; padding: 5px; text-align: center; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; height: 75px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        nav div.active { color: var(--mzk); }
        nav i { font-size: 1.3rem; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="lines-tram-title" class="type-title" style="display:none;">Tramwaje</div>
        <div id="lines-tram"></div>
        <div id="lines-bus-title" class="type-title" style="display:none;">Autobusy</div>
        <div id="lines-bus"></div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="adm-btn" style="background:#666">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="adm-btn" style="background:#666">Wróć</button></div>

    <div id="s-map" class="section"><iframe id="map-frame" style="width:100%; height:60vh; border:none; border-radius:12px;"></iframe></div>
    <div id="s-info" class="section"><div id="info-content" class="adm-card" style="white-space:pre-wrap;"></div></div>
    <div id="s-contact" class="section"><div id="contact-content" class="adm-card" style="white-space:pre-wrap;"></div></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="adm-card" style="text-align:center;">
            <input type="password" id="pass" placeholder="HASŁO" style="text-align:center;">
            <button onclick="login()" class="adm-btn">ZALOGUJ</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button onclick="setTab('l')" class="adm-btn">Linie</button>
                <button onclick="setTab('s')" class="adm-btn" style="background:#666">System</button>
            </div>
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineModal(-1)" class="adm-btn" style="background:var(--mzk)">+ Dodaj Linię</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="tab-s" class="adm-tab" style="display:none;">
                <button onclick="exportData()" class="adm-btn">Eksport</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()" class="adm-btn" style="background:var(--red)">Import</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('map')" id="n-map"><i class="fa-solid fa-map"></i><span>Mapa</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-phone"></i><span>Kontakt</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="mod-line" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:15px;overflow-y:auto;">
    <h2 style="margin-bottom:15px;">Edycja Linii</h2>
    <input type="text" id="ml-num" placeholder="Nr (np. 100)">
    <input type="text" id="ml-dir" placeholder="Kierunek">
    <select id="ml-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="ml-hours" placeholder="Godziny: 05:10, 06:20..."></textarea>
    
    <div style="background:#eee; padding:10px; border-radius:8px; margin-bottom:10px;">
        <p style="font-weight:800; font-size:0.8rem; margin-bottom:5px;">KROK 1: WPISZ NAZWY PRZYSTANKÓW (po jednym w linii)</p>
        <textarea id="ml-stops-raw" placeholder="Nazwa 1&#10;Nazwa 2" oninput="generateStopInputs()"></textarea>
    </div>

    <div id="stop-inputs-container" style="margin-bottom:15px;">
        <p style="font-weight:800; font-size:0.8rem; margin-bottom:5px;">KROK 2: USTAW CZASY (+minuty od poprzedniego)</p>
        </div>

    <button onclick="saveLine()" class="adm-btn" style="background:var(--mzk)">ZAPISZ WSZYSTKO</button>
    <button onclick="closeModals()" class="adm-btn" style="background:none; color:red;">ANULUJ</button>
</div>

<script>
    let db = { lines: [], map: "", info: "", contact: "MZK" };
    let activeLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_vfinal_system');
        if(local) db = JSON.parse(local);
        render();
    }

    function generateStopInputs() {
        const container = document.getElementById('stop-inputs-container');
        const raw = document.getElementById('ml-stops-raw').value.split('\n').filter(s => s.trim());
        const oldData = {}; 
        
        // Zapamiętaj co już wpisano w inputy czasu
        document.querySelectorAll('.stop-time-input').forEach(inp => {
            oldData[inp.dataset.name] = inp.value;
        });

        container.innerHTML = '<p style="font-weight:800; font-size:0.8rem; margin-bottom:5px;">KROK 2: CZASY (+min)</p>';
        
        raw.forEach((name, i) => {
            const row = document.createElement('div');
            row.className = 'stop-edit-row';
            const val = (i === 0) ? "0" : (oldData[name] || "1");
            row.innerHTML = `
                <span>${name}</span>
                <input type="number" class="stop-time-input" data-name="${name}" value="${val}" ${i===0?'disabled':''}>
            `;
            container.appendChild(row);
        });
    }

    function saveLine() {
        const stopsRaw = document.getElementById('ml-stops-raw').value.split('\n').filter(s => s.trim());
        const timeInputs = document.querySelectorAll('.stop-time-input');
        
        // Łączymy nazwy z czasami do formatu "Nazwa | +X"
        let stopsFinal = stopsRaw.map((name, i) => {
            const time = timeInputs[i] ? timeInputs[i].value : "1";
            return `${name} | +${time}`;
        }).join('\n');

        const d = { 
            num: document.getElementById('ml-num').value, 
            dir: document.getElementById('ml-dir').value, 
            type: document.getElementById('ml-type').value, 
            hours: document.getElementById('ml-hours').value, 
            stops: stopsFinal 
        };
        
        if(activeLineIdx === -1) db.lines.push(d); else db.lines[activeLineIdx] = d;
        save(); closeModals();
    }

    function openLineModal(idx) {
        activeLineIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", stops:""} : db.lines[idx];
        document.getElementById('ml-num').value = l.num;
        document.getElementById('ml-dir').value = l.dir;
        document.getElementById('ml-type').value = l.type;
        document.getElementById('ml-hours').value = l.hours;
        
        // Rozbijamy format "Nazwa | +X" z powrotem do pola tekstowego nazw
        const namesOnly = l.stops.split('\n').map(s => s.split('|')[0].trim()).join('\n');
        document.getElementById('ml-stops-raw').value = namesOnly;
        
        document.getElementById('mod-line').style.display = 'block';
        
        // Generujemy pola i ręcznie ustawiamy w nich wartości czasu z bazy
        generateStopInputs();
        if(idx !== -1) {
            const timeVals = l.stops.split('\n').map(s => s.split('|')[1]?.replace('+','').trim() || "1");
            const inputs = document.querySelectorAll('.stop-time-input');
            inputs.forEach((inp, i) => { if(timeVals[i]) inp.value = timeVals[i]; });
        }
    }

    // --- RESZTA LOGIKI ---
    function render() {
        const busC = document.getElementById('lines-bus'); const tramC = document.getElementById('lines-tram');
        busC.innerHTML = ''; tramC.innerHTML = '';
        const nums = [...new Set(db.lines.map(l => String(l.num).trim()))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
        nums.forEach(n => {
            const lD = db.lines.find(l => String(l.num).trim() === n);
            const card = document.createElement('div'); card.className = `card ${lD.type==='tram'?'tram':''}`;
            card.innerHTML = `<span>LINIA ${n}</span> <i class="fa-solid fa-chevron-right"></i>`;
            card.onclick = () => openVariants(n);
            if(lD.type === 'tram') tramC.appendChild(card); else busC.appendChild(card);
        });
        document.getElementById('lines-tram-title').style.display = tramC.innerHTML ? 'block' : 'none';
        document.getElementById('lines-bus-title').style.display = busC.innerHTML ? 'block' : 'none';
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="adm-card" style="display:flex; justify-content:space-between;"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineModal(${i})" style="color:blue; border:none; background:none; font-weight:bold;">EDYTUJ</button></div>`).join('');
    }

    function openVariants(num) {
        const vars = db.lines.filter(l => String(l.num).trim() === String(num).trim());
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="view-header"><h1>Linia ${num}</h1></div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        vars.forEach(v => {
            const d = document.createElement('div'); d.className = "card"; d.innerHTML = `<span>${v.dir}</span> <i class="fa-solid fa-arrow-right"></i>`;
            d.onclick = () => renderTimetable(db.lines.indexOf(v)); list.appendChild(d);
        });
    }

    function renderTimetable(idx) {
        const line = db.lines[idx]; show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="view-header"><h1>${line.num}</h1><p>${line.dir}</p></div>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let cum = 0; const stops = line.stops.split('\n').filter(s => s.trim());
        stops.forEach((sRaw, sIdx) => {
            let [n, off] = sRaw.split('|').map(x => x.trim());
            if(sIdx > 0) cum += parseInt(off.replace('+','')) || 1;
            const b = document.createElement('div'); b.className = `stop-box ${n.toLowerCase().includes('nż')?'is-nz':''}`;
            b.innerHTML = `<div style="display:flex;justify-content:space-between;"><b>${n}</b><span>+${cum} min</span></div><div class="grid" id="grid-${sIdx}"></div>`;
            b.onclick = () => {
                const g = document.getElementById(`grid-${sIdx}`); const isV = g.style.display === 'grid';
                g.style.display = isV ? 'none' : 'grid';
                if(!isV) g.innerHTML = line.hours.split(',').map(h => {
                    let [hh, mm] = h.trim().split(':').map(Number); let d = new Date(); d.setHours(hh, mm + cum);
                    return `<span class="h">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                }).join('');
            };
            body.appendChild(b);
        });
    }

    function save() { localStorage.setItem('mzk_vfinal_system', JSON.stringify(db)); render(); }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); document.getElementById('n-'+id).classList.add('active'); window.scrollTo(0,0); }
    function closeModals() { document.getElementById('mod-line').style.display='none'; }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function setTab(id) { document.querySelectorAll('.adm-tab').forEach(t=>t.style.display='none'); document.getElementById('tab-'+id).style.display='block'; }
    function exportData() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mzk.txt'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); alert("Gotowe!"); }; r.readAsText(e.target.files[0]); }

    init();
</script>
</body>
</html>
