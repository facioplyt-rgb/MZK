<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V63</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --border: rgba(255,255,255,0.08); --bus-col: #00ab55; --tram-col: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.4rem; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; }
        .app-card:active { transform: scale(0.98); background: var(--surface-light); }
        
        .stop-name { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; width: 100%; }
        .line-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; align-items: center; min-height: 24px; }
        .transfer-icon { color: var(--accent); font-size: 0.9rem; margin-right: 6px; }
        .line-badge { padding: 3px 8px; border-radius: 5px; font-weight: 800; font-size: 0.7rem; min-width: 32px; text-align: center; color: white; border: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; gap: 4px; }
        .line-badge i { font-size: 0.6rem; }
        .line-badge.bus { background: var(--bus-col); }
        .line-badge.tram { background: var(--tram-col); }
        .eta-tag { font-size: 0.75rem; color: var(--accent); font-weight: 800; margin-left: auto; background: rgba(0, 171, 85, 0.1); padding: 2px 6px; border-radius: 4px; }
        .transfer-eta { font-size: 0.6rem; opacity: 0.9; font-weight: 600; margin-left: 2px; color: #fff; }

        .tt-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        .tt-row { display: flex; border-bottom: 1px solid var(--border); }
        .tt-hour-col { background: rgba(255,255,255,0.03); width: 60px; padding: 15px 0; text-align: center; font-size: 1.2rem; font-weight: 800; color: var(--accent); border-right: 1px solid var(--border); }
        .tt-min-col { flex: 1; padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .tt-min-val { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; color: #fff; }

        .adm-stop-card { background: var(--surface-light); border: 1px solid var(--border); border-radius: 14px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .adm-opt-label { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; border: 1px solid var(--border); cursor: pointer; }

        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; background: var(--surface-light); border: 1px solid var(--border); color: white; font-family: inherit; font-size: 1rem; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        
        .badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .badge-nz { background: var(--warn); color: #000; }
        .badge-strefa { background: #444; color: #fff; }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.65rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; }
        .line-square { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; border-bottom: 4px solid transparent; }
        .day-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; }
        .day-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-stop-lines" class="section">
        <div id="sl-list"></div>
        <button onclick="show('stops')" class="main-btn" style="background:#333; margin-top:10px;">Wróć do listy</button>
    </div>
    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    <div id="s-news-details" class="section">
        <div class="app-card" style="display:block;"><h2 id="nd-title"></h2><small id="nd-date" style="color:var(--warn)"></small><p id="nd-body" style="margin-top:15px; white-space:pre-wrap; color:var(--text-sec); line-height:1.5;"></p></div>
        <button onclick="show('news')" class="main-btn" style="background:#333">Wróć</button>
    </div>
    <div id="s-contact" class="section"><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap; color:var(--text-sec); line-height:1.5;"></div></div>
    <div id="s-vars" class="section"><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section">
        <div id="tt-day-sel" style="display:none; gap:5px; margin-bottom:15px;">
            <button class="day-btn active" id="btn-working" onclick="setDay('working')">Robocze</button>
            <button class="day-btn" id="btn-saturday" onclick="setDay('saturday')">Soboty</button>
            <button class="day-btn" id="btn-sunday" onclick="setDay('sunday')">Niedz i Św</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn" style="background:#333; margin-top:20px;">Wróć</button>
    </div>
    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;"><div class="group-label">Autoryzacja</div><input type="password" id="pass" placeholder="Hasło"><button onclick="login()" class="main-btn">Zaloguj</button></div>
        <div id="adm-ui" style="display:none;">
            <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:15px;">
                <button onclick="setTab('l')" class="main-btn" style="font-size:0.5rem; padding:10px 0;">LINIE</button>
                <button onclick="setTab('s')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#333;">PRZYST</button>
                <button onclick="setTab('n')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#333;">NEWS</button>
                <button onclick="setTab('c')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#333;">USTAW</button>
                <button onclick="setTab('i')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#333;">PLIK</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;">
                <div class="group-label">Kategorie Linii</div>
                <input type="text" id="edit-cats-input" placeholder="Kategorie Linii (po przecinku)">
                <div class="group-label">Kategorie Newsów</div>
                <input type="text" id="edit-news-cats-input" placeholder="Kategorie Newsów (po przecinku)">
                <button onclick="saveAllCategories()" class="main-btn">Zapisz Kategorie</button>
                <div class="group-label">Informacje o MZK</div>
                <textarea id="edit-contact-text" style="height:150px;" placeholder="Kontakt / Info"></textarea>
                <button onclick="saveContact()" class="main-btn">Zapisz Info</button>
            </div>
            <div id="tab-i" class="adm-tab" style="display:none;"><button onclick="exportDB()" class="main-btn">Eksportuj JSON</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <div style="display:flex; gap:10px;"><input type="text" id="fl-num" placeholder="Nr" style="width:80px;"><input type="text" id="fl-dir" placeholder="Kierunek docelowy"></div>
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-h-work" placeholder="Godziny Robocze (HH:MM, HH:MM...)"></textarea>
    <textarea id="fl-h-sat" placeholder="Godziny Soboty"></textarea>
    <textarea id="fl-h-sun" placeholder="Godziny Niedziele"></textarea>
    <textarea id="import-area" style="height:60px;" placeholder="Import nazw przystanków"></textarea>
    <button onclick="processBulkImport()" class="main-btn" style="background:#444">Importuj</button>
    <div id="fl-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="deleteLine()" id="btn-del-line" class="main-btn" style="background:var(--danger); display:none;">Usuń Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; border:1px solid var(--border)">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <input type="text" id="fn-title" placeholder="Tytuł newsa">
    <input type="text" id="fn-date" placeholder="Data">
    <select id="fn-cat"></select>
    <textarea id="fn-body" style="height:200px;" placeholder="Treść newsa"></textarea>
    <button onclick="saveNews()" class="main-btn">Zapisz News</button>
    <button onclick="deleteNews()" id="btn-del-news" class="main-btn" style="background:var(--danger); display:none;">Usuń News</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; border:1px solid var(--border)">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');
    let db = { lines: [], stopDetails: {}, news: [], lineCategories: [], newsCategories: [], contact: "" };
    let curLineIdx = -1, curNewsIdx = -1, curDay = 'working', curStopIdx = -1, allStops = [];

    function cleanKey(n) { return n ? n.trim().replace(/[.#$[\]]/g, "") : "unknown"; }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id)?.classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); document.getElementById('n-'+id)?.classList.add('active'); }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }

    function getETA(line, stopIdx) {
        if(!line || !line.stops || line.stops.length === 0) return null;
        const now = new Date();
        const dayOfWeek = now.getDay();
        let dayType = 'working';
        if(dayOfWeek === 6) dayType = 'saturday';
        if(dayOfWeek === 0) dayType = 'sunday';

        const raw = dayType === 'working' ? line.hoursWorking : (dayType === 'saturday' ? line.hoursSat : line.hoursSun);
        if (!raw || raw.trim() === "") return null;

        let offset = 0;
        for (let i = 0; i <= stopIdx; i++) {
            offset += parseInt(line.stops[i].time || 0);
        }

        const times = raw.split(',').map(t => {
            const parts = t.trim().split(':');
            if(parts.length < 2) return null;
            const d = new Date(now.getTime());
            d.setHours(parseInt(parts[0]), parseInt(parts[1]) + offset, 0, 0);
            return d;
        }).filter(d => d !== null && d > now).sort((a,b) => a - b);

        if (times.length === 0) return null;
        const diff = Math.floor((times[0] - now) / 60000);
        return diff < 60 ? diff : null;
    }

    init();
    function init() {
        dbRef.on('value', (s) => {
            const val = s.val(); if(val) { 
                db = val; 
                if(!db.lines) db.lines = []; 
                if(!db.stopDetails) db.stopDetails = {}; 
                if(!db.news) db.news = [];
                if(!db.newsCategories) db.newsCategories = [];
                if(!db.lineCategories) db.lineCategories = [];
                let sSet = new Set(); 
                db.lines.forEach(l => { if(l.stops) l.stops.forEach(st => sSet.add(st.name)); }); 
                allStops = [...sSet].sort(); 
                render(); 
            }
        });
    }

    function render() {
        const h = document.getElementById('s-home'); h.innerHTML = '';
        (db.lineCategories || []).forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length) {
                h.innerHTML += `<div class="group-label">${cat}</div>`;
                const g = document.createElement('div'); g.className = 'lines-grid';
                [...new Set(lines.map(l => String(l.num)))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const lObj = lines.find(x => String(x.num) === num);
                    g.innerHTML += `<div class="line-square" style="border-bottom-color:${lObj.type==='bus'?'var(--bus-col)':'var(--tram-col)'}" onclick="openVars('${num}')">${num}</div>`;
                });
                h.appendChild(g);
            }
        });

        const nList = document.getElementById('public-news-list'); nList.innerHTML = '';
        if(db.news && db.news.length > 0) {
            (db.newsCategories || ["Ogólne"]).forEach(cat => {
                const newsItems = db.news.filter(n => (n.category || "Ogólne") === cat);
                if(newsItems.length) {
                    nList.innerHTML += `<div class="group-label">${cat}</div>`;
                    newsItems.forEach((n) => {
                        const realIdx = db.news.indexOf(n);
                        nList.innerHTML += `<div class="app-card" onclick="openNewsDetails(${realIdx})"><div><b>${n.title}</b><br><small style="color:var(--warn)">${n.date}</small></div></div>`;
                    });
                }
            });
        } else {
            nList.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-sec);">Brak aktualności</div>';
        }

        document.getElementById('contact-display').innerText = db.contact || "";
        renderStopsList(); renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><div><b>${l.num}</b> - ${l.dir}</div><button onclick="openLineForm(${i})" style="padding:7px; background:#444; color:white; border:none; border-radius:5px;">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-news-list').innerHTML = (db.news || []).map((n, i) => `<div class="app-card"><div><b>${n.title}</b></div><button onclick="openNewsForm(${i})" style="padding:7px; background:#444; color:white; border:none; border-radius:5px;">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-stops-list').innerHTML = allStops.map(s => {
            const key = cleanKey(s); const d = db.stopDetails[key] || {nearby:"", outZone: false, globalNz: false};
            return `<div class="adm-stop-card"><span style="font-weight:bold; color:var(--accent)">${s}</span><input type="text" value="${d.nearby || ''}" onchange="upStop('${s}', this.value, 'nearby')" placeholder="Pobliże"><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;"><label class="adm-opt-label"><input type="checkbox" ${d.globalNz?'checked':''} onchange="upStop('${s}', this.checked, 'globalNz')"> NŻ</label><label class="adm-opt-label"><input type="checkbox" ${d.outZone?'checked':''} onchange="upStop('${s}', this.checked, 'outZone')"> Gr. Strefy</label></div></div>`;
        }).join('');
        document.getElementById('edit-cats-input').value = (db.lineCategories || []).join(', ');
        document.getElementById('edit-news-cats-input').value = (db.newsCategories || []).join(', ');
        document.getElementById('edit-contact-text').value = db.contact || "";
    }

    function getLinesForStop(stopName, excludeLineNum = null) {
        let found = [];
        db.lines.forEach(l => { 
            if(excludeLineNum !== null && String(l.num) === String(excludeLineNum)) return; 
            const sIdx = l.stops ? l.stops.findIndex(st => st.name === stopName) : -1;
            if(sIdx !== -1) { 
                if(!found.find(x => x.num === l.num)) {
                    const eta = getETA(l, sIdx);
                    found.push({num: l.num, type: l.type, eta: eta}); 
                }
            } 
        });
        return found.sort((a,b) => parseInt(a.num) - parseInt(b.num));
    }

    function renderStopsList() { 
        const q = document.getElementById('stop-search').value.toLowerCase(); const listDiv = document.getElementById('public-stops-list'); listDiv.innerHTML = ''; 
        allStops.filter(s => s.toLowerCase().includes(q)).forEach(name => { 
            const d = db.stopDetails[cleanKey(name)] || {};
            const stopLines = getLinesForStop(name);
            listDiv.innerHTML += `
                <div class="app-card" onclick="openStopLines('${name}')">
                    <div class="stop-name">${name} ${d.globalNz?'<span class="badge badge-nz">NŻ</span>':''} ${d.outZone?'<span class="badge badge-strefa">Gr. Strefy</span>':''}</div>
                    ${d.nearby ? `<small style="color:var(--accent)">${d.nearby}</small>` : ''}
                    <div class="line-badges">
                        ${stopLines.length > 0 ? '<i class="fa-solid fa-route transfer-icon"></i>' : ''}
                        ${stopLines.map(l => {
                            const icon = l.type === 'tram' ? 'fa-train-tram' : 'fa-bus';
                            return `<span class="line-badge ${l.type}"><i class="fa-solid ${icon}"></i>${l.num}${l.eta !== null ? `<span class="transfer-eta">(${l.eta} min)</span>` : ''}</span>`;
                        }).join('')}
                    </div>
                </div>`; 
        }); 
    }

    function renderLineStops(lIdx) {
        const l = db.lines[lIdx]; const ttBody = document.getElementById('tt-body');
        ttBody.innerHTML = `<div class="group-label" style="color:var(--accent)">Trasa: ${l.dir}</div>`;
        ttBody.innerHTML += (l.stops || []).map((s, i) => {
            const d = db.stopDetails[cleanKey(s.name)] || {};
            const otherLines = getLinesForStop(s.name, l.num); 
            const myEta = getETA(l, i);
            return `
                <div class="app-card" onclick="renderTimetable(${lIdx}, ${i})">
                    <div class="stop-name">
                        <span style="color:var(--accent); font-family:monospace;">${i+1}.</span> ${s.name} 
                        ${(d.globalNz || s.nz) ? '<span class="badge badge-nz">NŻ</span>' : ''} 
                        ${d.outZone ? '<span class="badge badge-strefa">Gr. Strefy</span>' : ''}
                        ${myEta !== null ? `<span class="eta-tag">za ${myEta} min</span>` : ''}
                    </div>
                    ${d.nearby ? `<small style="color:var(--accent)">${d.nearby}</small>` : ''}
                    <div class="line-badges">
                        ${otherLines.length > 0 ? '<i class="fa-solid fa-route transfer-icon"></i>' : ''}
                        ${otherLines.map(bl => {
                            const icon = bl.type === 'tram' ? 'fa-train-tram' : 'fa-bus';
                            return `<span class="line-badge ${bl.type}"><i class="fa-solid ${icon}"></i>${bl.num}${bl.eta !== null ? `<span class="transfer-eta">(${bl.eta} min)</span>` : ''}</span>`;
                        }).join('')}
                    </div>
                </div>`;
        }).join('');
        document.getElementById('tt-back-btn').onclick = () => show('vars');
    }

    function openStopLines(name) { 
        show('stop-lines'); const list = document.getElementById('sl-list'); 
        list.innerHTML = `<div class="group-label" style="color:var(--accent)">${name}</div>`; 
        db.lines.forEach((l, i) => { 
            const sIdx = l.stops ? l.stops.findIndex(st => st.name === name) : -1; 
            if(sIdx !== -1) {
                const eta = getETA(l, sIdx);
                const icon = l.type === 'tram' ? 'fa-train-tram' : 'fa-bus';
                list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i}, ${sIdx})"><div><span class="line-badge ${l.type}" style="margin-right:10px"><i class="fa-solid ${icon}"></i> ${l.num}</span><b>${l.dir}</b></div> ${eta !== null ? `<span class="eta-tag">za ${eta} min</span>` : '<i class="fa-solid fa-clock"></i>'}</div>`; 
            }
        }); 
    }

    function renderTimetable(lIdx, sIdx = -1) {
        curLineIdx = lIdx; curStopIdx = sIdx; show('tt'); const l = db.lines[lIdx]; const ttBody = document.getElementById('tt-body');
        if (sIdx === -1) { document.getElementById('tt-day-sel').style.display = 'none'; renderLineStops(lIdx); } 
        else {
            document.getElementById('tt-day-sel').style.display = 'flex';
            let offset = 0; for(let i=0; i<=sIdx; i++) offset += parseInt(l.stops[i].time || 0);
            const hMap = {}; let rawTimes = (curDay==='working'?l.hoursWorking : curDay==='saturday'?l.hoursSat : l.hoursSun) || "";
            let html = `<div class="app-card" style="border-left:4px solid var(--accent)"><b>${l.num}</b> - ${l.stops[sIdx].name}<br><small>${l.dir}</small></div><div class="tt-container">`;
            if(!rawTimes || !rawTimes.trim()) html += '<div style="padding:30px; text-align:center;">Brak kursów.</div>';
            else {
                rawTimes.split(',').forEach(entry => {
                    let parts = entry.trim().split(':'); if(parts.length < 2) return;
                    let d = new Date(); d.setHours(parseInt(parts[0]), parseInt(parts[1]) + offset);
                    let hh = d.getHours().toString().padStart(2, '0'), mm = d.getMinutes().toString().padStart(2, '0');
                    if(!hMap[hh]) hMap[hh] = []; hMap[hh].push(mm);
                });
                Object.keys(hMap).sort().forEach(h => html += `<div class="tt-row"><div class="tt-hour-col">${h}</div><div class="tt-min-col">${hMap[h].sort().map(m => `<span class="tt-min-val">${m}</span>`).join('')}</div></div>`);
            }
            ttBody.innerHTML = html + `</div>`;
            document.getElementById('tt-back-btn').onclick = () => renderTimetable(lIdx, -1);
        }
    }

    function setDay(d) { curDay = d; document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+(d==='sunday'?'sunday':d==='saturday'?'saturday':'working')).classList.add('active'); renderTimetable(curLineIdx, curStopIdx); }
    function upStop(name, val, field) { const key = cleanKey(name); if(!db.stopDetails[key]) db.stopDetails[key] = {nearby:"", outZone:false, globalNz: false}; db.stopDetails[key][field] = val; dbRef.child('stopDetails').child(key).set(db.stopDetails[key]); }
    function openVars(num) { show('vars'); const v = document.getElementById('vars-list'); v.innerHTML = `<div class="group-label">Linia ${num}</div>`; db.lines.forEach((l, i) => { if(String(l.num) === String(num)) v.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>${l.dir}</b></div>`; }); }
    function openNewsDetails(i) { const n = db.news[i]; document.getElementById('nd-title').innerText = n.title; document.getElementById('nd-date').innerText = n.date; document.getElementById('nd-body').innerText = n.body; show('news-details'); }
    
    function saveAllCategories() { 
        const lCats = document.getElementById('edit-cats-input').value.split(',').map(c => c.trim()).filter(c => c);
        const nCats = document.getElementById('edit-news-cats-input').value.split(',').map(c => c.trim()).filter(c => c);
        dbRef.update({ lineCategories: lCats, newsCategories: nCats }).then(() => alert("Zapisano kategorie!")); 
    }
    function saveContact() { dbRef.update({ contact: document.getElementById('edit-contact-text').value }).then(() => alert("Zapisano info!")); }
    
    function openNewsForm(idx) { 
        curNewsIdx = idx; 
        const n = idx === -1 ? {title:"", date:"", category:"", body:""} : db.news[idx]; 
        document.getElementById('fn-title').value = n.title; 
        document.getElementById('fn-date').value = n.date; 
        document.getElementById('fn-cat').innerHTML = (db.newsCategories || ["Ogólne"]).map(c => `<option value="${c}" ${n.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fn-body').value = n.body; 
        document.getElementById('btn-del-news').style.display = idx === -1 ? 'none' : 'block'; 
        document.getElementById('form-news').style.display = 'block'; 
    }
    function saveNews() {
        const data = { title: document.getElementById('fn-title').value, date: document.getElementById('fn-date').value, category: document.getElementById('fn-cat').value, body: document.getElementById('fn-body').value };
        if(curNewsIdx === -1) { if(!db.news) db.news=[]; db.news.push(data); } else db.news[curNewsIdx] = data;
        dbRef.update({ news: db.news }).then(() => { alert("Zapisano!"); closeForms(); });
    }
    function deleteNews() { if(confirm("Usunąć?")) { db.news.splice(curNewsIdx, 1); dbRef.update({ news: db.news }).then(closeForms); } }

    function openLineForm(idx) { curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", category:"", stops:[], hoursWorking:"", hoursSat:"", hoursSun:""} : db.lines[idx]; document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir; document.getElementById('fl-type').value = l.type || "bus"; document.getElementById('fl-cat').innerHTML = (db.lineCategories || []).map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join(''); document.getElementById('fl-h-work').value = l.hoursWorking || ""; document.getElementById('fl-h-sat').value = l.hoursSat || ""; document.getElementById('fl-h-sun').value = l.hoursSun || ""; document.getElementById('fl-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz)); document.getElementById('btn-del-line').style.display = idx === -1 ? 'none' : 'block'; document.getElementById('form-line').style.display = 'block'; }
    function addStopRow(name="", time=2, nz=false) { const div = document.createElement('div'); div.className = 'adm-stop-card'; div.innerHTML = `<button onclick="this.parentElement.remove()" style="float:right; border:none; background:none; color:var(--danger)">X</button><input type="text" value="${name}" class="stop-name-in" placeholder="Nazwa"><div style="display:flex; align-items:center; gap:10px;"><input type="number" value="${time}" class="stop-time-in" style="width:60px;"> min <label><input type="checkbox" class="stop-nz-in" ${nz?'checked':''}> NŻ</label></div>`; document.getElementById('fl-list').prepend(div); }
    function processBulkImport() { document.getElementById('import-area').value.split('\n').filter(x => x.trim()).forEach(n => { let name = n.trim(); let nz = name.toLowerCase().includes(" nż"); if(nz) name = name.replace(/ nż\.?/i, "").trim(); addStopRow(name, 2, nz); }); document.getElementById('import-area').value = ""; }
    function saveLine() { const rows = Array.from(document.querySelectorAll('#fl-list > div')); const stops = rows.map(r => ({ name: r.querySelector('.stop-name-in').value.trim(), time: parseInt(r.querySelector('.stop-time-in').value) || 0, nz: r.querySelector('.stop-nz-in').checked })).reverse(); const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops }; if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data; dbRef.update({ lines: db.lines }).then(() => { alert("Zapisano!"); closeForms(); }); }
    function deleteLine() { if(confirm("Usunąć?")) { db.lines.splice(curLineIdx, 1); dbRef.update({ lines: db.lines }).then(closeForms); } }
    function exportDB() { const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const a = document.createElement('a'); a.href = data; a.download = "mzk_backup.json"; a.click(); }
</script>
</body>
