<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM ZARZĄDZANIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; --gradient: linear-gradient(135deg, #00ab55 0%, #007b3d 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 110px; }
        
        header { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(20px); padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

        .hero { width: 100%; height: 150px; background: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=800') center/cover; position: relative; border-radius: 0 0 30px 30px; margin-bottom: 20px; display: flex; align-items: flex-end; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(11,15,25,1) 0%, rgba(0,0,0,0) 100%); border-radius: 0 0 30px 30px; }
        .hero-title { position: relative; z-index: 2; font-size: 1.4rem; font-weight: 800; }

        .container { max-width: 550px; margin: 0 auto; padding: 0 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
        .group-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 18px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid #333; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        .line-square small { font-size: 0.55rem; opacity: 0.5; font-weight: 400; margin-top: 2px; }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        .day-tabs { display: flex; gap: 6px; margin: 12px 0; background: #0b0f19; padding: 4px; border-radius: 12px; }
        .day-tab { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.65rem; text-align: center; font-weight: 700; color: var(--text-sec); cursor: pointer; }
        .day-tab.active { background: var(--accent); color: white; }

        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-top: 12px; }
        .tt-time { background: #1c252e; color: white; padding: 10px 4px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(22, 28, 36, 0.9); backdrop-filter: blur(20px); display: flex; height: 75px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.6rem; font-weight: 700; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }

        .main-btn { background: var(--gradient); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        
        .adm-nav-main { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.55rem; border-radius: 8px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; cursor: pointer; }
        .adm-nav-main button.active { background: var(--accent); color: white; }

        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .stop-edit-row { display: grid; grid-template-columns: 1fr 60px 40px 40px; gap: 6px; align-items: center; background: #1c252e; padding: 8px; border-radius: 10px; margin-bottom: 6px; }
        
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 6px; font-weight: 800; }
        .stop-line-pill { background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; margin-right: 4px; margin-top: 4px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div class="hero"><div class="hero-title">Gorzów Wielkopolski<br><small style="font-weight:400; opacity:0.7; font-size:0.9rem;">Wybierz linię, by sprawdzić rozkład</small></div></div>
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <div class="group-label">Szukaj Przystanku</div>
        <input type="text" id="stop-search" class="search-box" placeholder="Wpisz nazwę..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-news" class="section"><div class="group-label">Komunikaty</div><div id="public-news-list"></div></div>
    
    <div id="s-contact" class="section"><div class="group-label">Informacje</div><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333; margin-top:20px">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333; margin-top:20px">Wróć</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
                <button onclick="setTab('z')" id="mt-z">ZAAW</button>
            </div>
            
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineForm(-1)" class="main-btn">+ Dodaj linię</button>
                <div id="adm-lines-list"></div>
            </div>

            <div id="tab-p" class="adm-tab" style="display:none;">
                <button onclick="openGlobalStopForm()" class="main-btn">+ Nowy Przystanek (do bazy)</button>
                <div class="group-label">Baza wszystkich przystanków</div>
                <div id="adm-stops-list"></div>
            </div>

            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Nowy news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:200px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportFullBackup()" class="main-btn">Eksportuj Backup</button><input type="file" id="importFile" style="display:none" onchange="importFullBackup(event)"><button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj Backup</button></div>
            <div id="tab-z" class="adm-tab" style="display:none;"><div class="group-label">Kategorie</div><div id="adm-cats-list"></div><input type="text" id="new-cat-name" placeholder="Nowa kategoria"><button onclick="addCategory()" class="main-btn">Dodaj</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <div style="display:flex; gap:10px;"><input type="text" id="fl-num" placeholder="Nr" style="flex:1"><input type="text" id="fl-dir" placeholder="Kierunek" style="flex:3"></div>
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    
    <div class="group-label">Rozkłady Jazdy (godziny po przecinku)</div>
    <textarea id="fl-hours" placeholder="Dni robocze (np. 06:15, 06:45)"></textarea>
    <textarea id="fl-hours-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-hours-sun" placeholder="Niedziele i Święta"></textarea>

    <div class="group-label">Trasa i Przystanki</div>
    <div style="background:#000; border:1px dashed var(--accent); padding:10px; border-radius:10px; margin-bottom:15px;">
        <textarea id="fl-bulk" placeholder="Wklej listę nazw przystanków" style="height:60px; margin-bottom:5px;"></textarea>
        <button onclick="convertBulk()" class="main-btn" style="padding:8px; font-size:0.7rem; background:#333;">Konwertuj Bulk ↓</button>
    </div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj ręcznie</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-stop-global" class="overlay-form">
    <h2 id="gs-title">Przystanek</h2>
    <input type="hidden" id="gs-old-name">
    <input type="text" id="gs-name" placeholder="Nazwa przystanku">
    <button onclick="saveGlobalStop()" class="main-btn">Zapisz i synchronizuj</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <h2>News</h2>
    <input type="text" id="fn-title" placeholder="Tytuł"><select id="fn-cat"><option value="info">Info</option><option value="utrudnienia">Utrudnienia</option></select>
    <textarea id="fn-content" style="height:150px"></textarea><button onclick="saveNews()" class="main-btn">Zapisz</button><button onclick="closeForms()" class="main-btn">Anuluj</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {}, lineCategories: ["Tramwaje", "Autobusy"], globalStops: [] };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_sync_v17');
        if(local) { db = JSON.parse(local); repairAllLines(); }
        syncGlobalStops(); render();
    }

    function save() { localStorage.setItem('mzk_sync_v17', JSON.stringify(db)); render(); }

    function syncGlobalStops() {
        let sSet = new Set(db.globalStops || []);
        db.lines.forEach(l => l.stops.forEach(s => { if(s.name) sSet.add(s.name); }));
        db.globalStops = [...sSet].sort();
    }

    function getTransfers(stopName, currentLineNum) {
        let lines = [];
        db.lines.forEach(l => {
            if(String(l.num) !== String(currentLineNum) && l.stops.some(s => s.name === stopName)) {
                if(!lines.some(e => e.num === l.num)) lines.push({num: l.num, type: l.type});
            }
        });
        return lines.sort((a,b)=>parseInt(a.num)-parseInt(b.num));
    }

    function render() {
        const sHome = document.getElementById('home-content'); sHome.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const linesInCat = db.lines.filter(l => l.category === cat);
            if (linesInCat.length > 0) {
                const label = document.createElement('div'); label.className = 'group-label'; label.innerText = cat; sHome.appendChild(label);
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(linesInCat.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = linesInCat.find(x => x.num === num);
                    const div = document.createElement('div'); 
                    div.className = `line-square ${l.type}`; 
                    div.innerHTML = `${num} <small>${l.type.toUpperCase()}</small>`; 
                    div.onclick = () => openVariants(num); grid.appendChild(div);
                }); sHome.appendChild(grid);
            }
        });

        document.getElementById('public-news-list').innerHTML = (db.news || []).map(n => `<div class="app-card" style="display:block;"><small>${n.date}</small><div><b>${n.title}</b></div><div style="font-size:0.8rem; color:var(--text-sec);">${n.content}</div></div>`).reverse().join('');
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})" style="color:var(--accent); background:none; border:none; font-weight:800;">EDYTUJ</button></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact;
        renderAdminStops(); renderCategoriesAdmin(); filterStops();
    }

    // --- PANEL ADMIN PRZYSTANKI ---
    function renderAdminStops() {
        syncGlobalStops();
        document.getElementById('adm-stops-list').innerHTML = db.globalStops.map(s => `
            <div class="app-card">
                <span style="font-weight:700;">${s}</span>
                <div style="display:flex; gap:10px;">
                    <button onclick="openGlobalStopForm('${s}')" style="color:var(--info); background:none; border:none; font-weight:800;">EDYTUJ</button>
                    <button onclick="deleteGlobalStop('${s}')" style="color:var(--danger); background:none; border:none; font-weight:800;">USUŃ</button>
                </div>
            </div>`).join('');
    }

    function openGlobalStopForm(oldName = "") {
        document.getElementById('gs-title').innerText = oldName ? "Edytuj Przystanek" : "Nowy Przystanek";
        document.getElementById('gs-old-name').value = oldName;
        document.getElementById('gs-name').value = oldName;
        document.getElementById('form-stop-global').style.display = 'block';
    }

    function saveGlobalStop() {
        const oldN = document.getElementById('gs-old-name').value;
        const newN = document.getElementById('gs-name').value.trim();
        if(!newN) return;

        if(oldN) {
            // Synchronizacja we wszystkich liniach
            db.lines.forEach(l => l.stops.forEach(s => { if(s.name === oldN) s.name = newN; }));
            db.globalStops = db.globalStops.map(s => s === oldN ? newN : s);
        } else {
            if(!db.globalStops.includes(newN)) db.globalStops.push(newN);
        }
        save(); closeForms();
    }

    function deleteGlobalStop(n) {
        if(confirm(`Czy na pewno usunąć przystanek "${n}"? Zostanie on usunięty ze wszystkich linii!`)) {
            db.lines.forEach(l => l.stops = l.stops.filter(s => s.name !== n));
            db.globalStops = db.globalStops.filter(s => s !== n);
            save();
        }
    }

    // --- ROZKŁAD ---
    function renderTimetable(idx) {
        const line = db.lines[idx]; show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>Do: ${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let total = 0;
        
        line.stops.forEach((stop, sIdx) => {
            total += parseInt(stop.time) || 0;
            const currentOffset = total;
            const transfers = getTransfers(stop.name, line.num);
            const card = document.createElement('div');
            card.className = 'app-card'; card.style.display = 'block';
            
            card.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:space-between;">
                    <div><b>${stop.name}</b>${stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}</div>
                    <div style="font-size:0.7rem; opacity:0.5;">+${currentOffset} min</div>
                </div>
                <div class="stop-lines-row">${transfers.map(t => `<span class="stop-line-pill">${t.num}</span>`).join('')}</div>
                <div id="g-${sIdx}" style="display:none; margin-top:10px;">
                    <div class="day-tabs">
                        <div class="day-tab active" onclick="switchDay(${sIdx}, 'work', event)">ROBOCZE</div>
                        <div class="day-tab" onclick="switchDay(${sIdx}, 'sat', event)">SOBOTY</div>
                        <div class="day-tab" onclick="switchDay(${sIdx}, 'sun', event)">NIEDZIELE</div>
                    </div>
                    <div id="times-${sIdx}" class="tt-grid"></div>
                </div>`;
            
            card.onclick = (e) => {
                if(e.target.closest('.day-tab')) return;
                const g = document.getElementById(`g-${sIdx}`);
                g.style.display = g.style.display==='none'?'block':'none';
                if(g.style.display==='block') updateTimes(sIdx, line, currentOffset, 'work');
            };
            body.appendChild(card);
        });
    }

    function updateTimes(sIdx, line, offset, type) {
        const container = document.getElementById(`times-${sIdx}`);
        let hoursSource = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
        if(!hoursSource) { container.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:10px; opacity:0.5;">Brak kursów</p>'; return; }
        container.innerHTML = hoursSource.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length<2) return "";
            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
            return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        }).join('');
    }

    function switchDay(sIdx, type, event) {
        event.stopPropagation();
        const tabs = event.target.parentElement.querySelectorAll('.day-tab');
        tabs.forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        const headerText = document.getElementById('tt-head').innerText;
        const lineNum = headerText.match(/\d+/)[0];
        const lineDir = document.getElementById('tt-head').nextElementSibling.innerText.replace('Do: ', '');
        const lineIdx = db.lines.findIndex(l => String(l.num) === lineNum && l.dir === lineDir);
        let total = 0;
        for(let i=0; i<=sIdx; i++) total += parseInt(db.lines[lineIdx].stops[i].time);
        updateTimes(sIdx, db.lines[lineIdx], total, type);
    }

    // --- LINIE ---
    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", hoursSat:"", hoursSun:"", category:"Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir; document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-hours').value = l.hours; document.getElementById('fl-hours-sat').value = l.hoursSat || ""; document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category === c ? 'selected' : ''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = ''; 
        (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(name = "", time = 2, nz = false) {
        const div = document.createElement('div'); div.className = 'stop-edit-row';
        div.innerHTML = `<input type="text" value="${name}" class="st-n" placeholder="Nazwa"><input type="number" value="${time}" class="st-t"><input type="checkbox" ${nz?'checked':''} class="st-nz"><button onclick="this.parentElement.remove()" style="background:var(--danger); border:none; color:white; border-radius:8px;">X</button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function convertBulk() {
        const t = document.getElementById('fl-bulk').value;
        t.split('\n').filter(s => s.trim() !== "").forEach((r, i) => addStopRow(r.replace(/nż/gi,'').trim(), i===0?0:2, r.toLowerCase().includes('nż')));
        document.getElementById('fl-bulk').value = "";
    }

    function saveLine() {
        const stops = Array.from(document.getElementById('fl-stops-list').children).map(row => ({ name: row.querySelector('.st-n').value.trim(), time: parseInt(row.querySelector('.st-t').value) || 0, nz: row.querySelector('.st-nz').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hours: document.getElementById('fl-hours').value, hoursSat: document.getElementById('fl-hours-sat').value, hoursSun: document.getElementById('fl-hours-sun').value, stops: stops };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    // --- POZOSTAŁE ---
    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list');
        list.innerHTML = db.globalStops.filter(s => s.toLowerCase().includes(q)).map(s => {
            const transfers = getTransfers(s, "");
            return `<div class="app-card"><div><b>${s}</b></div><div class="stop-lines-row">${transfers.map(t => `<span class="stop-line-pill">${t.num}</span>`).join('')}</div></div>`;
        }).join('');
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, index) => { if(String(l.num) === String(num)) {
            const d = document.createElement('div'); d.className = "app-card"; d.innerHTML = `<span>Do: <b>${l.dir}</b></span> <i class="fa-solid fa-chevron-right"></i>`;
            d.onclick = () => renderTimetable(index); list.appendChild(d);
        }});
    }

    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active'); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.querySelectorAll('.adm-nav-main button').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).style.display='block'; document.getElementById('mt-'+t).classList.add('active'); }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function repairAllLines() { db.lines.forEach(l => { if(!l.hoursSat) l.hoursSat = ""; if(!l.hoursSun) l.hoursSun = ""; }); }
    function exportFullBackup() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `backup_mzk.txt`; a.click(); }
    function importFullBackup(e) { const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); location.reload(); }; r.readAsText(e.target.files[0]); }
    function renderCategoriesAdmin() { document.getElementById('adm-cats-list').innerHTML = db.lineCategories.map((c, i) => `<div class="app-card"><span>${c}</span><button onclick="db.lineCategories.splice(${i},1); save();" style="color:var(--danger); background:none; border:none;">X</button></div>`).join(''); }
    function addCategory() { const n = document.getElementById('new-cat-name').value; if(n) { db.lineCategories.push(n); document.getElementById('new-cat-name').value=''; save(); } }
    function saveContact() { db.contact = document.getElementById('edit-contact-text').value; save(); }

    init();
</script>
</body>
</html>
