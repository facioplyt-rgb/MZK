<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - WERSJA OSTATECZNA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border-radius: 16px; padding: 18px 0; text-align: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid #333; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: 800; vertical-align: middle; }
        
        .stop-lines-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .stop-line-pill { background: rgba(255,255,255,0.07); padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; border-left: 3px solid var(--accent); }
        .stop-line-pill.is-tram { border-left-color: var(--danger); }
        .stop-line-pill span { color: var(--warn); font-weight: 700; font-size: 0.85rem; }

        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; margin-top: 15px; }
        .tt-time { background: var(--accent); color: white; padding: 12px 5px; border-radius: 12px; text-align: center; font-weight: 700; }

        .adm-nav-main { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; cursor: pointer; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        .news-item { border-left: 4px solid var(--info); padding: 15px; margin-bottom: 15px; background: rgba(24, 144, 255, 0.05); border-radius: 0 15px 15px 0; }
        .news-date { font-size: 0.7rem; color: var(--text-sec); margin-bottom: 5px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 80px; border-top: 1px solid #333; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; background: #1c252e; border: 1px solid #333; color: white; font-family: inherit; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search-input" placeholder="Szukaj przystanku..." oninput="renderStops(this.value)">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section">
        <div class="group-label">Aktualności</div>
        <div id="news-list-public"></div>
    </div>
    <div id="s-contact" class="section">
        <div class="group-label">Informacje i Kontakt</div>
        <div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div>
    </div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Wróć</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('i')" id="mt-i">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-p" class="adm-tab" style="display:none;"><button onclick="addNewStopToDB()" class="main-btn">Dodaj nowy przystanek</button><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;">
                <input type="text" id="adm-news-title" placeholder="Tytuł newsa">
                <textarea id="adm-news-text" placeholder="Treść newsa..."></textarea>
                <button onclick="addNews()" class="main-btn">Dodaj News</button>
                <div id="adm-news-list"></div>
            </div>
            <div id="tab-i" class="adm-tab" style="display:none;">
                <textarea id="adm-contact-text" style="height:200px" placeholder="Dane kontaktowe..."></textarea>
                <button onclick="saveContact()" class="main-btn">Zapisz Info</button>
            </div>
            <div id="tab-s" class="adm-tab" style="display:none;">
                <button onclick="exportData()" class="main-btn">Eksportuj Backup</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj Backup</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2 id="f-title">Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"><option value="Autobusy">Autobusy</option><option value="Tramwaje">Tramwaje</option><option value="Nocne">Nocne</option></select>
    <textarea id="fl-hours-work" placeholder="Robocze / Główne"></textarea>
    <textarea id="fl-hours-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-hours-sun" placeholder="Niedziele"></textarea>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    let db = { lines: [], stopDetails: {}, contact: "Discord: facioyt", news: [], lineCategories: ["Tramwaje", "Autobusy", "Nocne"] };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_v400_full');
        if(local) {
            db = JSON.parse(local);
            migrateData();
        }
        render();
        setInterval(() => { if(document.getElementById('s-stops').classList.contains('active-sec')) renderStops(document.getElementById('stop-search-input').value); }, 30000);
    }

    // MAPOWANIE STARYCH DANYCH Z BACKUPU NA NOWE POLA
    function migrateData() {
        if(db.lines) {
            db.lines.forEach(l => {
                if(l.hours && !l.hoursWork) l.hoursWork = l.hours;
                if(!l.category) l.category = "Autobusy";
            });
        }
        if(db.news) {
            db.news.forEach(n => {
                if(n.content && !n.text) n.text = n.content;
                if(n.title && n.text && !n.text.includes(n.title)) n.text = `<b>${n.title}</b><br>${n.text}`;
            });
        }
    }

    function save() { localStorage.setItem('mzk_v400_full', JSON.stringify(db)); render(); }

    function getDayType() {
        const d = new Date().getDay();
        if(d === 0) return 'sun';
        if(d === 6) return 'sat';
        return 'work';
    }

    function getHoursForDay(line) {
        const dType = getDayType();
        if(dType === 'sun' && line.hoursSun) return line.hoursSun;
        if(dType === 'sat' && line.hoursSat) return line.hoursSat;
        return line.hoursWork || line.hours || "";
    }

    function getNextTimeForLine(line, stopName) {
        const hoursStr = getHoursForDay(line);
        if(!hoursStr) return null;
        let offset = 0;
        for(let s of (line.stops || [])) { if(s.name === stopName) break; offset += parseInt(s.time) || 0; }
        const now = new Date();
        const times = hoursStr.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length < 2) return null;
            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset, 0, 0);
            return d;
        }).filter(t => t && t > now).sort((a,b) => a-b);
        if(times.length === 0) return null;
        const diff = Math.floor((times[0] - now) / 60000);
        return diff < 60 ? `za ${diff} min` : times[0].toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function renderStops(query = "") {
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        const q = query.toLowerCase();
        const stopNames = [];
        db.lines.forEach(l => (l.stops || []).forEach(s => { if(s.name && !stopNames.includes(s.name)) stopNames.push(s.name); }));
        stopNames.sort().filter(n => n.toLowerCase().includes(q)).forEach(name => {
            const det = db.stopDetails[name] || {nearby:"", isNz:false};
            const card = document.createElement('div'); card.className = 'app-card'; card.style.display = 'block';
            let linesHtml = '<div class="stop-lines-list">';
            db.lines.forEach((l, idx) => {
                if((l.stops || []).some(s => s.name === name)) {
                    const next = getNextTimeForLine(l, name) || "--:--";
                    linesHtml += `<div class="stop-line-pill ${l.type==='tram'?'is-tram':''}" onclick="event.stopPropagation(); renderTimetable(${idx}, '${name}')"><b>${l.num}</b> <span>${next}</span></div>`;
                }
            });
            linesHtml += '</div>';
            card.innerHTML = `<div><b>${name}</b>${det.isNz?'<span class="nz-badge">NŻ</span>':''}${det.nearby?`<div style="font-size:0.75rem;color:var(--warn);margin-top:4px;">${det.nearby}</div>`:''}</div>${linesHtml}`;
            list.appendChild(card);
        });
    }

    function render() {
        const sHome = document.getElementById('s-home'); sHome.innerHTML = '';
        (db.lineCategories || ["Tramwaje", "Autobusy"]).forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length > 0) {
                sHome.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                const uniqueNums = [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b));
                uniqueNums.forEach(num => { grid.innerHTML += `<div class="line-square ${lines.find(x=>x.num===num).type}" onclick="openVariants('${num}')">${num}</div>`; });
                sHome.appendChild(grid);
            }
        });
        document.getElementById('news-list-public').innerHTML = (db.news || []).map(n => `<div class="news-item"><div class="news-date">${n.date}</div><div style="white-space:pre-wrap;">${n.text || n.content}</div></div>`).join('');
        document.getElementById('adm-news-list').innerHTML = (db.news || []).map((n, i) => `<div class="app-card" style="display:flex; justify-content:space-between"><span>${(n.text || n.content || "").substring(0,30)}...</span><button onclick="delNews(${i})">USUŃ</button></div>`).join('');
        document.getElementById('contact-display').innerHTML = db.contact || "Brak informacji";
        document.getElementById('adm-contact-text').value = db.contact || "";
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card" style="display:flex; justify-content:space-between"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
        
        const allStops = [];
        db.lines.forEach(l => (l.stops || []).forEach(s => { if(s.name && !allStops.includes(s.name)) allStops.push(s.name); }));
        document.getElementById('adm-stops-list').innerHTML = allStops.sort().map(s => {
            const d = db.stopDetails[s] || {nearby:"", isNz:false};
            return `<div class="app-card" style="display:block"><b>${s}</b><br><input type="text" value="${d.nearby}" onchange="updateStopDet('${s}','nearby',this.value)" placeholder="Pobliże"><label><input type="checkbox" ${d.isNz?'checked':''} onchange="updateStopDet('${s}','isNz',this.checked)"> NŻ</label></div>`;
        }).join('');
        renderStops();
    }

    function openVariants(num) {
        show('vars');
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, i) => { if(String(l.num) === String(num)) list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>Kierunek: ${l.dir}</b></div>`; });
    }

    function renderTimetable(idx, scrollStop = null) {
        const line = db.lines[idx]; show('tt');
        const hoursStr = getHoursForDay(line);
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let cumulative = 0;
        (line.stops || []).forEach((stop, sIdx) => {
            const offset = cumulative;
            const det = db.stopDetails[stop.name] || {nearby:"", isNz: stop.nz};
            const card = document.createElement('div'); card.className = 'app-card'; card.style.display = 'block';
            card.innerHTML = `<b>${stop.name}</b>${det.isNz?'<span class="nz-badge">NŻ</span>':''}<div id="g-${sIdx}" class="tt-grid" style="display:none;"></div>`;
            card.onclick = () => {
                const g = document.getElementById(`g-${sIdx}`); g.style.display = g.style.display === 'grid' ? 'none' : 'grid';
                if(g.style.display === 'grid' && hoursStr) {
                    g.innerHTML = hoursStr.split(',').map(h => {
                        let p = h.trim().split(':'); if(p.length < 2) return '';
                        let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset, 0, 0);
                        return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                    }).join('');
                }
            };
            body.appendChild(card);
            if(scrollStop && stop.name === scrollStop) card.click();
            cumulative += parseInt(stop.time) || 0;
        });
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", hoursWork:"", hoursSat:"", hoursSun:"", category:"Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-hours-work').value = l.hoursWork || l.hours || "";
        document.getElementById('fl-hours-sat').value = l.hoursSat || "";
        document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }
    function addStopRow(n="", t=0, z=false) {
        const div = document.createElement('div'); div.className = 'app-card';
        div.innerHTML = `<input type="text" value="${n}" class="en" placeholder="Nazwa" style="width:50%"><input type="number" value="${t}" class="et" placeholder="Min" style="width:20%"><label>NŻ<input type="checkbox" ${z?'checked':''}></label><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }
    function saveLine() {
        const stops = Array.from(document.querySelectorAll('#fl-stops-list .app-card')).map(r => ({ name: r.querySelector('.en').value, time: r.querySelector('.et').value, nz: r.querySelector('input[type="checkbox"]').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWork: document.getElementById('fl-hours-work').value, hoursSat: document.getElementById('fl-hours-sat').value, hoursSun: document.getElementById('fl-hours-sun').value, stops };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data; save(); closeForms();
    }
    function addNews() {
        const tit = document.getElementById('adm-news-title').value;
        const txt = document.getElementById('adm-news-text').value;
        if(txt) {
            if(!db.news) db.news = [];
            db.news.unshift({text: tit ? `<b>${tit}</b><br>${txt}` : txt, date: new Date().toLocaleString()});
            save(); document.getElementById('adm-news-title').value=''; document.getElementById('adm-news-text').value='';
        }
    }
    function delNews(i) { db.news.splice(i,1); save(); }
    function saveContact() { db.contact = document.getElementById('adm-contact-text').value; save(); }
    function updateStopDet(s, f, v) { if(!db.stopDetails[s]) db.stopDetails[s] = {nearby:"", isNz:false}; db.stopDetails[s][f] = v; localStorage.setItem('mzk_v400_full', JSON.stringify(db)); }
    function exportData() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mzk_full_backup.txt'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); migrateData(); save(); location.reload(); }; r.readAsText(e.target.files[0]); }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active'); if(id==='stops') renderStops(); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; document.querySelectorAll('.adm-nav-main button').forEach(b => b.classList.remove('active')); document.getElementById('mt-'+t).classList.add('active'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }

    init();
</script>
</body>
</html>
