<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK Pro</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        /* --- SYSTEM MOTYWÓW --- */
        :root { --radius: 20px; --transition: 0.3s; }

        .theme-light {
            --bg: #f8fafc; --surface: #ffffff; --primary: #3b82f6; 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0;
            --nav-bg: rgba(255,255,255,0.9);
        }

        .theme-dark {
            --bg: #050505; --surface: #121212; --primary: #3b82f6; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #1e293b;
            --nav-bg: rgba(18,18,18,0.9);
        }

        .theme-cyber {
            --bg: #09090b; --surface: #18181b; --primary: #d946ef; 
            --text: #22d3ee; --text-dim: #a855f7; --border: #d946ef;
            --nav-bg: rgba(0,0,0,0.9); --radius: 8px;
        }

        /* --- BAZA --- */
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            padding-bottom: 100px; transition: background 0.3s;
        }
        * { box-sizing: border-box; }

        /* --- SELEKTOR MOTYWÓW NA START --- */
        #theme-picker {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .theme-btn {
            width: 80%; max-width: 300px; padding: 20px; margin: 10px; border-radius: 15px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none;
            transition: transform 0.2s;
        }
        .theme-btn:active { transform: scale(0.95); }

        /* --- LAYOUT & KARTY --- */
        #app { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .search-box {
            width: 100%; padding: 15px; border-radius: 15px; background: var(--surface);
            border: 1px solid var(--border); color: var(--text); margin-bottom: 20px; font-size: 1rem;
        }

        .card {
            background: var(--surface); border-radius: var(--radius); padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .badge {
            background: var(--primary); color: white; width: 45px; height: 45px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
        }

        /* --- ROZKŁAD JAZDY --- */
        .hour-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: flex-start; }
        .hour-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); width: 40px; }
        .min-pill { 
            background: var(--bg); padding: 8px 12px; border-radius: 10px; 
            border: 1px solid var(--border); 
        }
        .min-pill.past { opacity: 0.3; }

        /* --- NAWIGACJA --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--nav-bg);
            backdrop-filter: blur(10px); border-radius: 30px; display: none;
            justify-content: space-around; padding: 10px; border: 1px solid var(--border);
        }
        .nav-item {
            background: transparent; border: none; color: var(--text-dim);
            padding: 12px; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="theme-picker">
        <h1 style="color: white; margin-bottom: 30px;">Wybierz Wygląd</h1>
        <button class="theme-btn" style="background: #fff; color: #000;" onclick="StartApp('theme-light')">Jasny Motyw</button>
        <button class="theme-btn" style="background: #121212; color: #fff; border: 1px solid #333;" onclick="StartApp('theme-dark')">Ciemny Motyw</button>
        <button class="theme-btn" style="background: #09090b; color: #22d3ee; border: 1px solid #d946ef;" onclick="StartApp('theme-cyber')">Cyberpunk</button>
    </div>

    <div id="app">
        <div id="db-error" style="display:none; background: #f59e0b; color: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold;">
            ⚠️ Używam danych offline. Uzupełnij Firebase w kodzie, aby działała chmura.
        </div>
        <div id="content"></div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="Router.go('home', this)"><i data-lucide="home"></i></button>
        <button class="nav-item" onclick="Router.go('stops', this)"><i data-lucide="map-pin"></i></button>
        <button class="nav-item" onclick="Router.go('lines', this)"><i data-lucide="bus"></i></button>
        <button class="nav-item" onclick="Router.go('travel', this)"><i data-lucide="navigation"></i></button>
        <button class="nav-item" onclick="Router.go('admin', this)"><i data-lucide="settings"></i></button>
    </nav>

    <script>
        // ==========================================
        // 🔥 KONFIGURACJA FIREBASE (ZAMIEŃ NA WŁASNE)
        // ==========================================
        const firebaseConfig = {
            apiKey: "WKLEJ_SWOJ_KLUCZ_API",
            authDomain: "twoj-projekt.firebaseapp.com",
            databaseURL: "https://twoj-projekt-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "twoj-projekt",
            storageBucket: "twoj-projekt.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        // ==========================================
        // 📦 DOMYŚLNE DANE BAZOWE (mzk_v12_pro)
        // ==========================================
        const defaultData = {
            news: {
                "1714032000000": { 
                    content: "Witaj w MZK Pro! Baza danych została załadowana z sukcesem.", 
                    date: "25.04.2024" 
                }
            },
            categories: {
                "c1": { name: "Autobusy dzienne" },
                "c2": { name: "Tramwaje" }
            },
            stops: {
                "s1": { name: "Dworzec Główny", lines: ["102", "201"] },
                "s2": { name: "Centrum Handlowe", lines: ["102"] },
                "s3": { name: "Osiedle Słoneczne", lines: ["102", "201"] }
            },
            lines: {
                "102": {
                    direction: "Osiedle Słoneczne",
                    category: "c1",
                    baseTimes: ["06:10", "07:40", "08:15", "12:30", "15:45", "18:20"],
                    stops: [
                        { id: "s1", offset: 0 },
                        { id: "s2", offset: 12 },
                        { id: "s3", offset: 25 }
                    ]
                },
                "201": {
                    direction: "Dworzec Główny",
                    category: "c2",
                    baseTimes: ["05:00", "09:00", "14:00"],
                    stops: [
                        { id: "s3", offset: 0 },
                        { id: "s1", offset: 18 }
                    ]
                }
            }
        };

        let db;
        try {
            // Unikamy inicjalizacji jeśli config to wciąż placeholder
            if (firebaseConfig.apiKey !== "WKLEJ_SWOJ_KLUCZ_API") {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
            }
        } catch (e) {
            console.warn("Firebase nie zainicjowany poprawnie:", e);
        }
        
        const DB_KEY = "mzk_v12_pro";

        // GLOBALNY STAN APLIKACJI
        const AppState = {
            data: { lines: {}, stops: {}, news: {}, categories: {} },
            favs: JSON.parse(localStorage.getItem('mzk_favs')) || []
        };

        // ==========================================
        // 🚀 START APLIKACJI I POBIERANIE DANYCH
        // ==========================================
        function StartApp(theme) {
            document.body.className = theme;
            document.getElementById('theme-picker').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            lucide.createIcons();

            if(db) {
                db.ref(DB_KEY).on('value', snap => {
                    const data = snap.val();
                    if(data) {
                        AppState.data = data;
                        document.getElementById('db-error').style.display = 'none';
                        Router.go('home');
                    } else {
                        // Baza podłączona, ale pusta - ładujemy do niej strukturę domyślną!
                        db.ref(DB_KEY).set(defaultData).then(() => {
                            console.log("Zainicjowano bazę Firebase domyślnymi danymi!");
                        });
                    }
                });
            } else {
                // Tryb Offline / Fallback (użycie wbudowanych danych)
                document.getElementById('db-error').style.display = 'block';
                AppState.data = defaultData; // Ładujemy z pliku zamiast z chmury
                Router.go('home'); 
            }
        }

        // ==========================================
        // 🧭 ROUTER I RENDEROWANIE WIDOKÓW
        // ==========================================
        const Router = {
            current: 'home',
            go: function(view, btnElement) {
                this.current = view;
                if(btnElement) {
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btnElement.classList.add('active');
                }
                const container = document.getElementById('content');
                
                if(view === 'home') Render.home(container);
                if(view === 'stops') Render.stops(container);
                if(view === 'lines') Render.lines(container);
                if(view === 'travel') Render.travel(container);
                if(view === 'admin') Render.admin(container);
                
                lucide.createIcons();
            }
        };

        const Render = {
            // WIDOK 1: GŁÓWNA (Newsy i Ulubione)
            home: function(container) {
                const news = AppState.data.news || {};
                const latestNews = Object.values(news).reverse()[0] || { content: "Brak nowych komunikatów z MZK." };

                let html = `
                    <h1 style="margin-bottom:5px;">Cześć!</h1>
                    <p style="color:var(--text-dim); margin-top:0;">Aktualne komunikaty i ulubione trasy.</p>
                    
                    <div class="card" style="border-left: 4px solid var(--primary);">
                        <div>
                            <div style="font-weight:bold; margin-bottom:5px;">Komunikat MZK</div>
                            <div style="font-size:0.9rem;">${latestNews.content}</div>
                        </div>
                    </div>
                    <h3>Twoje Przystanki</h3>
                `;

                if(AppState.favs.length === 0) {
                    html += `<p style="color:var(--text-dim)">Nie dodałeś jeszcze żadnych przystanków do ulubionych.</p>`;
                } else {
                    AppState.favs.forEach(id => {
                        const stop = AppState.data.stops[id];
                        if(stop) html += this.stopCard(id, stop);
                    });
                }
                container.innerHTML = html;
            },

            // WIDOK 2: PRZYSTANKI
            stops: function(container) {
                container.innerHTML = `
                    <h1>Przystanki</h1>
                    <input type="text" class="search-box" placeholder="Szukaj przystanku..." oninput="Render.filter('stops-list', this.value)">
                    <div id="stops-list">
                        ${Object.keys(AppState.data.stops || {}).map(id => this.stopCard(id, AppState.data.stops[id])).join('')}
                    </div>
                `;
            },

            // WIDOK 3: LINIE
            lines: function(container) {
                container.innerHTML = `
                    <h1>Linie</h1>
                    <input type="text" class="search-box" placeholder="Szukaj linii..." oninput="Render.filter('lines-list', this.value)">
                    <div id="lines-list">
                        ${Object.keys(AppState.data.lines || {}).map(id => this.lineCard(id, AppState.data.lines[id])).join('')}
                    </div>
                `;
            },

            // KARTA PRZYSTANKU (HTML)
            stopCard: function(id, stop) {
                const isFav = AppState.favs.includes(id);
                return `
                    <div class="card item-card" data-search="${stop.name.toLowerCase()}" onclick="Render.stopBoard('${id}')">
                        <div>
                            <div style="font-weight:bold; font-size:1.1rem;">${stop.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-dim)">Linie: ${stop.lines.join(', ')}</div>
                        </div>
                        <button onclick="ToggleFav('${id}', event)" style="background:none; border:none; color:${isFav ? '#ef4444' : 'var(--text-dim)'}; cursor:pointer;">
                            <i data-lucide="heart" style="fill:${isFav ? '#ef4444' : 'none'}"></i>
                        </button>
                    </div>
                `;
            },

            // KARTA LINII (HTML)
            lineCard: function(id, line) {
                const category = AppState.data.categories && line.category ? AppState.data.categories[line.category].name : "Inna";
                return `
                    <div class="card item-card" data-search="${id} ${line.direction.toLowerCase()}" onclick="Render.schedule('${id}', '${line.stops[0]?.id}')">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div class="badge">${id}</div>
                            <div>
                                <div style="font-size:0.8rem; color:var(--text-dim)">${category} • Kierunek</div>
                                <div style="font-weight:bold;">${line.direction}</div>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" style="color:var(--text-dim)"></i>
                    </div>
                `;
            },

            // TABLICA ODJAZDÓW (Po kliknięciu w przystanek)
            stopBoard: function(id) {
                const stop = AppState.data.stops[id];
                if(!stop) return;
                
                if(stop.lines.length > 0) {
                    this.schedule(stop.lines[0], id);
                }
            },

            // PEŁNY ROZKŁAD JAZDY
            schedule: function(lineId, stopId) {
                const line = AppState.data.lines[lineId];
                const stop = AppState.data.stops[stopId];
                if(!line || !stop) return;

                const stopData = line.stops.find(s => s.id === stopId);
                const offset = stopData ? stopData.offset : 0;
                
                const scheduleMap = {};
                const nowMinutes = new Date().getHours() * 60 + new Date().getMinutes();

                line.baseTimes.forEach(t => {
                    let [h, m] = t.split(':').map(Number);
                    let totalMin = h * 60 + m + offset;
                    let realH = Math.floor(totalMin / 60) % 24;
                    let realM = totalMin % 60;
                    
                    if(!scheduleMap[realH]) scheduleMap[realH] = [];
                    scheduleMap[realH].push({ val: realM < 10 ? '0'+realM : realM, isPast: totalMin < nowMinutes });
                });

                document.getElementById('content').innerHTML = `
                    <button onclick="Router.go('lines')" style="background:none; border:none; color:var(--primary); font-weight:bold; margin-bottom:20px; cursor:pointer;">← POWRÓT</button>
                    <div style="margin-bottom:30px;">
                        <h1 style="margin:0; font-size:2.5rem;">Linia ${lineId}</h1>
                        <div style="font-weight:bold;">Przystanek: ${stop.name}</div>
                        <div style="color:var(--text-dim);">Kierunek: ${line.direction}</div>
                    </div>
                    <div>
                        ${Object.keys(scheduleMap).sort((a,b)=>a-b).map(h => `
                            <div class="hour-row">
                                <div class="hour-num">${h}</div>
                                <div style="display:flex; flex-wrap:wrap; gap:10px;">
                                    ${scheduleMap[h].map(m => `<div class="min-pill ${m.isPast ? 'past' : ''}">${m.val}</div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            },

            // PLANER PODRÓŻY
            travel: function(container) {
                const opts = Object.keys(AppState.data.stops || {}).map(id => `<option value="${id}">${AppState.data.stops[id].name}</option>`).join('');
                container.innerHTML = `
                    <h1>Planer Podróży</h1>
                    <div class="card" style="flex-direction:column; gap:15px; align-items:stretch;">
                        <select id="t-start" class="search-box" style="margin:0;"><option value="" disabled selected>Z przystanku...</option>${opts}</select>
                        <select id="t-end" class="search-box" style="margin:0;"><option value="" disabled selected>Do przystanku...</option>${opts}</select>
                        <button onclick="FindRoute()" style="background:var(--primary); color:white; padding:15px; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">Szukaj Połączenia</button>
                    </div>
                    <div id="route-result" style="margin-top:20px;"></div>
                `;
            },

            // ADMIN
            admin: function(container) {
                container.innerHTML = `
                    <h1>Panel Admina</h1>
                    <div class="card" style="flex-direction:column; align-items:stretch; gap:15px;">
                        <div style="font-weight:bold;">Dodaj nowy komunikat:</div>
                        <textarea id="admin-news" class="search-box" rows="3" style="margin:0;" placeholder="Wpisz treść komunikatu..."></textarea>
                        <button onclick="AddNews()" style="background:var(--primary); color:white; padding:15px; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">Opublikuj w chmurze</button>
                    </div>
                `;
            }
        };

        // ==========================================
        // 🛠 FUNKCJE POMOCNICZE
        // ==========================================
        Render.filter = function(listId, text) {
            const query = text.toLowerCase();
            document.querySelectorAll(`#${listId} .item-card`).forEach(el => {
                el.style.display = el.dataset.search.includes(query) ? 'flex' : 'none';
            });
        };

        function ToggleFav(id, event) {
            event.stopPropagation();
            const index = AppState.favs.indexOf(id);
            if(index > -1) AppState.favs.splice(index, 1);
            else AppState.favs.push(id);
            localStorage.setItem('mzk_favs', JSON.stringify(AppState.favs));
            Router.go(Router.current);
        }

        function FindRoute() {
            const start = document.getElementById('t-start').value;
            const end = document.getElementById('t-end').value;
            const res = document.getElementById('route-result');
            
            if(!start || !end || start === end) return res.innerHTML = "Wybierz dwa różne przystanki.";
            
            let html = "<h3>Znalezione opcje:</h3>";
            Object.keys(AppState.data.lines || {}).forEach(lId => {
                const line = AppState.data.lines[lId];
                const iStart = line.stops.findIndex(s => s.id === start);
                const iEnd = line.stops.findIndex(s => s.id === end);
                
                if(iStart > -1 && iEnd > -1 && iStart < iEnd) {
                    const time = line.stops[iEnd].offset - line.stops[iStart].offset;
                    html += `
                        <div class="card" onclick="Render.schedule('${lId}', '${start}')" style="cursor:pointer;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="badge">${lId}</div>
                                <div><b>${line.direction}</b></div>
                            </div>
                            <div style="font-weight:bold; color:var(--primary);">${time} min</div>
                        </div>
                    `;
                }
            });
            res.innerHTML = html === "<h3>Znalezione opcje:</h3>" ? "Brak połączenia bezpośredniego." : html;
        }

        function AddNews() {
            if(!db) return alert("Działasz w trybie offline. Podepnij Firebase, aby móc publikować zmiany!");
            const txt = document.getElementById('admin-news').value;
            if(!txt) return;
            
            db.ref(`${DB_KEY}/news/${Date.now()}`).set({ content: txt, date: new Date().toLocaleDateString() })
              .then(() => { alert('Dodano pomyślnie!'); document.getElementById('admin-news').value = ''; Router.go('home'); })
              .catch(e => alert("Błąd zapisu: " + e.message));
        }
    </script>
</body>
</html>
