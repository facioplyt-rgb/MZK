<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - CZYSTA INSTALACJA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* MAŁE KAFELKI */
        .line-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: flex-start; }
        .line-card-mini { 
            background: var(--surface); 
            padding: 10px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            width: auto; 
            min-width: 65px;
        }
        .line-badge { background: var(--accent); color: white; padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 1.1rem; min-width: 45px; text-align: center; }
        .tram-badge { background: var(--danger); }

        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 12px; }
        .tt-time { background: var(--accent); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 0.95rem; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: 800; }
        .nearby-info { color: var(--warn); font-size: 0.75rem; margin-top: 3px; font-weight: 400; opacity: 0.9; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }

        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        .adm-nav-main { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="lines-content">
            <div class="group-label">Tramwaje</div><div id="lines-tram" class="line-grid"></div>
            <div class="group-label">Autobusy</div><div id="lines-bus" class="line-grid"></div>
        </div>
        <div id="empty-msg" style="display:none; text-align:center; color:var(--text-sec); margin-top:60px; padding:20px;">
            <i class="fa-solid fa-cloud-arrow-up" style="font-size:3rem; color:var(--accent); margin-bottom:20px;"></i><br>
            <b style="color:white; font-size:1.2rem;">System wyczyszczony</b><br><br>
            Przejdź do zakładki <b>Admin</b> i wgraj swój plik backupu, aby przywrócić rozkłady.
        </div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333; margin-top:20px;">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333; margin-top:20px;">Wróć</button></div>
    <div id="s-stops" class="section"><div class="group-label">Przystanki</div><div id="public-stops-list"></div></div>
    <div id="s-news" class="section"><div class="group-label">Komunikaty</div><div id="public-news-list"></div></div>
    <div id="s-contact" class="section"><div class="group-label">Info</div><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło (123)" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
            </div>
            <div id="tab-l" class="adm-tab"><div id="adm-lines-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><textarea id="news-input" placeholder="Treść newsa..."></textarea><button onclick="addNews()" class="main-btn">Dodaj</button></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:150px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;">
                <button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:var(--accent)">Wgraj Backup (.txt)</button>
                <input type="file" id="importFile" style="display:none" onchange="importFullBackup(event)">
                <p style="font-size:0.7rem; color:var(--text-sec); text-align:center; margin-top:10px;">Wybierz swój plik z liniami, aby zasilić bazę.</p>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {} };

    function init() {
        // WYMUSZONE CZYSZCZENIE PRZY PIERWSZYM URUCHOMIENIU NOWEGO KODU
        if(!localStorage.getItem('mzk_hard_reset_done_v2')) {
            localStorage.clear();
            localStorage.setItem('mzk_hard_reset_done_v2', 'true');
        }

        const local = localStorage.getItem('mzk_full_backup_v12');
        if(local) db = JSON.parse(local);
        render();
    }

    function save() {
        localStorage.setItem('mzk_full_backup_v12', JSON.stringify(db));
        render();
    }

    function getStopsAsArray(line) {
        if (Array.isArray(line.stops)) return line.stops;
        if (typeof line.stops === 'string') {
            return line.stops.split('\n').filter(s => s.trim() !== "").map((s, i) => {
                let name = s.trim();
                let isNz = name.toLowerCase().includes('nż');
                return { name: name.replace(/ nż\.?| nż| \(nż\)/gi, "").trim(), time: (i === 0 ? 0 : 2), nz: isNz };
            });
        }
        return [];
    }

    function render() {
        const busC = document.getElementById('lines-bus');
        const tramC = document.getElementById('lines-tram');
        const content = document.getElementById('lines-content');
        const empty = document.getElementById('empty-msg');
        
        busC.innerHTML = ''; tramC.innerHTML = '';
        
        if(db.lines && db.lines.length > 0) {
            content.style.display = 'block';
            empty.style.display = 'none';
            const uniqueNums = [...new Set(db.lines.map(l => l.num))].sort((a,b)=>a-b);
            uniqueNums.forEach(num => {
                const l = db.lines.find(x => x.num === num);
                const div = document.createElement('div');
                div.className = 'line-card-mini';
                div.innerHTML = `<span class="line-badge ${l.type==='tram'?'tram-badge':''}">${num}</span>`;
                div.onclick = () => openVariants(num);
                if(l.type === 'tram') tramC.appendChild(div); else busC.appendChild(div);
            });
        } else {
            content.style.display = 'none';
            empty.style.display = 'block';
        }

        document.getElementById('contact-display').innerText = db.contact;
        document.getElementById('edit-contact-text').value = db.contact;
        document.getElementById('adm-lines-list').innerHTML = db.lines.map(l => `<div class="app-card"><b>${l.num}</b> -> ${l.dir}</div>`).join('');
    }

    function openVariants(num) {
        show('vars');
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, index) => {
            if(String(l.num) === String(num)) {
                const d = document.createElement('div'); d.className = "app-card";
                d.innerHTML = `<span><b>Kierunek:</b> ${l.dir}</span><i class="fa-solid fa-chevron-right"></i>`;
                d.onclick = () => renderTimetable(index);
                list.appendChild(d);
            }
        });
    }

    function renderTimetable(idx) {
        const line = db.lines[idx];
        show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        const stopsArray = getStopsAsArray(line);
        let totalTime = 0;

        stopsArray.forEach((stop, sIdx) => {
            totalTime += (parseInt(stop.time) || 0);
            const currentOffset = totalTime;
            const det = db.stopDetails[stop.name] || {nearby:"", isNz: stop.nz};
            const card = document.createElement('div');
            card.className = 'app-card';
            card.style.display = 'block';
            card.innerHTML = `<div style="display:flex; justify-content:space-between;"><b>${stop.name}</b> ${det.isNz || stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}</div><div id="g-${idx}-${sIdx}" class="tt-grid" style="display:none;"></div>`;
            card.onclick = () => {
                const g = document.getElementById(`g-${idx}-${sIdx}`);
                g.style.display = g.style.display === 'grid' ? 'none' : 'grid';
                if(g.style.display === 'grid') {
                    if(!line.hours) { g.innerHTML = "Brak godzin"; return; }
                    g.innerHTML = line.hours.split(',').map(h => {
                        let p = h.trim().split(':');
                        if(p.length < 2) return "";
                        let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + currentOffset);
                        return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                    }).join('');
                }
            };
            body.appendChild(card);
        });
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
        window.scrollTo(0,0);
    }

    function setTab(t) {
        document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none');
        document.getElementById('tab-'+t).style.display='block';
    }

    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }

    function importFullBackup(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            try {
                db = JSON.parse(ev.target.result);
                save();
                location.reload();
            } catch(err) { alert("Błąd pliku!"); }
        };
        r.readAsText(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
