<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK OMEGA GORZÓW - PRO SYSTEM</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --accent: #00d166; --bg: #03060b; --surf: #0d121d; --surf-l: #161d2b; 
            --text: #ffffff; --text-m: #94a3b8; --tram: #ff4757; --bus: #00a8ff; 
            --warn: #f1c40f; --korek: #e67e22; --border: rgba(255,255,255,0.06); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* SYSTEM STATUS BAR */
        #sync-status { position: fixed; bottom: 0; left: 0; width: 100%; padding: 5px 15px; font-size: 0.65rem; background: var(--surf); border-top: 1px solid var(--border); display: flex; justify-content: space-between; z-index: 5000; color: var(--text-m); font-weight: 600; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(3,6,11,0.95); backdrop-filter: blur(15px); z-index: 2000; }
        
        .side-menu { position: fixed; top: 0; left: -100%; width: 290px; height: 100%; background: var(--surf); z-index: 4000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; border-right: 1px solid var(--border); }
        .side-menu.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; display: none; backdrop-filter: blur(5px); }
        .overlay.show { display: block; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 120px; }
        .card { background: var(--surf); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; transition: 0.2s; }
        .module { display: none; }
        .module.active { display: block; animation: slideIn 0.3s ease-out; }
        
        /* SKELETON ANIMATION */
        .skeleton { background: linear-gradient(90deg, var(--surf-l) 25%, #1e293b 50%, var(--surf-l) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; height: 60px; margin-bottom: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; background: var(--surf-l); border: 1px solid var(--border); color: #fff; margin-bottom: 12px; font-size: 1rem; outline: none; }
        .btn { background: var(--accent); color: #000; padding: 16px; border: none; border-radius: 14px; width: 100%; font-weight: 900; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.96); }
        .btn-sm { padding: 8px 12px; font-size: 0.7rem; width: auto; background: var(--surf-l); color: #fff; border: 1px solid var(--border); }

        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .time-slot { background: var(--surf-l); padding: 8px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 0.85rem; border: 1px solid var(--border); color: var(--accent); }
        .time-slot.past { opacity: 0.2; text-decoration: line-through; color: #fff; }

        .nav-item { padding: 16px; display: flex; align-items: center; gap: 15px; font-weight: 600; cursor: pointer; border-radius: 15px; margin-bottom: 8px; transition: 0.2s; }
        .nav-item:hover { background: var(--surf-l); color: var(--accent); }

        .price-card { background: var(--surf-l); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .v-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-size: 0.75rem; }
        .badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; font-weight: 900; text-transform: uppercase; }
        
        .countdown-box { background: var(--accent); color: #000; padding: 12px; border-radius: 15px; text-align: center; font-weight: 900; margin-bottom: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="sync-status">
    <span><span id="status-dot" class="status-dot" style="background: #f1c40f;"></span> <span id="status-text">Inicjalizacja...</span></span>
    <span id="cloud-name">CLOUD: mzk_v12_pro</span>
</div>

<div class="overlay" id="overlay" onclick="App.toggleMenu(false)"></div>

<div class="side-menu" id="side-menu">
    <h2 style="font-weight: 900; margin-bottom: 40px; font-size: 2rem;">MZK <span style="color:var(--accent)">OMEGA</span></h2>
    <div class="nav-item" onclick="App.gate('news')"><i class="fa-solid fa-newspaper"></i> Aktualności</div>
    <div class="nav-item" onclick="App.gate('lines')"><i class="fa-solid fa-route"></i> Linie Jazdy</div>
    <div class="nav-item" onclick="App.gate('stops')"><i class="fa-solid fa-location-dot"></i> Przystanki</div>
    <div class="nav-item" onclick="App.gate('alerts')"><i class="fa-solid fa-bullhorn"></i> Alerty Społeczności</div>
    <div class="nav-item" onclick="App.gate('pricing')"><i class="fa-solid fa-money-bill-wave"></i> Cennik Biletów</div>
    <div style="margin-top: 50px; border-top: 1px solid var(--border); padding-top: 20px;">
        <div class="nav-item" onclick="App.gate('admin')"><i class="fa-solid fa-user-shield"></i> PANEL ADMINA</div>
    </div>
</div>

<header>
    <div onclick="App.toggleMenu(true)" style="font-size: 1.6rem; cursor: pointer; color: var(--accent);"><i class="fa-solid fa-bars-staggered"></i></div>
    <div id="live-clock" style="font-weight: 900; letter-spacing: 1px; background: var(--surf-l); padding: 5px 15px; border-radius: 10px;">00:00:00</div>
</header>

<div class="container">
    <section id="mod-news" class="module active"><div id="news-list"></div></section>
    
    <section id="mod-lines" class="module">
        <div id="fav-section" style="display:none; margin-bottom: 30px;">
            <h3 style="color:var(--tram); margin-bottom:15px;"><i class="fa-solid fa-heart"></i> MOJE LINIE</h3>
            <div id="fav-list"></div>
        </div>
        <h2 style="margin-bottom:20px; font-weight: 900;">SIECI ROZKŁADÓW</h2>
        <div id="lines-list"></div>
    </section>

    <section id="mod-stops" class="module">
        <h2 style="margin-bottom:15px;">WYSZUKIWARKA PRZYSTANKÓW</h2>
        <input type="text" id="stop-search" placeholder="Gdzie jedziemy?" oninput="ModStops.search(this.value)">
        <div id="stops-results"></div>
    </section>

    <section id="mod-alerts" class="module">
        <h2 style="margin-bottom:15px;">CENTRUM ALERTÓW</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <button class="btn" style="background:var(--tram)" onclick="ModAlerts.openForm('KANAR')"><i class="fa-solid fa-user-secret"></i> KANAR</button>
            <button class="btn" style="background:var(--warn)" onclick="ModAlerts.openForm('AWARIA')"><i class="fa-solid fa-car-burst"></i> AWARIA</button>
            <button class="btn" style="background:var(--korek)" onclick="ModAlerts.openForm('KOREK')"><i class="fa-solid fa-traffic-light"></i> KOREK</button>
            <button class="btn" style="background:var(--bus)" onclick="ModAlerts.openForm('REMONT')"><i class="fa-solid fa-trowel-bricks"></i> REMONT</button>
        </div>
        <div id="alerts-list"></div>
    </section>

    <section id="mod-pricing" class="module">
        <div id="price-list-container"></div>
    </section>

    <section id="mod-details" class="module"></section>

    <section id="mod-admin" class="module">
        <div id="admin-auth" class="card">
            <h3 style="margin-bottom:20px; text-align:center;">Autoryzacja Systemowa</h3>
            <input type="email" id="admin-email" placeholder="Email administratora...">
            <input type="password" id="admin-pass" placeholder="Hasło...">
            <button class="btn" onclick="ModAdmin.login()">ZALOGUJ DO CLOUD</button>
        </div>
        
        <div id="admin-cms" style="display:none;">
            <div style="display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:10px;">
                <button class="btn btn-sm" onclick="ModAdmin.tab('L')">LINIE</button>
                <button class="btn btn-sm" onclick="ModAdmin.tab('N')">NEWSY</button>
                <button class="btn btn-sm" onclick="ModAdmin.tab('P')">CENY</button>
                <button class="btn btn-sm" onclick="ModAdmin.tab('A')" style="background:#ff4757">ALERTY</button>
                <button class="btn btn-sm" onclick="ModAdmin.syncMZK()" style="background:#2ecc71">SYNC GORZÓW</button>
            </div>
            
            <div id="atab-L" class="atab">
                <div class="card" style="border-top: 5px solid var(--accent);">
                    <input id="al-id" type="hidden">
                    <input id="al-num" placeholder="Numer linii">
                    <input id="al-dir" placeholder="Kierunek">
                    <textarea id="al-stops" placeholder="Przystanki (po przecinku)"></textarea>
                    <textarea id="al-times" placeholder="Godziny (po przecinku)"></textarea>
                    <select id="al-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                    <button class="btn" onclick="ModAdmin.save('lines')">ZAPISZ LINIĘ</button>
                </div>
                <div id="admin-lines-list"></div>
            </div>

            <div id="atab-N" class="atab" style="display:none;">
                <div class="card" style="border-top: 5px solid var(--accent);">
                    <input id="an-id" type="hidden">
                    <input id="an-t" placeholder="Tytuł newsa">
                    <input id="an-cat" placeholder="Kategoria">
                    <textarea id="an-c" placeholder="Treść..." style="height:150px;"></textarea>
                    <button class="btn" onclick="ModAdmin.save('news')">PUBLIKUJ NEWS</button>
                </div>
                <div id="admin-news-list"></div>
            </div>

            <div id="atab-P" class="atab" style="display:none;">
                <div class="card" style="border-top: 5px solid var(--accent);">
                    <input id="ap-id" type="hidden">
                    <input id="ap-n" placeholder="Nazwa biletu">
                    <input id="ap-p" placeholder="Cena">
                    <button class="btn" onclick="ModAdmin.save('prices')">DODAJ BILET</button>
                </div>
                <div id="admin-prices-list"></div>
            </div>

            <div id="atab-A" class="atab" style="display:none;">
                <h4 style="margin-bottom:10px;">Zarządzanie zgłoszeniami:</h4>
                <div id="admin-alerts-list"></div>
            </div>
        </div>
    </section>
</div>

<script>
const App = {
    dbKey: 'mzk_v12_pro',
    data: { news: {}, lines: {}, prices: {}, reports: {} },
    favs: JSON.parse(localStorage.getItem('mzk_favs')) || [],
    
    init() {
        this.status("Inicjalizacja SDK...", "#f1c40f");
        firebase.initializeApp({
            apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio"
        });
        this.db = firebase.database();
        this.auth = firebase.auth();

        // Nasłuchiwanie zmian w danych
        this.db.ref(this.dbKey).on('value', snap => {
            this.data = snap.val() || { news: {}, lines: {}, prices: {}, reports: {} };
            this.renderAll();
            this.status("Połączono z chmurą", "#00d166");
        });

        // Nasłuchiwanie sesji admina
        this.auth.onAuthStateChanged(user => {
            if(user) {
                ModAdmin.logged = true;
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('admin-cms').style.display = 'block';
                ModAdmin.drawCMS();
            }
        });

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pl-PL');
        }, 1000);
    },

    status(txt, col) {
        document.getElementById('status-text').innerText = txt;
        document.getElementById('status-dot').style.background = col;
    },

    toggleMenu(open) {
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('open', open);
        overlay.classList.toggle('show', open);
    },

    gate(id) {
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
        document.getElementById('mod-' + id).classList.add('active');
        this.toggleMenu(false);
        window.scrollTo(0,0);
    },

    renderAll() {
        ModNews.draw();
        ModLines.render();
        ModPricing.draw();
        ModAlerts.draw();
    }
};

const ModNews = {
    draw() {
        const box = document.getElementById('news-list');
        box.innerHTML = '<h2 style="margin-bottom:20px; font-weight:900;">AKTUALNOŚCI</h2>';
        if(!Object.keys(App.data.news || {}).length) {
            for(let i=0; i<3; i++) box.innerHTML += '<div class="skeleton"></div>';
            return;
        }
        Object.entries(App.data.news).reverse().forEach(([id, n]) => {
            box.innerHTML += `<div class="card" onclick="ModNews.details('${id}')" style="cursor:pointer; border-left: 4px solid var(--accent);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span class="badge" style="background:rgba(0,209,102,0.1); color:var(--accent);">${n.category || 'INFO'}</span>
                    <small style="opacity:0.4;">${n.date || 'dzisiaj'}</small>
                </div>
                <h3 style="line-height:1.3;">${n.title}</h3>
            </div>`;
        });
    },
    details(id) {
        const n = App.data.news[id];
        document.getElementById('mod-details').innerHTML = `
            <button class="btn btn-sm" onclick="App.gate('news')" style="margin-bottom:15px;">← POWRÓT</button>
            <div class="card">
                <h1>${n.title}</h1>
                <p style="margin-top:20px; line-height:1.7; opacity:0.8; white-space:pre-wrap;">${n.content}</p>
            </div>`;
        App.gate('details');
    }
};

const ModLines = {
    render() {
        const box = document.getElementById('lines-list');
        box.innerHTML = '';
        let grouped = {};
        Object.entries(App.data.lines || {}).forEach(([id, l]) => {
            if(!grouped[l.num]) grouped[l.num] = [];
            grouped[l.num].push({id, ...l});
        });

        Object.keys(grouped).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
            const vs = grouped[num];
            box.innerHTML += `<div class="card" style="cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='none'?'block':'none'">
                <b style="background:var(--accent); color:#000; padding:4px 10px; border-radius:8px; margin-right:15px;">${num}</b> <b>Linia ${num}</b>
                <i class="fa-solid fa-chevron-down" style="float:right; opacity:0.3; margin-top:5px;"></i>
            </div>
            <div style="display:none; padding-left:20px; margin-bottom:15px;">
                ${vs.map(v => `<div class="card" style="background:var(--surf-l)" onclick="ModLines.details('${v.id}')">${v.dir}</div>`).join('')}
            </div>`;
        });
    },
    details(id) {
        const l = App.data.lines[id];
        const times = l.times ? l.times.split(',').sort() : [];
        const stops = l.stops ? l.stops.split(',') : [];
        const now = new Date();
        const nowStr = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');

        const nextDep = times.find(t => t.trim() > nowStr);
        let countdownHtml = '';
        if(nextDep) {
            const [h, m] = nextDep.split(':');
            const depT = new Date(); depT.setHours(h, m, 0);
            const diff = Math.floor((depT - now) / 60000);
            countdownHtml = `<div class="countdown-box">NASTĘPNY ODJAZD ZA ${diff} MIN</div>`;
        }

        document.getElementById('mod-details').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <button class="btn btn-sm" onclick="App.gate('lines')">← POWRÓT</button>
                <i class="fa-solid fa-heart" onclick="ModLines.toggleFav('${id}')" style="font-size:1.5rem; color:${App.favs.includes(id)?'#ff4757':'#334155'}"></i>
            </div>
            ${countdownHtml}
            <div class="card">
                <h1 style="font-size:3.5rem; font-weight:900; line-height:1;">${l.num}</h1>
                <h2 style="color:var(--accent); margin-bottom:20px;">${l.dir}</h2>
                <div class="time-grid">${times.map(t => `<div class="time-slot ${t.trim() < nowStr ? 'past' : ''}">${t.trim()}</div>`).join('')}</div>
                <h3 style="margin:20px 0 10px 0;">TRASA:</h3>
                <div style="border-left:2px solid var(--accent); padding-left:15px;">
                    ${stops.map(s => `<div style="margin-bottom:12px; font-weight:600;">${s.trim()}</div>`).join('')}
                </div>
            </div>`;
        App.gate('details');
    },
    toggleFav(id) {
        if(App.favs.includes(id)) App.favs = App.favs.filter(x => x!==id);
        else App.favs.push(id);
        localStorage.setItem('mzk_favs', JSON.stringify(App.favs));
        this.details(id);
    }
};

const ModAlerts = {
    openForm(type) {
        const lines = [...new Set(Object.values(App.data.lines).map(l => l.num))].sort((a,b)=>a-b);
        document.getElementById('mod-details').innerHTML = `
            <button class="btn btn-sm" onclick="App.gate('alerts')">← COFNIJ</button>
            <div class="card" style="margin-top:20px;">
                <h3>ZGŁOŚ: ${type}</h3>
                <select id="rl" onchange="ModAlerts.dirs(this.value)"><option>Wybierz linię...</option>${lines.map(l=>`<option>${l}</option>`)}</select>
                <select id="rd"></select>
                <input id="r-loc" placeholder="Gdzie to jest?">
                <button class="btn" onclick="ModAlerts.send('${type}')">WYŚLIJ ALERT</button>
            </div>`;
        App.gate('details');
    },
    dirs(n) { 
        const opts = Object.values(App.data.lines).filter(l=>l.num===n).map(v=>`<option>${v.dir}</option>`).join('');
        document.getElementById('rd').innerHTML = opts || '<option>Brak kierunków</option>';
    },
    send(t) {
        const d = { type:t, line:document.getElementById('rl').value, dir:document.getElementById('rd').value, location:document.getElementById('r-loc').value, time:Date.now(), yes:0, no:0 };
        App.db.ref(App.dbKey + '/reports').push(d).then(() => App.gate('alerts'));
    },
    vote(id, v) { 
        if(localStorage.getItem('v_'+id)) return; 
        App.db.ref(`${App.dbKey}/reports/${id}/${v}`).transaction(c => (c||0)+1); 
        localStorage.setItem('v_'+id,'1'); 
    },
    draw() {
        const box = document.getElementById('alerts-list'); box.innerHTML = '';
        Object.entries(App.data.reports || {}).reverse().forEach(([id, r]) => {
            const mins = Math.floor((Date.now() - r.time)/60000);
            if(mins > 60) return; // Ukryj stare alerty
            let col = r.type==='KANAR'? 'var(--tram)' : r.type==='KOREK'? 'var(--korek)' : 'var(--warn)';
            box.innerHTML += `
                <div class="card" style="border-left: 5px solid ${col}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="color:${col}">${r.type}</b> <small style="opacity:0.5;">${mins}m temu</small>
                    </div>
                    <p style="margin:10px 0; font-weight:700;">Linia ${r.line} → ${r.dir}</p>
                    <p style="font-size:0.8rem; opacity:0.7; margin-bottom:15px;">Lokalizacja: ${r.location}</p>
                    <div style="display:flex; gap:10px;">
                        <button class="v-btn" style="background:rgba(0,209,102,0.1); color:var(--accent)" onclick="ModAlerts.vote('${id}','yes')">POTWIERDZAM (${r.yes||0})</button>
                        <button class="v-btn" style="background:rgba(255,71,87,0.1); color:var(--tram)" onclick="ModAlerts.vote('${id}','no')">NIE MA (${r.no||0})</button>
                    </div>
                </div>`;
        });
    }
};

const ModPricing = {
    draw() {
        const box = document.getElementById('price-list-container');
        box.innerHTML = '<h2>OPŁATY I BILETY</h2><br>';
        if(!Object.keys(App.data.prices || {}).length) {
            for(let i=0; i<4; i++) box.innerHTML += '<div class="skeleton"></div>';
            return;
        }
        Object.values(App.data.prices).forEach(p => {
            box.innerHTML += `<div class="price-card">
                <div><div style="font-weight:900;">${p.name}</div><small style="opacity:0.5;">Bilet MZK Gorzów</small></div>
                <div style="color:var(--accent); font-weight:900;">${p.price} zł</div>
            </div>`;
        });
    }
};

const ModStops = {
    search(q) {
        const box = document.getElementById('stops-results'); box.innerHTML = '';
        if(!q || q.length < 2) return;
        let stops = new Set();
        Object.values(App.data.lines).forEach(l => l.stops?.split(',').forEach(s => stops.add(s.trim())));
        [...stops].sort().filter(s => s.toLowerCase().includes(q.toLowerCase())).forEach(s => {
            box.innerHTML += `<div class="card" onclick="ModStops.show('${s}')"><i class="fa-solid fa-location-dot" style="color:var(--accent); margin-right:10px;"></i> ${s}</div>`;
        });
    },
    show(name) {
        const lines = Object.entries(App.data.lines).filter(([id, l]) => l.stops?.includes(name));
        document.getElementById('mod-details').innerHTML = `<button class="btn btn-sm" onclick="App.gate('stops')">← POWRÓT</button>
            <div class="card" style="margin-top:20px;"><h2>${name}</h2><p style="opacity:0.5; margin:10px 0;">Linie na tym przystanku:</p>
            ${lines.map(([id, l]) => `<div class="card" style="background:var(--surf-l)" onclick="ModLines.details('${id}')"><b>${l.num}</b> → ${l.dir}</div>`).join('')}</div>`;
        App.gate('details');
    }
};

const ModAdmin = {
    logged: false,
    async login() {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-pass').value;
        try {
            await App.auth.signInWithEmailAndPassword(email, pass);
            App.status("Autoryzacja OK", "#00d166");
        } catch(e) { alert("Błąd: " + e.message); }
    },
    tab(t) { document.querySelectorAll('.atab').forEach(x => x.style.display='none'); document.getElementById('atab-'+t).style.display='block'; },
    
    async syncMZK() {
        const line = prompt("Numer linii do synchronizacji:");
        if(!line) return;
        App.status("Łączenie z mzk-gorzow.com.pl...", "#f1c40f");
        
        // Symulacja zaawansowanego parsera (wersja realna wymaga CORS Proxy)
        try {
            // Przykładowy format URL MZK Gorzów: mzk-gorzow.com.pl/rozklady/linia_XXX.html
            // Tutaj wstawiamy dane symulowane, które "udają" pobranie dla demonstracji
            setTimeout(() => {
                document.getElementById('al-num').value = line;
                document.getElementById('al-dir').value = "Kierunek Automatyczny";
                document.getElementById('al-stops').value = "Przystanek 1, Przystanek 2, Przystanek 3";
                document.getElementById('al-times').value = "06:00, 07:15, 08:30, 10:00, 12:45, 14:10";
                App.status("Dane zaimportowane!", "#00d166");
                this.tab('L');
            }, 2000);
        } catch(e) { App.status("Błąd Sync", "#ff4757"); }
    },

    save(type) {
        let id = document.getElementById('al-id').value || null;
        let data = {};
        if(type==='lines') {
            data = { num: document.getElementById('al-num').value, dir: document.getElementById('al-dir').value, stops: document.getElementById('al-stops').value, times: document.getElementById('al-times').value, type: document.getElementById('al-type').value };
        } else if(type==='news') {
            data = { title: document.getElementById('an-t').value, category: document.getElementById('an-cat').value, content: document.getElementById('an-c').value, date: new Date().toLocaleDateString('pl-PL') };
        } else if(type==='prices') {
            data = { name: document.getElementById('ap-n').value, price: document.getElementById('ap-p').value };
        }
        
        const ref = id ? App.db.ref(`${App.dbKey}/${type}/${id}`) : App.db.ref(`${App.dbKey}/${type}`).push();
        ref.set(data).then(() => { 
            alert("Zapisano!"); 
            this.drawCMS(); 
        });
    },

    drawCMS() {
        const render = (type, boxId) => {
            const b = document.getElementById(boxId); b.innerHTML = '';
            Object.entries(App.data[type] || {}).forEach(([id, item]) => {
                b.innerHTML += `<div class="card" style="font-size:0.8rem; display:flex; justify-content:space-between; align-items:center; background:var(--surf-l);">
                    <span><b>${item.num || item.title || item.name}</b></span>
                    <span>
                        <i class="fa-solid fa-trash" style="color:var(--tram); cursor:pointer;" onclick="if(confirm('Usunąć?')) App.db.ref('${App.dbKey}/${type}/${id}').remove()"></i>
                    </span>
                </div>`;
            });
        };
        render('lines', 'admin-lines-list');
        render('news', 'admin-news-list');
        render('prices', 'admin-prices-list');
    }
};

App.init();
</script>
</body>
