<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; line-height: 1.4; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .line-square:active { transform: scale(0.95); }
        .line-square.bus { border-bottom: 4px solid var(--accent); }
        .line-square.tram { border-bottom: 4px solid var(--danger); }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: 800; }
        
        /* Styl Rozkładu (Tabela) */
        .tt-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0b0f19; border-radius: 12px; overflow: hidden; display: none; }
        .tt-row { border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 50px 1fr 1fr 1fr; }
        .tt-header { background: #1c252e; font-weight: 800; font-size: 0.65rem; color: var(--text-sec); text-transform: uppercase; padding: 8px 0; }
        .tt-cell { padding: 10px 5px; text-align: center; font-size: 0.85rem; border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 4px; }
        .tt-cell:last-child { border-right: none; }
        .tt-hour { font-weight: 800; color: var(--accent); background: rgba(0,171,85,0.1); }
        .tt-min { font-weight: 400; }
        .today-col { background: rgba(0, 171, 85, 0.05); }

        /* Formularze */
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid var(--border); color: white; font-family: inherit; }
        .day-label { font-size: 0.7rem; color: var(--accent); font-weight: 800; margin-bottom: 5px; display: block; }

        /* Admin UI */
        .adm-nav-main { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" class="search-box" placeholder="Szukaj przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    <div id="s-contact" class="section"><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Wróć</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
                <button onclick="setTab('z')" id="mt-z">ZAAW</button>
            </div>
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:200px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportFullBackup()" class="main-btn">Eksportuj Backup</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    
    <div class="day-label">DNI ROBOCZE (np. 08:10, 08:40)</div>
    <textarea id="fl-hours-work" placeholder="Godziny w dni robocze..."></textarea>
    
    <div class="day-label">SOBOTY</div>
    <textarea id="fl-hours-sat" placeholder="Godziny w soboty..."></textarea>
    
    <div class="day-label">NIEDZIELE I ŚWIĘTA</div>
    <textarea id="fl-hours-sun" placeholder="Godziny w niedziele..."></textarea>

    <div class="day-label">PRZYSTANKI</div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {}, lineCategories: ["Tramwaje", "Autobusy"] };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_v13_advanced');
        if(local) db = JSON.parse(local);
        render();
    }

    function save() { 
        localStorage.setItem('mzk_v13_advanced', JSON.stringify(db)); 
        render(); 
    }

    // --- LOGIKA ROZKŁADU (PODZIAŁ NA H:M) ---
    function groupHours(hourString, offsetMinutes = 0) {
        if(!hourString) return {};
        let grouped = {};
        hourString.split(',').forEach(h => {
            let parts = h.trim().split(':');
            if(parts.length < 2) return;
            
            let d = new Date();
            d.setHours(parseInt(parts[0]), parseInt(parts[1]) + offsetMinutes);
            
            let hr = d.getHours().toString().padStart(2, '0');
            let min = d.getMinutes().toString().padStart(2, '0');
            
            if(!grouped[hr]) grouped[hr] = [];
            grouped[hr].push(min);
        });
        return grouped;
    }

    function renderTimetable(idx) {
        const line = db.lines[idx];
        show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2 style="margin-left:5px;">${line.dir}</h2>`;
        
        const body = document.getElementById('tt-body');
        body.innerHTML = '';
        
        const now = new Date();
        const dayType = now.getDay() === 6 ? 'sat' : (now.getDay() === 0 ? 'sun' : 'work');

        let totalOffset = 0;
        line.stops.forEach((stop, sIdx) => {
            totalOffset += parseInt(stop.time) || 0;
            const det = db.stopDetails[stop.name] || {isNz: stop.nz};
            
            const card = document.createElement('div');
            card.className = 'app-card';
            card.style.display = 'block';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${stop.name} ${det.isNz ? '<span class="nz-badge">NŻ</span>' : ''}</b>
                    <i class="fa-solid fa-chevron-down" style="font-size:0.8rem; opacity:0.5;"></i>
                </div>
                <div id="tt-box-${sIdx}" class="tt-table">
                    <div class="tt-row tt-header">
                        <div class="tt-cell">Godz</div>
                        <div class="tt-cell ${dayType==='work'?'today-col':''}">Roboczy</div>
                        <div class="tt-cell ${dayType==='sat'?'today-col':''}">Sobota</div>
                        <div class="tt-cell ${dayType==='sun'?'today-col':''}">Nd/Św</div>
                    </div>
                </div>
            `;

            card.onclick = () => {
                const table = document.getElementById(`tt-box-${sIdx}`);
                const isVisible = table.style.display === 'block';
                table.style.display = isVisible ? 'none' : 'block';
                
                if(!isVisible) {
                    // Generuj wiersze godzinowe
                    const hWork = groupHours(line.hoursWork, totalOffset);
                    const hSat = groupHours(line.hoursSat, totalOffset);
                    const hSun = groupHours(line.hoursSun, totalOffset);
                    
                    const allHours = [...new Set([...Object.keys(hWork), ...Object.keys(hSat), ...Object.keys(hSun)])].sort();
                    
                    let html = table.innerHTML; // zachowaj nagłówek
                    allHours.forEach(h => {
                        html += `
                            <div class="tt-row">
                                <div class="tt-cell tt-hour">${h}</div>
                                <div class="tt-cell ${dayType==='work'?'today-col':''}">${(hWork[h] || []).join(', ')}</div>
                                <div class="tt-cell ${dayType==='sat'?'today-col':''}">${(hSat[h] || []).join(', ')}</div>
                                <div class="tt-cell ${dayType==='sun'?'today-col':''}">${(hSun[h] || []).join(', ')}</div>
                            </div>
                        `;
                    });
                    table.innerHTML = html;
                }
            };
            body.appendChild(card);
        });
    }

    // --- FUNKCJE ADMINA ---
    function openLineForm(idx) {
        curLineIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hoursWork:"", hoursSat:"", hoursSun:"", stops:[]} : db.lines[idx];
        
        document.getElementById('fl-num').value = l.num;
        document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-hours-work').value = l.hoursWork || "";
        document.getElementById('fl-hours-sat').value = l.hoursSat || "";
        document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        
        document.getElementById('fl-stops-list').innerHTML = '';
        (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.stop-edit-item')).map(el => ({
            name: el.querySelector('.edit-stop-name').value.trim(),
            time: parseInt(el.querySelector('.edit-stop-time').value) || 0,
            nz: el.querySelector('.edit-stop-nz').checked
        })).filter(s => s.name !== "");

        const data = {
            num: document.getElementById('fl-num').value,
            dir: document.getElementById('fl-dir').value,
            type: document.getElementById('fl-type').value,
            hoursWork: document.getElementById('fl-hours-work').value,
            hoursSat: document.getElementById('fl-hours-sat').value,
            hoursSun: document.getElementById('fl-hours-sun').value,
            stops: stops
        };

        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function addStopRow(name = "", time = 2, nz = false) {
        const div = document.createElement('div');
        div.className = 'stop-edit-item';
        div.style.cssText = "display:grid; grid-template-columns: 1fr 60px 40px 40px; gap:5px; margin-bottom:8px;";
        div.innerHTML = `
            <input type="text" value="${name}" class="edit-stop-name" placeholder="Nazwa">
            <input type="number" value="${time}" class="edit-stop-time">
            <input type="checkbox" ${nz?'checked':''} class="edit-stop-nz">
            <button onclick="this.parentElement.remove()" style="background:var(--danger); border:none; border-radius:8px; color:white;">X</button>
        `;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function render() {
        const sHome = document.getElementById('s-home');
        sHome.innerHTML = '<div class="group-label">Wszystkie Linie</div>';
        const grid = document.createElement('div'); grid.className = 'lines-grid';
        
        db.lines.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = `line-square ${l.type}`;
            div.innerText = l.num;
            div.onclick = () => renderTimetable(i);
            grid.appendChild(div);
        });
        sHome.appendChild(grid);

        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `
            <div class="app-card">
                <b>${l.num}</b> -> ${l.dir}
                <button onclick="openLineForm(${i})" style="float:right; color:var(--accent); background:none; border:none; font-weight:800;">EDYTUJ</button>
            </div>
        `).join('');
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
    }

    function setTab(t) {
        document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none');
        document.getElementById('tab-'+t).style.display='block';
        document.querySelectorAll('.adm-nav-main button').forEach(b => b.classList.remove('active'));
        document.getElementById('mt-'+t).classList.add('active');
    }

    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }

    init();
</script>
</body>
</html>
