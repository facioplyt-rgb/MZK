<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK OMEGA V18 ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #00d166; --bg: #05080f; --surf: #101622; --surf-l: #1a2332; 
            --text: #ffffff; --text-m: #94a3b8; --tram: #ff4757; --bus: #00a8ff; --border: rgba(255,255,255,0.08); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,8,15,0.9); backdrop-filter: blur(10px); z-index: 1000; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 120px; }
        .card { background: var(--surf); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .module { display: none; }
        .module.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; background: var(--surf-l); border: 1px solid var(--border); color: #fff; margin-bottom: 10px; font-size: 1rem; }
        .btn { background: var(--accent); color: #000; padding: 15px; border: none; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-sm { padding: 8px 12px; font-size: 0.7rem; width: auto; margin: 0; }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--surf); z-index: 3000; transition: 0.3s; padding: 25px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .side-menu.open { left: 0; }
        .nav-item { padding: 16px; display: flex; align-items: center; gap: 15px; font-weight: 600; cursor: pointer; border-radius: 12px; margin-bottom: 5px; }
        .nav-item:hover { background: var(--surf-l); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2500; display: none; backdrop-filter: blur(4px); }
        .overlay.show { display: block; }

        /* ROZKŁAD & LINIE */
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .time-slot { background: var(--surf-l); padding: 8px; border-radius: 8px; text-align: center; font-weight: 600; font-size: 0.85rem; border: 1px solid var(--border); color: var(--accent); }
        .time-slot.past { opacity: 0.2; text-decoration: line-through; border-color: transparent; }
        .stops-timeline { margin-top: 20px; border-left: 2px solid var(--surf-l); padding-left: 20px; }
        .stop-point { position: relative; margin-bottom: 20px; cursor: pointer; }
        .stop-point::before { content: ''; position: absolute; left: -27px; top: 4px; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: 3px solid var(--bg); }
        
        .fav-heart { position: absolute; right: 15px; top: 15px; font-size: 1.2rem; cursor: pointer; color: var(--text-m); z-index: 10; }
        .fav-heart.active { color: #ff4757; }

        /* NEWS & ALERTY */
        .news-badge { background: var(--accent); color: #000; font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; font-weight: 900; text-transform: uppercase; }
        .news-date { font-size: 0.75rem; opacity: 0.5; display: flex; align-items: center; gap: 5px; }
        .verify-btns { display: flex; gap: 10px; margin-top: 10px; }
        .v-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: 900; font-size: 0.75rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="App.toggleMenu()"></div>

<div class="side-menu" id="side-menu">
    <h2 style="font-weight: 900; margin-bottom: 30px;">MZK <span style="color:var(--accent)">OMEGA</span></h2>
    <div class="nav-item" onclick="App.gate('news')"><i class="fa-solid fa-newspaper"></i> Aktualności</div>
    <div class="nav-item" onclick="App.gate('lines')"><i class="fa-solid fa-route"></i> Linie Jazdy</div>
    <div class="nav-item" onclick="App.gate('stops')"><i class="fa-solid fa-location-dot"></i> Przystanki</div>
    <div class="nav-item" onclick="App.gate('alerts')"><i class="fa-solid fa-bullhorn"></i> Alerty Społeczności</div>
    <div class="nav-item" onclick="App.gate('pricing')"><i class="fa-solid fa-tag"></i> Cennik Biletów</div>
    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <div class="nav-item" onclick="App.gate('admin')" style="opacity: 0.2;"><i class="fa-solid fa-lock"></i> Panel Admina</div>
    </div>
</div>

<header>
    <div onclick="App.toggleMenu()" style="font-size: 1.5rem;"><i class="fa-solid fa-bars-staggered"></i></div>
    <div id="live-clock" style="font-weight: 900; color: var(--accent);">00:00:00</div>
</header>

<div class="container">
    <section id="mod-news" class="module active"><div id="news-list"></div></section>

    <section id="mod-lines" class="module">
        <div id="fav-section" style="display:none; margin-bottom: 20px;"><h3 style="color:#ff4757; margin-bottom:10px;">❤️ Ulubione</h3><div id="fav-list"></div></div>
        <div style="display:flex; gap:8px; margin-bottom:15px; overflow-x:auto;">
            <button class="btn btn-sm" onclick="ModLines.render('all')">Wszystkie</button>
            <button class="btn btn-sm" style="background:var(--bus)" onclick="ModLines.render('bus')">Autobusy</button>
            <button class="btn btn-sm" style="background:var(--tram)" onclick="ModLines.render('tram')">Tramwaje</button>
        </div>
        <div id="lines-list"></div>
    </section>

    <section id="mod-stops" class="module">
        <h2>Wyszukiwarka Przystanków</h2>
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="ModStops.search(this.value)">
        <div id="stops-results"></div>
    </section>

    <section id="mod-alerts" class="module">
        <h2>Zgłoś utrudnienie</h2>
        <div class="card">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <button class="btn btn-sm" style="background:var(--tram)" onclick="ModAlerts.openForm('KANAR')">KANAR</button>
                <button class="btn btn-sm" style="background:var(--bus)" onclick="ModAlerts.openForm('AWARIA')">AWARIA</button>
                <button class="btn btn-sm" style="background:#f1c40f; color:#000" onclick="ModAlerts.openForm('KOREK')">KOREK</button>
            </div>
        </div>
        <div id="alerts-list"></div>
    </section>

    <section id="mod-pricing" class="module"><h2>Cennik Biletów</h2><div class="card"><table style="width:100%" id="price-table"></table></div></section>

    <section id="mod-details" class="module"></section>

    <section id="mod-admin" class="module">
        <div id="admin-auth" class="card"><h3>Dostęp Administracyjny</h3><input type="password" id="pass-val" placeholder="Hasło..."><button class="btn" onclick="ModAdmin.login()">ZALOGUJ</button></div>
        <div id="admin-cms" style="display:none;">
            <div style="display:flex; gap:5px; margin-bottom:15px; overflow-x:auto;">
                <button class="btn btn-sm" onclick="ModAdmin.tab('L')">LINIE</button>
                <button class="btn btn-sm" onclick="ModAdmin.tab('N')">NEWS</button>
                <button class="btn btn-sm" onclick="ModAdmin.tab('P')">CENY</button>
                <button class="btn btn-sm" style="background:var(--tram)" onclick="ModAdmin.tab('A')">ALERTY</button>
            </div>
            
            <div id="atab-L" class="atab">
                <div class="card">
                    <input id="al-id" type="hidden"><input id="al-num" placeholder="Numer linii">
                    <input id="al-dir" placeholder="Kierunek docelowy">
                    <textarea id="al-stops" placeholder="Przystanki (po przecinku)"></textarea>
                    <textarea id="al-times" placeholder="Godziny odjazdów (po przecinku)"></textarea>
                    <select id="al-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                    <button class="btn" onclick="ModAdmin.save('lines')">ZAPISZ LINIĘ</button>
                </div>
                <div id="admin-lines-list"></div>
            </div>

            <div id="atab-N" class="atab" style="display:none;">
                <div class="card">
                    <input id="an-id" type="hidden"><input id="an-t" placeholder="Tytuł newsa">
                    <div style="display:flex; gap:10px;"><input id="an-cat" placeholder="Kategoria"><input id="an-date" type="date"></div>
                    <textarea id="an-c" placeholder="Pełna treść..." style="height:150px;"></textarea>
                    <button class="btn" onclick="ModAdmin.save('news')">PUBLIKUJ NEWS</button>
                </div>
                <div id="admin-news-list"></div>
            </div>

            <div id="atab-P" class="atab" style="display:none;">
                <div class="card">
                    <input id="ap-id" type="hidden"><input id="ap-n" placeholder="Nazwa biletu"><input id="ap-p" placeholder="Cena">
                    <button class="btn" onclick="ModAdmin.save('prices')">ZAPISZ BILET</button>
                </div>
                <div id="admin-prices-list"></div>
            </div>

            <div id="atab-A" class="atab" style="display:none;"><div id="admin-alerts-list"></div></div>
        </div>
    </section>
</div>

<script>
const App = {
    dbKey: 'mzk_v12_pro',
    data: { news: {}, lines: {}, prices: {}, reports: {} },
    favs: JSON.parse(localStorage.getItem('mzk_favs')) || [],
    init() {
        firebase.initializeApp({
            apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
            authDomain: "mzk-by-facio.firebaseapp.com",
            databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mzk-by-facio"
        });
        this.db = firebase.database();
        this.db.ref(this.dbKey).on('value', snap => {
            this.data = snap.val() || { news: {}, lines: {}, prices: {}, reports: {} };
            this.renderAll();
        });
        setInterval(() => document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pl-PL'), 1000);
    },
    gate(id) { 
        document.querySelectorAll('.module').forEach(m => m.classList.remove('active')); 
        document.getElementById('mod-' + id).classList.add('active'); 
        this.toggleMenu(false); 
        window.scrollTo(0,0); 
    },
    toggleMenu(f) { 
        const m = document.getElementById('side-menu'), o = document.getElementById('overlay'); 
        if(f === false) { m.classList.remove('open'); o.classList.remove('show'); return; } 
        m.classList.toggle('open'); o.classList.toggle('show'); 
    },
    toggleFav(id) { 
        if(this.favs.includes(id)) this.favs = this.favs.filter(f => f !== id); 
        else this.favs.push(id); 
        localStorage.setItem('mzk_favs', JSON.stringify(this.favs)); 
        this.renderAll(); 
    },
    renderAll() { 
        ModNews.draw(); 
        ModLines.render('all'); 
        ModPricing.draw(); 
        ModAlerts.draw(); 
        ModStops.search(''); 
        if(ModAdmin.logged) ModAdmin.drawCMS(); 
    }
};

// --- PEŁNY MODUŁ NEWSÓW (Z DATĄ, KATEGORIĄ I PODSTRONĄ) ---
const ModNews = {
    draw() {
        const box = document.getElementById('news-list');
        box.innerHTML = '<h2 style="margin-bottom:20px; font-weight:900; letter-spacing:1px;">AKTUALNOŚCI</h2>';
        const entries = Object.entries(App.data.news || {}).reverse();
        
        if(entries.length === 0) {
            box.innerHTML += '<p style="opacity:0.4; text-align:center; padding:20px;">Brak nowych komunikatów.</p>';
            return;
        }

        entries.forEach(([id, n]) => {
            const date = n.date || new Date().toLocaleDateString('pl-PL');
            const cat = n.category || 'INFO';
            box.innerHTML += `
                <div class="card" onclick="ModNews.details('${id}')" style="cursor:pointer; border-left: 4px solid var(--accent); transition: 0.2s;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span class="news-badge">${cat}</span>
                        <span class="news-date"><i class="fa-regular fa-calendar" style="margin-right:5px;"></i> ${date}</span>
                    </div>
                    <h3 style="font-size:1.15rem; font-weight:600; line-height:1.3; color:var(--text);">${n.title}</h3>
                    <div style="margin-top:12px; font-size:0.7rem; color:var(--accent); font-weight:900; display:flex; align-items:center; gap:5px;">
                        ZOBACZ SZCZEGÓŁY <i class="fa-solid fa-chevron-right" style="font-size:0.6rem;"></i>
                    </div>
                </div>`;
        });
    },
    details(id) {
        const n = App.data.news[id];
        if(!n) return;
        const date = n.date || new Date().toLocaleDateString('pl-PL');
        const cat = n.category || 'INFO';

        document.getElementById('mod-details').innerHTML = `
            <button class="btn btn-sm" onclick="App.gate('news')" style="margin-bottom:20px; background:var(--surf-l); color:#fff; border:1px solid var(--border);">
                <i class="fa-solid fa-arrow-left"></i> POWRÓT
            </button>
            <div class="card" style="padding:25px; border-top: 6px solid var(--accent); background: linear-gradient(180deg, var(--surf) 0%, var(--bg) 100%);">
                <div style="display:flex; gap:12px; align-items:center; margin-bottom:20px;">
                    <span class="news-badge" style="padding:5px 12px; font-size:0.75rem;">${cat}</span>
                    <span class="news-date" style="font-size:0.85rem;">${date}</span>
                </div>
                <h1 style="font-size:2.2rem; font-weight:900; margin-bottom:25px; line-height:1.1; color:#fff;">${n.title}</h1>
                <div style="width:50px; height:4px; background:var(--accent); margin-bottom:30px; border-radius:2px;"></div>
                <p style="opacity:0.9; line-height:1.8; font-size:1.1rem; white-space: pre-wrap; color:var(--text-m);">${n.content}</p>
                <div style="margin-top:40px; padding-top:20px; border-top:1px solid var(--border); opacity:0.5; font-size:0.8rem; text-align:center;">
                    Oficjalny komunikat MZK OMEGA
                </div>
            </div>`;
        App.gate('details');
    }
};

// --- PEŁNY MODUŁ LINII (ROZWIJANE WARIANTY + LIVE ODJAZD + TRASA) ---
const ModLines = {
    render(filter) {
        const box = document.getElementById('lines-list'), fbox = document.getElementById('fav-list');
        box.innerHTML = ''; fbox.innerHTML = '';
        let grouped = {};
        Object.entries(App.data.lines || {}).forEach(([id, l]) => {
            if(filter !== 'all' && l.type !== filter) return;
            if(!grouped[l.num]) grouped[l.num] = [];
            grouped[l.num].push({id, ...l});
        });

        Object.keys(grouped).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
            const variants = grouped[num];
            const col = variants[0].type === 'tram' ? 'var(--tram)' : 'var(--bus)';
            
            box.innerHTML += `
                <div class="card" style="cursor:pointer; border-left: 5px solid ${col}" onclick="ModLines.toggleVariants('${num}')">
                    <b style="background:${col}; color:#fff; padding:5px 12px; border-radius:8px; margin-right:15px; font-weight:900;">${num}</b> 
                    <span style="font-weight:600">Linia ${num}</span>
                    <i class="fa-solid fa-chevron-down" style="float:right; margin-top:5px; opacity:0.3"></i>
                </div>
                <div id="variants-${num}" style="display:none; padding-left:15px; margin: 10px 0 20px 0;">
                    ${variants.map(v => `
                        <div class="card" style="background:var(--surf-l); margin-bottom:8px; cursor:pointer; border: 1px solid rgba(255,255,255,0.05)" onclick="ModLines.details('${v.id}')">
                            <div style="font-size:0.8rem; opacity:0.5; margin-bottom:4px;">KIERUNEK:</div>
                            <div style="font-weight:900; color:var(--accent); display:flex; justify-content:space-between; align-items:center;">
                                ${v.dir} <i class="fa-solid fa-clock-rotate-left" style="font-size:0.9rem"></i>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
        });

        const favData = Object.entries(App.data.lines || {}).filter(([id]) => App.favs.includes(id));
        if(favData.length > 0) {
            document.getElementById('fav-section').style.display = 'block';
            fbox.innerHTML = favData.map(([id, v]) => `
                <div class="card" style="border-left: 4px solid #ff4757" onclick="ModLines.details('${id}')">
                    <b style="color:#ff4757">${v.num}</b> <span style="opacity:0.5; margin:0 5px;">→</span> ${v.dir}
                </div>`).join('');
        } else {
            document.getElementById('fav-section').style.display = 'none';
        }
    },
    toggleVariants(num) {
        const el = document.getElementById(`variants-${num}`);
        document.querySelectorAll('[id^="variants-"]').forEach(v => v.style.display = 'none');
        el.style.display = 'block';
    },
    details(id) {
        const l = App.data.lines[id];
        const times = l.times ? l.times.split(',').map(t => t.trim()) : this.genT();
        const stops = l.stops ? l.stops.split(',').map(s => s.trim()) : ["Brak trasy w bazie"];
        const now = new Date();
        const curTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const next = times.find(t => t > curTime) || times[0];

        document.getElementById('mod-details').innerHTML = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                <button class="btn btn-sm" onclick="App.gate('lines')" style="background:var(--surf-l); color:#fff">← POWRÓT</button>
                <div style="flex-grow:1; text-align:right;">
                    <i class="fa-solid fa-heart ${App.favs.includes(id)?'active':''}" style="font-size:1.5rem; cursor:pointer; color:${App.favs.includes(id)?'#ff4757':'#334155'}" onclick="App.toggleFav('${id}'); ModLines.details('${id}')"></i>
                </div>
            </div>
            <div class="card" style="background: linear-gradient(145deg, var(--surf), var(--bg));">
                <div style="display:flex; align-items:center; gap:20px;">
                    <div style="background:${l.type==='tram'?'var(--tram)':'var(--bus)'}; color:#fff; width:80px; height:80px; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:900; box-shadow: 0 10px 20px rgba(0,0,0,0.3)">${l.num}</div>
                    <div>
                        <p style="opacity:0.5; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">Kierunek docelowy</p>
                        <h2 style="color:var(--accent); font-size:1.5rem; font-weight:900;">${l.dir}</h2>
                    </div>
                </div>
                <div style="background:rgba(0,209,102,0.1); padding:15px; border-radius:15px; margin:25px 0; border:1px solid rgba(0,209,102,0.2); display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:600;"><i class="fa-solid fa-bolt"></i> Najbliższy odjazd:</span>
                    <b style="font-size:1.4rem; color:var(--accent)">${next}</b>
                </div>
                <h3 style="margin-bottom:15px; display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-clock"></i> Godziny odjazdów</h3>
                <div class="time-grid">
                    ${times.map(t => `<div class="time-slot ${t < curTime ? 'past' : ''}" style="${t < curTime ? 'opacity:0.2; text-decoration:line-through; border:none;' : 'border:1px solid var(--border);'}">${t}</div>`).join('')}
                </div>
                <h3 style="margin:30px 0 15px 0; display:flex; align-items:center; gap:10px;"><i class="fa-solid fa-route"></i> Przebieg trasy i czasy</h3>
                <div class="stops-timeline" style="margin-left:10px; border-left: 3px solid var(--surf-l); padding-left:25px;">
                    ${stops.map((s, i) => `
                        <div class="stop-point" style="margin-bottom:25px; position:relative;" onclick="App.gate('stops'); ModStops.search('${s}')">
                            <span style="position:absolute; left:-33px; top:3px; width:14px; height:14px; background:${i===0?'var(--accent)':'var(--surf-l)'}; border:3px solid ${i===0?'#fff':'var(--accent)'}; border-radius:50%;"></span>
                            <div style="font-weight:700; font-size:1.05rem;">${s}</div>
                            <div style="font-size:0.75rem; color:var(--accent); opacity:0.8;">+${i*3} min. (przejazd)</div>
                        </div>`).join('')}
                </div>
            </div>`;
        App.gate('details');
    },
    genT() { let t = []; for(let i=5; i<23; i++) { let h = i.toString().padStart(2,'0'); t.push(`${h}:12`, `${h}:42`); } return t; }
};

// --- PEŁNY MODUŁ ALERTY (GŁOSY, CZAS WYGAŚNIĘCIA, POTWIERDZENIA) ---
const ModAlerts = {
    openForm(t) {
        // Pobieramy unikalne numery linii z bazy
        const lines = [...new Set(Object.values(App.data.lines || {}).map(l => l.num))].sort((a,b) => a - b);
        
        document.getElementById('mod-details').innerHTML = `
        <button class="btn btn-sm" onclick="App.gate('alerts')" style="margin-bottom:15px; background:var(--surf-l); color:#fff; border:1px solid var(--border);">
            <i class="fa-solid fa-arrow-left"></i> COFNIJ
        </button>
        <div class="card" style="border-top: 5px solid ${t==='KANAR'?'#ff4757':'#f1c40f'};">
            <h2 style="color:${t==='KANAR'?'#ff4757':'#f1c40f'}; margin-bottom:5px;">Nowe zgłoszenie: ${t}</h2>
            <p style="margin-bottom:20px; font-size:0.9rem; opacity:0.7;">Pomóż innym pasażerom i podaj szczegóły.</p>
            
            <label style="font-size:0.8rem; color:var(--accent); font-weight:900;">LINIA:</label>
            <select id="rl" onchange="ModAlerts.dirs(this.value)" style="margin-bottom:15px;">
                <option>Wybierz linię...</option>
                ${lines.map(l => `<option value="${l}">${l}</option>`).join('')}
            </select>
            
            <label style="font-size:0.8rem; color:var(--accent); font-weight:900;">KIERUNEK:</label>
            <select id="rd" style="margin-bottom:15px;">
                <option>Najpierw wybierz linię</option>
            </select>
            
            <label style="font-size:0.8rem; color:var(--accent); font-weight:900;">GDZIE DOKŁADNIE? (OPCJONALNIE):</label>
            <input type="text" id="r-loc" placeholder="np. przystanek, tył pojazdu..." style="margin-bottom:20px;">
            
            <button class="btn" onclick="ModAlerts.send('${t}')">OPUBLIKUJ ALERT</button>
        </div>`;
        App.gate('details');
    },

    dirs(n) { 
        // Wczytuje dostępne kierunki dla wybranej linii
        const options = Object.values(App.data.lines).filter(l => l.num === n).map(v => `<option value="${v.dir}">${v.dir}</option>`).join('');
        document.getElementById('rd').innerHTML = options || '<option>Brak kierunków w bazie</option>';
    },

    send(t) {
        const line = document.getElementById('rl').value;
        const dir = document.getElementById('rd').value;
        const loc = document.getElementById('r-loc').value || "Brak dodatkowych szczegółów";
        
        if(line === "Wybierz linię...") return alert("Mordo, wybierz numer linii przed wysłaniem!");
        
        App.db.ref(App.dbKey + '/reports').push({ 
            type: t, 
            line: line, 
            dir: dir, 
            location: loc, 
            time: Date.now(), 
            yes: 0, 
            no: 0 
        });
        
        App.gate('alerts');
    },

    vote(id, v) {
        // Zabezpieczenie przed wielokrotnym głosowaniem z jednej przeglądarki
        if(localStorage.getItem('vote_' + id)) {
            return alert("Twój głos został już policzony w tym zgłoszeniu!");
        }
        App.db.ref(`${App.dbKey}/reports/${id}/${v}`).transaction(c => (c || 0) + 1);
        localStorage.setItem('vote_' + id, 'true');
    },

    draw() {
        const box = document.getElementById('alerts-list');
        box.innerHTML = '';
        const now = Date.now();
        const entries = Object.entries(App.data.reports || {}).reverse();
        
        if(entries.length === 0) {
            box.innerHTML = '<p style="text-align:center; opacity:0.4; margin-top:30px; font-weight:600;">Obecnie brak aktywnych alertów.</p>';
            return;
        }

        entries.forEach(([id, r]) => {
            const diffMin = Math.floor((now - r.time) / 60000);
            const isOld = diffMin > 120; // Alerty starsze niż 2 godziny są wygaszane
            const isVerified = (r.yes - r.no) >= 3; // Minimum 3 głosy "na tak" przewagi

            box.innerHTML += `
            <div class="card" style="opacity: ${isOld ? '0.4' : '1'}; border-left: 4px solid ${r.type==='KANAR'?'#ff4757':'#f1c40f'}; margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <b style="color:${r.type==='KANAR'?'#ff4757':'#f1c40f'}; font-size:1.1rem; letter-spacing:1px;">${r.type}</b>
                    <span style="font-size:0.75rem; opacity:0.6; background:var(--surf-l); padding:3px 8px; border-radius:10px;">
                        <i class="fa-regular fa-clock"></i> ${diffMin} min temu
                    </span>
                </div>
                
                <div style="margin-bottom:12px;">
                    <p style="font-size:1.15rem; font-weight:900;">Linia ${r.line} <span style="font-weight:400; font-size:0.95rem; opacity:0.8;">→ ${r.dir}</span></p>
                    <p style="font-size:0.9rem; opacity:0.7; margin-top:6px; background:rgba(255,255,255,0.03); padding:8px; border-radius:8px;">
                        <i class="fa-solid fa-location-crosshairs" style="color:var(--accent); margin-right:5px;"></i> ${r.location}
                    </p>
                </div>
                
                ${isVerified ? `
                <div style="color:#00d166; font-size:0.75rem; margin-bottom:12px; font-weight:900; background:rgba(0,209,102,0.1); padding:6px 10px; border-radius:6px; display:inline-block;">
                    <i class="fa-solid fa-shield-check"></i> POTWIERDZONE PRZEZ SPOŁECZNOŚĆ
                </div>` : ''}
                
                <div class="verify-btns" style="display:flex; gap:10px; margin-top:5px;">
                    <button class="v-btn" style="flex:1; background:rgba(0,209,102,0.1); color:#00d166; border:1px solid rgba(0,209,102,0.2); padding:10px; border-radius:10px; font-weight:900; cursor:pointer;" onclick="ModAlerts.vote('${id}','yes')">
                        <i class="fa-solid fa-thumbs-up"></i> Nadal jest (${r.yes || 0})
                    </button>
                    <button class="v-btn" style="flex:1; background:rgba(255,71,87,0.1); color:#ff4757; border:1px solid rgba(255,71,87,0.2); padding:10px; border-radius:10px; font-weight:900; cursor:pointer;" onclick="ModAlerts.vote('${id}','no')">
                        <i class="fa-solid fa-thumbs-down"></i> Nie ma (${r.no || 0})
                    </button>
                </div>
            </div>`;
        });
    }
};


// --- MODUŁ PRZYSTANKI ---
const ModStops = {
    search(q) {
        const box = document.getElementById('stops-results'); box.innerHTML = '';
        let all = []; 
        Object.values(App.data.lines || {}).forEach(l => { if(l.stops) all.push(...l.stops.split(',').map(s=>s.trim())); });
        [...new Set(all)].sort().filter(s => s.toLowerCase().includes(q.toLowerCase())).forEach(stop => {
            box.innerHTML += `<div class="card" onclick="ModStops.show('${stop}')"><i class="fa-solid fa-location-dot" style="color:var(--accent)"></i> ${stop}</div>`;
        });
    },
    show(name) {
        let lH = Object.entries(App.data.lines || {}).filter(([id, l]) => l.stops && l.stops.includes(name));
        document.getElementById('mod-details').innerHTML = `<button class="btn btn-sm" onclick="App.gate('stops')">← POWRÓT</button>
        <div class="card" style="margin-top:15px;"><h2>${name}</h2><p style="opacity:0.6; margin:10px 0;">Linie na tym przystanku:</p>
        ${lH.map(([id, l]) => `<div class="card" style="background:var(--surf-l)" onclick="ModLines.details('${id}')"><b style="color:var(--accent)">${l.num}</b> → ${l.dir}</div>`).join('')}</div>`;
        App.gate('details');
    }
};

// --- MODUŁ CENY BILETÓW ---
const ModPricing = { 
    draw() { 
        document.getElementById('price-table').innerHTML = Object.values(App.data.prices || {}).map(p => `<tr><td style="padding:10px 0; border-bottom:1px solid var(--border);">${p.name}</td><td style="text-align:right; color:var(--accent); border-bottom:1px solid var(--border); font-weight:bold;">${p.price} zł</td></tr>`).join(''); 
    } 
};

// --- PEŁNY MODUŁ ADMINA (Z CZYSZCZENIEM PÓL I BEZ DUPLIKATÓW) ---
const ModAdmin = {
    logged: false,
    login() { 
        if(document.getElementById('pass-val').value==='123'){ 
            this.logged=true; 
            document.getElementById('admin-auth').style.display='none'; 
            document.getElementById('admin-cms').style.display='block'; 
            this.drawCMS(); 
        } 
    },
    tab(t) { 
        document.querySelectorAll('.atab').forEach(x => x.style.display='none'); 
        document.getElementById('atab-'+t).style.display='block'; 
    },
    save(type) {
        let data = {}, id = "";
        if(type === 'lines') {
            id = document.getElementById('al-id').value;
            data = {
                num: document.getElementById('al-num').value,
                dir: document.getElementById('al-dir').value,
                stops: document.getElementById('al-stops').value,
                times: document.getElementById('al-times').value,
                type: document.getElementById('al-type').value
            };
            if(!data.num || !data.dir) return alert("Numer i kierunek są wymagane!");
        } else if(type === 'news') {
            id = document.getElementById('an-id').value;
            data = {
                title: document.getElementById('an-t').value,
                category: document.getElementById('an-cat').value || 'INFO',
                date: document.getElementById('an-date').value || new Date().toISOString().split('T')[0],
                content: document.getElementById('an-c').value
            };
            if(!data.title || !data.content) return alert("Tytuł i treść są wymagane!");
        } else if(type === 'prices') {
            id = document.getElementById('ap-id').value;
            data = {
                name: document.getElementById('ap-n').value,
                price: document.getElementById('ap-p').value
            };
            if(!data.name || !data.price) return alert("Nazwa i cena są wymagane!");
        }

        if(id) {
            App.db.ref(`${App.dbKey}/${type}/${id}`).update(data).then(() => this.afterSaveAction());
        } else {
            App.db.ref(`${App.dbKey}/${type}`).push(data).then(() => this.afterSaveAction());
        }
    },
    afterSaveAction() {
        document.querySelectorAll('input[id^="a"], textarea[id^="a"]').forEach(el => el.value = "");
        this.drawCMS();
        document.querySelectorAll('.atab').forEach(x => x.style.display = 'none');
        alert("Zapisano pomyślnie i zaktualizowano listę!");
    },
    edit(type, id) {
        let i = App.data[type][id]; 
        this.tab(type==='lines'?'L':type==='news'?'N':'P');
        
        if(type==='lines'){ 
            document.getElementById('al-id').value=id; 
            document.getElementById('al-num').value=i.num; 
            document.getElementById('al-dir').value=i.dir; 
            document.getElementById('al-stops').value=i.stops||''; 
            document.getElementById('al-times').value=i.times||''; 
        } else if(type==='news'){ 
            document.getElementById('an-id').value=id; 
            document.getElementById('an-t').value=i.title; 
            document.getElementById('an-cat').value=i.category||''; 
            document.getElementById('an-date').value=i.date||''; 
            document.getElementById('an-c').value=i.content; 
        } else if(type==='prices'){ 
            document.getElementById('ap-id').value=id; 
            document.getElementById('ap-n').value=i.name; 
            document.getElementById('ap-p').value=i.price; 
        }
        window.scrollTo(0,0);
    },
    drawCMS() {
        const r = (d, el, p) => {
            const b = document.getElementById(el); b.innerHTML = '';
            Object.entries(d||{}).forEach(([id, i]) => {
                b.innerHTML += `
                <div class="card" style="font-size:0.85rem; display:flex; justify-content:space-between; align-items:center; background:var(--surf-l);">
                    <span><b>${i.num||i.title||i.name}</b> ${i.price ? `<span style="color:var(--accent)">: ${i.price} zł</span>` : ''}</span>
                    <div style="display:flex; gap:15px;">
                        <i class="fa-solid fa-pen" style="color:var(--accent); cursor:pointer;" onclick="ModAdmin.edit('${p}','${id}')"></i> 
                        <i class="fa-solid fa-trash" style="color:#ff4757; cursor:pointer;" onclick="if(confirm('Na pewno usunąć?')) App.db.ref('${App.dbKey}/${p}/${id}').remove()"></i>
                    </div>
                </div>`;
            });
        };
        r(App.data.lines, 'admin-lines-list', 'lines'); 
        r(App.data.news, 'admin-news-list', 'news'); 
        r(App.data.prices, 'admin-prices-list', 'prices');
        
        const ab = document.getElementById('admin-alerts-list'); 
        ab.innerHTML = '';
        Object.entries(App.data.reports||{}).forEach(([id, r]) => { 
            ab.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span><b>${r.type}</b> (Linia ${r.line})</span> 
                <i class="fa-solid fa-trash" style="color:#ff4757; cursor:pointer;" onclick="App.db.ref('${App.dbKey}/reports/${id}').remove()"></i>
            </div>`; 
        });
    }
};

App.init();

</script>
