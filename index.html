<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW MODULAR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surf: #161c24; --text: #fff; --bus: #00ab55; --tram: #ff4842; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        /* Moduły layoutowe */
        header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); sticky; top: 0; background: var(--bg); z-index: 1000; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .section { display: none; } .active-sec { display: block; }
        
        /* Stylistyka Kafli (z Twoich screenów) */
        .card { background: var(--surf); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .line-badge { width: 45px; height: 35px; background: var(--bus); display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; margin-right: 15px; }

        /* Nawigacja */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--surf); display: flex; height: 80px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; opacity: 0.5; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; }

        /* Admin / Formularze */
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; background: #222; color: #fff; border: 1px solid #333; }
        .btn { background: var(--accent); color: #fff; padding: 12px; border: none; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<header><h1 id="header-title">MZK GORZÓW</h1></header>

<div class="container">
    <div id="m-lines" class="section active-sec">
        <div id="render-lines">Szukanie linii w chmurze...</div>
    </div>

    <div id="m-stops" class="section">
        <input type="text" placeholder="Szukaj przystanku..." oninput="ModuleStops.search(this.value)">
        <div id="render-stops"></div>
    </div>

    <div id="m-news" class="section">
        <div id="render-news">Brak komunikatów.</div>
    </div>

    <div id="m-admin" class="section">
        <div class="card" id="adm-auth">
            <input type="password" id="adm-pass" placeholder="Hasło (123)">
            <button class="btn" onclick="ModuleAdmin.auth()">Zaloguj</button>
        </div>
        <div id="adm-content" style="display:none">
            <div class="card">
                <small style="color:var(--accent)">Konfiguracja Modułów (Recovery):</small>
                <div style="margin-top:10px">
                    <label>Baza Linii:</label> <input type="text" id="cfg-lines" value="mzk_v12_pro" onchange="ModuleAdmin.updateKeys()">
                    <label>Baza Newsów:</label> <input type="text" id="cfg-news" value="mzk_news" onchange="ModuleAdmin.updateKeys()">
                </div>
            </div>
            <div id="adm-forms">
                </div>
        </div>
    </div>

    <div id="m-details" class="section">
        <div id="render-details"></div>
        <button class="btn" onclick="UI.show('lines')" style="margin-top:20px; background:#333">Powrót</button>
    </div>
</div>

<nav>
    <div class="nav-item active" id="n-lines" onclick="UI.show('lines')"><i class="fa fa-bus"></i><span>Linie</span></div>
    <div class="nav-item" id="n-stops" onclick="UI.show('stops')"><i class="fa fa-map-pin"></i><span>Przystanki</span></div>
    <div class="nav-item" id="n-news" onclick="UI.show('news')"><i class="fa fa-bullhorn"></i><span>News</span></div>
    <div class="nav-item" id="n-admin" onclick="UI.show('admin')"><i class="fa fa-gears"></i><span>Opcje</span></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // 1. INICJALIZACJA SYSTEMU
    const firebaseConfig = { 
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", 
        authDomain: "mzk-by-facio.firebaseapp.com", 
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "mzk-by-facio" 
    };
    firebase.initializeApp(firebaseConfig);

    // 2. MODUŁ UI (Zarządzanie widokiem)
    const UI = {
        show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
            document.getElementById('m-'+id).classList.add('active-sec');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id)?.classList.add('active');
            window.scrollTo(0,0);
        }
    };

    // 3. MODUŁ LINII (Core Data)
    const ModuleLines = {
        key: localStorage.getItem('cfg_lines') || 'mzk_v12_pro',
        data: [],
        init() {
            firebase.database().ref(this.key).on('value', (snap) => {
                const d = snap.val();
                if(d) {
                    this.data = d.lines || [];
                    this.render();
                }
            });
        },
        render() {
            const target = document.getElementById('render-lines');
            target.innerHTML = this.data.map((l, i) => `
                <div class="card" style="display:flex; align-items:center" onclick="ModuleLines.details(${i})">
                    <div class="line-badge" style="background:${l.type==='tram'?'var(--tram)':'var(--bus)'}">${l.num}</div>
                    <div><b>${l.dir}</b><br><small style="opacity:0.5">${l.cat || ''}</small></div>
                </div>
            `).join('');
        },
        details(idx) {
            const l = this.data[idx];
            UI.show('details');
            document.getElementById('render-details').innerHTML = `
                <div class="card">
                    <h2>Linia ${l.num}</h2>
                    <p style="color:var(--accent); margin-bottom:20px">${l.dir}</p>
                    ${l.stops ? l.stops.map(s => `<div style="display:flex; padding:8px 0; border-bottom:1px solid #222">
                        <span style="color:var(--accent); width:40px; font-weight:900">${s.time}'</span>
                        <span>${s.name}</span>
                    </div>`).join('') : 'Brak przystanków'}
                </div>`;
        }
    };

    // 4. MODUŁ NEWSÓW (Independent)
    const ModuleNews = {
        key: localStorage.getItem('cfg_news') || 'mzk_news',
        init() {
            firebase.database().ref(this.key).on('value', (snap) => {
                const d = snap.val();
                if(d) document.getElementById('render-news').innerHTML = Object.values(d).reverse().map(n => `
                    <div class="card"><h3 style="color:var(--accent)">${n.title}</h3><p>${n.body}</p></div>
                `).join('');
            });
        }
    };

    // 5. MODUŁ PRZYSTANKÓW (Search Logic)
    const ModuleStops = {
        search(q) {
            if(q.length < 2) return;
            const results = [];
            ModuleLines.data.forEach(l => {
                if(l.stops) l.stops.forEach(s => {
                    if(s.name.toLowerCase().includes(q.toLowerCase())) 
                        results.push({line: l.num, stop: s.name});
                });
            });
            document.getElementById('render-stops').innerHTML = results.map(r => `
                <div class="card"><b>${r.stop}</b><br><small>Linia: ${r.line}</small></div>
            `).join('');
        }
    };

    // 6. MODUŁ ADMINA (Control Center)
    const ModuleAdmin = {
        auth() {
            if(document.getElementById('adm-pass').value === '123') {
                document.getElementById('adm-auth').style.display = 'none';
                document.getElementById('adm-content').style.display = 'block';
                document.getElementById('cfg-lines').value = ModuleLines.key;
                document.getElementById('cfg-news').value = ModuleNews.key;
            }
        },
        updateKeys() {
            localStorage.setItem('cfg_lines', document.getElementById('cfg-lines').value);
            localStorage.setItem('cfg_news', document.getElementById('cfg-news').value);
            location.reload();
        }
    };

    // START
    ModuleLines.init();
    ModuleNews.init();

</script>
</body>
</html>
