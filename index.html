<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - LIVE & GPS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ab55; 
            --mzk-yellow: #feca05;
            --bg: #0b0f19; 
            --surface: #161c24; 
            --text: #ffffff; 
            --text-sec: #919eab; 
            --danger: #ff4842; 
            --gradient: linear-gradient(135deg, #00ab55 0%, #007b3d 100%); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 110px; overflow-x: hidden; }
        
        header { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(20px); padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--mzk-yellow); display: flex; align-items: center; justify-content: center; }
        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; color: var(--text); }

        .hero { 
            width: 100%; height: 160px; 
            background: url('https://mzk-gorzow.com.pl/wp-content/uploads/2023/04/slider-01.jpg') center/cover; 
            position: relative; border-radius: 0 0 30px 30px; margin-bottom: 20px; 
            display: flex; align-items: flex-end; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .hero::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to top, rgba(11,15,25,1) 5%, rgba(0,0,0,0) 100%); 
            border-radius: 0 0 30px 30px; 
        }
        .hero-title { position: relative; z-index: 2; font-size: 1.4rem; font-weight: 800; }

        .container { max-width: 550px; margin: 0 auto; padding: 0 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
        .group-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 18px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid #333; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-top: 12px; }
        .tt-time { background: #1c252e; color: white; padding: 8px 4px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); line-height: 1.2; }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(22, 28, 36, 0.9); backdrop-filter: blur(20px); display: flex; height: 75px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.6rem; font-weight: 700; }
        nav div.active { color: var(--mzk-yellow); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }

        .live-badge { color: var(--mzk-yellow); font-weight: 800; font-size: 0.8rem; }
        
        /* ANIMACJA STRZAŁEK */
        .arrows-anim {
            display: inline-block;
            font-weight: 900;
            color: var(--mzk-yellow);
            animation: moveArrows 1s infinite linear;
            margin-right: 5px;
        }
        @keyframes moveArrows {
            0% { opacity: 0.2; transform: translateX(-3px); }
            50% { opacity: 1; }
            100% { opacity: 0.2; transform: translateX(3px); }
        }

        .gps-btn { background: var(--mzk-yellow); color: #000; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .main-btn { background: var(--gradient); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 6px; font-weight: 800; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div class="hero"><div class="hero-title">Gorzów Wielkopolski<br><small style="font-weight:400; opacity:0.7; font-size:0.9rem;">Wybierz linię</small></div></div>
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <div class="group-label">Szukaj Przystanku</div>
        <input type="text" id="stop-search" placeholder="Wpisz nazwę..." oninput="filterStops()" style="width:100%; padding:15px; border-radius:12px; background:#1c252e; border:1px solid #333; color:white;">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333; margin-top:20px">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333; margin-top:20px">Wróć</button></div>

    <div id="s-news" class="section"><div class="group-label">Komunikaty</div><div id="public-news-list"></div></div>
    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="width:100%; padding:15px; margin-bottom:10px; text-align:center;"><button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <button onclick="openLineForm(-1)" class="main-btn">+ Dodaj linię</button>
            <div id="adm-lines-list"></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<script>
    let db = { lines: [], news: [], lineCategories: ["Tramwaje", "Autobusy"] };
    let currentLineIdx = -1;
    let refreshInterval = null;

    function init() {
        const local = localStorage.getItem('mzk_v23_final');
        if(local) db = JSON.parse(local);
        render();
        // Auto-odświeżanie co 30 sekund
        setInterval(() => { if(document.getElementById('s-tt').classList.contains('active-sec')) renderTimetable(currentLineIdx); }, 30000);
    }

    function save() { localStorage.setItem('mzk_v23_final', JSON.stringify(db)); render(); }

    function render() {
        const sHome = document.getElementById('home-content'); sHome.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length > 0) {
                sHome.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = lines.find(x => x.num === num);
                    grid.innerHTML += `<div class="line-square ${l.type}" onclick="openVariants('${num}')">${num}</div>`;
                });
                sHome.appendChild(grid);
            }
        });
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})" style="color:var(--accent); background:none; border:none;">EDYTUJ</button></div>`).join('');
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, index) => { if(String(l.num) === String(num)) {
            list.innerHTML += `<div class="app-card" onclick="renderTimetable(${index})"><span>Do: <b>${l.dir}</b></span><i class="fa-solid fa-chevron-right"></i></div>`;
        }});
    }

    function renderTimetable(idx) {
        currentLineIdx = idx;
        const line = db.lines[idx]; show('tt');
        const now = new Date();
        const type = now.getDay() === 0 ? 'sun' : (now.getDay() === 6 ? 'sat' : 'work');

        document.getElementById('tt-head').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; padding-top:10px;">
                <div><div class="group-label">Linia ${line.num}</div><h2>Do: ${line.dir}</h2></div>
                <button class="gps-btn" onclick="findMyLocation()"><i class="fa-solid fa-location-crosshairs"></i></button>
            </div>`;
        
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let total = 0;
        
        line.stops.forEach((stop, sIdx) => {
            total += parseInt(stop.time) || 0;
            const offset = total;
            let source = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
            let liveStatus = "";

            if(source) {
                let times = source.split(',').map(h => {
                    let p = h.trim().split(':'); let d = new Date();
                    d.setHours(p[0], parseInt(p[1]) + offset, 0); return d;
                });
                let next = times.find(d => d > now);

                if(next) {
                    let diff = Math.floor((next - now) / 60000);
                    if(diff <= 2) {
                        // TUTAJ DODAJĘ TWOJE STRZAŁKI >>>>
                        liveStatus = `<span class="live-badge"><span class="arrows-anim">>>>></span> ${diff === 0 ? 'TERAZ' : 'za 1-2 min'}</span>`;
                    } else if(diff < 60) {
                        liveStatus = `<span class="live-badge">za ${diff} min</span>`;
                    } else {
                        liveStatus = `<span style="opacity:0.6;">${next.getHours()}:${next.getMinutes().toString().padStart(2,'0')}</span>`;
                    }
                } else {
                    liveStatus = `<span style="opacity:0.2; font-size:0.7rem;">Koniec kursów</span>`;
                }
            }

            const card = document.createElement('div');
            card.className = 'app-card'; card.style.display = 'block';
            card.setAttribute('data-stop', stop.name);
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${stop.name}</b>${stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}</div>
                    <div>${liveStatus}</div>
                </div>
                <div id="g-${sIdx}" style="display:none; margin-top:10px;"><div id="times-${sIdx}" class="tt-grid"></div></div>`;
            card.onclick = () => {
                const g = document.getElementById(`g-${sIdx}`);
                g.style.display = g.style.display === 'none' ? 'block' : 'none';
                if(g.style.display === 'block') updateTimes(sIdx, line, offset, type);
            };
            body.appendChild(card);
        });
    }

    function updateTimes(sIdx, line, offset, type) {
        const cont = document.getElementById(`times-${sIdx}`);
        let source = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
        if(!source) return;
        const now = new Date();
        cont.innerHTML = source.split(',').map(h => {
            let p = h.trim().split(':'); let arr = new Date();
            arr.setHours(p[0], parseInt(p[1]) + offset, 0);
            let diff = Math.floor((arr - now) / 60000);
            let wait = (diff >= 0 && diff < 60) ? `<br><small style="color:var(--mzk-yellow);">${diff}m</small>` : "";
            return `<span class="tt-time">${arr.getHours()}:${arr.getMinutes().toString().padStart(2,'0')}${wait}</span>`;
        }).join('');
    }

    async function findMyLocation() {
        if(!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const query = `[out:json];node["highway"="bus_stop"](around:200,${pos.coords.latitude},${pos.coords.longitude});out;`;
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data.elements.length > 0) {
                const nearest = data.elements[0].tags.name;
                document.querySelectorAll('#tt-body .app-card').forEach(c => {
                    if(nearest.toLowerCase().includes(c.getAttribute('data-stop').toLowerCase())) {
                        c.style.border = "2px solid var(--mzk-yellow)";
                        c.scrollIntoView({behavior: 'smooth', block: 'center'});
                        c.click();
                    }
                });
            }
        });
    }

    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }

    init();
</script>
</body>
</html>
