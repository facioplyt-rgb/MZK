<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V98</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00ab55; 
            --bg: #0b0f19; 
            --surface: #161c24; 
            --surface-light: #212b36; 
            --text: #ffffff; 
            --text-sec: #919eab; 
            --bus-col: #00ab55; 
            --tram-col: #ff4842; 
            --border: rgba(255,255,255,0.08); 
            --shadow: 0 8px 16px 0 rgba(0,0,0,0.4);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; line-height: 1.5; overflow-x: hidden; }
        
        /* Animacje przejść */
        .section { display: none; } 
        .active-sec { display: block !important; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Header profesjonalny */
        header { 
            background: rgba(11, 15, 25, 0.85); 
            backdrop-filter: blur(12px); 
            padding: 18px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid var(--border); 
            text-align: center; 
        }
        header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        
        /* Karty w stylu Pro */
        .app-card { 
            background: var(--surface); 
            padding: 16px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .app-card:active { transform: scale(0.96); background: var(--surface-light); }
        
        /* Badge dla linii */
        .line-badge { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            min-width: 44px;
            height: 44px;
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 1.1rem; 
            color: white; 
            margin-right: 12px;
        }
        .bus { background: linear-gradient(135deg, #00ab55, #007b43); }
        .tram { background: linear-gradient(135deg, #ff4842, #b71d18); }
        
        .eta-tag { 
            background: rgba(0, 171, 85, 0.12); 
            color: var(--accent); 
            padding: 6px 12px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 0.85rem;
            border: 1px solid rgba(0, 171, 85, 0.2);
        }
        .eta-now { animation: blink 1.2s infinite; color: #ffab00; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Rozkład jazdy */
        .tt-container { background: var(--surface); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        .tt-row { display: flex; border-bottom: 1px solid var(--border); }
        .tt-hour { background: rgba(255,255,255,0.02); width: 60px; padding: 15px 0; text-align: center; font-size: 1.2rem; font-weight: 800; color: var(--accent); border-right: 1px solid var(--border); }
        .tt-mins { flex: 1; padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .tt-min-item { font-size: 1.1rem; font-weight: 600; color: #fff; }

        /* Nawigacja Dolna */
        nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: rgba(22, 28, 36, 0.94); 
            backdrop-filter: blur(10px); 
            display: flex; 
            height: 75px; 
            border-top: 1px solid var(--border); 
            z-index: 2000; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; }
        nav div.active { color: var(--accent); font-weight: 700; }
        nav i { font-size: 1.4rem; margin-bottom: 4px; }

        /* Elementy interfejsu */
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .search-in { width: 100%; padding: 16px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); color: white; font-size: 1rem; margin-bottom: 20px; }
        .group-label { font-size: 0.8rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 700; letter-spacing: 1px; }

        .dir-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .dir-text { font-weight: 700; font-size: 1.05rem; }
    </style>
</head>
<body>

<header><h1>MZK Gorzów Pro</h1></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    
    <div id="s-vars" class="section">
        <div id="vars-list"></div>
        <button onclick="show('home')" class="main-btn" style="background:#212b36; margin-top:20px;"><i class="fa-solid fa-chevron-left"></i> Powrót do linii</button>
    </div>

    <div id="s-tt" class="section">
        <div id="tt-day-sel" style="display:none; gap:8px; margin-bottom:15px;">
            <button class="main-btn" id="btn-work" style="flex:1; margin-top:0;" onclick="setDay('working')">Robocze</button>
            <button class="main-btn" id="btn-sat" style="flex:1; margin-top:0; background:#212b36" onclick="setDay('saturday')">Soboty</button>
            <button class="main-btn" id="btn-sun" style="flex:1; margin-top:0; background:#212b36" onclick="setDay('sunday')">Niedz</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn" style="background:#212b36; margin-top:20px;">Wróć</button>
    </div>

    <div id="s-stops" class="section">
        <div class="group-label">Znajdź przystanek</div>
        <input type="text" class="search-in" id="stop-search" placeholder="Gdzie chcesz jechać?" oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-stop-lines" class="section">
        <div id="sl-list"></div>
        <button onclick="show('stops')" class="main-btn" style="background:#212b36">Wróć do listy</button>
    </div>

    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    
    <div id="s-contact" class="section">
        <div class="group-label">Informacje o aplikacji</div>
        <div id="contact-display" class="app-card" style="cursor:default; white-space:pre-wrap;"></div>
    </div>

    <div id="s-adm" class="section">
        <div class="app-card" style="cursor:default;">
            <div class="group-label" style="margin-top:0;">Panel Administratora</div>
            <input type="password" id="pass" class="search-in" placeholder="Hasło" style="margin-bottom:10px;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none; margin-top:20px;">
            <button onclick="openLineForm(-1)" class="main-btn">+ Dodaj Nową Linię</button>
            <div id="adm-lines-list"></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus-simple"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-location-dot"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bullhorn"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-shield-halved"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:4000; display:none; padding:20px; overflow-y:auto;">
    <h2 style="margin-bottom:20px;">Zarządzanie Linią</h2>
    <input type="text" id="fl-num" class="search-in" placeholder="Numer linii">
    <input type="text" id="fl-dir" class="search-in" placeholder="Kierunek">
    <select id="fl-type" class="search-in"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="fl-h-work" class="search-in" rows="3" placeholder="Godziny Robocze (05:10, 05:40...)"></textarea>
    <textarea id="fl-h-sat" class="search-in" rows="3" placeholder="Godziny Soboty"></textarea>
    <textarea id="fl-h-sun" class="search-in" rows="3" placeholder="Godziny Niedziele"></textarea>
    <div class="group-label">Trasa (Przystanek | Czas przejazdu)</div>
    <div id="fl-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#4a5568; margin-top:10px;">+ Dodaj Przystanek</button>
    <button onclick="saveLine()" class="main-btn" style="margin-top:20px;">ZAPISZ ZMIANY</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; border:1px solid #ff4842; color:#ff4842; margin-top:10px;">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], news: [], contact: "" };
    let curLineIdx = -1, curStopIdx = -1, curDay = 'working', activeSection = 'home', curLineNumGlobal = "";

    function formatETA(m) { if(m===null) return ""; if(m===0) return ">>>"; return m+" min"; }
    function getDirAbbr(d) { if(!d) return ""; const w=d.trim().split(" "); return w.length>1?(w[0][0]+w[w.length-1][0]).toUpperCase():d.substring(0,2).toUpperCase(); }

    function getETA(line, sIdx) {
        if(!line || !line.stops || !line.stops[sIdx]) return null;
        const now = new Date();
        const dayType = now.getDay() === 6 ? 'saturday' : (now.getDay() === 0 ? 'sunday' : 'working');
        const raw = dayType === 'working' ? line.hoursWorking : (dayType === 'saturday' ? line.hoursSat : line.hoursSun);
        if(!raw) return null;
        
        let offset = 0; for(let i=0; i<=sIdx; i++) offset += parseInt(line.stops[i].time || 0);
        const times = raw.split(',').map(t => {
            const p = t.trim().split(':'); if(p.length<2) return null;
            const d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1])+offset, 0, 0);
            return d;
        }).filter(d => d > now).sort((a,b)=>a-b);
        return times.length ? Math.floor((times[0]-now)/60000) : null;
    }

    function getLinesForStop(stopName) {
        let res = [];
        (db.lines || []).forEach((l, idx) => {
            if(!l.stops) return;
            const sIdx = l.stops.findIndex(s => s.name === stopName);
            if(sIdx !== -1) {
                res.push({ num: l.num, dir: l.dir, type: l.type, eta: getETA(l, sIdx), lIdx: idx, sIdx: sIdx });
            }
        });
        return res.sort((a,b) => (a.eta === null ? 1 : (b.eta === null ? -1 : a.eta - b.eta)));
    }

    function show(id) {
        activeSection = id;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        const target = document.getElementById('s-'+id);
        if(target) target.classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
        window.scrollTo(0,0);
        render();
    }

    function init() {
        dbRef.on('value', s => { if(s.val()) { db = s.val(); render(); } });
        setInterval(() => { if(activeSection !== 'adm' && activeSection !== 'tt') render(); }, 20000);
    }
    init();

    function render() {
        if(activeSection === 'home') renderHome();
        if(activeSection === 'stops') renderStopsList();
        if(activeSection === 'news') renderNews();
        if(activeSection === 'adm') renderAdmin();
    }

    function renderHome() {
        const h = document.getElementById('s-home'); h.innerHTML = '<div class="group-label">Wybierz linię</div>';
        let nums = [...new Set((db.lines || []).map(l => String(l.num)))].sort((a,b)=>parseInt(a)-parseInt(b));
        if(nums.length === 0) h.innerHTML += '<div class="app-card">Brak linii w bazie.</div>';
        nums.forEach(n => {
            const l = db.lines.find(x => String(x.num) === n);
            h.innerHTML += `<div class="app-card" onclick="openVars('${n}')">
                <div style="display:flex; align-items:center;">
                    <div class="line-badge ${l.type}">${n}</div>
                    <div>
                        <div style="font-weight:800; font-size:1.1rem;">Linia ${n}</div>
                        <div style="font-size:0.8rem; color:var(--text-sec);">Sprawdź kierunki i trasę</div>
                    </div>
                </div>
            </div>`;
        });
    }

    function openVars(num) {
        curLineNumGlobal = num; show('vars');
        const list = document.getElementById('vars-list');
        list.innerHTML = `<div class="group-label">Kierunki dla linii ${num}</div>`;
        db.lines.forEach((l, i) => {
            if(String(l.num) === String(num)) {
                const eta = getETA(l, 0);
                list.innerHTML += `<div class="app-card" onclick="curLineIdx=${i}; curStopIdx=-1; show('tt')">
                    <div class="dir-row">
                        <div class="dir-text">${l.dir}</div>
                        <span class="eta-tag ${eta===0?'eta-now':''}">${eta!==null?formatETA(eta):'---'}</span>
                    </div>
                </div>`;
            }
        });
    }

    function renderTimetable(lIdx, sIdx) {
        const l = db.lines[lIdx]; const body = document.getElementById('tt-body');
        if(sIdx === -1) {
            document.getElementById('tt-day-sel').style.display = 'none';
            body.innerHTML = `<div class="group-label">Linia ${l.num} &rarr; ${l.dir}</div>`;
            l.stops.forEach((s, i) => {
                const others = getLinesForStop(s.name).filter(o => o.num !== l.num || o.dir !== l.dir);
                body.innerHTML += `<div class="app-card" onclick="curStopIdx=${i}; renderTimetable(${lIdx}, ${i})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:700;">${s.name}</div>
                        <i class="fa-solid fa-chevron-right" style="opacity:0.2;"></i>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:8px; overflow-x:auto;">
                        ${others.slice(0,4).map(o => `<span style="font-size:0.6rem; background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; border:1px solid var(--border);">${o.num}: ${formatETA(o.eta)}</span>`).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('tt-back-btn').onclick = () => openVars(l.num);
        } else {
            document.getElementById('tt-day-sel').style.display = 'flex';
            let off = 0; for(let i=0; i<=sIdx; i++) off += parseInt(l.stops[i].time || 0);
            const hMap = {}; 
            const raw = curDay==='working' ? l.hoursWorking : (curDay==='saturday' ? l.hoursSat : l.hoursSun);
            (raw || "").split(',').forEach(e => {
                let p = e.trim().split(':'); if(p.length<2) return;
                let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1])+off);
                let hh = d.getHours().toString().padStart(2,'0'), mm = d.getMinutes().toString().padStart(2,'0');
                if(!hMap[hh]) hMap[hh] = []; hMap[hh].push(mm);
            });
            let htm = `<div class="app-card" style="border-bottom: 2px solid var(--accent); cursor:default;">
                <div style="font-size:0.8rem; color:var(--text-sec); font-weight:700;">${l.num} &bull; ${l.dir}</div>
                <div style="font-weight:800; font-size:1.4rem;">${l.stops[sIdx].name}</div>
            </div><div class="tt-container">`;
            Object.keys(hMap).sort().forEach(h => {
                htm += `<div class="tt-row"><div class="tt-hour">${h}</div><div class="tt-mins">${hMap[h].sort().map(m => `<span class="tt-min-item">${m}</span>`).join('')}</div></div>`;
            });
            body.innerHTML = htm + (Object.keys(hMap).length ? "</div>" : "<div style='padding:20px; text-align:center;'>Brak kursów w tym dniu.</div></div>");
            document.getElementById('tt-back-btn').onclick = () => { curStopIdx = -1; renderTimetable(lIdx, -1); };
        }
    }

    function renderStopsList() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        let sSet = new Set(); (db.lines || []).forEach(l => l.stops?.forEach(s => sSet.add(s.name)));
        [...sSet].sort().filter(s => s.toLowerCase().includes(q)).forEach(name => {
            const lines = getLinesForStop(name);
            list.innerHTML += `<div class="app-card" onclick="openStopLines('${name}')">
                <div style="font-weight:800; font-size:1.1rem;">${name}</div>
                <div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;">
                    ${lines.slice(0,5).map(l => `<span class="eta-tag" style="font-size:0.7rem; padding:2px 6px;">${l.num}: ${formatETA(l.eta)}</span>`).join('')}
                </div>
            </div>`;
        });
    }

    function openStopLines(name) {
        show('stop-lines'); const list = document.getElementById('sl-list');
        list.innerHTML = `<div class="group-label">Odjazdy: ${name}</div>`;
        getLinesForStop(name).forEach(v => {
            list.innerHTML += `<div class="app-card" onclick="curLineIdx=${v.lIdx}; curStopIdx=${v.sIdx}; show('tt')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="line-badge ${v.type}" style="min-width:36px; height:36px; font-size:0.9rem; margin-right:0;">${v.num}</span>
                        <div style="font-weight:700;">${v.dir}</div>
                    </div>
                    <span class="eta-tag ${v.eta===0?'eta-now':''}">${v.eta!==null?formatETA(v.eta):'---'}</span>
                </div>
            </div>`;
        });
    }

    function renderNews() {
        const nList = document.getElementById('public-news-list'); nList.innerHTML = '<div class="group-label">Komunikaty</div>';
        if(!db.news || db.news.length === 0) nList.innerHTML += '<div class="app-card" style="text-align:center; color:var(--text-sec);">Brak wiadomości.</div>';
        (db.news || []).forEach(n => nList.innerHTML += `<div class="app-card" style="cursor:default;"><b>${n.title}</b><p style="font-size:0.9rem; color:var(--text-sec); margin-top:8px;">${n.body || ''}</p></div>`);
        document.getElementById('contact-display').innerText = db.contact || "System MZK Gorzów Pro V98";
    }

    function renderAdmin() {
        const lList = document.getElementById('adm-lines-list'); lList.innerHTML = '<div class="group-label">Baza Linii</div>';
        (db.lines || []).forEach((l, i) => lList.innerHTML += `<div class="app-card" onclick="openLineForm(${i})">${l.num} &bull; ${l.dir} <i class="fa-solid fa-pen" style="float:right; opacity:0.3;"></i></div>`);
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", stops:[], hoursWorking:"", hoursSat:"", hoursSun:""} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-h-work').value = l.hoursWorking || "";
        document.getElementById('fl-h-sat').value = l.hoursSat || "";
        document.getElementById('fl-h-sun').value = l.hoursSun || "";
        document.getElementById('fl-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(n="", t=2) {
        const d = document.createElement('div'); d.style.display="flex"; d.style.gap="8px"; d.style.marginBottom="10px";
        d.innerHTML = `<input type="text" value="${n}" class="search-in stop-name-in" placeholder="Przystanek" style="flex:3; margin-bottom:0;"> <input type="number" value="${t}" class="search-in stop-time-in" style="flex:1; margin-bottom:0;"> <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#ff4842; padding:0 10px;"><i class="fa-solid fa-trash-can"></i></button>`;
        document.getElementById('fl-list').appendChild(d);
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('#fl-list > div')).map(r => ({ name: r.querySelector('.stop-name-in').value, time: parseInt(r.querySelector('.stop-time-in').value || 0) }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops };
        if(!db.lines) db.lines = []; if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        dbRef.update({ lines: db.lines }).then(() => { closeForms(); render(); });
    }

    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.getElementById('form-line').style.display = 'none'; }
    
    function setDay(d) { 
        curDay = d; 
        document.querySelectorAll('#tt-day-sel .main-btn').forEach(b => b.style.background = '#212b36');
        document.getElementById(d === 'working' ? 'btn-work' : (d === 'saturday' ? 'btn-sat' : 'btn-sun')).style.background = 'var(--accent)';
        renderTimetable(curLineIdx, curStopIdx); 
    }
</script>
</body>
</html>
