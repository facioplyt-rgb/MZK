<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW STABLE V131</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; 
            --text: #ffffff; --text-sec: #919eab; --border: rgba(255,255,255,0.08); 
            --bus-col: #00ab55; --tram-col: #ff4842; --warn: #feca05;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .section { display: none; } 
        .active-sec { display: block !important; }
        
        header { background: #0b0f19; padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* KARTY */
        .app-card { background: var(--surface); padding: 18px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        .line-badge { 
            display: inline-flex; align-items: center; justify-content: center; 
            min-width: 45px; height: 35px; border-radius: 10px; font-weight: 900; 
            color: #ffffff !important; margin-right: 10px; font-size: 1rem;
        }
        .badge-bus { background: var(--bus-col); }
        .badge-tram { background: var(--tram-col); }

        .dir-abbr { 
            background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 800; color: #fff; border: 1px solid var(--border); margin-right: 5px;
        }

        .group-label { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 800; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        /* NAWIGACJA */
        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 5px; }

        /* FORMULARZE */
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-family: inherit; }
        .main-btn { background: #2c333a; width: 100%; padding: 16px; border-radius: 12px; border: none; color: white; font-weight: 800; cursor: pointer; }
        .save-btn { background: var(--accent) !important; }

        .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface-light); margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); }
        .del-btn { color: var(--tram-col); background: none; border: none; font-weight: 800; cursor: pointer; }
        .edit-btn { color: var(--warn); background: none; border: none; font-weight: 800; cursor: pointer; margin-right: 15px; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="home-content">Ładowanie bazy danych...</div>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="🔍 Szukaj przystanku..." oninput="renderStops()">
        <div id="stops-list"></div>
    </div>

    <div id="s-news" class="section">
        <div id="news-list"></div>
    </div>

    <div id="s-admin" class="section">
        <div class="app-card">
            <input type="password" id="adm-pass" placeholder="Hasło Admina">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-content" style="display:none; margin-top:20px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <button onclick="setTab('l')" class="main-btn">Linie</button>
                <button onclick="setTab('n')" class="main-btn">Inne</button>
            </div>
            
            <div id="tab-l" style="display:none;">
                <h3 id="l-head" style="margin-bottom:10px;">Dodaj Linię</h3>
                <input type="hidden" id="edit-id" value="-1">
                <input type="text" id="l-num" placeholder="Numer linii (np. 124)">
                <input type="text" id="l-dir" placeholder="Kierunek docelowy">
                <select id="l-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                <select id="l-cat-sel"></select>
                <textarea id="l-stops" placeholder="Przystanek|Czas, Przystanek|Czas..."></textarea>
                <textarea id="l-h1" placeholder="Godziny Robocze"></textarea>
                <textarea id="l-h2" placeholder="Godziny Sobota"></textarea>
                <textarea id="l-h3" placeholder="Godziny Niedziela"></textarea>
                <button onclick="saveLine()" class="main-btn save-btn">ZAPISZ LINIĘ</button>
                <button onclick="resetForm()" id="btn-cancel" class="main-btn" style="display:none; margin-top:5px; background:#444;">Anuluj Edycję</button>
                <div id="adm-lines-list" style="margin-top:25px;"></div>
            </div>

            <div id="tab-n" style="display:none;">
                <h4>Dodaj News</h4>
                <input type="text" id="n-title" placeholder="Tytuł newsa">
                <textarea id="n-body" placeholder="Treść newsa"></textarea>
                <button onclick="saveNews()" class="main-btn save-btn">Opublikuj News</button>
                <hr style="opacity:0.1; margin:20px 0;">
                <h4>Zarządzaj Kategoriami Linii</h4>
                <div style="display:flex; gap:5px;"><input type="text" id="new-cat"><button onclick="addCat()" class="main-btn" style="width:60px;">+</button></div>
                <div id="adm-cats" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <div id="s-vars" class="section"><div id="vars-content"></div><button onclick="show('home')" class="main-btn">Wróć</button></div>
    <div id="s-st-lines" class="section"><div id="st-lines-content"></div><button onclick="show('stops')" class="main-btn">Wróć</button></div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
    <div onclick="show('admin')" id="n-admin"><i class="fa-solid fa-gears"></i><span>Admin</span></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], categories: ["Dzienne"], news: [] };

    dbRef.on('value', (s) => {
        const val = s.val();
        if(val) {
            db = val;
            if(!db.lines) db.lines = [];
            if(!db.categories) db.categories = ["Dzienne"];
            if(!db.news) db.news = [];
            renderAll();
        } else {
            document.getElementById('home-content').innerHTML = "Brak danych w bazie.";
        }
    });

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
    }

    function login() { if(document.getElementById('adm-pass').value === '123') document.getElementById('adm-content').style.display = 'block'; }
    function setTab(t) { document.getElementById('tab-l').style.display = t === 'l' ? 'block' : 'none'; document.getElementById('tab-n').style.display = t === 'n' ? 'block' : 'none'; }

    function getAbbr(dir) {
        if(!dir) return "??";
        const p = dir.trim().split(" ");
        return p.length === 1 ? p[0].substring(0,3).toUpperCase() : (p[0][0] + p[p.length-1].substring(0,2)).toUpperCase();
    }

    function renderAll() {
        // Linie
        const home = document.getElementById('home-content'); home.innerHTML = '';
        db.categories.forEach(cat => {
            const lins = db.lines.filter(l => l.cat === cat);
            if(lins.length > 0) {
                home.innerHTML += `<div class="group-label">${cat}</div>`;
                const nums = [...new Set(lins.map(l => l.num))].sort((a,b)=>a-b);
                nums.forEach(n => {
                    const vars = lins.filter(v => v.num === n);
                    home.innerHTML += `
                        <div class="app-card" onclick="openVars('${n}')">
                            <div style="display:flex; align-items:center; margin-bottom:12px;">
                                <span class="line-badge ${vars[0].type==='tram'?'badge-tram':'badge-bus'}">${n}</span>
                                <b>${vars[0].type==='bus'?'AUTOBUS':'TRAMWAJ'}</b>
                            </div>
                            <div style="display:flex; flex-wrap:wrap; gap:5px;">
                                ${vars.map(v => `<span class="dir-abbr">${getAbbr(v.dir)}</span>`).join('')}
                            </div>
                        </div>`;
                });
            }
        });

        // News
        document.getElementById('news-list').innerHTML = db.news.map(n => `
            <div class="app-card"><h3>${n.title}</h3><p style="color:var(--text-sec); margin-top:5px;">${n.body}</p></div>
        `).join('');

        // Admin
        document.getElementById('l-cat-sel').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('adm-lines-list').innerHTML = '<h4>Lista Linii</h4>' + db.lines.map((l, i) => `
            <div class="admin-row">
                <span><b>${l.num}</b> -> ${l.dir}</span>
                <div>
                    <button class="edit-btn" onclick="editLine(${i})">EDYTUJ</button>
                    <button class="del-btn" onclick="deleteLine(${i})">USUŃ</button>
                </div>
            </div>`).join('');
        
        document.getElementById('adm-cats').innerHTML = db.categories.map((c, i) => `
            <span class="dir-abbr">${c} <i class="fa-solid fa-xmark" onclick="deleteCat(${i})" style="cursor:pointer; margin-left:5px; color:red;"></i></span>
        `).join(' ');
        
        renderStops();
    }

    function saveLine() {
        const id = parseInt(document.getElementById('edit-id').value);
        const stopsRaw = document.getElementById('l-stops').value.split(',').map(s => {
            const p = s.split('|'); return { name: p[0].trim(), time: p[1]||0 };
        });
        const lData = {
            num: document.getElementById('l-num').value,
            dir: document.getElementById('l-dir').value,
            type: document.getElementById('l-type').value,
            cat: document.getElementById('l-cat-sel').value,
            stops: stopsRaw,
            h1: document.getElementById('l-h1').value, h2: document.getElementById('l-h2').value, h3: document.getElementById('l-h3').value
        };
        if(id === -1) db.lines.push(lData); else db.lines[id] = lData;
        dbRef.set(db).then(() => { alert("Zapisano!"); resetForm(); });
    }

    function editLine(i) {
        const l = db.lines[i];
        document.getElementById('edit-id').value = i;
        document.getElementById('l-num').value = l.num;
        document.getElementById('l-dir').value = l.dir;
        document.getElementById('l-type').value = l.type;
        document.getElementById('l-cat-sel').value = l.cat;
        document.getElementById('l-stops').value = l.stops.map(s => `${s.name}|${s.time}`).join(',');
        document.getElementById('l-h1').value = l.h1;
        document.getElementById('l-h2').value = l.h2;
        document.getElementById('l-h3').value = l.h3;
        document.getElementById('l-head').innerText = "Edytujesz linię " + l.num;
        document.getElementById('btn-cancel').style.display = "block";
        setTab('l'); window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('edit-id').value = "-1";
        document.getElementById('l-head').innerText = "Dodaj Linię";
        document.getElementById('btn-cancel').style.display = "none";
        ['l-num','l-dir','l-stops','l-h1','l-h2','l-h3'].forEach(i => document.getElementById(i).value = '');
    }

    function deleteLine(i) { if(confirm("Usunąć linię?")) { db.lines.splice(i,1); dbRef.set(db); } }
    function deleteCat(i) { db.categories.splice(i,1); dbRef.set(db); }
    function addCat() { const n = document.getElementById('new-cat').value; if(n) { db.categories.push(n); dbRef.set(db); } }
    function saveNews() { db.news.unshift({title: document.getElementById('n-title').value, body: document.getElementById('n-body').value}); dbRef.set(db); }

    function renderStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        let sSet = new Set(); db.lines.forEach(l => l.stops.forEach(s => sSet.add(s.name.trim())));
        document.getElementById('stops-list').innerHTML = [...sSet].sort().filter(s => s.toLowerCase().includes(q)).map(name => {
            let sl = db.lines.filter(l => l.stops.some(st => st.name === name));
            return `<div class="app-card" onclick="openStLines('${name}')">
                <b>${name}</b>
                <div style="margin-top:8px;">${sl.map(l => `<span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}" style="font-size:0.7rem; height:25px;">${l.num} <small>${getAbbr(l.dir)}</small></span>`).join('')}</div>
            </div>`;
        }).join('');
    }

    function openVars(n) {
        show('vars'); const lins = db.lines.filter(l => l.num == n);
        document.getElementById('vars-content').innerHTML = `<div class="group-label">Kierunki linii ${n}</div>` + 
            lins.map(l => `<div class="app-card" style="font-weight:800;">DO: ${l.dir}</div>`).join('');
    }

    function openStLines(name) {
        show('st-lines'); const lins = db.lines.filter(l => l.stops.some(s => s.name === name));
        document.getElementById('st-lines-content').innerHTML = `<div class="group-label">Odjazdy z: ${name}</div>` + 
            lins.map(l => `<div class="app-card"><span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}">${l.num}</span><b>${l.dir}</b></div>`).join('');
    }
</script>
</body>
</html>
