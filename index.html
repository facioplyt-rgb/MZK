<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW POWER ADMIN V140</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; 
            --text: #ffffff; --text-sec: #919eab; --border: rgba(255,255,255,0.1); 
            --bus-col: #00ab55; --tram-col: #ff4842; --warn: #feca05;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        header { background: #0b0f19; padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); transition: 0.2s; }
        
        .line-badge { 
            display: inline-flex; align-items: center; justify-content: center; 
            min-width: 48px; height: 38px; border-radius: 12px; font-weight: 900; 
            color: #fff !important; margin-right: 12px; font-size: 1.1rem;
        }
        .badge-bus { background: var(--bus-col); box-shadow: 0 4px 10px rgba(0,171,85,0.3); }
        .badge-tram { background: var(--tram-col); box-shadow: 0 4px 10px rgba(255,72,66,0.3); }

        .dir-abbr { 
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 10px; 
            font-size: 0.75rem; font-weight: 800; color: #fff; border: 1px solid var(--border); margin-right: 6px; display: inline-block; margin-top: 6px;
        }

        .group-label { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; margin: 30px 0 15px 5px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .group-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(10px); display: flex; height: 80px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        nav div.active { color: var(--accent); font-weight: 600; }
        nav i { font-size: 1.4rem; margin-bottom: 6px; }

        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-family: inherit; font-size: 0.95rem; }
        input:focus { outline: none; border-color: var(--accent); }
        
        .main-btn { background: #212b36; width: 100%; padding: 18px; border-radius: 15px; border: none; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .main-btn:active { transform: scale(0.98); }
        .save-btn { background: var(--accent) !important; color: white; margin-top: 10px; }

        .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--surface-light); margin-bottom: 10px; border-radius: 15px; border: 1px solid var(--border); }
        .act-btns { display: flex; gap: 15px; }
        .act-btns i { cursor: pointer; font-size: 1.1rem; }
        
        .helper-text { font-size: 0.75rem; color: var(--text-sec); margin-top: -8px; margin-bottom: 15px; padding-left: 5px; }
    </style>
</head>
<body>

<header>MZK GORZÓW <span style="color:var(--accent)">PRO</span></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="🔍 Gdzie chcesz jechać?" oninput="renderStops()">
        <div id="stops-list"></div>
    </div>

    <div id="s-news" class="section">
        <div id="news-list"></div>
    </div>

    <div id="s-admin" class="section">
        <div id="login-box" class="app-card">
            <h3 style="margin-bottom:15px">Autoryzacja</h3>
            <input type="password" id="adm-pass" placeholder="Hasło panelu">
            <button onclick="login()" class="main-btn save-btn">Zaloguj</button>
        </div>

        <div id="adm-interface" style="display:none">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <button onclick="setTab('l')" id="btn-tab-l" class="main-btn" style="border:1px solid var(--accent)">Linie</button>
                <button onclick="setTab('n')" id="btn-tab-n" class="main-btn">Inne</button>
            </div>

            <div id="tab-l">
                <div class="app-card" style="border: 1px solid var(--accent)">
                    <h3 id="form-title">Dodaj Linię</h3>
                    <input type="hidden" id="edit-idx" value="-1">
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="text" id="f-num" placeholder="Nr (np. 124)">
                        <input type="text" id="f-abbr" placeholder="Skrót (np. WIEP)">
                    </div>
                    <div class="helper-text">Skrót pojawi się w kółku przy przystanku.</div>
                    
                    <input type="text" id="f-dir" placeholder="Kierunek pełny">
                    
                    <select id="f-type">
                        <option value="bus">Autobus</option>
                        <option value="tram">Tramwaj</option>
                    </select>
                    
                    <select id="f-cat"></select>
                    
                    <textarea id="f-stops" rows="3" placeholder="Przystanek|Minuta, Przystanek|Minuta..."></textarea>
                    <div class="helper-text">Przykład: Katedra|0, AWF|3, Piaski|10</div>

                    <textarea id="f-h1" rows="2" placeholder="Godziny Robocze"></textarea>
                    <textarea id="f-h2" rows="2" placeholder="Godziny Sobota"></textarea>
                    <textarea id="f-h3" rows="2" placeholder="Godziny Niedziela"></textarea>
                    
                    <button onclick="saveLine()" class="main-btn save-btn">ZAPISZ ZMIANY</button>
                    <button onclick="clearForm()" id="cancel-edit" class="main-btn" style="display:none; margin-top:10px; background:transparent; border:1px solid #ff4842">Anuluj</button>
                </div>
                <div id="adm-list-lines"></div>
            </div>

            <div id="tab-n" style="display:none">
                <div class="app-card">
                    <h4>Dodaj Aktualność</h4>
                    <input type="text" id="n-title" placeholder="Tytuł">
                    <textarea id="n-body" placeholder="Treść wiadomości..."></textarea>
                    <button onclick="addNews()" class="main-btn save-btn">Opublikuj</button>
                </div>

                <div class="app-card">
                    <h4>Zarządzaj Kategoriami</h4>
                    <div style="display:flex; gap:8px">
                        <input type="text" id="c-name" placeholder="Nowa kategoria...">
                        <button onclick="addCategory()" class="main-btn" style="width:60px">+</button>
                    </div>
                    <div id="adm-list-cats" style="margin-top:10px"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="s-details" class="section">
        <div id="details-body"></div>
        <button onclick="show('home')" class="main-btn" style="margin-top:20px">Powrót</button>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-route"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-location-dot"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bullhorn"></i><span>News</span></div>
    <div onclick="show('admin')" id="n-admin"><i class="fa-solid fa-user-shield"></i><span>Admin</span></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", 
        authDomain: "mzk-by-facio.firebaseapp.com", 
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "mzk-by-facio" 
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], categories: ["Dzienne", "Nocne"], news: [] };

    dbRef.on('value', (snap) => {
        const val = snap.val();
        if(val) {
            db.lines = val.lines || [];
            db.categories = val.categories || ["Dzienne"];
            db.news = val.news || [];
            renderApp();
        }
    });

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
        window.scrollTo(0,0);
    }

    function login() {
        if(document.getElementById('adm-pass').value === '123') {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('adm-interface').style.display = 'block';
        }
    }

    function setTab(t) {
        document.getElementById('tab-l').style.display = t === 'l' ? 'block' : 'none';
        document.getElementById('tab-n').style.display = t === 'n' ? 'block' : 'none';
        document.getElementById('btn-tab-l').style.borderColor = t === 'l' ? 'var(--accent)' : 'var(--border)';
        document.getElementById('btn-tab-n').style.borderColor = t === 'n' ? 'var(--accent)' : 'var(--border)';
    }

    function renderApp() {
        // Render Home
        const home = document.getElementById('home-content');
        home.innerHTML = '';
        const cats = [...new Set(db.lines.map(l => l.cat || "Inne"))].sort();
        
        cats.forEach(c => {
            const lines = db.lines.filter(l => l.cat === c);
            if(lines.length > 0) {
                home.innerHTML += `<div class="group-label">${c}</div>`;
                const uniqueNums = [...new Set(lines.map(l => l.num))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
                uniqueNums.forEach(n => {
                    const variants = lines.filter(v => v.num === n);
                    home.innerHTML += `
                        <div class="app-card" onclick="openDetails('${n}')">
                            <div style="display:flex; align-items:center; margin-bottom:10px">
                                <span class="line-badge ${variants[0].type==='tram'?'badge-tram':'badge-bus'}">${n}</span>
                                <b>${variants[0].type==='bus'?'AUTOBUS':'TRAMWAJ'}</b>
                            </div>
                            <div>${variants.map(v => `<span class="dir-abbr">${v.abbr || '??'}</span>`).join('')}</div>
                        </div>`;
                });
            }
        });

        // Render News
        document.getElementById('news-list').innerHTML = db.news.map((n, i) => `
            <div class="app-card">
                <div style="display:flex; justify-content:space-between">
                    <h3 style="color:var(--accent)">${n.title}</h3>
                    <i class="fa-solid fa-trash" style="color:#ff4842; cursor:pointer" onclick="deleteNews(${i})"></i>
                </div>
                <p style="margin-top:10px; color:var(--text-sec)">${n.body}</p>
            </div>`).join('');

        // Render Admin Form & Lists
        document.getElementById('f-cat').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('adm-list-lines').innerHTML = db.lines.map((l, i) => `
            <div class="admin-row">
                <span><b>${l.num}</b> ${l.abbr} → ${l.dir}</span>
                <div class="act-btns">
                    <i class="fa-solid fa-pen-to-square" style="color:var(--warn)" onclick="editLine(${i})"></i>
                    <i class="fa-solid fa-trash" style="color:var(--tram-col)" onclick="deleteLine(${i})"></i>
                </div>
            </div>`).join('');
            
        document.getElementById('adm-list-cats').innerHTML = db.categories.map((c, i) => `
            <span class="dir-abbr" style="padding:10px">${c} <i class="fa-solid fa-xmark" style="margin-left:8px; color:#ff4842" onclick="deleteCat(${i})"></i></span>
        `).join('');

        renderStops();
    }

    function saveLine() {
        const idx = parseInt(document.getElementById('edit-idx').value);
        const stopsArr = document.getElementById('f-stops').value.split(',').map(s => {
            const p = s.split('|');
            return { name: p[0].trim(), time: p[1] ? p[1].trim() : "0" };
        });

        const data = {
            num: document.getElementById('f-num').value,
            abbr: document.getElementById('f-abbr').value.toUpperCase(),
            dir: document.getElementById('f-dir').value,
            type: document.getElementById('f-type').value,
            cat: document.getElementById('f-cat').value,
            stops: stopsArr,
            h1: document.getElementById('f-h1').value,
            h2: document.getElementById('f-h2').value,
            h3: document.getElementById('f-h3').value
        };

        if(idx === -1) db.lines.push(data); else db.lines[idx] = data;
        dbRef.set(db).then(() => { alert("Zapisano!"); clearForm(); });
    }

    function editLine(i) {
        const l = db.lines[i];
        document.getElementById('edit-idx').value = i;
        document.getElementById('f-num').value = l.num;
        document.getElementById('f-abbr').value = l.abbr || '';
        document.getElementById('f-dir').value = l.dir;
        document.getElementById('f-type').value = l.type;
        document.getElementById('f-cat').value = l.cat;
        document.getElementById('f-stops').value = l.stops.map(s => `${s.name}|${s.time}`).join(', ');
        document.getElementById('f-h1').value = l.h1;
        document.getElementById('f-h2').value = l.h2;
        document.getElementById('f-h3').value = l.h3;
        
        document.getElementById('form-title').innerText = "Edytuj Linię " + l.num;
        document.getElementById('cancel-edit').style.display = "block";
        window.scrollTo(0,0);
    }

    function clearForm() {
        document.getElementById('edit-idx').value = "-1";
        document.getElementById('form-title').innerText = "Dodaj Linię";
        document.getElementById('cancel-edit').style.display = "none";
        ['f-num','f-abbr','f-dir','f-stops','f-h1','f-h2','f-h3'].forEach(id => document.getElementById(id).value = '');
    }

    function renderStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const sMap = {};
        db.lines.forEach(l => {
            l.stops.forEach(st => {
                if(!sMap[st.name]) sMap[st.name] = [];
                sMap[st.name].push(l);
            });
        });

        const sorted = Object.keys(sMap).sort().filter(s => s.toLowerCase().includes(q));
        document.getElementById('stops-list').innerHTML = sorted.map(name => `
            <div class="app-card">
                <b style="font-size:1.1rem">${name}</b>
                <div style="margin-top:10px">
                    ${sMap[name].map(l => `
                        <span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}" style="height:28px; min-width:65px; font-size:0.8rem; margin-bottom:5px">
                            ${l.num} <small style="margin-left:4px; opacity:0.8">${l.abbr || ''}</small>
                        </span>
                    `).join('')}
                </div>
            </div>`).join('');
    }

    function openDetails(num) {
        show('details');
        const vars = db.lines.filter(l => l.num === num);
        document.getElementById('details-body').innerHTML = `
            <div class="group-label">Linia ${num} - Kierunki</div>
            ${vars.map(v => `
                <div class="app-card">
                    <div style="display:flex; align-items:center; gap:15px">
                        <span class="line-badge ${v.type==='tram'?'badge-tram':'badge-bus'}">${v.num}</span>
                        <div>
                            <div style="font-size:0.7rem; color:var(--text-sec)">KIERUNEK</div>
                            <b style="font-size:1.2rem">${v.dir}</b>
                        </div>
                    </div>
                </div>
            `).join('')}`;
    }

    // Dodatkowe funkcje admina
    function addCategory() { 
        const n = document.getElementById('c-name').value; 
        if(n) { db.categories.push(n); dbRef.set(db); document.getElementById('c-name').value = ''; }
    }
    function deleteCat(i) { if(confirm("Usunąć kategorię?")) { db.categories.splice(i,1); dbRef.set(db); } }
    function deleteLine(i) { if(confirm("Usunąć linię?")) { db.lines.splice(i,1); dbRef.set(db); } }
    function addNews() {
        const t = document.getElementById('n-title').value;
        const b = document.getElementById('n-body').value;
        if(t && b) { db.news.unshift({title:t, body:b}); dbRef.set(db); document.getElementById('n-title').value=''; document.getElementById('n-body').value=''; }
    }
    function deleteNews(i) { db.news.splice(i,1); dbRef.set(db); }
</script>
</body>
</html>
