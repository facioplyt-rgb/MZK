<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; }
        
        /* GRID LINII */
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; }
        .line-square { background: var(--surface); border-radius: 16px; padding: 18px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; cursor: pointer; border-bottom: 4px solid transparent; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }

        /* LISTA PRZYSTANKÓW */
        .stop-row { background: var(--surface); padding: 15px; border-radius: 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .stop-time-badge { min-width: 60px; text-align: center; background: rgba(0,171,85,0.1); color: var(--accent); padding: 8px; border-radius: 12px; font-weight: 800; }
        .stop-info { flex: 1; }
        .stop-name { font-weight: 600; font-size: 1rem; }
        .stop-sub { font-size: 0.7rem; color: var(--text-sec); margin-top: 2px; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; margin-left: 5px; }

        /* TABELA ROZKŁADU */
        .tt-box { width: 100%; margin: 15px 0; background: #0b0f19; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .tt-line { display: grid; grid-template-columns: 50px 1fr 1fr 1fr; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tt-line.head { background: #1c252e; font-size: 0.6rem; font-weight: 800; color: var(--text-sec); text-align: center; }
        .tt-c { padding: 12px 2px; font-size: 0.85rem; text-align: center; }
        .tt-c.h { font-weight: 800; color: var(--accent); background: rgba(0,171,85,0.05); border-right: 1px solid rgba(255,255,255,0.05); }
        .today { background: rgba(0,171,85,0.15) !important; color: var(--accent); }

        /* NAVI */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 80px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }

        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .app-card { background: var(--surface); padding: 15px; border-radius: 18px; margin-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        .form-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .chip { display: inline-block; background: #1c252e; padding: 5px 10px; border-radius: 8px; margin: 3px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
        .chip.bus { color: var(--accent); } .chip.tram { color: var(--danger); }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <div class="group-label">Szukaj Przystanku</div>
        <input type="text" id="stop-q" placeholder="Wpisz nazwę..." oninput="renderStopSearch()">
        <div id="stop-search-results"></div>
    </div>
    <div id="s-news" class="section"><div class="group-label">Komunikaty</div><div id="news-list"></div></div>
    <div id="s-info" class="section"><div class="group-label">Kontakt</div><div id="info-cont" class="app-card"></div></div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="navTo('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-route" class="section"><div id="route-head"></div><div id="route-list"></div><button onclick="navTo('vars')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-details" class="section"><div id="det-head"></div><div id="det-table"></div><div id="det-extra"></div><button id="det-back" class="main-btn" style="background:#333">Wróć do trasy</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" style="text-align:center;" class="app-card">
            <input type="password" id="adm-pass" placeholder="Hasło">
            <button onclick="doLogin()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-panel" style="display:none;">
            <button onclick="openForm(-1)" class="main-btn">Dodaj Linię</button>
            <button onclick="exportDB()" class="main-btn" style="background:#444">Eksportuj</button>
            <input type="file" id="imp-file" style="display:none" onchange="importDB(event)">
            <button onclick="document.getElementById('imp-file').click()" class="main-btn" style="background:#444">Importuj</button>
            <div id="adm-lines-list"></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="navTo('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="navTo('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="navTo('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="navTo('info')" id="n-info"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="navTo('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="editor" class="form-overlay">
    <h2>Edycja Linii</h2>
    <input type="text" id="f-num" placeholder="Numer">
    <input type="text" id="f-dir" placeholder="Kierunek">
    <select id="f-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="f-h" placeholder="Robocze (godziny po przecinku)"></textarea>
    <textarea id="f-h-sat" placeholder="Soboty"></textarea>
    <textarea id="f-h-sun" placeholder="Nd/Św"></textarea>
    <div id="f-stops"></div>
    <button onclick="addStopInput()" class="main-btn" style="background:#444">+ Przystanek</button>
    <button onclick="saveData()" class="main-btn">ZAPISZ</button>
    <button onclick="closeEditor()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    const DB_VER = 'mzk_stable_v15';
    let db = { lines: [], news: [], info: "MZK Gorzów", stopsDetails: {} };
    let editIdx = -1;

    function init() {
        const saved = localStorage.getItem(DB_VER);
        if(saved) db = JSON.parse(saved);
        renderHome();
    }

    function sync() { localStorage.setItem(DB_VER, JSON.stringify(db)); renderHome(); }

    function getDayType() {
        const d = new Date();
        if(d.getDay() === 0) return 'sun';
        if(d.getDay() === 6) return 'sat';
        return 'work';
    }

    function parseH(str, offset) {
        if(!str) return {};
        let res = {};
        str.split(',').forEach(h => {
            let p = h.trim().split(':');
            if(p.length < 2) return;
            let d = new Date();
            d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
            let hh = d.getHours().toString().padStart(2,'0');
            let mm = d.getMinutes().toString().padStart(2,'0');
            if(!res[hh]) res[hh] = [];
            res[hh].push(mm);
        });
        return res;
    }

    function getNext(str, off) {
        const groups = parseH(str, off);
        const now = new Date();
        let times = [];
        Object.keys(groups).forEach(h => groups[h].forEach(m => times.push(h+":"+m)));
        times.sort();
        for(let t of times) {
            let [h,m] = t.split(':');
            let d = new Date(); d.setHours(h,m,0);
            if(d > now) return { time: t, diff: Math.floor((d-now)/60000) };
        }
        return null;
    }

    function getNextOther(stopName, curNum) {
        let best = null;
        const dt = getDayType();
        db.lines.forEach(l => {
            if(l.num === curNum) return;
            let off = 0;
            l.stops.forEach(s => {
                off += parseInt(s.time);
                if(s.name === stopName) {
                    const hStr = dt==='work'?l.h:(dt==='sat'?l.hSat:l.hSun);
                    const nxt = getNext(hStr, off);
                    if(nxt && (!best || nxt.diff < best.diff)) best = { diff: nxt.diff, num: l.num };
                }
            });
        });
        return best;
    }

    function renderHome() {
        const h = document.getElementById('s-home');
        h.innerHTML = '<div class="group-label">Linie</div>';
        const g = document.createElement('div'); g.className = 'lines-grid';
        let seen = new Set();
        db.lines.sort((a,b)=>parseInt(a.num)-parseInt(b.num)).forEach(l => {
            if(!seen.has(l.num)) {
                seen.add(l.num);
                const d = document.createElement('div'); d.className = `line-square ${l.type}`; d.innerText = l.num;
                d.onclick = () => openVars(l.num); g.appendChild(d);
            }
        });
        h.appendChild(g);
        document.getElementById('info-cont').innerText = db.info;
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l,i)=>`<div class="app-card"><b>${l.num}</b> ${l.dir} <button onclick="openForm(${i})" style="float:right; color:var(--accent); background:none; border:none;">EDYTUJ</button></div>`).join('');
    }

    function openVars(num) {
        navTo('vars');
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const l = document.getElementById('vars-list'); l.innerHTML = '';
        db.lines.forEach((line, i) => {
            if(line.num == num) {
                const d = document.createElement('div'); d.className = 'app-card'; d.innerHTML = `<b>${line.dir}</b>`;
                d.onclick = () => openRoute(i); l.appendChild(d);
            }
        });
    }

    function openRoute(idx) {
        navTo('route');
        const line = db.lines[idx];
        const dt = getDayType();
        document.getElementById('route-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const list = document.getElementById('route-list'); list.innerHTML = '';
        let totalOff = 0;
        line.stops.forEach(s => {
            totalOff += parseInt(s.time);
            const curOff = totalOff;
            const hStr = dt==='work'?line.h:(dt==='sat'?line.hSat:line.hSun);
            const nxt = getNext(hStr, curOff);
            const other = getNextOther(s.name, line.num);

            const d = document.createElement('div'); d.className = 'stop-row';
            d.innerHTML = `<div class="stop-time-badge">${nxt?nxt.time:'--:--'}</div><div class="stop-info"><div class="stop-name">${s.name}${s.nz?'<span class="nz-badge">NŻ</span>':''}</div><div class="stop-sub">${nxt?'Za '+nxt.diff+' min':'Koniec kursów'}${other?' • Inna ('+other.num+') za '+other.diff+' min':''}</div></div><i class="fa-solid fa-chevron-right" style="opacity:0.2"></i>`;
            d.onclick = () => openDetails(s.name, idx, curOff);
            list.appendChild(d);
        });
    }

    function openDetails(stopName, lineIdx, off) {
        navTo('details');
        const line = db.lines[lineIdx];
        const dt = getDayType();
        document.getElementById('det-head').innerHTML = `<div class="group-label">${stopName}</div><h1>Linia ${line.num}</h1>`;
        const gW = parseH(line.h, off); const gSa = parseH(line.hSat, off); const gSu = parseH(line.hSun, off);
        const hours = [...new Set([...Object.keys(gW),...Object.keys(gSa),...Object.keys(gSu)])].sort();
        document.getElementById('det-table').innerHTML = `<div class="tt-box"><div class="tt-line head"><div class="tt-c">G</div><div class="tt-c ${dt==='work'?'today':''}">Roboczy</div><div class="tt-c ${dt==='sat'?'today':''}">Sobota</div><div class="tt-c ${dt==='sun'?'today':''}">Nd/Św</div></div>${hours.map(h=>`<div class="tt-line"><div class="tt-c h">${h}</div><div class="tt-c ${dt==='work'?'today':''}">${(gW[h]||[]).join(' ')}</div><div class="tt-c ${dt==='sat'?'today':''}">${(gSa[h]||[]).join(' ')}</div><div class="tt-c ${dt==='sun'?'today':''}">${(gSu[h]||[]).join(' ')}</div></div>`).join('')}</div>`;
        
        let inni = []; db.lines.forEach(l=>{if(l.num!==line.num && l.stops.some(st=>st.name===stopName)) if(!inni.some(e=>e.num===l.num)) inni.push(l);});
        document.getElementById('det-extra').innerHTML = `<div class="group-label">Przesiadki</div><div>${inni.map(p=>`<span class="chip ${p.type}">${p.num}</span>`).join('')}</div>`;
        document.getElementById('det-back').onclick = () => openRoute(lineIdx);
    }

    function renderStopSearch() {
        const q = document.getElementById('stop-q').value.toLowerCase();
        const res = document.getElementById('stop-search-results'); res.innerHTML = '';
        let all = new Set(); db.lines.forEach(l=>l.stops.forEach(s=>all.add(s.name)));
        [...all].sort().filter(s=>s.toLowerCase().includes(q)).forEach(name=>{
            const d = document.createElement('div'); d.className = 'app-card'; d.innerHTML = `<b>${name}</b>`;
            d.onclick = () => {
                navTo('details'); document.getElementById('det-head').innerHTML = `<h1>${name}</h1>`; document.getElementById('det-table').innerHTML = '';
                let lines = []; db.lines.forEach(l=>{if(l.stops.some(s=>s.name===name)) if(!lines.some(e=>e.num===l.num)) lines.push(l);});
                document.getElementById('det-extra').innerHTML = `<div class="group-label">Linie tutaj</div>${lines.map(p=>`<span class="chip ${p.type}">${p.num}</span>`).join('')}`;
                document.getElementById('det-back').onclick = () => navTo('stops');
            };
            res.appendChild(d);
        });
    }

    function navTo(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        const nid = ['vars','route','details'].includes(id) ? 'home' : id;
        if(document.getElementById('n-'+nid)) document.getElementById('n-'+nid).classList.add('active');
        window.scrollTo(0,0);
    }

    function doLogin() { if(document.getElementById('adm-pass').value==='123') document.getElementById('adm-panel').style.display='block'; }
    function openForm(idx) {
        editIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", h:"", hSat:"", hSun:"", stops:[]} : db.lines[idx];
        document.getElementById('f-num').value = l.num; document.getElementById('f-dir').value = l.dir;
        document.getElementById('f-type').value = l.type; document.getElementById('f-h').value = l.h;
        document.getElementById('f-h-sat').value = l.hSat||""; document.getElementById('f-h-sun').value = l.hSun||"";
        document.getElementById('f-stops').innerHTML = ''; l.stops.forEach(s => addStopInput(s.name, s.time, s.nz));
        document.getElementById('editor').style.display = 'block';
    }

    function addStopInput(n="", t=2, z=false) {
        const d = document.createElement('div'); d.className = 'f-stop-row';
        d.style.display = 'grid'; d.style.gridTemplateColumns = '1fr 60px 40px 40px'; d.style.gap = '5px'; d.style.marginBottom = '8px';
        d.innerHTML = `<input type="text" value="${n}" class="in-n" placeholder="Nazwa"><input type="number" value="${t}" class="in-t"><input type="checkbox" ${z?'checked':''} class="in-z"><button onclick="this.parentElement.remove()" style="background:var(--danger); border:none; color:white; border-radius:8px;">X</button>`;
        document.getElementById('f-stops').appendChild(d);
    }

    function saveData() {
        const stops = Array.from(document.querySelectorAll('.f-stop-row')).map(r => ({
            name: r.querySelector('.in-n').value,
            time: r.querySelector('.in-t').value,
            nz: r.querySelector('.in-z').checked
        }));
        const data = {
            num: document.getElementById('f-num').value, dir: document.getElementById('f-dir').value,
            type: document.getElementById('f-type').value, h: document.getElementById('f-h').value,
            hSat: document.getElementById('f-h-sat').value, hSun: document.getElementById('f-h-sun').value,
            stops: stops
        };
        if(editIdx === -1) db.lines.push(data); else db.lines[editIdx] = data;
        sync(); closeEditor();
    }

    function closeEditor() { document.getElementById('editor').style.display = 'none'; }
    function exportDB() { const b = new Blob([JSON.stringify(db)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mzk.json'; a.click(); }
    function importDB(e) { const r = new FileReader(); r.onload = (x) => { db = JSON.parse(x.target.result); sync(); location.reload(); }; r.readAsText(e.target.files[0]); }

    init();
</script>
</body>
</html>
