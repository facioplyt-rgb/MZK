<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - System Pełny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); padding-bottom: 90px; }
        header { background: var(--mzk); color: white; padding: 18px; text-align: center; border-bottom: 4px solid var(--yellow); font-weight: 900; text-transform: uppercase; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LINIE */
        .cat-title { border-left: 5px solid var(--mzk); padding: 5px 12px; margin: 20px 0 10px; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .cat-tram { border-color: var(--red); }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .line-card { background: white; border-radius: 18px; padding: 25px 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border-bottom: 4px solid #eee; transition: transform 0.1s; }
        .line-card:active { transform: scale(0.95); }
        .line-card .num { font-size: 2.2rem; font-weight: 900; display: block; line-height: 1; }

        /* WARIANTY */
        .variant-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--mzk); }
        .variant-card.tram { border-left-color: var(--red); }
        .variant-info h4 { font-weight: 900; font-size: 1.2rem; }
        .variant-info p { font-size: 0.8rem; font-weight: 600; color: #666; text-transform: uppercase; }

        /* ROZKŁAD */
        .tt-header-box { background: var(--mzk); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .tt-header-box.tram { background: var(--red); }
        .tt-table { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; margin-bottom: 20px; }
        .tt-head-row { background: #222; color: white; display: flex; text-align: center; font-size: 0.65rem; font-weight: 900; padding: 12px 0; }
        .tt-col { flex: 1; padding: 10px 5px; text-align: center; border-right: 1px solid #eee; }
        .hour { background: #f0f0f0; padding: 4px 6px; margin: 3px; border-radius: 5px; display: inline-block; font-size: 0.85rem; font-weight: 800; border: 1px solid #ddd; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 80px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #bbb; cursor: pointer; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; gap: 4px; }
        nav div.active { color: var(--mzk); }
        nav i { font-size: 1.5rem; }

        /* PANEL & MODALE */
        .adm-btn { background: var(--dark); color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        .list-item { background: white; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="lines-display"></div>
    </div>

    <div id="s-variants" class="section">
        <button onclick="show('home')" style="border:none; background:none; font-weight:900; color:var(--red); padding:10px 0; cursor:pointer;"><i class="fa-solid fa-arrow-left"></i> POWRÓT DO LINII</button>
        <h3 id="variant-title" style="margin-bottom:15px; font-weight:900;">WYBIERZ KIERUNEK</h3>
        <div id="variants-display"></div>
    </div>

    <div id="s-timetable" class="section">
        <button id="btn-back-to-variants" style="border:none; background:none; font-weight:900; color:var(--red); padding:10px 0; cursor:pointer;"><i class="fa-solid fa-arrow-left"></i> POWRÓT</button>
        <div id="tt-content"></div>
    </div>

    <div id="s-map" class="section">
        <iframe id="main-map" style="width:100%; height:500px; border-radius:15px; border:1px solid #ddd;" src=""></iframe>
    </div>

    <div id="s-info" class="section">
        <h2 style="font-weight:900; margin-bottom:15px;">KOMUNIKATY</h2>
        <div id="news-display"></div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login">
            <input type="password" id="adm-pass" placeholder="Hasło (123)" style="text-align:center;">
            <button onclick="login()" class="adm-btn">ZALOGUJ</button>
        </div>
        <div id="adm-dash" style="display:none;">
            <div style="display:flex; gap:3px; margin-bottom:15px;">
                <button onclick="setTab('l')" id="bl" style="flex:1; padding:8px; border-radius:5px; border:none; font-weight:800; background:var(--mzk); color:white; font-size:0.6rem;">LINIE</button>
                <button onclick="setTab('n')" id="bn" style="flex:1; padding:8px; border-radius:5px; border:none; font-weight:800; background:#ddd; font-size:0.6rem;">INFO</button>
                <button onclick="setTab('m')" id="bm" style="flex:1; padding:8px; border-radius:5px; border:none; font-weight:800; background:#ddd; font-size:0.6rem;">MAPA</button>
            </div>
            <div id="tab-l">
                <button onclick="openModal('m-line')" class="adm-btn">+ DODAJ WARIANT LINII</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="tab-n" style="display:none;">
                <button onclick="openModal('m-news')" class="adm-btn">+ DODAJ KOMUNIKAT</button>
                <div id="adm-info-list"></div>
            </div>
            <div id="tab-m" style="display:none;">
                <input type="text" id="map-url-input" placeholder="Link do mapy (src iframe)">
                <button onclick="saveMapLink()" class="adm-btn" style="background:var(--mzk)">ZAPISZ MAPĘ</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-bullhorn"></i><span>Info</span></div>
    <div onclick="show('map')" id="n-map"><i class="fa-solid fa-map"></i><span>Mapa</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<div id="m-line" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h2 style="font-weight:900;">DODAJ WARIANT</h2>
    <input type="text" id="l-num" placeholder="Nr (np. 100)">
    <input type="text" id="l-dir" placeholder="Kierunek (np. PIASKI)">
    <select id="l-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="l-stops" placeholder="Przystanki (każdy w nowej linii)"></textarea>
    <input type="text" id="l-work" placeholder="Godziny (po przecinku: 08:00, 08:15)">
    <button onclick="saveLine()" class="adm-btn" style="background:var(--mzk)">ZAPISZ</button>
    <button onclick="closeModals()" style="background:none; border:none; color:red; width:100%;">ANULUJ</button>
</div>

<div id="m-news" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:3000;display:none;padding:20px;">
    <h2>DODAJ KOMUNIKAT</h2>
    <input type="text" id="n-title" placeholder="Tytuł">
    <textarea id="n-body" placeholder="Treść" style="height:150px;"></textarea>
    <button onclick="saveNews()" class="adm-btn">DODAJ</button>
    <button onclick="closeModals()" style="background:none; border:none; color:red; width:100%;">ANULUJ</button>
</div>

<script>
    const STORAGE_KEY = 'MZK_GORZOW_FINAL_V12';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
        lines: [], news: [], mapUrl: "" 
    };

    function save() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); 
        renderHome(); renderInfo(); renderAdm(); 
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-' + id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        const navBtn = document.getElementById('n-' + id);
        if(navBtn) navBtn.classList.add('active');
        if(id === 'map') document.getElementById('main-map').src = db.mapUrl;
    }

    // GRUPOWANIE LINII DO WIDOKU GŁÓWNEGO
    function renderHome() {
        const cont = document.getElementById('lines-display');
        cont.innerHTML = '';
        
        const types = [
            { id: 'tram', title: 'Tramwaje', icon: 'train-tram', color: 'var(--red)' },
            { id: 'bus', title: 'Autobusy', icon: 'bus', color: 'var(--mzk)' }
        ];

        types.forEach(t => {
            const filtered = db.lines.filter(l => l.type === t.id);
            if(filtered.length > 0) {
                // Unikalne numery linii dla tego typu
                const uniqueNums = [...new Set(filtered.map(l => l.num))].sort((a,b) => a-b);
                
                cont.innerHTML += `<div class="cat-title ${t.id==='tram'?'cat-tram':''}"><i class="fa-solid fa-${t.icon}"></i> ${t.title}</div>`;
                let grid = `<div class="line-grid">`;
                uniqueNums.forEach(num => {
                    grid += `<div class="line-card" onclick="openVariants('${num}')"><span class="num" style="color:${t.color}">${num}</span></div>`;
                });
                cont.innerHTML += grid + `</div>`;
            }
        });
    }

    // OTWIERANIE WARIANTÓW DLA DANEGO NUMERU
    function openVariants(lineNum) {
        show('variants');
        document.getElementById('variant-title').innerText = "LINIA " + lineNum + " - WYBIERZ KIERUNEK";
        const cont = document.getElementById('variants-display');
        cont.innerHTML = '';
        
        const variants = db.lines.filter(l => l.num === lineNum);
        variants.forEach(v => {
            const isTram = v.type === 'tram';
            cont.innerHTML += `
                <div class="variant-card ${isTram?'tram':''}" onclick="openTT('${db.lines.indexOf(v)}')">
                    <div class="variant-info">
                        <h4>${v.num}</h4>
                        <p>${v.dir}</p>
                    </div>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>`;
        });
    }

    // OTWIERANIE ROZKŁADU
    function openTT(idx) {
        show('timetable');
        const l = db.lines[idx];
        const isTram = l.type === 'tram';
        
        // Dynamiczny powrót do wariantów konkretnej linii
        document.getElementById('btn-back-to-variants').onclick = () => openVariants(l.num);

        let html = `
            <div class="tt-header-box ${isTram?'tram':''}">
                <h1 style="font-size:2.5rem; margin:0;">${l.num}</h1>
                <p style="font-weight:800; text-transform:uppercase;">KIERUNEK: ${l.dir}</p>
            </div>
            <div class="tt-table">
                <div class="tt-head-row"><div class="tt-col">GODZINY ODJAZDÓW</div></div>
                <div style="padding:15px; text-align:center;">
                    ${l.h_work ? l.h_work.split(',').map(h => `<span class="hour">${h.trim()}</span>`).join('') : 'Brak godzin'}
                </div>
            </div>
            <h3 style="margin:15px 0 10px; font-weight:900;">PRZYSTANKI:</h3>
        `;
        
        l.stops.forEach(s => {
            html += `<div class="list-item" style="border-left:4px solid #ddd;"><b>${s}</b></div>`;
        });
        
        document.getElementById('tt-content').innerHTML = html;
    }

    function renderInfo() {
        const cont = document.getElementById('news-display');
        cont.innerHTML = db.news.length ? '' : '<p>Brak komunikatów.</p>';
        db.news.forEach(n => {
            cont.innerHTML += `<div style="background:white; padding:15px; border-radius:12px; margin-bottom:10px; border-left:5px solid var(--yellow);">
                <h3 style="font-size:1rem; font-weight:900;">${n.title}</h3>
                <p style="font-size:0.85rem; color:#444;">${n.body}</p>
            </div>`;
        });
    }

    function login() { if(document.getElementById('adm-pass').value === '123') { document.getElementById('adm-login').style.display='none'; document.getElementById('adm-dash').style.display='block'; renderAdm(); } }
    
    function setTab(t) {
        ['l','n','m'].forEach(x => {
            document.getElementById('tab-'+x).style.display = (x===t?'block':'none');
            document.getElementById('b'+x).style.background = (x===t?'var(--mzk)':'#ddd');
            document.getElementById('b'+x).style.color = (x===t?'white':'black');
        });
    }

    function openModal(id) { document.getElementById(id).style.display='block'; }
    function closeModals() { document.querySelectorAll('[id^="m-"]').forEach(m => m.style.display='none'); }

    function saveLine() {
        const line = {
            num: document.getElementById('l-num').value,
            dir: document.getElementById('l-dir').value,
            type: document.getElementById('l-type').value,
            stops: document.getElementById('l-stops').value.split('\n').filter(x => x.trim()),
            h_work: document.getElementById('l-work').value
        };
        if(!line.num || !line.dir) return alert("Wypełnij numer i kierunek!");
        db.lines.push(line);
        save();
        closeModals();
    }

    function saveNews() {
        db.news.unshift({ title: document.getElementById('n-title').value, body: document.getElementById('n-body').value });
        save(); closeModals();
    }

    function saveMapLink() {
        db.mapUrl = document.getElementById('map-url-input').value;
        save(); alert("Zapisano link mapy!");
    }

    function renderAdm() {
        const al = document.getElementById('adm-lines-list'); al.innerHTML = '';
        db.lines.forEach((l, i) => {
            al.innerHTML += `<div class="list-item"><span>[${l.type}] <b>${l.num}</b> -> ${l.dir}</span><button onclick="db.lines.splice(${i},1);save()" style="color:red;border:none;background:none;"><i class="fa-solid fa-trash"></i></button></div>`;
        });
        const an = document.getElementById('adm-info-list'); an.innerHTML = '';
        db.news.forEach((n, i) => {
            an.innerHTML += `<div class="list-item"><span>${n.title}</span><button onclick="db.news.splice(${i},1);save()" style="color:red;border:none;background:none;"><i class="fa-solid fa-trash"></i></button></div>`;
        });
        document.getElementById('map-url-input').value = db.mapUrl;
    }

    // Start
    renderHome(); renderInfo();
</script>
</body>
</html>
