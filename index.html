<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .app-card { background: var(--surface); padding: 20px; border-radius: 24px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 22px 0; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 800; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .line-square.bus { border-bottom: 4px solid var(--accent); }
        .line-square.tram { border-bottom: 4px solid var(--danger); }
        .line-square:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
        
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; margin-top: 15px; width: 100%; }
        .tt-time { background: #1c252e; padding: 8px; border-radius: 10px; font-size: 0.85rem; text-align: center; font-weight: 600; color: var(--accent); border: 1px solid rgba(0,171,85,0.2); }
        
        /* Styl listy przystanków w trasie */
        .route-stop-card { background: var(--surface); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .route-time-badge { background: rgba(0,171,85,0.1); color: var(--accent); padding: 8px 12px; border-radius: 12px; font-weight: 800; font-size: 0.9rem; min-width: 65px; text-align: center; }
        .route-stop-info { flex: 1; }
        .route-stop-name { font-weight: 600; font-size: 1rem; }
        .route-stop-sub { font-size: 0.7rem; color: var(--text-sec); margin-top: 2px; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; transition: 0.2s; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .main-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        .overlay-form { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; padding: 20px; overflow-y: auto; }
        input, textarea, select { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; font-size: 1rem; }
        .adm-tab { display: none; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.55rem; padding: 2px 5px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    
    <div id="s-stops" class="section">
        <div class="group-label">Szukaj przystanku</div>
        <input type="text" id="stop-search" placeholder="Wpisz nazwę przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-news" class="section">
        <div class="group-label">Komunikaty</div>
        <div id="public-news-list"></div>
    </div>

    <div id="s-contact" class="section">
        <div class="group-label">Kontakt i Informacje</div>
        <div id="contact-display" class="app-card" style="display:block; white-space: pre-wrap;"></div>
    </div>

    <div id="s-vars" class="section">
        <div id="vars-head"></div>
        <div id="vars-list"></div>
        <button onclick="show('home')" class="main-btn" style="background: #333; margin-top: 20px;">Wróć do linii</button>
    </div>

    <div id="s-tt" class="section">
        <div id="tt-head"></div>
        <div id="tt-body"></div>
        <button onclick="show('vars')" class="main-btn" style="background: #333; margin-top: 20px;">Wróć do kierunków</button>
    </div>

    <div id="s-stop-details" class="section">
        <div id="sd-content"></div>
        <button id="sd-back-btn" class="main-btn" style="background: #333; margin-top: 20px;">Wróć</button>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align: center;">
            <input type="password" id="pass" placeholder="Hasło administratora">
            <button onclick="login()" class="main-btn">Zaloguj się</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px;">
                <button onclick="setTab('l')" class="main-btn" style="padding: 12px; font-size: 0.7rem;">LINIE</button>
                <button onclick="setTab('n')" class="main-btn" style="padding: 12px; font-size: 0.7rem;">NEWS</button>
                <button onclick="setTab('s')" class="main-btn" style="padding: 12px; font-size: 0.7rem;">SYSTEM</button>
            </div>
            
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineForm(-1)" class="main-btn">Dodaj nową linię</button>
                <div id="adm-lines-list"></div>
            </div>
            
            <div id="tab-n" class="adm-tab">
                <button onclick="openNewsForm()" class="main-btn">Dodaj komunikat</button>
                <div id="adm-news-list"></div>
            </div>
            
            <div id="tab-s" class="adm-tab">
                <div class="group-label">Kontakt / Info</div>
                <textarea id="edit-contact" style="height: 100px;"></textarea>
                <button onclick="saveContact()" class="main-btn">Zapisz tekst info</button>
                <hr style="opacity: 0.1; margin: 20px 0;">
                <button onclick="exportFullBackup()" class="main-btn" style="background: #444;">Eksportuj kopię (JSON)</button>
                <input type="file" id="importFile" style="display:none" onchange="importFullBackup(event)">
                <button onclick="document.getElementById('importFile').click()" class="main-btn" style="background: #444;">Importuj kopię</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2 id="fl-title">Linia</h2>
    <input type="text" id="fl-num" placeholder="Numer linii">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="fl-hours" placeholder="Godziny robocze (np. 08:10, 08:40...)"></textarea>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background: #444;">+ Dodaj przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz linię</button>
    <button onclick="closeForms()" class="main-btn" style="background: none;">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <h2>Nowy komunikat</h2>
    <input type="text" id="fn-title" placeholder="Tytuł">
    <textarea id="fn-content" placeholder="Treść komunikatu..." style="height: 150px;"></textarea>
    <button onclick="saveNews()" class="main-btn">Opublikuj</button>
    <button onclick="closeForms()" class="main-btn" style="background: none;">Anuluj</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "Miejski Zakład Komunikacji w Gorzowie Wielkopolskim\nul. Kostrzyńska 46\n66-400 Gorzów Wlkp.", stopDetails: {} };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_v10');
        if(local) db = JSON.parse(local);
        render();
    }

    function save() { localStorage.setItem('mzk_v10', JSON.stringify(db)); render(); }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        const navId = ['vars','tt','stop-details'].includes(id) ? 'home' : id;
        if(document.getElementById('n-'+navId)) document.getElementById('n-'+navId).classList.add('active');
        window.scrollTo(0,0);
    }

    // --- LOGIKA CZASU (Z Twojego oryginału) ---
    function getNextArrival(hoursStr, offset) {
        if(!hoursStr) return null;
        const now = new Date();
        const times = hoursStr.split(',').map(h => {
            let p = h.trim().split(':');
            if(p.length < 2) return null;
            let d = new Date();
            d.setHours(parseInt(p[0]), parseInt(p[1]) + offset, 0);
            return d;
        }).filter(d => d !== null).sort((a,b) => a-b);
        
        for(let t of times) {
            if(t > now) return {
                time: t.getHours().toString().padStart(2,'0') + ":" + t.getMinutes().toString().padStart(2,'0'),
                diff: Math.floor((t - now) / 60000)
            };
        }
        return null;
    }

    // --- RENDERY ---
    function render() {
        // HOME
        const home = document.getElementById('s-home');
        home.innerHTML = '<div class="group-label">Dostępne linie</div>';
        const grid = document.createElement('div'); grid.className = 'lines-grid';
        const uniqueLines = [...new Set(db.lines.map(l => l.num))].sort((a,b) => a-b);
        uniqueLines.forEach(num => {
            const line = db.lines.find(l => l.num === num);
            const div = document.createElement('div');
            div.className = `line-square ${line.type}`;
            div.innerText = num;
            div.onclick = () => openVariants(num);
            grid.appendChild(div);
        });
        home.appendChild(grid);

        // NEWS
        document.getElementById('public-news-list').innerHTML = db.news.map(n => `
            <div class="app-card" style="display:block;">
                <small style="color:var(--accent); font-weight:700;">${n.date}</small>
                <h3 style="margin:5px 0 10px 0;">${n.title}</h3>
                <p style="color:var(--text-sec); font-size:0.9rem; line-height:1.4;">${n.content}</p>
            </div>
        `).join('');

        // INFO
        document.getElementById('contact-display').innerText = db.contact;
        document.getElementById('edit-contact').value = db.contact;

        // ADMIN LISTS
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `
            <div class="app-card">
                <div><b>${l.num}</b> <small>${l.dir}</small></div>
                <button onclick="openLineForm(${i})" style="background:none; border:none; color:var(--accent); font-weight:700;">EDYTUJ</button>
            </div>
        `).join('');
        document.getElementById('adm-news-list').innerHTML = db.news.map((n, i) => `
            <div class="app-card">
                <div><b>${n.title}</b></div>
                <button onclick="deleteNews(${i})" style="background:none; border:none; color:var(--danger); font-weight:700;">USUŃ</button>
            </div>
        `).join('');
    }

    function openVariants(num) {
        show('vars');
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div><h2>Wybierz kierunek</h2>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, idx) => {
            if(l.num === num) {
                const div = document.createElement('div');
                div.className = 'app-card';
                div.innerHTML = `<b>${l.dir}</b> <i class="fa-solid fa-chevron-right" style="opacity:0.3"></i>`;
                div.onclick = () => renderTimetable(idx);
                list.appendChild(div);
            }
        });
    }

    // --- POPRAWIONY WIDOK TRASY ---
    function renderTimetable(idx) {
        const line = db.lines[idx];
        show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2><p style="font-size:0.7rem; color:var(--text-sec); margin-top:5px;">Kliknij przystanek, aby zobaczyć pełny rozkład</p>`;
        const body = document.getElementById('tt-body');
        body.innerHTML = '';
        let currentOffset = 0;

        line.stops.forEach(stop => {
            currentOffset += parseInt(stop.time);
            const nxt = getNextArrival(line.hours, currentOffset);
            
            const card = document.createElement('div');
            card.className = 'route-stop-card';
            card.innerHTML = `
                <div class="route-time-badge">${nxt ? nxt.time : '--:--'}</div>
                <div class="route-stop-info">
                    <div class="route-stop-name">${stop.name}${stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}</div>
                    <div class="route-stop-sub">${nxt ? 'Odjazd za ' + nxt.diff + ' min' : 'Brak kursów'}</div>
                </div>
                <i class="fa-solid fa-chevron-right" style="opacity:0.2"></i>
            `;
            // Po kliknięciu - otwórz detale tego konkretnego przystanku
            const savedOffset = currentOffset;
            card.onclick = () => showStopDetails(stop.name, line, savedOffset, () => renderTimetable(idx));
            body.appendChild(card);
        });
    }

    // --- WIDOK SZCZEGÓŁÓW PRZYSTANKU ---
    function showStopDetails(stopName, line, offset, backFunc) {
        show('stop-details');
        const det = db.stopDetails[stopName] || { nearby: "Brak dodatkowych informacji o okolicy." };
        const content = document.getElementById('sd-content');
        
        // Generowanie tabeli (Twoja logika godzin)
        const timesHtml = line.hours.split(',').map(h => {
            let p = h.trim().split(':');
            if(p.length < 2) return "";
            let d = new Date();
            d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
            return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        }).join('');

        content.innerHTML = `
            <div class="group-label">Przystanek</div>
            <h1>${stopName}</h1>
            <div class="app-card" style="display:block; margin-top:15px; background: rgba(0,171,85,0.05); border: 1px solid var(--accent);">
                <div style="font-weight:800; color:var(--accent);">LINIA ${line.num}</div>
                <div style="font-size:0.8rem; opacity:0.7;">Kierunek: ${line.dir}</div>
                <div class="tt-grid">${timesHtml}</div>
            </div>
            <div class="group-label">O okolicy</div>
            <div class="app-card" style="display:block; font-size:0.9rem; color:var(--text-sec); line-height:1.5;">
                ${det.nearby}
            </div>
        `;
        document.getElementById('sd-back-btn').onclick = backFunc;
    }

    // --- WYSZUKIWARKA (BEZ ZMIAN) ---
    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list');
        list.innerHTML = '';
        let allStops = new Set();
        db.lines.forEach(l => l.stops.forEach(s => allStops.add(s.name)));
        
        [...allStops].sort().forEach(s => {
            if(s.toLowerCase().includes(q)) {
                const div = document.createElement('div');
                div.className = 'app-card';
                div.innerHTML = `<b>${s}</b> <i class="fa-solid fa-magnifying-glass" style="opacity:0.3"></i>`;
                div.onclick = () => {
                    show('stop-details');
                    document.getElementById('sd-content').innerHTML = `<h1>${s}</h1><div class="group-label">Linie na tym przystanku:</div>` + 
                    db.lines.filter(l => l.stops.some(st => st.name === s)).map(l => `<div class="app-card">Linia ${l.num} do ${l.dir}</div>`).join('');
                    document.getElementById('sd-back-btn').onclick = () => show('stops');
                };
                list.appendChild(div);
            }
        });
    }

    // --- ADMIN (BEZ ZMIAN) ---
    function login() { if(document.getElementById('pass').value === '123') document.getElementById('adm-ui').style.display='block'; }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    
    function openLineForm(idx) {
        curLineIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num;
        document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-hours').value = l.hours;
        document.getElementById('fl-stops-list').innerHTML = '';
        l.stops.forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(n="", t=2, z=false) {
        const div = document.createElement('div');
        div.className = 'adm-stop-row';
        div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '10px';
        div.innerHTML = `
            <input type="text" placeholder="Nazwa" value="${n}" class="as-n" style="flex:2; margin:0;">
            <input type="number" placeholder="min" value="${t}" class="as-t" style="flex:0.5; margin:0;">
            <div style="flex:0.5; display:flex; align-items:center; justify-content:center; background:#1c252e; border-radius:10px;">
                <input type="checkbox" ${z?'checked':''} class="as-z" style="width:20px; height:20px; margin:0;">
            </div>
            <button onclick="this.parentElement.remove()" style="background:var(--danger); border:none; color:white; border-radius:10px; padding:0 15px;">X</button>
        `;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.adm-stop-row')).map(row => ({
            name: row.querySelector('.as-n').value,
            time: row.querySelector('.as-t').value,
            nz: row.querySelector('.as-z').checked
        }));
        const data = {
            num: document.getElementById('fl-num').value,
            dir: document.getElementById('fl-dir').value,
            type: document.getElementById('fl-type').value,
            hours: document.getElementById('fl-hours').value,
            stops: stops
        };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function openNewsForm() { document.getElementById('form-news').style.display = 'block'; }
    function saveNews() {
        db.news.unshift({
            title: document.getElementById('fn-title').value,
            content: document.getElementById('fn-content').value,
            date: new Date().toLocaleDateString()
        });
        save(); closeForms();
    }
    function deleteNews(i) { if(confirm('Usunąć?')) { db.news.splice(i, 1); save(); } }
    function saveContact() { db.contact = document.getElementById('edit-contact').value; save(); alert('Zapisano!'); }
    
    function exportFullBackup() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'mzk_gorzow_backup.json'; a.click();
    }

    function importFullBackup(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            db = JSON.parse(event.target.result);
            save();
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
