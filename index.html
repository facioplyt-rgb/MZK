<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK Pro Ultra</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root { 
            --radius: 20px; 
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --p-blue: #3b82f6;
            --p-purple: #8b5cf6;
        }

        .theme-light {
            --bg: #f8fafc; --surface: #ffffff; --primary: var(--p-blue); 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0;
            --nav-bg: rgba(255,255,255,0.9); --card-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .theme-dark {
            --bg: #050505; --surface: #121212; --primary: var(--p-blue); 
            --text: #ffffff; --text-dim: #94a3b8; --border: #1e293b;
            --nav-bg: rgba(18,18,18,0.9); --card-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .theme-cyber {
            --bg: #09090b; --surface: #18181b; --primary: #d946ef; 
            --text: #22d3ee; --text-dim: #a855f7; --border: #d946ef;
            --nav-bg: rgba(0,0,0,0.9); --card-shadow: 0 0 15px rgba(217,70,239,0.2);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            padding-bottom: 120px; transition: background var(--transition); overflow-x: hidden;
        }

        #app { display: none; max-width: 650px; margin: 0 auto; padding: 20px; }
        
        /* UI Elements */
        .card {
            background: var(--surface); border-radius: var(--radius); padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--border); box-shadow: var(--card-shadow);
            position: relative; transition: var(--transition);
        }

        .search-box, select, textarea {
            width: 100%; padding: 14px; border-radius: 14px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text); margin-bottom: 10px; font-family: inherit;
        }

        .badge {
            background: linear-gradient(135deg, var(--primary), var(--p-purple));
            color: white; padding: 8px 15px; border-radius: 12px; font-weight: 800;
        }

        .btn {
            padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
        .btn-danger { background: #ef4444; color: white; padding: 8px 12px; font-size: 0.8rem; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* News Categories */
        .cat-tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .cat-info { background: #3b82f633; color: #3b82f6; }
        .cat-alert { background: #ef444433; color: #ef4444; }
        .cat-promo { background: #10b98133; color: #10b981; }

        /* Nav */
        .bottom-nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 500px; background: var(--nav-bg); backdrop-filter: blur(15px);
            border-radius: 25px; display: none; justify-content: space-around; padding: 8px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000;
        }
        .nav-item { background: transparent; border: none; color: var(--text-dim); padding: 10px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }

        /* Theme Picker */
        #theme-picker {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Admin Styles */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="theme-picker">
        <h1 style="color: white; margin-bottom: 30px;">Wybierz Styl MZK</h1>
        <button class="btn btn-primary" style="max-width:300px; margin-bottom:10px;" onclick="InitApp('theme-light')">Jasny</button>
        <button class="btn btn-primary" style="max-width:300px; margin-bottom:10px; background:#1e293b;" onclick="InitApp('theme-dark')">Ciemny</button>
        <button class="btn btn-primary" style="max-width:300px; background:#d946ef;" onclick="InitApp('theme-cyber')">Cyberpunk</button>
    </div>

    <div id="app">
        <div id="header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="margin:0;">MZK Pro <span style="color:var(--primary)">Ultra</span></h1>
            <div id="db-indicator" style="font-size:0.7rem; padding:5px 10px; border-radius:10px; background: #ef444433; color: #ef4444; font-weight:800;">OFFLINE</div>
        </div>
        <div id="content"></div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="Router.go('home', this)"><i data-lucide="home"></i></button>
        <button class="nav-item" onclick="Router.go('stops', this)"><i data-lucide="map-pin"></i></button>
        <button class="nav-item" onclick="Router.go('lines', this)"><i data-lucide="bus"></i></button>
        <button class="nav-item" onclick="Router.go('travel', this)"><i data-lucide="navigation"></i></button>
        <button class="nav-item" onclick="Router.go('admin', this)"><i data-lucide="settings-2"></i></button>
    </nav>

    <script>
        // --- STAN APLIKACJI ---
        let db;
        const DB_KEY = "mzk_v12_pro";
        let AppState = {
            data: { news: {}, stops: {}, lines: {}, categories: {} },
            favs: JSON.parse(localStorage.getItem('mzk_favs')) || []
        };

        // --- INICJALIZACJA ---
        function InitApp(theme) {
            document.body.className = theme;
            document.getElementById('theme-picker').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            
            const savedConfig = JSON.parse(localStorage.getItem('firebase_config'));
            if(savedConfig) ConnectFirebase(savedConfig);
            
            Router.go('home');
            lucide.createIcons();
        }

        function ConnectFirebase(config) {
            try {
                if(firebase.apps.length) firebase.app().delete();
                firebase.initializeApp(config);
                db = firebase.database();
                document.getElementById('db-indicator').innerText = "ONLINE";
                document.getElementById('db-indicator').style.background = "#10b98133";
                document.getElementById('db-indicator').style.color = "#10b981";
                
                db.ref(DB_KEY).on('value', snap => {
                    if(snap.val()) {
                        AppState.data = snap.val();
                        Router.renderCurrent();
                    }
                });
                localStorage.setItem('firebase_config', JSON.stringify(config));
            } catch(e) { alert("Błąd połączenia: " + e.message); }
        }

        // --- ROUTER ---
        const Router = {
            current: 'home',
            go(view, btn) {
                this.current = view;
                if(btn) {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    btn.classList.add('active');
                }
                this.renderCurrent();
            },
            renderCurrent() {
                const container = document.getElementById('content');
                if(this.current === 'home') Render.home(container);
                if(this.current === 'stops') Render.stops(container);
                if(this.current === 'lines') Render.lines(container);
                if(this.current === 'travel') Render.travel(container);
                if(this.current === 'admin') Render.admin(container);
                lucide.createIcons();
            }
        };

        // --- RENDEROWANIE ---
        const Render = {
            home: function(container) {
                const news = Object.entries(AppState.data.news || {}).reverse();
                let html = `<h2>Komunikaty</h2>`;
                news.forEach(([id, item]) => {
                    html += `
                        <div class="card">
                            <span class="cat-tag cat-${item.category || 'info'}">${item.category || 'info'}</span>
                            <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:5px;">${item.date}</div>
                            <div style="font-weight:600;">${item.content}</div>
                        </div>
                    `;
                });
                container.innerHTML = html || `<p>Brak komunikatów.</p>`;
            },

            stops: function(container) {
                let html = `<h2>Przystanki</h2><input type="text" class="search-box" placeholder="Szukaj..." oninput="Filter(this, '.stop-card')">`;
                Object.entries(AppState.data.stops || {}).forEach(([id, stop]) => {
                    const isFav = AppState.favs.includes(id);
                    html += `
                        <div class="card stop-card" data-name="${stop.name.toLowerCase()}">
                            <div onclick="Render.schedule('${id}')" style="flex:1; cursor:pointer;">
                                <div style="font-weight:bold; font-size:1.1rem;">${stop.name}</div>
                                <div style="font-size:0.8rem; color:var(--text-dim)">ID: ${id} | Linie: ${stop.lines?.join(', ') || 'brak'}</div>
                            </div>
                            <i data-lucide="heart" onclick="ToggleFav('${id}')" style="cursor:pointer; fill:${isFav ? 'red' : 'none'}; color:${isFav ? 'red' : 'inherit'}"></i>
                        </div>
                    `;
                });
                container.innerHTML = html;
            },

            lines: function(container) {
                let html = `<h2>Linie</h2><input type="text" class="search-box" placeholder="Szukaj..." oninput="Filter(this, '.line-card')">`;
                Object.entries(AppState.data.lines || {}).forEach(([id, line]) => {
                    html += `
                        <div class="card line-card" data-name="${id} ${line.direction.toLowerCase()}" onclick="Render.lineDetail('${id}')" style="cursor:pointer;">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div class="badge">${id}</div>
                                <div>
                                    <div style="font-size:0.7rem; color:var(--text-dim); font-weight:bold;">KIERUNEK</div>
                                    <div style="font-weight:bold;">${line.direction}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            },

            schedule: function(stopId) {
                const stop = AppState.data.stops[stopId];
                let html = `<button class="btn btn-outline" onclick="Router.go('stops')" style="margin-bottom:15px;">← Powrót</button>
                            <h1>${stop.name}</h1>`;
                
                // Prosta logika odjazdów
                stop.lines?.forEach(lineId => {
                    const line = AppState.data.lines[lineId];
                    if(!line) return;
                    const stopIdx = line.stops?.findIndex(s => s.id === stopId);
                    const offset = line.stops[stopIdx]?.offset || 0;

                    html += `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="badge">${lineId}</span>
                            <span style="font-weight:bold;">→ ${line.direction}</span>
                        </div>
                        <div style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;">
                            ${line.baseTimes?.map(t => {
                                let [h, m] = t.split(':').map(Number);
                                m += offset;
                                while(m >= 60) { m -= 60; h += 1; }
                                return `<span style="background:var(--bg); padding:5px; border-radius:5px; font-size:0.8rem;">${h}:${m < 10 ? '0'+m : m}</span>`;
                            }).join('')}
                        </div>
                    </div>`;
                });
                document.getElementById('content').innerHTML = html;
                lucide.createIcons();
            },

            admin: function(container) {
                container.innerHTML = `
                    <h2>Panel Administratora</h2>
                    <div class="card">
                        <h3>🔑 Konfiguracja Firebase</h3>
                        <textarea id="fb-json" placeholder="Wklej JSON firebaseConfig tutaj..."></textarea>
                        <button class="btn btn-primary" onclick="SaveConfig()">Połącz z Bazą</button>
                    </div>

                    <div class="admin-grid">
                        <button class="btn btn-outline" onclick="AdminRender('news')">Newsy</button>
                        <button class="btn btn-outline" onclick="AdminRender('stops')">Przystanki</button>
                        <button class="btn btn-outline" onclick="AdminRender('lines')">Linie</button>
                        <button class="btn btn-outline" onclick="ExportDB()">Eksport JSON</button>
                    </div>
                    <div id="admin-work-area"></div>
                `;
            }
        };

        // --- FUNKCJE ADMINA (CRUD) ---
        function AdminRender(type) {
            const area = document.getElementById('admin-work-area');
            let html = `<div class="card"><h3>Zarządzaj: ${type}</h3>`;
            
            if(type === 'news') {
                html += `
                    <select id="adm-news-cat"><option value="info">Info</option><option value="alert">Alert</option><option value="promo">Promo</option></select>
                    <textarea id="adm-news-txt" placeholder="Treść newsa..."></textarea>
                    <button class="btn btn-primary" onclick="AddNews()">Dodaj</button>
                    <hr>
                    ${Object.entries(AppState.data.news || {}).map(([id, n]) => `
                        <div class="admin-list-item">
                            <span>${n.content.substring(0,20)}...</span>
                            <button class="btn btn-danger" onclick="DeleteDB('news/${id}')">Usuń</button>
                        </div>
                    `).join('')}
                `;
            }

            if(type === 'stops') {
                html += `
                    <input id="adm-stop-id" placeholder="ID (np. s1)">
                    <input id="adm-stop-name" placeholder="Nazwa przystanku">
                    <button class="btn btn-primary" onclick="AddStop()">Zapisz/Dodaj</button>
                    <hr>
                    ${Object.entries(AppState.data.stops || {}).map(([id, s]) => `
                        <div class="admin-list-item">
                            <span><b>${id}</b>: ${s.name}</span>
                            <button class="btn btn-danger" onclick="DeleteDB('stops/${id}')">Usuń</button>
                        </div>
                    `).join('')}
                `;
            }

            if(type === 'lines') {
                html += `
                    <input id="adm-line-id" placeholder="Numer linii (np. 102)">
                    <input id="adm-line-dir" placeholder="Kierunek">
                    <textarea id="adm-line-times" placeholder="Czasy bazowe (HH:MM, HH:MM...)"></textarea>
                    <button class="btn btn-primary" onclick="AddLine()">Dodaj Linię</button>
                    <hr>
                    ${Object.entries(AppState.data.lines || {}).map(([id, l]) => `
                        <div class="admin-list-item">
                            <span><b>${id}</b> -> ${l.direction}</span>
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-outline" onclick="EditLineStops('${id}')">Trasa</button>
                                <button class="btn btn-danger" onclick="DeleteDB('lines/${id}')">Usuń</button>
                            </div>
                        </div>
                    `).join('')}
                `;
            }

            area.innerHTML = html + `</div>`;
        }

        // --- AKCJE DB ---
        function SaveConfig() {
            const raw = document.getElementById('fb-json').value;
            try {
                const config = JSON.parse(raw);
                ConnectFirebase(config);
                alert("Konfiguracja zapisana!");
            } catch(e) { alert("Błędny format JSON!"); }
        }

        function AddNews() {
            const cat = document.getElementById('adm-news-cat').value;
            const txt = document.getElementById('adm-news-txt').value;
            if(!db) return alert("Brak połączenia!");
            db.ref(`${DB_KEY}/news/${Date.now()}`).set({
                category: cat,
                content: txt,
                date: new Date().toLocaleString()
            });
        }

        function AddStop() {
            const id = document.getElementById('adm-stop-id').value;
            const name = document.getElementById('adm-stop-name').value;
            if(!db || !id) return alert("Błąd!");
            db.ref(`${DB_KEY}/stops/${id}`).update({ name: name, lines: AppState.data.stops[id]?.lines || [] });
        }

        function AddLine() {
            const id = document.getElementById('adm-line-id').value;
            const dir = document.getElementById('adm-line-dir').value;
            const times = document.getElementById('adm-line-times').value.split(',').map(t => t.trim());
            if(!db || !id) return alert("Błąd!");
            db.ref(`${DB_KEY}/lines/${id}`).update({
                direction: dir,
                baseTimes: times,
                stops: AppState.data.lines[id]?.stops || []
            });
        }

        function EditLineStops(lineId) {
            const line = AppState.data.lines[lineId];
            let html = `<div class="card"><h3>Trasa linii ${lineId}</h3>`;
            html += `<p>Format: stop_id:offset (np. s1:0, s2:12)</p>
                     <textarea id="route-edit" style="height:100px;">${line.stops?.map(s => `${s.id}:${s.offset}`).join(', ') || ''}</textarea>
                     <button class="btn btn-primary" onclick="SaveRoute('${lineId}')">Zapisz Trasę</button></div>`;
            document.getElementById('admin-work-area').innerHTML = html;
        }

        function SaveRoute(lineId) {
            const raw = document.getElementById('route-edit').value;
            const stopsArray = raw.split(',').map(item => {
                const [id, offset] = item.trim().split(':');
                return { id, offset: parseInt(offset) };
            });
            
            // Aktualizacja przystanków (dodanie linii do przystanku)
            stopsArray.forEach(s => {
                const currentLines = AppState.data.stops[s.id]?.lines || [];
                if(!currentLines.includes(lineId)) {
                    currentLines.push(lineId);
                    db.ref(`${DB_KEY}/stops/${s.id}/lines`).set(currentLines);
                }
            });

            db.ref(`${DB_KEY}/lines/${lineId}/stops`).set(stopsArray).then(() => alert("Trasa zapisana!"));
        }

        function DeleteDB(path) {
            if(confirm("Usunąć permanentnie?") && db) {
                db.ref(`${DB_KEY}/${path}`).remove();
            }
        }

        function ExportDB() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(AppState.data));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "mzk_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // --- UTILS ---
        function ToggleFav(id) {
            const idx = AppState.favs.indexOf(id);
            if(idx > -1) AppState.favs.splice(idx, 1);
            else AppState.favs.push(id);
            localStorage.setItem('mzk_favs', JSON.stringify(AppState.favs));
            Router.renderCurrent();
        }

        function Filter(input, selector) {
            const val = input.value.toLowerCase();
            document.querySelectorAll(selector).forEach(el => {
                el.style.display = el.dataset.name.includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
