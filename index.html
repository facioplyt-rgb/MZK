<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM V2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* === SYSTEM WIZUALNY === */
        :root { 
            --accent: #00ab55; 
            --bg: #05080f; 
            --surf: #121926; 
            --surf-l: #1c2536; 
            --text: #ffffff; 
            --text-m: #94a3b8;
            --bus: #00ab55; 
            --tram: #ef4444; 
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }

        /* Nagłówek */
        header { 
            background: rgba(5, 8, 15, 0.9); backdrop-filter: blur(12px);
            padding: 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border); text-align: center;
        }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* Moduły (Widoki) */
        .module { display: none; }
        .module.active { display: block; animation: slideUp 0.3s ease; }

        /* UI Kit - Karty, Przyciski, Formularze */
        .card { background: var(--surf); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn { background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 14px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 14px; background: var(--surf-l); color: #fff; border: 1px solid var(--border); font-size: 1rem; }

        /* Nawigacja Dolna */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--surf); 
            display: flex; height: 80px; border-top: 1px solid var(--border); z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-m); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 5px; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Linie - Odznaki */
        .line-badge { width: 50px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; font-family: 'Outfit'; margin-right: 15px; font-size: 1.1rem; }
        .bg-bus { background: var(--bus); box-shadow: 0 4px 15px rgba(0,171,85,0.3); }
        .bg-tram { background: var(--tram); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header><h1>MZK GORZÓW</h1></header>

    <div class="container">
        <div id="view-lines" class="module active"></div>
        <div id="view-news" class="module"></div>
        <div id="view-admin" class="module"></div>
        <div id="view-details" class="module"></div>
    </div>

    <nav>
        <div class="nav-item active" id="nav-lines" onclick="App.switch('lines')">
            <i class="fa-solid fa-bus"></i><span>Linie</span>
        </div>
        <div class="nav-item" id="nav-news" onclick="App.switch('news')">
            <i class="fa-solid fa-bullhorn"></i><span>News</span>
        </div>
        <div class="nav-item" id="nav-admin" onclick="App.switch('admin')">
            <i class="fa-solid fa-user-shield"></i><span>Admin</span>
        </div>
    </nav>

    <script>
      
                             // === 1. GŁÓWNY SILNIK (App Core) ===
        window.App = {
            dbKey: localStorage.getItem('mzk_key') || 'mzk_v2026_pro',
            
            init() {
                const config = {
                    apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
                    authDomain: "mzk-by-facio.firebaseapp.com",
                    databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
                    projectId: "mzk-by-facio"
                };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();
                console.log("System PRO gotowy. Baza:", this.dbKey);

                // Automatyczne nasłuchiwanie na zmiany w bazie dla całego systemu
                this.db.ref(this.dbKey).on('value', snap => {
                    const data = snap.val() || {};
                    window.dbCache = {
                        lines: data.lines || [],
                        news: data.news || {}
                    };
                    // Odśwież widoki jeśli są aktywne
                    if(document.getElementById('view-lines').classList.contains('active')) ModLines.render();
                    if(document.getElementById('view-stops').classList.contains('active')) ModStops.render();
                    if(document.getElementById('view-news').classList.contains('active')) ModNews.render();
                    if(document.getElementById('view-admin').classList.contains('active') && ModAdmin.isLogged) ModAdmin.renderPanel();
                });
            },

            switch(id) {
                document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                
                const targetView = document.getElementById('view-' + id);
                if(targetView) targetView.classList.add('active');
                
                const targetNav = document.getElementById('nav-' + id);
                if(targetNav) targetNav.classList.add('active');

                // Wywołanie renderowania
                if(id === 'lines') ModLines.render();
                if(id === 'stops') ModStops.render();
                if(id === 'news') ModNews.render();
                if(id === 'admin') ModAdmin.render();
                
                window.scrollTo(0,0);
            }
        };

        // === 2. MODUŁ LINII ===
        window.ModLines = {
            searchQuery: '',

            render() {
                const container = document.getElementById('view-lines');
                if(!container) return;
                let lines = window.dbCache?.lines || [];

                if(this.searchQuery) {
                    const q = this.searchQuery.toLowerCase();
                    lines = lines.filter(l => l.num.toLowerCase().includes(q) || l.dir.toLowerCase().includes(q));
                }

                let html = `
                    <div style="position:sticky; top:65px; z-index:100; padding:10px 0; background:var(--bg)">
                        <input type="text" placeholder="Szukaj linii lub kierunku..." onkeyup="ModLines.search(this.value)" style="margin:0; box-shadow:0 5px 15px rgba(0,0,0,0.5)">
                    </div>
                `;

                if(lines.length === 0) {
                    html += `<div class="card" style="text-align:center; opacity:0.5; margin-top:20px">Brak wyników.</div>`;
                    container.innerHTML = html;
                    return;
                }

                const categories = [...new Set(lines.map(l => l.cat || 'Inne'))];
                categories.forEach(cat => {
                    html += `<div style="font-family:'Outfit'; font-weight:900; color:var(--accent); font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; margin:20px 5px 10px">${cat}</div>`;
                    lines.filter(l => (l.cat || 'Inne') === cat).forEach(line => {
                        const idx = window.dbCache.lines.indexOf(line); // Oryginalny index do klikania
                        const isTram = line.type === 'tram' || line.cat === 'Tramwaje';
                        html += `
                            <div class="card" style="display:flex; align-items:center; cursor:pointer" onclick="ModLines.showDetails(${idx})">
                                <div class="line-badge ${isTram ? 'bg-tram' : 'bg-bus'}">${line.num}</div>
                                <div style="flex:1">
                                    <div style="font-weight:700; font-size:1.05rem">${line.dir}</div>
                                    <div style="font-size:0.75rem; color:var(--text-m)">Trasa: ${line.stops ? line.stops.length : 0} przystanków</div>
                                </div>
                                <i class="fa-solid fa-angle-right" style="opacity:0.2"></i>
                            </div>`;
                    });
                });
                container.innerHTML = html;
            },

            search(val) { this.searchQuery = val; this.render(); },

            showDetails(idx) {
                const l = window.dbCache.lines[idx];
                const container = document.getElementById('view-details');
                const isTram = l.type === 'tram' || l.cat === 'Tramwaje';

                let stopsHtml = (l.stops && l.stops.length > 0) 
                    ? l.stops.map(s => `
                        <div style="display:flex; padding:12px 0; border-bottom:1px solid var(--border); align-items:center">
                            <div style="width:50px; font-weight:900; color:var(--accent); font-family:'Outfit'">${s.time}'</div>
                            <div style="font-weight:600">${s.name}</div>
                        </div>`).join('')
                    : '<p style="padding:20px; opacity:0.5">Brak przystanków.</p>';

                container.innerHTML = `
                    <div class="card" style="border-left:5px solid var(--accent); display:flex; align-items:center">
                        <div class="line-badge ${isTram ? 'bg-tram' : 'bg-bus'}" style="width:60px; height:50px; font-size:1.4rem; margin-right:15px">${l.num}</div>
                        <div>
                            <div style="font-size:0.65rem; color:var(--accent); font-weight:900; text-transform:uppercase">Kierunek</div>
                            <div style="font-size:1.3rem; font-weight:900; font-family:'Outfit'">${l.dir}</div>
                        </div>
                    </div>
                    <div class="card"><div style="font-size:0.65rem; text-transform:uppercase; opacity:0.5; font-weight:900; margin-bottom:10px">Czas i przystanek</div>${stopsHtml}</div>
                    <button class="btn" style="background:var(--surf-l); margin-bottom:20px" onclick="App.switch('lines')">POWRÓT</button>
                `;
                App.switch('details');
            }
        };

        // === 3. MODUŁ PRZYSTANKÓW ===
        window.ModStops = {
            searchQuery: '',
            
            render() {
                const container = document.getElementById('view-stops');
                if(!container) return;
                const lines = window.dbCache?.lines || [];
                
                // Zbieranie wszystkich unikalnych przystanków z bazy
                let allStops = new Set();
                lines.forEach(l => {
                    if(l.stops) l.stops.forEach(s => allStops.add(s.name));
                });
                let stopsArr = Array.from(allStops).sort();

                if(this.searchQuery) {
                    const q = this.searchQuery.toLowerCase();
                    stopsArr = stopsArr.filter(s => s.toLowerCase().includes(q));
                }

                let html = `
                    <div style="position:sticky; top:65px; z-index:100; padding:10px 0; background:var(--bg)">
                        <input type="text" placeholder="Szukaj przystanku..." onkeyup="ModStops.search(this.value)" style="margin:0">
                    </div>
                `;

                if(stopsArr.length === 0) {
                    container.innerHTML = html + `<div class="card" style="text-align:center; opacity:0.5; margin-top:20px">Brak przystanków.</div>`;
                    return;
                }

                stopsArr.forEach(stopName => {
                    html += `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer" onclick="ModStops.showBoard('${stopName}')">
                            <div style="font-weight:600; font-size:1.1rem"><i class="fa-solid fa-map-pin" style="color:var(--accent); margin-right:10px"></i> ${stopName}</div>
                            <i class="fa-solid fa-angle-right" style="opacity:0.2"></i>
                        </div>`;
                });
                container.innerHTML = html;
            },

            search(val) { this.searchQuery = val; this.render(); },

            showBoard(stopName) {
                const container = document.getElementById('view-details');
                const lines = window.dbCache?.lines || [];
                
                let departures = [];
                lines.forEach(l => {
                    if(l.stops) {
                        const stop = l.stops.find(s => s.name === stopName);
                        if(stop) departures.push({ num: l.num, dir: l.dir, type: l.type, cat: l.cat, time: stop.time });
                    }
                });

                let depsHtml = departures.map(d => {
                    const isTram = d.type === 'tram' || d.cat === 'Tramwaje';
                    return `
                    <div style="display:flex; padding:15px 0; border-bottom:1px solid var(--border); align-items:center">
                        <div class="line-badge ${isTram ? 'bg-tram' : 'bg-bus'}" style="width:45px; height:30px; font-size:0.9rem; margin-right:15px">${d.num}</div>
                        <div style="flex:1; font-weight:600">${d.dir}</div>
                        <div style="font-weight:900; color:var(--accent)">+${d.time} min</div>
                    </div>`;
                }).join('');

                container.innerHTML = `
                    <div class="card" style="border-left:5px solid var(--accent)">
                        <div style="font-size:0.65rem; color:var(--accent); font-weight:900; text-transform:uppercase">Tablica odjazdów</div>
                        <div style="font-size:1.4rem; font-weight:900; font-family:'Outfit'">${stopName}</div>
                    </div>
                    <div class="card">${depsHtml || '<p>Brak odjazdów</p>'}</div>
                    <button class="btn" style="background:var(--surf-l); margin-bottom:20px" onclick="App.switch('stops')">POWRÓT</button>
                `;
                App.switch('details');
            }
        };

        // === 4. MODUŁ NEWSÓW ===
        window.ModNews = {
            render() {
                const container = document.getElementById('view-news');
                if(!container) return;
                const news = window.dbCache?.news || {};
                const keys = Object.keys(news).reverse(); // Najnowsze na górze

                if(keys.length === 0) {
                    container.innerHTML = `<div class="card" style="text-align:center; opacity:0.5; margin-top:20px"><i class="fa-solid fa-check-circle" style="font-size:2rem; margin-bottom:10px; color:var(--accent)"></i><br>Brak utrudnień.</div>`;
                    return;
                }

                container.innerHTML = keys.map(k => {
                    const n = news[k];
                    return `
                    <div class="card" style="border-top:3px solid var(--tram)">
                        <div style="font-size:0.7rem; color:var(--text-m); margin-bottom:5px"><i class="fa-regular fa-clock"></i> ${n.date}</div>
                        <h3 style="font-family:'Outfit'; margin-bottom:10px; font-size:1.1rem">${n.title}</h3>
                        <p style="font-size:0.9rem; line-height:1.5; color:var(--text-m)">${n.content}</p>
                    </div>`;
                }).join('');
            }
        };

        // === 5. SUPER ADMIN ===
        window.ModAdmin = {
            isLogged: false,
            editIndex: null,

            render() {
                const container = document.getElementById('view-admin');
                if(!container) return;
                if(!this.isLogged) {
                    container.innerHTML = `
                        <div class="card" style="text-align:center; padding:40px 20px">
                            <i class="fa-solid fa-fingerprint" style="font-size:3rem; color:var(--accent); margin-bottom:20px"></i>
                            <h2 style="margin-bottom:20px; font-family:'Outfit'">Autoryzacja</h2>
                            <input type="password" id="adm-pass" placeholder="Hasło (123)">
                            <button class="btn" onclick="ModAdmin.login()">WEJDŹ</button>
                        </div>`;
                    return;
                }
                this.renderPanel();
            },

            login() {
                if(document.getElementById('adm-pass').value === '123') { this.isLogged = true; this.renderPanel(); } 
                else alert("Błędne hasło!");
            },

            renderPanel() {
                const container = document.getElementById('view-admin');
                container.innerHTML = `
                    <div class="card" style="border:1px solid var(--accent)">
                        <label style="font-size:0.7rem; color:var(--accent); font-weight:900">RECOVERY - KLUCZ BAZY</label>
                        <div style="display:flex; gap:10px; margin-top:5px">
                            <input type="text" id="cfg-key" value="${App.dbKey}" style="margin:0">
                            <button class="btn" style="width:auto; padding:0 15px" onclick="ModAdmin.changeKey()">OK</button>
                        </div>
                    </div>

                    <div class="card">
                        <h3 id="f-title" style="margin-bottom:15px; font-family:'Outfit'">DODAJ / EDYTUJ LINIĘ</h3>
                        <div style="display:flex; gap:10px">
                            <input type="text" id="f-num" placeholder="Nr" style="flex:1">
                            <select id="f-cat" style="flex:2">
                                <option value="Dzienne">Autobus</option>
                                <option value="Tramwaje">Tramwaj</option>
                                <option value="Nocne">Nocny</option>
                            </select>
                        </div>
                        <input type="text" id="f-dir" placeholder="Kierunek">
                        <textarea id="f-stops" rows="3" placeholder="Przystanek|Minuta, ..."></textarea>
                        <button class="btn" onclick="ModAdmin.saveLine()">ZAPISZ LINIĘ</button>
                        <button class="btn" id="btn-cancel" style="display:none; background:#444; margin-top:10px" onclick="ModAdmin.cancelEdit()">ANULUJ</button>
                    </div>

                    <div class="card" style="background:var(--surf-l)">
                        <h3 style="margin-bottom:15px; font-family:'Outfit'">DODAJ KOMUNIKAT</h3>
                        <input type="text" id="n-title" placeholder="Tytuł ostrzeżenia">
                        <textarea id="n-content" rows="2" placeholder="Treść..."></textarea>
                        <button class="btn" style="background:var(--tram)" onclick="ModAdmin.saveNews()">PUBLIKUJ NEWS</button>
                    </div>

                    <div id="adm-list-lines"></div>
                    <div id="adm-list-news"></div>
                `;
                this.renderLists();
            },

            changeKey() {
                const k = document.getElementById('cfg-key').value;
                if(confirm("Zmienić bazę na: " + k + "?")) { localStorage.setItem('mzk_key', k); location.reload(); }
            },

            saveLine() {
                const num = document.getElementById('f-num').value, dir = document.getElementById('f-dir').value, cat = document.getElementById('f-cat').value;
                if(!num || !dir) return alert("Brak danych!");
                const stops = document.getElementById('f-stops').value.split(',').filter(s=>s.includes('|')).map(s=>{ const p=s.split('|'); return {name:p[0].trim(), time:p[1].trim()}; });
                
                let lines = window.dbCache?.lines || [];
                const data = { num, dir, cat, stops, type: cat==='Tramwaje'?'tram':'bus' };
                
                if(this.editIndex !== null) lines[this.editIndex] = data; else lines.push(data);
                
                App.db.ref(App.dbKey + '/lines').set(lines).then(() => { alert("Zapisano!"); this.cancelEdit(); });
            },

            editLine(i) {
                this.editIndex = i;
                const l = window.dbCache.lines[i];
                document.getElementById('f-num').value = l.num; document.getElementById('f-dir').value = l.dir; document.getElementById('f-cat').value = l.cat || 'Dzienne';
                document.getElementById('f-stops').value = l.stops ? l.stops.map(s => `${s.name}|${s.time}`).join(', ') : '';
                document.getElementById('f-title').innerText = "EDYTUJ LINIĘ " + l.num;
                document.getElementById('btn-cancel').style.display = "block";
                window.scrollTo(0,0);
            },

            cancelEdit() { this.editIndex = null; this.renderPanel(); },
            
            deleteLine(i) {
                if(confirm("Na pewno usunąć?")) {
                    let lines = window.dbCache.lines; lines.splice(i, 1);
                    App.db.ref(App.dbKey + '/lines').set(lines);
                }
            },

            saveNews() {
                const title = document.getElementById('n-title').value, content = document.getElementById('n-content').value;
                if(!title) return;
                App.db.ref(App.dbKey + '/news').push({ title, content, date: new Date().toLocaleString('pl-PL') }).then(()=>alert("Opublikowano!"));
            },

            deleteNews(key) {
                if(confirm("Usunąć news?")) App.db.ref(App.dbKey + '/news/' + key).remove();
            },

            renderLists() {
                const listLines = document.getElementById('adm-list-lines'), listNews = document.getElementById('adm-list-news');
                const lines = window.dbCache?.lines || [];
                const news = window.dbCache?.news || {};

                listLines.innerHTML = '<h4 style="margin:20px 5px 10px; opacity:0.5; font-size:0.7rem">BAZA LINII</h4>' + lines.map((l, i) => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px 15px">
                        <div><b style="color:var(--accent)">${l.num}</b> ${l.dir}</div>
                        <div><i class="fa-solid fa-pen" style="margin-right:15px; color:var(--text-m)" onclick="ModAdmin.editLine(${i})"></i><i class="fa-solid fa-trash" style="color:var(--tram)" onclick="ModAdmin.deleteLine(${i})"></i></div>
                    </div>`).join('');

                listNews.innerHTML = '<h4 style="margin:20px 5px 10px; opacity:0.5; font-size:0.7rem">KOMUNIKATY</h4>' + Object.keys(news).map(k => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px 15px; border-left:3px solid var(--tram)">
                        <div style="font-size:0.9rem">${news[k].title}</div>
                        <i class="fa-solid fa-trash" style="color:var(--tram)" onclick="ModAdmin.deleteNews('${k}')"></i>
                    </div>`).join('');
            }
        };

        // === START APLIKACJI ===
        App.init();
        App.switch('lines'); // Od razu pokaż linie na start

    </script>
</body>
</html>
