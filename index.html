<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZK GORZÓW - SYSTEM ZARZĄDZANIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk-green: #008744; --mzk-yellow: #feca05; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #222; }
        
        header { background: var(--mzk-green); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--mzk-yellow); }
        .search-area { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
        #main-search { width: 80%; max-width: 400px; padding: 10px; border: 2px solid var(--mzk-green); border-radius: 20px; outline: none; }

        nav { display: flex; justify-content: center; gap: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #ddd; }
        nav button { background: #eee; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        nav button.active { background: var(--mzk-green); color: white; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }

        /* GRID LINII */
        .cat-title { font-weight: 900; text-transform: uppercase; font-size: 0.85rem; color: #666; margin: 25px 0 10px; letter-spacing: 1px; }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; }
        .line-box { 
            background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px 0; 
            text-align: center; font-weight: 900; font-size: 1.2rem; color: #ccc; cursor: default; 
            transition: 0.2s;
        }
        .line-active { border: 2px solid var(--mzk-green); color: #222; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .line-active:hover { transform: translateY(-3px); border-color: var(--mzk-yellow); }

        /* ADMIN PANEL */
        .admin-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--mzk-green); color: white; }
        .btn-red { background: #e74c3c; color: white; }

        .stop-row { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--mzk-green); }
        .stop-grid { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 10px; }

        /* ROZKŁAD */
        .full-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; display: none; }
        .fv-header { background: var(--mzk-green); color: white; padding: 15px; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; }
        .stop-block { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 10px solid var(--mzk-green); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .transfer-tag { display: inline-block; background: #333; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; margin-right: 5px; cursor: pointer; font-weight: bold; }
        .tt-row { display: flex; border-bottom: 1px solid #eee; padding: 8px 0; align-items: baseline; }
        .tt-h { font-size: 1.5rem; font-weight: 900; color: var(--mzk-green); width: 50px; }
        .tt-m { display: flex; flex-wrap: wrap; gap: 10px; font-size: 1.2rem; }
        .marker { font-size: 0.7rem; vertical-align: super; color: red; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>MZK GORZÓW - SYSTEM</h1></header>

<div class="search-area">
    <input type="text" id="main-search" placeholder="Szukaj numeru linii..." oninput="renderGrid()">
</div>

<nav>
    <button id="nav-lines" class="active" onclick="showSection('lines-sec')">ROZKŁADY</button>
    <button id="nav-admin" onclick="showSection('admin-sec')">ADMIN PANEL</button>
</nav>

<div class="container">
    <div id="lines-sec" class="section active">
        <div id="grid-root"></div>
    </div>

    <div id="admin-sec" class="section">
        <div class="admin-card">
            <h3>Zarządzanie Liniami</h3>
            <div class="admin-input-group">
                <input type="number" id="admin-line-num" placeholder="Wpisz nr linii i naciśnij Enter..." onkeypress="if(event.key==='Enter') loadAdminLine()">
                <button class="btn btn-green" onclick="loadAdminLine()">ZAŁADUJ</button>
            </div>

            <div id="editor-ui" style="display:none; border-top: 2px solid #eee; pt: 20px;">
                <div style="display:flex; justify-content: space-between; margin: 15px 0;">
                    <select id="sel-variant" style="width: 70%;" onchange="loadVariant(this.value)">
                        <option value="new">-- NOWY WARIANT --</option>
                    </select>
                    <button class="btn btn-red" onclick="deleteVariant()">USUŃ WARIANT</button>
                </div>

                <input type="text" id="inp-target" placeholder="Kierunek (np. PIASKI)">
                <input type="text" id="inp-variant-name" placeholder="Nazwa wariantu (np. przez Most)">
                <textarea id="inp-starts" placeholder="Odjazdy z pętli (np. 06:15, 06:40s, 07:10w)"></textarea>

                <h4>Trasa (Przystanki, Minuty, Przesiadki)</h4>
                <div id="stops-editor-list"></div>
                <button class="btn" onclick="addStopRow()" style="width:100%; background:#444; color:white; margin-top:10px;">+ DODAJ PRZYSTANEK</button>

                <button class="btn btn-green" style="width:100%; height:60px; margin-top:20px; font-size:1.2rem;" onclick="saveLine()">ZAPISZ CAŁĄ LINIĘ</button>
                <button class="btn btn-red" style="width:100%; margin-top:10px;" onclick="deleteEntireLine()">USUŃ CAŁĄ LINIĘ Z SYSTEMU</button>
            </div>
        </div>
    </div>
</div>

<div id="full-view" class="full-view">
    <div class="fv-header">
        <h2 id="fv-title" style="margin:0"></h2>
        <button class="btn btn-red" onclick="closeFullView()">ZAMKNIJ X</button>
    </div>
    <div class="container" id="fv-content"></div>
</div>

<script>
    const STORAGE_KEY = 'MZK_DATABASE_FINAL';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { lines: {}, globalStops: {} };

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
    }

    // --- ADMIN LOGIC ---
    function loadAdminLine() {
        const num = document.getElementById('admin-line-num').value;
        if(!num) return;
        document.getElementById('editor-ui').style.display = 'block';
        refreshVariantSelector(num);
        clearEditorFields();
    }

    function refreshVariantSelector(num) {
        const sel = document.getElementById('sel-variant');
        sel.innerHTML = '<option value="new">-- NOWY WARIANT --</option>';
        if(db.lines[num]) {
            db.lines[num].forEach((v, i) => {
                sel.innerHTML += `<option value="${i}">${v.target} (${v.variant})</option>`;
            });
        }
    }

    function addStopRow(data = {name: '', adj: 0}) {
        const cont = document.getElementById('stops-editor-list');
        const id = Math.random().toString(36).substr(2, 9);
        const global = db.globalStops[data.name] || { sub: '', trans: '' };
        
        const html = `
            <div class="stop-row" id="${id}">
                <div class="stop-grid">
                    <input type="text" class="s-name" placeholder="Nazwa" value="${data.name}" oninput="syncGlobal(this)">
                    <input type="text" class="s-sub" placeholder="Miejsce/Opis" value="${global.sub}" oninput="updateGlobal(this)">
                    <input type="text" class="s-trans" placeholder="Przesiadki" value="${global.trans}" oninput="updateGlobal(this)">
                    <input type="number" class="s-adj" placeholder="+min" value="${data.adj}">
                </div>
                <button class="btn btn-red" onclick="document.getElementById('${id}').remove()" style="padding:2px 10px; margin-top:5px; font-size:0.7rem;">USUŃ PRZYSTANEK</button>
            </div>`;
        cont.insertAdjacentHTML('beforeend', html);
    }

    function syncGlobal(el) {
        const name = el.value;
        const row = el.closest('.stop-row');
        if(db.globalStops[name]) {
            row.querySelector('.s-sub').value = db.globalStops[name].sub;
            row.querySelector('.s-trans').value = db.globalStops[name].trans;
        }
    }

    function updateGlobal(el) {
        const row = el.closest('.stop-row');
        const name = row.querySelector('.s-name').value;
        if(!name) return;
        db.globalStops[name] = {
            sub: row.querySelector('.s-sub').value,
            trans: row.querySelector('.s-trans').value
        };
    }

    function loadVariant(idx) {
        if(idx === 'new') return clearEditorFields();
        const num = document.getElementById('admin-line-num').value;
        const v = db.lines[num][idx];
        document.getElementById('inp-target').value = v.target;
        document.getElementById('inp-variant-name').value = v.variant;
        document.getElementById('inp-starts').value = v.starts.join(', ');
        document.getElementById('stops-editor-list').innerHTML = '';
        v.stops.forEach(s => addStopRow(s));
    }

    function clearEditorFields() {
        document.getElementById('inp-target').value = '';
        document.getElementById('inp-variant-name').value = '';
        document.getElementById('inp-starts').value = '';
        document.getElementById('stops-editor-list').innerHTML = '';
        addStopRow();
    }

    function saveLine() {
        const num = document.getElementById('admin-line-num').value;
        const vIdx = document.getElementById('sel-variant').value;
        
        const variantData = {
            target: document.getElementById('inp-target').value.toUpperCase(),
            variant: document.getElementById('inp-variant-name').value || 'Podstawowa',
            starts: document.getElementById('inp-starts').value.split(',').map(s=>s.trim()),
            stops: Array.from(document.querySelectorAll('.s-name')).map((el, i) => ({
                name: el.value,
                adj: parseInt(document.querySelectorAll('.s-adj')[i].value) || 0
            }))
        };

        if(!db.lines[num]) db.lines[num] = [];
        if(vIdx === 'new') db.lines[num].push(variantData);
        else db.lines[num][vIdx] = variantData;

        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        alert("Zapisano pomyślnie!");
        location.reload();
    }

    function deleteEntireLine() {
        const num = document.getElementById('admin-line-num').value;
        if(confirm(`Usunąć całkowicie linię ${num}?`)) {
            delete db.lines[num];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            location.reload();
        }
    }

    function deleteVariant() {
        const num = document.getElementById('admin-line-num').value;
        const vIdx = document.getElementById('sel-variant').value;
        if(vIdx !== 'new' && confirm("Usunąć ten wariant?")) {
            db.lines[num].splice(vIdx, 1);
            if(db.lines[num].length === 0) delete db.lines[num];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            location.reload();
        }
    }

    // --- VIEW LOGIC ---
    function renderGrid() {
        const root = document.getElementById('grid-root');
        const q = document.getElementById('main-search').value;
        root.innerHTML = '';

        const categories = [
            { t: "Tramwaje", min: 1, max: 15 },
            { t: "Magistrala", min: 100, max: 119 },
            { t: "Autobusy", min: 120, max: 199 }
        ];

        categories.forEach(cat => {
            let html = `<div class="cat-title">${cat.t}</div><div class="line-grid">`;
            let found = false;
            for(let i=cat.min; i<=cat.max; i++) {
                if(q && !i.toString().includes(q)) continue;
                const activeCls = db.lines[i] ? 'line-active' : '';
                html += `<div class="line-box ${activeCls}" onclick="openLine(${i})">${i}</div>`;
                found = true;
            }
            if(found) root.innerHTML += html + '</div>';
        });
    }

    function openLine(n) {
        if(!db.lines[n]) return;
        document.getElementById('full-view').style.display = 'block';
        document.getElementById('fv-title').innerText = `LINIA ${n}`;
        const cont = document.getElementById('fv-content');
        cont.innerHTML = '';

        db.lines[n].forEach(v => {
            const vDiv = document.createElement('div');
            vDiv.innerHTML = `<h3 style="background:#eee; padding:10px; border-radius:5px;">Kierunek: ${v.target} (${v.variant})</h3>`;
            
            let currentTotalMin = 0;
            v.stops.forEach((s, sIdx) => {
                currentTotalMin += s.adj;
                const global = db.globalStops[s.name] || { sub: '', trans: '' };
                const block = document.createElement('div');
                block.className = 'stop-block';
                
                let transHtml = global.trans.split(',').filter(t=>t.trim()).map(t => 
                    `<span class="transfer-tag" onclick="closeFullView(); openLine(${t.trim()})">${t.trim()}</span>`
                ).join('');

                block.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <div>
                            <strong style="font-size:1.2rem">${s.name}</strong><br>
                            <small style="color:#666">${global.sub}</small>
                        </div>
                        <div>${transHtml}</div>
                    </div><div style="margin-top:10px;"></div>`;

                // Calculate times
                let stopTimes = {};
                v.starts.forEach(startTime => {
                    const timePart = startTime.match(/\d{2}:\d{2}/)[0];
                    const marker = startTime.replace(timePart, '');
                    let [h, m] = timePart.split(':').map(Number);
                    let date = new Date(2026, 0, 1, h, m + currentTotalMin);
                    let finalH = date.getHours();
                    let finalM = date.getMinutes().toString().padStart(2, '0');
                    if(!stopHours[finalH]) stopHours[finalH] = [];
                    // Small local hack to simplify:
                    if(!stopTimes[finalH]) stopTimes[finalH] = [];
                    stopTimes[finalH].push({m: finalM, marker: marker});
                });

                Object.keys(stopTimes).sort((a,b)=>a-b).forEach(h => {
                    let row = `<div class="tt-row"><div class="tt-h">${h.toString().padStart(2,'0')}</div><div class="tt-m">`;
                    stopTimes[h].forEach(item => row += `<span>${item.m}<span class="marker">${item.marker}</span></span>`);
                    block.innerHTML += row + `</div></div>`;
                });
                vDiv.appendChild(block);
            });
            cont.appendChild(vDiv);
        });
    }

    function closeFullView() { document.getElementById('full-view').style.display = 'none'; }

    window.onload = renderGrid;
</script>

</body>
</html>
