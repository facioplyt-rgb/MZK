const MZK_App = {
    // --- 1. SYSTEM CZASU (Logika obliczeń) ---
    Time: {
        nowInMinutes: () => {
            const d = new Date();
            return d.getHours() * 60 + d.getMinutes();
        },

        parseToMin: (timeStr) => {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        },

        formatMinToTime: (totalMin) => {
            let h = Math.floor(totalMin / 60) % 24;
            let m = totalMin % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        },

        // Kluczowa funkcja: przetwarza surowe godziny na listę "LIVE"
        getLiveSchedule: (baseTimes, offset = 0) => {
            const current = MZK_App.Time.nowInMinutes();
            
            return baseTimes
                .map(t => {
                    const departureMin = MZK_App.Time.parseToMin(t) + offset;
                    return {
                        time: MZK_App.Time.formatMinToTime(departureMin),
                        wait: departureMin - current,
                        isNow: (departureMin - current) <= 1 && (departureMin - current) >= 0
                    };
                })
                .filter(bus => bus.wait >= 0) // Usuwamy te, co już odjechały
                .sort((a, b) => a.wait - b.wait); // Najbliższe na górze
        }
    },

    // --- 2. SILNIK DANYCH (Łączność z Firebase mzk_v12_pro) ---
    Data: {
        raw: { lines: {}, stops: {}, news: {} },

        // Inicjalizacja nasłuchiwania bazy (Realtime)
        init: function(callbackUI) {
            console.log("🛰️ Nawiązywanie połączenia z mzk_v12_pro...");
            
            db.ref(DB_KEY).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    this.raw.lines = data.lines || {};
                    this.raw.stops = data.stops || {};
                    this.raw.news = data.news || {};
                    console.log("✅ Dane zsynchronizowane.");
                    if (callbackUI) callbackUI(); 
                } else {
                    console.error("⚠️ Brak danych w węźle: " + DB_KEY);
                }
            });
        },

        // Pobiera konkretną linię i przelicza ją dla wybranego przystanku
        getLineForStop: function(lineId, stopId) {
            const line = this.raw.lines[lineId];
            if (!line) return null;

            // Szukamy offsetu (czasu dojazdu) dla tego przystanku w tej linii
            const stopInfo = line.stops.find(s => s.id === stopId);
            const offset = stopInfo ? stopInfo.offset : 0;

            return {
                name: line.name,
                direction: line.direction,
                departures: MZK_App.Time.getLiveSchedule(line.baseTimes, offset)
            };
        }
    }
};

const UI = {
    currentView: 'stops', // 'stops' lub 'board'
    activeStopId: null,

    // Funkcja czyszcząca i budująca kontener
    render: function() {
        const app = document.getElementById('app');
        app.innerHTML = '<div class="container" id="main-container"></div>';
        const container = document.getElementById('main-container');

        if (this.currentView === 'stops') {
            this.viewStops(container);
        } else {
            this.viewBoard(container, this.activeStopId);
        }
    },

    // WIDOK: Lista Przystanków
    viewStops: function(container) {
        container.innerHTML = '<h2>🚏 Przystanki</h2>';
        const stops = MZK_App.Data.raw.stops;

        Object.keys(stops).forEach(id => {
            const stop = stops[id];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>${stop.name}</strong><br><small>Linie: ${stop.lines.join(', ')}</small>`;
            div.onclick = () => {
                this.currentView = 'board';
                this.activeStopId = id;
                this.render();
            };
            container.appendChild(div);
        });
    },

    // WIDOK: Tablica Odjazdów Live
    viewBoard: function(container, stopId) {
        const stop = MZK_App.Data.raw.stops[stopId];
        container.innerHTML = `
            <div class="header">
                <button class="btn-back" onclick="UI.goBack()">⬅ Powrót</button>
                <h3 style="margin:0">${stop.name}</h3>
            </div>
            <div id="live-board-list"></div>
        `;

        const boardList = document.getElementById('live-board-list');
        let allDepartures = [];

        // Pobierz odjazdy dla każdej linii przejeżdżającej przez ten przystanek
        stop.lines.forEach(lineId => {
            const data = MZK_App.Data.getLineForStop(lineId, stopId);
            if (data) {
                data.departures.forEach(dep => {
                    allDepartures.push({
                        line: lineId,
                        dir: data.direction,
                        time: dep.time,
                        wait: dep.wait
                    });
                });
            }
        });

        // Sortuj globalnie po czasie oczekiwania
        allDepartures.sort((a, b) => a.wait - b.wait);

        // Renderuj wiersze
        if (allDepartures.length === 0) {
            boardList.innerHTML = '<p>Brak kursów w najbliższym czasie.</p>';
        } else {
            allDepartures.forEach(d => {
                const row = document.createElement('div');
                row.className = 'departure-row';
                const timeDisplay = d.wait <= 0 ? "Teraz" : (d.wait <= 45 ? `${d.wait} min` : d.time);
                const timeClass = d.wait <= 45 ? 'time-live' : 'time-static';

                row.innerHTML = `
                    <div class="line-badge">${d.line}</div>
                    <div class="direction">${d.dir}</div>
                    <div class="${timeClass}">${timeDisplay}</div>
                `;
                boardList.appendChild(row);
            });
        }
    },

    goBack: function() {
        this.currentView = 'stops';
        this.render();
    }
};

UI.findConnection = function() {
    const startId = document.getElementById('start-stop').value;
    const endId = document.getElementById('end-stop').value;
    const resultsArea = document.getElementById('results-area');
    
    if (startId === endId) {
        resultsArea.innerHTML = '<p style="text-align:center; color:red;">Wybierz dwa różne przystanki!</p>';
        return;
    }

    resultsArea.innerHTML = '🔍 Szukanie...';
    let found = [];

    // Szukaj linii, które mają oba przystanki
    const lines = MZK_App.Data.raw.lines;
    Object.keys(lines).forEach(lineId => {
        const line = lines[lineId];
        const startIdx = line.stops.findIndex(s => s.id === startId);
        const endIdx = line.stops.findIndex(s => s.id === endId);

        // Czy linia obsługuje oba i czy jedzie w dobrą stronę?
        if (startIdx !== -1 && endIdx !== -1 && startIdx < endIdx) {
            const startOffset = line.stops[startIdx].offset;
            const endOffset = line.stops[endIdx].offset;
            const duration = endOffset - startOffset;

            // Pobierz najbliższe odjazdy z punktu startowego
            const liveDepartures = MZK_App.Time.getLiveSchedule(line.baseTimes, startOffset);

            if (liveDepartures.length > 0) {
                found.push({
                    lineId,
                    direction: line.direction,
                    duration,
                    nextBus: liveDepartures[0], // Najbliższy kurs
                    arrivalTime: MZK_App.Time.formatMinToTime(MZK_App.Time.parseToMin(liveDepartures[0].time) + duration)
                });
            }
        }
    });

    // Renderowanie wyników
    if (found.length === 0) {
        resultsArea.innerHTML = '<p style="text-align:center;">Brak bezpośrednich połączeń.</p>';
    } else {
        resultsArea.innerHTML = '<h3>Najlepsze opcje:</h3>';
        found.sort((a,b) => a.nextBus.wait - b.nextBus.wait).forEach(res => {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="result-header">
                    <div>
                        <span class="line-badge">${res.lineId}</span>
                        <strong>${res.direction}</strong>
                    </div>
                    <div class="time-live" style="font-size: 1.1rem;">za ${res.nextBus.wait} min</div>
                </div>
                <div class="journey-details">
                    <div>Odjazd: <strong>${res.nextBus.time}</strong></div>
                    <div class="duration-pill">⏱️ ${res.duration} min</div>
                    <div>Przyjazd: <strong>${res.arrivalTime}</strong></div>
                </div>
            `;
            resultsArea.appendChild(card);
        });
    }
};

    init: function() {
        const saved = localStorage.getItem(this.key);
        if (saved) this.data = JSON.parse(saved);
    },

    save: function() {
        localStorage.setItem(this.key, JSON.stringify(this.data));
    },

    toggle: function(type, id) {
        const index = this.data[type].indexOf(id);
        if (index === -1) {
            this.data[type].push(id);
        } else {
            this.data[type].splice(index, 1);
        }
        this.save();
        UI.render(); // Odśwież widok, by pokazać zmianę gwiazdki
    },

    isFav: function(type, id) {
        return this.data[type].includes(id);
    }
};
Favs.init();

// --- 3. AKTUALIZACJA UI O "GWIAZDKI" I WIDOK ULUBIONYCH ---

// Rozszerzamy nawigację (dodajemy ikonę serca)
const previousRender = UI.render;
UI.render = function() {
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="container">
            <div class="nav-bar">
                <button class="nav-btn ${this.currentView === 'favs' ? 'active' : ''}" onclick="UI.switchView('favs')">❤️</button>
                <button class="nav-btn ${this.currentView === 'stops' ? 'active' : ''}" onclick="UI.switchView('stops')">🚏 Przystanki</button>
                <button class="nav-btn ${this.currentView === 'lines' ? 'active' : ''}" onclick="UI.switchView('lines')">🚌 Linie</button>
                <button class="nav-btn ${this.currentView === 'travel' ? 'active' : ''}" onclick="UI.switchView('travel')">🧭 Podróż</button>
            </div>
            <div id="sub-container"></div>
        </div>
    `;
    const container = document.getElementById('sub-container');

    if (this.currentView === 'favs') this.viewFavs(container);
    else if (this.currentView === 'stops') this.viewStops(container);
    else if (this.currentView === 'board') this.viewBoard(container, this.activeStopId);
    else if (this.currentView === 'lines') this.viewLines(container);
    else if (this.currentView === 'lineDetail') this.viewLineDetail(container, this.activeLineId);
    else if (this.currentView === 'travel') this.viewTravel(container);
};

// Dodajemy przycisk gwiazdki do widoku przystanków
const oldViewStops = UI.viewStops;
UI.viewStops = function(container) {
    container.innerHTML = '<h2>🚏 Przystanki</h2>';
    const stops = MZK_App.Data.raw.stops;
    Object.keys(stops).forEach(id => {
        const stop = stops[id];
        const isFav = Favs.isFav('stops', id);
        const div = document.createElement('div');
        div.className = 'card';
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.alignItems = 'center';
        div.innerHTML = `
            <div onclick="UI.openStop('${id}')" style="flex-grow:1">
                <strong>${stop.name}</strong><br><small>Linie: ${stop.lines.join(', ')}</small>
            </div>
            <button class="fav-btn ${isFav ? 'fav-active' : 'fav-inactive'}" 
                    onclick="Favs.toggle('stops', '${id}')">★</button>
        `;
        container.appendChild(div);
    });
};

UI.openStop = function(id) {
    this.currentView = 'board';
    this.activeStopId = id;
    this.render();
};

// WIDOK: Ulubione (Agregacja danych)
UI.viewFavs = function(container) {
    container.innerHTML = '<h2>❤️ Twoje Ulubione</h2>';
    
    if (Favs.data.stops.length === 0 && Favs.data.lines.length === 0) {
        container.innerHTML += `
            <div class="empty-state">
                <span>⭐</span>
                <p>Nie masz jeszcze ulubionych.<br>Kliknij gwiazdkę przy przystanku lub linii!</p>
            </div>`;
        return;
    }

    // Sekcja Przystanków
    if (Favs.data.stops.length > 0) {
        container.innerHTML += '<div class="fav-section-title">Moje Przystanki</div>';
        Favs.data.stops.forEach(id => {
            const stop = MZK_App.Data.raw.stops[id];
            if (!stop) return;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>${stop.name}</strong><br><small>Dotknij, aby zobaczyć odjazdy</small>`;
            div.onclick = () => { this.activeStopId = id; this.currentView = 'board'; this.render(); };
            container.appendChild(div);
        });
    }

    // Sekcja Linii
    if (Favs.data.lines.length > 0) {
        container.innerHTML += '<div class="fav-section-title">Moje Linie</div>';
        Favs.data.lines.forEach(id => {
            const line = MZK_App.Data.raw.lines[id];
            if (!line) return;
            const div = document.createElement('div');
            div.className = 'line-card';
            div.onclick = () => { this.activeLineId = id; this.currentView = 'lineDetail'; this.render(); };
            div.innerHTML = `
                <div class="line-info">
                    <div class="line-badge">${id}</div>
                    <strong>${line.direction}</strong>
                </div>
                <div class="fav-btn fav-active">★</div>
            `;
            container.appendChild(div);
        });
    }
};

// Inicjalizacja przy starcie
UI.currentView = 'favs'; 
UI.render();

    </script>
