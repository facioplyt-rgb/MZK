<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V127</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; 
            --text: #ffffff; --text-sec: #919eab; --border: rgba(255,255,255,0.08); 
            --bus-col: #00ab55; --tram-col: #ff4842; --warn: #feca05;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 120px; }
        
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        header { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(20px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.5rem; text-transform: uppercase; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        /* STYLE Z TWOICH SCREENÓW - POPRAWIONE */
        .app-card { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        .line-badge { 
            display: inline-flex; align-items: center; justify-content: center; 
            padding: 6px 12px; border-radius: 10px; font-weight: 800; color: #ffffff !important; 
            min-width: 45px; margin-right: 5px;
        }
        .badge-bus { background: var(--bus-col); }
        .badge-tram { background: var(--tram-col); }

        .eta-box { 
            background: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 6px; 
            font-size: 0.8rem; margin-left: 6px; color: #fff; border: 1px solid rgba(255,255,255,0.1);
        }

        .dir-abbr { background: var(--surface-light); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); margin-right: 5px; color: var(--text); }
        
        .group-label { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin: 25px 0 10px 5px; font-weight: 800; letter-spacing: 1px; }
        
        /* NAV BAR */
        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-family: inherit; }
        .main-btn { background: #222; width: 100%; padding: 16px; border-radius: 12px; border: none; color: white; font-weight: 800; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.96); }
        
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="🔍 Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-news" class="section">
        <div id="public-news-list"></div>
    </div>

    <div id="s-admin" class="section">
        <div id="contact-display" class="app-card" style="white-space:pre-wrap;">Wersja systemu PRO V127</div>
        <div class="app-card">
            <input type="password" id="pass" placeholder="Hasło panelu">
            <button onclick="login()" class="main-btn">Zaloguj do Panelu</button>
        </div>
        
        <div id="adm-ui" style="display:none; margin-top:20px;">
            <div style="display:flex; gap:10px;">
                <button onclick="showTab('tab-lines')" class="main-btn">Linie</button>
                <button onclick="showTab('tab-more')" class="main-btn">Inne</button>
            </div>

            <div id="tab-lines" style="display:none; margin-top:15px;">
                <h4 id="form-title">Dodaj Nową Linię</h4>
                <input type="hidden" id="edit-idx" value="-1">
                <input type="text" id="l-num" placeholder="Numer (np. 124)">
                <input type="text" id="l-dir" placeholder="Kierunek">
                <select id="l-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                <select id="l-cat"></select>
                <textarea id="l-stops" placeholder="Nazwa|Czas, Nazwa|Czas..."></textarea>
                <textarea id="l-hw" placeholder="Godziny Robocze"></textarea>
                <textarea id="l-hs" placeholder="Godziny Sobota"></textarea>
                <textarea id="l-hn" placeholder="Godziny Niedz"></textarea>
                <button onclick="saveLine()" class="main-btn" style="background:var(--accent)">Zapisz Linię</button>
                <div id="adm-lines-list" style="margin-top:20px;"></div>
            </div>

            <div id="tab-more" style="display:none; margin-top:15px;">
                <h4>Kategorie Linii</h4>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="new-cat" placeholder="Nowa kategoria">
                    <button onclick="addCat()" style="padding:0 15px; border-radius:10px; background:var(--accent); border:none; color:#fff;">+</button>
                </div>
                <div id="adm-cat-list" style="margin-bottom:20px;"></div>
                
                <h4>Dodaj News</h4>
                <input type="text" id="n-title" placeholder="Tytuł">
                <textarea id="n-body" placeholder="Treść"></textarea>
                <button onclick="saveNews()" class="main-btn">Dodaj News</button>
            </div>
        </div>
    </div>

    <div id="s-vars" class="section">
        <div id="vars-list"></div>
        <button onclick="show('home')" class="main-btn">Wróć</button>
    </div>
    <div id="s-stop-lines" class="section">
        <div id="sl-list"></div>
        <button onclick="show('stops')" class="main-btn">Wróć</button>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-location-dot"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
    <div onclick="show('admin')" id="n-admin"><i class="fa-solid fa-gears"></i><span>Admin</span></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], categories: ["Dzienne"], news: [] };

    dbRef.on('value', (s) => {
        const val = s.val();
        if(val) {
            db = val;
            if(!db.lines) db.lines = [];
            render();
        }
    });

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
    }

    function showTab(tid) {
        ['tab-lines', 'tab-more'].forEach(t => document.getElementById(t).style.display = t === tid ? 'block' : 'none');
    }

    function login() { if(document.getElementById('pass').value === '123') document.getElementById('adm-ui').style.display = 'block'; }

    function getDirAbbr(dir) {
        if(!dir) return "??";
        const w = dir.trim().split(/\s+/);
        return w.length === 1 ? w[0].substring(0,3).toUpperCase() : (w[0][0] + w[w.length-1].substring(0,2)).toUpperCase();
    }

    function render() {
        // Linie (Główna)
        const home = document.getElementById('home-content');
        home.innerHTML = '';
        (db.categories || []).forEach(cat => {
            const lins = db.lines.filter(l => l.cat === cat);
            if(lins.length > 0) {
                home.innerHTML += `<div class="group-label">${cat}</div>`;
                const uniqueNums = [...new Set(lins.map(l => l.num))].sort((a,b) => a-b);
                uniqueNums.forEach(num => {
                    const vars = lins.filter(v => v.num === num);
                    home.innerHTML += `
                        <div class="app-card" onclick="openVars('${num}')" style="cursor:pointer;">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <span class="line-badge ${vars[0].type==='tram'?'badge-tram':'badge-bus'}">${num}</span>
                                <b>${vars[0].type==='bus'?'Autobus':'Tramwaj'}</b>
                            </div>
                            <div style="margin-top:10px;">
                                ${vars.map(v => `<span class="dir-abbr">${getDirAbbr(v.dir)}</span>`).join('')}
                            </div>
                        </div>`;
                });
            }
        });

        // News
        const newsList = document.getElementById('public-news-list');
        newsList.innerHTML = (db.news || []).map(n => `
            <div class="app-card">
                <small style="color:var(--accent)">${n.date}</small>
                <h3>${n.title}</h3>
                <p style="color:var(--text-sec); font-size:0.9rem; margin-top:5px;">${n.content}</p>
            </div>
        `).join('');

        // Admin
        document.getElementById('l-cat').innerHTML = (db.categories || []).map(c => `<option value="${c}">${c}</option>`).join('');
        renderAdmLines();
        renderStopsList();
    }

    function saveLine() {
        const idx = parseInt(document.getElementById('edit-idx').value);
        const stopsArr = document.getElementById('l-stops').value.split(',').map(s => {
            const p = s.split('|'); return { name: p[0].trim(), time: p[1]||0 };
        });
        const lData = {
            num: document.getElementById('l-num').value,
            dir: document.getElementById('l-dir').value,
            type: document.getElementById('l-type').value,
            cat: document.getElementById('l-cat').value,
            stops: stopsArr,
            hoursWorking: document.getElementById('l-hw').value,
            hoursSat: document.getElementById('l-hs').value,
            hoursSun: document.getElementById('l-hn').value
        };
        if(idx === -1) db.lines.push(lData); else db.lines[idx] = lData;
        dbRef.set(db).then(() => { alert("Zapisano!"); resetForm(); });
    }

    function editLine(i) {
        const l = db.lines[i];
        document.getElementById('edit-idx').value = i;
        document.getElementById('l-num').value = l.num;
        document.getElementById('l-dir').value = l.dir;
        document.getElementById('l-type').value = l.type;
        document.getElementById('l-cat').value = l.cat;
        document.getElementById('l-stops').value = l.stops.map(s => `${s.name}|${s.time}`).join(', ');
        document.getElementById('l-hw').value = l.hoursWorking;
        document.getElementById('l-hs').value = l.hoursSat;
        document.getElementById('l-hn').value = l.hoursSun;
        document.getElementById('form-title').innerText = "Edytujesz Linię " + l.num;
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById('edit-idx').value = "-1";
        document.getElementById('form-title').innerText = "Dodaj Nową Linię";
        ['l-num', 'l-dir', 'l-stops', 'l-hw', 'l-hs', 'l-hn'].forEach(id => document.getElementById(id).value = '');
    }

    function renderAdmLines() {
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `
            <div class="admin-item">
                <span><b>${l.num}</b> -> ${l.dir}</span>
                <div>
                    <button onclick="editLine(${i})" style="color:var(--warn); background:none; border:none; margin-right:10px;">EDIT</button>
                    <button onclick="db.lines.splice(${i},1);dbRef.set(db)" style="color:var(--tram-col); background:none; border:none;">X</button>
                </div>
            </div>
        `).join('');
    }

    function renderStopsList() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list');
        let sSet = new Set(); db.lines.forEach(l => l.stops.forEach(s => sSet.add(s.name.trim())));
        list.innerHTML = [...sSet].sort().filter(s => s.toLowerCase().includes(q)).map(name => {
            let stopVars = [];
            db.lines.forEach(l => {
                if(l.stops.find(st => st.name === name)) stopVars.push({ num: l.num, type: l.type, dir: l.dir });
            });
            return `
                <div class="app-card" onclick="openStopLines('${name}')">
                    <div style="font-weight:800; margin-bottom:10px;">${name}</div>
                    <div style="display:flex; flex-wrap:wrap; gap:5px;">
                        ${stopVars.map(v => `<span class="line-badge ${v.type==='tram'?'badge-tram':'badge-bus'}" style="font-size:0.7rem; padding:4px 8px;">${v.num}<span class="eta-box">${getDirAbbr(v.dir)}</span></span>`).join('')}
                    </div>
                </div>`;
        }).join('');
    }

    function openVars(num) {
        show('vars');
        document.getElementById('vars-list').innerHTML = `<div class="group-label">Kierunki linii ${num}</div>` + 
            db.lines.filter(l => l.num == num).map(l => `<div class="app-card"><b>DO: ${l.dir}</b></div>`).join('');
    }

    function openStopLines(name) {
        show('stop-lines');
        document.getElementById('sl-list').innerHTML = `<div class="group-label">Odjazdy z: ${name}</div>` + 
            db.lines.filter(l => l.stops.some(s => s.name === name)).map(l => `
                <div class="app-card">
                    <span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}">${l.num}</span> <b>${l.dir}</b>
                </div>
            `).join('');
    }

    function addCat() {
        const n = document.getElementById('new-cat').value;
        if(!db.categories) db.categories = [];
        db.categories.push(n); dbRef.set(db);
    }

    function saveNews() {
        if(!db.news) db.news = [];
        db.news.unshift({ title: document.getElementById('n-title').value, content: document.getElementById('n-body').value, date: new Date().toLocaleDateString() });
        dbRef.set(db);
    }
</script>
</body>
</html>
