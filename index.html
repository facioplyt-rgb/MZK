<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .line-square.bus { border-bottom: 4px solid var(--accent); }
        .line-square.tram { border-bottom: 4px solid var(--danger); }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        /* STYLE EDYCJI - PRZESUWANIE */
        .stop-edit-item { background: #1c252e; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 40px 1fr 60px 45px 40px; gap: 8px; align-items: center; }
        .move-btns { display: flex; flex-direction: column; gap: 2px; }
        .move-btns button { padding: 2px; font-size: 0.6rem; background: #333; border: none; color: white; border-radius: 4px; }

        .stop-lines-row { display: flex; flex-wrap: wrap; align-items: center; margin-top: 8px; gap: 8px; }
        .stop-line-item { display: inline-flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; }
        .stop-line-item i { font-size: 0.75rem; color: var(--accent); }
        .stop-line-item.is-tram i { color: var(--danger); }
        .trans-time { color: var(--warn); font-size: 0.7rem; margin-left: 2px; }

        .live-badge { color: var(--warn); font-weight: 800; font-size: 0.85rem; white-space: nowrap; }
        .arrows-anim { display: inline-block; animation: moveArrows 1s infinite linear; color: var(--warn); font-weight: 900; margin-right: 4px; }
        @keyframes moveArrows { 0% { opacity: 0.2; transform: translateX(-2px); } 50% { opacity: 1; } 100% { opacity: 0.2; transform: translateX(2px); } }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" class="search-box" placeholder="Szukaj przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    <div id="s-contact" class="section"><div id="contact-display" class="app-card" style="display:block;"></div></div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Wróć</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <button onclick="exportFullBackup()" class="main-btn" style="background:#555">Kopia Zapasowa</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-hours" placeholder="Godziny odjazdów (np. 08:10, 08:40)"></textarea>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj</button>
    <button onclick="saveLine()" class="main-btn">Zapisz</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {}, lineCategories: ["Tramwaje", "Autobusy"] };
    let curLineIdx = -1;
    let allAutoStops = [];

    function init() {
        const local = localStorage.getItem('mzk_v12_final');
        if(local) db = JSON.parse(local);
        extractStops(); render();
        setInterval(() => { if(document.getElementById('s-tt').classList.contains('active-sec')) renderTimetable(curLineIdx); }, 15000);
    }

    function save() { localStorage.setItem('mzk_v12_final', JSON.stringify(db)); extractStops(); render(); }
    function extractStops() { let sSet = new Set(); db.lines.forEach(l => l.stops.forEach(s => { if(s.name) sSet.add(s.name); })); allAutoStops = [...sSet].sort(); }

    function getLiveLabel(diff, targetDate) {
        if (diff <= 0) return `<span class="live-badge"><span class="arrows-anim">>>></span> TERAZ</span>`;
        if (diff < 60) return `<span class="live-badge">za ${diff} min</span>`;
        const hours = diff / 60;
        if (Number.isInteger(hours)) return `<span class="live-badge">za ${hours}h</span>`;
        return `<span class="live-badge">${targetDate.getHours().toString().padStart(2,'0')}:${targetDate.getMinutes().toString().padStart(2,'0')}</span>`;
    }

    function render() {
        const sHome = document.getElementById('s-home'); sHome.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length > 0) {
                sHome.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = lines.find(x => x.num === num);
                    grid.innerHTML += `<div class="line-square ${l.type}" onclick="openVariants('${num}')">${num}</div>`;
                });
                sHome.appendChild(grid);
            }
        });
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, i) => { if(String(l.num) === String(num)) list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><span>Do: <b>${l.dir}</b></span><i class="fa-solid fa-chevron-right"></i></div>`; });
    }

    function renderTimetable(idx) {
        if(idx === -1) return;
        curLineIdx = idx; const line = db.lines[idx]; show('tt');
        const now = new Date();
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        
        let cumulativeMinutes = 0; // Reset dla każdego renderowania wariantu

        line.stops.forEach((stop, sIdx) => {
            cumulativeMinutes += parseInt(stop.time) || 0; 
            const currentStopOffset = cumulativeMinutes; 
            const det = db.stopDetails[stop.name] || {isNz: stop.nz};

            let mainLive = "";
            if(line.hours) {
                let times = line.hours.split(',').map(h => {
                    let p = h.trim().split(':'); if(p.length<2) return null;
                    let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + currentStopOffset, 0, 0);
                    return d;
                }).filter(t => t);
                let next = times.find(d => d > now);
                if(next) mainLive = getLiveLabel(Math.floor((next - now)/60000), next);
            }

            // Przesiadki
            let transfers = [];
            db.lines.forEach(l => {
                if(l === line) return;
                let sPos = l.stops.findIndex(st => st.name === stop.name);
                if(sPos !== -1) {
                    let tOffset = 0; for(let i=0; i<=sPos; i++) tOffset += parseInt(l.stops[i].time || 0);
                    if(l.hours) {
                        let tTimes = l.hours.split(',').map(h => {
                            let p = h.trim().split(':'); if(p.length<2) return null;
                            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + tOffset, 0, 0);
                            return d;
                        }).filter(t => t);
                        let tNext = tTimes.find(d => d > now);
                        if(tNext) transfers.push(`<span class="stop-line-item ${l.type==='tram'?'is-tram':''}"><i class="fa-solid fa-${l.type==='tram'?'tram':'bus'}"></i>${l.num}<span class="trans-time">${Math.floor((tNext-now)/60000)}m</span></span>`);
                    }
                }
            });

            const card = document.createElement('div'); card.className = 'app-card'; card.style.display = 'block';
            card.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;"><div><b>${stop.name}</b>${det.isNz?'<span class="nz-badge">NŻ</span>':''}<div class="stop-lines-row">${transfers.join('')}</div></div><div style="text-align:right">${mainLive}</div></div><div id="g-${sIdx}" class="tt-grid" style="display:none;"></div>`;
            card.onclick = (e) => { 
                if(e.target.closest('.stop-lines-row')) return;
                const g = document.getElementById(`g-${sIdx}`); 
                g.style.display = g.style.display==='grid'?'none':'grid'; 
                if(g.style.display==='grid' && line.hours) {
                    g.innerHTML = line.hours.split(',').map(h => {
                        let p = h.trim().split(':'); let d = new Date(); 
                        d.setHours(parseInt(p[0]), parseInt(p[1]) + currentStopOffset);
                        return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                    }).join('');
                }
            };
            body.appendChild(card);
        });
    }

    // PRZESUWANIE PRZYSTANKÓW
    function moveRow(btn, dir) {
        const row = btn.closest('.stop-edit-item');
        if(dir === -1 && row.previousElementSibling) row.parentNode.insertBefore(row, row.previousElementSibling);
        else if(dir === 1 && row.nextElementSibling) row.parentNode.insertBefore(row.nextElementSibling, row);
    }

    function addStopRow(name = "", time = 2, nz = false) {
        const div = document.createElement('div'); div.className = 'stop-edit-item';
        div.innerHTML = `<div class="move-btns"><button onclick="moveRow(this,-1)">▲</button><button onclick="moveRow(this,1)">▼</button></div><input type="text" value="${name}" class="st-n"><input type="number" value="${time}" class="st-t"><label><input type="checkbox" ${nz?'checked':''} class="st-nz">NŻ</label><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        allAutoStops.filter(s => s.toLowerCase().includes(q)).forEach(s => {
            const lines = [];
            db.lines.forEach(l => { if(l.stops.some(st => st.name === s)) { if(!lines.some(e => e.num === l.num)) lines.push({num: l.num, type: l.type}); } });
            const lStr = lines.sort((a,b)=>parseInt(a.num)-parseInt(b.num)).map(ln => `<span class="stop-line-item ${ln.type==='tram'?'is-tram':''}"><i class="fa-solid fa-${ln.type==='tram'?'tram':'bus'}"></i>${ln.num}</span>`).join('');
            list.innerHTML += `<div class="app-card" style="display:block;"><b>${s}</b><div class="stop-lines-row">${lStr}</div></div>`;
        });
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", category:"Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-type').value = l.type; document.getElementById('fl-hours').value = l.hours;
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.stop-edit-item')).map(el => ({ name: el.querySelector('.st-n').value, time: parseInt(el.querySelector('.st-t').value) || 0, nz: el.querySelector('.st-nz').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hours: document.getElementById('fl-hours').value, stops };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function exportFullBackup() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `mzk_backup.txt`; a.click(); }

    init();
</script>
</body>
</html>
