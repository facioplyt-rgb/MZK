<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM V2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* === SYSTEM WIZUALNY === */
        :root { 
            --accent: #00ab55; 
            --bg: #05080f; 
            --surf: #121926; 
            --surf-l: #1c2536; 
            --text: #ffffff; 
            --text-m: #94a3b8;
            --bus: #00ab55; 
            --tram: #ef4444; 
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }

        /* Nagłówek */
        header { 
            background: rgba(5, 8, 15, 0.9); backdrop-filter: blur(12px);
            padding: 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border); text-align: center;
        }
        header h1 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* Moduły (Widoki) */
        .module { display: none; }
        .module.active { display: block; animation: slideUp 0.3s ease; }

        /* UI Kit - Karty, Przyciski, Formularze */
        .card { background: var(--surf); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn { background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 14px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 14px; background: var(--surf-l); color: #fff; border: 1px solid var(--border); font-size: 1rem; }

        /* Nawigacja Dolna */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--surf); 
            display: flex; height: 80px; border-top: 1px solid var(--border); z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-m); cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 5px; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Linie - Odznaki */
        .line-badge { width: 50px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; font-family: 'Outfit'; margin-right: 15px; font-size: 1.1rem; }
        .bg-bus { background: var(--bus); box-shadow: 0 4px 15px rgba(0,171,85,0.3); }
        .bg-tram { background: var(--tram); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header><h1>MZK GORZÓW</h1></header>

    <div class="container">
        <div id="view-lines" class="module active"></div>
        <div id="view-news" class="module"></div>
        <div id="view-admin" class="module"></div>
        <div id="view-details" class="module"></div>
    </div>

    <nav>
        <div class="nav-item active" id="nav-lines" onclick="App.switch('lines')">
            <i class="fa-solid fa-bus"></i><span>Linie</span>
        </div>
        <div class="nav-item" id="nav-news" onclick="App.switch('news')">
            <i class="fa-solid fa-bullhorn"></i><span>News</span>
        </div>
        <div class="nav-item" id="nav-admin" onclick="App.switch('admin')">
            <i class="fa-solid fa-user-shield"></i><span>Admin</span>
        </div>
    </nav>

    <script>
        // === CORE ENGINE ===
        window.App = {
            // Klucz bazy danych (pobierany z pamięci lub domyślny)
            dbKey: localStorage.getItem('mzk_key') || 'mzk_v2026_pro',
            
            init() {
                const config = {
                    apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
                    authDomain: "mzk-by-facio.firebaseapp.com",
                    databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
                    projectId: "mzk-by-facio"
                };
                if (!firebase.apps.length) firebase.initializeApp(config);
                console.log("System V2026 zainicjowany. Baza:", this.dbKey);
            },

            // Uniwersalna funkcja przełączania widoków
            switch(id) {
                // Usuwamy aktywność z innych
                document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                
                // Aktywujemy wybrany
                const targetView = document.getElementById('view-' + id);
                if(targetView) targetView.classList.add('active');
                
                const targetNav = document.getElementById('nav-' + id);
                if(targetNav) targetNav.classList.add('active');

                // Wywołanie odświeżania modułu (jeśli istnieje)
                if(window['Mod' + id.charAt(0).toUpperCase() + id.slice(1)]) {
                    window['Mod' + id.charAt(0).toUpperCase() + id.slice(1)].render();
                }
                
                window.scrollTo(0,0);
            }
        };

        // Start silnika
        App.init();
        // === MODUŁ 2: ADMIN (Zarządzanie & Recovery) ===
        window.ModAdmin = {
            isLogged: false,

            // Logowanie - proste hasło
            login() {
                const pass = document.getElementById('adm-pass').value;
                if(pass === '123') {
                    this.isLogged = true;
                    this.render();
                } else {
                    alert("Błędne hasło!");
                }
            },

            // Funkcja Recovery - zmiana klucza bazy danych
            updateKey() {
                const newKey = document.getElementById('cfg-key').value;
                if(confirm("Przełączyć na bazę: " + newKey + "?")) {
                    localStorage.setItem('mzk_key', newKey);
                    location.reload(); // Odświeżamy połączenie
                }
            },

            // Główny widok panelu
            render() {
                const container = document.getElementById('view-admin');
                if(!container) return;

                // Jeśli nie zalogowany - pokaż ekran logowania
                if(!this.isLogged) {
                    container.innerHTML = `
                        <div class="card" style="text-align:center">
                            <i class="fa-solid fa-shield-halved" style="font-size:3rem; color:var(--accent); margin-bottom:20px"></i>
                            <h2 style="margin-bottom:25px; font-family:'Outfit'">Panel Sterowania</h2>
                            <input type="password" id="adm-pass" placeholder="Hasło administratora">
                            <button class="btn" onclick="ModAdmin.login()">ZALOGUJ SIĘ</button>
                        </div>`;
                    return;
                }

                // Panel po zalogowaniu
                container.innerHTML = `
                    <div class="card" style="border: 1px solid var(--accent)">
                        <label style="font-size:0.7rem; color:var(--accent); font-weight:900; letter-spacing:1px">KLUCZ BAZY (RECOVERY)</label>
                        <div style="display:flex; gap:10px; margin-top:8px">
                            <input type="text" id="cfg-key" value="${App.dbKey}" style="margin:0">
                            <button class="btn" style="width:auto; padding:0 20px" onclick="ModAdmin.updateKey()">ZMIEŃ</button>
                        </div>
                    </div>

                    <div class="card">
                        <h3 style="margin-bottom:15px; font-family:'Outfit'">DODAJ NOWĄ LINIĘ</h3>
                        <input type="text" id="f-num" placeholder="Numer linii (np. 124)">
                        <input type="text" id="f-dir" placeholder="Kierunek (np. Londyńska)">
                        
                        <select id="f-cat">
                            <option value="Dzienne">Autobusy Dzienne</option>
                            <option value="Tramwaje">Tramwaje</option>
                            <option value="Nocne">Autobusy Nocne</option>
                        </select>

                        <label style="font-size:0.65rem; opacity:0.5">PRZYSTANKI (Format: Nazwa|Minuta, ...)</label>
                        <textarea id="f-stops" rows="4" placeholder="Katedra|0, Arsenał|2, Piaski|5"></textarea>
                        
                        <button class="btn" onclick="ModAdmin.saveLine()">WYŚLIJ DO CHMURY</button>
                    </div>

                    <div id="adm-list-lines">
                        <p style="text-align:center; opacity:0.5; font-size:0.8rem">Ładowanie listy linii...</p>
                    </div>
                `;
                this.loadList();
            },

            // Zapisywanie linii do Firebase
            saveLine() {
                const num = document.getElementById('f-num').value;
                const dir = document.getElementById('f-dir').value;
                const cat = document.getElementById('f-cat').value;
                const stopsRaw = document.getElementById('f-stops').value;

                if(!num || !dir) return alert("Podaj numer i kierunek!");

                // Parsowanie przystanków z formatu Nazwa|Minuta
                const stops = stopsRaw.split(',').filter(s => s.includes('|')).map(s => {
                    const parts = s.split('|');
                    return { name: parts[0].trim(), time: parts[1].trim() };
                });

                const newLine = {
                    num, dir, cat, stops,
                    type: cat === 'Tramwaje' ? 'tram' : 'bus'
                };

                firebase.database().ref(App.dbKey + '/lines').once('value').then(snap => {
                    let lines = snap.val() || [];
                    lines.push(newLine);
                    firebase.database().ref(App.dbKey + '/lines').set(lines).then(() => {
                        alert("Linia dodana!");
                        this.render();
                    });
                });
            },

            // Wyświetlanie listy do usuwania w panelu
            loadList() {
                firebase.database().ref(App.dbKey + '/lines').on('value', snap => {
                    const lines = snap.val() || [];
                    const listDiv = document.getElementById('adm-list-lines');
                    if(!listDiv) return;

                    listDiv.innerHTML = '<h4 style="margin:20px 5px 10px; font-size:0.7rem; opacity:0.5; text-transform:uppercase">Zarządzaj liniami</h4>';
                    
                    lines.forEach((l, i) => {
                        listDiv.innerHTML += `
                            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px 18px">
                                <div><b style="color:var(--accent)">${l.num}</b> <span style="margin-left:8px">${l.dir}</span></div>
                                <i class="fa-solid fa-trash-can" style="color:var(--tram); cursor:pointer" onclick="ModAdmin.deleteLine(${i})"></i>
                            </div>`;
                    });
                });
            },

            // Usuwanie linii
            deleteLine(index) {
                if(confirm("Usunąć tę linię?")) {
                    firebase.database().ref(App.dbKey + '/lines').once('value').then(snap => {
                        let lines = snap.val() || [];
                        lines.splice(index, 1);
                        firebase.database().ref(App.dbKey + '/lines').set(lines);
                    });
                }
            }
        };

        
    </script>
</body>
</html>
