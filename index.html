<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Zarządzania Rozkładami MZK Gorzów</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk-green: #008744; --mzk-yellow: #feca05; --bg: #f4f7f6; --dark: #1a1a1a; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--dark); line-height: 1.5; }
        
        /* UI Główne */
        header { background: var(--mzk-green); color: white; padding: 20px; text-align: center; border-bottom: 6px solid var(--mzk-yellow); box-shadow: var(--shadow); }
        header h1 { margin: 0; font-weight: 900; letter-spacing: -1px; font-size: 1.8rem; }
        
        nav { display: flex; justify-content: center; gap: 15px; background: #fff; padding: 12px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        nav button { background: #f0f0f0; border: none; padding: 10px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; color: #555; }
        nav button.active { background: var(--mzk-green); color: white; }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }

        /* GRID LINII */
        .category-wrapper { margin-bottom: 40px; }
        .cat-title { font-weight: 900; text-transform: uppercase; font-size: 0.9rem; color: #777; margin-bottom: 15px; border-left: 5px solid var(--mzk-yellow); padding-left: 15px; }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; }
        
        .line-box { 
            background: white; border: 1px solid #eee; border-radius: 12px; padding: 18px 5px; 
            text-align: center; font-weight: 900; font-size: 1.4rem; color: #ddd; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .line-active { border: 2px solid var(--mzk-green); color: var(--dark); background: #fff; }
        .line-active:hover { transform: translateY(-5px); border-color: var(--mzk-yellow); box-shadow: var(--shadow); }
        .line-route { font-size: 0.65rem; font-weight: 600; color: #888; margin-top: 6px; text-transform: uppercase; max-width: 80px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* LOGOWANIE */
        .login-card { background: white; max-width: 400px; margin: 80px auto; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .login-card h2 { margin-bottom: 25px; font-weight: 900; color: var(--mzk-green); }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; transition: 0.3s; }
        .login-card input:focus { border-color: var(--mzk-green); outline: none; }

        /* EDYTOR (WARSTWA MODAL) */
        .editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; }
        .editor-header { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .editor-content { background: white; padding: 30px; border-radius: 20px; margin-top: 20px; box-shadow: var(--shadow); }
        
        .bulk-box { background: #f0f7ff; padding: 20px; border-radius: 15px; border: 2px dashed #007bff; margin: 25px 0; }
        .bulk-box textarea { height: 120px; background: white; border: 1px solid #cce5ff; margin-top: 10px; font-size: 0.95rem; line-height: 1.4; }

        .stop-row { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #eee; border-left: 6px solid var(--mzk-green); transition: 0.2s; }
        .stop-row:hover { background: #fdfdfd; border-color: #ddd; }
        .stop-grid { display: grid; grid-template-columns: 2fr 2fr 1.2fr 0.8fr; gap: 15px; align-items: center; }

        /* BUTTONS */
        .btn { padding: 14px 25px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.9rem; }
        .btn-green { background: var(--mzk-green); color: white; }
        .btn-green:hover { background: #007038; }
        .btn-red { background: #ff4d4d; color: white; }
        .btn-blue { background: #007bff; color: white; width: 100%; }
        
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box; }
        label { font-weight: 700; font-size: 0.85rem; color: #666; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<header>
    <h1>MZK GORZÓW • PANEL ZARZĄDZANIA</h1>
</header>

<nav id="top-nav" style="display:none">
    <button id="nav-lines" class="active" onclick="showSection('lines-sec')">WIDOK PASAŻERA</button>
    <button id="nav-admin" onclick="showSection('admin-dashboard-sec')">EDYCJA ROZKŁADÓW</button>
</nav>

<div class="container">
    <div id="login-sec" class="section active">
        <div class="login-card">
            <h2>Panel Facio</h2>
            <input type="text" id="adm-user" placeholder="Nazwa użytkownika">
            <input type="password" id="adm-pass" placeholder="Hasło">
            <button class="btn btn-green" style="width:100%" onclick="tryLogin()">Zaloguj do systemu</button>
        </div>
    </div>

    <div id="admin-dashboard-sec" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-weight:900">Zarządzanie Liniami</h2>
            <button class="btn btn-green" onclick="openEditor('new')">+ NOWA LINIA</button>
        </div>
        <div id="grid-admin"></div>
    </div>

    <div id="lines-sec" class="section">
        <input type="text" id="search-pax" placeholder="Filtruj numer linii..." style="padding:15px; border-radius:15px; border:2px solid var(--mzk-green); margin-bottom:30px; width:100%; font-size:1.1rem;" oninput="renderGrids()">
        <div id="grid-pax"></div>
    </div>
</div>

<div id="editor-layer" class="editor-overlay">
    <div class="editor-header">
        <h2 id="edit-title" style="margin:0">Konfiguracja Linii</h2>
        <button class="btn btn-red" onclick="closeEditor()">Zamknij bez zapisu</button>
    </div>
    
    <div class="container">
        <div class="editor-content">
            <div style="display:grid; grid-template-columns: 150px 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label>Nr Linii</label>
                    <input type="number" id="inp-num" placeholder="np. 124" style="font-weight:900; font-size:1.2rem; color:var(--mzk-green);">
                </div>
                <div>
                    <label>Wybierz wariant do edycji</label>
                    <select id="sel-variant" onchange="loadVariantData(this.value)" style="font-weight:700;"></select>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Przystanek początkowy</label>
                    <input type="text" id="inp-from" placeholder="np. PIASKI">
                </div>
                <div>
                    <label>Przystanek końcowy</label>
                    <input type="text" id="inp-to" placeholder="np. KATEDRA">
                </div>
            </div>

            <div style="margin-top:15px;">
                <label>Opis trasy / Wariantu</label>
                <input type="text" id="inp-variant-desc" placeholder="np. przez Most Lubuski, ul. Jagiełły">
            </div>

            <div style="margin-top:15px;">
                <label>Godziny odjazdów z pętli (oddziel przecinkiem)</label>
                <textarea id="inp-starts" rows="2" placeholder="05:20, 05:45s, 06:10, 06:30w..."></textarea>
            </div>

            <div class="bulk-box">
                <label>📋 <b>Szybkie wklejanie trasy (z Notatnika po Enterach):</b></label>
                <textarea id="bulk-paste" placeholder="Wklej tutaj listę przystanków..."></textarea>
                <button class="btn btn-blue" onclick="processBulk()">GENERUJ LISTĘ PRZYSTANKÓW</button>
            </div>

            <h3 style="margin-top:40px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Szczegóły trasy i przesiadek</h3>
            <div id="stops-list"></div>
            
            <button class="btn" onclick="addStopRow()" style="width:100%; background:#f0f0f0; margin-top:10px; color:#555;">+ Dodaj pojedynczy przystanek ręcznie</button>

            <div style="margin-top:50px; display:grid; grid-template-columns: 3fr 1fr; gap: 15px;">
                <button class="btn btn-green" style="height:70px; font-size:1.4rem;" onclick="saveLine()">ZAPISZ ZMIANY W BAZIE</button>
                <button class="btn btn-red" onclick="deleteLine()">USUŃ LINIĘ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'MZK_OFFICIAL_SYSTEM_DATA';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { lines: {}, globalStops: {} };
    let currentLine = null;

    // SYSTEM LOGOWANIA
    function tryLogin() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === 'Facio' && p === 'Admin123') {
            document.getElementById('login-sec').classList.remove('active');
            document.getElementById('admin-dashboard-sec').classList.add('active');
            document.getElementById('top-nav').style.display = 'flex';
            renderGrids();
        } else {
            alert("Błąd logowania! Nieprawidłowy użytkownik lub hasło.");
        }
    }

    // NAWIGACJA
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + (id.includes('admin') ? 'admin' : 'lines')).classList.add('active');
    }

    // EDYTOR - FUNKCJE GŁÓWNE
    function openEditor(num) {
        currentLine = num;
        document.getElementById('editor-layer').style.display = 'block';
        document.getElementById('inp-num').value = num === 'new' ? '' : num;
        document.getElementById('edit-title').innerText = num === 'new' ? 'Kreator nowej linii' : `Edycja linii ${num}`;
        refreshVariantList(num);
        loadVariantData('new');
    }

    function closeEditor() {
        document.getElementById('editor-layer').style.display = 'none';
        renderGrids();
    }

    function refreshVariantList(num) {
        const sel = document.getElementById('sel-variant');
        sel.innerHTML = '<option value="new">-- NOWY WARIANT / KIERUNEK --</option>';
        if(db.lines[num]) {
            db.lines[num].forEach((v, i) => {
                sel.innerHTML += `<option value="${i}">${v.from} ➔ ${v.to}</option>`;
            });
        }
    }

    // WKLEJANIE Z NOTATNIKA
    function processBulk() {
        const raw = document.getElementById('bulk-paste').value;
        if(!raw.trim()) return;
        const names = raw.split('\n').map(n => n.trim()).filter(n => n !== '');
        names.forEach(name => addStopRow({name: name, adj: 0}));
        document.getElementById('bulk-paste').value = '';
        alert("Wygenerowano przystanki. Uzupłnij minuty i przesiadki.");
    }

    function addStopRow(data = {name:'', adj:0}) {
        const cont = document.getElementById('stops-list');
        const id = 's' + Math.random().toString(36).substr(2,9);
        const globalInfo = db.globalStops[data.name] || {sub:'', trans:''};
        
        const html = `
            <div class="stop-row" id="${id}">
                <div class="stop-grid">
                    <div>
                        <label>Nazwa przystanku</label>
                        <input type="text" class="s-name" value="${data.name}" oninput="syncWithGlobal(this)">
                    </div>
                    <div>
                        <label>Lokalizacja (miejsce/opis)</label>
                        <input type="text" class="s-sub" value="${globalInfo.sub}" oninput="saveToGlobal(this)">
                    </div>
                    <div>
                        <label>Przesiadki (np. 1, 102)</label>
                        <input type="text" class="s-trans" value="${globalInfo.trans}" oninput="saveToGlobal(this)">
                    </div>
                    <div>
                        <label>Minuty (+)</label>
                        <input type="number" class="s-adj" value="${data.adj}" style="font-weight:bold; color:blue;">
                    </div>
                </div>
                <button onclick="document.getElementById('${id}').remove()" style="background:none; border:none; color:red; cursor:pointer; font-size:0.7rem; margin-top:5px;">Usuń z trasy</button>
            </div>`;
        cont.insertAdjacentHTML('beforeend', html);
    }

    // INTELIGENTNY SŁOWNIK
    function syncWithGlobal(el) {
        const row = el.closest('.stop-row');
        const name = el.value.trim();
        if(db.globalStops[name]) {
            row.querySelector('.s-sub').value = db.globalStops[name].sub;
            row.querySelector('.s-trans').value = db.globalStops[name].trans;
        }
    }

    function saveToGlobal(el) {
        const row = el.closest('.stop-row');
        const name = row.querySelector('.s-name').value.trim();
        if(!name) return;
        db.globalStops[name] = {
            sub: row.querySelector('.s-sub').value,
            trans: row.querySelector('.s-trans').value
        };
    }

    // ZAPIS I WCZYTYWANIE
    function loadVariantData(idx) {
        if(idx === 'new') {
            ['inp-from','inp-to','inp-variant-desc','inp-starts'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('stops-list').innerHTML = '';
            return;
        }
        const v = db.lines[currentLine][idx];
        document.getElementById('inp-from').value = v.from;
        document.getElementById('inp-to').value = v.to;
        document.getElementById('inp-variant-desc').value = v.variant;
        document.getElementById('inp-starts').value = v.starts.join(', ');
        document.getElementById('stops-list').innerHTML = '';
        v.stops.forEach(s => addStopRow(s));
    }

    function saveLine() {
        const num = document.getElementById('inp-num').value;
        const vIdx = document.getElementById('sel-variant').value;
        if(!num) { alert("Podaj numer linii!"); return; }

        const variantData = {
            from: document.getElementById('inp-from').value.toUpperCase(),
            to: document.getElementById('inp-to').value.toUpperCase(),
            variant: document.getElementById('inp-variant-desc').value,
            starts: document.getElementById('inp-starts').value.split(',').map(s=>s.trim()).filter(s=>s!==''),
            stops: Array.from(document.querySelectorAll('.stop-row')).map(row => ({
                name: row.querySelector('.s-name').value,
                adj: parseInt(row.querySelector('.s-adj').value) || 0
            }))
        };

        if(!db.lines[num]) db.lines[num] = [];
        if(vIdx === 'new') db.lines[num].push(variantData);
        else db.lines[num][vIdx] = variantData;

        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        alert("Sukces! Rozkład linii został zaktualizowany.");
        closeEditor();
    }

    function deleteLine() {
        if(confirm("Czy na pewno chcesz usunąć tę linię i wszystkie jej warianty z bazy?")) {
            delete db.lines[currentLine];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            closeEditor();
        }
    }

    // RENDEROWANIE GRIDU
    function renderGrids() {
        const pGrid = document.getElementById('grid-pax');
        const aGrid = document.getElementById('grid-admin');
        const q = document.getElementById('search-pax').value;
        pGrid.innerHTML = ''; aGrid.innerHTML = '';

        const categories = [
            { t: "Tramwaje", min: 1, max: 15 },
            { t: "Linie Magistralne (100-119)", min: 100, max: 119 },
            { t: "Autobusy", min: 120, max: 200 }
        ];

        categories.forEach(cat => {
            let htmlP = `<div class="category-wrapper"><div class="cat-title">${cat.t}</div><div class="line-grid">`;
            let htmlA = `<div class="category-wrapper"><div class="cat-title">${cat.t}</div><div class="line-grid">`;
            let hasAny = false;

            for(let i=cat.min; i<=cat.max; i++) {
                if(q && !i.toString().includes(q)) continue;
                const isActive = db.lines[i];
                const activeCls = isActive ? 'line-active' : '';
                
                // Info o trasie pod numerem
                let routeInfo = "";
                if(isActive) routeInfo = `<div class="line-route">${db.lines[i][0].to}</div>`;

                htmlP += `<div class="line-box ${activeCls}" onclick="isActive ? alert('Otwieranie rozkładu linii '+${i}) : ''">${i}${routeInfo}</div>`;
                htmlA += `<div class="line-box ${activeCls}" onclick="openEditor(${i})">${i}</div>`;
                hasAny = true;
            }
            if(hasAny) {
                pGrid.innerHTML += htmlP + "</div></div>";
                aGrid.innerHTML += htmlA + "</div></div>";
            }
        });
    }
</script>
</body>
</html>
