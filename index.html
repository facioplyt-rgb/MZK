<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - System Pro V28</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.2s ease; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .app-card { background: var(--surface); padding: 18px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .stop-card { display: block; cursor: default; }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid transparent; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        .timetable-container { background: white; color: #1a1a1a; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        .tt-header-box { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #ddd; }
        .tt-row { display: flex; border-bottom: 1px solid #eee; }
        .tt-hour-col { background: #f0f0f0; width: 60px; padding: 12px 0; text-align: center; font-size: 1.2rem; font-weight: 800; border-right: 1px solid #ddd; color: #000; }
        .tt-min-col { flex: 1; padding: 12px 15px; display: flex; flex-wrap: wrap; gap: 12px; background: #fff; }
        .tt-min-val { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; color: #333; }
        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.65rem; font-weight: 600; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; background: #1c252e; border: 1px solid var(--border); color: white; font-family: inherit; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .badge-inline { display: inline-block; font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; text-transform: uppercase; }
        .bg-strefa { background: #555; color: white; }
        .bg-nz { background: var(--warn); color: #000; }
        .stop-edit-row { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .btn-del-stop { background: var(--danger); color: white; border: none; width: 30px; height: 30px; border-radius: 8px; font-weight: bold; cursor: pointer; position: absolute; top: 10px; right: 10px; }
        .news-date { font-size: 0.75rem; color: var(--warn); font-weight: 600; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <div class="group-label">Przystanki</div>
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section"><div class="group-label">Aktualności</div><div id="public-news-list"></div></div>
    
    <div id="s-news-details" class="section">
        <div class="app-card stop-card">
            <span id="nd-date" style="font-size: 0.8rem; color: var(--text-sec); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; display: block;"></span>
            <h2 id="nd-title" style="color: var(--accent); margin-bottom: 15px;"></h2>
            <div id="nd-body" style="white-space: pre-wrap; line-height: 1.6;"></div>
        </div>
        <button onclick="show('news')" class="main-btn" style="background:#333; margin-top:10px;">Wróć</button>
    </div>

    <div id="s-contact" class="section"><div class="group-label">O MZK</div><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-day-sel" style="display:none; gap:5px; margin-bottom:15px;"><button class="main-btn" id="btn-working" onclick="setDay('working')">Robocze</button><button class="main-btn" id="btn-saturday" style="background:#444" onclick="setDay('saturday')">Soboty</button><button class="main-btn" id="btn-sunday" style="background:#444" onclick="setDay('sunday')">Niedz</button></div><div id="tt-body"></div><button id="tt-back-btn" class="main-btn" style="background:#333; margin-top:20px;">Wróć</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;"><input type="password" id="pass" placeholder="Hasło"><button onclick="login()" class="main-btn">Zaloguj</button></div>
        <div id="adm-ui" style="display:none;">
            <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:15px;">
                <button onclick="setTab('l')" class="main-btn" style="font-size:0.5rem; padding:10px 0;">LINIE</button>
                <button onclick="setTab('s')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#444;">PRZYST</button>
                <button onclick="setTab('n')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#444;">NEWS</button>
                <button onclick="setTab('c')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#444;">KATEGO</button>
                <button onclick="setTab('i')" class="main-btn" style="font-size:0.5rem; padding:10px 0; background:#444;">PLIK</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;">
                <div class="group-label">Kategorie linii</div>
                <input type="text" id="edit-cats-input">
                <button onclick="saveCategories()" class="main-btn">Zapisz Kategorie</button>
                <textarea id="edit-contact-text" style="height:100px"></textarea>
                <button onclick="saveContact()" class="main-btn">Zapisz Info</button>
            </div>
            <div id="tab-i" class="adm-tab" style="display:none;"><button onclick="exportDB()" class="main-btn">Eksportuj JSON</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-news" class="overlay-form">
    <div class="group-label">Dodaj/Edytuj News</div>
    <input type="text" id="fn-title" placeholder="Tytuł">
    <input type="text" id="fn-date" placeholder="Data">
    <textarea id="fn-body" style="height:200px;" placeholder="Treść newsa..."></textarea>
    <button onclick="saveNews()" class="main-btn">Zapisz News</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-line" class="overlay-form">
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-h-work" placeholder="Robocze"></textarea>
    <textarea id="fl-h-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-h-sun" placeholder="Niedziele"></textarea>
    <div id="fl-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444;">+ Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mzk-by-facio",
        storageBucket: "mzk-by-facio.firebasestorage.app",
        messagingSenderId: "676970411647",
        appId: "1:676970411647:web:5703d5fb5fb499ff83714a"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], stopDetails: {}, news: [], lineCategories: ["Tramwaje", "Autobusy"], contact: "" };
    let curLineIdx = -1, curNewsIdx = -1, curDay = 'working', curStopIdx = -1, allStops = [];

    function cleanKey(n) { return n ? n.trim().replace(/[.#$[\]]/g, "") : "unknown"; }
    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); 
        document.getElementById('s-'+id).classList.add('active-sec'); 
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id).classList.add('active');
    }

    init();
    function init() {
        dbRef.on('value', (s) => {
            const data = s.val();
            if(data) {
                db = data;
                if(!db.lines) db.lines = [];
                if(!db.news) db.news = [];
                if(!db.lineCategories) db.lineCategories = ["Tramwaje", "Autobusy"];
                let sSet = new Set();
                db.lines.forEach(l => l.stops?.forEach(s => sSet.add(s.name)));
                allStops = [...sSet].sort();
                render();
            }
        });
    }

    function render() {
        const h = document.getElementById('s-home'); h.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length) {
                h.innerHTML += `<div class="group-label">${cat}</div>`;
                const g = document.createElement('div'); g.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const lObj = lines.find(x=>x.num===num);
                    g.innerHTML += `<div class="line-square ${lObj.type}" onclick="openVars('${num}')">${num}</div>`;
                });
                h.appendChild(g);
            }
        });
        document.getElementById('edit-cats-input').value = db.lineCategories.join(', ');
        document.getElementById('contact-display').innerText = db.contact || "";
        document.getElementById('edit-contact-text').value = db.contact || "";
        
        // Newsy Publiczne
        document.getElementById('public-news-list').innerHTML = db.news.map((n, i) => `
            <div class="app-card" onclick="openNewsDetails(${i})">
                <div><b>${n.title}</b><span class="news-date">${n.date}</span></div>
                <i class="fa-solid fa-chevron-right"></i>
            </div>`).join('');
        
        // Admin Listy
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><div><b>${l.num}</b> - ${l.dir}</div><button onclick="openLineForm(${i})" style="padding:5px 10px; background:#444; border:none; border-radius:5px; color:white;">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-news-list').innerHTML = db.news.map((n, i) => `
            <div class="app-card">
                <div><b>${n.title}</b></div>
                <div><button onclick="openNewsForm(${i})" style="background:#444; border:none; padding:5px; border-radius:5px; color:white;">E</button> <button onclick="deleteNews(${i})" style="background:var(--danger); border:none; padding:5px; border-radius:5px; color:white;">X</button></div>
            </div>`).join('');
            
        renderStopsList();
    }

    function renderStopsList() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        document.getElementById('public-stops-list').innerHTML = allStops.filter(s => s.toLowerCase().includes(q)).map(s => {
            const d = db.stopDetails[cleanKey(s)] || {nearby:"", outZone: false, alwaysNZ: false};
            return `<div class="app-card stop-card">
                <div style="font-weight:800;">${s} ${d.outZone ? '<span class="badge-inline bg-strefa">Gr. strefy</span>' : ''} ${d.alwaysNZ ? '<span class="badge-inline bg-nz">NŻ</span>' : ''}</div>
                ${d.nearby ? `<div style="color:var(--warn); font-size:0.8rem; margin-top:4px;">${d.nearby}</div>` : ''}
            </div>`;
        }).join('');
        document.getElementById('adm-stops-list').innerHTML = allStops.map(s => {
            const d = db.stopDetails[cleanKey(s)] || {nearby:"", outZone: false, alwaysNZ: false};
            return `<div class="app-card stop-card" style="border:1px solid #333;">
                <div style="font-weight:bold; color:var(--accent);">${s}</div>
                <input type="text" value="${d.nearby}" placeholder="W pobliżu?" onchange="upStop('${s}', this.value, 'nearby')">
                <div style="display:flex; gap:10px;">
                    <label style="font-size:0.7rem;"><input type="checkbox" ${d.outZone ? 'checked' : ''} onchange="upStop('${s}', this.checked, 'outZone')"> Gr. Strefy</label>
                    <label style="font-size:0.7rem;"><input type="checkbox" ${d.alwaysNZ ? 'checked' : ''} onchange="upStopGlobal('${s}', this.checked)"> Zawsze NŻ</label>
                </div>
            </div>`;
        }).join('');
    }

    // NEWS FUNCTIONS
    function openNewsDetails(i) {
        const n = db.news[i];
        document.getElementById('nd-title').innerText = n.title;
        document.getElementById('nd-date').innerText = n.date;
        document.getElementById('nd-body').innerText = n.body;
        show('news-details');
    }
    function openNewsForm(idx) {
        curNewsIdx = idx;
        const n = idx === -1 ? {title:"", date:"", body:""} : db.news[idx];
        document.getElementById('fn-title').value = n.title;
        document.getElementById('fn-date').value = n.date;
        document.getElementById('fn-body').value = n.body;
        document.getElementById('form-news').style.display = 'block';
    }
    function saveNews() {
        const data = { title: document.getElementById('fn-title').value, date: document.getElementById('fn-date').value, body: document.getElementById('fn-body').value };
        if(curNewsIdx === -1) db.news.push(data); else db.news[curNewsIdx] = data;
        dbRef.update({ news: db.news }).then(() => { alert("News zapisany!"); closeForms(); });
    }
    function deleteNews(i) { if(confirm("Usunąć?")) { db.news.splice(i, 1); dbRef.update({ news: db.news }); } }

    // SYSTEMOWE
    function upStop(name, val, field) {
        const key = cleanKey(name);
        if(!db.stopDetails[key]) db.stopDetails[key] = {nearby:"", outZone:false, alwaysNZ:false};
        db.stopDetails[key][field] = val;
        dbRef.child('stopDetails').child(key).set(db.stopDetails[key]);
    }
    function upStopGlobal(name, val) {
        upStop(name, val, 'alwaysNZ');
        db.lines.forEach(l => { l.stops?.forEach(s => { if(s.name === name) s.nz = val; }); });
        dbRef.update({ lines: db.lines });
    }
    function saveCategories() {
        const cats = document.getElementById('edit-cats-input').value.split(',').map(c => c.trim()).filter(c => c);
        dbRef.update({ lineCategories: cats }).then(() => alert("Zapisano!"));
    }
    function saveContact() { dbRef.update({ contact: document.getElementById('edit-contact-text').value }).then(() => alert("Zapisano!")); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }

    // LINIE I ROZKŁADY (ZACHOWANE)
    function openLineForm(idx) {
        curLineIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", category:db.lineCategories[0], stops:[], hoursWorking:"", hoursSat:"", hoursSun:""} : db.lines[idx];
        document.getElementById('fl-num').value = l.num;
        document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-type').value = l.type || "bus";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-h-work').value = l.hoursWorking;
        document.getElementById('fl-h-sat').value = l.hoursSat;
        document.getElementById('fl-h-sun').value = l.hoursSun;
        document.getElementById('fl-list').innerHTML = '';
        (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }
    function addStopRow(name="", time=2, nz=false) {
        const div = document.createElement('div');
        div.className = 'stop-edit-row';
        div.innerHTML = `<button class="btn-del-stop" onclick="this.parentElement.remove()">X</button>
            <input type="text" value="${name}" class="stop-name-in" placeholder="Nazwa">
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="number" value="${time}" class="stop-time-in" style="width:50px; margin:0;">
                <label style="font-size:0.7rem;"><input type="checkbox" class="stop-nz-in" ${nz?'checked':''}> NŻ</label>
            </div>`;
        document.getElementById('fl-list').appendChild(div);
    }
    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.stop-edit-row')).map(r => ({
            name: r.querySelector('.stop-name-in').value.trim(),
            time: parseInt(r.querySelector('.stop-time-in').value) || 0,
            nz: r.querySelector('.stop-nz-in').checked
        }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        dbRef.update({ lines: db.lines }).then(() => { alert("Zapisano!"); closeForms(); });
    }
    function openVars(num) { 
        show('vars'); 
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`; 
        const v = document.getElementById('vars-list'); v.innerHTML = ''; 
        db.lines.forEach((l, i) => { if(String(l.num) === String(num)) v.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>${l.dir}</b><i class="fa-solid fa-chevron-right"></i></div>`; }); 
    }
    function renderTimetable(lIdx, sIdx = -1) {
        curLineIdx = lIdx; curStopIdx = sIdx; show('tt');
        const l = db.lines[lIdx];
        const ttBody = document.getElementById('tt-body');
        document.getElementById('tt-day-sel').style.display = sIdx === -1 ? 'none' : 'flex';
        if (sIdx === -1) {
            ttBody.innerHTML = l.stops.map((s, i) => {
                const det = db.stopDetails[cleanKey(s.name)] || {outZone: false};
                return `<div class="app-card stop-card" onclick="renderTimetable(${lIdx}, ${i})">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span style="background:var(--accent); width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem;">${i+1}</span>
                        <div><b>${s.name}</b> ${s.nz ? '<span class="badge-inline bg-nz">NŻ</span>' : ''} ${det.outZone ? '<span class="badge-inline bg-strefa">Gr. strefy</span>' : ''}</div>
                    </div>
                </div>`;
            }).join('');
        } else {
            let offset = 0; for(let i=0; i<=sIdx; i++) offset += parseInt(l.stops[i].time);
            const hMap = {};
            let raw = (curDay==='working' ? l.hoursWorking : curDay==='saturday' ? l.hoursSat : l.hoursSun) || "";
            let html = `<div class="timetable-container"><div class="tt-header-box"><b style="color:black;">${l.stops[sIdx].name}</b></div>`;
            if(!raw) html += '<div style="padding:15px; color:black">Brak odjazdów.</div>';
            else {
                raw.split(',').forEach(h => {
                    let p = h.trim().split(':'); if(p.length < 2) return;
                    let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
                    let hr = d.getHours().toString().padStart(2, '0'), mn = d.getMinutes().toString().padStart(2, '0');
                    if(!hMap[hr]) hMap[hr] = []; hMap[hr].push(mn);
                });
                Object.keys(hMap).sort().forEach(hr => html += `<div class="tt-row"><div class="tt-hour-col">${hr}</div><div class="tt-min-col">${hMap[hr].sort().map(m => `<span class="tt-min-val">${m}</span>`).join('')}</div></div>`);
            }
            ttBody.innerHTML = html + `</div>`;
        }
        document.getElementById('tt-back-btn').onclick = () => sIdx === -1 ? show('vars') : renderTimetable(lIdx, -1);
    }
    function setDay(d) { curDay=d; document.querySelectorAll('#tt-day-sel button').forEach(b=>b.style.background='#444'); document.getElementById('btn-'+d).style.background='var(--accent)'; renderTimetable(curLineIdx, curStopIdx); }
    function exportDB() { const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const a = document.createElement('a'); a.href = data; a.download = "mzk_backup.json"; a.click(); }
</script>
</body>
