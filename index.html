<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZK GORZÓW - SYSTEM FACIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk-green: #008744; --mzk-yellow: #feca05; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #222; }
        
        header { background: var(--mzk-green); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--mzk-yellow); }
        nav { display: flex; justify-content: center; gap: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        nav button { background: #eee; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        nav button.active { background: var(--mzk-green); color: white; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }

        /* GRID KAFELKÓW (WIELE W RZĘDZIE) */
        .cat-title { font-weight: 900; text-transform: uppercase; font-size: 0.85rem; color: #666; margin: 25px 0 10px; }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; }
        .line-box { 
            background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px 0; 
            text-align: center; font-weight: 900; font-size: 1.2rem; color: #ccc; cursor: pointer; transition: 0.2s;
        }
        .line-active { border: 2px solid var(--mzk-green); color: #222; }
        .line-active:hover { transform: translateY(-3px); border-color: var(--mzk-yellow); background: #fff; }

        /* LOGIN */
        .login-card { background: white; max-width: 350px; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }

        /* EDITOR UI (OTWIERANY JAKO "NOWA ZAKŁADKA/WIDOK") */
        .editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; }
        .editor-header { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        
        .stop-row { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--mzk-green); }
        .stop-grid { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 10px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-green { background: var(--mzk-green); color: white; }
        .btn-red { background: #e74c3c; color: white; }

        /* ROZKŁAD WIDOK */
        .full-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1500; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<header><h1>MZK GORZÓW - PANEL ZARZĄDZANIA</h1></header>

<nav id="main-nav">
    <button id="nav-lines" class="active" onclick="showSection('lines-sec')">ROZKŁADY</button>
    <button id="nav-admin" onclick="showSection('admin-sec')">ADMIN PANEL</button>
</nav>

<div class="container">
    <div id="lines-sec" class="section active">
        <input type="text" id="search-pax" placeholder="Szukaj linii..." style="width:100%; padding:12px; border-radius:25px; border:2px solid var(--mzk-green); margin-bottom:20px;" oninput="renderGrids()">
        <div id="grid-pax"></div>
    </div>

    <div id="admin-sec" class="section">
        <div id="login-form" class="login-card">
            <h3>Zaloguj jako Facio</h3>
            <input type="text" id="adm-user" placeholder="Login (Facio)">
            <input type="password" id="adm-pass" placeholder="Hasło (Admin123)">
            <button class="btn btn-green" style="width:100%" onclick="tryLogin()">ZALOGUJ</button>
        </div>

        <div id="admin-dashboard" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Wybierz linię do edycji:</h3>
                <button class="btn" onclick="openEditor('new')">+ DODAJ NOWĄ LINIĘ</button>
            </div>
            <div id="grid-admin"></div>
        </div>
    </div>
</div>

<div id="editor-layer" class="editor-overlay">
    <div class="editor-header">
        <h2 id="edit-title">Edycja Linii</h2>
        <button class="btn btn-red" onclick="closeEditor()">ZAMKNIJ BEZ ZAPISU X</button>
    </div>
    <div class="container">
        <div style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <label>Numer Linii:</label>
            <input type="number" id="inp-num" placeholder="np. 104">
            
            <label>Wybierz/Dodaj wariant:</label>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="sel-variant" onchange="loadVariantData(this.value)" style="flex:1; padding:10px; border-radius:8px;"></select>
                <button class="btn btn-red" onclick="deleteVariant()">USUŃ WARIANT</button>
            </div>

            <input type="text" id="inp-target" placeholder="Kierunek (np. PIASKI)">
            <input type="text" id="inp-variant-name" placeholder="Nazwa wariantu (np. przez Estakadę)">
            <textarea id="inp-starts" placeholder="Odjazdy z pętli (np. 06:15, 06:40s, 07:10w)"></textarea>

            <h4>Trasa, Minuty i Przesiadki</h4>
            <div id="stops-list"></div>
            <button class="btn" onclick="addStopRow()" style="width:100%; background:#444; color:white; margin:10px 0;">+ DODAJ PRZYSTANEK</button>

            <button class="btn btn-green" style="width:100%; height:60px; font-size:1.2rem; margin-top:20px;" onclick="saveLine()">ZAPISZ CAŁĄ LINIĘ W SYSTEMIE</button>
        </div>
    </div>
</div>

<script>
    const DB_KEY = 'MZK_FACIO_SYSTEM_V3';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { lines: {}, globalStops: {} };

    // --- LOGOWANIE ---
    function tryLogin() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === 'Facio' && p === 'Admin123') {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            renderGrids();
        } else {
            alert("Błędne dane logowania!");
        }
    }

    // --- EDYTOR ---
    let currentEditingLine = null;

    function openEditor(num) {
        currentEditingLine = num;
        document.getElementById('editor-layer').style.display = 'block';
        document.getElementById('edit-title').innerText = num === 'new' ? "Nowa Linia" : "Edycja Linii " + num;
        document.getElementById('inp-num').value = num === 'new' ? '' : num;
        
        refreshVariantList(num);
        loadVariantData('new');
    }

    function closeEditor() {
        document.getElementById('editor-layer').style.display = 'none';
        renderGrids();
    }

    function refreshVariantList(num) {
        const sel = document.getElementById('sel-variant');
        sel.innerHTML = '<option value="new">-- NOWY WARIANT --</option>';
        if(db.lines[num]) {
            db.lines[num].forEach((v, i) => {
                sel.innerHTML += `<option value="${i}">${v.target} (${v.variant})</option>`;
            });
        }
    }

    function addStopRow(data = {name:'', adj:0}) {
        const cont = document.getElementById('stops-list');
        const id = Math.random().toString(36).substr(2,9);
        const g = db.globalStops[data.name] || {sub:'', trans:''};
        
        const html = `
            <div class="stop-row" id="${id}">
                <div class="stop-grid">
                    <input type="text" class="s-name" placeholder="Nazwa" value="${data.name}" oninput="syncG(this)">
                    <input type="text" class="s-sub" placeholder="Miejsce (Global)" value="${g.sub}" oninput="updateG(this)">
                    <input type="text" class="s-trans" placeholder="Przesiadki" value="${g.trans}" oninput="updateG(this)">
                    <input type="number" class="s-adj" placeholder="+min" value="${data.adj}">
                </div>
                <button class="btn-red" style="padding:2px 10px; margin-top:5px; font-size:0.7rem; border-radius:4px; border:none; cursor:pointer;" onclick="document.getElementById('${id}').remove()">USUŃ PRZYSTANEK</button>
            </div>`;
        cont.insertAdjacentHTML('beforeend', html);
    }

    function syncG(el) {
        const row = el.closest('.stop-row');
        if(db.globalStops[el.value]) {
            row.querySelector('.s-sub').value = db.globalStops[el.value].sub;
            row.querySelector('.s-trans').value = db.globalStops[el.value].trans;
        }
    }

    function updateG(el) {
        const row = el.closest('.stop-row');
        const name = row.querySelector('.s-name').value;
        if(name) db.globalStops[name] = { sub: row.querySelector('.s-sub').value, trans: row.querySelector('.s-trans').value };
    }

    function loadVariantData(idx) {
        if(idx === 'new') {
            document.getElementById('inp-target').value = '';
            document.getElementById('inp-variant-name').value = '';
            document.getElementById('inp-starts').value = '';
            document.getElementById('stops-list').innerHTML = '';
            addStopRow();
            return;
        }
        const v = db.lines[currentEditingLine][idx];
        document.getElementById('inp-target').value = v.target;
        document.getElementById('inp-variant-name').value = v.variant;
        document.getElementById('inp-starts').value = v.starts.join(', ');
        document.getElementById('stops-list').innerHTML = '';
        v.stops.forEach(s => addStopRow(s));
    }

    function saveLine() {
        const num = document.getElementById('inp-num').value;
        const vIdx = document.getElementById('sel-variant').value;
        if(!num) return alert("Podaj numer!");

        const vData = {
            target: document.getElementById('inp-target').value.toUpperCase(),
            variant: document.getElementById('inp-variant-name').value || 'Podstawowy',
            starts: document.getElementById('inp-starts').value.split(',').map(s=>s.trim()),
            stops: Array.from(document.querySelectorAll('.s-name')).map((el, i) => ({
                name: el.value,
                adj: parseInt(document.querySelectorAll('.s-adj')[i].value) || 0
            }))
        };

        if(!db.lines[num]) db.lines[num] = [];
        if(vIdx === 'new') db.lines[num].push(vData);
        else db.lines[num][vIdx] = vData;

        localStorage.setItem(DB_KEY, JSON.stringify(db));
        alert("Zapisano!");
        closeEditor();
    }

    // --- WIDOKI ---
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + id.split('-')[0]).classList.add('active');
    }

    function renderGrids() {
        const pGrid = document.getElementById('grid-pax');
        const aGrid = document.getElementById('grid-admin');
        const q = document.getElementById('search-pax').value;
        
        [pGrid, aGrid].forEach(g => g.innerHTML = '');

        const cats = [
            { t: "Tramwaje", min: 1, max: 15 },
            { t: "Magistrala", min: 100, max: 119 },
            { t: "Autobusy", min: 120, max: 200 }
        ];

        cats.forEach(c => {
            let html = `<div class="cat-title">${c.t}</div><div class="line-grid">`;
            let found = false;
            for(let i=c.min; i<=c.max; i++) {
                if(q && !i.toString().includes(q)) continue;
                const active = db.lines[i] ? 'line-active' : '';
                html += `<div class="line-box ${active}" onclick="${active ? 'openPaxView('+i+')' : ''}">${i}</div>`;
                found = true;
            }
            if(found) pGrid.innerHTML += html + '</div>';

            // Admin Grid (tylko te co istnieją + puste do kliknięcia)
            let aHtml = `<div class="cat-title">${c.t}</div><div class="line-grid">`;
            for(let i=c.min; i<=c.max; i++) {
                const active = db.lines[i] ? 'line-active' : '';
                aHtml += `<div class="line-box ${active}" onclick="openEditor(${i})">${i}</div>`;
            }
            aGrid.innerHTML += aHtml + '</div>';
        });
    }

    function openPaxView(n) {
        alert("Tu otwiera się rozkład linii " + n + " (analogicznie do poprzedniej wersji)");
    }

    renderGrids();
</script>
</body>
</html>
