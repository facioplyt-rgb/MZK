<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW V142</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; 
            --text: #ffffff; --text-sec: #919eab; --border: rgba(255,255,255,0.1); 
            --bus-col: #00ab55; --tram-col: #ff4842;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .section { display: none; } 
        .active-sec { display: block !important; }
        
        header { background: #0b0f19; padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.2rem; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .line-badge { 
            display: inline-flex; align-items: center; justify-content: center; 
            min-width: 48px; height: 38px; border-radius: 12px; font-weight: 900; 
            color: #fff !important; margin-right: 12px; font-size: 1.1rem;
        }
        .badge-bus { background: var(--bus-col); }
        .badge-tram { background: var(--tram-col); }

        .dir-abbr { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; color: #fff; border: 1px solid var(--border); margin-right: 6px; display: inline-block; margin-top: 6px; }

        .group-label { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .group-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 80px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.75rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.4rem; margin-bottom: 6px; }

        /* LISTA PRZYSTANKÓW */
        .stop-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stop-min { width: 50px; font-weight: 800; color: var(--accent); }
        
        .sched-box { margin-top: 10px; padding: 12px; background: var(--surface-light); border-radius: 12px; font-size: 0.85rem; white-space: pre-wrap; }

        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-family: inherit; }
        .main-btn { background: var(--accent); width: 100%; padding: 18px; border-radius: 15px; border: none; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="renderStops()">
        <div id="stops-list"></div>
    </div>

    <div id="s-news" class="section">
        <div id="news-list"></div>
    </div>

    <div id="s-admin" class="section">
        <div id="adm-interface">
            <div class="app-card">
                <h3>Panel Admina (V142)</h3>
                <input type="hidden" id="edit-idx" value="-1">
                <input type="text" id="f-num" placeholder="Nr Linii">
                <input type="text" id="f-abbr" placeholder="Skrót (np. WIEP)">
                <input type="text" id="f-dir" placeholder="Kierunek">
                <select id="f-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                <select id="f-cat"></select>
                <textarea id="f-stops" rows="3" placeholder="Przystanek|Czas"></textarea>
                <textarea id="f-h1" rows="2" placeholder="Robocze"></textarea>
                <textarea id="f-h2" rows="2" placeholder="Soboty"></textarea>
                <textarea id="f-h3" rows="2" placeholder="Niedziele"></textarea>
                <button onclick="saveLine()" class="main-btn">ZAPISZ</button>
            </div>
            <div id="adm-list-lines"></div>
        </div>
    </div>

    <div id="s-details" class="section">
        <div id="details-body"></div>
        <button onclick="show('home')" class="main-btn" style="margin-top:20px; background:#333">POWRÓT</button>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
    <div onclick="show('admin')" id="n-admin"><i class="fa-solid fa-gears"></i><span>Admin</span></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", 
        authDomain: "mzk-by-facio.firebaseapp.com", 
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "mzk-by-facio" 
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], categories: ["Dzienne", "Nocne", "Tramwaje"], news: [] };

    dbRef.on('value', (snap) => {
        const val = snap.val();
        if(val) {
            db = val;
            if(!db.lines) db.lines = [];
            renderApp();
        }
    });

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
        window.scrollTo(0,0);
    }

    function renderApp() {
        // HOME
        const home = document.getElementById('home-content');
        home.innerHTML = '';
        const cats = [...new Set(db.lines.map(l => l.cat || "Inne"))].sort();
        cats.forEach(c => {
            const lines = db.lines.filter(l => l.cat === c);
            if(lines.length > 0) {
                home.innerHTML += `<div class="group-label">${c}</div>`;
                const uniqueNums = [...new Set(lines.map(l => l.num))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
                uniqueNums.forEach(n => {
                    const variants = lines.filter(v => v.num === n);
                    home.innerHTML += `
                        <div class="app-card" onclick="openDetails('${n}')">
                            <div style="display:flex; align-items:center; margin-bottom:10px">
                                <span class="line-badge ${variants[0].type==='tram'?'badge-tram':'badge-bus'}">${n}</span>
                                <b>${variants[0].type==='bus'?'AUTOBUS':'TRAMWAJ'}</b>
                            </div>
                            <div>${variants.map(v => `<span class="dir-abbr">${v.abbr || '??'}</span>`).join('')}</div>
                        </div>`;
                });
            }
        });

        // ADMIN
        document.getElementById('f-cat').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('adm-list-lines').innerHTML = db.lines.map((l, i) => `
            <div style="background:var(--surface-light); padding:10px; margin-top:5px; border-radius:10px; display:flex; justify-content:space-between">
                <span><b>${l.num}</b> -> ${l.dir}</span>
                <button onclick="editLine(${i})" style="color:var(--accent); background:none; border:none; font-weight:bold">EDYCJA</button>
            </div>`).join('');
            
        renderStops();
    }

    function openDetails(num) {
        show('details');
        const variants = db.lines.filter(l => l.num === num);
        let html = `<div class="group-label">Linia ${num}</div>`;
        
        variants.forEach(v => {
            html += `
                <div class="app-card">
                    <div style="display:flex; align-items:center; margin-bottom:15px">
                        <span class="line-badge ${v.type==='tram'?'badge-tram':'badge-bus'}">${v.num}</span>
                        <b>Kierunek: ${v.dir}</b>
                    </div>
                    <div style="margin-bottom:15px">
                        ${v.stops ? v.stops.map(st => `
                            <div class="stop-row">
                                <div class="stop-min">${st.time}'</div>
                                <div class="stop-name">${st.name}</div>
                            </div>
                        `).join('') : 'Brak przystanków'}
                    </div>
                    <div class="sched-box"><b>Dni robocze:</b>\n${v.h1 || '-'}</div>
                    <div class="sched-box"><b>Soboty:</b>\n${v.h2 || '-'}</div>
                    <div class="sched-box"><b>Niedziele:</b>\n${v.h3 || '-'}</div>
                </div>`;
        });
        document.getElementById('details-body').innerHTML = html;
    }

    function saveLine() {
        const idx = parseInt(document.getElementById('edit-idx').value);
        const stopsArr = document.getElementById('f-stops').value.split(',').filter(s => s.includes('|')).map(s => {
            const p = s.split('|');
            return { name: p[0].trim(), time: p[1].trim() };
        });

        const data = {
            num: document.getElementById('f-num').value,
            abbr: document.getElementById('f-abbr').value.toUpperCase(),
            dir: document.getElementById('f-dir').value,
            type: document.getElementById('f-type').value,
            cat: document.getElementById('f-cat').value,
            stops: stopsArr,
            h1: document.getElementById('f-h1').value,
            h2: document.getElementById('f-h2').value,
            h3: document.getElementById('f-h3').value
        };

        if(idx === -1) db.lines.push(data); else db.lines[idx] = data;
        dbRef.set(db).then(() => { alert("Zapisano!"); location.reload(); });
    }

    function editLine(i) {
        const l = db.lines[i];
        document.getElementById('edit-idx').value = i;
        document.getElementById('f-num').value = l.num;
        document.getElementById('f-abbr').value = l.abbr || '';
        document.getElementById('f-dir').value = l.dir;
        document.getElementById('f-type').value = l.type;
        document.getElementById('f-cat').value = l.cat;
        document.getElementById('f-stops').value = l.stops ? l.stops.map(s => `${s.name}|${s.time}`).join(', ') : '';
        document.getElementById('f-h1').value = l.h1 || '';
        document.getElementById('f-h2').value = l.h2 || '';
        document.getElementById('f-h3').value = l.h3 || '';
        window.scrollTo(0,0);
    }

    function renderStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const sMap = {};
        db.lines.forEach(l => {
            if(l.stops) l.stops.forEach(st => {
                if(!sMap[st.name]) sMap[st.name] = [];
                sMap[st.name].push(l);
            });
        });
        const sorted = Object.keys(sMap).sort().filter(s => s.toLowerCase().includes(q));
        document.getElementById('stops-list').innerHTML = sorted.map(name => `
            <div class="app-card" onclick="openStLines('${name}')">
                <b>${name}</b>
                <div style="margin-top:10px">
                    ${sMap[name].map(l => `<span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}" style="height:25px; min-width:60px; font-size:0.7rem;">${l.num} ${l.abbr}</span>`).join('')}
                </div>
            </div>`).join('');
    }

    function openStLines(name) {
        show('details');
        const lines = db.lines.filter(l => l.stops && l.stops.some(st => st.name === name));
        document.getElementById('details-body').innerHTML = `<div class="group-label">Przystanek: ${name}</div>` + lines.map(l => `
            <div class="app-card" onclick="openDetails('${l.num}')">
                <span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}">${l.num}</span> <b>DO: ${l.dir}</b>
            </div>`).join('');
    }
</script>
</body>
</html>
