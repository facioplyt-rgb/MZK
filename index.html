<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .line-square.bus { border-bottom: 4px solid var(--accent); }
        .line-square.tram { border-bottom: 4px solid var(--danger); }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .news-card { display: block; cursor: default; }
        .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .news-date { font-size: 0.7rem; color: var(--accent); font-weight: 700; }
        .news-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; }
        .tag-utrudnienia { background: rgba(255, 72, 66, 0.2); color: var(--danger); }
        .tag-rozklad { background: rgba(0, 171, 85, 0.2); color: var(--accent); }
        .tag-info { background: rgba(24, 144, 255, 0.2); color: var(--info); }

        .search-box { width: 100%; padding: 15px; border-radius: 15px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 15px; font-family: inherit; }
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-top: 12px; }
        .tt-time { background: var(--accent); color: white; padding: 8px 4px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 0.85rem; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: 800; }
        .nearby-info { color: var(--warn); font-size: 0.75rem; margin-top: 3px; font-weight: 400; opacity: 0.9; }
        .stop-lines-row { display: flex; flex-wrap: wrap; align-items: center; margin-top: 8px; color: var(--text-sec); font-size: 0.75rem; gap: 5px; }
        .stop-line-item { display: inline-flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 6px; }
        .stop-line-item i { font-size: 0.65rem; color: var(--accent); }
        .stop-line-item.is-tram i { color: var(--danger); }
        
        /* Zakładki dni w rozkładzie */
        .day-tabs { display: flex; gap: 5px; margin-top: 10px; }
        .day-tab { flex: 1; padding: 8px; background: #0b0f19; border-radius: 8px; font-size: 0.65rem; text-align: center; font-weight: 700; color: var(--text-sec); border: 1px solid transparent; }
        .day-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(0,171,85,0.05); }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        
        .adm-nav-main { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        
        .adm-stop-card { background: #1c252e; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #333; position: relative; }
        .adm-stop-card.is-nz { border-left-color: var(--danger); }
        .adm-stop-card .del-stop { position: absolute; top: 15px; right: 15px; color: var(--danger); cursor: pointer; }
        
        .stop-edit-item { background: #1c252e; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 65px 45px 40px; gap: 8px; align-items: center; }
        .stop-edit-item input { margin: 0; padding: 10px 5px; font-size: 0.85rem; height: 40px; background: #0b0f19; border: 1px solid #333; color: white; }
        .bulk-area { background: #000; border: 1px dashed var(--accent); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <div class="group-label">Wyszukiwarka Przystanków</div>
        <input type="text" id="stop-search" class="search-box" placeholder="Szukaj przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section">
        <div class="group-label">Komunikaty i Zmiany</div>
        <div id="public-news-list"></div>
    </div>
    <div id="s-contact" class="section"><div class="group-label">Informacje</div><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Wróć</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
                <button onclick="setTab('z')" id="mt-z">ZAAW</button>
            </div>
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div class="group-label">Baza Przystanków</div><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:200px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportFullBackup()" class="main-btn">Eksportuj Pełny Backup</button><input type="file" id="importFile" style="display:none" onchange="importFullBackup(event)"><button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj Pełny Backup</button></div>
            <div id="tab-z" class="adm-tab" style="display:none;"><div class="group-label">Kategorie</div><div id="adm-cats-list"></div><input type="text" id="new-cat-name" placeholder="Nowa kategoria..."><button onclick="addCategory()" class="main-btn">Dodaj</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    
    <div class="group-label">Godziny Odjazdów</div>
    <textarea id="fl-hours" placeholder="Dni robocze (np. 08:10, 08:40)"></textarea>
    <textarea id="fl-hours-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-hours-sun" placeholder="Niedziele i Święta"></textarea>

    <div class="bulk-area">
        <textarea id="fl-bulk" placeholder="Wklej listę przystanków..." style="height:80px; margin-bottom:5px;"></textarea>
        <button onclick="convertBulk()" class="main-btn" style="padding:8px; font-size:0.8rem; background:#333;">Konwertuj ↓</button>
    </div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj ręcznie</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-news" class="overlay-form"><h2>News</h2><input type="text" id="fn-title"><select id="fn-cat"><option value="info">Info</option><option value="utrudnienia">Utrudnienia</option><option value="rozklad">Rozkład</option></select><textarea id="fn-content"></textarea><button onclick="saveNews()" class="main-btn">Zapisz</button><button onclick="closeForms()" class="main-btn">Anuluj</button></div>
<div id="form-cat" class="overlay-form"><h2>Edycja Kategorii</h2><input type="text" id="fc-name"><div id="fc-lines-list"></div><button onclick="saveCategoryEdit()" class="main-btn">Zapisz</button><button onclick="closeForms()" class="main-btn">Anuluj</button></div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {}, lineCategories: ["Tramwaje", "Autobusy"] };
    let curLineIdx = -1, curNewsIdx = -1, curCatIdx = -1, allAutoStops = [];

    function init() {
        const local = localStorage.getItem('mzk_v13_multi');
        if(local) { db = JSON.parse(local); repairAllLines(); }
        extractStops(); render();
    }

    // Funkcja pobierająca inne linie na danym przystanku (PRZESIADKI)
    function getTransfers(stopName, currentLineNum) {
        let lines = [];
        db.lines.forEach(l => {
            if(String(l.num) !== String(currentLineNum) && l.stops.some(s => s.name === stopName)) {
                if(!lines.some(e => e.num === l.num)) lines.push({num: l.num, type: l.type});
            }
        });
        return lines.sort((a,b)=>parseInt(a.num)-parseInt(b.num));
    }

    function save() { localStorage.setItem('mzk_v13_multi', JSON.stringify(db)); extractStops(); render(); }
    function extractStops() { let sSet = new Set(); db.lines.forEach(l => l.stops.forEach(s => { if(s.name) { sSet.add(s.name); if(!db.stopDetails[s.name]) db.stopDetails[s.name] = {nearby:"", isNz: s.nz}; } })); allAutoStops = [...sSet].sort(); }
    
    function render() {
        const sHome = document.getElementById('s-home'); sHome.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const linesInCat = db.lines.filter(l => l.category === cat);
            if (linesInCat.length > 0) {
                const label = document.createElement('div'); label.className = 'group-label'; label.innerText = cat; sHome.appendChild(label);
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(linesInCat.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = linesInCat.find(x => x.num === num);
                    const div = document.createElement('div'); div.className = `line-square ${l.type}`; div.innerText = num; div.onclick = () => openVariants(num); grid.appendChild(div);
                }); sHome.appendChild(grid);
            }
        });
        document.getElementById('public-news-list').innerHTML = db.news.map(n => `<div class="app-card news-card"><div class="news-header"><div class="news-date">${n.date}</div><span class="news-tag tag-${n.cat || 'info'}">${n.cat || 'info'}</span></div><div style="font-weight:700;">${n.title}</div><div style="font-size:0.85rem; color:var(--text-sec); margin-top:5px;">${n.content}</div></div>`).reverse().join('');
        document.getElementById('adm-news-list').innerHTML = db.news.map((n, i) => `<div class="app-card"><span><b>${n.title}</b></span><button onclick="deleteNews(${i})">USUŃ</button></div>`).join('');
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact;
        document.getElementById('edit-contact-text').value = db.contact;
        renderAdminStops(); renderCategoriesAdmin(); filterStops();
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", hoursSat:"", hoursSun:"", category:"Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir; document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-hours').value = l.hours || ""; 
        document.getElementById('fl-hours-sat').value = l.hoursSat || "";
        document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category === c ? 'selected' : ''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function renderTimetable(idx) {
        const line = db.lines[idx]; show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let total = 0;
        
        line.stops.forEach((stop, sIdx) => {
            total += parseInt(stop.time) || 0;
            const currentOffset = total;
            const det = db.stopDetails[stop.name] || {nearby:"", isNz: stop.nz};
            const transfers = getTransfers(stop.name, line.num);
            
            const card = document.createElement('div');
            card.className = 'app-card'; card.style.display = 'block';
            
            let transfersHtml = transfers.length ? `<div class="stop-lines-row"><span>Przesiadki:</span> ${transfers.map(t => `<span class="stop-line-item ${t.type==='tram'?'is-tram':''}"><i class="fa-solid fa-${t.type==='tram'?'tram':'bus'}"></i>${t.num}</span>`).join('')}</div>` : '';

            card.innerHTML = `
                <div><b>${stop.name}</b>${det.isNz?'<span class="nz-badge">NŻ</span>':''}
                ${det.nearby?`<div class="nearby-info">${det.nearby}</div>`:''}
                ${transfersHtml}
                </div>
                <div id="g-${sIdx}" style="display:none;">
                    <div class="day-tabs">
                        <div class="day-tab active" onclick="switchDay(${sIdx}, 'work', event)">Robocze</div>
                        <div class="day-tab" onclick="switchDay(${sIdx}, 'sat', event)">Sobota</div>
                        <div class="day-tab" onclick="switchDay(${sIdx}, 'sun', event)">Niedz/Św</div>
                    </div>
                    <div id="times-${sIdx}" class="tt-grid"></div>
                </div>`;
            
            card.onclick = (e) => {
                if(e.target.closest('.day-tab')) return;
                const g = document.getElementById(`g-${sIdx}`);
                g.style.display = g.style.display==='none'?'block':'none';
                if(g.style.display==='block') updateTimes(sIdx, line, currentOffset, 'work');
            };
            body.appendChild(card);
        });
    }

    function updateTimes(sIdx, line, offset, type) {
        const container = document.getElementById(`times-${sIdx}`);
        let hoursSource = line.hours;
        if(type === 'sat') hoursSource = line.hoursSat;
        if(type === 'sun') hoursSource = line.hoursSun;

        if(!hoursSource || hoursSource.trim() === "") {
            container.innerHTML = '<div style="grid-column: 1/-1; font-size:0.7rem; color:var(--danger); padding:10px;">Brak kursów w tym dniu.</div>';
            return;
        }

        container.innerHTML = hoursSource.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length<2) return "";
            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
            return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        }).join('');
    }

    function switchDay(sIdx, type, event) {
        event.stopPropagation();
        const tabs = event.target.parentElement.querySelectorAll('.day-tab');
        tabs.forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        // Znajdź idx linii z aktualnego widoku
        const lineNum = document.getElementById('tt-head').innerText.match(/\d+/)[0];
        const lineDir = document.getElementById('tt-head').querySelector('h2').innerText;
        const lineIdx = db.lines.findIndex(l => String(l.num) === lineNum && l.dir === lineDir);
        
        let total = 0;
        for(let i=0; i<=sIdx; i++) total += parseInt(db.lines[lineIdx].stops[i].time);
        updateTimes(sIdx, db.lines[lineIdx], total, type);
    }

    // --- FUNKCJE POMOCNICZE (BEZ ZMIAN Z ORYGINAŁU) ---
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active'); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.querySelectorAll('.adm-nav-main button').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).style.display='block'; document.getElementById('mt-'+t).classList.add('active'); }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function addStopRow(name = "", time = 2, nz = false) { const div = document.createElement('div'); div.className = 'stop-edit-item'; div.innerHTML = `<input type="text" value="${name}" class="edit-stop-name"><input type="number" value="${time}" class="edit-stop-time"><label>NŻ<input type="checkbox" ${nz?'checked':''} class="edit-stop-nz"></label><button onclick="this.parentElement.remove()">X</button>`; document.getElementById('fl-stops-list').appendChild(div); }
    function saveLine() { const stops = Array.from(document.querySelectorAll('.stop-edit-item')).map(el => ({ name: el.querySelector('.edit-stop-name').value.trim(), time: parseInt(el.querySelector('.edit-stop-time').value) || 0, nz: el.querySelector('.edit-stop-nz').checked })).filter(s => s.name !== ""); const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hours: document.getElementById('fl-hours').value, hoursSat: document.getElementById('fl-hours-sat').value, hoursSun: document.getElementById('fl-hours-sun').value, stops: stops }; if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data; save(); closeForms(); }
    function convertBulk() { const t = document.getElementById('fl-bulk').value; t.split('\n').filter(s => s.trim() !== "").forEach((r, i) => { let nz = r.includes('nż'); let name = r.replace('nż','').trim(); addStopRow(name, (i === 0 ? 0 : 2), nz); }); document.getElementById('fl-bulk').value = ""; }
    function filterStops() { const q = document.getElementById('stop-search').value.toLowerCase(); const list = document.getElementById('public-stops-list'); list.innerHTML = allAutoStops.filter(s => s.toLowerCase().includes(q)).map(s => { const transfers = getTransfers(s, ""); const det = db.stopDetails[s] || {nearby:"", isNz: false}; return `<div class="app-card" style="display:block;"><div><b>${s}</b>${det.isNz?'<span class="nz-badge">NŻ</span>':''}</div><div class="stop-lines-row">${transfers.map(t => `<span class="stop-line-item ${t.type==='tram'?'is-tram':''}"><i class="fa-solid fa-${t.type==='tram'?'tram':'bus'}"></i>${t.num}</span>`).join('')}</div></div>`; }).join(''); }
    function renderAdminStops() { document.getElementById('adm-stops-list').innerHTML = allAutoStops.map(s => `<div class="adm-stop-card"><b>${s}</b></div>`).join(''); }
    function repairAllLines() { db.lines.forEach(l => { if(!l.hoursSat) l.hoursSat = ""; if(!l.hoursSun) l.hoursSun = ""; }); }
    function openVariants(num) { show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`; const list = document.getElementById('vars-list'); list.innerHTML = ''; db.lines.forEach((l, index) => { if(String(l.num) === String(num)) { const d = document.createElement('div'); d.className = "app-card"; d.innerHTML = `<b>Do: ${l.dir}</b>`; d.onclick = () => renderTimetable(index); list.appendChild(d); } }); }

    init();
</script>
</body>
</html>
