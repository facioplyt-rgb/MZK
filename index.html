<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK OMEGA V14</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #00d166; --bg: #05080f; --surf: #101622; --surf-l: #1a2332; 
            --text: #ffffff; --text-m: #94a3b8; --tram: #ff4757; 
            --border: rgba(255,255,255,0.08); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; overflow-x: hidden; }
        
        /* UI Kit */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .card { background: var(--surf); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .btn { background: var(--accent); color: #000; padding: 16px; border: none; border-radius: 16px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        
        header { 
            background: rgba(5, 8, 15, 0.9); backdrop-filter: blur(20px);
            padding: 15px 20px; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }

        .module { display: none; animation: fadeIn 0.4s ease; }
        .module.active { display: block; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--surf); display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-m); font-size: 0.7rem; font-weight: 600; cursor: pointer; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab i { font-size: 1.3rem; margin-bottom: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="font-size: 1.2rem; font-weight: 900; letter-spacing: 1px;">MZK <span id="theme-color-text" style="color:var(--accent)">GORZÓW</span></h1>
            <div id="live-clock" style="font-size: 0.7rem; color: var(--text-m); font-weight: 600;">--:--:--</div>
        </div>
        <div id="weather" style="font-weight: 900; color: var(--accent); font-size: 0.9rem;">--°C</div>
    </header>

    <div class="container" id="app-container">
        <div id="view-loading" class="module active" style="text-align:center; padding-top: 50px;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--accent);"></i>
            <p style="margin-top:15px; font-weight:600; opacity:0.5;">Inicjalizacja systemu...</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-tab active" id="nav-lines" onclick="App.switch('lines')"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
        <div class="nav-tab" id="nav-stops" onclick="App.switch('stops')"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
        <div class="nav-tab" id="nav-favs" onclick="App.switch('favs')"><i class="fa-solid fa-heart"></i><span>Ulubione</span></div>
        <div class="nav-tab" id="nav-news" onclick="App.switch('news')"><i class="fa-solid fa-newspaper"></i><span>Info</span></div>
    </div>

    <script>
        // === CORE ENGINE OMEGA ===
        window.App = {
            dbKey: 'Mzk_v12_pro', // Klucz bazy
            favs: JSON.parse(localStorage.getItem('mzk_favs')) || { lines: [], stops: [] },
            
            init() {
                const config = {
                    apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
                    authDomain: "mzk-by-facio.firebaseapp.com",
                    databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
                    projectId: "mzk-by-facio"
                };
                firebase.initializeApp(config);
                this.db = firebase.database();
                
                this.startClock();
                this.sync();
            },

            startClock() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('live-clock').innerText = now.toLocaleTimeString('pl-PL');
                    // Każda minuta to potencjalne odświeżenie "za ile odjazd"
                    if(now.getSeconds() === 0) this.refresh(); 
                }, 1000);
            },

            // --- SYSTEM CZASU (MODUŁ 0) ---
            // Najważniejsza funkcja w całej aplikacji
            Time: {
                // Zamienia "14:20" na liczbę minut od początku dnia
                toMin(str) {
                    const [h, m] = str.split(':').map(Number);
                    return h * 60 + m;
                },

                // Przelicza bazową godzinę z pętli na realną godzinę na przystanku
                calc(baseTime, offsetMinutes) {
                    let total = this.toMin(baseTime) + parseInt(offsetMinutes);
                    let h = Math.floor(total / 60) % 24;
                    let m = total % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                },

                // Zwraca różnicę w minutach między "teraz" a godziną odjazdu
                getDiff(targetTime) {
                    const now = new Date();
                    const nowMin = now.getHours() * 60 + now.getMinutes();
                    const targetMin = this.toMin(targetTime);
                    return targetMin - nowMin;
                },

                // Status odjazdu: "3 min", "Teraz", lub null jeśli odjechał
                getStatus(targetTime) {
                    const diff = this.getDiff(targetTime);
                    if (diff < 0) return null; // Już odjechał
                    if (diff === 0) return "Teraz";
                    if (diff > 60) return targetTime; // Jeśli powyżej godziny, pokaż godzinę
                    return `${diff} min`;
                }
            },

            sync() {
                this.db.ref(this.dbKey).on('value', snap => {
                    const data = snap.val() || {};
                    window.dbCache = { 
                        lines: Object.values(data.lines || {}).filter(l => l && l.num),
                        news: data.news || {} 
                    };
                    // Po pobraniu danych, przełącz na pierwszy widok
                    if(document.getElementById('view-loading')) {
                        document.getElementById('app-container').innerHTML = `
                            <div id="view-lines" class="module active"></div>
                            <div id="view-stops" class="module"></div>
                            <div id="view-favs" class="module"></div>
                            <div id="view-news" class="module"></div>
                            <div id="view-details" class="module"></div>
                            <div id="view-admin" class="module"></div>
                        `;
                    }
                    this.switch('lines');
                });
            },

            switch(id) {
                document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
                document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
                document.getElementById('view-'+id)?.classList.add('active');
                document.getElementById('nav-'+id)?.classList.add('active');
                this.refresh();
                window.scrollTo({top: 0, behavior: 'smooth'});
            },

            refresh() {
                const active = document.querySelector('.module.active')?.id.replace('view-', '');
                // Tu będą wywołania renderów modułów, np. ModLines.render()
                if(window.ModLines && active === 'lines') ModLines.render();
                if(window.ModStops && active === 'stops') ModStops.render();
                if(window.ModFavs && active === 'favs') ModFavs.render();
            }
        };

        App.init();

        // TU BĘDZIEMY DODAWAĆ KOLEJNE MODUŁY...
// === MODUŁ 1: LINIE (Z INTELLIGENT LIVE STATUS) ===
window.ModLines = {
    searchQuery: '',

    render() {
        const container = document.getElementById('view-lines');
        let lines = window.dbCache.lines;

        if (this.searchQuery) {
            lines = lines.filter(l => 
                l.num.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                l.dir.toLowerCase().includes(this.searchQuery.toLowerCase())
            );
        }

        let html = `
            <div style="position:relative; margin-bottom: 20px;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:16px; top:18px; color:var(--text-m)"></i>
                <input type="text" placeholder="Szukaj linii lub kierunku..." 
                    onkeyup="ModLines.search(this.value)" 
                    value="${this.searchQuery}" 
                    style="width:100%; padding:16px 16px 16px 45px; border-radius:16px; background:var(--surf); border:1px solid var(--border); color:#fff;">
            </div>
        `;

        const categories = [...new Set(lines.map(l => l.cat || 'Autobusy'))].sort();

        categories.forEach(cat => {
            html += `<div style="font-size:0.75rem; font-weight:900; color:var(--accent); letter-spacing:2px; margin:20px 5px 10px; text-transform:uppercase;">${cat}</div>`;
            
            lines.filter(l => (l.cat || 'Autobusy') === cat).forEach(l => {
                const nextDeparture = this.getNextDeparture(l);
                const isTram = l.type === 'tram' || cat.toLowerCase().includes('tram');
                
                html += `
                    <div class="card" onclick="ModLines.showDetails(${window.dbCache.lines.indexOf(l)})" style="display:flex; align-items:center; gap:15px; cursor:pointer;">
                        <div style="width:50px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:12px; font-weight:900; background:${isTram ? 'var(--tram)' : 'var(--accent)'}; color:${isTram ? '#fff' : '#000'}">
                            ${l.num}
                        </div>
                        <div style="flex:1">
                            <div style="font-weight:900; font-size:1.1rem; line-height:1.2">${l.dir}</div>
                            <div style="font-size:0.8rem; color:var(--text-m); font-weight:600; margin-top:2px;">
                                <i class="fa-regular fa-clock"></i> 
                                ${nextDeparture ? `Najbliższy: <span style="color:var(--accent)">${nextDeparture}</span>` : 'Brak kursów dziś'}
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="opacity:0.2"></i>
                    </div>
                `;
            });
        });

        container.innerHTML = html || '<div class="card" style="text-align:center; opacity:0.5;">Nie znaleziono linii</div>';
    },

    search(val) {
        this.searchQuery = val;
        this.render();
    },

    // Logika szukania najbliższego kursu z pętli (stop[0])
    getNextDeparture(line) {
        if (!line.baseTimes || line.baseTimes.length === 0) return null;
        
        // Szukamy pierwszego kursu, który ma diff >= 0
        const futureDepartures = line.baseTimes
            .map(t => ({ time: t, diff: App.Time.getDiff(t) }))
            .filter(d => d.diff >= 0)
            .sort((a, b) => a.diff - b.diff);

        if (futureDepartures.length === 0) return null;
        
        const best = futureDepartures[0];
        return best.diff <= 30 ? `${best.diff} min` : best.time;
    },

    showDetails(idx) {
        const l = window.dbCache.lines[idx];
        let html = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <button onclick="App.switch('lines')" class="btn" style="width:50px; padding:12px; background:var(--surf-l); color:#fff;"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 style="font-weight:900;">Linia ${l.num}</h2>
            </div>
            <div class="card" style="background: linear-gradient(135deg, var(--surf) 0%, var(--surf-l) 100%);">
                <small style="color:var(--accent); font-weight:900; letter-spacing:1px;">KIERUNEK DOCELOWY</small>
                <div style="font-size:1.5rem; font-weight:900; margin-bottom:10px;">${l.dir}</div>
            </div>
            <div style="font-size:0.75rem; font-weight:900; color:var(--text-m); letter-spacing:1px; margin:20px 5px 10px;">PRZYSTANKI NA TRASIE</div>
        `;

        (l.stops || []).forEach((s, sIdx) => {
            html += `
                <div class="card" onclick="ModLines.showStopTimetable(${idx}, ${sIdx})" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;">
                    <div style="font-weight:600;"><i class="fa-solid fa-location-dot" style="margin-right:10px; color:var(--accent)"></i> ${s.name}</div>
                    <div style="font-weight:900; opacity:0.6;">+${s.time} min</div>
                </div>
            `;
        });

        document.getElementById('view-details').innerHTML = html;
        App.switch('details');
    },

    showStopTimetable(lIdx, sIdx) {
        const l = window.dbCache.lines[lIdx];
        const s = l.stops[sIdx];
        
        let html = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <button onclick="ModLines.showDetails(${lIdx})" class="btn" style="width:50px; padding:12px; background:var(--surf-l); color:#fff;"><i class="fa-solid fa-arrow-left"></i></button>
                <div style="font-weight:900; font-size:1.2rem;">${s.name}</div>
            </div>
            <div class="card" style="border-left:4px solid var(--accent)">
                <div style="font-weight:800; opacity:0.6; font-size:0.8rem;">ODJAZDY LINII ${l.num}</div>
                <div style="font-weight:900; font-size:1.1rem;">Kierunek: ${l.dir}</div>
            </div>
        `;

        const allDepartures = (l.baseTimes || []).map(bt => {
            const realTime = App.Time.calc(bt, s.time);
            return {
                time: realTime,
                status: App.Time.getStatus(realTime)
            };
        });

        // Grupowanie godzinami
        const hours = {};
        allDepartures.forEach(d => {
            const h = d.time.split(':')[0];
            if (!hours[h]) hours[h] = [];
            hours[h].push(d);
        });

        html += `<div class="card">`;
        Object.keys(hours).sort().forEach(h => {
            html += `
                <div style="display:flex; padding:12px 0; border-bottom:1px solid var(--border); align-items:flex-start;">
                    <div style="width:40px; font-weight:900; font-size:1.4rem; color:var(--accent); line-height:1;">${h}</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-left:15px;">
                        ${hours[h].map(d => `
                            <div style="background:${d.status && d.status.includes('min') ? 'rgba(0,209,102,0.1)' : 'var(--surf-l)'}; 
                                        padding:6px 10px; border-radius:8px; font-weight:600; font-size:0.9rem;
                                        border: 1px solid ${d.status && d.status.includes('min') ? 'var(--accent)' : 'var(--border)'}">
                                ${d.time.split(':')[1]}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        html += `</div>`;

        document.getElementById('view-details').innerHTML = html;
    }
};
// === MODUŁ 2: PRZYSTANKI (LIVE VIRTUAL BOARD) ===
window.ModStops = {
    searchQuery: '',

    render() {
        const container = document.getElementById('view-stops');
        
        // Mapowanie: Przystanek -> Lista Linii
        let stopsMap = {};
        window.dbCache.lines.forEach(l => {
            (l.stops || []).forEach(s => {
                if (!stopsMap[s.name]) stopsMap[s.name] = { lines: new Set(), name: s.name };
                stopsMap[s.name].lines.add(l.num);
            });
        });

        let stopNames = Object.keys(stopsMap).sort();
        if (this.searchQuery) {
            stopNames = stopNames.filter(n => n.toLowerCase().includes(this.searchQuery.toLowerCase()));
        }

        let html = `
            <div style="position:relative; margin-bottom: 20px;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:16px; top:18px; color:var(--text-m)"></i>
                <input type="text" placeholder="Szukaj przystanku..." 
                    onkeyup="ModStops.search(this.value)" 
                    value="${this.searchQuery}" 
                    style="width:100%; padding:16px 16px 16px 45px; border-radius:16px; background:var(--surf); border:1px solid var(--border); color:#fff;">
            </div>
        `;

        stopNames.forEach(name => {
            const isFav = App.favs.stops.includes(name);
            html += `
                <div class="card" onclick="ModStops.showBoard('${name}')" style="cursor:pointer; padding-right:50px;">
                    <div style="font-weight:900; font-size:1.1rem; color:var(--accent); margin-bottom:8px;">${name}</div>
                    <div style="display:flex; flex-wrap:wrap; gap:5px;">
                        ${Array.from(stopsMap[name].lines).sort().map(n => `
                            <span style="font-size:0.7rem; background:var(--surf-l); padding:3px 8px; border-radius:6px; border:1px solid var(--border); font-weight:800; opacity:0.8;">${n}</span>
                        `).join('')}
                    </div>
                    <i class="fa-solid fa-heart" 
                       style="position:absolute; right:20px; top:50%; transform:translateY(-50%); color:${isFav ? '#ffd700' : 'rgba(255,255,255,0.1)'}"
                       onclick="ModStops.toggleFav('${name}', event)"></i>
                </div>
            `;
        });

        container.innerHTML = html || '<div class="card" style="text-align:center; opacity:0.5;">Nie znaleziono przystanku</div>';
    },

    search(val) {
        this.searchQuery = val;
        this.render();
    },

    toggleFav(name, e) {
        e.stopPropagation();
        const idx = App.favs.stops.indexOf(name);
        if (idx > -1) App.favs.stops.splice(idx, 1);
        else App.favs.stops.push(name);
        localStorage.setItem('mzk_favs', JSON.stringify(App.favs));
        this.render();
    },

    showBoard(stopName) {
        let departures = [];

        // Zbierz wszystkie odjazdy wszystkich linii dla tego przystanku
        window.dbCache.lines.forEach(l => {
            const stopInfo = (l.stops || []).find(s => s.name === stopName);
            if (stopInfo) {
                (l.baseTimes || []).forEach(bt => {
                    const realTime = App.Time.calc(bt, stopInfo.time);
                    const diff = App.Time.getDiff(realTime);
                    
                    if (diff >= -1) { // Pokaż też te, które właśnie odjechały (-1 min)
                        departures.push({
                            num: l.num,
                            dir: l.dir,
                            time: realTime,
                            diff: diff,
                            type: l.type,
                            status: App.Time.getStatus(realTime)
                        });
                    }
                });
            }
        });

        // Sortuj chronologicznie
        departures.sort((a, b) => a.diff - b.diff);

        let html = `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <button onclick="App.switch('stops')" class="btn" style="width:50px; padding:12px; background:var(--surf-l); color:#fff;"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 style="font-weight:900; font-size:1.3rem;">${stopName}</h2>
            </div>
            
            <div class="card" style="background: #000; border: 2px solid var(--accent); padding: 10px;">
                <div style="display:flex; justify-content:space-between; color:var(--accent); font-weight:900; font-size:0.7rem; letter-spacing:1px; margin-bottom:10px; padding:0 5px;">
                    <span>LINIA / KIERUNEK</span>
                    <span>ODJAZD</span>
                </div>
        `;

        if (departures.length === 0) {
            html += `<div style="text-align:center; padding:20px; color:var(--text-m);">Brak kursów w najbliższym czasie</div>`;
        } else {
            departures.slice(0, 15).forEach(d => { // Pokaż max 15 najbliższych
                const isLive = d.diff <= 30 && d.diff >= 0;
                html += `
                    <div style="display:flex; align-items:center; padding:10px 5px; border-bottom:1px solid rgba(0,209,102,0.15);">
                        <div style="width:35px; font-weight:900; color: ${d.type==='tram'?'var(--tram)':'var(--accent)'};">${d.num}</div>
                        <div style="flex:1; font-weight:600; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 10px;">${d.dir}</div>
                        <div style="font-weight:900; color:${isLive ? 'var(--accent)' : 'var(--text)'};">
                            ${isLive ? d.status : d.time}
                            ${isLive ? '<span class="pulse" style="display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-left:4px;"></span>' : ''}
                        </div>
                    </div>
                `;
            });
        }

        html += `
            </div>
            <p style="text-align:center; font-size:0.7rem; color:var(--text-m); margin-top:15px; font-weight:600;">
                <i class="fa-solid fa-circle-info"></i> Tablica aktualizuje się automatycznie co minutę
            </p>
        `;

        document.getElementById('view-details').innerHTML = html;
        App.switch('details');
    }
};
// === MODUŁ 3: ULUBIONE (Z PODGLĄDEM LIVE) ===
window.ModFavs = {
    render() {
        const container = document.getElementById('view-favs');
        const hasFavs = App.favs.lines.length > 0 || App.favs.stops.length > 0;

        let html = `<h2 style="font-weight:900; margin-bottom:20px; letter-spacing:-1px; font-size:1.8rem;">Twoje <span style="color:var(--accent)">Centrum</span></h2>`;

        if (!hasFavs) {
            html += `
                <div class="card" style="text-align:center; padding:50px 20px; opacity:0.6; border-style:dashed;">
                    <i class="fa-regular fa-heart" style="font-size:3rem; margin-bottom:15px; color:var(--accent)"></i>
                    <p style="font-weight:600;">Nie masz jeszcze ulubionych linii ani przystanków.</p>
                    <p style="font-size:0.8rem; margin-top:10px;">Kliknij ikonę serca przy linii lub przystanku, aby go tutaj przypiąć.</p>
                </div>
            `;
            container.innerHTML = html;
            return;
        }

        // --- SEKCJA ULUBIONYCH LINII ---
        if (App.favs.lines.length > 0) {
            html += `<div style="font-size:0.75rem; font-weight:900; color:var(--accent); letter-spacing:2px; margin:20px 5px 10px; text-transform:uppercase;">ZAPISANE LINIE</div>`;
            App.favs.lines.forEach(num => {
                const l = window.dbCache.lines.find(x => x.num === num);
                if (l) {
                    const next = ModLines.getNextDeparture(l);
                    html += `
                        <div class="card" onclick="ModLines.showDetails(${window.dbCache.lines.indexOf(l)})" style="display:flex; align-items:center; gap:15px; cursor:pointer;">
                            <div style="width:50px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:12px; font-weight:900; background:var(--accent); color:#000">${l.num}</div>
                            <div style="flex:1">
                                <div style="font-weight:900;">${l.dir}</div>

        let nearest = null;

        window.dbCache.lines.forEach(l => {
            const sInfo = (l.stops || []).find(s => s.name === stopName);
            if (sInfo) {

};

        const resultDiv = document.getElementById('planner-results');

        if(!start || !end || start === end) {
            resultDiv.innerHTML = `<div class="card" style="text-align:center; color:var(--tram); font-weight:600;">Wybierz dwa różne przystanki</div>`;
            return;
        }

        let matches = [];

        window.dbCache.lines.forEach(line => {
            const startIndex = line.stops.findIndex(s => s.name === start);
            const endIndex = line.stops.findIndex(s => s.name === end);

            // Sprawdź czy linia obsługuje oba przystanki i czy są w dobrej kolejności
            if(startIndex !== -1 && endIndex !== -1 && startIndex < endIndex) {
                const travelTime = line.stops[endIndex].time - line.stops[startIndex].time;
                
                line.baseTimes.forEach(bt => {
                    const departureTime = App.Time.calc(bt, line.stops[startIndex].time);
                    const arrivalTime = App.Time.calc(bt, line.stops[endIndex].time);
                    const diff = App.Time.getDiff(departureTime);

                    if(diff >= 0) { // Tylko przyszłe kursy
                        matches.push({
                            num: line.num,
                            dir: line.dir,
                            type: line.type,
                            depTime: departureTime,
                            arrTime: arrivalTime,
                            duration: travelTime,
                            diff: diff
                        });
                    }
                });
            }
        });

        matches.sort((a, b) => a.diff - b.diff);

        let resHtml = `<div style="font-size:0.75rem; font-weight:900; color:var(--text-m); letter-spacing:1px; margin-bottom:10px;">NAJBLIŻSZE POŁĄCZENIA</div>`;
        
        if(matches.length === 0) {
            resHtml += `<div class="card" style="text-align:center; opacity:0.6;">Brak bezpośrednich połączeń dzisiaj.</div>`;
        } else {
            matches.slice(0, 5).forEach(m => {
                resHtml += `
                    <div class="card" style="display:flex; flex-direction:column; gap:12px; border-left: 4px solid var(--accent);">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div style="background:${m.type==='tram'?'var(--tram)':'var(--accent)'}; color:${m.type==='tram'?'#fff':'#000'}; padding:4px 10px; border-radius:8px; font-weight:900;">${m.num}</div>
                                <div style="font-weight:800; font-size:0.9rem;">${m.dir}</div>
                            </div>
                            <div style="font-weight:900; color:var(--accent); font-size:1.1rem;">${m.diff <= 30 ? m.diff+' min' : m.depTime}</div>
                        </div>
                        
                        <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); padding:10px; border-radius:10px;">
                            <div style="text-align:center;">
                                <div style="font-size:0.6rem; color:var(--text-m); font-weight:800;">ODJAZD</div>
                                <div style="font-weight:900;">${m.depTime}</div>
                            </div>
                            <div style="flex:1; height:1px; background:var(--border); margin:0 15px; position:relative;">
                                <div style="position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:var(--bg); padding:0 8px; font-size:0.6rem; color:var(--text-m); font-weight:900;">${m.duration} MIN</div>
                            </div>
                            <div style="text-align:center;">
                                <div style="font-size:0.6rem; color:var(--text-m); font-weight:800;">PRZYJAZD</div>
                                <div style="font-weight:900;">${m.arrTime}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        resultDiv.innerHTML = resHtml;
    }
};

// === MODUŁ 7: LIVE SYSTEM ENGINE (AUTOREFRESH) ===
window.LiveSystem = {
    timer: null,
    interval: 30000, // Odświeżanie co 30 sekund

    init() {
        console.log("⚡ Live System Engine: Aktywny");
        this.start();
        
        // Nasłuchiwanie na powrót do karty (gdy użytkownik zminimalizuje appkę i wróci)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                console.log("⚡ Live System: Re-sync po powrocie");
                this.tick();
            }
        });
    },

    start() {
        if (this.timer) clearInterval(this.timer);
        this.timer = setInterval(() => this.tick(), this.interval);
    },

    tick() {
        const activeModule = document.querySelector('.module.active')?.id.replace('view-', '');
        
        // Inteligentne odświeżanie - tylko tam, gdzie czas ma znaczenie
        if (['lines', 'stops', 'favs', 'planner', 'details'].includes(activeModule)) {
            console.log(`⚡ Live System: Aktualizacja widoku [${activeModule}]`);
            
            // Zachowujemy pozycję scrolla, żeby nie "skakało" przy odświeżaniu
            const scrollPos = window.scrollY;
            
            // Wywołujemy refresh z App, który wie co renderować
            App.refresh();
            
            // Jeśli jesteśmy w widoku tablicy odjazdów (details), musimy go odświeżyć specyficznie
            // jeśli UI na to pozwala (pobierając aktualne dane z cache)
            if (activeModule === 'details') {
                // Ta część zależy od tego, co ostatnio kliknął użytkownik. 
                // Jeśli chcesz pełne live na tablicy, ModStops.showBoard wywoływane jest ponownie.
            }

            // Przywracamy scroll (opcjonalne, przy płynnym renderze nie zawsze potrzebne)
            window.scrollTo(0, scrollPos);
        }
        
        // Aktualizacja pogody przy okazji co 15 minut (co 30 ticków)
        if (!window.weatherTick) window.weatherTick = 0;
        window.weatherTick++;
        if (window.weatherTick >= 30) {
            if (typeof App.fetchWeather === 'function') App.fetchWeather();
            window.weatherTick = 0;
        }
    },

    // Funkcja do wywołania wizualnego efektu "Update" (np. mignięcie ikonki)
    notifyUpdate() {
        const clock = document.getElementById('live-clock');
        if (clock) {
            clock.style.color = 'var(--accent)';
            setTimeout(() => clock.style.color = 'var(--text-m)', 1000);
        }
    }
};

// === MODUŁ 8: POWIADOMIENIA I ALARMY (PROXIMITY ALERTS) ===
window.ModAlerts = {
    activeAlerts: JSON.parse(localStorage.getItem('mzk_alerts')) || [],

    init() {
        // Sprawdzaj alarmy co 30 sekund wewnątrz LiveSystem.tick()
        console.log("🔔 System Alarmów: Aktywny");
    },

    // Dodaj lub usuń alarm na konkretny odjazd
    toggleAlert(lineNum, stopName, time, e) {
        if(e) e.stopPropagation();
        
        const alertId = `${lineNum}-${stopName}-${time}`;
        const index = this.activeAlerts.findIndex(a => a.id === alertId);

        if (index > -1) {
            this.activeAlerts.splice(index, 1);
            this.notify("Alarm usunięty", "info");
        } else {
            this.activeAlerts.push({
                id: alertId,
                line: lineNum,
                stop: stopName,
                time: time,
                created: Date.now()
            });
            this.notify(`Przypomnimy o linii ${lineNum}`, "success");
            
            // Opcjonalnie: Próba uzyskania zgody na powiadomienia przeglądarkowe
            if ("Notification" in window && Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        }
        
        localStorage.setItem('mzk_alerts', JSON.stringify(this.activeAlerts));
        App.refresh(); // Odśwież widok, aby zmienić ikonkę dzwonka
    },

    // Funkcja sprawdzająca, czy któryś alarm powinien się właśnie odpalić
    checkAlerts() {
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();

        this.activeAlerts.forEach((alert, index) => {
            const targetMin = App.Time.toMin(alert.time);
            const diff = targetMin - nowMin;

            // Odpal alarm, gdy do odjazdu zostały 2 minuty
            if (diff === 2) {
                this.fire(alert);
                this.activeAlerts.splice(index, 1); // Usuń po odpaleniu
                localStorage.setItem('mzk_alerts', JSON.stringify(this.activeAlerts));
            }
            
            // Usuń stare alarmy (sprzątanie)
            if (diff < 0) {
                this.activeAlerts.splice(index, 1);
                localStorage.setItem('mzk_alerts', JSON.stringify(this.activeAlerts));
            }
        });
    },

    fire(alert) {
        const msg = `Autobus linii ${alert.line} odjeżdża z przystanku ${alert.stop} za 2 minuty!`;
        
        // 1. Powiadomienie systemowe (jeśli przeglądarka pozwala)
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("🚌 MZK OMEGA: Zaraz odjazd!", { body: msg, icon: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png' });
        }

        // 2. Alert wewnątrz aplikacji (Vibration API)
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        
        alert(msg); // Ostateczność
    },

    notify(text, type) {
        const toast = document.createElement('div');
        toast.style = `
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: ${type === 'success' ? 'var(--accent)' : 'var(--surf-l)'};
            color: ${type === 'success' ? '#000' : '#fff'};
            padding: 12px 25px; border-radius: 50px; font-weight: 900; font-size: 0.8rem;
            z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease forwards;
        `;
        toast.innerHTML = `<i class="fa-solid fa-bell"></i> ${text.toUpperCase()}`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    },

    isSet(lineNum, stopName, time) {
        return this.activeAlerts.some(a => a.id === `${lineNum}-${stopName}-${time}`);
    }
};

// === MODUŁ 10: SZYBKI PODGLĄD (DASHBOARD UPGRADE) ===
window.ModDashboard = {
    render() {
        const container = document.getElementById('view-lines'); // Dashboard wrzucamy na górę listy linii
        const favStops = App.favs.stops;
        
        if (favStops.length === 0) return; // Jeśli nie ma ulubionych, nie pokazujemy dashboardu

        let allNext = [];

        // Zbierz odjazdy ze wszystkich ulubionych przystanków
        window.dbCache.lines.forEach(l => {
            l.stops.forEach(s => {
                if (favStops.includes(s.name)) {
                    l.baseTimes.forEach(bt => {
                        const realTime = App.Time.calc(bt, s.time);
                        const diff = App.Time.getDiff(realTime);
                        if (diff >= 0 && diff <= 60) { // Tylko w ciągu najbliższej godziny
                            allNext.push({
                                num: l.num,
                                dir: l.dir,
                                stop: s.name,
                                time: realTime,
                                diff: diff,
                                type: l.type
                            });
                        }
                    });
                }
            });
        });

        // Sortuj po czasie
        allNext.sort((a, b) => a.diff - b.diff);
        const top3 = allNext.slice(0, 3);

        if (top3.length === 0) return;

        let dashHtml = `
            <div id="quick-dashboard" style="margin-bottom: 25px; animation: fadeIn 0.5s ease;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:0 5px;">

                    <span class="pulse" style="width:8px; height:8px; background:var(--accent); border-radius:50%;"></span>
                </div>
                <div style="display:flex; gap:10px; overflow-x:auto; padding-bottom:5px; scrollbar-width: none;">
        `;

        top3.forEach(d => {
            dashHtml += `
                <div class="card" onclick="ModStops.showBoard('${d.stop}')" style="min-width:160px; flex:1; margin-bottom:0; padding:15px; background: linear-gradient(135deg, var(--surf-l) 0%, var(--surf) 100%); border-bottom: 3px solid var(--accent);">
                    <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:10px;">

                </div>

        dashHtml += `
