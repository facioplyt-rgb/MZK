<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V126</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; 
            --text: #ffffff; --text-sec: #919eab; --border: rgba(255,255,255,0.08); 
            --bus-col: #00ab55; --tram-col: #ff4842; --warn: #feca05;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 120px; overflow-x: hidden; }
        
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        header { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(20px); padding: 25px 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .app-card { background: var(--surface); padding: 22px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .line-main-card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); padding: 22px; margin-bottom: 22px; cursor: pointer; }
        
        .line-badge { display: inline-flex; align-items: center; justify-content: center; padding: 8px 14px; border-radius: 12px; font-weight: 800; color: white; }
        .badge-bus { background: linear-gradient(135deg, var(--bus-col), #008a45); }
        .badge-tram { background: linear-gradient(135deg, var(--tram-col), #d63933); }

        .dir-abbr { background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; color: var(--text); border: 1px solid var(--border); font-weight: 800; margin-right: 5px; }
        .transfer-eta { font-size: 0.75rem; font-weight: 900; margin-left: 8px; color: #fff; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
        .mini-dir { font-size: 0.65rem; opacity: 0.9; margin-left: 6px; background: rgba(0,0,0,0.25); padding: 2px 5px; border-radius: 4px; }
        
        .group-label { font-size: 0.85rem; color: var(--text-sec); text-transform: uppercase; margin: 30px 0 15px 5px; font-weight: 700; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(20px); display: flex; height: 85px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.75rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.4rem; margin-bottom: 6px; }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-light); color: white; }
        .main-btn { background: #333; width: 100%; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: 800; cursor: pointer; margin-top: 5px; }
        .edit-btn { background: var(--warn); color: #000; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; border: none; cursor: pointer; }
        .del-btn { background: var(--tram-col); color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="🔍 Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    
    <div id="s-contact" class="section">
        <div id="contact-display" class="app-card"></div>
        <div class="app-card">
            <input type="password" id="pass" placeholder="Hasło Admina">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none; margin-top:20px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="showTab('tab-lines')" class="main-btn">Linie</button>
                <button onclick="showTab('tab-news')" class="main-btn">News/Kategorie</button>
            </div>
            
            <div id="tab-lines" style="display:none;">
                <h4 id="line-form-title">Dodaj Linię</h4>
                <input type="hidden" id="edit-line-idx" value="-1">
                <input type="text" id="l-num" placeholder="Nr linii">
                <input type="text" id="l-dir" placeholder="Kierunek">
                <select id="l-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
                <select id="l-cat-select"></select>
                <textarea id="l-stops" placeholder="Przystanek|Czas, Przystanek|Czas..."></textarea>
                <textarea id="l-hw" placeholder="Godziny Robocze (HH:MM, HH:MM...)"></textarea>
                <textarea id="l-hs" placeholder="Godziny Sobota"></textarea>
                <textarea id="l-hn" placeholder="Godziny Niedziela"></textarea>
                <button id="line-save-btn" onclick="saveLine()" class="main-btn" style="background:var(--accent)">Zapisz Linię</button>
                <button id="line-cancel-btn" onclick="cancelEdit()" class="main-btn" style="display:none;">Anuluj Edycję</button>
                <div id="adm-lines-list" style="margin-top:20px;"></div>
            </div>

            <div id="tab-news" style="display:none;">
                <h4>Zarządzaj Kategoriami</h4>
                <input type="text" id="new-cat-name" placeholder="Nazwa kategorii">
                <button onclick="addCategory()" class="main-btn">Dodaj Kategorię</button>
                <div id="adm-cats-list" style="margin-bottom:20px;"></div>
                
                <h4>Dodaj News</h4>
                <input type="text" id="n-title" placeholder="Tytuł newsa">
                <select id="n-cat-select"></select>
                <textarea id="n-content" placeholder="Treść..."></textarea>
                <button onclick="saveNews()" class="main-btn" style="background:var(--accent)">Opublikuj News</button>
                <div id="adm-news-list"></div>
            </div>
        </div>
    </div>

    <div id="s-vars" class="section"><div id="vars-list"></div><button onclick="show('home')" class="main-btn">Wróć</button></div>
    <div id="s-stop-lines" class="section"><div id="sl-list"></div><button onclick="show('stops')" class="main-btn">Wróć</button></div>
    <div id="s-tt" class="section">
        <div id="tt-day-sel" style="display:none; gap:10px; margin-bottom:15px;">
            <button class="day-btn active" id="btn-working" onclick="setDay('working')">Robocze</button>
            <button class="day-btn" id="btn-saturday" onclick="setDay('saturday')">Soboty</button>
            <button class="day-btn" id="btn-sunday" onclick="setDay('sunday')">Niedz</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn">Wróć</button>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-newspaper"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-gears"></i><span>Admin</span></div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], categories: ["Dzienne", "Nocne", "Tramwaje"], news: [], newsCategories: ["Komunikaty"], stopDetails: {} };
    let curLineIdx = -1, curDay = 'working', curStopIdx = -1, allStops = [];

    function cleanKey(n) { return n ? n.trim().replace(/[.#$[\]]/g, "") : "unknown"; }
    function getDirAbbr(dir) {
        if(!dir) return "??";
        const w = dir.trim().split(/\s+/);
        return w.length === 1 ? w[0].substring(0,3).toUpperCase() : (w[0][0] + w[w.length-1].substring(0,2)).toUpperCase();
    }

    dbRef.on('value', (s) => {
        const val = s.val(); if(val) { db = val; if(!db.lines) db.lines=[]; render(); }
    });

    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); 
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
    }

    function showTab(tid) { ['tab-lines', 'tab-news'].forEach(t => document.getElementById(t).style.display = t === tid ? 'block' : 'none'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }

    function render() {
        // Render Linii
        const h = document.getElementById('s-home'); h.innerHTML = '';
        (db.categories || []).forEach(cat => {
            const lins = db.lines.filter(l => l.cat === cat);
            if(lins.length) {
                h.innerHTML += `<div class="group-label">${cat}</div>`;
                const uniqueNums = [...new Set(lins.map(l => l.num))].sort((a,b)=>a-b);
                uniqueNums.forEach(num => {
                    const vars = lins.filter(v => v.num === num);
                    h.innerHTML += `<div class="line-main-card" onclick="openVars('${num}')">
                        <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
                            <span class="line-badge ${vars[0].type==='tram'?'badge-tram':'badge-bus'}">${num}</span>
                            <b>${vars[0].type==='bus'?'AUTOBUS':'TRAMWAJ'}</b>
                        </div>
                        <div>${vars.map(v => `<span class="dir-abbr">${getDirAbbr(v.dir)}</span>`).join('')}</div>
                    </div>`;
                });
            }
        });

        // Update Selectów
        const lSel = document.getElementById('l-cat-select');
        const nSel = document.getElementById('n-cat-select');
        lSel.innerHTML = (db.categories || []).map(c => `<option value="${c}">${c}</option>`).join('');
        nSel.innerHTML = (db.newsCategories || []).map(c => `<option value="${c}">${c}</option>`).join('');

        // Admin listy
        renderAdmLines();
        renderAdmCats();
        renderStopsList();
        renderPublicNews();
    }

    // --- LOGIKA LINII ---
    function saveLine() {
        const idx = parseInt(document.getElementById('edit-line-idx').value);
        const stops = document.getElementById('l-stops').value.split(',').map(s => {
            const p = s.split('|'); return { name: p[0].trim(), time: p[1]||0 };
        });
        const lineData = {
            num: document.getElementById('l-num').value,
            dir: document.getElementById('l-dir').value,
            type: document.getElementById('l-type').value,
            cat: document.getElementById('l-cat-select').value,
            stops: stops,
            hoursWorking: document.getElementById('l-hw').value,
            hoursSat: document.getElementById('l-hs').value,
            hoursSun: document.getElementById('l-hn').value
        };

        if(idx === -1) db.lines.push(lineData);
        else db.lines[idx] = lineData;

        dbRef.set(db).then(() => { alert("Zapisano!"); cancelEdit(); });
    }

    function editLine(i) {
        const l = db.lines[i];
        document.getElementById('edit-line-idx').value = i;
        document.getElementById('l-num').value = l.num;
        document.getElementById('l-dir').value = l.dir;
        document.getElementById('l-type').value = l.type;
        document.getElementById('l-cat-select').value = l.cat;
        document.getElementById('l-stops').value = l.stops.map(s => `${s.name}|${s.time}`).join(', ');
        document.getElementById('l-hw').value = l.hoursWorking;
        document.getElementById('l-hs').value = l.hoursSat;
        document.getElementById('l-hn').value = l.hoursSun;
        
        document.getElementById('line-form-title').innerText = "Edytuj Linię " + l.num;
        document.getElementById('line-save-btn').innerText = "Zapisz Zmiany";
        document.getElementById('line-cancel-btn').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        document.getElementById('edit-line-idx').value = -1;
        document.getElementById('line-form-title').innerText = "Dodaj Linię";
        document.getElementById('line-save-btn').innerText = "Zapisz Linię";
        document.getElementById('line-cancel-btn').style.display = "none";
        ['l-num', 'l-dir', 'l-stops', 'l-hw', 'l-hs', 'l-hn'].forEach(id => document.getElementById(id).value = '');
    }

    function renderAdmLines() {
        const list = document.getElementById('adm-lines-list');
        list.innerHTML = '<h4>Lista Linii</h4>' + db.lines.map((l, i) => `
            <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                <span><b>${l.num}</b> -> ${l.dir}</span>
                <div>
                    <button class="edit-btn" onclick="editLine(${i})">Edytuj</button>
                    <button class="del-btn" onclick="db.lines.splice(${i},1);dbRef.set(db)">X</button>
                </div>
            </div>
        `).join('');
    }

    // --- LOGIKA KATEGORII & NEWS ---
    function addCategory() {
        const name = document.getElementById('new-cat-name').value;
        if(!db.categories) db.categories = [];
        db.categories.push(name);
        dbRef.set(db);
    }

    function renderAdmCats() {
        const list = document.getElementById('adm-cats-list');
        list.innerHTML = (db.categories || []).map((c, i) => `
            <span class="dir-abbr">${c} <i onclick="db.categories.splice(${i},1);dbRef.set(db)" class="fa-solid fa-xmark" style="color:red; cursor:pointer; margin-left:5px;"></i></span>
        `).join('');
    }

    function saveNews() {
        if(!db.news) db.news = [];
        db.news.unshift({
            title: document.getElementById('n-title').value,
            cat: document.getElementById('n-cat-select').value,
            content: document.getElementById('n-content').value,
            date: new Date().toLocaleString()
        });
        dbRef.set(db);
    }

    function renderPublicNews() {
        const list = document.getElementById('public-news-list');
        list.innerHTML = (db.news || []).map(n => `
            <div class="app-card">
                <small style="color:var(--accent)">${n.cat} • ${n.date}</small>
                <h3 style="margin:5px 0;">${n.title}</h3>
                <p style="color:var(--text-sec); font-size:0.9rem;">${n.content}</p>
            </div>
        `).join('');
    }

    // --- RESZTA FUNKCJI (Stops, ETA, Vars) ---
    function renderStopsList() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        let sSet = new Set(); db.lines.forEach(l => l.stops.forEach(s => sSet.add(s.name.trim())));
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        [...sSet].sort().filter(s => s.toLowerCase().includes(q)).forEach(name => {
            let variants = []; db.lines.forEach(l => {
                const si = l.stops.findIndex(st => st.name === name);
                if(si !== -1) variants.push({ num: l.num, type: l.type, dir: l.dir });
            });
            list.innerHTML += `<div class="app-card" onclick="openStopLines('${name}')">
                <b>${name}</b>
                <div style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;">
                    ${variants.map(v => `<span class="line-badge ${v.type==='tram'?'badge-tram':'badge-bus'}" style="padding:4px 8px; font-size:0.7rem;">${v.num}<span class="mini-dir">${getDirAbbr(v.dir)}</span></span>`).join('')}
                </div>
            </div>`;
        });
    }

    function openVars(num) {
        show('vars'); const list = document.getElementById('vars-list');
        list.innerHTML = `<div class="group-label">Kierunki linii ${num}</div>`;
        db.lines.forEach((l, i) => {
            if(l.num == num) list.innerHTML += `<div class="app-card" onclick="renderTT(${i}, -1)">DO: ${l.dir}</div>`;
        });
    }

    function openStopLines(name) {
        show('stop-lines'); const list = document.getElementById('sl-list');
        list.innerHTML = `<div class="group-label">Odjazdy: ${name}</div>`;
        db.lines.forEach((l, i) => {
            const si = l.stops.findIndex(st => st.name === name);
            if(si !== -1) list.innerHTML += `<div class="app-card" onclick="renderTT(${i}, ${si})">
                <span class="line-badge ${l.type==='tram'?'badge-tram':'badge-bus'}">${l.num}</span> <b>${l.dir}</b>
            </div>`;
        });
    }

    function renderTT(li, si) {
        show('tt'); curLineIdx = li; curStopIdx = si;
        const l = db.lines[li]; const body = document.getElementById('tt-body');
        if(si === -1) {
            document.getElementById('tt-day-sel').style.display='none';
            body.innerHTML = l.stops.map((s, i) => `<div class="app-card" onclick="renderTT(${li}, ${i})">${s.name}</div>`).join('');
        } else {
            document.getElementById('tt-day-sel').style.display='flex';
            body.innerHTML = `<h3>${l.num} - ${l.stops[si].name}</h3><div style="font-family:monospace; margin-top:20px;">Tabela godzin... (logika przeliczania z V125)</div>`;
        }
        document.getElementById('tt-back-btn').onclick = () => si === -1 ? show('home') : renderTT(li, -1);
    }
</script>
</body>
</html>
