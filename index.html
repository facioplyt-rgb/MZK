<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V50 - TOTAL REPAIR</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22MZK%20Gorzow%22,%22short_name%22:%22MZK%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0b0f19%22,%22theme_color%22:%22#00ab55%22,%22icons%22:[{%22src%22:%22https://i.ibb.co/mF64vfc/1000011209.jpg%22,%22sizes%22:%22512x512%22,%22type%22:%22image/jpg%22}]}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; --border: rgba(255,255,255,0.08); --bus-col: #00ab55; --tram-col: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.4rem; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        
        /* UNIWERSALNY STYL KAFELKÓW */
        .app-card { background: var(--surface); padding: 18px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .app-card:active { transform: scale(0.98); background: var(--surface-light); }
        
        /* WIDOK PASAŻERA - PRZYSTANKI */
        .stop-info { flex: 1; }
        .stop-name { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .line-badges { display: flex; flex-wrap: wrap; gap: 6px; }
        .line-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.8rem; min-width: 35px; text-align: center; color: white; border: 1px solid rgba(0,0,0,0.1); }
        .line-badge.bus { background: var(--bus-col); }
        .line-badge.tram { background: var(--tram-col); }

        /* NOWY STYL ROZKŁADU JAZDY (TT) */
        .tt-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        .tt-row { display: flex; border-bottom: 1px solid var(--border); }
        .tt-row:last-child { border-bottom: none; }
        .tt-hour-col { background: rgba(255,255,255,0.03); width: 65px; padding: 15px 0; text-align: center; font-size: 1.3rem; font-weight: 800; color: var(--accent); border-right: 1px solid var(--border); }
        .tt-min-col { flex: 1; padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; align-content: center; }
        .tt-min-val { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; color: var(--text); font-weight: 500; }
        .tt-empty { padding: 30px; text-align: center; color: var(--text-sec); }

        /* ADMIN - PRZYSTANKI */
        .adm-stop-card { background: var(--surface-light); border: 1px solid var(--border); border-radius: 14px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .adm-stop-name { font-weight: 800; font-size: 1.1rem; color: var(--accent); margin-bottom: 12px; display: block; }
        .adm-stop-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .adm-opt-label { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; border: 1px solid var(--border); cursor: pointer; }

        /* FORMY I PRZYCISKI */
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; background: var(--surface-light); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 1rem; }
        textarea:focus, input:focus { border-color: var(--accent); outline: none; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.97); opacity: 0.8; }
        .day-btn { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-sec); font-weight: 700; cursor: pointer; font-size: 0.8rem; }
        .day-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* INNE */
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; }
        .line-square { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; border-bottom: 4px solid transparent; }
        .line-square.bus { border-bottom-color: var(--bus-col); }
        .line-square.tram { border-bottom-color: var(--tram-col); }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        
        .badge { font-size: 0.7rem; padding: 3px 7px; border-radius: 5px; font-weight: 800; text-transform: uppercase; }
        .badge-nz { background: var(--warn); color: #000; }
        .badge-strefa { background: #444; color: #fff; }
        .group-label { font-size: 0.8rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 700; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-stop-lines" class="section">
        <div id="sl-list"></div>
        <button onclick="show('stops')" class="main-btn" style="background:#333; margin-top:15px;">Wróć do wyszukiwarki</button>
    </div>
    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    <div id="s-news-details" class="section">
        <div class="app-card" style="display:block;"><h2 id="nd-title"></h2><small id="nd-date" style="color:var(--warn)"></small><p id="nd-body" style="margin-top:15px; white-space:pre-wrap; line-height:1.6; color:var(--text-sec);"></p></div>
        <button onclick="show('news')" class="main-btn" style="background:#333">Wróć</button>
    </div>
    <div id="s-contact" class="section"><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap; line-height:1.6; color:var(--text-sec);"></div></div>
    <div id="s-vars" class="section"><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    
    <div id="s-tt" class="section">
        <div id="tt-day-sel" style="display:none; gap:5px; margin-bottom:15px;">
            <button class="day-btn active" id="btn-working" onclick="setDay('working')">Robocze</button>
            <button class="day-btn" id="btn-saturday" onclick="setDay('saturday')">Soboty</button>
            <button class="day-btn" id="btn-sunday" onclick="setDay('sunday')">Niedz i Św</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn" style="background:#333; margin-top:20px;">Wróć do przystanków</button>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;"><div class="group-label">Panel Administratora</div><input type="password" id="pass" placeholder="Hasło"><button onclick="login()" class="main-btn">Zaloguj</button></div>
        <div id="adm-ui" style="display:none;">
            <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:15px;">
                <button onclick="setTab('l')" class="main-btn" style="font-size:0.55rem; padding:12px 0;">LINIE</button>
                <button onclick="setTab('s')" class="main-btn" style="font-size:0.55rem; padding:12px 0; background:#333;">PRZYST</button>
                <button onclick="setTab('n')" class="main-btn" style="font-size:0.55rem; padding:12px 0; background:#333;">NEWS</button>
                <button onclick="setTab('c')" class="main-btn" style="font-size:0.55rem; padding:12px 0; background:#333;">USTAW</button>
                <button onclick="setTab('i')" class="main-btn" style="font-size:0.55rem; padding:12px 0; background:#333;">PLIK</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj nowy news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;">
                <div class="group-label">Kategorie Linii</div>
                <input type="text" id="edit-cats-input" placeholder="Wpisz kategorie oddzielone przecinkiem">
                <button onclick="saveCategories()" class="main-btn">Zapisz Kategorie</button>
                <div class="group-label" style="margin-top:20px;">Informacje / Kontakt</div>
                <textarea id="edit-contact-text" style="height:150px;" placeholder="Treść wyświetlana w zakładce Info"></textarea>
                <button onclick="saveContact()" class="main-btn">Zapisz Informacje</button>
            </div>
            <div id="tab-i" class="adm-tab" style="display:none;"><div class="group-label">Kopia zapasowa bazy danych</div><button onclick="exportDB()" class="main-btn" style="background:var(--info)">Eksportuj do pliku JSON</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <div class="group-label">Konfiguracja Linii</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <input type="text" id="fl-num" placeholder="Numer (np. 124)">
        <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    </div>
    <input type="text" id="fl-dir" placeholder="Kierunek docelowy (np. Ustronie)">
    <label class="group-label">Kategoria:</label>
    <select id="fl-cat"></select>
    
    <div class="group-label">Godziny odjazdów (format HH:MM, HH:MM, ...)</div>
    <textarea id="fl-h-work" placeholder="Dni robocze"></textarea>
    <textarea id="fl-h-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-h-sun" placeholder="Niedziele i Święta"></textarea>
    
    <div class="adm-stop-card" style="border-left-color:var(--info); background:rgba(24,144,255,0.05);">
        <div class="group-label" style="color:var(--info); margin:0 0 10px 0;">Import masowy przystanków</div>
        <textarea id="import-area" style="height:80px; margin-bottom:10px;" placeholder="Wklej nazwy przystanków, jeden w każdym wierszu."></textarea>
        <button onclick="processBulkImport()" class="main-btn" style="background:var(--info); padding:12px; font-size:0.8rem; margin:0;">Importuj listę</button>
    </div>
    
    <div class="group-label">Lista przystanków linii (od góry: pierwszy)</div>
    <div id="fl-list"></div>
    
    <button onclick="addStopRow()" class="main-btn" style="background:#333">+ Dodaj pusty wiersz</button>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="deleteLine()" id="btn-del-line" class="main-btn" style="background:var(--danger); display:none;">Usuń całą linię</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; border:1px solid var(--border)">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <div class="group-label">Tworzenie / Edycja Wiadomości</div>
    <input type="text" id="fn-title" placeholder="Tytuł wiadomości">
    <input type="text" id="fn-date" placeholder="Data (np. 12.05.2026)">
    <textarea id="fn-body" style="height:250px;" placeholder="Treść wiadomości..."></textarea>
    
    <button onclick="saveNews()" class="main-btn">Zapisz News</button>
    <button onclick="deleteNews()" id="btn-del-news" class="main-btn" style="background:var(--danger); display:none;">Usuń News</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; border:1px solid var(--border)">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasestorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');
    let db = { lines: [], stopDetails: {}, news: [], lineCategories: ["Tramwaje", "Autobusy"], contact: "" };
    let curLineIdx = -1, curNewsIdx = -1, curDay = 'working', curStopIdx = -1, allStops = [];

    // CORE
    function cleanKey(n) { return n ? n.trim().replace(/[.#$[\]]/g, "") : "unknown"; }
    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id)?.classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); document.getElementById('n-'+id)?.classList.add('active'); }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; else alert("Błędne hasło!"); }

    init();
    function init() {
        dbRef.on('value', (s) => {
            const val = s.val(); if(val) { db = val; 
                if(!db.lines) db.lines = []; if(!db.stopDetails) db.stopDetails = {}; if(!db.news) db.news = []; if(!db.lineCategories) db.lineCategories = ["Brak Kategorii"];
                let sSet = new Set(); db.lines.forEach(l => l.stops?.forEach(st => sSet.add(st.name))); allStops = [...sSet].sort(); render(); 
            }
        });
    }

    // GŁÓWNY RENDER
    function render() {
        const h = document.getElementById('s-home'); h.innerHTML = '';
        (db.lineCategories || []).forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length) {
                h.innerHTML += `<div class="group-label">${cat}</div>`;
                const g = document.createElement('div'); g.className = 'lines-grid';
                [...new Set(lines.map(l => String(l.num)))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const lObj = lines.find(x => String(x.num) === num);
                    g.innerHTML += `<div class="line-square ${lObj.type}" onclick="openVars('${num}')">${num}</div>`;
                });
                h.appendChild(g);
            }
        });
        document.getElementById('public-news-list').innerHTML = (db.news || []).map((n, i) => `<div class="app-card" onclick="openNewsDetails(${i})"><div><b style="color:var(--accent)">${n.title}</b><br><small style="color:var(--warn)">${n.date}</small></div><i class="fa-solid fa-chevron-right" style="color:var(--text-sec)"></i></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact || "Brak informacji.";
        renderStopsList(); renderAdmin();
    }

    // ADMIN RENDER
    function renderAdmin() {
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><div><b>${l.num}</b> - ${l.dir}</div><button style="padding:7px 12px; background:#444; border:none; border-radius:8px; color:white; font-weight:bold; font-size:0.8rem;" onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-news-list').innerHTML = (db.news || []).map((n, i) => `<div class="app-card"><div><b>${n.title}</b></div><button style="padding:7px 12px; background:#444; border:none; border-radius:8px; color:white; font-weight:bold; font-size:0.8rem;" onclick="openNewsForm(${i})">EDYTUJ</button></div>`).join('');
        
        // CZYTELNY PANEL ADMINA DLA PRZYSTANKÓW (PRZYWRÓCONE POBliŻE I NŻ)
        document.getElementById('adm-stops-list').innerHTML = allStops.map(s => {
            const key = cleanKey(s);
            const d = db.stopDetails[key] || {nearby:"", outZone: false, globalNz: false};
            return `<div class="adm-stop-card">
                <span class="adm-stop-name">${s}</span>
                <input type="text" value="${d.nearby || ''}" onchange="upStop('${s}', this.value, 'nearby')" placeholder="Opis otoczenia (np. Biedronka, Szkoła)">
                <div class="adm-stop-opts">
                    <label class="adm-opt-label"><input type="checkbox" ${d.globalNz?'checked':''} onchange="upStop('${s}', this.checked, 'globalNz')"> <b>Globalne NŻ</b></label>
                    <label class="adm-opt-label"><input type="checkbox" ${d.outZone?'checked':''} onchange="upStop('${s}', this.checked, 'outZone')"> <b>Inna Strefa</b></label>
                </div>
            </div>`;
        }).join('');
    }

    // NEWSY FUNKCJE (PRZYWRÓCONE)
    function openNewsForm(idx) { curNewsIdx = idx; const n = idx === -1 ? {title:"", date:"", body:""} : db.news[idx]; document.getElementById('fn-title').value = n.title; document.getElementById('fn-date').value = n.date; document.getElementById('fn-body').value = n.body; document.getElementById('btn-del-news').style.display = idx === -1 ? 'none' : 'block'; document.getElementById('form-news').style.display = 'block'; }
    function saveNews() { const data = { title: document.getElementById('fn-title').value, date: document.getElementById('fn-date').value, body: document.getElementById('fn-body').value }; if(!data.title || !data.date) {alert("Wpisz tytuł i datę!"); return;} if(curNewsIdx === -1) {if(!db.news) db.news=[]; db.news.push(data);} else db.news[curNewsIdx] = data; dbRef.update({ news: db.news }).then(() => { alert("News zapisany!"); closeForms(); }); }
    function deleteNews() { if(confirm("Na pewno usunąć ten news?")) { db.news.splice(curNewsIdx, 1); dbRef.update({ news: db.news }).then(closeForms); } }
    function openNewsDetails(i) { const n = db.news[i]; document.getElementById('nd-title').innerText = n.title; document.getElementById('nd-date').innerText = n.date; document.getElementById('nd-body').innerText = n.body; show('news-details'); }

    // USTAWIENIA I KATEGORIE (PRZYWRÓCONE)
    function saveCategories() { const cats = document.getElementById('edit-cats-input').value.split(',').map(c => c.trim()).filter(c => c); dbRef.update({ lineCategories: cats }).then(() => alert("Kategorie zapisane!")); }
    function saveContact() { dbRef.update({ contact: document.getElementById('edit-contact-text').value }).then(() => alert("Informacje zapisane!")); }

    // LINIE I IMPORT (BEZ ZMIAN)
    function openLineForm(idx) { curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", category:"", stops:[], hoursWorking:"", hoursSat:"", hoursSun:""} : db.lines[idx]; document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir; document.getElementById('fl-type').value = l.type || "bus"; document.getElementById('fl-cat').innerHTML = (db.lineCategories || []).map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join(''); document.getElementById('fl-h-work').value = l.hoursWorking || ""; document.getElementById('fl-h-sat').value = l.hoursSat || ""; document.getElementById('fl-h-sun').value = l.hoursSun || ""; document.getElementById('fl-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz)); document.getElementById('btn-del-line').style.display = idx === -1 ? 'none' : 'block'; document.getElementById('form-line').style.display = 'block'; }
    function deleteLine() { if(confirm("Usunąć całą linię? TEGO NIE DA SIĘ COFNĄĆ!")) { db.lines.splice(curLineIdx, 1); dbRef.update({ lines: db.lines }).then(closeForms); } }
    function addStopRow(name="", time=2, nz=false) { const div = document.createElement('div'); div.className = 'adm-stop-card'; div.style.borderLeft="4px solid #444"; div.style.padding="10px"; div.innerHTML = `<button onclick="this.parentElement.remove()" style="float:right; border:none; background:none; color:var(--danger); font-size:1.2rem; cursor:pointer;">&times;</button><input type="text" value="${name}" class="stop-name-in" placeholder="Nazwa przystanku" style="margin: 0 0 8px 0; padding:10px;"><div style="display:flex; gap:10px; align-items:center;"><input type="number" value="${time}" class="stop-time-in" style="width:70px; margin:0; padding:10px;"><span style="color:var(--text-sec); font-size:0.8rem;">min.</span><label style="font-size:0.8rem; display:flex; align-items:center; gap:5px; cursor:pointer;"><input type="checkbox" class="stop-nz-in" ${nz?'checked':''}> Na Żądanie</label></div>`; document.getElementById('fl-list').prepend(div); }
    function processBulkImport() { const area = document.getElementById('import-area'); area.value.split('\n').filter(x => x.trim()).forEach(n => { let name = n.trim(); let nz = name.toLowerCase().includes(" nż"); if(nz) name = name.replace(/ nż\.?/i, "").trim(); addStopRow(name, 2, nz); }); area.value = ""; }
    function saveLine() { const rows = Array.from(document.querySelectorAll('#fl-list > div')); if(!document.getElementById('fl-num').value || !document.getElementById('fl-dir').value) {alert("Wpisz numer i kierunek!"); return;} const stops = rows.map(r => ({ name: r.querySelector('.stop-name-in').value.trim(), time: parseInt(r.querySelector('.stop-time-in').value) || 0, nz: r.querySelector('.stop-nz-in').checked })).reverse(); const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops }; if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data; dbRef.update({ lines: db.lines }).then(() => { alert("Linia zapisana!"); closeForms(); }); }

    // ROZKŁAD I PRZYSTANKI (WIZUALNA POPRAWA LINII DLA PASAŻERA)
    function renderStopsList() { 
        const q = document.getElementById('stop-search').value.toLowerCase(); const listDiv = document.getElementById('public-stops-list'); listDiv.innerHTML = ''; 
        allStops.filter(s => s.toLowerCase().includes(q)).forEach(name => { 
            const d = db.stopDetails[cleanKey(name)] || {};
            const stopLines = [];
            db.lines.forEach(l => { if(l.stops?.some(st => st.name === name)) { if(!stopLines.find(x => x.num === l.num)) stopLines.push({num: l.num, type: l.type}); } });
            stopLines.sort((a,b) => parseInt(a.num) - parseInt(b.num));
            
            listDiv.innerHTML += `
                <div class="app-card" style="display:block;" onclick="openStopLines('${name}')">
                    <div class="stop-info">
                        <div class="stop-name">
                            <i class="fa-solid fa-map-pin" style="color:var(--danger); font-size:1rem;"></i> 
                            ${name} 
                            ${d.globalNz?'<span class="badge badge-nz">NŻ</span>':''} 
                            ${d.outZone?'<span class="badge badge-strefa">STREFA</span>':''}
                        </div>
                        ${d.nearby ? `<small style="color:var(--accent); font-weight:600; display:block; margin:-5px 0 10px 22px;">${d.nearby}</small>` : ''}
                    </div>
                    <div class="line-badges" style="margin-left:22px;">
                        ${stopLines.map(l => `<span class="line-badge ${l.type}">${l.num}</span>`).join('')}
                    </div>
                </div>`; 
        }); 
    }
    
    // LINIE NA PRZYSTANKU (TEŻ POPRAWIONE WIZUALNIE)
    function openStopLines(name) { show('stop-lines'); const list = document.getElementById('sl-list'); list.innerHTML = `<div class="group-label" style="color:var(--accent)">${name}</div>`; db.lines.forEach((l, i) => { const sIdx = l.stops?.findIndex(st => st.name === name); if(sIdx !== -1) list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i}, ${sIdx})"><div><span class="line-badge ${l.type}" style="margin-right:12px">${l.num}</span><b>${l.dir}</b></div><i class="fa-solid fa-chevron-right" style="color:var(--text-sec)"></i></div>`; }); }
    
    // ROZKŁAD (NAPRAWIONA LOGIKA DNI I NOWY WYGLĄD)
    function setDay(d) { curDay = d; document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + (d==='sunday'?'sunday':d==='saturday'?'saturday':'working')).classList.add('active'); renderTimetable(curLineIdx, curStopIdx); }
    function renderTimetable(lIdx, sIdx = -1) {
        curLineIdx = lIdx; curStopIdx = sIdx; show('tt'); const l = db.lines[lIdx]; const ttBody = document.getElementById('tt-body');
        document.getElementById('tt-day-sel').style.display = sIdx === -1 ? 'none' : 'flex';
        
        if (sIdx === -1) {
            ttBody.innerHTML = `<div class="group-label">Kierunek: ${l.dir}</div>`;
            ttBody.innerHTML += (l.stops || []).map((s, i) => {
                const isGlobalNz = db.stopDetails[cleanKey(s.name)]?.globalNz;
                return `<div class="app-card" onclick="renderTimetable(${lIdx}, ${i})"><span><b style="color:var(--accent); margin-right:10px;">${i+1}</b> ${s.name}${(s.nz || isGlobalNz)?' <small style="color:var(--warn)">(NŻ)</small>':''}</span><i class="fa-solid fa-clock" style="color:var(--text-sec)"></i></div>`; 
            }).join('');
            document.getElementById('tt-back-btn').onclick = () => show('vars');
        } else {
            let offset = 0; for(let i=0; i<=sIdx; i++) offset += parseInt(l.stops[i].time || 0);
            const hMap = {}; 
            // KLUCZOWE: Wybieramy odpowiednie godziny dla wybranego DNIA
            let rawTimes = "";
            if(curDay === 'saturday') rawTimes = l.hoursSat || "";
            else if(curDay === 'sunday') rawTimes = l.hoursSun || "";
            else rawTimes = l.hoursWorking || ""; // domyślnie robocze

            let html = `<div class="app-card" style="display:block; margin-bottom:15px; border-color:var(--accent);"><div class="group-label" style="margin:0; color:var(--accent);">Linia ${l.num}</div><div class="stop-name" style="margin:5px 0;">${l.stops[sIdx].name}</div><small style="color:var(--text-sec)">Kierunek: ${l.dir}</small></div><div class="tt-container">`;
            
            if(!rawTimes.trim()) {
                html += '<div class="tt-empty">Brak kursów w wybrany dzień.</div>';
            } else {
                rawTimes.split(',').forEach(entry => {
                    let parts = entry.trim().split(':'); if(parts.length < 2) return;
                    let d = new Date(); d.setHours(parseInt(parts[0]), parseInt(parts[1]) + offset);
                    let hh = d.getHours().toString().padStart(2, '0');
                    let mm = d.getMinutes().toString().padStart(2, '0');
                    if(!hMap[hh]) hMap[hh] = []; hMap[hh].push(mm);
                });
                Object.keys(hMap).sort().forEach(h => {
                    html += `<div class="tt-row"><div class="tt-hour-col">${h}</div><div class="tt-min-col">${hMap[h].sort().map(m => `<span class="tt-min-val">${m}</span>`).join('')}</div></div>`;
                });
            }
            ttBody.innerHTML = html + `</div>`;
            document.getElementById('tt-back-btn').onclick = () => renderTimetable(lIdx, -1);
        }
    }

    function upStop(name, val, field) { const key = cleanKey(name); if(!db.stopDetails[key]) db.stopDetails[key] = {nearby:"", outZone:false, globalNz: false}; db.stopDetails[key][field] = val; dbRef.child('stopDetails').child(key).set(db.stopDetails[key]); }
    function openVars(num) { show('vars'); const v = document.getElementById('vars-list'); v.innerHTML = `<div class="group-label">Wybiersz wariant linii ${num}</div>`; db.lines.forEach((l, i) => { if(String(l.num) === String(num)) v.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>DO: ${l.dir}</b><i class="fa-solid fa-chevron-right" style="color:var(--text-sec)"></i></div>`; }); }
    function exportDB() { const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const a = document.createElement('a'); a.href = data; a.download = `mzk_gorzow_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
</script>
</body>
</html>
