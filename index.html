<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM MODUŁOWY</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* === SYSTEM ZMIENNYCH === */
        :root { 
            --accent: #00ab55; 
            --accent-hover: #008f47;
            --bg: #05080f; 
            --surface: #121926; 
            --surface-light: #1c2536; 
            --text-main: #ffffff; 
            --text-muted: #94a3b8; 
            --bus: #00ab55; 
            --tram: #ef4444; 
            --border: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 24px -4px rgba(0,0,0,0.5);
        }

        /* === RESET I BAZA === */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 90px; 
            overflow-x: hidden; 
        }

        /* === NAGŁÓWEK (HEADER) === */
        header { 
            background: rgba(5, 8, 15, 0.85); 
            backdrop-filter: blur(12px);
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid var(--border); 
            text-align: center;
        }
        header h1 { 
            font-family: 'Outfit', sans-serif; 
            font-size: 1.3rem; 
            font-weight: 900; 
            letter-spacing: 2px; 
            color: var(--accent); 
        }

        /* === GŁÓWNY KONTENER === */
        .container { 
            max-width: 650px; 
            margin: 0 auto; 
            padding: 16px; 
        }

        /* === KARTY I ELEMENTY UI === */
        .card { 
            background: var(--surface); 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow); 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .card:active { transform: scale(0.98); }

        .line-badge { 
            min-width: 52px; 
            height: 42px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 12px; 
            font-family: 'Outfit', sans-serif;
            font-weight: 900; 
            font-size: 1.15rem; 
            color: #fff; 
            margin-right: 15px; 
        }
        .bg-bus { background: var(--bus); box-shadow: 0 4px 12px rgba(0,171,85,0.3); }
        .bg-tram { background: var(--tram); box-shadow: 0 4px 12px rgba(239,68,68,0.3); }

        /* === FORMULARZE I PRZYCISKI === */
        input, select, textarea { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 14px; 
            background: var(--surface-light); 
            color: var(--text-main); 
            border: 1px solid var(--border); 
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--accent); }
        
        .btn { 
            background: var(--accent); 
            color: #fff; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            width: 100%; 
            font-weight: 600; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--tram); }

        /* === NAWIGACJA DOLNA === */
        nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: var(--surface); 
            display: flex; 
            height: 80px; 
            border-top: 1px solid var(--border); 
            z-index: 2000; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 6px; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* === LOGIKA WYŚWIETLANIA MODUŁÓW === */
        .module { display: none; animation: fadeIn 0.3s ease-out; }
        .module.active { display: block; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <header><h1>MZK GORZÓW</h1></header>

    <div class="container">
        
        <div id="module-lines" class="module active">
            </div>

        <div id="module-stops" class="module">
            </div>

        <div id="module-news" class="module">
            </div>

        <div id="module-admin" class="module">
            </div>

        <div id="module-details" class="module">
            </div>

    </div>

    <nav>
        <div class="nav-item active" id="nav-lines" onclick="Core.switchModule('lines')">
            <i class="fa-solid fa-bus"></i><span>Linie</span>
        </div>
        <div class="nav-item" id="nav-stops" onclick="Core.switchModule('stops')">
            <i class="fa-solid fa-location-dot"></i><span>Przystanki</span>
        </div>
        <div class="nav-item" id="nav-news" onclick="Core.switchModule('news')">
            <i class="fa-solid fa-newspaper"></i><span>Komunikaty</span>
        </div>
        <div class="nav-item" id="nav-admin" onclick="Core.switchModule('admin')">
            <i class="fa-solid fa-shield-halved"></i><span>Admin</span>
        </div>
    </nav>

    <script>
        // Tutaj będziemy wklejać logikę modułów.
    </script>

</body>
</html>
