<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW (Wersja Statyczna)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        /* Karty Linii */
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        .line-sq { background: var(--surface); height: 75px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 800; cursor: pointer; border-bottom: 4px solid var(--accent); transition: 0.2s; }
        .line-sq.tram { border-bottom-color: var(--danger); }
        .line-sq:active { transform: scale(0.95); }

        /* Rozkład */
        .app-card { background: var(--surface); padding: 16px; border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .tt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a3540; }
        .tt-time { background: var(--accent); color: white; padding: 8px 4px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 0.9rem; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
        
        /* Wyszukiwarka */
        .search-box { width: 100%; padding: 16px; border-radius: 15px; background: var(--surface); border: 1px solid #333; color: white; margin-bottom: 20px; font-family: inherit; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 80px; border-top: 1px solid #333; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        .back-btn { background: #1c252e; color: white; width: 100%; padding: 15px; border: none; border-radius: 15px; margin-top: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<header><b style="letter-spacing: 1px;">MZK GORZÓW</b></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="lines-list"></div>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" class="search-box" placeholder="Szukaj przystanku..." oninput="renderStops()">
        <div id="stops-results"></div>
    </div>

    <div id="s-vars" class="section">
        <div id="vars-head"></div>
        <div id="vars-body"></div>
        <button class="back-btn" onclick="show('home')">Powrót do linii</button>
    </div>

    <div id="s-tt" class="section">
        <div id="tt-head"></div>
        <div id="tt-body"></div>
        <button class="back-btn" onclick="show('vars')">Powrót do kierunków</button>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-magnifying-glass"></i><span>Przystanki</span></div>
</nav>

<script>
    // ======================================================
    // TUTAJ WPISUJESZ DANE (MOŻESZ WKLEIĆ TREŚĆ Z BACKUP.TXT)
    // ======================================================
    const db = {
        lines: [
            {
                num: "100",
                dir: "Oś. Staszica",
                type: "bus",
                cat: "Autobusy",
                hours: "05:10, 05:30, 05:50, 06:10, 06:40",
                stops: [
                    { name: "Jedwabnicza Park Handlowy", time: 0, nz: false },
                    { name: "Fieldorfa Nila", time: 2, nz: false },
                    { name: "Oś. Ustronie", time: 2, nz: false },
                    { name: "Działkowców", time: 5, nz: true }
                ]
            },
            {
                num: "1",
                dir: "Wieprzyce",
                type: "tram",
                cat: "Tramwaje",
                hours: "05:05, 05:25, 05:45",
                stops: [
                    { name: "Silwana", time: 0, nz: false },
                    { name: "Katedra", time: 12, nz: false }
                ]
            }
            // Możesz tu dodawać kolejne linie kopiując strukturę powyżej
        ]
    };

    // LOGIKA APLIKACJI
    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-' + id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-' + id)) document.getElementById('n-' + id).classList.add('active');
        window.scrollTo(0,0);
    }

    function renderHome() {
        const container = document.getElementById('lines-list');
        container.innerHTML = '';
        const categories = [...new Set(db.lines.map(l => l.cat))];
        
        categories.forEach(cat => {
            container.innerHTML += `<div class="group-label">${cat}</div>`;
            const grid = document.createElement('div');
            grid.className = 'lines-grid';
            
            const uniqueNums = [...new Set(db.lines.filter(l => l.cat === cat).map(l => l.num))];
            uniqueNums.forEach(num => {
                const line = db.lines.find(l => l.num === num);
                grid.innerHTML += `<div class="line-sq ${line.type}" onclick="openVars('${num}')">${num}</div>`;
            });
            container.appendChild(grid);
        });
    }

    function openVars(num) {
        show('vars');
        const variants = db.lines.filter(l => l.num === num);
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div><h2>Wybierz kierunek</h2>`;
        document.getElementById('vars-body').innerHTML = variants.map(v => `
            <div class="app-card" onclick="openTT(${db.lines.indexOf(v)})">
                <b>${v.dir}</b>
                <i class="fa-solid fa-chevron-right" style="float:right; color:var(--accent)"></i>
            </div>
        `).join('');
    }

    function openTT(idx) {
        const line = db.lines[idx];
        show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        
        let totalTime = 0;
        document.getElementById('tt-body').innerHTML = line.stops.map((s, i) => {
            totalTime += s.time;
            const stopOffset = totalTime;
            return `
                <div class="app-card" style="display:block" onclick="this.querySelector('.tt-grid').style.display = this.querySelector('.tt-grid').style.display === 'none' ? 'grid' : 'none'">
                    <b>${s.name}</b>${s.nz ? '<span class="nz-badge">NŻ</span>' : ''}
                    <div class="tt-grid" style="display:none">
                        ${calculateTimes(line.hours, stopOffset)}
                    </div>
                </div>
            `;
        }).join('');
    }

    function calculateTimes(hoursStr, offset) {
        return hoursStr.split(',').map(h => {
            let [hh, mm] = h.trim().split(':');
            let d = new Date();
            d.setHours(parseInt(hh), parseInt(mm) + offset);
            return `<div class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</div>`;
        }).join('');
    }

    function renderStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const results = document.getElementById('stops-results');
        if(!q) { results.innerHTML = ''; return; }

        const allStops = [];
        db.lines.forEach(l => l.stops.forEach(s => {
            if(!allStops.find(x => x.name === s.name)) allStops.push({name: s.name, nz: s.nz});
        }));

        results.innerHTML = allStops.filter(s => s.name.toLowerCase().includes(q)).map(s => `
            <div class="app-card">
                <b>${s.name}</b> ${s.nz ? '<span class="nz-badge">NŻ</span>' : ''}
            </div>
        `).join('');
    }

    // Start
    renderHome();
</script>
</body>
</html>
