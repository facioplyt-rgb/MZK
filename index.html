<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V94</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --border: rgba(255,255,255,0.08); --bus-col: #00ab55; --tram-col: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.4rem; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; }
        .app-card:active { transform: scale(0.98); background: var(--surface-light); }
        
        .stop-name { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; width: 100%; }
        .line-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; min-height: 24px; }
        
        .line-badge { display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; color: white; border: 1px solid rgba(0,0,0,0.1); white-space: nowrap; }
        .line-badge.bus { background: var(--bus-col); }
        .line-badge.tram { background: var(--tram-col); }
        
        .dir-abbr { background: rgba(0,0,0,0.2); padding: 1px 4px; border-radius: 3px; font-size: 0.65rem; margin-left: 2px; color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.1); font-weight: 800; text-transform: uppercase; }

        .eta-tag { font-size: 0.75rem; color: var(--accent); font-weight: 800; margin-left: auto; background: rgba(0, 171, 85, 0.1); padding: 4px 8px; border-radius: 6px; }
        .transfer-eta { font-size: 0.65rem; opacity: 0.95; font-weight: 600; margin-left: 4px; color: #fff; background: rgba(0,0,0,0.15); padding: 1px 4px; border-radius: 3px; }

        .eta-now { animation: blink 0.8s infinite; color: var(--warn); font-weight: 800; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.65rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }

        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; background: var(--surface-light); border: 1px solid var(--border); color: white; font-family: inherit; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        
        .badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
        .badge-nz { background: var(--warn); color: #000; }
        .badge-strefa { background: #444; color: #fff; }

        .tt-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        .tt-row { display: flex; border-bottom: 1px solid var(--border); }
        .tt-hour-col { background: rgba(255,255,255,0.03); width: 60px; padding: 15px 0; text-align: center; font-size: 1.2rem; font-weight: 800; color: var(--accent); border-right: 1px solid var(--border); }
        .tt-min-col { flex: 1; padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .day-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; font-weight: bold; cursor: pointer; }
        .day-btn.active { background: var(--accent); }
        .adm-stop-card { background: var(--surface-light); padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header id="app-header">MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>

    <div id="s-vars" class="section">
        <div id="vars-list"></div>
        <button onclick="show('home')" class="main-btn" style="background:#333">Wróć do wyboru linii</button>
    </div>

    <div id="s-tt" class="section">
        <div id="tt-day-sel" style="display:none; gap:5px; margin-bottom:15px;">
            <button class="day-btn active" id="btn-working" onclick="setDay('working')">Robocze</button>
            <button class="day-btn" id="btn-saturday" onclick="setDay('saturday')">Soboty</button>
            <button class="day-btn" id="btn-sunday" onclick="setDay('sunday')">Niedz i Św</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn" style="background:#333; margin-top:20px;">Wróć</button>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-stop-lines" class="section">
        <div id="sl-list"></div>
        <button onclick="show('stops')" class="main-btn" style="background:#333; margin-top:10px;">Wróć do listy</button>
    </div>

    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    <div id="s-news-details" class="section">
        <div class="app-card" style="display:block;"><h2 id="nd-title"></h2><small id="nd-date" style="color:var(--warn)"></small><p id="nd-body" style="margin-top:15px; white-space:pre-wrap; color:var(--text-sec); line-height:1.5;"></p></div>
        <button onclick="show('news')" class="main-btn" style="background:#333">Wróć</button>
    </div>

    <div id="s-contact" class="section"><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap; color:var(--text-sec); line-height:1.5;"></div></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;"><div class="group-label">Autoryzacja</div><input type="password" id="pass" placeholder="Hasło"><button onclick="login()" class="main-btn">Zaloguj</button></div>
        <div id="adm-ui" style="display:none;">
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:15px;">
                <button onclick="setTab('l')" class="main-btn" style="font-size:0.7rem;">LINIE</button>
                <button onclick="setTab('n')" class="main-btn" style="font-size:0.7rem; background:#333;">NEWS</button>
                <button onclick="setTab('c')" class="main-btn" style="font-size:0.7rem; background:#333;">USTAW</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;">
                <div class="group-label">Kategorie Linii</div><input type="text" id="edit-cats-input">
                <button onclick="saveAllCategories()" class="main-btn">Zapisz Kategorie</button>
                <div class="group-label">Kontakt</div><textarea id="edit-contact-text"></textarea>
                <button onclick="saveContact()" class="main-btn">Zapisz Kontakt</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <input type="text" id="fl-num" placeholder="Nr linii">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-h-work" placeholder="Godziny Robocze (05:10, 06:20...)"></textarea>
    <textarea id="fl-h-sat" placeholder="Godziny Soboty"></textarea>
    <textarea id="fl-h-sun" placeholder="Godziny Niedziele"></textarea>
    <div id="fl-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; border:1px solid #444">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], news: [], lineCategories: [], contact: "", stopDetails: {} };
    let curLineIdx = -1, curDay = 'working', curStopIdx = -1, activeSection = 'home', curLineNumGlobal = "";

    function cleanKey(n) { return n ? n.trim().replace(/[.#$[\]]/g, "") : "unknown"; }
    function formatETA(mins) {
        if (mins === null) return "";
        if (mins === 0) return ">>>";
        if (mins < 60) return mins + "m";
        return Math.floor(mins/60) + "h " + (mins%60)+"m";
    }
    function getDirAbbr(dir) {
        if(!dir) return "??";
        const w = dir.trim().split(/\s+/);
        return w.length === 1 ? w[0].substring(0,2).toUpperCase() : (w[0][0] + w[w.length-1][0]).toUpperCase();
    }

    function getETA(line, stopIdx) {
        if(!line || !line.stops || line.stops.length === 0) return null;
        const now = new Date();
        const dayType = now.getDay() === 6 ? 'saturday' : (now.getDay() === 0 ? 'sunday' : 'working');
        const raw = dayType === 'working' ? line.hoursWorking : (dayType === 'saturday' ? line.hoursSat : line.hoursSun);
        if (!raw) return null;
        
        let offset = 0;
        for (let i = 0; i <= stopIdx; i++) offset += parseInt(line.stops[i].time || 0);
        
        const times = raw.split(',').map(t => {
            const p = t.trim().split(':');
            if(p.length < 2) return null;
            const d = new Date(now.getTime());
            d.setHours(parseInt(p[0]), parseInt(p[1]) + offset, 0, 0);
            return d;
        }).filter(d => d !== null && d > now).sort((a,b) => a - b);
        
        return times.length === 0 ? null : Math.floor((times[0] - now) / 60000);
    }

    function getLinesForStop(stopName, excludeLineNum = null) {
        let found = [];
        (db.lines || []).forEach(l => {
            const sIdx = l.stops ? l.stops.findIndex(s => s.name === stopName) : -1;
            if(sIdx !== -1) {
                found.push({ num: l.num, type: l.type, dir: l.dir, eta: getETA(l, sIdx), lIdx: db.lines.indexOf(l), sIdx: sIdx });
            }
        });
        // Grupowanie wariantów i sortowanie po ETA
        let res = Object.values(found.reduce((acc, curr) => {
            const key = curr.num + curr.dir;
            if(!acc[key] || (curr.eta !== null && (acc[key].eta === null || curr.eta < acc[key].eta))) acc[key] = curr;
            return acc;
        }, {}));

        return res.filter(f => excludeLineNum === null || String(f.num) !== String(excludeLineNum))
                  .sort((a,b) => (a.eta === null ? 1 : (b.eta === null ? -1 : a.eta - b.eta)));
    }

    function show(id) {
        activeSection = id;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        const target = document.getElementById('s-'+id);
        if(target) target.classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
        render();
    }

    function init() {
        dbRef.on('value', (s) => {
            const v = s.val(); if(v) { db = v; render(); }
        });
        setInterval(() => { if(activeSection !== 'adm') render(); }, 15000);
    }
    init();

    function render() {
        if(activeSection === 'home') renderHome();
        if(activeSection === 'stops') renderStopsList();
        if(activeSection === 'news') renderNews();
        if(activeSection === 'adm') renderAdmin();
        if(activeSection === 'vars') openVars(curLineNumGlobal);
        if(activeSection === 'tt') renderTimetable(curLineIdx, curStopIdx);
    }

    function renderHome() {
        const h = document.getElementById('s-home'); h.innerHTML = '';
        (db.lineCategories || []).forEach(cat => {
            const lines = (db.lines || []).filter(l => l.category === cat);
            if(lines.length) {
                h.innerHTML += `<div class="group-label">${cat}</div>`;
                let unique = [...new Set(lines.map(l => l.num))].sort((a,b) => parseInt(a)-parseInt(b));
                unique.forEach(n => {
                    const lData = lines.find(x => x.num === n);
                    h.innerHTML += `<div class="app-card" onclick="openVars('${n}')"><div class="stop-name">Linia ${n}</div><div class="line-badges"><span class="line-badge ${lData.type}">${n}</span></div></div>`;
                });
            }
        });
    }

    function openVars(num) {
        curLineNumGlobal = num; activeSection = 'vars';
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-vars').classList.add('active-sec');
        const vList = document.getElementById('vars-list');
        vList.innerHTML = `<div class="group-label">Kierunki linii ${num}</div>`;
        (db.lines || []).forEach((l, i) => {
            if(String(l.num) === String(num)) {
                const eta = getETA(l, 0);
                vList.innerHTML += `<div class="app-card" onclick="curLineIdx=${i}; curStopIdx=-1; show('tt')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><b>DO: ${l.dir}</b> <span class="dir-abbr">${getDirAbbr(l.dir)}</span></div><span class="eta-tag">${eta===0?'<span class="eta-now">>>></span>':eta?formatETA(eta):'---'}</span></div></div>`;
            }
        });
    }

    function renderTimetable(lIdx, sIdx) {
        const l = db.lines[lIdx]; const body = document.getElementById('tt-body');
        if(sIdx === -1) {
            document.getElementById('tt-day-sel').style.display = 'none';
            body.innerHTML = `<div class="group-label">Trasa: ${l.num} -> ${l.dir}</div>`;
            body.innerHTML += l.stops.map((s, i) => {
                const tr = getLinesForStop(s.name, l.num);
                const trHtml = tr.map(t => `<span class="line-badge ${t.type}" style="font-size:0.6rem;">${t.num}<span class="dir-abbr">${getDirAbbr(t.dir)}</span><span class="transfer-eta">${t.eta===0?'>>>':formatETA(t.eta)}</span></span>`).join('');
                return `<div class="app-card" onclick="curStopIdx=${i}; renderTimetable(${lIdx}, ${i})"><div>${s.name}</div><div class="line-badges">${trHtml}</div></div>`;
            }).join('');
            document.getElementById('tt-back-btn').onclick = () => openVars(l.num);
        } else {
            document.getElementById('tt-day-sel').style.display = 'flex';
            let off = 0; for(let i=0; i<=sIdx; i++) off += parseInt(l.stops[i].time || 0);
            const hMap = {}; let raw = (curDay==='working'?l.hoursWorking:curDay==='saturday'?l.hoursSat:l.hoursSun) || "";
            raw.split(',').forEach(e => {
                let p = e.trim().split(':'); if(p.length<2) return;
                let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1])+off);
                let hh = d.getHours().toString().padStart(2,'0'), mm = d.getMinutes().toString().padStart(2,'0');
                if(!hMap[hh]) hMap[hh] = []; hMap[hh].push(mm);
            });
            let html = `<div class="app-card"><b>${l.num}</b> - ${l.stops[sIdx].name}</div><div class="tt-container">`;
            Object.keys(hMap).sort().forEach(h => html += `<div class="tt-row"><div class="tt-hour-col">${h}</div><div class="tt-min-col">${hMap[h].sort().join(' ')}</div></div>`);
            body.innerHTML = html + "</div>";
            document.getElementById('tt-back-btn').onclick = () => { curStopIdx = -1; renderTimetable(lIdx, -1); };
        }
    }

    function renderStopsList() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        let sSet = new Set(); (db.lines || []).forEach(l => l.stops?.forEach(s => sSet.add(s.name)));
        [...sSet].sort().filter(s => s.toLowerCase().includes(q)).forEach(name => {
            const lines = getLinesForStop(name);
            list.innerHTML += `<div class="app-card" onclick="openStopLines('${name}')"><div class="stop-name">${name}</div><div class="line-badges">${lines.map(l => `<span class="line-badge ${l.type}">${l.num}<span class="dir-abbr">${getDirAbbr(l.dir)}</span><span class="transfer-eta">${l.eta===0?'>>>':formatETA(l.eta)}</span></span>`).join('')}</div></div>`;
        });
    }

    function openStopLines(name) {
        show('stop-lines'); const list = document.getElementById('sl-list');
        list.innerHTML = `<div class="group-label">Odjazdy: ${name}</div>`;
        getLinesForStop(name).forEach(v => {
            list.innerHTML += `<div class="app-card" onclick="curLineIdx=${v.lIdx}; curStopIdx=${v.sIdx}; show('tt')"><div style="display:flex; justify-content:space-between; align-items:center;"><div><span class="line-badge ${v.type}" style="margin-right:10px">${v.num}</span><b>${v.dir}</b></div><span class="eta-tag">${v.eta===0?'>>>':formatETA(v.eta)}</span></div></div>`;
        });
    }

    function renderNews() {
        const nList = document.getElementById('public-news-list'); nList.innerHTML = '<div class="group-label">Aktualności</div>';
        (db.news || []).forEach((n, i) => nList.innerHTML += `<div class="app-card" onclick="openNewsDetails(${i})"><b>${n.title}</b><br><small>${n.date}</small></div>`);
        document.getElementById('contact-display').innerText = db.contact || "";
    }

    function renderAdmin() {
        const lList = document.getElementById('adm-lines-list'); lList.innerHTML = '';
        (db.lines || []).forEach((l, i) => lList.innerHTML += `<div class="app-card" onclick="openLineForm(${i})">${l.num} -> ${l.dir}</div>`);
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", category:"", stops:[], hoursWorking:"", hoursSat:"", hoursSun:""} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-cat').innerHTML = (db.lineCategories || []).map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-h-work').value = l.hoursWorking; document.getElementById('fl-h-sat').value = l.hoursSat; document.getElementById('fl-h-sun').value = l.hoursSun;
        document.getElementById('fl-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(name="", time=2) {
        const d = document.createElement('div'); d.className = 'adm-stop-card';
        d.innerHTML = `<input type="text" value="${name}" class="stop-name-in" placeholder="Nazwa"> <input type="number" value="${time}" class="stop-time-in" style="width:60px;"> min <button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-list').appendChild(d);
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('#fl-list > div')).map(r => ({ name: r.querySelector('.stop-name-in').value, time: parseInt(r.querySelector('.stop-time-in').value || 0) }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hoursWorking: document.getElementById('fl-h-work').value, hoursSat: document.getElementById('fl-h-sat').value, hoursSun: document.getElementById('fl-h-sun').value, stops: stops };
        if(!db.lines) db.lines = []; if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        dbRef.update({ lines: db.lines }).then(closeForms);
    }

    function openNewsDetails(idx) { const n = db.news[idx]; document.getElementById('nd-title').innerText = n.title; document.getElementById('nd-date').innerText = n.date; document.getElementById('nd-body').innerText = n.body; show('news-details'); }
    function setDay(d) { curDay = d; document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+(d==='sunday'?'sunday':d==='saturday'?'saturday':'working')).classList.add('active'); renderTimetable(curLineIdx, curStopIdx); }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
</script>
</body>
</html>
