<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - LIVE & GPS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ab55; 
            --mzk-yellow: #feca05;
            --bg: #0b0f19; 
            --surface: #161c24; 
            --text: #ffffff; 
            --text-sec: #919eab; 
            --danger: #ff4842; 
            --gradient: linear-gradient(135deg, #00ab55 0%, #007b3d 100%); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 110px; }
        
        header { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(20px); padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--mzk-yellow); display: flex; align-items: center; justify-content: center; }
        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; color: var(--text); }

        .hero { 
            width: 100%; height: 160px; 
            background: url('https://mzk-gorzow.com.pl/wp-content/uploads/2023/04/slider-01.jpg') center/cover; 
            position: relative; border-radius: 0 0 30px 30px; margin-bottom: 20px; 
            display: flex; align-items: flex-end; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .hero::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to top, rgba(11,15,25,1) 5%, rgba(0,0,0,0) 100%); 
            border-radius: 0 0 30px 30px; 
        }
        .hero-title { position: relative; z-index: 2; font-size: 1.4rem; font-weight: 800; }

        .container { max-width: 550px; margin: 0 auto; padding: 0 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
        .group-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 18px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid #333; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        .line-square small { font-size: 0.55rem; opacity: 0.5; font-weight: 400; margin-top: 2px; }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s; }
        
        .day-tabs { display: flex; gap: 6px; margin: 12px 0; background: #0b0f19; padding: 4px; border-radius: 12px; }
        .day-tab { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.65rem; text-align: center; font-weight: 700; color: var(--text-sec); cursor: pointer; }
        .day-tab.active { background: var(--accent); color: white; }

        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-top: 12px; }
        .tt-time { background: #1c252e; color: white; padding: 8px 4px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05); line-height: 1.2; }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(22, 28, 36, 0.9); backdrop-filter: blur(20px); display: flex; height: 75px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.6rem; font-weight: 700; }
        nav div.active { color: var(--mzk-yellow); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }

        .main-btn { background: var(--gradient); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .stop-edit-row { display: grid; grid-template-columns: 1fr 60px 40px 40px; gap: 6px; align-items: center; background: #1c252e; padding: 8px; border-radius: 10px; margin-bottom: 6px; }
        
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 6px; font-weight: 800; }
        .stop-line-pill { background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; margin-right: 4px; border: 1px solid rgba(255,255,255,0.05); color: var(--mzk-yellow); }
        .live-badge { color: var(--mzk-yellow); font-weight: 800; font-size: 0.75rem; }
        
        .gps-btn { background: var(--mzk-yellow); color: #000; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(254, 202, 5, 0.3); }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div class="hero"><div class="hero-title">Gorzów Wielkopolski<br><small style="font-weight:400; opacity:0.7; font-size:0.9rem;">Wybierz linię</small></div></div>
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <div class="group-label">Szukaj Przystanku</div>
        <input type="text" id="stop-search" placeholder="Wpisz nazwę..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333; margin-top:20px">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333; margin-top:20px">Wróć</button></div>

    <div id="s-news" class="section"><div class="group-label">Komunikaty</div><div id="public-news-list"></div></div>
    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="text-align:center;"><button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <button onclick="openLineForm(-1)" class="main-btn">+ Dodaj linię</button>
            <div id="adm-lines-list"></div>
            <button onclick="exportFullBackup()" class="main-btn" style="margin-top:20px; background:#444;">Backup</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Panel</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Nr"><input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"><option value="Autobusy">Autobusy</option><option value="Tramwaje">Tramwaje</option></select>
    <textarea id="fl-hours" placeholder="Dni robocze (HH:MM, HH:MM)"></textarea>
    <textarea id="fl-hours-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-hours-sun" placeholder="Niedziele"></textarea>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj Stop</button>
    <button onclick="saveLine()" class="main-btn">Zapisz</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    let db = { lines: [], news: [], contact: "MZK Gorzów", lineCategories: ["Tramwaje", "Autobusy"], globalStops: [] };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_v22_gps');
        if(local) db = JSON.parse(local);
        render();
    }

    function save() { localStorage.setItem('mzk_v22_gps', JSON.stringify(db)); render(); }

    function render() {
        const sHome = document.getElementById('home-content'); sHome.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length > 0) {
                sHome.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort().forEach(num => {
                    const l = lines.find(x => x.num === num);
                    grid.innerHTML += `<div class="line-square ${l.type}" onclick="openVariants('${num}')">${num}<small>${l.type.toUpperCase()}</small></div>`;
                });
                sHome.appendChild(grid);
            }
        });
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})" style="color:var(--accent); background:none; border:none;">EDYTUJ</button></div>`).join('');
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, index) => { if(String(l.num) === String(num)) {
            list.innerHTML += `<div class="app-card" onclick="renderTimetable(${index})"><span>Do: <b>${l.dir}</b></span><i class="fa-solid fa-chevron-right"></i></div>`;
        }});
    }

    function renderTimetable(idx) {
        const line = db.lines[idx]; show('tt');
        const now = new Date();
        const type = now.getDay() === 0 ? 'sun' : (now.getDay() === 6 ? 'sat' : 'work');

        document.getElementById('tt-head').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; padding-top:10px;">
                <div><div class="group-label">Linia ${line.num}</div><h2>Do: ${line.dir}</h2></div>
                <button class="gps-btn" onclick="findMyLocation()"><i class="fa-solid fa-location-crosshairs"></i></button>
            </div>`;
        
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let total = 0;
        line.stops.forEach((stop, sIdx) => {
            total += parseInt(stop.time) || 0;
            const offset = total;
            let hoursSource = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
            let live = "";

            if(hoursSource) {
                let future = hoursSource.split(',').map(h => {
                    let p = h.trim().split(':'); let d = new Date();
                    d.setHours(p[0], parseInt(p[1]) + offset, 0); return d;
                }).filter(d => d > now);
                if(future.length > 0) {
                    let diff = Math.floor((future[0] - now) / 60000);
                    live = diff < 60 ? `<span class="live-badge">${diff === 0 ? 'zaraz' : 'za ' + diff + ' min'}</span>` : `<span style="opacity:0.5; font-size:0.7rem;">${future[0].getHours()}:${future[0].getMinutes().toString().padStart(2,'0')}</span>`;
                }
            }

            const card = document.createElement('div');
            card.className = 'app-card'; card.style.display = 'block';
            card.setAttribute('data-stop-name', stop.name);
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <div><b>${stop.name}</b>${stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}</div>
                    <div>${live}</div>
                </div>
                <div id="g-${sIdx}" style="display:none; margin-top:10px;"><div id="times-${sIdx}" class="tt-grid"></div></div>`;
            card.onclick = () => {
                const g = document.getElementById(`g-${sIdx}`);
                g.style.display = g.style.display === 'none' ? 'block' : 'none';
                if(g.style.display === 'block') updateTimes(sIdx, line, offset, type);
            };
            body.appendChild(card);
        });
    }

    async function findMyLocation() {
        if(!navigator.geolocation) return alert("Brak GPS");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const query = `[out:json];node["highway"="bus_stop"](around:200,${lat},${lon});out;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(data.elements.length > 0) {
                    const nearest = data.elements[0].tags.name;
                    highlightNearest(nearest);
                } else alert("Nie widzę przystanku obok Ciebie.");
            } catch(e) { alert("Błąd mapy."); }
        });
    }

    function highlightNearest(name) {
        const cards = document.querySelectorAll('#tt-body .app-card');
        cards.forEach(c => {
            c.style.border = "1px solid rgba(255,255,255,0.03)";
            if(name.toLowerCase().includes(c.getAttribute('data-stop-name').toLowerCase())) {
                c.style.border = "2px solid var(--mzk-yellow)";
                c.style.background = "rgba(254, 202, 5, 0.1)";
                c.scrollIntoView({behavior: 'smooth', block: 'center'});
                c.click();
            }
        });
    }

    function updateTimes(sIdx, line, offset, type) {
        const cont = document.getElementById(`times-${sIdx}`);
        let source = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
        if(!source) return cont.innerHTML = "Brak kursów";
        const now = new Date();
        cont.innerHTML = source.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length < 2) return "";
            let arr = new Date(); arr.setHours(p[0], parseInt(p[1]) + offset, 0);
            let diff = Math.floor((arr - now) / 60000);
            let wait = (diff >= 0 && diff < 60) ? `<br><small style="color:var(--mzk-yellow); font-size:0.6rem;">za ${diff}m</small>` : "";
            return `<span class="tt-time">${arr.getHours()}:${arr.getMinutes().toString().padStart(2,'0')}${wait}</span>`;
        }).join('');
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", hoursSat:"", hoursSun:"", category:"Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-hours').value = l.hours; document.getElementById('fl-hours-sat').value = l.hoursSat || ""; document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(n="", t=2, nz=false) {
        const d = document.createElement('div'); d.className = 'stop-edit-row';
        d.innerHTML = `<input type="text" value="${n}" class="st-n"><input type="number" value="${t}" class="st-t"><input type="checkbox" ${nz?'checked':''} class="st-nz"><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-stops-list').appendChild(d);
    }

    function saveLine() {
        const stops = Array.from(document.getElementById('fl-stops-list').children).map(r => ({ name: r.querySelector('.st-n').value, time: r.querySelector('.st-t').value, nz: r.querySelector('.st-nz').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hours: document.getElementById('fl-hours').value, hoursSat: document.getElementById('fl-hours-sat').value, hoursSun: document.getElementById('fl-hours-sun').value, stops };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function exportFullBackup() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `mzk_backup.txt`; a.click(); }

    init();
</script>
</body>
</html>
