<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK Onyx Pro</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --surface-glass: rgba(18, 18, 18, 0.7);
            --primary: #3b82f6; 
            --accent: #10b981;
            --warning: #f59e0b;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --radius: 28px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- DASHBOARD BENTO GRID --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: minmax(100px, auto);
            gap: 12px;
            padding: 20px;
        }

        .bento-item {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        /* Newsy (Duży kafelek) */
        .bento-news {
            grid-column: span 6;
            background: linear-gradient(135deg, #1e1b4b, #000000);
            border-left: 4px solid var(--warning);
        }

        /* Szybki podgląd (Szeroki) */
        .bento-quick {
            grid-column: span 4;
            background: linear-gradient(135deg, #0f172a, #000000);
        }

        /* Status sieci (Mały) */
        .bento-status {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Przystanki (Kwadraty/Prostokąty) */
        .bento-stop {
            grid-column: span 3;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* --- ROZKŁAD JAZDY (TIMELINE) --- */
        .schedule-sheet {
            padding: 20px;
        }

        .hour-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        .hour-label {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            min-width: 30px;
        }

        .minutes-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .minute-item {
            background: var(--surface-glass);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- FLOATING NAV --- */
        .onyx-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: var(--surface-glass); backdrop-filter: blur(20px);
            border-radius: 40px; display: flex; justify-content: space-around;
            padding: 12px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); z-index: 1000;
        }

        .nav-link {
            color: var(--text-dim); background: none; border: none; padding: 12px;
            transition: 0.3s; cursor: pointer;
        }

        .nav-link.active { color: var(--primary); transform: translateY(-5px); }

        .line-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
            display: inline-block; margin-right: 6px;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Animacje */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app-root">
        <div id="boot-loader" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
            <div style="width: 40px; height: 40px; border: 3px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: var(--text-dim); font-weight: 600;">Inicjalizacja Onyx Engine...</p>
        </div>
    </div>

    <nav class="onyx-nav" id="nav-bar" style="display: none;">
        <button class="nav-link active" onclick="Router.go('home', this)"><i data-lucide="layout-grid"></i></button>
        <button class="nav-link" onclick="Router.go('stops', this)"><i data-lucide="map-pin"></i></button>
        <button class="nav-link" onclick="Router.go('lines', this)"><i data-lucide="bus"></i></button>
        <button class="nav-link" onclick="Router.go('admin', this)"><i data-lucide="shield-check"></i></button>
    </nav>

    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

    <script>
        // --- CONFIG ---
        const firebaseConfig = { /* TWOJE DANE KONFIGURACYJNE */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DB_KEY = "mzk_v12_pro";

        // --- GLOBAL STATE ---
        let MZK = {
            data: null,
            favorites: JSON.parse(localStorage.getItem('mzk_favs')) || []
        };

        // --- ROUTER ---
        const Router = {
            go: function(view, btn) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                if(btn) btn.classList.add('active');
                
                const root = document.getElementById('app-root');
                root.className = 'fade-in';
                
                if(view === 'home') Render.home(root);
                if(view === 'stops') Render.stops(root);
                if(view === 'lines') Render.lines(root);
                if(view === 'admin') Render.admin(root);

                lucide.createIcons();
            }
        };

        // --- RENDER ENGINE ---
        const Render = {
            home: function(container) {
                const news = MZK.data.news || {};
                const lastNews = Object.values(news).reverse()[0] || { content: "Brak nowych komunikatów." };

                container.innerHTML = `
                    <div style="padding: 40px 20px 10px 20px;">
                        <h1 style="margin:0; font-size: 2.2rem; font-weight: 800;">Onyx.</h1>
                        <p style="color: var(--text-dim); margin:0;">Witaj w Twoim mieście</p>
                    </div>

                    <div class="bento-grid">
                        <div class="bento-item bento-news">
                            <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px; color:var(--warning)">
                                <i data-lucide="megaphone" style="width:16px"></i>
                                <span style="font-weight:bold; font-size:0.8rem; text-transform:uppercase;">Komunikat</span>
                            </div>
                            <p style="margin:0; font-size: 1rem; line-height: 1.4;">${lastNews.content}</p>
                        </div>

                        <div class="bento-item bento-status">
                            <div class="line-dot"></div>
                            <span style="font-weight:800; font-size:1.2rem;">Live</span>
                            <small style="color:var(--text-dim)">Sieć aktywna</small>
                        </div>

                        <div class="bento-item bento-quick">
                            <span style="display:block; margin-bottom:10px; color:var(--text-dim); font-size:0.8rem;">NAJBLIŻSZY KURS</span>
                            <div style="font-size:1.8rem; font-weight:800;">102 <span style="font-size:0.9rem; color:var(--primary)">2 min</span></div>
                            <small>z przystanku: Piłsudskiego</small>
                        </div>

                        <div class="bento-item bento-stop" style="background: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=200') center; background-size: cover;">
                            <div style="position:absolute; inset:0; background:rgba(0,0,0,0.6);"></div>
                            <div style="position:relative; font-weight:bold;">📍 Dom</div>
                        </div>

                        <div class="bento-item bento-stop">
                            <span style="font-weight:bold;">📍 Praca</span>
                            <small style="color:var(--text-dim)">Brak opóźnień</small>
                        </div>
                    </div>
                `;
            },

            stops: function(container) {
                container.innerHTML = `<div style="padding:20px;"><h2>📍 Przystanki</h2><p>Lista wszystkich punktów sieci.</p></div>`;
                // Tu dodamy listę z wyszukiwarką
            }
        };

        // --- DATA SYNC ---
        db.ref(DB_KEY).on('value', snapshot => {
            MZK.data = snapshot.val();
            document.getElementById('nav-bar').style.display = 'flex';
            Router.go('home');
        });
// =====================================================================

// --- 1. DODATKOWE STYLE DLA ROZKŁADU ---
const styleSchedule = document.createElement('style');
styleSchedule.innerHTML = `
    .schedule-header { 
        padding: 25px 20px;

// --- 2. ROZBUDOWA RENDERERA O ROZKŁAD I NEWSY ---

// Widok szczegółowy Linii (Pełny rozkład)
Render.lineDetails = function(lineId, stopId) {
    const root = document.getElementById('app-root');
    const line = MZK.data.lines[lineId];
    const stop = MZK.data.stops[stopId];
    if(!line || !stop) return;

    const stopData = line.stops.find(s => s.id === stopId);
    const offset = stopData ? stopData.offset : 0;
    
    // Grupowanie godzin
    const fullSchedule = {};
    line.baseTimes.forEach(time => {
        let [h, m] = time.split(':').map(Number);
        let totalMin = h * 60 + m + offset;
        let realH = Math.floor(totalMin / 60) % 24;
        let realM = totalMin % 60;
        
        if(!fullSchedule[realH]) fullSchedule[realH] = [];
        fullSchedule[realH].push(realM < 10 ? '0'+realM : realM);
    });

    root.innerHTML = `
        <div class="schedule-header">
            <button onclick="Router.go('lines')" style="background:none; border:none; color:var(--text-dim); margin-bottom:15px; display:flex; align-items:center; gap:8px;">
                <i data-lucide="arrow-left"></i> Powrót do linii
            </button>
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                    <h1 style="margin:0; font-size:2.5rem;">${lineId}</h1>
                    <p style="color:var(--text-dim); margin:0;">Kierunek: <b>${line.direction}</b></p>
                </div>
                <div style="text-align:right">
                    <span style="color:var(--primary); font-weight:bold;">${stop.name}</span>
                </div>
            </div>
        </div>

        <div class="schedule-grid">
            ${Object.keys(fullSchedule).sort((a,b) => a-b).map(hour => `
                <div class="hour-block">
                    <div class="hour-num">${hour}</div>
                    <div class="minute-container">
                        ${fullSchedule[hour].map(min => {
                            const isPast = (parseInt(hour) * 60 + parseInt(min)) < (new Date().getHours() * 60 + new Date().getMinutes());
                            return `<div class="min-pill ${isPast ? 'past' : ''}">${min}</div>`;
                        }).join('')}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
    lucide.createIcons();
};

// Widok wszystkich NEWSÓW
Render.newsFeed = function(container) {
    const news = MZK.data.news || {};
    container.innerHTML = `
        <div style="padding: 40px 20px 10px 20px;">
            <h1 style="margin:0;">Centrum News</h1>
            <p style="color: var(--text-dim);">Oficjalne komunikaty sieci MZK</p>
        </div>
        <div class="news-container">
            ${Object.keys(news).reverse().map(id => `
                <div class="news-item">
                    <div class="news-date">${news[id].date || 'Dzisiaj'}</div>
                    <div style="font-weight:600; line-height:1.5;">${news[id].content}</div>
                </div>
            `).join('')}
        </div>
    `;
};

// --- 3. AKTUALIZACJA ROUTERA ---
const originalGo = Router.go;
Router.go = function(view, btn) {
    const root = document.getElementById('app-root');
    if(view === 'news') {
        this.updateNav(btn);
        Render.newsFeed(root);
        lucide.createIcons();
    } else {
        originalGo.apply(this, arguments);
    }
};

Router.updateNav = function(btn) {
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    if(btn) btn.classList.add('active');
};

// =====================================================================

// --- 1. DODATKOWE STYLE DLA EKSPLORATORA ---
const styleExplo = document.createElement('style');
styleExplo.innerHTML = `

// --- 2. LOGIKA EKSPLORATORA ---

Render.lines = function(container) {
    const lines = MZK.data.lines || {};
    
    container.innerHTML = `
        <div style="padding: 40px 20px 10px 20px;">
            <h1 style="margin:0;">Wybierz Linię</h1>
            <p style="color: var(--text-dim);">Dostępne połączenia w sieci Onyx</p>
        </div>
        
        <div class="search-container">
            <div class="search-input-wrapper">
                <i data-lucide="search" style="width:18px"></i>
                <input type="text" class="onyx-search" placeholder="Szukaj numeru lub kierunku..." oninput="Render.filterLines(this.value)">
            </div>
        </div>

        <div class="list-wrapper" id="lines-list">
            ${Object.keys(lines).map(id => this.getLineCardHTML(id, lines[id])).join('')}
        </div>
    `;
    lucide.createIcons();
};

Render.getLineCardHTML = function(id, line) {
    return `
        <div class="line-item-card" onclick="Render.lineDetails('${id}', '${line.stops[0].id}')">
            <div class="line-number-box">${id}</div>
            <div class="line-info-text">
                <span>Kierunek</span>
                <b>${line.direction}</b>
            </div>
            <i data-lucide="chevron-right" style="color:var(--text-dim)"></i>
        </div>
    `;
};

Render.filterLines = function(query) {
    const list = document.getElementById('lines-list');
    const lines = MZK.data.lines;
    const filtered = Object.keys(lines).filter(id => 
        id.toLowerCase().includes(query.toLowerCase()) || 
        lines[id].direction.toLowerCase().includes(query.toLowerCase())
    );
    
    list.innerHTML = filtered.map(id => this.getLineCardHTML(id, lines[id])).join('');
    lucide.createIcons();
};

Render.stops = function(container) {
    const stops = MZK.data.stops || {};
    
    container.innerHTML = `
        <div style="padding: 40px 20px 10px 20px;">
            <h1 style="margin:0;">Przystanki</h1>
            <p style="color: var(--text-dim);">Znajdź swój punkt odjazdu</p>
        </div>

        <div class="search-container">
            <div class="search-input-wrapper">
                <i data-lucide="map-pin" style="width:18px"></i>
                <input type="text" class="onyx-search" placeholder="Nazwa przystanku..." oninput="Render.filterStops(this.value)">
            </div>
        </div>

        <div class="list-wrapper" id="stops-list">
            ${Object.keys(stops).map(id => this.getStopCardHTML(id, stops[id])).join('')}
        </div>
    `;
    lucide.createIcons();
};

Render.getStopCardHTML = function(id, stop) {
    return `
        <div class="stop-item-card" onclick="Render.stopBoard('${id}')">
            <div class="stop-icon-circle"><i data-lucide="anchor" style="width:18px"></i></div>
            <div style="flex-grow:1">
                <b style="font-size:1.1rem">${stop.name}</b>
                <div style="font-size:0.8rem; color:var(--text-dim)">Linie: ${stop.lines.join(', ')}</div>
            </div>
            <i data-lucide="arrow-up-right" style="width:16px; color:var(--text-dim)"></i>
        </div>
    `;
};

Render.filterStops = function(query) {
    const list = document.getElementById('stops-list');
    const stops = MZK.data.stops;
    const filtered = Object.keys(stops).filter(id => 
        stops[id].name.toLowerCase().includes(query.toLowerCase())
    );
    
    list.innerHTML = filtered.map(id => this.getStopCardHTML(id, stops[id])).join('');
    lucide.createIcons();
};

// Pomocnicza funkcja dla tablicy odjazdów z poziomu przystanku
Render.stopBoard = function(id) {
    const stop = MZK.data.stops[id];
    // Tutaj moglibyśmy wyświetlić tablicę Live (Moduł 0/1), 
    // ale skierujemy do pierwszej dostępnej linii dla tego przystanku jako przykład:
    if(stop.lines.length > 0) {
        this.lineDetails(stop.lines[0], id);
    }
};

Render.travel = function(container) {
    const stops = MZK.data.stops || {};
    const stopOptions = Object.keys(stops).map(id => 
        `<option value="${id}">${stops[id].name}</option>`
    ).join('');

    container.innerHTML = `
        <div style="padding: 40px 20px 10px 20px;">
            <h1 style="margin:0;">Planer Onyx</h1>
            <p style="color: var(--text-dim);">Znajdź optymalne połączenie</p>
        </div>

        <div class="planner-box">
            <div class="input-group">
                <i data-lucide="circle-dot"></i>
                <select id="start-stop" class="planner-select">
                    <option value="" disabled selected>Punkt startowy...</option>
                    ${stopOptions}
                </select>
            </div>

            <div class="swap-btn" onclick="Render.swapPlanner()">
                <i data-lucide="arrow-up-down" style="width:16px"></i>
            </div>

            <div class="input-group">
                <i data-lucide="map-pin"></i>
                <select id="end-stop" class="planner-select">
                    <option value="" disabled selected>Cel podróży...</option>
                    ${stopOptions}
                </select>
            </div>

            <button class="btn-find" onclick="Render.findRoute()">
                Szukaj połączenia <i data-lucide="search" style="width:18px"></i>
            </button>
        </div>

        <div id="route-results"></div>
    `;
    lucide.createIcons();
};

Render.swapPlanner = function() {
    const start = document.getElementById('start-stop');
    const end = document.getElementById('end-stop');
    const temp = start.value;
    start.value = end.value;
    end.value = temp;
};

Render.findRoute = function() {
    const startId = document.getElementById('start-stop').value;
    const endId = document.getElementById('end-stop').value;
    const resultsArea = document.getElementById('route-results');

    if (!startId || !endId || startId === endId) {
        alert("Wybierz dwa różne przystanki!");
        return;
    }

    const lines = MZK.data.lines;
    let foundRoutes = [];

    // Szukanie bezpośrednich połączeń
    Object.keys(lines).forEach(lineId => {
        const line = lines[lineId];
        const startIndex = line.stops.findIndex(s => s.id === startId);
        const endIndex = line.stops.findIndex(s => s.id === endId);

        if (startIndex !== -1 && endIndex !== -1 && startIndex < endIndex) {
            const travelTime = line.stops[endIndex].offset - line.stops[startIndex].offset;
            foundRoutes.push({
                lineId,
                dir: line.direction,
                duration: travelTime
            });
        }
    });

    if (foundRoutes.length === 0) {
        resultsArea.innerHTML = `
            <div style="text-align:center; padding:40px; color:var(--text-dim);">
                <i data-lucide="frown" style="width:48px; height:48px; margin-bottom:10px;"></i>
                <p>Brak bezpośrednich połączeń.</p>
            </div>`;
    } else {
        resultsArea.innerHTML = `
            <h3 style="margin: 20px 25px 10px;">Dostępne trasy:</h3>
            ${foundRoutes.map(route => `
                <div class="route-result" onclick="Render.lineDetails('${route.lineId}', '${startId}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span class="line-number-box" style="width:40px; height:40px; font-size:1rem; margin-bottom:5px;">${route.lineId}</span>
                            <div style="font-weight:800; font-size:1.1rem;">Kierunek: ${route.dir}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="color:var(--accent); font-weight:800; font-size:1.2rem;">${route.duration} min</div>
                            <small style="color:var(--text-dim)">czas przejazdu</small>
                        </div>
                    </div>
                </div>
            `).join('')}
        `;
    }
    lucide.createIcons();
};

// --- 2. SYSTEM ULUBIONYCH (PERSISTENCE) ---

const Favs = {
    list: JSON.parse(localStorage.getItem('onyx_favs')) || [],

    toggle: function(id, event) {
        if(event) event.stopPropagation();
        const index = this.list.indexOf(id);
        
        if (index === -1) {
            this.list.push(id);
            if(event) event.currentTarget.classList.add('fav-animate');
        } else {
            this.list.splice(index, 1);
        }
        
        localStorage.setItem('onyx_favs', JSON.stringify(this.list));
        setTimeout(() => Router.go(Router.currentView), 300); // Odśwież widok
    },

    isFav: function(id) {
        return this.list.includes(id);
    }
};

// Nadpisujemy funkcję getStopCardHTML z Modułu 3, aby dodać serduszko
Render.getStopCardHTML = function(id, stop) {
    const isFav = Favs.isFav(id);
    return `
        <div class="stop-item-card stagger-item" onclick="Render.stopBoard('${id}')">
            <div class="stop-icon-circle"><i data-lucide="anchor" style="width:18px"></i></div>
            <div style="flex-grow:1">
                <b style="font-size:1.1rem">${stop.name}</b>
                <div style="font-size:0.8rem; color:var(--text-dim)">Linie: ${stop.lines.join(', ')}</div>
            </div>
            <button onclick="Favs.toggle('${id}', event)" style="background:none; border:none; cursor:pointer; color:${isFav ? '#ef4444' : 'var(--text-dim)'}; padding:5px;">
                <i data-lucide="heart" style="fill:${isFav ? '#ef4444' : 'none'}"></i>
            </button>
        </div>
    `;
};

// Aktualizacja Dashboardu (Home) o prawdziwe ulubione
const originalHome = Render.home;
Render.home = function(container) {
    originalHome.apply(this, arguments); // Wywołaj bazowy dashboard
    
    const favSection = document.createElement('div');
    favSection.style.padding = '0 20px';
    favSection.innerHTML = `<h3 style="margin: 20px 5px 15px;">Twoje Przystanki</h3>`;
    
    if (Favs.list.length === 0) {
        favSection.innerHTML += `<p style="color:var(--text-dim); padding:10px;">Dodaj przystanki do ulubionych, aby widzieć je tutaj.</p>`;
    } else {
        const grid = document.createElement('div');
        grid.className = 'bento-grid';
        grid.style.padding = '0';
        
        Favs.list.forEach(id => {
            const stop = MZK.data.stops[id];
            if(stop) {
                grid.innerHTML += `
                    <div class="bento-item bento-stop stagger-item" onclick="Render.stopBoard('${id}')" style="grid-column: span 3; height:120px;">
                        <div style="display:flex; justify-content:space-between; width:100%; align-items:flex-start;">
                            <i data-lucide="star" style="width:16px; color:var(--primary); fill:var(--primary)"></i>
                        </div>
                        <b style="font-size:1rem;">${stop.name}</b>
                        <small style="color:var(--text-dim)">Live: ${stop.lines[0] || ''}...</small>
                    </div>
                `;
            }
        });
        favSection.appendChild(grid);
    }
    container.appendChild(favSection);
    lucide.createIcons();
};

// --- 4. INICJALIZACJA STAGGER (OPÓŹNIENIE ANIMACJI) ---
// Funkcja nakładająca opóźnienie na elementy listy, aby wchodziły jeden po drugim
Render.applyStagger = function() {
    const items = document.querySelectorAll('.stagger-item');
    items.forEach((item, index) => {
        item.style.animationDelay = `${index * 0.05}s`;
    });
};

// Rozszerzenie Routera o Stagger
const motionGo = Router.go;
Router.go = function() {
    motionGo.apply(this, arguments);
    Render.applyStagger();
};
