<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .line-square.bus { border-bottom: 4px solid var(--accent); }
        .line-square.tram { border-bottom: 4px solid var(--danger); }
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .news-card { display: block; cursor: default; }
        .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .news-date { font-size: 0.7rem; color: var(--accent); font-weight: 700; }
        .news-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; }
        .tag-utrudnienia { background: rgba(255, 72, 66, 0.2); color: var(--danger); }
        .tag-rozklad { background: rgba(0, 171, 85, 0.2); color: var(--accent); }
        .tag-info { background: rgba(24, 144, 255, 0.2); color: var(--info); }
        .search-box { width: 100%; padding: 15px; border-radius: 15px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 15px; font-family: inherit; }
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 12px; }
        .tt-time { background: var(--accent); color: white; padding: 10px 5px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 0.95rem; }
        .day-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .day-tab { flex: 1; padding: 10px; background: var(--surface); border-radius: 10px; text-align: center; font-size: 0.7rem; font-weight: 700; cursor: pointer; color: var(--text-sec); border: 1px solid rgba(255,255,255,0.05); }
        .day-tab.active { background: var(--accent); color: white; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; font-weight: 800; }
        .nearby-info { color: var(--warn); font-size: 0.75rem; margin-top: 3px; font-weight: 400; opacity: 0.9; }
        .stop-lines-row { display: flex; flex-wrap: wrap; align-items: center; margin-top: 8px; color: var(--text-sec); font-size: 0.85rem; }
        .stop-line-item { display: inline-flex; align-items: center; gap: 4px; }
        .stop-line-item i { font-size: 0.75rem; color: var(--accent); }
        .stop-line-item.is-tram i { color: var(--danger); }
        .spacer { white-space: pre; }
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }
        .adm-nav-main { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 15px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; }
        .adm-nav-main button.active { background: var(--accent); color: white; }
        .adm-stop-card { background: #1c252e; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #333; position: relative; }
        .stop-edit-item { background: #1c252e; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 65px 45px 40px; gap: 8px; align-items: center; }
        .stop-edit-item input { margin: 0; padding: 10px 5px; font-size: 0.85rem; height: 40px; background: #0b0f19; border: 1px solid #333; color: white; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        .details-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <div class="group-label">Wyszukiwarka Przystanków</div>
        <input type="text" id="stop-search" class="search-box" placeholder="Szukaj przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section">
        <div class="group-label">Komunikaty i Zmiany</div>
        <div id="public-news-list"></div>
    </div>
    <div id="s-contact" class="section"><div class="group-label">Informacje</div><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="day-selector" class="day-tabs"></div><div id="tt-body"></div><button id="tt-back-btn" onclick="show('vars')" class="main-btn" style="background:#333">Wróć do kierunków</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setTab('n')" id="mt-n">NEWS</button>
                <button onclick="setTab('c')" id="mt-c">INFO</button>
                <button onclick="setTab('s')" id="mt-s">KOPIA</button>
                <button onclick="setTab('z')" id="mt-z">ZAAW</button>
            </div>
            <div id="tab-l" class="adm-tab">
                <button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button>
                <div id="adm-lines-list"></div>
            </div>
            <div id="tab-p" class="adm-tab" style="display:none;"><div class="group-label">Baza Przystanków</div><div id="adm-stops-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;"><button onclick="openNewsForm(-1)" class="main-btn">Dodaj news</button><div id="adm-news-list"></div></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:200px"></textarea><button onclick="saveContact()" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportFullBackup()" class="main-btn">Eksportuj Backup</button><input type="file" id="importFile" style="display:none" onchange="importFullBackup(event)"><button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj Backup</button></div>
            <div id="tab-z" class="adm-tab" style="display:none;"><div class="group-label">Kategorie</div><div id="adm-cats-list"></div></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <div class="group-label">Godziny (oddzielone przecinkiem)</div>
    <textarea id="fl-hours-working" placeholder="Dni robocze (np. 08:10, 08:40)"></textarea>
    <textarea id="fl-hours-sat" placeholder="Soboty"></textarea>
    <textarea id="fl-hours-sun" placeholder="Niedziele i Święta"></textarea>
    <div style="background:#000; padding:10px; border-radius:10px;">
        <textarea id="fl-bulk" placeholder="Wklej listę przystanków..." style="height:60px; margin-bottom:5px;"></textarea>
        <button onclick="convertBulk()" class="main-btn" style="padding:10px; font-size:0.7rem;">Konwertuj Listę ↓</button>
    </div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn">+ Dodaj przystanek</button>
    <button onclick="saveLine()" class="main-btn">ZAPISZ WSZYSTKO</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <h2>Edytuj News</h2>
    <input type="text" id="fn-title" placeholder="Tytuł">
    <select id="fn-cat"><option value="info">Info</option><option value="utrudnienia">Utrudnienia</option><option value="rozklad">Rozkład</option></select>
    <textarea id="fn-content" placeholder="Treść..." style="height:150px"></textarea>
    <button onclick="saveNews()" class="main-btn">Zapisz News</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M",
        authDomain: "mzk-by-facio.firebaseapp.com",
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mzk-by-facio",
        storageBucket: "mzk-by-facio.firebasestorage.app",
        messagingSenderId: "676970411647",
        appId: "1:676970411647:web:5703d5fb5fb499ff83714a",
        measurementId: "G-EZ1WKZXX6K"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], news: [], contact: "MZK Gorzów", stopDetails: {}, lineCategories: ["Tramwaje", "Autobusy"] };
    let curLineIdx = -1, curNewsIdx = -1, selectedDay = 'working', activeStopIdx = -1; 
    let allAutoStops = [];

    function init() {
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                db = data;
                if(!db.stopDetails) db.stopDetails = {};
                extractStops();
                render();
            }
        });
    }

    function save() { dbRef.set(db); }

    function extractStops() { 
        let sSet = new Set(); 
        db.lines.forEach(l => { if(l.stops) l.stops.forEach(s => { sSet.add(s.name); if(!db.stopDetails[s.name]) db.stopDetails[s.name] = {nearby:"", isNz: s.nz}; })});
        allAutoStops = [...sSet].sort();
    }

    function render() {
        const sHome = document.getElementById('s-home'); sHome.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lInCat = db.lines.filter(l => l.category === cat);
            if(lInCat.length > 0) {
                sHome.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lInCat.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = lInCat.find(x => x.num === num);
                    grid.innerHTML += `<div class="line-square ${l.type}" onclick="openVariants('${num}')">${num}</div>`;
                });
                sHome.appendChild(grid);
            }
        });
        document.getElementById('public-news-list').innerHTML = db.news.map(n => `<div class="app-card news-card"><b>${n.title}</b><p style="font-size:0.8rem; color:var(--text-sec)">${n.content}</p></div>`).reverse().join('');
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> -> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
        document.getElementById('contact-display').innerText = db.contact;
        filterStops();
        renderAdminStops();
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num} - Kierunki</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.forEach((l, i) => {
            if(String(l.num) === String(num)) {
                list.innerHTML += `<div class="app-card" onclick="renderTimetable(${i})"><b>Kierunek: ${l.dir}</b><i class="fa-solid fa-chevron-right"></i></div>`;
            }
        });
    }

    function renderTimetable(idx, stopIdx = -1) {
        activeStopIdx = stopIdx;
        const line = db.lines[idx]; show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num} | ${line.dir}</div>`;
        
        const sel = document.getElementById('day-selector');
        sel.innerHTML = `
            <div class="day-tab ${selectedDay==='working'?'active':''}" onclick="selectedDay='working'; renderTimetable(${idx}, ${stopIdx})">Dni robocze</div>
            <div class="day-tab ${selectedDay==='sat'?'active':''}" onclick="selectedDay='sat'; renderTimetable(${idx}, ${stopIdx})">Soboty</div>
            <div class="day-tab ${selectedDay==='sun'?'active':''}" onclick="selectedDay='sun'; renderTimetable(${idx}, ${stopIdx})">Niedziele</div>
        `;

        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let totalTime = 0;

        line.stops.forEach((s, i) => {
            totalTime += parseInt(s.time) || 0;
            // Jeśli wybraliśmy konkretny przystanek, ukrywamy resztę
            if(activeStopIdx !== -1 && activeStopIdx !== i) return;

            const det = db.stopDetails[s.name] || {nearby:"", isNz: false};
            const others = getOtherLines(s.name, line.num);

            const card = document.createElement('div'); card.className = 'app-card'; card.style.display = 'block';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div onclick="toggleStopView(${idx}, ${i})">
                        <b>${s.name}</b>${det.isNz?'<span class="nz-badge">NŻ</span>':''}
                        <div class="nearby-info">${det.nearby || 'Brak opisu okolicy'}</div>
                    </div>
                    ${activeStopIdx !== -1 ? '<i class="fa-solid fa-compress" onclick="renderTimetable('+idx+', -1)"></i>' : '<i class="fa-solid fa-clock"></i>'}
                </div>
                ${activeStopIdx !== -1 ? `
                    <div class="details-box">
                        <div class="group-label" style="margin:0 0 5px 0">Inne linie tutaj:</div>
                        <div class="stop-lines-row">${others}</div>
                        <div class="group-label" style="margin:10px 0 5px 0">Rozkład jazdy:</div>
                        <div class="tt-grid">${calculateHours(line, selectedDay, totalTime)}</div>
                    </div>
                ` : ''}
            `;
            body.appendChild(card);
        });
        document.getElementById('tt-back-btn').innerText = activeStopIdx !== -1 ? "Wróć do listy przystanków" : "Wróć do kierunków";
        document.getElementById('tt-back-btn').onclick = activeStopIdx !== -1 ? () => renderTimetable(idx, -1) : () => show('vars');
    }

    function toggleStopView(lineIdx, stopIdx) {
        if(activeStopIdx === stopIdx) renderTimetable(lineIdx, -1);
        else renderTimetable(lineIdx, stopIdx);
    }

    function calculateHours(line, day, offset) {
        const field = day === 'working' ? 'hoursWorking' : (day === 'sat' ? 'hoursSat' : 'hoursSun');
        const raw = line[field] || "";
        if(!raw) return '<span style="font-size:0.7rem; color:var(--danger)">Brak kursów w tym dniu.</span>';
        return raw.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length<2) return "";
            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset);
            return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        }).join('');
    }

    function getOtherLines(stopName, currentNum) {
        let lines = [];
        db.lines.forEach(l => {
            if(String(l.num) !== String(currentNum) && l.stops.some(st => st.name === stopName)) {
                if(!lines.some(x => x.num === l.num)) lines.push({num: l.num, type: l.type});
            }
        });
        return lines.length ? lines.map(ln => `<span class="stop-line-item ${ln.type==='tram'?'is-tram':''}"><i class="fa-solid fa-${ln.type==='tram'?'tram':'bus'}"></i>${ln.num}</span>`).join('<span class="spacer"> </span>') : 'Brak przesiadek';
    }

    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        allAutoStops.filter(s => s.toLowerCase().includes(q)).forEach(s => {
            const det = db.stopDetails[s] || {nearby:""};
            const others = getOtherLines(s, "");
            list.innerHTML += `
                <div class="app-card" style="display:block;">
                    <b>${s}</b>
                    <div class="nearby-info">${det.nearby}</div>
                    <div class="stop-lines-row">${others}</div>
                </div>
            `;
        });
    }

    function openLineForm(idx) {
        curLineIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hoursWorking:"", hoursSat:"", hoursSun:"", category: db.lineCategories[0], stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num;
        document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-type').value = l.type;
        document.getElementById('fl-hours-working').value = l.hoursWorking || "";
        document.getElementById('fl-hours-sat').value = l.hoursSat || "";
        document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = '';
        (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('.stop-edit-item')).map(el => ({
            name: el.querySelector('.edit-stop-name').value.trim(),
            time: parseInt(el.querySelector('.edit-stop-time').value) || 0,
            nz: el.querySelector('.edit-stop-nz').checked
        })).filter(s => s.name !== "");

        const data = {
            num: document.getElementById('fl-num').value,
            dir: document.getElementById('fl-dir').value,
            type: document.getElementById('fl-type').value,
            category: document.getElementById('fl-cat').value,
            hoursWorking: document.getElementById('fl-hours-working').value,
            hoursSat: document.getElementById('fl-hours-sat').value,
            hoursSun: document.getElementById('fl-hours-sun').value,
            stops: stops
        };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function addStopRow(name = "", time = 2, nz = false) {
        const div = document.createElement('div'); div.className = 'stop-edit-item';
        div.innerHTML = `<input type="text" value="${name}" class="edit-stop-name"><input type="number" value="${time}" class="edit-stop-time"><label><input type="checkbox" ${nz?'checked':''} class="edit-stop-nz"> NŻ</label><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function convertBulk() {
        const t = document.getElementById('fl-bulk').value;
        t.split('\n').filter(s => s.trim() !== "").forEach((r, i) => {
            let nz = r.includes('nż'); let name = r.replace('nż', '').trim();
            addStopRow(name, (i === 0 ? 0 : 2), nz);
        });
        document.getElementById('fl-bulk').value = "";
    }

    function renderAdminStops() {
        document.getElementById('adm-stops-list').innerHTML = allAutoStops.map(s => {
            const det = db.stopDetails[s] || {nearby:""};
            return `<div class="adm-stop-card"><b>${s}</b><input type="text" placeholder="Co w pobliżu?" value="${det.nearby}" onchange="db.stopDetails['${s}'].nearby=this.value; save()"></div>`;
        }).join('');
    }

    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); 
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
    }
    function setTab(t) { document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none'); document.getElementById('tab-'+t).style.display='block'; }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function saveContact() { db.contact = document.getElementById('edit-contact-text').value; save(); }

    init();
</script>
</body>
</html>
