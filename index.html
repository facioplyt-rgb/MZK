<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK Pro Infinity Cloud</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #020617;
            --surface: #0f172a;
            --surface-bright: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --radius-xl: 28px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            padding-bottom: 110px; min-height: 100vh;
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        /* --- STYLIZACJA ELEMENTÓW --- */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .card {
            padding: 20px; margin-bottom: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:active { transform: scale(0.98); }

        .header {
            padding: 30px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
        }

        .status-tag {
            display: flex; align-items: center; gap: 8px; padding: 6px 14px;
            border-radius: 50px; font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; border: 1px solid var(--border);
        }
        .online { color: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .offline { color: var(--danger); }

        .btn {
            padding: 14px 24px; border-radius: 16px; border: none;
            font-weight: 700; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: 0.2s; font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 20px var(--primary-glow); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        .input, .select, .textarea {
            width: 100%; padding: 15px; border-radius: 14px; background: var(--surface-bright);
            border: 1px solid var(--border); color: var(--text); font-family: inherit;
            margin-bottom: 12px; outline: none;
        }
        .input:focus { border-color: var(--primary); }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 480px; height: 75px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .nav-btn {
            color: var(--text-dim); transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-btn.active { color: var(--primary); transform: translateY(-5px); }
        .nav-btn span { font-size: 0.6rem; font-weight: 700; }

        /* --- ADMIN SPECIFIC --- */
        .admin-tab-scroller {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
            margin-bottom: 20px; scrollbar-width: none;
        }
        .admin-tab-scroller::-webkit-scrollbar { display: none; }
        
        .admin-card-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px;
            margin-bottom: 8px;
        }

        .category-tag {
            padding: 4px 10px; border-radius: 6px; font-size: 0.65rem;
            font-weight: 800; text-transform: uppercase;
        }

        /* --- ANIMACJE --- */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 1.5rem; font-weight: 800; letter-spacing: -1px;">MZK <span style="color:var(--primary)">INFINITY</span></h1>
            <div style="font-size: 0.65rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase;">Cloud Management System</div>
        </div>
        <div id="conn-status" class="status-tag offline">
            <div style="width: 8px; height: 8px; background: currentColor; border-radius: 50%;"></div>
            <span id="conn-text">Disconnected</span>
        </div>
    </div>

    <div id="app" class="container" style="padding: 0 20px;">
        <div id="view-container"></div>
    </div>

    <nav class="nav-bar glass">
        <div class="nav-btn active" onclick="Router.go('home', this)"><i data-lucide="home"></i><span>Start</span></div>
        <div class="nav-btn" onclick="Router.go('stops', this)"><i data-lucide="map-pin"></i><span>Przystanki</span></div>
        <div class="nav-btn" onclick="Router.go('lines', this)"><i data-lucide="bus"></i><span>Linie</span></div>
        <div class="nav-btn" onclick="Router.go('admin', this)"><i data-lucide="shield-check"></i><span>Admin</span></div>
    </nav>

    <script>
        // --- KONFIGURACJA ---
        let db;
        const DB_PREFIX = "mzk_infinity_v4";
        let AppState = {
            data: { news: {}, stops: {}, lines: {}, categories: {} },
            activeTab: 'admin-news'
        };

        // --- FIREBASE LOGIC ---
        function InitFirebase(config) {
            try {
                if(firebase.apps.length) firebase.app().delete();
                firebase.initializeApp(config);
                db = firebase.database();
                
                db.ref('.info/connected').on('value', snap => {
                    const status = document.getElementById('conn-status');
                    const text = document.getElementById('conn-text');
                    if(snap.val() === true) {
                        status.className = "status-tag online";
                        text.innerText = "Cloud Online";
                    } else {
                        status.className = "status-tag offline";
                        text.innerText = "Disconnected";
                    }
                });

                db.ref(DB_PREFIX).on('value', snap => {
                    if(snap.val()) {
                        AppState.data = snap.val();
                        Router.refresh();
                    }
                });
                localStorage.setItem('mzk_fb_config', JSON.stringify(config));
            } catch(e) { alert("Błąd Firebase: " + e.message); }
        }

        // --- ROUTER ---
        const Router = {
            current: 'home',
            go(view, el) {
                this.current = view;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                if(el) el.classList.add('active');
                this.refresh();
            },
            refresh() {
                const container = document.getElementById('view-container');
                container.innerHTML = '';
                container.className = 'fade-in';
                
                if(this.current === 'home') Render.home(container);
                if(this.current === 'stops') Render.stops(container);
                if(this.current === 'lines') Render.lines(container);
                if(this.current === 'admin') Render.admin(container);
                
                lucide.createIcons();
            }
        };

        // --- RENDERERY ---
        const Render = {
            home(cont) {
                let html = `<h2 style="margin-bottom:20px;">Aktualności</h2>`;
                const news = Object.entries(AppState.data.news || {}).reverse();
                
                news.forEach(([id, n]) => {
                    const cat = AppState.data.categories?.[n.cat] || { name: 'Ogólne', color: '#6366f1' };
                    html += `
                        <div class="glass card">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                                <span class="category-tag" style="background: ${cat.color}22; color: ${cat.color}; border: 1px solid ${cat.color}44;">${cat.name}</span>
                                <span style="font-size:0.7rem; color:var(--text-dim); font-weight:700;">${n.date}</span>
                            </div>
                            <div style="font-weight:600; line-height:1.6;">${n.content}</div>
                        </div>
                    `;
                });
                cont.innerHTML = html || `<p style="text-align:center; color:var(--text-dim); padding:40px;">Brak komunikatów w chmurze.</p>`;
            },

            stops(cont) {
                cont.innerHTML = `<h2>Wszystkie Przystanki</h2><input type="text" class="input glass" placeholder="Szukaj przystanku..." oninput="Search(this, '.stop-card')">`;
                Object.entries(AppState.data.stops || {}).forEach(([id, s]) => {
                    cont.innerHTML += `
                        <div class="glass card stop-card" data-search="${s.name.toLowerCase()}" onclick="Render.viewStopDetails('${id}')">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <div style="font-weight:800; font-size:1.1rem;">${s.name}</div>
                                    <div style="font-size:0.75rem; color:var(--text-dim); margin-top:4px;">Obsługiwane linie: ${s.lines?.join(', ') || 'Brak danych'}</div>
                                </div>
                                <i data-lucide="chevron-right" style="color:var(--text-dim)"></i>
                            </div>
                        </div>
                    `;
                });
            },

            lines(cont) {
                cont.innerHTML = `<h2>Linie Komunikacyjne</h2><input type="text" class="input glass" placeholder="Szukaj linii..." oninput="Search(this, '.line-card')">`;
                Object.entries(AppState.data.lines || {}).forEach(([id, l]) => {
                    cont.innerHTML += `
                        <div class="glass card line-card" data-search="${id} ${l.direction.toLowerCase()}" onclick="Render.viewLineDetails('${id}')">
                            <div style="display:flex; align-items:center; gap:20px;">
                                <div style="background:var(--primary); color:white; width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.3rem;">${id}</div>
                                <div>
                                    <div style="font-size:0.65rem; color:var(--text-dim); font-weight:800;">KIERUNEK</div>
                                    <div style="font-weight:700; font-size:1.1rem;">${l.direction}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            },

            admin(cont) {
                cont.innerHTML = `
                    <div class="glass card" style="margin-bottom:25px; border-color: var(--primary);">
                        <h3 style="margin-top:0;">Konfiguracja Chmury</h3>
                        <p style="font-size:0.8rem; color:var(--text-dim);">Wklej swój obiekt firebaseConfig, aby aplikacja zaczęła pobierać i zapisywać dane w Twojej chmurze.</p>
                        <textarea id="fb-config-input" class="textarea" style="height:100px; font-size:0.7rem;" placeholder='{"apiKey": "...", "databaseURL": "...", ...}'></textarea>
                        <button class="btn btn-primary" onclick="SaveFBConfig()">Połącz i Aktywuj</button>
                    </div>

                    <div class="admin-tab-scroller">
                        <button class="btn btn-outline" onclick="SetAdminTab('news')">Komunikaty</button>
                        <button class="btn btn-outline" onclick="SetAdminTab('stops')">Przystanki</button>
                        <button class="btn btn-outline" onclick="SetAdminTab('lines')">Linie</button>
                        <button class="btn btn-outline" onclick="SetAdminTab('cats')">Kategorie</button>
                    </div>

                    <div id="admin-panel-content" class="fade-in"></div>
                `;
                SetAdminTab('news');
            }
        };

        // --- FUNKCJE ADMINISTRACYJNE ---
        function SetAdminTab(tab) {
            const area = document.getElementById('admin-panel-content');
            let html = ``;

            if(tab === 'news') {
                html = `
                    <div class="glass card">
                        <h3>Dodaj Nowy Komunikat</h3>
                        <select id="adm-news-cat" class="select">
                            ${Object.entries(AppState.data.categories || {}).map(([id, c]) => `<option value="${id}">${c.name}</option>`).join('')}
                            <option value="none">Bez kategorii</option>
                        </select>
                        <textarea id="adm-news-content" class="textarea" placeholder="Treść wiadomości..."></textarea>
                        <button class="btn btn-primary" style="width:100%" onclick="AdminAddNews()">Opublikuj w Chmurze</button>
                    </div>
                    <div class="glass card">
                        <h3>Zarządzaj wiadomościami</h3>
                        ${Object.entries(AppState.data.news || {}).reverse().map(([id, n]) => `
                            <div class="admin-card-item">
                                <div style="font-size:0.8rem; max-width:70%;">${n.content.substring(0,40)}...</div>
                                <button class="btn btn-danger" style="padding:6px 10px;" onclick="AdminDelete('news/${id}')"><i data-lucide="trash-2" style="width:14px;"></i></button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(tab === 'stops') {
                html = `
                    <div class="glass card">
                        <h3>Nowy Przystanek / Edycja</h3>
                        <input id="adm-stop-id" class="input" placeholder="ID Przystanku (np. s1)">
                        <input id="adm-stop-name" class="input" placeholder="Nazwa Przystanku">
                        <button class="btn btn-primary" style="width:100%" onclick="AdminSaveStop()">Zapisz Przystanek</button>
                    </div>
                    <div class="glass card">
                        <h3>Lista Przystanków</h3>
                        ${Object.entries(AppState.data.stops || {}).map(([id, s]) => `
                            <div class="admin-card-item">
                                <div><b>${id}</b> - ${s.name}</div>
                                <button class="btn btn-danger" style="padding:6px 10px;" onclick="AdminDelete('stops/${id}')"><i data-lucide="trash-2" style="width:14px;"></i></button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(tab === 'lines') {
                html = `
                    <div class="glass card">
                        <h3>Kreator Linii</h3>
                        <input id="adm-line-id" class="input" placeholder="Numer (np. 102)">
                        <input id="adm-line-dir" class="input" placeholder="Kierunek docelowy">
                        <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:5px;">Czasy bazowe (rozdzielone przecinkiem):</p>
                        <input id="adm-line-times" class="input" placeholder="06:00, 07:15, 08:30">
                        <p style="font-size:0.7rem; color:var(--text-dim); margin-bottom:5px;">Trasa (ID:Offset, ID:Offset...):</p>
                        <textarea id="adm-line-route" class="textarea" placeholder="s1:0, s2:12, s3:25"></textarea>
                        <button class="btn btn-primary" style="width:100%" onclick="AdminSaveLine()">Zapisz Linię</button>
                    </div>
                    <div class="glass card">
                        <h3>Istniejące Linie</h3>
                        ${Object.entries(AppState.data.lines || {}).map(([id, l]) => `
                            <div class="admin-card-item">
                                <div><b>Linia ${id}</b> → ${l.direction}</div>
                                <button class="btn btn-danger" style="padding:6px 10px;" onclick="AdminDelete('lines/${id}')"><i data-lucide="trash-2" style="width:14px;"></i></button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if(tab === 'cats') {
                html = `
                    <div class="glass card">
                        <h3>Kategorie Newsów</h3>
                        <input id="adm-cat-id" class="input" placeholder="ID (np. info)">
                        <input id="adm-cat-name" class="input" placeholder="Nazwa wyświetlana">
                        <input id="adm-cat-color" class="input" type="color" value="#6366f1">
                        <button class="btn btn-primary" style="width:100%" onclick="AdminSaveCat()">Zapisz Kategorię</button>
                    </div>
                    <div class="glass card">
                        ${Object.entries(AppState.data.categories || {}).map(([id, c]) => `
                            <div class="admin-card-item">
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <div style="width:20px; height:20px; border-radius:4px; background:${c.color}"></div>
                                    <b>${c.name}</b>
                                </div>
                                <button class="btn btn-danger" style="padding:6px 10px;" onclick="AdminDelete('categories/${id}')"><i data-lucide="trash-2" style="width:14px;"></i></button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            area.innerHTML = html;
            lucide.createIcons();
        }

        // --- AKCJE BAZY DANYCH ---
        function SaveFBConfig() {
            const val = document.getElementById('fb-config-input').value;
            try {
                const conf = JSON.parse(val);
                InitFirebase(conf);
                alert("Konfiguracja przyjęta! Sprawdź status połączenia.");
            } catch(e) { alert("To nie jest poprawny JSON!"); }
        }

        function AdminAddNews() {
            if(!db) return alert("Brak połączenia!");
            const content = document.getElementById('adm-news-content').value;
            const cat = document.getElementById('adm-news-cat').value;
            const payload = {
                content: content,
                cat: cat,
                date: new Date().toLocaleString('pl-PL')
            };
            db.ref(`${DB_PREFIX}/news/${Date.now()}`).set(payload);
        }

        function AdminSaveStop() {
            const id = document.getElementById('adm-stop-id').value;
            const name = document.getElementById('adm-stop-name').value;
            if(!id || !name || !db) return alert("Błąd danych!");
            db.ref(`${DB_PREFIX}/stops/${id}`).update({ name: name });
        }

        function AdminSaveLine() {
            const id = document.getElementById('adm-line-id').value;
            const dir = document.getElementById('adm-line-dir').value;
            const times = document.getElementById('adm-line-times').value.split(',').map(t => t.trim());
            const routeRaw = document.getElementById('adm-line-route').value.split(',').map(r => {
                const [sid, off] = r.trim().split(':');
                return { id: sid, offset: parseInt(off) };
            });

            if(!id || !db) return alert("Błąd!");
            db.ref(`${DB_PREFIX}/lines/${id}`).set({
                direction: dir,
                baseTimes: times,
                stops: routeRaw
            }).then(() => {
                // Automatyczna aktualizacja przystanków - dopisanie linii
                routeRaw.forEach(r => {
                    const stopRef = db.ref(`${DB_PREFIX}/stops/${r.id}/lines`);
                    stopRef.transaction(current => {
                        let lines = current || [];
                        if(!lines.includes(id)) lines.push(id);
                        return lines;
                    });
                });
                alert("Linia zapisana w chmurze!");
            });
        }

        function AdminSaveCat() {
            const id = document.getElementById('adm-cat-id').value;
            const name = document.getElementById('adm-cat-name').value;
            const color = document.getElementById('adm-cat-color').value;
            if(!id || !db) return;
            db.ref(`${DB_PREFIX}/categories/${id}`).set({ name, color });
        }

        function AdminDelete(path) {
            if(confirm("Czy na pewno chcesz to usunąć z chmury?") && db) {
                db.ref(`${DB_PREFIX}/${path}`).remove();
            }
        }

        // --- UTILS ---
        function Search(input, selector) {
            const q = input.value.toLowerCase();
            document.querySelectorAll(selector).forEach(el => {
                el.style.display = el.dataset.search.includes(q) ? 'block' : 'none';
            });
        }

        // Start aplikacji
        window.onload = () => {
            const saved = localStorage.getItem('mzk_fb_config');
            if(saved) InitFirebase(JSON.parse(saved));
            Router.go('home');
        };

    </script>
</body>
</html>
