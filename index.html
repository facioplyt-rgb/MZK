<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System MZK Gorzów</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        header { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        .brand span { color: var(--text); }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: appFade 0.4s ease-out; }
        @keyframes appFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* KARTY INTERFEJSU */
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; letter-spacing: 1px; }
        .app-card { background: var(--surface); padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .line-tag { background: var(--accent); color: white; padding: 6px 14px; border-radius: 12px; font-weight: 800; }

        /* ADMIN TABS */
        .adm-nav-main { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .adm-nav-main button { padding: 10px 2px; font-size: 0.6rem; border-radius: 10px; border: none; background: var(--surface); color: var(--text-sec); font-weight: 700; cursor: pointer; }
        .adm-nav-main button.active { background: var(--accent); color: white; }

        .sub-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .sub-nav button { flex: 1; padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.05); color: white; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
        .sub-nav button.active { background: #333; border: 1px solid var(--accent); }

        .main-btn { background: var(--accent); color: white; width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 14px; background: #1c252e; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; }

        .stop-editor-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 8px; }
        .stop-editor-row span { flex: 1; font-size: 0.85rem; color: var(--text-sec); }
        .stop-editor-row input { width: 70px; margin-bottom: 0; text-align: center; background: var(--bg); color: var(--accent); font-weight: 800; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 28, 36, 0.9); backdrop-filter: blur(15px); display: flex; height: 85px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }
    </style>
</head>
<body>

<header><div class="brand">MZK <span>GORZÓW</span></div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="lines-tram-title" class="group-label">Tramwaje</div><div id="lines-tram"></div>
        <div id="lines-bus-title" class="group-label">Autobusy</div><div id="lines-bus"></div>
    </div>

    <div id="s-stops" class="section">
        <div class="group-label">Baza Przystanków Gorzów</div>
        <div id="all-stops-view"></div>
    </div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Wróć</button></div>
    <div id="s-info" class="section"><div class="group-label">Informacje</div><div id="info-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>
    <div id="s-contact" class="section"><div class="group-label">Kontakt</div><div id="contact-display" class="app-card" style="display:block; white-space:pre-wrap;"></div></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło admina" style="text-align:center;">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main">
                <button onclick="setMainTab('l')" id="mt-l" class="active">LINIE</button>
                <button onclick="setMainTab('p')" id="mt-p">PRZYST</button>
                <button onclick="setMainTab('i')" id="mt-i">INFO</button>
                <button onclick="setMainTab('c')" id="mt-c">KONTAKT</button>
                <button onclick="setMainTab('s')" id="mt-s">PLIKI</button>
            </div>

            <div id="tab-l" class="adm-tab">
                <div class="sub-nav">
                    <button onclick="setSubTab('l','list')" id="st-l-list" class="active">EDYCJA</button>
                    <button onclick="openLineModal(-1)">NOWA</button>
                </div>
                <div id="adm-lines-list"></div>
            </div>

            <div id="tab-p" class="adm-tab" style="display:none;">
                <div class="sub-nav">
                    <button onclick="setSubTab('p','list')" id="st-p-list" class="active">LISTA</button>
                    <button onclick="openStopBaseModal(-1)">NOWY</button>
                </div>
                <div id="adm-stops-base-list"></div>
            </div>

            <div id="tab-i" class="adm-tab" style="display:none;"><textarea id="edit-info-text" style="height:300px;"></textarea><button onclick="saveGlobal('info')" class="main-btn">Zapisz</button></div>
            <div id="tab-c" class="adm-tab" style="display:none;"><textarea id="edit-contact-text" style="height:300px;"></textarea><button onclick="saveGlobal('contact')" class="main-btn">Zapisz</button></div>
            <div id="tab-s" class="adm-tab" style="display:none;"><button onclick="exportData()" class="main-btn">Eksportuj Baza.txt</button><input type="file" id="importFile" style="display:none" onchange="importData(event)"><button onclick="document.getElementById('importFile').click()" class="main-btn" style="background:#800">Importuj Baza.txt</button></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-bell"></i><span>Info</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-phone"></i><span>Kontakt</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-user-lock"></i><span>Admin</span></div>
</nav>

<div id="mod-line" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h2>Edycja Linii</h2>
    <input type="text" id="ml-num" placeholder="Numer">
    <input type="text" id="ml-dir" placeholder="Kierunek">
    <select id="ml-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="ml-hours" placeholder="Godziny pętli: 05:00, 06:00..."></textarea>
    <p class="group-label">1. Wpisz/Wklej nazwy przystanków</p>
    <textarea id="ml-stops-raw" style="height:100px;" oninput="generateStopInputs()"></textarea>
    <div id="stop-inputs-container"></div>
    <button onclick="saveLine()" class="main-btn">Zapisz Linię</button>
    <button onclick="closeModals()" class="main-btn" style="background:none; color:var(--text-sec)">Anuluj</button>
</div>

<div id="mod-stop-base" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:3000;display:none;padding:20px;overflow-y:auto;">
    <h2>Konfiguracja Przystanku</h2>
    <input type="text" id="msb-name" placeholder="Nazwa przystanku">
    <textarea id="msb-info" style="height:150px;" placeholder="Opis (co w pobliżu, inne autobusy, przesiadki...)"></textarea>
    <button onclick="saveStopBase()" class="main-btn">Zapisz Przystanek</button>
    <button onclick="closeModals()" class="main-btn" style="background:none; color:var(--text-sec)">Anuluj</button>
</div>

<script>
    let db = { lines: [], stopsBase: [], info: "Witaj!", contact: "MZK" };
    let activeIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_pro_db');
        if(local) db = JSON.parse(local);
        if(!db.stopsBase) db.stopsBase = [];
        render();
    }

    function save() { localStorage.setItem('mzk_pro_db', JSON.stringify(db)); render(); }

    function generateStopInputs() {
        const container = document.getElementById('stop-inputs-container');
        const raw = document.getElementById('ml-stops-raw').value.split('\n').filter(s => s.trim());
        const old = {}; document.querySelectorAll('.st-time').forEach(i => old[i.dataset.name] = i.value);
        container.innerHTML = '<p class="group-label">2. Czas przejazdu (+min)</p>';
        raw.forEach((n, i) => {
            const row = document.createElement('div'); row.className = 'stop-editor-row';
            const v = (i === 0) ? "0" : (old[n] || "1");
            row.innerHTML = `<span>${n}</span><input type="number" class="st-time" data-name="${n}" value="${v}" ${i===0?'disabled':''}>`;
            container.appendChild(row);
        });
    }

    function saveLine() {
        const names = document.getElementById('ml-stops-raw').value.split('\n').filter(s => s.trim());
        const inps = document.querySelectorAll('.st-time');
        let stops = names.map((n, i) => `${n.trim()} | +${inps[i] ? inps[i].value : "1"}`).join('\n');
        const data = { num: document.getElementById('ml-num').value, dir: document.getElementById('ml-dir').value, type: document.getElementById('ml-type').value, hours: document.getElementById('ml-hours').value, stops };
        if(activeIdx === -1) db.lines.push(data); else db.lines[activeIdx] = data;
        save(); closeModals();
    }

    function saveStopBase() {
        const data = { name: document.getElementById('msb-name').value, info: document.getElementById('msb-info').value };
        if(activeIdx === -1) db.stopsBase.push(data); else db.stopsBase[activeIdx] = data;
        save(); closeModals();
    }

    function openLineModal(idx) {
        activeIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", stops:""} : db.lines[idx];
        document.getElementById('ml-num').value = l.num; document.getElementById('ml-dir').value = l.dir;
        document.getElementById('ml-type').value = l.type; document.getElementById('ml-hours').value = l.hours;
        document.getElementById('ml-stops-raw').value = l.stops.split('\n').map(s => s.split('|')[0].trim()).join('\n');
        document.getElementById('mod-line').style.display = 'block';
        generateStopInputs();
        if(idx !== -1) {
            const times = l.stops.split('\n').map(s => s.split('|')[1]?.replace('+','').trim() || "1");
            setTimeout(() => { document.querySelectorAll('.st-time').forEach((inp, i) => { if(times[i]) inp.value = times[i]; }); }, 50);
        }
    }

    function openStopBaseModal(idx) {
        activeIdx = idx;
        const s = idx === -1 ? {name:"", info:""} : db.stopsBase[idx];
        document.getElementById('msb-name').value = s.name;
        document.getElementById('msb-info').value = s.info;
        document.getElementById('mod-stop-base').style.display = 'block';
    }

    function render() {
        // Linie
        const busC = document.getElementById('lines-bus'); const tramC = document.getElementById('lines-tram');
        busC.innerHTML = ''; tramC.innerHTML = '';
        const nums = [...new Set(db.lines.map(l => String(l.num).trim()))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
        nums.forEach(n => {
            const lD = db.lines.find(l => String(l.num).trim() === n);
            const div = document.createElement('div'); div.className = 'app-card';
            div.innerHTML = `<div><span class="line-tag" style="background:${lD.type==='tram'?'#ff4842':''}">${n}</span><b>${lD.dir}</b></div> <i class="fa-solid fa-chevron-right"></i>`;
            div.onclick = () => openVariants(n);
            if(lD.type === 'tram') tramC.appendChild(div); else busC.appendChild(div);
        });

        // Przystanki (ogólne)
        document.getElementById('all-stops-view').innerHTML = db.stopsBase.map(s => `
            <div class="app-card" style="display:block;">
                <b>${s.name}</b>
                <p style="color:var(--text-sec); font-size:0.8rem; margin-top:8px;">${s.info}</p>
            </div>
        `).join('');

        // Admin listy
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineModal(${i})" style="background:none; border:none; color:var(--accent); font-weight:800;">EDYTUJ</button></div>`).join('');
        document.getElementById('adm-stops-base-list').innerHTML = db.stopsBase.map((s, i) => `<div class="app-card"><span>${s.name}</span><button onclick="openStopBaseModal(${i})" style="background:none; border:none; color:var(--accent); font-weight:800;">EDYTUJ</button></div>`).join('');
        
        document.getElementById('info-display').innerText = db.info;
        document.getElementById('contact-display').innerText = db.contact;
    }

    // Pozostała logika (nawigacja)
    function show(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id).classList.add('active');
    }
    function setMainTab(t) {
        document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none');
        document.querySelectorAll('.adm-nav-main button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).style.display='block';
        document.getElementById('mt-'+t).classList.add('active');
        if(t === 'i') document.getElementById('edit-info-text').value = db.info;
        if(t === 'c') document.getElementById('edit-contact-text').value = db.contact;
    }
    function setSubTab(main, sub) {
        // Tu można dodać dodatkową logikę przełączania wewnątrz taba
    }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeModals() { document.getElementById('mod-line').style.display='none'; document.getElementById('mod-stop-base').style.display='none'; }
    function exportData() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mzk.txt'; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); init(); }; r.readAsText(e.target.files[0]); }
    
    // Funkcje rozkładu (skrócone dla miejsca)
    function openVariants(num) {
        const vars = db.lines.filter(l => String(l.num).trim() === String(num).trim());
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        vars.forEach(v => {
            const d = document.createElement('div'); d.className = "app-card"; d.innerHTML = `<b>${v.dir}</b> <i class="fa-solid fa-arrow-right"></i>`;
            d.onclick = () => renderTimetable(db.lines.indexOf(v)); list.appendChild(d);
        });
    }

    function renderTimetable(idx) {
        const line = db.lines[idx]; show('tt');
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let cum = 0; const stops = line.stops.split('\n').filter(s => s.trim());
        stops.forEach((sRaw, sIdx) => {
            let [n, off] = sRaw.split('|').map(x => x.trim());
            if(sIdx > 0) cum += parseInt(off.replace('+','')) || 1;
            const b = document.createElement('div'); b.className = `app-card`; b.style.display='block';
            b.innerHTML = `<div style="display:flex;justify-content:space-between;"><b>${n}</b><span style="color:var(--accent)">+${cum} min</span></div><div class="grid" id="grid-${sIdx}" style="display:none; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap:10px; margin-top:10px;"></div>`;
            b.onclick = () => {
                const g = document.getElementById(`grid-${sIdx}`); const isV = g.style.display === 'grid';
                g.style.display = isV ? 'none' : 'grid';
                if(!isV) g.innerHTML = line.hours.split(',').map(h => {
                    let [hh, mm] = h.trim().split(':').map(Number); let d = new Date(); d.setHours(hh, mm + cum);
                    return `<span style="background:var(--accent); color:white; padding:8px; border-radius:8px; text-align:center;">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                }).join('');
            };
            body.appendChild(b);
        });
    }

    function saveGlobal(type) {
        if(type === 'info') db.info = document.getElementById('edit-info-text').value;
        if(type === 'contact') db.contact = document.getElementById('edit-contact-text').value;
        save(); alert("Zapisano!");
    }

    init();
</script>
</body>
</html>
