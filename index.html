<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK OMEGA V26</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --accent: #00d166; --bg: #05080f; --surf: #101622; --surf-l: #1a2332; 
            --text: #ffffff; --text-m: #94a3b8; --tram: #ff4757; --bus: #00a8ff; --night: #9b59b6; --border: rgba(255,255,255,0.08); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { background: rgba(16, 22, 34, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surf); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .btn { background: var(--accent); color: #000; padding: 15px; border: none; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--surf); display: flex; height: 75px; border-top: 1px solid var(--border); z-index: 2000; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-m); font-size: 0.65rem; opacity: 0.5; cursor: pointer; }
        .nav-tab.active { color: var(--accent); opacity: 1; }
        .module { display: none; } .module.active { display: block; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; background: var(--surf-l); border: 1px solid var(--border); color: #fff; margin-bottom: 10px; }
        .line-badge { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; flex-shrink: 0; }
        .cat-header { font-size: 0.7rem; font-weight: 900; color: var(--text-m); margin: 20px 0 10px 5px; text-transform: uppercase; }
        .grid-hours { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .hour-pill { background: var(--surf-l); padding: 10px; border-radius: 10px; text-align: center; font-weight: 700; border: 1px solid var(--border); font-size: 0.85rem; }
        .hour-pill.next { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div><h1 style="font-size: 1.1rem; font-weight: 900;">MZK <span style="color:var(--accent)">OMEGA</span></h1></div>
        <div id="live-clock" style="font-size: 0.8rem; font-weight: 800; color: var(--accent);">--:--:--</div>
    </header>

    <div class="container">
        <div id="v-home" class="module active"></div>
        <div id="v-lines" class="module"></div>
        <div id="v-planer" class="module"></div>
        <div id="v-stops" class="module"></div>
        <div id="v-reports" class="module"></div>
        <div id="v-admin" class="module"></div>
        <div id="v-details" class="module"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-tab active" id="nt-home" onclick="App.gate('home')"><i class="fa-solid fa-house"></i><span>START</span></div>
        <div class="nav-tab" id="nt-lines" onclick="App.gate('lines')"><i class="fa-solid fa-bus"></i><span>LINIE</span></div>
        <div class="nav-tab" id="nt-planer" onclick="App.gate('planer')"><i class="fa-solid fa-route"></i><span>PLANER</span></div>
        <div class="nav-tab" id="nt-reports" onclick="App.gate('reports')"><i class="fa-solid fa-bullhorn"></i><span>ALERTY</span></div>
        <div class="nav-tab" id="nt-admin" onclick="App.gate('admin')"><i class="fa-solid fa-lock"></i><span>PANEL</span></div>
    </nav>

    <script>
        const App = {
            dbKey: 'mzk_v12_pro',
            state: { 
                favs: JSON.parse(localStorage.getItem('mzk_favs')) || { stops: [] },
                data: { lines: [], news: {}, reports: {} },
                view: 'home'
            },
            init() {
                firebase.initializeApp({apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio"});
                this.db = firebase.database();
                this.sync();
                setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pl-PL'); }, 1000);
            },
            sync() {
                this.db.ref(this.dbKey).on('value', snap => {
                    const raw = snap.val() || {};
                    this.state.data.lines = Object.values(raw.lines || {});
                    this.state.data.news = raw.news || {};
                    this.state.data.reports = raw.reports || {};
                    this.render();
                });
            },
            gate(v) {
                this.state.view = v;
                document.querySelectorAll('.module, .nav-tab').forEach(x => x.classList.remove('active'));
                document.getElementById('v-'+v).classList.add('active');
                document.getElementById('nt-'+(v==='details'?'lines':v))?.classList.add('active');
                this.render();
            },
            render() {
                const v = this.state.view;
                if(v === 'home' && window.ModHome) ModHome();
                if(v === 'lines' && window.ModLines) ModLines.list();
                if(v === 'planer' && window.ModPlaner) ModPlaner.draw();
                if(v === 'reports' && window.ModReports) ModReports.draw();
                if(v === 'admin' && window.ModAdmin) ModAdmin.draw();
                if(v === 'stops' && window.ModStops) ModStops.list();
            }
        };

        const Time = {
            toMin(s) { if(!s) return 0; const [h,m] = s.split(':').map(Number); return h*60+m; },
            calc(b, o) { let t=this.toMin(b)+parseInt(o); return `${Math.floor(t/60)%24}:${(t%60).toString().padStart(2,'0')}`; },
            diff(t) { return this.toMin(t)-(new Date().getHours()*60+new Date().getMinutes()); }
        };

        App.init();

        // --- MIEJSCE NA MODUŁY ---
// --- MODUŁ ADMINA (PANEL ZARZĄDZANIA) ---
const ModAdmin = {
    logged: false,
    draw: () => {
        const v = document.getElementById('v-admin');
        if (!ModAdmin.logged) {
            v.innerHTML = `<h2>Panel Sterowania</h2>
                <div class="card">
                    <input type="password" id="adm-pass" placeholder="Hasło (123)">
                    <button class="btn" onclick="ModAdmin.login()">ZALOGUJ</button>
                </div>`;
            return;
        }

        v.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Admin</h2>
                <button onclick="ModAdmin.logged=false; App.render()" style="color:var(--tram); background:none; border:none; font-weight:900;">WYLOGUJ</button>
            </div>
            
            <div class="cat-header">Zarządzaj Newsami</div>
            <div class="card">
                <input id="n-t" placeholder="Tytuł newsa">
                <textarea id="n-c" placeholder="Treść newsa..."></textarea>
                <button class="btn" onclick="ModAdmin.addNews()">DODAJ NEWS</button>
            </div>

            <div class="cat-header">Linie Komunikacyjne</div>
            <button class="btn" onclick="ModAdmin.form()" style="margin-bottom:15px;">+ NOWA LINIA</button>
            <div id="adm-lines"></div>
        `;
        ModAdmin.list();
    },

    login: () => {
        if(document.getElementById('adm-pass').value === '123') {
            ModAdmin.logged = true;
            App.render();
        } else alert("Błąd!");
    },

    list: () => {
        let h = '';
        App.state.data.lines.forEach((l, idx) => {
            h += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${l.num}</b> - ${l.dir}</div>
                <div>
                    <i class="fa-solid fa-pen" onclick="ModAdmin.form(${idx})" style="color:var(--accent); margin-right:15px;"></i>
                    <i class="fa-solid fa-trash" onclick="ModAdmin.del(${idx})" style="color:var(--tram);"></i>
                </div>
            </div>`;
        });
        document.getElementById('adm-lines').innerHTML = h;
    },

    form: (idx = null) => {
        const l = idx !== null ? App.state.data.lines[idx] : {num:'', dir:'', type:'bus', baseTimes:[], stops:[]};
        document.getElementById('v-admin').innerHTML = `
            <h2>${idx !== null ? 'Edycja' : 'Nowa Linia'}</h2>
            <div class="card">
                <input id="f-n" value="${l.num}" placeholder="Numer (np. 1)">
                <input id="f-d" value="${l.dir}" placeholder="Kierunek">
                <select id="f-t">
                    <option value="bus" ${l.type==='bus'?'selected':''}>Autobus</option>
                    <option value="tram" ${l.type==='tram'?'selected':''}>Tramwaj</option>
                    <option value="night" ${l.type==='night'?'selected':''}>Nocny</option>
                </select>
                <small>Czasy bazowe (np. 08:00, 09:00):</small>
                <textarea id="f-b">${l.baseTimes.join(', ')}</textarea>
                <small>Przystanki (Nazwa|Minuta):</small>
                <textarea id="f-s" style="height:150px;">${l.stops.map(s => s.name+'|'+s.time).join(', ')}</textarea>
                <button class="btn" onclick="ModAdmin.save(${idx})">ZAPISZ LINIE</button>
                <button class="btn" onclick="ModAdmin.draw()" style="background:var(--surf-l); color:white; margin-top:10px;">ANULUJ</button>
            </div>`;
    },

    save: (idx) => {
        const d = {
            num: document.getElementById('f-n').value,
            dir: document.getElementById('f-d').value,
            type: document.getElementById('f-t').value,
            baseTimes: document.getElementById('f-b').value.split(',').map(x => x.trim()).filter(x => x),
            stops: document.getElementById('f-s').value.split(',').map(x => {
                const [n, t] = x.split('|');
                return { name: n ? n.trim() : '', time: parseInt(t) || 0 };
            }).filter(x => x.name)
        };
        let lx = [...App.state.data.lines];
        if(idx !== null) lx[idx] = d; else lx.push(d);
        App.db.ref(App.dbKey + '/lines').set(lx).then(() => ModAdmin.draw());
    },

    del: (idx) => {
        if(confirm("Usunąć?")) {
            let lx = [...App.state.data.lines];
            lx.splice(idx, 1);
            App.db.ref(App.dbKey + '/lines').set(lx).then(() => ModAdmin.list());
        }
    },

    addNews: () => {
        const title = document.getElementById('n-t').value;
        const content = document.getElementById('n-c').value;
        if(title && content) {
            App.db.ref(App.dbKey + '/news').push({title, content, time: Date.now()})
            .then(() => { alert("Dodano!"); ModAdmin.draw(); });
        }
    }
};
// --- MODUŁ STACJI (LISTA PRZYSTANKÓW + TABLICA LIVE) ---
const ModStops = {
    list: () => {
        let map = {};
        // Mapowanie: który numer linii i jaki typ staje na jakim przystanku
        App.state.data.lines.forEach(l => {
            l.stops.forEach(s => {
                if(!map[s.name]) map[s.name] = [];
                map[s.name].push({ n: l.num, t: l.type || 'bus' });
            });
        });

        let h = `<h2>Przystanki</h2><p style="opacity:0.6; font-size:0.8rem; margin-bottom:15px;">Wybierz stację, aby zobaczyć tablicę live</p>`;
        
        // Sortowanie przystanków alfabetycznie
        Object.keys(map).sort().forEach(name => {
            // Unikalne numery linii na danym przystanku
            let unique = [...new Map(map[name].map(it => [it.n, it])).values()];
            unique.sort((a,b) => a.n.localeCompare(b.n, undefined, {numeric:true}));

            let badges = '';
            unique.forEach(lx => {
                const color = lx.t === 'tram' ? 'var(--tram)' : (lx.t === 'night' ? 'var(--night)' : 'var(--bus)');
                badges += `<span style="color:${color}; margin-right:8px; font-weight:900; font-size:0.8rem;">${lx.n}</span>`;
            });

            h += `<div class="card" onclick="ModStops.board('${name}')" style="padding:15px;">
                <div style="font-weight:900; font-size:1.1rem; margin-bottom:5px;">${name}</div>
                <div style="display:flex; flex-wrap:wrap;">${badges}</div>
            </div>`;
        });
        document.getElementById('v-stops').innerHTML = h;
    },

    board: (name) => {
        let h = `<button class="btn" style="width:60px; margin-bottom:15px;" onclick="App.gate('stops')">←</button>
                 <h2>${name}</h2><p style="opacity:0.6; margin-bottom:15px;">Najbliższe odjazdy:</p>`;
        
        let departures = [];
        App.state.data.lines.forEach(l => {
            const s = l.stops.find(st => st.name === name);
            if(s) {
                l.baseTimes.forEach(bt => {
                    const rt = Time.calc(bt, s.time);
                    const df = Time.diff(rt);
                    // Pokazujemy tylko odjazdy w przód (do 120 min)
                    if(df >= -1 && df < 120) {
                        departures.push({ n: l.num, dir: l.dir, rt, df, t: l.type });
                    }
                });
            }
        });

        // Sortowanie od najbliższego odjazdu
        departures.sort((a,b) => a.df - b.df).forEach(x => {
            const color = x.t === 'tram' ? 'var(--tram)' : (x.t === 'night' ? 'var(--night)' : 'var(--bus)');
            h += `<div class="card" style="display:flex; align-items:center; gap:15px; padding:12px;">
                <div class="line-badge" style="background:${color}">${x.n}</div>
                <div style="flex:1">
                    <b style="font-size:0.9rem;">${x.dir}</b>
                </div>
                <div style="text-align:right;">
                    <b style="color:var(--accent);">${x.df <= 0 ? 'TERAZ' : x.df + ' min'}</b><br>
                    <small style="opacity:0.4;">${x.rt}</small>
                </div>
            </div>`;
        });

        document.getElementById('v-details').innerHTML = departures.length > 0 ? h : h + '<p>Brak odjazdów w najbliższym czasie.</p>';
        App.gate('details');
    }
};
// --- MODUŁ 4: BILETOMAT I PORTFEL (VIRTUAL WALLET) ---
const ModTickets = {
    balance: parseFloat(localStorage.getItem('mzk_balance')) || 0.00,
    activeTicket: JSON.parse(localStorage.getItem('mzk_active_ticket')) || null,

    draw: () => {
        const v = document.getElementById('v-home'); // Możemy nadpisać start lub dodać nową sekcję
        // Dla zachowania czystości w Twoim obecnym układzie, dodajemy to jako sekcję w START
        ModHome(); // Najpierw rysujemy bazę Home
        
        let h = `<div class="cat-header">Twój Portfel</div>
        <div class="card" style="background: linear-gradient(135deg, var(--surf-l), #1e293b); position: relative; overflow: hidden;">
            <div style="position:relative; z-index:2;">
                <small style="opacity:0.6; font-weight:900;">SALDO KARTY</small>
                <h2 style="font-size:2rem; margin:5px 0;">${ModTickets.balance.toFixed(2)} PLN</h2>
                <button class="btn" onclick="ModTickets.topUp()" style="width:auto; padding:8px 15px; font-size:0.7rem; background:var(--text); color:#000;">DOŁADUJ KONTO</button>
            </div>
            <i class="fa-solid fa-wallet" style="position:absolute; right:-10px; bottom:-10px; font-size:5rem; opacity:0.05; transform:rotate(-15deg);"></i>
        </div>`;

        if(ModTickets.activeTicket) {
            const remains = Math.floor((ModTickets.activeTicket.expiry - Date.now()) / 60000);
            if(remains > 0) {
                h += `<div class="card" style="border:2px solid var(--accent); background:rgba(0,209,102,0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>BILET AKTYWNY: ${ModTickets.activeTicket.name}</b>
                        <b style="color:var(--accent); font-size:1.2rem;">${remains} min</b>
                    </div>
                    <div style="margin-top:10px; text-align:center;">
                        <i class="fa-solid fa-qrcode" style="font-size:4rem; opacity:0.8;"></i>
                    </div>
                </div>`;
            } else {
                ModTickets.activeTicket = null;
                localStorage.removeItem('mzk_active_ticket');
            }
        }

        h += `<div class="cat-header">Kup Bilet Czasowy</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="card" onclick="ModTickets.buy(4.00, 20, '20-minutowy')" style="margin-bottom:0; cursor:pointer;">
                <b>20 min</b><br><small style="color:var(--accent)">4.00 PLN</small>
            </div>
            <div class="card" onclick="ModTickets.buy(6.00, 60, '60-minutowy')" style="margin-bottom:0; cursor:pointer;">
                <b>60 min</b><br><small style="color:var(--accent)">6.00 PLN</small>
            </div>
        </div>`;

        v.innerHTML = h + v.innerHTML; // Dodajemy na górę strony głównej
    },

    topUp: () => {
        const amt = parseFloat(prompt("Kwota doładowania (PLN):"));
        if(amt > 0) {
            ModTickets.balance += amt;
            localStorage.setItem('mzk_balance', ModTickets.balance);
            ModHome(); // Odśwież widok
            alert("Konto doładowane!");
        }
    },

    buy: (price, mins, name) => {
        if(ModTickets.activeTicket) {
            alert("Masz już aktywny bilet!");
            return;
        }
        if(ModTickets.balance < price) {
            alert("Brak środków na koncie!");
            return;
        }

        if(confirm(`Kupić bilet ${name} za ${price.toFixed(2)} PLN?`)) {
            ModTickets.balance -= price;
            ModTickets.activeTicket = {
                name: name,
                expiry: Date.now() + (mins * 60000)
            };
            localStorage.setItem('mzk_balance', ModTickets.balance);
            localStorage.setItem('mzk_active_ticket', JSON.stringify(ModTickets.activeTicket));
            App.render();
            alert("Bilet skasowany pomyślnie!");
        }
    }
};

// Dodajemy wywołanie biletów do głównego renderowania Startu
const _oldModHome = ModHome;
ModHome = () => {
    ModTickets.draw();
};
// --- MODUŁ 5: PERSONALIZACJA I USTAWIENIA (UI CUSTOMIZER) ---
const ModSettings = {
    themes: {
        classic: { accent: '#00d166', bg: '#05080f', surf: '#101622' },
        gold: { accent: '#f1c40f', bg: '#0c0c0c', surf: '#1a1a1a' },
        ocean: { accent: '#00a8ff', bg: '#0b131e', surf: '#162130' },
        lava: { accent: '#ff4757', bg: '#120d0d', surf: '#1f1616' }
    },

    init: () => {
        const saved = JSON.parse(localStorage.getItem('mzk_theme')) || ModSettings.themes.classic;
        ModSettings.apply(saved);
    },

    apply: (t) => {
        const r = document.documentElement.style;
        r.setProperty('--accent', t.accent);
        r.setProperty('--bg', t.bg);
        r.setProperty('--surf', t.surf);
        localStorage.setItem('mzk_theme', JSON.stringify(t));
    },

    draw: () => {
        const v = document.getElementById('v-home');
        let h = `<div class="cat-header">Personalizacja</div>
        <div class="card">
            <small style="display:block; margin-bottom:10px; opacity:0.6; font-weight:900;">WYBIERZ MOTYW APLIKACJI</small>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
                <div onclick="ModSettings.apply(ModSettings.themes.classic)" style="height:40px; border-radius:10px; background:#00d166; border:2px solid #fff; cursor:pointer;"></div>
                <div onclick="ModSettings.apply(ModSettings.themes.gold)" style="height:40px; border-radius:10px; background:#f1c40f; cursor:pointer;"></div>
                <div onclick="ModSettings.apply(ModSettings.themes.ocean)" style="height:40px; border-radius:10px; background:#00a8ff; cursor:pointer;"></div>
                <div onclick="ModSettings.apply(ModSettings.themes.lava)" style="height:40px; border-radius:10px; background:#ff4757; cursor:pointer;"></div>
            </div>
            
            <div style="margin-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span>Tryb wysokiej wydajności</span>
                    <input type="checkbox" style="width:20px; height:20px; margin:0;" checked>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Powiadomienia o alertach</span>
                    <input type="checkbox" style="width:20px; height:20px; margin:0;" checked>
                </div>
            </div>
        </div>
        
        <div class="card" style="text-align:center; opacity:0.5; font-size:0.7rem; border:none;">
            MZK OMEGA V26 Engine<br>
            Wersja Stabilna (Build 2026.04)<br>
            Wszystkie systemy sprawne.
        </div>`;
        
        v.innerHTML += h; // Dodajemy na sam dół strony Start
    }
};

// Automatyczne wczytanie motywu przy starcie
ModSettings.init();

// Wstrzykiwanie ustawień do widoku Home
const _finalHome = ModHome;
ModHome = () => {
    _finalHome();
    ModSettings.draw();
};
// --- MODUŁ 6: DIAGNOSTYKA I STATYSTYKI (SYSTEM MONITOR) ---
const ModCore = {
    getStats: () => {
        const lines = App.state.data.lines;
        const reports = Object.keys(App.state.data.reports).length;
        const stops = new Set();
        let totalDepartures = 0;

        lines.forEach(l => {
            l.stops.forEach(s => stops.add(s.name));
            totalDepartures += (l.baseTimes.length * l.stops.length);
        });

        return {
            linesCount: lines.length,
            stopsCount: stops.size,
            activeReports: reports,
            dailyRuns: totalDepartures
        };
    },

    drawStats: () => {
        const s = ModCore.getStats();
        const v = document.getElementById('v-admin');
        
        if (ModAdmin.logged) {
            const h = `
                <div class="cat-header">Statystyki Systemu</div>
                <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; background:rgba(0,0,0,0.2);">
                    <div style="text-align:center;">
                        <small style="opacity:0.6;">LINIE</small><br>
                        <b style="color:var(--accent); font-size:1.2rem;">${s.linesCount}</b>
                    </div>
                    <div style="text-align:center;">
                        <small style="opacity:0.6;">PRZYSTANKI</small><br>
                        <b style="color:var(--bus); font-size:1.2rem;">${s.stopsCount}</b>
                    </div>
                    <div style="text-align:center;">
                        <small style="opacity:0.6;">ALERTY 2H</small><br>
                        <b style="color:var(--tram); font-size:1.2rem;">${s.activeReports}</b>
                    </div>
                    <div style="text-align:center;">
                        <small style="opacity:0.6;">KURSÓW/DB</small><br>
                        <b style="color:var(--accent); font-size:1.2rem;">${s.dailyRuns}</b>
                    </div>
                </div>
                <div class="card" style="font-size:0.7rem; border-color:var(--accent); opacity:0.8;">
                    <i class="fa-solid fa-database"></i> Status Bazy: <b>POŁĄCZONO (Firebase Live)</b><br>
                    <i class="fa-solid fa-microchip"></i> Silnik: <b>OMEGA V26.4.25</b>
                </div>
            `;
            v.innerHTML += h;
        }
    }
};
