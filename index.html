<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM MODUŁOWY</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* === SYSTEM ZMIENNYCH === */
        :root { 
            --accent: #00ab55; 
            --accent-hover: #008f47;
            --bg: #05080f; 
            --surface: #121926; 
            --surface-light: #1c2536; 
            --text-main: #ffffff; 
            --text-muted: #94a3b8; 
            --bus: #00ab55; 
            --tram: #ef4444; 
            --border: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 24px -4px rgba(0,0,0,0.5);
        }

        /* === RESET I BAZA === */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding-bottom: 90px; 
            overflow-x: hidden; 
        }

        /* === NAGŁÓWEK (HEADER) === */
        header { 
            background: rgba(5, 8, 15, 0.85); 
            backdrop-filter: blur(12px);
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid var(--border); 
            text-align: center;
        }
        header h1 { 
            font-family: 'Outfit', sans-serif; 
            font-size: 1.3rem; 
            font-weight: 900; 
            letter-spacing: 2px; 
            color: var(--accent); 
        }

        /* === GŁÓWNY KONTENER === */
        .container { 
            max-width: 650px; 
            margin: 0 auto; 
            padding: 16px; 
        }

        /* === KARTY I ELEMENTY UI === */
        .card { 
            background: var(--surface); 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow); 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        .card:active { transform: scale(0.98); }

        .line-badge { 
            min-width: 52px; 
            height: 42px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 12px; 
            font-family: 'Outfit', sans-serif;
            font-weight: 900; 
            font-size: 1.15rem; 
            color: #fff; 
            margin-right: 15px; 
        }
        .bg-bus { background: var(--bus); box-shadow: 0 4px 12px rgba(0,171,85,0.3); }
        .bg-tram { background: var(--tram); box-shadow: 0 4px 12px rgba(239,68,68,0.3); }

        /* === FORMULARZE I PRZYCISKI === */
        input, select, textarea { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 14px; 
            background: var(--surface-light); 
            color: var(--text-main); 
            border: 1px solid var(--border); 
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--accent); }
        
        .btn { 
            background: var(--accent); 
            color: #fff; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            width: 100%; 
            font-weight: 600; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--tram); }

        /* === NAWIGACJA DOLNA === */
        nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: var(--surface); 
            display: flex; 
            height: 80px; 
            border-top: 1px solid var(--border); 
            z-index: 2000; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-muted); 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 6px; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* === LOGIKA WYŚWIETLANIA MODUŁÓW === */
        .module { display: none; animation: fadeIn 0.3s ease-out; }
        .module.active { display: block; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <header><h1>MZK GORZÓW</h1></header>

    <div class="container">
        
        <div id="module-lines" class="module active">
            </div>

        <div id="module-stops" class="module">
            </div>

        <div id="module-news" class="module">
            </div>

        <div id="module-admin" class="module">
            </div>

        <div id="module-details" class="module">
            </div>

    </div>

    <nav>
        <div class="nav-item active" id="nav-lines" onclick="Core.switchModule('lines')">
            <i class="fa-solid fa-bus"></i><span>Linie</span>
        </div>
        <div class="nav-item" id="nav-stops" onclick="Core.switchModule('stops')">
            <i class="fa-solid fa-location-dot"></i><span>Przystanki</span>
        </div>
        <div class="nav-item" id="nav-news" onclick="Core.switchModule('news')">
            <i class="fa-solid fa-newspaper"></i><span>Komunikaty</span>
        </div>
        <div class="nav-item" id="nav-admin" onclick="Core.switchModule('admin')">
            <i class="fa-solid fa-shield-halved"></i><span>Admin</span>
        </div>
    </nav>

    <script>
    // === 1. INICJALIZACJA FIREBASE ===
    const firebaseConfig = { 
        apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", 
        authDomain: "mzk-by-facio.firebaseapp.com", 
        databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "mzk-by-facio" 
    };
    
    // Zapobiega podwójnej inicjalizacji
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // === 2. RDZEŃ SYSTEMU (Zarządzanie Aplikacją) ===
    const Core = {
        // Pobieramy ostatnio używany klucz bazy z pamięci, domyślnie 'mzk_v12_pro'
        dbKey: localStorage.getItem('mzk_db_key') || 'mzk_v12_pro',

        // Funkcja przełączająca moduły (zakładki)
        switchModule(moduleId) {
            // Ukrywamy wszystko
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Pokazujemy to co trzeba
            const targetModule = document.getElementById('module-' + moduleId);
            if(targetModule) targetModule.classList.add('active');
            
            // Aktywujemy przycisk nawigacji (jeśli istnieje, bo 'details' nie ma swojego przycisku)
            const navBtn = document.getElementById('nav-' + moduleId);
            if(navBtn) navBtn.classList.add('active');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    // === 3. MODUŁ LINII ===
    const ModuleLines = {
        data: [], // Tutaj będą trzymane linie

        init() {
            // Podłączamy się pod odpowiednią gałąź w Firebase
            db.ref(Core.dbKey).on('value', (snapshot) => {
                const dbData = snapshot.val();
                
                // Zabezpieczenie struktury danych
                if (dbData && dbData.lines) {
                    this.data = dbData.lines;
                } else if (Array.isArray(dbData)) {
                    // Czasami dane mogą być bezpośrednio tablicą
                    this.data = dbData;
                } else {
                    this.data = [];
                }
                
                this.render();
                
                // Automatycznie odśwież przystanki, jeśli moduł już istnieje
                if(window.ModuleStops) ModuleStops.updateIndex();
            });
        },

        render() {
            const container = document.getElementById('module-lines');
            container.innerHTML = '';

            if (!this.data || this.data.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 40px 20px;">
                        <i class="fa-solid fa-cloud-arrow-down" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                        <h3 style="margin-bottom: 10px;">Brak linii w bazie</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5;">
                            Połączono z kluczem: <b style="color:var(--accent)">${Core.dbKey}</b>.<br>
                            Baza jest pusta lub dane są w innej wersji. Użyj zakładki Admin, aby zmienić klucz lub dodać nową linię.
                        </p>
                    </div>`;
                return;
            }

            // Grupujemy linie według kategorii (np. Dzienne, Nocne)
            const categories = [...new Set(this.data.map(l => l.cat || 'Inne'))];

            categories.forEach(cat => {
                const linesInCat = this.data.filter(l => (l.cat || 'Inne') === cat);
                if (linesInCat.length > 0) {
                    
                    // Nagłówek kategorii
                    container.innerHTML += `
                        <div style="font-family: 'Outfit', sans-serif; font-weight: 900; color: var(--accent); font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; margin: 25px 5px 10px 5px; display: flex; align-items: center; gap: 10px;">
                            ${cat} <span style="flex:1; height:1px; background:var(--border);"></span>
                        </div>`;
                    
                    // Renderowanie kart wewnątrz kategorii
                    linesInCat.forEach(line => {
                        const originalIndex = this.data.indexOf(line); // potrzebne do kliknięcia
                        
                        // Rozpoznawanie typu (autobus/tramwaj)
                        const isTram = line.type === 'tram' || (line.cat && line.cat.toLowerCase().includes('tramwaj'));
                        const badgeClass = isTram ? 'bg-tram' : 'bg-bus';
                        const stopsCount = line.stops ? line.stops.length : 0;

                        container.innerHTML += `
                            <div class="card" style="display: flex; align-items: center; cursor: pointer;" onclick="ModuleLines.showDetails(${originalIndex})">
                                <div class="line-badge ${badgeClass}">${line.num}</div>
                                <div style="flex: 1;">
                                    <div style="font-weight: 600; font-size: 1.05rem;">${line.dir}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">
                                        <i class="fa-solid fa-map-pin" style="margin-right: 4px;"></i> ${stopsCount} przystanków
                                    </div>
                                </div>
                                <i class="fa-solid fa-chevron-right" style="color: var(--border); font-size: 1.2rem;"></i>
                            </div>`;
                    });
                }
            });
        },

        // WIDOK SZCZEGÓŁÓW (Trasa Linii)
        showDetails(index) {
            const line = this.data[index];
            if (!line) return;

            const isTram = line.type === 'tram' || (line.cat && line.cat.toLowerCase().includes('tramwaj'));
            const badgeClass = isTram ? 'bg-tram' : 'bg-bus';
            
            let stopsHtml = '<div style="color: var(--text-muted); font-size: 0.9rem; padding: 10px;">Brak wpisanych przystanków dla tej trasy.</div>';
            
            if (line.stops && line.stops.length > 0) {
                stopsHtml = line.stops.map(stop => `
                    <div style="display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border);">
                        <div style="width: 55px; font-weight: 900; color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 1.1rem;">${stop.time}'</div>
                        <div style="flex: 1; font-weight: 500; font-size: 0.95rem;">${stop.name}</div>
                    </div>
                `).join('');
            }

            const detailsContainer = document.getElementById('module-details');
            detailsContainer.innerHTML = `
                <div class="card" style="margin-bottom: 15px; border-color: var(--accent);">
                    <div style="display: flex; align-items: center;">
                        <div class="line-badge ${badgeClass}" style="height: 50px; min-width: 60px; font-size: 1.4rem;">${line.num}</div>
                        <div>
                            <div style="font-size: 0.7rem; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">Kierunek Trasy</div>
                            <div style="font-weight: 700; font-size: 1.2rem; line-height: 1.2;">${line.dir}</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <h3 style="font-size: 0.9rem; margin-bottom: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Przystanki</h3>
                    ${stopsHtml}
                </div>

                <button class="btn" style="background: var(--surface-light); border: 1px solid var(--border); margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="Core.switchModule('lines')">
                    <i class="fa-solid fa-arrow-left"></i> Wróć do listy
                </button>
            `;

            Core.switchModule('details');
        }
    };

    // Uruchom moduł podczas startu strony
    window.addEventListener('DOMContentLoaded', () => {
        ModuleLines.init();
    });

</script>

</body>
</html>
