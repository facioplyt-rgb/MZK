<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - WERSJA FINALNA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --info: #1890ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        header { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--text); letter-spacing: 1px; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 20px 0 10px 5px; font-weight: 600; letter-spacing: 1px; }
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border-radius: 16px; padding: 18px 0; text-align: center; font-size: 1.5rem; font-weight: 800; color: white; cursor: pointer; border-bottom: 4px solid #333; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        
        .app-card { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: block; width: 100%; text-align: left; }
        .nz-badge { background: var(--danger); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 6px; margin-left: 8px; font-weight: 800; }
        
        .stop-lines-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .stop-line-pill { background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 14px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--accent); }
        .stop-line-pill.is-tram { border-left-color: var(--danger); }
        .stop-line-pill span { color: var(--warn); font-weight: 700; font-size: 0.9rem; }

        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin-top: 15px; }
        .tt-time { background: var(--accent); color: white; padding: 10px 4px; border-radius: 10px; text-align: center; font-weight: 700; }

        nav { position: fixed; bottom: 0; width: 100%; background: #161c24; display: flex; height: 80px; border-top: 1px solid #333; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); cursor: pointer; font-size: 0.65rem; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.3rem; margin-bottom: 5px; }
        
        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        textarea, input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; background: #1c252e; border: 1px solid #333; color: white; font-family: inherit; }
        .day-label { font-size: 0.7rem; color: var(--accent); font-weight: 800; margin-bottom: 4px; display: block; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    <div id="s-stops" class="section">
        <input type="text" id="stop-search-input" placeholder="Szukaj przystanku..." oninput="renderStops(this.value)">
        <div id="public-stops-list"></div>
    </div>
    <div id="s-news" class="section">
        <div class="group-label">Komunikaty</div>
        <div id="news-list-public"></div>
    </div>
    <div id="s-contact" class="section">
        <div class="group-label">Kontakt i Informacje</div>
        <div id="contact-display" class="app-card" style="white-space:pre-wrap;"></div>
    </div>
    
    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333">Powrót</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333">Powrót</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="text-align:center;">
            <input type="password" id="pass" placeholder="Hasło">
            <button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="adm-nav-main" style="display:flex; gap:5px; margin-bottom:15px;">
                <button onclick="setTab('l')" class="main-btn" style="font-size:0.7rem; padding:10px;">LINIE</button>
                <button onclick="setTab('n')" class="main-btn" style="font-size:0.7rem; padding:10px;">NEWS</button>
                <button onclick="setTab('s')" class="main-btn" style="font-size:0.7rem; padding:10px; background:#800;">KOPIA</button>
            </div>
            <div id="tab-l" class="adm-tab"><button onclick="openLineForm(-1)" class="main-btn">Dodaj linię</button><div id="adm-lines-list"></div></div>
            <div id="tab-n" class="adm-tab" style="display:none;">
                <textarea id="adm-news-text" placeholder="Treść newsa..."></textarea>
                <button onclick="addNews()" class="main-btn">Dodaj</button>
                <div id="adm-news-list"></div>
            </div>
            <div id="tab-s" class="adm-tab" style="display:none;">
                <button onclick="exportData()" class="main-btn">Eksportuj Plik</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
                <button onclick="document.getElementById('importFile').click()" class="main-btn">Importuj Plik</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2>Edycja Linii</h2>
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <span class="day-label">DNI ROBOCZE:</span>
    <textarea id="fl-hours-work" placeholder="05:10, 06:15..."></textarea>
    <span class="day-label">SOBOTY:</span>
    <textarea id="fl-hours-sat" placeholder="07:00, 08:00..."></textarea>
    <span class="day-label">NIEDZIELE I ŚWIĘTA:</span>
    <textarea id="fl-hours-sun" placeholder="09:00, 10:00..."></textarea>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj przystanek</button>
    <button onclick="saveLine()" class="main-btn">ZAPISZ</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script>
    let db = { lines: [], stopDetails: {}, contact: "Kontakt: MZK Gorzów", news: [] };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_v600_stable');
        if(local) db = JSON.parse(local);
        render();
        setInterval(refreshLiveTimes, 30000);
    }

    function save() { localStorage.setItem('mzk_v600_stable', JSON.stringify(db)); render(); }

    function getDayType() {
        const d = new Date().getDay();
        if(d === 0) return 'sun';
        if(d === 6) return 'sat';
        return 'work';
    }

    function getHoursForDay(line) {
        const type = getDayType();
        if(type === 'sun' && line.hoursSun) return line.hoursSun;
        if(type === 'sat' && line.hoursSat) return line.hoursSat;
        return line.hoursWork || line.hours || ""; // hours to fallback dla Twojego backupu
    }

    function getNextTimeForLine(line, stopName) {
        const hoursStr = getHoursForDay(line);
        if(!hoursStr) return null;
        
        let offset = 0;
        for(let s of (line.stops || [])) { 
            if(s.name === stopName) break; 
            offset += parseInt(s.time) || 0; 
        }
        
        const now = new Date();
        const times = hoursStr.split(',').map(h => {
            let p = h.trim().split(':'); if(p.length < 2) return null;
            let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset, 0, 0);
            return d;
        }).filter(t => t && t > now).sort((a,b) => a-b);

        if(times.length === 0) return null;
        const diff = Math.floor((times[0] - now) / 60000);
        return diff < 60 ? `za ${diff} min` : times[0].toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function refreshLiveTimes() {
        if(document.getElementById('s-stops').classList.contains('active-sec')) {
            renderStops(document.getElementById('stop-search-input').value);
        }
    }

    function renderStops(query = "") {
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        const q = query.toLowerCase();
        let stopNames = [];
        db.lines.forEach(l => l.stops.forEach(s => { if(!stopNames.includes(s.name)) stopNames.push(s.name); }));
        
        stopNames.sort().filter(n => n.toLowerCase().includes(q)).forEach(name => {
            const card = document.createElement('div'); card.className = 'app-card';
            let linesHtml = '<div class="stop-lines-list">';
            db.lines.forEach((l, idx) => {
                const stopInLine = l.stops.find(s => s.name === name);
                if(stopInLine) {
                    const next = getNextTimeForLine(l, name) || "--:--";
                    const isNz = stopInLine.nz === true;
                    linesHtml += `<div class="stop-line-pill" onclick="event.stopPropagation(); renderTimetable(${idx}, '${name}')"><b>${l.num}</b> <span>${next}</span> ${isNz ? '<span class="nz-badge">NŻ</span>' : ''}</div>`;
                }
            });
            linesHtml += '</div>';
            card.innerHTML = `<b>${name}</b>${linesHtml}`;
            list.appendChild(card);
        });
    }

    function render() {
        const sHome = document.getElementById('s-home'); sHome.innerHTML = '<div class="group-label">Wszystkie Linie</div>';
        const grid = document.createElement('div'); grid.className = 'lines-grid';
        const uniqueNums = [...new Set(db.lines.map(l => l.num))].sort((a,b) => parseInt(a)-parseInt(b));
        uniqueNums.forEach(num => {
            grid.innerHTML += `<div class="line-square bus" onclick="openVariants('${num}')">${num}</div>`;
        });
        sHome.appendChild(grid);

        document.getElementById('news-list-public').innerHTML = db.news.map(n => `<div class="app-card"><b>${n.date}</b><br>${n.text}</div>`).join('');
        document.getElementById('contact-display').innerText = db.contact;
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card" style="display:flex; justify-content:space-between"><span>${l.num} -> ${l.dir}</span><button onclick="openLineForm(${i})">EDYTUJ</button></div>`).join('');
        renderStops();
    }

    function openVariants(num) {
        show('vars');
        document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.filter(l => String(l.num) === String(num)).forEach((l, i) => {
            list.innerHTML += `<div class="app-card" onclick="renderTimetable(${db.lines.indexOf(l)})">Kierunek: <b>${l.dir}</b></div>`;
        });
    }

    function renderTimetable(idx, scrollStop = null) {
        const line = db.lines[idx]; show('tt');
        const hoursStr = getHoursForDay(line);
        document.getElementById('tt-head').innerHTML = `<div class="group-label">Linia ${line.num}</div><h2>${line.dir}</h2>`;
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let cumulative = 0;
        line.stops.forEach((stop, sIdx) => {
            const offset = cumulative;
            const card = document.createElement('div'); card.className = 'app-card';
            card.innerHTML = `<b>${stop.name}</b> ${stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}<div id="g-${sIdx}" class="tt-grid" style="display:none;"></div>`;
            card.onclick = () => {
                const g = document.getElementById(`g-${sIdx}`); g.style.display = g.style.display === 'grid' ? 'none' : 'grid';
                if(g.style.display === 'grid' && hoursStr) {
                    g.innerHTML = hoursStr.split(',').map(h => {
                        let p = h.trim().split(':'); if(p.length < 2) return '';
                        let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1]) + offset, 0, 0);
                        return `<span class="tt-time">${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
                    }).join('');
                }
            };
            body.appendChild(card);
            if(scrollStop && stop.name === scrollStop) card.click();
            cumulative += parseInt(stop.time) || 0;
        });
    }

    function openLineForm(idx) {
        curLineIdx = idx; 
        const l = idx === -1 ? {num:"", dir:"", hoursWork:"", hoursSat:"", hoursSun:"", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num;
        document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-hours-work').value = l.hoursWork || l.hours || "";
        document.getElementById('fl-hours-sat').value = l.hoursSat || "";
        document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-stops-list').innerHTML = '';
        (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(n="", t=0, z=false) {
        const div = document.createElement('div'); div.className = 'app-card';
        div.innerHTML = `<input type="text" value="${n}" class="en" placeholder="Nazwa" style="width:50%"><input type="number" value="${t}" class="et" style="width:15%"><label>NŻ <input type="checkbox" class="ez" ${z?'checked':''}></label><button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-stops-list').appendChild(div);
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('#fl-stops-list .app-card')).map(r => ({
            name: r.querySelector('.en').value,
            time: r.querySelector('.et').value,
            nz: r.querySelector('.ez').checked
        }));
        const data = {
            num: document.getElementById('fl-num').value,
            dir: document.getElementById('fl-dir').value,
            hoursWork: document.getElementById('fl-hours-work').value,
            hoursSat: document.getElementById('fl-hours-sat').value,
            hoursSun: document.getElementById('fl-hours-sun').value,
            stops: stops
        };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function addNews() {
        const txt = document.getElementById('adm-news-text').value;
        if(txt) { db.news.unshift({text: txt, date: new Date().toLocaleDateString()}); save(); document.getElementById('adm-news-text').value=''; }
    }

    function exportData() {
        const b = new Blob([JSON.stringify(db)], {type:'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'mzk_backup.txt'; a.click();
    }

    function importData(e) {
        const r = new FileReader();
        r.onload = (ev) => { db = JSON.parse(ev.target.result); save(); location.reload(); };
        r.readAsText(e.target.files[0]);
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
    }

    function setTab(t) {
        document.querySelectorAll('.adm-tab').forEach(x => x.style.display='none');
        document.getElementById('tab-'+t).style.display='block';
    }

    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.getElementById('form-line').style.display='none'; }

    init();
</script>
</body>
</html>
