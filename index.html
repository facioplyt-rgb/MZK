<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM V25</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg); color: var(--dark); padding-bottom: 90px; }
        
        header { background: var(--mzk); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--yellow); position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .active-sec { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* INFO BOX */
        #info-display { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--yellow); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* KARTY LINII */
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .line-card { background: white; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; border-bottom: 4px solid #ddd; transition: 0.2s; }
        .line-card b { font-size: 1.8rem; color: var(--mzk); display: block; }
        .tram-card b { color: var(--red); }

        /* CZARNY WARIANT ZE SCREENA */
        .variant-btn { background: var(--dark); color: white; padding: 25px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; width: 100%; border: none; text-align: left; transition: 0.2s; }
        .v-num { font-size: 3rem; font-weight: 900; line-height: 1; }
        .v-dir { font-size: 1rem; font-weight: 700; text-transform: uppercase; color: #bbb; margin-top: 5px; }

        /* TABS ROZKŁADU */
        .tt-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; font-weight: 800; font-size: 0.7rem; background: #ddd; cursor: pointer; }
        .tab-btn.active { background: var(--dark); color: white; }

        /* TABELA ROZKŁADU */
        .tt-table { width: 100%; background: white; border-radius: 15px; overflow: hidden; border: 2px solid var(--dark); }
        .tt-header { background: var(--dark); color: white; padding: 15px; text-align: center; }
        .tt-row { border-bottom: 1px solid #eee; display: flex; }
        .tt-hour { background: #f0f0f0; font-weight: 900; width: 55px; text-align: center; padding: 12px 0; border-right: 2px solid var(--dark); font-size: 1.2rem; }
        .tt-min { padding: 10px; display: flex; gap: 10px; flex-wrap: wrap; font-size: 1.1rem; font-weight: 700; align-items: center; }

        /* PRZYSTANKI */
        .stop-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 5px solid var(--mzk); font-weight: 700; font-size: 0.9rem; }

        /* NAWIGACJA DOLNA - MOBILE SUPPORT */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; height: 75px; }
        nav div { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; cursor: pointer; width: 33%; transition: 0.2s; }
        nav div i { font-size: 1.4rem; margin-bottom: 4px; }
        nav div span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        nav div.active { color: var(--mzk); }

        /* ADMIN PANEL */
        .adm-menu { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .adm-btn { flex: 1; padding: 10px; background: #eee; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .adm-btn.active { background: var(--mzk); color: white; }
        .form-group { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        
        .btn-back { border: none; background: none; color: var(--red); font-weight: 900; cursor: pointer; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; padding: 10px 0; }
    </style>
</head>
<body>

<header><h1>MZK GORZÓW</h1></header>

<div class="container">
    <div id="info-display">Wczytywanie informacji...</div>

    <div id="s-pax" class="section active-sec">
        <div class="line-grid" id="list-all"></div>
    </div>

    <div id="s-variants" class="section">
        <button onclick="show('pax')" class="btn-back"><i class="fa-solid fa-arrow-left"></i> POWRÓT</button>
        <div id="variant-list"></div>
    </div>

    <div id="s-route" class="section">
        <button onclick="show('variants')" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KIERUNKI</button>
        <div id="route-container"></div>
    </div>

    <div id="s-tt" class="section">
        <button onclick="show('route')" class="btn-back"><i class="fa-solid fa-arrow-left"></i> TRASA</button>
        <div class="tt-tabs">
            <button class="tab-btn active" id="tab-rob" onclick="setDay('rob')">ROBOCZE</button>
            <button class="tab-btn" id="tab-sob" onclick="setDay('sob')">SOBOTY</button>
            <button class="tab-btn" id="tab-nie" onclick="setDay('nie')">NIEDZIELE</button>
        </div>
        <div class="tt-table">
            <div class="tt-header"><h3 id="tt-stop-name" style="margin:0"></h3></div>
            <div id="tt-rows"></div>
        </div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login" style="text-align:center">
            <h3>Panel Zarządzania</h3>
            <input type="password" id="adm-pass" placeholder="Hasło">
            <button onclick="login()" style="width:100%; padding:15px; margin-top:10px; background:var(--mzk); color:white; border:none; border-radius:10px; font-weight:900;">WEJDŹ</button>
        </div>
        
        <div id="adm-dash" style="display:none;">
            <div class="adm-menu">
                <button class="adm-btn active" onclick="setAdmTab('rozkład')">ROZKŁADY</button>
                <button class="adm-btn" onclick="setAdmTab('info')">INFO</button>
                <button class="adm-btn" onclick="setAdmTab('mapa')">MAPA</button>
            </div>

            <div id="adm-tab-rozkład" class="adm-content">
                <button onclick="openEd()" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:10px; margin-bottom:15px;">+ DODAJ NOWY ROZKŁAD</button>
                <div id="adm-list-lines"></div>
            </div>

            <div id="adm-tab-info" class="adm-content" style="display:none;">
                <div class="form-group">
                    <label>Treść ogłoszenia na stronie głównej:</label>
                    <textarea id="adm-info-text" rows="5"></textarea>
                    <button onclick="saveSettings()" style="margin-top:10px; padding:10px; background:var(--mzk); color:white; border:none; border-radius:5px;">ZAPISZ INFO</button>
                </div>
            </div>

            <div id="adm-tab-mapa" class="adm-content" style="display:none;">
                <div class="form-group">
                    <label>Link do mapy Google/Earth:</label>
                    <input type="text" id="adm-map-link">
                    <button onclick="saveSettings()" style="margin-top:10px; padding:10px; background:var(--mzk); color:white; border:none; border-radius:5px;">ZAPISZ LINK</button>
                </div>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('pax')" id="n-pax" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="goMap()"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-user-shield"></i><span>Admin</span></div>
</nav>

<div id="editor" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; display:none; overflow-y:auto; padding:20px;">
    <h2 style="font-weight:900">Edytor Rozkładu</h2>
    <div class="form-group">
        <input type="text" id="e-num" placeholder="Numer linii (np. 101)">
        <input type="text" id="e-dir" placeholder="Kierunek (np. Panorama)">
        <select id="e-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    </div>
    <div class="form-group">
        <label>Godziny Robocze (HH:MM, HH:MM...):</label>
        <textarea id="e-rob"></textarea>
    </div>
    <div class="form-group">
        <label>Godziny Soboty:</label>
        <textarea id="e-sob"></textarea>
    </div>
    <div class="form-group">
        <label>Godziny Niedziele:</label>
        <textarea id="e-nie"></textarea>
    </div>
    <div class="form-group">
        <label>Przystanki (Nazwa, Minuty od startu):</label>
        <textarea id="e-stops" rows="6" placeholder="Bora-Komorowskiego, 0&#10;Piaski, 4"></textarea>
    </div>
    <button onclick="saveLine()" style="width:100%; padding:20px; background:var(--mzk); color:white; border:none; border-radius:15px; font-weight:900;">ZAPISZ LINIĘ</button>
    <button onclick="document.getElementById('editor').style.display='none'" style="width:100%; margin-top:15px; border:none; background:none; color:red; font-weight:700;">ANULUJ</button>
</div>

<script>
    const KEY = 'MZK_V25_PRO';
    let db = JSON.parse(localStorage.getItem(KEY)) || { lines: [], info: "Witaj w systemie MZK Gorzów!", map: "https://earth.google.com" };
    let curL = null, curS = null, curDay = 'rob';

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
        if(id === 'pax') renderPax();
        window.scrollTo(0,0);
    }

    function renderPax() {
        document.getElementById('info-display').innerText = db.info;
        const grid = document.getElementById('list-all'); grid.innerHTML = '';
        const unique = [...new Set(db.lines.map(l => l.num))].sort((a,b)=>a.localeCompare(b, undefined, {numeric:true}));
        unique.forEach(num => {
            const l = db.lines.find(x => x.num === num);
            grid.innerHTML += `<div class="line-card ${l.type==='tram'?'tram-card':''}" onclick="openVariants('${num}')"><b>${num}</b></div>`;
        });
    }

    function openVariants(num) {
        show('variants');
        const list = document.getElementById('variant-list'); list.innerHTML = '';
        db.lines.filter(l => l.num === num).forEach(l => {
            const idx = db.lines.indexOf(l);
            list.innerHTML += `<div class="variant-btn" onclick="openRoute(${idx})">
                <div class="v-num">${l.num}</div><div class="v-dir">${l.dir}</div>
            </div>`;
        });
    }

    function openRoute(idx) {
        show('route'); curL = idx;
        const l = db.lines[idx];
        const cont = document.getElementById('route-container'); cont.innerHTML = `<h3>${l.num} ➔ ${l.dir}</h3>`;
        l.stops.forEach((s, sIdx) => {
            cont.innerHTML += `<div class="stop-item" onclick="openTT(${sIdx})">
                <span>${s.n}</span><span>+${s.a} min</span>
            </div>`;
        });
    }

    function openTT(sIdx) { curS = sIdx; show('tt'); setDay('rob'); }

    function setDay(day) {
        curDay = day;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+day).classList.add('active');
        const l = db.lines[curL]; const s = l.stops[curS];
        document.getElementById('tt-stop-name').innerText = s.n;
        const rows = document.getElementById('tt-rows'); rows.innerHTML = '';
        let hMap = {};
        
        (l[day] || "").split(',').forEach(t => {
            let p = t.trim().split(':');
            if(p.length !== 2) return;
            let d = new Date(2026, 0, 1, parseInt(p[0]), parseInt(p[1]) + parseInt(s.a));
            let fH = d.getHours(), fM = d.getMinutes().toString().padStart(2, '0');
            if(!hMap[fH]) hMap[fH] = [];
            hMap[fH].push(fM);
        });

        Object.keys(hMap).sort((a,b)=>a-b).forEach(h => {
            rows.innerHTML += `<div class="tt-row"><div class="tt-hour">${h.toString().padStart(2,'0')}</div><div class="tt-min">${hMap[h].sort().join(' ')}</div></div>`;
        });
    }

    function goMap() { window.open(db.map, '_blank'); }

    // ADMIN LOGIC
    function login() { if(document.getElementById('adm-pass').value==='123') { 
        document.getElementById('adm-login').style.display='none'; 
        document.getElementById('adm-dash').style.display='block'; 
        document.getElementById('adm-info-text').value = db.info;
        document.getElementById('adm-map-link').value = db.map;
        renderAdmList();
    }}

    function setAdmTab(tab) {
        document.querySelectorAll('.adm-content').forEach(c => c.style.display='none');
        document.querySelectorAll('.adm-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('adm-tab-'+tab).style.display='block';
        event.target.classList.add('active');
    }

    function openEd() { document.getElementById('editor').style.display='block'; }

    function saveLine() {
        const line = {
            num: document.getElementById('e-num').value,
            dir: document.getElementById('e-dir').value,
            type: document.getElementById('e-type').value,
            rob: document.getElementById('e-rob').value,
            sob: document.getElementById('e-sob').value,
            nie: document.getElementById('e-nie').value,
            stops: document.getElementById('e-stops').value.trim().split('\n').map(x => {
                let p = x.split(','); return { n: p[0].trim(), a: p[1] ? p[1].trim() : 0 };
            })
        };
        db.lines.push(line);
        saveAll();
        document.getElementById('editor').style.display='none';
        renderAdmList();
    }

    function saveSettings() {
        db.info = document.getElementById('adm-info-text').value;
        db.map = document.getElementById('adm-map-link').value;
        saveAll();
        alert("Zapisano!");
    }

    function saveAll() { localStorage.setItem(KEY, JSON.stringify(db)); renderPax(); }

    function renderAdmList() {
        const list = document.getElementById('adm-list-lines'); list.innerHTML = '';
        db.lines.forEach((l, i) => {
            list.innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;">
                <span>${l.num} -> ${l.dir}</span><button onclick="delL(${i})" style="color:red; border:none; background:none; font-weight:900;">USUŃ</button>
            </div>`;
        });
    }

    function delL(i) { if(confirm("Usunąć?")) { db.lines.splice(i,1); saveAll(); renderAdmList(); } }

    renderPax();
</script>
</body>
</html>
