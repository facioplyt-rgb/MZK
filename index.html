<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM FULL PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mzk: #008744; --yellow: #feca05; --red: #d32f2f; --dark: #121212; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 90px; }
        
        header { background: var(--mzk); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--yellow); position: sticky; top: 0; z-index: 1000; }
        header h1 { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; }

        .container { max-width: 800px; margin: 0 auto; padding: 15px; }
        .section { display: none; animation: fadeIn 0.2s ease; }
        .active-sec { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* LINIE I PODZIAŁ */
        .type-title { border-left: 5px solid var(--mzk); padding-left: 10px; margin: 25px 0 10px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
        .tram-title { border-left-color: var(--red); }
        .line-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; }
        .line-card { background: white; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; border-bottom: 4px solid #ddd; }
        .line-card b { font-size: 1.6rem; color: var(--mzk); }
        .tram-card b { color: var(--red); }

        /* TRASA */
        .stop-item { background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; display: flex; flex-direction: column; border-left: 4px solid var(--mzk); }
        .stop-main { display: flex; justify-content: space-between; align-items: center; }
        .stop-name { font-weight: 800; font-size: 0.95rem; }
        .nz-badge { background: var(--red); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
        .stop-info { font-size: 0.65rem; color: #666; margin-top: 5px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* NAV */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #eee; z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; cursor: pointer; }
        nav div.active { color: var(--mzk); }
        nav span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }

        /* ADMIN DASHBOARD */
        .adm-nav { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .adm-nav button { flex: 1; min-width: 70px; padding: 10px; border: none; border-radius: 8px; font-weight: 800; background: #ddd; font-size: 0.6rem; }
        .adm-nav button.active { background: var(--mzk); color: white; }
        .adm-list-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0 15px; border-radius: 10px; border: 1px solid #ccc; font-family: inherit; }
        .btn-back { border: none; background: none; color: var(--red); font-weight: 900; cursor: pointer; padding: 10px 0; }
    </style>
</head>
<body>

<header><h1>MZK GORZÓW</h1></header>

<div class="container">
    <div id="s-lines" class="section active-sec">
        <div class="type-title"><i class="fa-solid fa-bus"></i> AUTOBUSY</div>
        <div id="list-buses" class="line-grid"></div>
        <div class="type-title tram-title"><i class="fa-solid fa-train-tram"></i> TRAMWAJE</div>
        <div id="list-trams" class="line-grid"></div>
    </div>

    <div id="s-info" class="section">
        <h2 style="font-weight:900; margin-bottom:15px;">KOMUNIKATY</h2>
        <div id="info-display"></div>
    </div>

    <div id="s-route" class="section">
        <button onclick="show('lines')" class="btn-back">← POWRÓT</button>
        <div id="route-display"></div>
    </div>

    <div id="s-adm" class="section">
        <div id="adm-login">
            <input type="password" id="adm-pass" placeholder="Hasło panelu">
            <button onclick="login()" style="width:100%; padding:15px; background:var(--mzk); color:white; border:none; border-radius:10px; font-weight:900;">ZALOGUJ</button>
        </div>
        
        <div id="adm-dash" style="display:none;">
            <div class="adm-nav">
                <button id="an-l" class="active" onclick="setAdmSec('l')">LINIE</button>
                <button id="an-p" onclick="setAdmSec('p')">PRZYSTANKI</button>
                <button id="an-i" onclick="setAdmSec('i')">INFO</button>
                <button id="an-m" onclick="setAdmSec('m')">MAPA</button>
            </div>

            <div id="ad-sec-l">
                <button onclick="openCreator()" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:10px; margin-bottom:15px;">+ DODAJ LINIĘ</button>
                <div id="adm-lines-list"></div>
            </div>

            <div id="ad-sec-p" style="display:none;">
                <div id="adm-stops-list"></div>
            </div>

            <div id="ad-sec-i" style="display:none;">
                <button onclick="editInfoPrompt(null)" style="width:100%; padding:12px; background:var(--dark); color:white; border:none; border-radius:10px; margin-bottom:10px;">+ NOWE INFO</button>
                <div id="adm-info-list"></div>
            </div>

            <div id="ad-sec-m" style="display:none;">
                <label>Link Google Maps:</label>
                <input type="text" id="adm-map-url">
                <button onclick="saveMap()" style="width:100%; padding:15px; background:var(--mzk); color:white; border:none; border-radius:10px;">ZAPISZ MAPĘ</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('lines')" id="n-lines" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('info')" id="n-info"><i class="fa-solid fa-circle-info"></i><span>Info</span></div>
    <div onclick="goMap()"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-user-gear"></i><span>Panel</span></div>
</nav>

<div id="m-stop" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; display:none; padding:20px; overflow-y:auto;">
    <h2 id="ms-title" style="font-weight:900;"></h2>
    <label>Status:</label>
    <select id="ms-demand"><option value="none">Stały</option><option value="all">Na żądanie (NŻ)</option></select>
    <label>Co w pobliżu? (POI):</label><input type="text" id="ms-poi">
    <label>Ważne informacje:</label><textarea id="ms-extra"></textarea>
    <button onclick="saveGlobalStop()" style="width:100%; padding:15px; background:var(--mzk); color:white; border:none; border-radius:10px; font-weight:900;">ZAPISZ ZMIANY</button>
    <button onclick="document.getElementById('m-stop').style.display='none'" style="width:100%; margin-top:10px; border:none;">ANULUJ</button>
</div>

<div id="m-creator" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; display:none; padding:20px; overflow-y:auto;">
    <h2 style="font-weight:900">Nowa Linia</h2>
    <input type="text" id="c-num" placeholder="Numer">
    <input type="text" id="c-dir" placeholder="Kierunek">
    <select id="c-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="c-stops" placeholder="Przystanki (jeden pod drugim)"></textarea>
    <button onclick="generateLine()" style="width:100%; padding:15px; background:var(--mzk); color:white; border:none; border-radius:10px; font-weight:900;">STWÓRZ</button>
    <button onclick="document.getElementById('m-creator').style.display='none'" style="width:100%; margin-top:10px; border:none;">ZAMKNIJ</button>
</div>

<script>
    const DB_KEY = 'MZK_FINAL_V100';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { lines: [], globalStops: {}, info: [], map: "https://google.com/maps" };
    let editingStopName = null;

    function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); renderLines(); renderInfo(); }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
        if(id === 'lines') renderLines();
        if(id === 'info') renderInfo();
    }

    // --- LOGIKA ADMINA ---
    function login() { 
        if(document.getElementById('adm-pass').value === '123') { 
            document.getElementById('adm-login').style.display='none'; 
            document.getElementById('adm-dash').style.display='block'; 
            document.getElementById('adm-map-url').value = db.map;
            renderAdmLines(); 
        } 
    }

    function setAdmSec(s) {
        document.querySelectorAll('[id^="ad-sec-"]').forEach(d => d.style.display='none');
        document.querySelectorAll('.adm-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('ad-sec-'+s).style.display='block';
        document.getElementById('an-'+s).classList.add('active');
        if(s === 'p') renderAdmStops();
        if(s === 'i') renderAdmInfo();
    }

    function generateLine() {
        const num = document.getElementById('c-num').value, dir = document.getElementById('c-dir').value, type = document.getElementById('c-type').value;
        const stopsRaw = document.getElementById('c-stops').value.trim().split('\n');
        const lineStops = stopsRaw.map(n => {
            const name = n.trim();
            if(!db.globalStops[name]) db.globalStops[name] = { demand: 'none', poi: '', extra: '' };
            return { n: name };
        });
        db.lines.push({ num, dir, type, stops: lineStops });
        save(); document.getElementById('m-creator').style.display='none'; renderAdmLines();
    }

    function renderAdmStops() {
        const d = document.getElementById('adm-stops-list'); d.innerHTML = '';
        Object.keys(db.globalStops).sort().forEach(name => {
            d.innerHTML += `<div class="adm-list-item"><b>${name}</b><button onclick="openGlobalStopEditor('${name}')" style="background:var(--yellow); border:none; padding:8px; border-radius:5px; font-weight:700;">EDYTUJ</button></div>`;
        });
    }

    function openGlobalStopEditor(name) {
        editingStopName = name;
        const s = db.globalStops[name];
        document.getElementById('ms-title').innerText = name;
        document.getElementById('ms-demand').value = s.demand;
        document.getElementById('ms-poi').value = s.poi;
        document.getElementById('ms-extra').value = s.extra;
        document.getElementById('m-stop').style.display='block';
    }

    function saveGlobalStop() {
        db.globalStops[editingStopName] = { demand: document.getElementById('ms-demand').value, poi: document.getElementById('ms-poi').value, extra: document.getElementById('ms-extra').value };
        save(); document.getElementById('m-stop').style.display='none'; renderAdmStops();
    }

    function renderAdmLines() {
        const d = document.getElementById('adm-lines-list'); d.innerHTML = '';
        db.lines.forEach((l, i) => {
            d.innerHTML += `<div class="adm-list-item"><b>${l.num} ➔ ${l.dir}</b><button onclick="db.lines.splice(${i},1); save(); renderAdmLines();" style="color:red; background:none; border:none; font-weight:900;">USUŃ</button></div>`;
        });
    }

    function renderAdmInfo() {
        const d = document.getElementById('adm-info-list'); d.innerHTML = '';
        db.info.forEach((m, i) => {
            d.innerHTML += `<div class="adm-list-item"><p>${m.substring(0,30)}...</p><div><button onclick="editInfoPrompt(${i})">EDYCJA</button><button onclick="db.info.splice(${i},1); save(); renderAdmInfo();">X</button></div></div>`;
        });
    }

    function editInfoPrompt(idx) {
        const txt = prompt("Treść komunikatu:", idx !== null ? db.info[idx] : "");
        if(txt) { if(idx !== null) db.info[idx] = txt; else db.info.push(txt); save(); renderAdmInfo(); }
    }

    function saveMap() { db.map = document.getElementById('adm-map-url').value; save(); alert("Zapisano mapę!"); }

    // --- LOGIKA UŻYTKOWNIKA ---
    function renderLines() {
        const b = document.getElementById('list-buses'), t = document.getElementById('list-trams');
        b.innerHTML = ''; t.innerHTML = '';
        db.lines.forEach((l, i) => {
            const html = `<div class="line-card ${l.type==='tram'?'tram-card':''}" onclick="renderRoute(${i})"><b>${l.num}</b><br><small>${l.dir}</small></div>`;
            if(l.type === 'tram') t.innerHTML += html; else b.innerHTML += html;
        });
    }

    function renderRoute(idx) {
        show('route');
        const l = db.lines[idx];
        const d = document.getElementById('route-display');
        d.innerHTML = `<h3 style="font-weight:900;">LINIA ${l.num} ➔ ${l.dir}</h3><br>`;
        l.stops.forEach(s => {
            const g = db.globalStops[s.n] || { demand: 'none', poi: '', extra: '' };
            d.innerHTML += `
                <div class="stop-item">
                    <div class="stop-main">
                        <span class="stop-name">${s.n}</span>
                        ${g.demand === 'all' ? '<span class="nz-badge">NŻ</span>' : ''}
                    </div>
                    <div class="stop-info">
                        ${g.poi ? `<span><i class="fa-solid fa-location-dot"></i> ${g.poi}</span>` : ''}
                        ${g.extra ? `<span style="color:var(--red); font-weight:700;">${g.extra}</span>` : ''}
                    </div>
                </div>`;
        });
    }

    function renderInfo() {
        const d = document.getElementById('info-display'); d.innerHTML = '';
        if(db.info.length === 0) d.innerHTML = "<p style='text-align:center; color:#999;'>Brak aktualnych komunikatów.</p>";
        db.info.forEach(m => { d.innerHTML += `<div style="background:white; padding:15px; border-radius:12px; margin-bottom:10px; border-left:6px solid var(--yellow); font-weight:700;">${m}</div>`; });
    }

    function goMap() { window.open(db.map, '_blank'); }
    function openCreator() { document.getElementById('m-creator').style.display='block'; }

    renderLines(); renderInfo();
</script>
</body>
</html>
