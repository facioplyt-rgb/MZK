<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW PRO V95</title>
    
    <meta name="theme-color" content="#0b0f19">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/mF64vfc/1000011209.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ab55; --bg: #0b0f19; --surface: #161c24; --surface-light: #1c252e; --text: #ffffff; --text-sec: #919eab; --danger: #ff4842; --warn: #feca05; --border: rgba(255,255,255,0.08); --bus-col: #00ab55; --tram-col: #ff4842; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .section { display: none; } 
        .active-sec { display: block !important; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        header { background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(15px); padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.4rem; }
        .container { max-width: 550px; margin: 0 auto; padding: 15px; }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }
        .line-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .line-badge { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; color: white; }
        .line-badge.bus { background: var(--bus-col); }
        .line-badge.tram { background: var(--tram-col); }
        
        .dir-abbr { background: rgba(0,0,0,0.2); padding: 1px 4px; border-radius: 3px; font-size: 0.65rem; margin-left: 4px; font-weight: 800; }
        .eta-tag { font-size: 0.75rem; color: var(--accent); font-weight: 800; margin-left: auto; background: rgba(0, 171, 85, 0.1); padding: 4px 8px; border-radius: 6px; }
        .eta-now { animation: blink 0.8s infinite; color: var(--warn); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .tt-container { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        .tt-row { display: flex; border-bottom: 1px solid var(--border); }
        .tt-hour-col { background: rgba(255,255,255,0.03); width: 60px; padding: 12px 0; text-align: center; font-size: 1.1rem; font-weight: 800; color: var(--accent); border-right: 1px solid var(--border); }
        .tt-min-col { flex: 1; padding: 12px; display: flex; flex-wrap: wrap; gap: 10px; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; height: 70px; border-top: 1px solid var(--border); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.7rem; cursor: pointer; }
        nav div.active { color: var(--accent); }
        nav i { font-size: 1.2rem; margin-bottom: 4px; }

        .main-btn { background: var(--accent); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: var(--surface-light); border: 1px solid var(--border); color: white; }
    </style>
</head>
<body>

<header>MZK GORZÓW</header>

<div class="container">
    <div id="s-home" class="section active-sec"></div>
    
    <div id="s-vars" class="section">
        <div id="vars-list"></div>
        <button onclick="show('home')" class="main-btn" style="background:#333">Wróć</button>
    </div>

    <div id="s-tt" class="section">
        <div id="tt-day-sel" style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="main-btn" style="flex:1; margin-top:0;" onclick="setDay('working')">Robocze</button>
            <button class="main-btn" style="flex:1; margin-top:0; background:#444" onclick="setDay('saturday')">Soboty</button>
            <button class="main-btn" style="flex:1; margin-top:0; background:#444" onclick="setDay('sunday')">Niedziele</button>
        </div>
        <div id="tt-body"></div>
        <button id="tt-back-btn" class="main-btn" style="background:#333">Wróć</button>
    </div>

    <div id="s-stops" class="section">
        <input type="text" id="stop-search" placeholder="Szukaj przystanku..." oninput="renderStopsList()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-stop-lines" class="section">
        <div id="sl-list"></div>
        <button onclick="show('stops')" class="main-btn" style="background:#333">Wróć</button>
    </div>

    <div id="s-news" class="section"><div id="public-news-list"></div></div>
    <div id="s-contact" class="section"><div id="contact-display" class="app-card"></div></div>

    <div id="s-adm" class="section">
        <input type="password" id="pass" placeholder="Hasło"><button onclick="login()" class="main-btn">Zaloguj</button>
        <div id="adm-ui" style="display:none; margin-top:20px;">
            <button onclick="openLineForm(-1)" class="main-btn">Dodaj Linię</button>
            <div id="adm-lines-list"></div>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('contact')" id="n-contact"><i class="fa-solid fa-info-circle"></i><span>Info</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <input type="text" id="fl-num" placeholder="Numer">
    <input type="text" id="fl-dir" placeholder="Kierunek">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <textarea id="fl-h-work" placeholder="Godziny Robocze"></textarea>
    <div id="fl-list"></div>
    <button onclick="addStopRow()" class="main-btn">+ Przystanek</button>
    <button onclick="saveLine()" class="main-btn">Zapisz</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Anuluj</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCb5QmZdwWwa9LafqqGZvGW-6vblkab32M", authDomain: "mzk-by-facio.firebaseapp.com", databaseURL: "https://mzk-by-facio-default-rtdb.europe-west1.firebasedatabase.app", projectId: "mzk-by-facio", storageBucket: "mzk-by-facio.firebasedatorage.app", messagingSenderId: "676970411647", appId: "1:676970411647:web:5703d5fb5fb499ff83714a" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('mzk_v12_pro');

    let db = { lines: [], news: [], contact: "" };
    let curLineIdx = -1, curStopIdx = -1, curDay = 'working', activeSection = 'home', curLineNumGlobal = "";

    function formatETA(m) { if(m===null) return ""; if(m===0) return ">>>"; return m+"m"; }
    function getDirAbbr(d) { if(!d) return ""; const w=d.split(" "); return w.length>1?(w[0][0]+w[w.length-1][0]).toUpperCase():d.substring(0,2).toUpperCase(); }

    function getETA(line, sIdx) {
        if(!line || !line.stops || !line.hoursWorking) return null;
        const now = new Date();
        const raw = line.hoursWorking; // Uproszczone dla stabilności etapu
        let offset = 0; for(let i=0; i<=sIdx; i++) offset += parseInt(line.stops[i].time || 0);
        const times = raw.split(',').map(t => {
            const p = t.trim().split(':'); if(p.length<2) return null;
            const d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1])+offset, 0, 0);
            return d;
        }).filter(d => d > now).sort((a,b)=>a-b);
        return times.length ? Math.floor((times[0]-now)/60000) : null;
    }

    // KLUCZOWA FUNKCJA: Pobiera linie dla przystanku i SORTUJE PO ETA
    function getLinesForStop(stopName, excludeNum = null) {
        let res = [];
        (db.lines || []).forEach((l, idx) => {
            const sIdx = l.stops ? l.stops.findIndex(s => s.name === stopName) : -1;
            if(sIdx !== -1 && String(l.num) !== String(excludeNum)) {
                res.push({ num: l.num, dir: l.dir, type: l.type, eta: getETA(l, sIdx), lIdx: idx, sIdx: sIdx });
            }
        });
        return res.sort((a,b) => {
            if(a.eta === null) return 1; if(b.eta === null) return -1;
            return a.eta - b.eta;
        });
    }

    function show(id) {
        activeSection = id;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.getElementById('s-'+id).classList.add('active-sec');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        document.getElementById('n-'+id)?.classList.add('active');
        render();
    }

    function init() {
        dbRef.on('value', s => { if(s.val()) { db = s.val(); render(); } });
    }
    init();

    function render() {
        if(activeSection === 'home') renderHome();
        if(activeSection === 'stops') renderStopsList();
        if(activeSection === 'tt') renderTimetable(curLineIdx, curStopIdx);
    }

    function renderHome() {
        const h = document.getElementById('s-home'); h.innerHTML = '<div style="font-weight:600; margin-bottom:15px; color:var(--text-sec);">WYBIERZ LINIĘ</div>';
        let nums = [...new Set((db.lines || []).map(l => l.num))].sort((a,b)=>a-b);
        nums.forEach(n => {
            const l = db.lines.find(x => x.num === n);
            h.innerHTML += `<div class="app-card" onclick="openVars('${n}')"><b>Linia ${n}</b><div class="line-badges"><span class="line-badge ${l.type}">${n}</span></div></div>`;
        });
    }

    function openVars(num) {
        curLineNumGlobal = num; show('vars');
        const list = document.getElementById('vars-list');
        list.innerHTML = `<div style="margin-bottom:15px; font-weight:600;">Kierunki linii ${num}:</div>`;
        db.lines.forEach((l, i) => {
            if(String(l.num) === String(num)) {
                const eta = getETA(l, 0);
                list.innerHTML += `<div class="app-card" onclick="curLineIdx=${i}; curStopIdx=-1; show('tt')"><b>DO: ${l.dir}</b> <span class="eta-tag">${eta!==null?formatETA(eta):'---'}</span></div>`;
            }
        });
    }

    function renderTimetable(lIdx, sIdx) {
        const l = db.lines[lIdx]; const body = document.getElementById('tt-body');
        if(sIdx === -1) {
            document.getElementById('tt-day-sel').style.display = 'none';
            body.innerHTML = `<div style="margin-bottom:15px; font-weight:800; color:var(--accent)">TRASA: ${l.num} -> ${l.dir}</div>`;
            l.stops.forEach((s, i) => {
                const others = getLinesForStop(s.name, l.num);
                body.innerHTML += `<div class="app-card" onclick="curStopIdx=${i}; renderTimetable(${lIdx}, ${i})">
                    <div>${s.name}</div>
                    <div class="line-badges">${others.map(o => `<span class="line-badge ${o.type}" style="font-size:0.6rem;">${o.num} ${formatETA(o.eta)}</span>`).join('')}</div>
                </div>`;
            });
            document.getElementById('tt-back-btn').onclick = () => openVars(l.num);
        } else {
            document.getElementById('tt-day-sel').style.display = 'flex';
            let off = 0; for(let i=0; i<=sIdx; i++) off += parseInt(l.stops[i].time || 0);
            const hMap = {}; 
            (l.hoursWorking || "").split(',').forEach(e => {
                let p = e.trim().split(':'); if(p.length<2) return;
                let d = new Date(); d.setHours(parseInt(p[0]), parseInt(p[1])+off);
                let hh = d.getHours().toString().padStart(2,'0'), mm = d.getMinutes().toString().padStart(2,'0');
                if(!hMap[hh]) hMap[hh] = []; hMap[hh].push(mm);
            });
            let htm = `<div class="app-card"><b>${l.num}</b> - ${l.stops[sIdx].name}</div><div class="tt-container">`;
            Object.keys(hMap).sort().forEach(h => htm += `<div class="tt-row"><div class="tt-hour-col">${h}</div><div class="tt-min-col">${hMap[h].sort().join(' ')}</div></div>`);
            body.innerHTML = htm + "</div>";
            document.getElementById('tt-back-btn').onclick = () => { curStopIdx = -1; renderTimetable(lIdx, -1); };
        }
    }

    function renderStopsList() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        const list = document.getElementById('public-stops-list'); list.innerHTML = '';
        let sSet = new Set(); (db.lines || []).forEach(l => l.stops?.forEach(s => sSet.add(s.name)));
        [...sSet].sort().filter(s => s.toLowerCase().includes(q)).forEach(name => {
            const lines = getLinesForStop(name);
            list.innerHTML += `<div class="app-card" onclick="openStopLines('${name}')">
                <div style="font-weight:700;">${name}</div>
                <div class="line-badges">${lines.map(l => `<span class="line-badge ${l.type}">${l.num} <small style="margin-left:4px; opacity:0.8;">${formatETA(l.eta)}</small></span>`).join('')}</div>
            </div>`;
        });
    }

    function openStopLines(name) {
        show('stop-lines'); const list = document.getElementById('sl-list');
        list.innerHTML = `<div style="font-weight:800; margin-bottom:15px;">PRZYSTANEK: ${name}</div>`;
        getLinesForStop(name).forEach(v => {
            list.innerHTML += `<div class="app-card" onclick="curLineIdx=${v.lIdx}; curStopIdx=${v.sIdx}; show('tt')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><span class="line-badge ${v.type}" style="margin-right:10px">${v.num}</span> <b>${v.dir}</b></div>
                    <span class="eta-tag ${v.eta===0?'eta-now':''}">${v.eta!==null?formatETA(v.eta):'---'}</span>
                </div>
            </div>`;
        });
    }

    function renderAdmin() {
        const lList = document.getElementById('adm-lines-list'); lList.innerHTML = '';
        (db.lines || []).forEach((l, i) => lList.innerHTML += `<div class="app-card" onclick="openLineForm(${i})">${l.num} -> ${l.dir}</div>`);
    }

    function openLineForm(idx) {
        curLineIdx = idx; const l = idx === -1 ? {num:"", dir:"", type:"bus", stops:[], hoursWorking:""} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-h-work').value = l.hoursWorking;
        document.getElementById('fl-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(n="", t=2) {
        const d = document.createElement('div'); d.innerHTML = `<input type="text" value="${n}" class="stop-name-in"> <input type="number" value="${t}" class="stop-time-in" style="width:50px;"> <button onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('fl-list').appendChild(d);
    }

    function saveLine() {
        const stops = Array.from(document.querySelectorAll('#fl-list > div')).map(r => ({ name: r.querySelector('.stop-name-in').value, time: parseInt(r.querySelector('.stop-time-in').value || 0) }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, hoursWorking: document.getElementById('fl-h-work').value, stops: stops };
        if(!db.lines) db.lines = []; if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        dbRef.update({ lines: db.lines }).then(closeForms);
    }

    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function setDay(d) { curDay = d; renderTimetable(curLineIdx, curStopIdx); }
    function renderNews() {
        const nList = document.getElementById('public-news-list'); nList.innerHTML = '<div class="app-card">Brak nowych wiadomości.</div>';
    }
</script>
</body>
</html>
