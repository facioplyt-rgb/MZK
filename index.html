<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MZK TESTER V19</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .debug-panel { background: #fff; border: 2px solid #000; padding: 15px; margin-bottom: 20px; }
        .error-msg { color: red; font-weight: bold; border: 1px solid red; padding: 10px; background: #fff0f0; }
        .btn { padding: 10px 20px; cursor: pointer; background: #008744; color: white; border: none; border-radius: 5px; }
        .section { display: none; background: white; padding: 20px; border-radius: 10px; margin-top: 10px; }
        .active { display: block; }
        .stop-item { padding: 10px; border-bottom: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="debug-panel">
    <h3>Panel Diagnostyczny MZK</h3>
    <p>Status bazy danych: <span id="db-status">Sprawdzanie...</span></p>
    <button class="btn" onclick="clearData()">USUŃ WSZYSTKO I RESTART</button>
</div>

<div id="main-view" class="section active">
    <h2>Lista Linii</h2>
    <div id="line-list-container"></div>
</div>

<div id="route-view" class="section">
    <button onclick="showMain()">← POWRÓT</button>
    <h2 id="current-line-title"></h2>
    <div id="stops-container"></div>
</div>

<script>
    // System raportowania błędów
    function reportError(where, msg) {
        const container = document.getElementById(where);
        container.innerHTML = `<div class="error-msg">BŁĄD w ${where}: ${msg}</div>`;
        console.error(`Błąd w ${where}:`, msg);
    }

    // Inicjalizacja bazy
    let db = [];
    try {
        const data = localStorage.getItem('MZK_V19_DATA');
        if (data) {
            db = JSON.parse(data);
            document.getElementById('db-status').innerText = `Załadowano ${db.length} linii.`;
        } else {
            document.getElementById('db-status').innerText = "Baza jest pusta. Dodaj linię w Panelu Facio (w pełnej wersji).";
            // Testowe dane jeśli pusto
            db = [{
                num: "100", dir: "TEST JEDWABNICZA", type: "bus", rob: ["08:00"], sob: [], nie: [],
                stops: [{n: "Start", a: 0}, {n: "Meta", a: 5}]
            }];
        }
    } catch (e) {
        reportError('db-status', "Nie można odczytać pamięci przeglądarki!");
    }

    function renderLines() {
        const container = document.getElementById('line-list-container');
        try {
            container.innerHTML = '';
            if (db.length === 0) container.innerHTML = "Brak linii w systemie.";
            db.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'stop-item';
                div.innerHTML = `<strong>Linia ${line.num}</strong> -> ${line.dir}`;
                div.onclick = () => showRoute(index);
                container.appendChild(div);
            });
        } catch (e) {
            reportError('line-list-container', e.message);
        }
    }

    function showRoute(idx) {
        document.getElementById('main-view').classList.remove('active');
        document.getElementById('route-view').classList.add('active');
        const container = document.getElementById('stops-container');
        const title = document.getElementById('current-line-title');
        
        try {
            const line = db[idx];
            title.innerText = `Linia ${line.num} -> ${line.dir}`;
            container.innerHTML = '';

            if (!line.stops || line.stops.length === 0) {
                throw new Error("Ta linia nie ma przypisanych przystanków!");
            }

            line.stops.forEach(s => {
                const d = document.createElement('div');
                d.className = 'stop-item';
                d.innerText = `🚏 ${s.n} (+${s.a} min)`;
                container.appendChild(d);
            });
        } catch (e) {
            reportError('stops-container', e.message);
        }
    }

    function showMain() {
        document.getElementById('route-view').classList.remove('active');
        document.getElementById('main-view').classList.add('active');
    }

    function clearData() {
        localStorage.removeItem('MZK_V19_DATA');
        location.reload();
    }

    // Start
    renderLines();
</script>

</body>
</html>
