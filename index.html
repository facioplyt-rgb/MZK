<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - SYSTEM FULL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ab55; --mzk-yellow: #feca05; --bg: #0b0f19; 
            --surface: #161c24; --text: #ffffff; --text-sec: #919eab; 
            --danger: #ff4842; --gradient: linear-gradient(135deg, #00ab55 0%, #007b3d 100%); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 110px; }
        
        header { background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(20px); padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--mzk-yellow); display: flex; align-items: center; justify-content: center; }
        .brand { font-size: 1.2rem; font-weight: 800; color: var(--text); }

        .container { max-width: 550px; margin: 0 auto; padding: 0 15px; }
        .section { display: none; }
        .active-sec { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .group-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; margin: 25px 0 12px 5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .group-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
        
        .lines-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .line-square { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 18px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; cursor: pointer; border-bottom: 4px solid #333; }
        .line-square.bus { border-bottom-color: var(--accent); }
        .line-square.tram { border-bottom-color: var(--danger); }
        
        .app-card { background: var(--surface); padding: 16px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(22, 28, 36, 0.9); backdrop-filter: blur(20px); display: flex; height: 75px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); z-index: 2000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sec); font-size: 0.6rem; font-weight: 700; }
        nav div.active { color: var(--mzk-yellow); }
        nav i { font-size: 1.3rem; margin-bottom: 4px; }

        .live-badge { color: var(--mzk-yellow); font-weight: 800; font-size: 0.8rem; }
        .arrows-anim { display: inline-block; animation: moveArrows 1s infinite linear; color: var(--mzk-yellow); font-weight: 900; margin-right: 5px; }
        @keyframes moveArrows { 0% { opacity: 0.2; transform: translateX(-3px); } 50% { opacity: 1; } 100% { opacity: 0.2; transform: translateX(3px); } }

        .gps-btn { background: var(--mzk-yellow); color: #000; border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .main-btn { background: var(--gradient); color: white; width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .overlay-form { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:3000; display:none; padding:20px; overflow-y:auto; }
        
        input, select, textarea { width: 100%; padding: 14px; border-radius: 12px; background: #1c252e; border: 1px solid #333; color: white; margin-bottom: 10px; font-family: inherit; }
        .stop-row { display: grid; grid-template-columns: 1fr 60px 40px 40px; gap: 8px; margin-bottom: 8px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .tt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 8px; margin-top: 10px; }
        .tt-time { background: #1c252e; padding: 8px; border-radius: 10px; text-align: center; font-weight: 700; border: 1px solid #333; }
        .nz-badge { background: var(--danger); font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

<header><div class="brand">MZK GORZÓW</div></header>

<div class="container">
    <div id="s-home" class="section active-sec">
        <div id="home-content"></div>
    </div>

    <div id="s-stops" class="section">
        <div class="group-label">Szukaj Przystanku</div>
        <input type="text" id="stop-search" placeholder="Nazwa przystanku..." oninput="filterStops()">
        <div id="public-stops-list"></div>
    </div>

    <div id="s-news" class="section"><div class="group-label">Komunikaty</div><div id="public-news-list"></div></div>

    <div id="s-vars" class="section"><div id="vars-head"></div><div id="vars-list"></div><button onclick="show('home')" class="main-btn" style="background:#333; margin-top:20px">Powrót</button></div>
    <div id="s-tt" class="section"><div id="tt-head"></div><div id="tt-body"></div><button onclick="show('vars')" class="main-btn" style="background:#333; margin-top:20px">Powrót</button></div>

    <div id="s-adm" class="section">
        <div id="adm-login" class="app-card" style="display:block; text-align:center;">
            <input type="password" id="pass" placeholder="Hasło"><button onclick="login()" class="main-btn">Zaloguj</button>
        </div>
        <div id="adm-ui" style="display:none;">
            <div class="group-label">Zarządzanie Liniami</div>
            <button onclick="openLineForm(-1)" class="main-btn">+ Dodaj Nową Linię</button>
            <div id="adm-lines-list"></div>

            <div class="group-label">Kategorie i Newsy</div>
            <button onclick="manageCategories()" class="main-btn" style="background:#444;">Edytuj Kategorie</button>
            <button onclick="openNewsForm()" class="main-btn" style="background:#444;">+ Dodaj News</button>
            <div id="adm-news-list"></div>

            <div class="group-label">Baza Danych</div>
            <button onclick="exportFullBackup()" class="main-btn" style="background: #222;">Pobierz Kopię Zapasową</button>
            <input type="file" id="import-db" onchange="importFullBackup(this)" style="display:none;">
            <button onclick="document.getElementById('import-db').click()" class="main-btn" style="background: #222;">Wgraj Kopię Zapasową</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="show('home')" id="n-home" class="active"><i class="fa-solid fa-bus"></i><span>Linie</span></div>
    <div onclick="show('stops')" id="n-stops"><i class="fa-solid fa-map-pin"></i><span>Przystanki</span></div>
    <div onclick="show('news')" id="n-news"><i class="fa-solid fa-bell"></i><span>News</span></div>
    <div onclick="show('adm')" id="n-adm"><i class="fa-solid fa-lock"></i><span>Admin</span></div>
</nav>

<div id="form-line" class="overlay-form">
    <h2 id="form-title">Nowa Linia</h2>
    <input type="text" id="fl-num" placeholder="Numer (np. 124)">
    <input type="text" id="fl-dir" placeholder="Kierunek (np. Dunikowskiego)">
    <select id="fl-type"><option value="bus">Autobus</option><option value="tram">Tramwaj</option></select>
    <select id="fl-cat"></select>
    <textarea id="fl-hours" placeholder="Godziny Robocze: 08:00, 08:30..."></textarea>
    <textarea id="fl-hours-sat" placeholder="Godziny Soboty"></textarea>
    <textarea id="fl-hours-sun" placeholder="Godziny Niedziele/Święta"></textarea>
    <div class="group-label">Przystanki na trasie</div>
    <div id="fl-stops-list"></div>
    <button onclick="addStopRow()" class="main-btn" style="background:#444">+ Dodaj Przystanek</button>
    <button onclick="saveLine()" class="main-btn">ZAPISZ LINIE</button>
    <button onclick="closeForms()" class="main-btn" style="background:none; color:var(--text-sec)">Anuluj</button>
</div>

<div id="form-news" class="overlay-form">
    <h2>Dodaj News</h2>
    <input type="text" id="fn-title" placeholder="Tytuł komunikatu">
    <textarea id="fn-content" placeholder="Treść..."></textarea>
    <button onclick="saveNews()" class="main-btn">Dodaj News</button>
    <button onclick="closeForms()" class="main-btn" style="background:none">Zamknij</button>
</div>

<script>
    let db = { lines: [], news: [], lineCategories: ["Tramwaje", "Autobusy"] };
    let curLineIdx = -1;

    function init() {
        const local = localStorage.getItem('mzk_v25_full');
        if(local) db = JSON.parse(local);
        render();
        setInterval(() => { if(document.getElementById('s-tt').classList.contains('active-sec')) renderTimetable(curLineIdx); }, 30000);
    }

    function save() { localStorage.setItem('mzk_v25_full', JSON.stringify(db)); render(); }

    function render() {
        const home = document.getElementById('home-content'); home.innerHTML = '';
        db.lineCategories.forEach(cat => {
            const lines = db.lines.filter(l => l.category === cat);
            if(lines.length > 0) {
                home.innerHTML += `<div class="group-label">${cat}</div>`;
                const grid = document.createElement('div'); grid.className = 'lines-grid';
                [...new Set(lines.map(l => l.num))].sort((a,b)=>parseInt(a)-parseInt(b)).forEach(num => {
                    const l = lines.find(x => x.num === num);
                    grid.innerHTML += `<div class="line-square ${l.type}" onclick="openVariants('${num}')">${num}</div>`;
                });
                home.appendChild(grid);
            }
        });
        document.getElementById('adm-lines-list').innerHTML = db.lines.map((l, i) => `<div class="app-card"><span><b>${l.num}</b> ${l.dir}</span><button onclick="openLineForm(${i})" style="color:var(--accent); background:none; border:none; font-weight:800;">EDYTUJ</button></div>`).join('');
        document.getElementById('public-news-list').innerHTML = (db.news || []).map((n, i) => `<div class="app-card" style="display:block;"><small>${n.date}</small><div><b>${n.title}</b></div><p style="font-size:0.8rem; color:var(--text-sec); margin-top:5px;">${n.content}</p></div>`).join('');
    }

    function openVariants(num) {
        show('vars'); document.getElementById('vars-head').innerHTML = `<div class="group-label">Linia ${num}</div>`;
        const list = document.getElementById('vars-list'); list.innerHTML = '';
        db.lines.filter(l => String(l.num) === String(num)).forEach((l, index) => {
            const realIdx = db.lines.indexOf(l);
            list.innerHTML += `<div class="app-card" onclick="renderTimetable(${realIdx})"><span>Do: <b>${l.dir}</b></span><i class="fa-solid fa-chevron-right"></i></div>`;
        });
    }

    function renderTimetable(idx) {
        curLineIdx = idx; const line = db.lines[idx]; show('tt');
        const now = new Date(); const day = now.getDay();
        let type = (day === 0) ? 'sun' : (day === 6 ? 'sat' : 'work');

        document.getElementById('tt-head').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; padding-top:10px;">
                <div><div class="group-label">Linia ${line.num}</div><h2>Do: ${line.dir}</h2></div>
                <button class="gps-btn" onclick="findMyLocation()"><i class="fa-solid fa-location-crosshairs"></i></button>
            </div>`;
        
        const body = document.getElementById('tt-body'); body.innerHTML = '';
        let total = 0;
        line.stops.forEach((stop, sIdx) => {
            total += parseInt(stop.time) || 0;
            const offset = total;
            let source = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
            let live = "";
            if(source) {
                let times = source.split(',').map(h => {
                    let p = h.trim().split(':'); let d = new Date();
                    d.setHours(p[0], parseInt(p[1]) + offset, 0); return d;
                });
                let next = times.find(d => d > now);
                if(next) {
                    let diff = Math.floor((next - now) / 60000);
                    if(diff <= 2) live = `<span class="live-badge"><span class="arrows-anim">>>>></span> ${diff === 0 ? 'TERAZ' : '1 MIN'}</span>`;
                    else if(diff < 60) live = `<span class="live-badge">za ${diff} min</span>`;
                    else live = `<span style="opacity:0.7;">${next.getHours()}:${next.getMinutes().toString().padStart(2,'0')}</span>`;
                }
            }
            const card = document.createElement('div');
            card.className = 'app-card'; card.style.display = 'block'; card.setAttribute('data-stop', stop.name);
            card.innerHTML = `<div style="display:flex; justify-content:space-between;"><div><b>${stop.name}</b>${stop.nz ? '<span class="nz-badge">NŻ</span>' : ''}</div><div>${live}</div></div><div id="g-${sIdx}" style="display:none;"><div id="times-${sIdx}" class="tt-grid"></div></div>`;
            card.onclick = () => { document.getElementById('g-'+sIdx).style.display = document.getElementById('g-'+sIdx).style.display==='none'?'block':'none'; updateTimes(sIdx, line, offset, type); };
            body.appendChild(card);
        });
    }

    function updateTimes(sIdx, line, offset, type) {
        const cont = document.getElementById(`times-${sIdx}`);
        let source = (type === 'work') ? line.hours : (type === 'sat' ? line.hoursSat : line.hoursSun);
        if(!source) return;
        cont.innerHTML = source.split(',').map(h => {
            let p = h.trim().split(':'); let d = new Date(); d.setHours(p[0], parseInt(p[1]) + offset, 0);
            return `<span class="tt-time">${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}</span>`;
        }).join('');
    }

    async function findMyLocation() {
        if(!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const query = `[out:json];node["highway"="bus_stop"](around:200,${pos.coords.latitude},${pos.coords.longitude});out;`;
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            if(data.elements.length > 0) {
                const nearest = data.elements[0].tags.name;
                document.querySelectorAll('#tt-body .app-card').forEach(c => {
                    if(nearest.toLowerCase().includes(c.getAttribute('data-stop').toLowerCase())) {
                        c.style.border = "2px solid var(--mzk-yellow)"; c.scrollIntoView({behavior:'smooth', block:'center'}); c.click();
                    }
                });
            }
        });
    }

    function openLineForm(idx) {
        curLineIdx = idx;
        const l = idx === -1 ? {num:"", dir:"", type:"bus", hours:"", hoursSat:"", hoursSun:"", category:"Autobusy", stops:[]} : db.lines[idx];
        document.getElementById('fl-num').value = l.num; document.getElementById('fl-dir').value = l.dir;
        document.getElementById('fl-hours').value = l.hours; document.getElementById('fl-hours-sat').value = l.hoursSat || ""; document.getElementById('fl-hours-sun').value = l.hoursSun || "";
        document.getElementById('fl-cat').innerHTML = db.lineCategories.map(c => `<option value="${c}" ${l.category===c?'selected':''}>${c}</option>`).join('');
        document.getElementById('fl-stops-list').innerHTML = ''; (l.stops || []).forEach(s => addStopRow(s.name, s.time, s.nz));
        document.getElementById('form-line').style.display = 'block';
    }

    function addStopRow(n="", t=2, nz=false) {
        const d = document.createElement('div'); d.className = 'stop-row';
        d.innerHTML = `<input type="text" value="${n}" class="st-n" placeholder="Nazwa"><input type="number" value="${t}" class="st-t"><input type="checkbox" ${nz?'checked':''} class="st-nz"><button onclick="this.parentElement.remove()" style="background:var(--danger); border:none; color:white; border-radius:8px;">X</button>`;
        document.getElementById('fl-stops-list').appendChild(d);
    }

    function saveLine() {
        const stops = Array.from(document.getElementById('fl-stops-list').children).map(r => ({ name: r.querySelector('.st-n').value, time: r.querySelector('.st-t').value, nz: r.querySelector('.st-nz').checked }));
        const data = { num: document.getElementById('fl-num').value, dir: document.getElementById('fl-dir').value, type: document.getElementById('fl-type').value, category: document.getElementById('fl-cat').value, hours: document.getElementById('fl-hours').value, hoursSat: document.getElementById('fl-hours-sat').value, hoursSun: document.getElementById('fl-hours-sun').value, stops };
        if(curLineIdx === -1) db.lines.push(data); else db.lines[curLineIdx] = data;
        save(); closeForms();
    }

    function manageCategories() { let n = prompt("Wpisz kategorie oddzielone przecinkami:", db.lineCategories.join(',')); if(n) { db.lineCategories = n.split(',').map(x => x.trim()); save(); } }
    function openNewsForm() { document.getElementById('form-news').style.display = 'block'; }
    function saveNews() { db.news.unshift({ title: document.getElementById('fn-title').value, content: document.getElementById('fn-content').value, date: new Date().toLocaleDateString() }); save(); closeForms(); }
    
    function filterStops() {
        const q = document.getElementById('stop-search').value.toLowerCase();
        let sList = []; db.lines.forEach(l => l.stops.forEach(s => { if(s.name.toLowerCase().includes(q) && !sList.some(x => x.name===s.name)) sList.push(s); }));
        document.getElementById('public-stops-list').innerHTML = sList.map(s => `<div class="app-card"><b>${s.name}</b></div>`).join('');
    }

    function show(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec')); document.getElementById('s-'+id).classList.add('active-sec'); document.querySelectorAll('nav div').forEach(d => d.classList.remove('active')); if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active'); }
    function login() { if(document.getElementById('pass').value==='123') document.getElementById('adm-ui').style.display='block'; }
    function closeForms() { document.querySelectorAll('.overlay-form').forEach(f => f.style.display='none'); }
    function exportFullBackup() { const b = new Blob([JSON.stringify(db)], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `mzk_backup.txt`; a.click(); }
    function importFullBackup(input) { const reader = new FileReader(); reader.onload = function(){ db = JSON.parse(reader.result); save(); }; reader.readAsText(input.files[0]); }

    init();
</script>
</body>
</html>
