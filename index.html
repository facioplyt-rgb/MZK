<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZK GORZÓW - Cloud Panel</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0b0f19; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(22, 28, 36, 0.95); backdrop-filter: blur(12px); }
        .card { background: #161c24; border: 1px solid rgba(255,255,255,0.05); }
        .accent-green { color: #00ab55; }
        .bg-accent { background: #00ab55; }
        .tt-time { background: #00ab55; box-shadow: 0 4px 12px rgba(0,171,85,0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mzk-gorzow-cloud';

        window.MZK = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, signInWithCustomToken, appId };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('home');
            const [data, setData] = useState({ lines: [], news: [], contact: "Kontakt: @facioyt" });
            const [loading, setLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            const [view, setView] = useState({ type: 'list', payload: null });
            const [editModal, setEditModal] = useState(null);
            const [importText, setImportText] = useState("");

            useEffect(() => {
                const init = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await window.MZK.signInWithCustomToken(window.MZK.auth, __initial_auth_token);
                    } else {
                        await window.MZK.signInAnonymously(window.MZK.auth);
                    }
                    
                    const docRef = window.MZK.doc(window.MZK.db, 'artifacts', window.MZK.appId, 'public', 'data', 'mzk_main');
                    window.MZK.onSnapshot(docRef, (snap) => {
                        if (snap.exists()) setData(snap.data());
                        setLoading(false);
                    });
                };
                init();
            }, []);

            const sync = async (newData) => {
                const docRef = window.MZK.doc(window.MZK.db, 'artifacts', window.MZK.appId, 'public', 'data', 'mzk_main');
                await window.MZK.setDoc(docRef, newData);
            };

            const getTime = (line, sIdx) => {
                let off = 0;
                for(let i=0; i<=sIdx; i++) off += (line.stops[i].time || 0);
                return line.hours.split(',').map(h => {
                    const [hh, mm] = h.trim().split(':');
                    const d = new Date(); d.setHours(hh, parseInt(mm) + off);
                    return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
                });
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-gray-500 font-bold">Ładowanie bazy...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24">
                    <header className="sticky top-0 z-50 glass p-5 border-b border-white/5 text-center font-black text-xl tracking-tighter">
                        MZK <span className="text-green-500">GORZÓW</span>
                    </header>

                    <main className="p-4 animate-in">
                        {tab === 'home' && (
                            <div>
                                {view.type === 'list' ? (
                                    <div className="space-y-6">
                                        {['Tramwaje', 'Autobusy'].map(cat => (
                                            <div key={cat}>
                                                <div className="text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest flex items-center gap-2">
                                                    <i className={`fa-solid fa-${cat==='Tramwaje'?'tram text-yellow-500':'bus text-green-500'}`}></i> {cat}
                                                </div>
                                                <div className="grid grid-cols-4 gap-3">
                                                    {data.lines.filter(l => (l.category || (l.type==='tram'?'Tramwaje':'Autobusy')) === cat).map((l, i) => (
                                                        <div key={i} className="relative">
                                                            <button 
                                                                onClick={() => setView({type: 'vars', payload: l.num})}
                                                                className={`w-full py-4 card rounded-2xl text-xl font-black border-b-4 ${l.type==='tram'?'border-b-yellow-500':'border-b-green-500'}`}
                                                            >
                                                                {l.num}
                                                            </button>
                                                            {isAdmin && (
                                                                <button onClick={() => sync({...data, lines: data.lines.filter(x => x !== l)})} className="absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full text-[10px]"><i className="fa-solid fa-times"></i></button>
                                                            )}
                                                        </div>
                                                    ))}
                                                    {isAdmin && (
                                                        <button onClick={() => setEditModal({ num: '', dir: '', type: 'bus', category: cat, hours: '', stops: [] })} className="py-4 border-2 border-dashed border-white/10 rounded-2xl text-gray-600"><i className="fa-solid fa-plus"></i></button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : view.type === 'vars' ? (
                                    <div className="space-y-3">
                                        <div className="text-[10px] font-bold text-gray-500 mb-2 uppercase">Linia {view.payload} - Kierunki</div>
                                        {data.lines.filter(l => l.num === view.payload).map((l, i) => (
                                            <div key={i} onClick={() => setView({type: 'tt', payload: l})} className="card p-4 rounded-2xl flex justify-between items-center">
                                                <span>Do: <b className="text-green-500">{l.dir}</b></span>
                                                <i className="fa-solid fa-chevron-right text-gray-800"></i>
                                            </div>
                                        ))}
                                        <button onClick={() => setView({type:'list'})} className="w-full p-4 text-gray-500 text-xs font-bold uppercase">Powrót</button>
                                    </div>
                                ) : (
                                    <div className="space-y-2">
                                        <div className="text-[10px] font-bold text-gray-500 mb-4 uppercase">{view.payload.num} → {view.payload.dir}</div>
                                        {view.payload.stops.map((s, si) => (
                                            <div key={si} className="card rounded-2xl overflow-hidden">
                                                <div className="p-4 flex justify-between" onClick={(e) => e.currentTarget.nextSibling.classList.toggle('hidden')}>
                                                    <span className="font-bold text-sm">{s.name} {s.nz && <span className="bg-red-500 text-[8px] p-1 rounded ml-1 uppercase">NŻ</span>}</span>
                                                    <i className="fa-solid fa-clock text-gray-800"></i>
                                                </div>
                                                <div className="hidden p-4 pt-0 grid grid-cols-4 gap-2 bg-black/20 border-t border-white/5">
                                                    {getTime(view.payload, si).map((t, ti) => (
                                                        <div key={ti} className="tt-time text-center py-2 rounded-xl text-[11px] font-black">{t}</div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => setView({type:'vars', payload: view.payload.num})} className="w-full p-4 text-gray-500 text-xs font-bold uppercase">Powrót</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'info' && (
                            <div className="text-center py-10 px-6">
                                <div className="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fa-solid fa-cloud text-2xl text-green-500"></i>
                                </div>
                                <h2 className="text-xl font-bold mb-1">Chmura MZK</h2>
                                <p className="text-gray-500 text-sm mb-10">{data.contact}</p>

                                <button onClick={() => setIsAdmin(!isAdmin)} className="text-[9px] font-bold text-gray-800 uppercase tracking-widest flex items-center gap-2 mx-auto mb-6">
                                    <i className="fa-solid fa-lock"></i> Panel Administracyjny
                                </button>

                                {isAdmin && (
                                    <div className="p-5 bg-red-500/5 border border-red-500/10 rounded-3xl text-left">
                                        <p className="text-[10px] font-black text-red-500 mb-2 uppercase">Importuj Backup (JSON)</p>
                                        <textarea 
                                            className="w-full h-32 bg-black/50 rounded-xl p-3 text-[10px] font-mono outline-none border border-white/5 mb-3"
                                            placeholder="Wklej treść backup_mzk.txt..."
                                            value={importText}
                                            onChange={e => setImportText(e.target.value)}
                                        />
                                        <button onClick={() => { try { sync(JSON.parse(importText)); alert("Zapisano!"); } catch(e){ alert("Błąd!"); } }} className="w-full bg-red-600 py-4 rounded-2xl font-black text-xs uppercase">Nadpisz bazę w chmurze</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {editModal && (
                        <div className="fixed inset-0 z-[100] glass p-6 overflow-y-auto">
                            <div className="max-w-xs mx-auto">
                                <h3 className="text-xl font-black mb-6">Nowa Linia</h3>
                                <div className="space-y-4">
                                    <input placeholder="Numer" className="w-full p-4 card rounded-2xl outline-none" value={editModal.num} onChange={e=>setEditModal({...editModal, num: e.target.value})}/>
                                    <input placeholder="Kierunek" className="w-full p-4 card rounded-2xl outline-none" value={editModal.dir} onChange={e=>setEditModal({...editModal, dir: e.target.value})}/>
                                    <textarea placeholder="Godziny (05:00, 05:20...)" className="w-full p-4 card rounded-2xl h-32 outline-none" value={editModal.hours} onChange={e=>setEditModal({...editModal, hours: e.target.value})}></textarea>
                                    <button onClick={() => { sync({...data, lines: [...data.lines, editModal]}); setEditModal(null); }} className="w-full bg-green-500 py-4 rounded-2xl font-black shadow-xl">DODAJ DO CHMURY</button>
                                    <button onClick={() => setEditModal(null)} className="w-full text-gray-500 font-bold py-2">Zamknij</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 w-full glass border-t border-white/5 h-20 flex z-40">
                        <button onClick={()=>{setTab('home'); setView({type:'list'})}} className={`flex-1 flex flex-col items-center justify-center ${tab==='home'?'text-green-500':'text-gray-600'}`}>
                            <i className="fa-solid fa-bus text-lg"></i><span className="text-[9px] font-bold uppercase mt-1">Rozkład</span>
                        </button>
                        <button onClick={()=>setTab('info')} className={`flex-1 flex flex-col items-center justify-center ${tab==='info'?'text-green-500':'text-gray-600'}`}>
                            <i className="fa-solid fa-circle-info text-lg"></i><span className="text-[9px] font-bold uppercase mt-1">Info</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
